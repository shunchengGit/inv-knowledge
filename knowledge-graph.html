<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>知识图谱</title>
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"
  onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js'"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --accent:#3b82f6;--hover:#f1f5f9;--radius:8px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
}
body{
  font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  color:var(--text);background:var(--bg);display:flex;flex-direction:column;height:100vh;
}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
}
.brand{display:flex;align-items:baseline;gap:8px}
.brand strong{font-size:15px}
.brand .muted{font-size:12px;color:var(--muted)}
.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.controls input{width:180px;font-size:13px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;outline:none;transition:border-color .15s}
.controls input:focus{border-color:var(--accent)}
.controls button,.controls select{
  font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface);cursor:pointer;transition:all .15s;
}
.controls button:hover,.controls select:hover{background:var(--hover)}
.controls button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Chips */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{
  font-size:11px;padding:3px 10px;border-radius:12px;border:1.5px solid var(--border);
  background:var(--surface);cursor:pointer;transition:all .15s;user-select:none;
  display:inline-flex;align-items:center;gap:5px;
}
.chip::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--chip-color,#94a3b8)}
.chip:hover{background:var(--hover)}
.chip.active{color:#fff;border-color:transparent;background:var(--chip-color,#3b82f6)}
.chip.active::before{background:#fff}
.chip[data-all]::before{display:none}

/* ── Main ── */
main{display:flex;flex:1;min-height:0}
#graph-panel{flex:1 1 55%;display:flex;flex-direction:column;min-width:0;position:relative;background:var(--surface);border-right:1px solid var(--border)}
#graph{flex:1;position:relative}
#table-view{flex:1;overflow-y:auto;display:none;padding:0}
#table-view.active{display:block}
#detail{flex:0 0 45%;overflow-y:auto;padding:20px 24px;background:var(--surface)}
#detail-content{display:block!important}
#detail-content[hidden]{display:none!important}

.view-toggle{position:absolute;top:8px;right:8px;z-index:20;display:flex;gap:4px}
.view-toggle button{
  font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;
  background:var(--surface);cursor:pointer;
}
.view-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.graph-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;
  text-align:center;color:var(--muted);font-size:14px;pointer-events:none;
}
.graph-hint b{color:var(--text)}

/* ── Table ── */
.entry-table{width:100%;border-collapse:collapse;font-size:13px}
.entry-table thead{position:sticky;top:0;z-index:1;background:var(--surface)}
.entry-table th{
  text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);
  color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer
}
.entry-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.entry-table tr{cursor:pointer;transition:background .1s}
.entry-table tr:hover{background:var(--hover)}
.entry-table td.title{font-weight:500}
.entry-table td.type{font-size:11px}
.entry-table td.desc{color:var(--muted);font-size:12px;max-width:300px}

/* ── Detail ── */
#detail-empty{text-align:center;margin-top:80px}
.detail-header{margin-bottom:14px}
.detail-header h1{font-size:18px;margin:6px 0 4px;font-weight:600;line-height:1.3}
.type-badge{
  display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;
  font-size:11px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.5px;
}
dl.meta{display:grid;grid-template-columns:70px 1fr;gap:6px 12px;margin:10px 0 16px;font-size:13px}
dl.meta dt{color:var(--muted);font-weight:500}
dl.meta dd{word-break:break-all}
dl.meta a{color:var(--accent)}
.tag{display:inline-block;padding:1px 8px;margin:0 4px 4px 0;border-radius:4px;background:var(--hover);color:#475569;font-size:11px}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}

#detail-body{font-size:13px;line-height:1.7}
#detail-body h1{font-size:17px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
#detail-body h2{font-size:15px;margin:16px 0 8px}
#detail-body h3{font-size:13px;margin:12px 0 6px}
#detail-body p{margin:8px 0}
#detail-body code{background:var(--hover);padding:1px 5px;border-radius:3px;font-size:12px;font-family:ui-monospace,monospace}
#detail-body pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:var(--radius);overflow-x:auto;font-size:12px}
#detail-body pre code{background:transparent;color:inherit;padding:0}
#detail-body ul,#detail-body ol{padding-left:22px;margin:8px 0}
#detail-body li{margin:3px 0}
#detail-body table{border-collapse:collapse;margin:10px 0;font-size:12px}
#detail-body th,#detail-body td{border:1px solid var(--border);padding:5px 10px}
#detail-body blockquote{border-left:3px solid var(--border);margin:10px 0;padding:4px 14px;color:var(--muted)}
#detail-body img{max-width:100%;border-radius:var(--radius)}
#detail-body a{color:var(--accent)}

#detail-backlinks{margin-top:20px}
#detail-backlinks h2{font-size:13px;color:var(--muted);margin-bottom:8px}
#detail-backlinks ul{padding-left:18px}
#detail-backlinks li{margin:3px 0}
#detail-backlinks a{color:var(--accent);cursor:pointer}

/* Stats bar */
.stats-bar{
  position:absolute;bottom:10px;left:14px;right:14px;z-index:10;
  display:flex;gap:16px;font-size:11px;color:var(--muted);
  pointer-events:none;
}
.stats-bar span{display:inline-flex;align-items:center;gap:4px}
.stats-dot{width:6px;height:6px;border-radius:50%}
.legend{position:absolute;top:10px;left:14px;z-index:10;display:flex;gap:12px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.legend-item{display:inline-flex;align-items:center;gap:4px}

/* Connectivity badge */
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.badge-warn{background:#fef3c7;color:#92400e}
.badge-ok{background:#d1fae5;color:#065f46}
</style>
</head>
<body>
<header>
  <div class="brand">
    <strong>🧠 知识图谱</strong>
    <span class="muted">18 节点 · 33 关联</span>
    <span class="badge badge-ok" id="conn-badge">已关联</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="搜索..."><span class="muted" id="filter-count" style="width:50px"></span>
    <select id="layout">
      <option value="cose">力导向</option><option value="concentric">同心圆</option>
      <option value="breadthfirst">层级</option><option value="circle">环形</option><option value="grid">网格</option>
    </select>
    <button id="reset">↺</button>
  </div>
  <div class="chip-row" id="type-chips" style="flex-basis:100%;padding-top:4px">
    <span class="chip active" data-all style="font-weight:500">全部</span>
  </div>
</header>
<main>
  <section id="graph-panel">
    <div class="view-toggle">
      <button data-view="graph" class="active">◉ 图谱</button>
      <button data-view="table">☰ 列表</button>
    </div>
    <div id="graph">
      <div class="graph-hint" id="graph-hint" hidden>
        <b>🔗 暂无关联</b><br><span style="font-size:12px">导入时为条目添加交叉引用，图谱将显示关联连线</span>
      </div>
      <div class="legend" id="legend"></div>
    </div>
    <div id="table-view"><table class="entry-table"><thead><tr><th>条目</th><th>描述</th></tr></thead><tbody id="table-body"></tbody></table></div>
  </section>
  <section id="detail">
    <div id="detail-empty" class="muted">◀ 点击节点或列表项查看详情</div>
    <article id="detail-content">
      <header class="detail-header">
        <span class="type-badge" id="detail-type"></span>
        <h1 id="detail-title"></h1>
      </header>
      <dl class="meta">
        <dt>描述</dt><dd id="detail-description"></dd>
        <dt>来源</dt><dd id="detail-resource"></dd>
        <dt>标签</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>↩ 被引用</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

ce": "n2", "target": "n3"}}, {"data": {"id": "n2__n6", "source": "n2", "target": "n6"}}, {"data": {"id": "n3__n2", "source": "n3", "target": "n2"}}, {"data": {"id": "n4__n5", "source": "n4", "target": "n5"}}, {"data": {"id": "n4__n16", "source": "n4", "target": "n16"}}, {"data": {"id": "n5__n4", "source": "n5", "target": "n4"}}, {"data": {"id": "n5__n0", "source": "n5", "target": "n0"}}, {"data": {"id": "n6__n2", "source": "n6", "target": "n2"}}, {"data": {"id": "n6__n5", "source": "n6", "target": "n5"}}, {"data": {"id": "n7__n16", "source": "n7", "target": "n16"}}, {"data": {"id": "n7__n5", "source": "n7", "target": "n5"}}, {"data": {"id": "n8__n16", "source": "n8", "target": "n16"}}, {"data": {"id": "n8__n10", "source": "n8", "target": "n10"}}, {"data": {"id": "n9__n10", "source": "n9", "target": "n10"}}, {"data": {"id": "n10__n11", "source": "n10", "target": "n11"}}, {"data": {"id": "n11__n10", "source": "n11", "target": "n10"}}, {"data": {"id": "n11__n8", "source": "n11", "target": "n8"}}, {"data": {"id": "n12__n3", "source": "n12", "target": "n3"}}, {"data": {"id": "n12__n15", "source": "n12", "target": "n15"}}, {"data": {"id": "n13__n17", "source": "n13", "target": "n17"}}, {"data": {"id": "n13__n14", "source": "n13", "target": "n14"}}, {"data": {"id": "n14__n17", "source": "n14", "target": "n17"}}, {"data": {"id": "n14__n1", "source": "n14", "target": "n1"}}, {"data": {"id": "n15__n16", "source": "n15", "target": "n16"}}, {"data": {"id": "n15__n3", "source": "n15", "target": "n3"}}, {"data": {"id": "n16__n15", "source": "n16", "target": "n15"}}, {"data": {"id": "n16__n3", "source": "n16", "target": "n3"}}, {"data": {"id": "n17__n13", "source": "n17", "target": "n13"}}, {"data": {"id": "n17__n14", "source": "n17", "target": "n14"}}], "bodies": {"n0": "# 台积电商业模式与护城河分析\n\n## 摘要\n台积电是全球最大的专业晶圆代工（Foundry），不做芯片设计，只负责把别人的设计做成真实芯片。全球晶圆代工约60%份额，服务500+客户，覆盖90%顶级芯片设计公司。\n\n## 关键数据\n- **2024年营收**：约2.89万亿新台币\n- **2024年净利**：3,746亿新台币\n- **市占率**：约60%（全球晶圆代工）\n- **客户数**：500+\n- **毛利率**：长期≥55%\n\n## 商业模式\n- **定位**：全球最大的专业晶圆代工（Foundry）\n- **模式**：开创\"无工厂模式\"——设计（Fabless）交给客户，制造交给台积电\n- **类比**：像\"云计算里的 AWS\"，把复杂昂贵的\"制造基础设施\"抽象成服务\n\n## 产品结构\n\n### 工艺平台（Process Nodes）\n- **先进制程**：N3家族（3nm），N2（2nm计划）→ 高性能/高能效\n- **主流制程**：5nm/7nm/16nm/28nm → 性价比与成熟生态\n- **特殊工艺**：高压/射频/车规/嵌入式存储等 → 细分场景\n\n### 制造与质量\n- 良率管理、缺陷分析、产能规划、稼动率优化\n- 设备/材料/光刻（EUV/DUV）协同\n\n### 先进封装与系统整合（SIPs）\n- **CoWoS**（高带宽封装）/ **SoIC**（3D堆叠）\n- **InFO**（轻薄移动封装）\n\n### 设计支持生态（DFx）\n- PDK/参考流程/与EDA/IP伙伴的协作\n- DFM/DFT（为制造与测试优化的设计方法）\n\n## 护城河\n\n### 1. 技术迭代飞轮\n- 先进工艺节点持续领先（3nm量产、2nm规划）\n- 研发与量产形成闭环\n\n### 2. 规模与良率\n- 越大规模，越能摊薄成本、积累缺陷数据库、提升良率\n- 形成正反馈\n\n### 3. 客户黏性与信任\n- 顶级客户的联合开发（JDP）与保密协作\n- 切入后替代难度极高\n\n### 4. 供应链掌控力\n- 对EUV设备、上游材料、封装/测试的系统级整合能力\n\n### 5. 生态标准\n- PDK/DFM/EDA流程像\"行业公路规则\"，黏住上下游\n\n## 关键术语\n- **Foundry**：纯制造，不做设计\n- **Tape-out**：设计定版送厂流片\n- **Yield（良率）**：合格芯片占比，决定成本与交付\n- **PPA**：Performance/Power/Area 的三角取舍\n- **EUV**：极紫外光刻，先进节点必需\n- **CoWoS / SoIC**：先进封装与3D堆叠，AI算力模块关键\n- **NRE**：一次性工程费用，如掩模/导入成本\n\n## 投资信号\n- 台积电=\"全球算力与终端的制造底座\"\n- 平台化的先进工艺 + 规模化的制造体系 + 生态协同\n- 把极端复杂的芯片制造变成可复用、可预测、可交付的\"服务产品\"\n## 关联\n- [台积电核心竞争力深度分析](台积电核心竞争力深度分析.md) — 商业模式是基础，核心竞争力是展开\n- [腾讯沧海V2视频编解码芯片下半年量产](2026-05-27-腾讯沧海V2视频编解码芯片下半年量产.md) — 台积电制造 vs 腾讯IC设计，产业链上下游", "n1": "# 台积电核心竞争力深度分析\n\n## 摘要\n台积电（TSMC）在芯片制造领域占据绝对领导地位，市场占有率稳定在约60%，最大竞争对手三星电子的市占率仅为11%。本文从商业模式、经营理念、技术积累、产能管理、生态建设、企业架构六个维度深入分析台积电的核心竞争力。\n\n## 关键要点\n\n### 1. 商业模式创新\n- 开创\"Fabless-Foundry\"垂直分工模式，仅制造芯片、不设计芯片\n- 让IC设计客户专注于设计和创新，扮演行业\"赋能者\"\n- 扶植大量有潜力的IC设计公司：高通、博通、英伟达、赛灵思、联发科、Marvell等\n\n### 2. 经营原则\n- **不与客竞争**：从不与客户竞争，确保利益协同\n- **密切服务客户**：CEO与前20-30名客户保持密切联络，为每家客户配备专职团队\n- 苹果A10起成为独家供应商，核心优势是客户信任\n\n### 3. 技术领先\n- 研发费用每年保持在公司净收入的8%以上\n- 坚持自主创新，多次引领技术创新（0.13微米、28纳米等关键节点）\n- 技术迭代稳扎稳打，遵循摩尔定律\n- 先进封装（InFO、CoWoS）成为AI服务器芯片主要封装技术\n- \"夜鹰计划\"：24小时不间断加速研发\n\n### 4. 产能管理\n- 制造重心集中在台湾（新竹、台中、台南），互为备用产能\n- 采取超大型晶圆厂（Giga Fab）群聚布局，形成\"产业聚落\"\n- 云端自动化统筹管理，跨厂合作提升产能利用率\n- **全球布局**：美国亚利桑那州（先进制程）、日本熊本（28纳米）、德国德雷斯顿（28/22纳米和16/12纳米）\n- N-1战略：境外工艺技术比台湾本地量产工艺低一代\n\n### 5. 生态系统\n- 开放创新平台（OIP）：联合EDA和IP公司形成\"虚拟IDM\"\n- 超过3,000名TSMC员工 + 100多家合作伙伴的10,000名员工\n- 43,000个技术文件和2,800个PDK\n\n### 6. 企业架构\n- 股权结构分散，前十大股东均为全球重量级投资机构\n- 董事会由世界级专业人士组成\n- 双首长平行领导模式（董事长刘德音 + CEO魏哲家）\n\n## 投资信号\n- 台积电在晶圆代工领域寡头地位稳固，技术领先优势明显\n- AI及高性能计算芯片对先进封装（CoWoS）需求日益提升\n- 全球产能布局分散地缘政治风险，但海外建厂成本高昂（美国高4-5倍）\n- 前十大客户中七家总部位于美国，贡献约60%收入\n## 关联\n- [台积电商业模式与护城河分析](台积电商业模式与护城河分析.md) — 深度分析 vs 商业模式基础，两篇互补\n- [福耀玻璃竞争壁垒与护城河分析](福耀玻璃竞争壁垒与护城河分析.md) — 跨标的：台积电技术壁垒 vs 福耀制造壁垒", "n2": "# 福耀玻璃2026年Q1汇兑风险深度分析\n\n## 摘要\n2026年Q1福耀玻璃汇兑损益逆转是利润下滑的核心原因。2025Q1汇兑收益2.4亿元（欧元贬值贡献），2026Q1汇兑亏损4.4亿元（美元欧元双升值）。全年汇兑影响预计超6亿元，是2026年盈利的关键变量。\n\n## 关键数据\n- 2025Q1汇兑损益：收益2.4亿元\n- 2026Q1汇兑损益：亏损4.4亿元\n- 2026Q1人民币vs美元：升值1.3%\n- 2026Q1人民币vs欧元：升值3%\n- 2025年海外收入占比：46.3%\n- 2026H1汇兑影响预测：亏损超6亿元（同期收益6亿）\n- 2026全年汇兑影响预测：亏损超6亿元（同期收益3亿）\n\n## 核心要点\n- 汇兑损益是2026年Q1利润下滑15.7%的主因\n- 福耀外汇风险敞口不仅挂钩美元，还涉及较大比例欧元\n- 2025年Q1欧元贬值3.7%带来汇兑收益，2026年Q1欧元升值3%导致亏损\n- 全年盈利预计中个位数下降，若汇率稳定\n- 股价从高点74元回调至55元附近，静态PE约15.5倍\n- 股息率约3.86%，具备一定防御性\n## 关联\n- [福耀玻璃2026年一季报业绩分析](2026-05-31-福耀玻璃2026年一季报业绩分析.md) — 汇兑是Q1利润下滑的核心驱动力\n- [曹德旺2025年度股东大会表态-美国关税](曹德旺2025年度股东大会表态-美国关税.md) — 汇兑+关税构成2026年双重外部风险", "n3": "# 福耀玻璃2026年一季报业绩分析\n\n## 摘要\n福耀玻璃2026年Q1营收104.13亿元（同比+5.08%），归母净利润17.12亿元（同比-15.68%）。利润下滑主因汇兑损益逆转：2025Q1汇兑收益2.4亿元，2026Q1汇兑亏损4.4亿元，单此一项影响盈利约6.8亿元。剔除汇兑影响后，主业经营基本平稳。\n\n## 关键数据\n- 营收：104.13亿元（+5.08%）\n- 归母净利润：17.12亿元（-15.68%）\n- 扣非净利润：16.43亿元（-17.32%）\n- 毛利率：37.38%\n- ROE：4.37%（同比-1.01pct）\n- 资产负债率：46.63%\n- 经营现金流：3.57亿元（-82.22%）\n- 摊薄每股收益：0.66元（-15.38%）\n\n## 核心要点\n- 汇兑损益是Q1利润下滑主因：人民币对欧元升值3%导致汇兑亏损4.4亿元\n- 汽车玻璃销量下滑3.7%，但单价提升约11%\n- 经营现金流大幅下降82%，需关注后续季度改善情况\n- 全年展望：若汇率稳定，全年盈利可能中个位数下降\n\n## 关联\n- [福耀玻璃2026年Q1汇兑风险深度分析](investing/福耀玻璃2026年Q1汇兑风险深度分析.md)", "n4": "# 福耀玻璃深度分析：\"汽车强国\"背后的\"卖铲人\"\n\n## 摘要\n福耀玻璃国内汽车玻璃市占率约70%，全球36%（第一）。文章深度分析了福耀的四大竞争壁垒：中国国运红利、柔性生产能力、垂直产业一体化、持续降本理念。2026年Q1业绩下滑主因汇兑损益逆转，全年盈利预计中个位数下降。\n\n## 关键数据\n- 国内汽车玻璃市占率：~70%\n- 全球汽车玻璃市占率：36%\n- 2025年营收：超450亿元\n- 2025年归母净利润：超90亿元\n- 2010-2025年营收复合增速：~11%\n- 2010-2025年净利润复合增速：~11%\n- 毛利率：37.3%（领先国际巨头10个百分点以上）\n\n## 核心要点\n- 四大护城河：中国国运红利、柔性生产、垂直一体化、持续降本\n- 柔性生产能力：常规规格换型仅需1小时，国际同行需3-5天\n- 垂直一体化：上游5个砂矿→6个浮法基地→17个汽玻基地\n- 2026年汇兑风险：美元+欧元双敞口，Q1汇兑亏损4.4亿元\n- 股价从高点74元回调至55元附近，静态PE约15.5倍\n- 股息率约3.86%（按60%分红率计算）\n## 关联\n- [福耀玻璃竞争壁垒与护城河分析](福耀玻璃竞争壁垒与护城河分析.md) — 两篇互补：这篇全景，那篇聚焦壁垒\n- [福耀玻璃2025年年报业绩概览](福耀玻璃2025年年报业绩概览.md) — 卖铲人叙事需用财务数据验证", "n5": "# 福耀玻璃竞争壁垒与护城河分析\n\n## 摘要\n福耀玻璃的四大竞争壁垒：中国国运红利、柔性生产能力、垂直产业一体化、持续降本理念。国内市占率70%，全球36%，毛利率37.3%领先国际巨头10个百分点以上。\n\n## 关键数据\n- 国内市占率：~70%\n- 全球市占率：36%\n- 毛利率：37.3%\n- 常规规格换型时间：1小时（国际同行3-5天）\n- 产能布局：国内11个+海外2个，共13个综合性工厂\n- 产能规模：近5000万套\n- 原材料本土化采购率（美国）：70%\n\n## 核心要点\n- 中国国运红利：完善的汽车产业链、高素质产业工人、\"低成本、高品质、快交付\"\n- 柔性生产能力：适配新能源时代多品种、小批量、高频迭代需求\n- 垂直一体化：上游砂矿→浮法基地→汽玻基地，紧密产业集群\n- 持续降本：2008-2025年从\"减少物料损耗\"到\"精益五星管理模式\"\n- 全球四大巨头格局：福耀36%、旭硝子/圣戈班/板硝子各14%-16%\n- 新增产能：福清、合肥新增600万套产能爬坡中\n## 关联\n- [福耀玻璃深度分析-汽车强国背后的卖铲人](福耀玻璃深度分析-汽车强国背后的卖铲人.md) — 两篇互补：这篇讲壁垒，那篇讲商业模式全景\n- [台积电商业模式与护城河分析](台积电商业模式与护城河分析.md) — 跨标的对比：制造业壁垒 vs 技术壁垒", "n6": "# 曹德旺2025年度股东大会表态：\"大不了把美国工厂关掉\"\n\n## 摘要\n2026年4月21日，福耀玻璃2025年度股东大会上，78岁曹德旺针对美国关税问题强硬表态。福耀美国工厂累计投资超10亿美元，占全美30%市场份额，2025年营收79.17亿元，净利润8.84亿元。曹德旺强调企业经营以盈利为根本，绝不接受不合理政策导致持续亏损。\n\n## 关键数据\n- 美国工厂累计投资：超10亿美元\n- 美国市场份额：30%\n- 美国员工：超3000名\n- 2025年美国营收：79.17亿元（+25.43%）\n- 2025年美国净利润：8.84亿元（+40.91%）\n- 原材料本土化采购率：70%\n- 产能利用率：80%以上\n\n## 核心要点\n- 2026年美国对全球商品加征15%全域关税，汽车零部件延续高额关税\n- 曹德旺底线：企业经营以盈利为根本，不合理关税导致亏损则关厂\n- 美国工厂是福耀海外业务核心支柱，但非不可替代\n- 曹德旺高度评价儿子曹晖：\"干得比我强\"\n- 从父辈强硬守底线到新生代深耕技术，福耀完成平稳传承\n## 关联\n- [福耀玻璃2026年Q1汇兑风险深度分析](福耀玻璃2026年Q1汇兑风险深度分析.md) — 关税与汇兑共同构成2026年两大外部风险\n- [福耀玻璃竞争壁垒与护城河分析](福耀玻璃竞争壁垒与护城河分析.md) — 曹德旺表态体现管理层对壁垒的定价权信心", "n7": "# 福耀玻璃2025年度ESG报告解读\n\n## 摘要\n福耀玻璃2025年度ESG报告系统披露了环境、社会及治理领域的实践与绩效。报告基于双重重要性原则，识别出24个ESG议题，其中5个高财务重要性议题。公司设定2030年单位产值碳排放较2019年下降50%的目标。\n\n## 关键数据\n- 温室气体排放总量：6,104,918.13吨CO2当量\n- 汽车玻璃单位产值碳排放强度：0.24吨/万元（较2024年下降20%）\n- 光伏及余热发电装机规模：168.86MWp\n- 工业用水重复利用率：93.58%\n- 研发投入：191,308.22万元（占营收4.18%）\n- 高附加值产品营收占比：54.20%\n- 绿色创新产品营收占比：20.18%\n- 全年申请专利：932件，授权492件\n\n## 核心要点\n- 投资32.5亿元建设福清零碳智能工厂，预计2027年实现净零排放\n- 清洁技术投资实际投入39.54亿元，通过节能技改实现年节电851,000kWh\n- ESG评级提升有助于降低融资约束\n- 需注意范围三温室气体排放量大幅增加（统计范围扩大导致）\n- 包装材料使用总量增长近一倍，需持续跟踪减量化进展\n## 关联\n- [福耀玻璃2025年年报业绩概览](福耀玻璃2025年年报业绩概览.md) — ESG目标需与财务表现平衡\n- [福耀玻璃竞争壁垒与护城河分析](福耀玻璃竞争壁垒与护城河分析.md) — ESG是护城河的软性维度", "n8": "# 福耀玻璃2026年4月股价行情\n\n## 摘要\n截至2026年4月14日，福耀玻璃股价58.54元，总市值1527.74亿元。2025年全年营收457.87亿元（+16.65%），归母净利润93.12亿元（+24.20%）。A股上市后累计派现356.83亿元。\n\n## 关键数据\n- 股价：58.54元（+2.06%）\n- 总市值：1527.74亿元\n- 换手率：0.34%\n- 股东户数：11.79万户（较上期+21.31%）\n- 2025年营收：457.87亿元（+16.65%）\n- 2025年归母净利润：93.12亿元（+24.20%）\n- A股累计派现：356.83亿元\n- 近三年累计派现：137.01亿元\n\n## 核心要点\n- 主力资金净流入2003.91万元\n- 香港中央结算持股3.83亿股（减少1530.65万股）\n- 华泰柏瑞沪深300ETF持股2642.33万股（减少82.43万股）\n- 主营业务：汽车玻璃91.49%，浮法玻璃14.15%\n- 概念标签：证金持股、特斯拉概念、光伏概念\n## 关联\n- [福耀玻璃2025年年报业绩概览](福耀玻璃2025年年报业绩概览.md) — 股价需要与业绩基本面对照\n- [福耀玻璃6月18日收盘与资金流-主力净流出3531-39万元](福耀玻璃6月18日收盘与资金流-主力净流出3531-39万元.md) — 4月→6月股价与资金流演变", "n9": "source_url: https://stock.10jqka.com.cn/20260619/c677584845.shtml\nsource: 同花顺财经\npublished_or_observed: 2026-06-19\ncategory: investing\n---\n\n# 福耀玻璃6月18日两融数据：融资余额21.41亿元\n\n## 摘要\n同花顺 iFinD 数据显示，福耀玻璃（600660）6月18日获融资买入1726.14万元，融资偿还1952.22万元，融资余额21.41亿元，占流通市值2.14%，处于历史较高分位。融券方面，6月18日融券卖出1.40万股、融券偿还1.60万股，融券余额1429.57万元。综合两融余额21.55亿元，较前一日小幅下降0.12%。\n\n## 关键要点\n- 2026-06-18：融资买入额 1726.14 万元；融资偿还额 1952.22 万元；融资余额 21.4114 亿元。\n- 2026-06-17：融资买入额 1756.46 万元；融资偿还额 2736.69 万元；融资余额 21.4341 亿元。\n- 2026-06-16：融资买入额 4402.07 万元；融资偿还额 4013.31 万元；融资余额 21.5321 亿元。\n- 2026-06-18：两融余额 21.5544 亿元，较昨日减少约257.4万元。\n- 信号方向：短期杠杆资金边际降温，但仍处较高水平。\n\n## 投资视角\n短期两融余额仍在高位，但6月17日、6月18日连续小幅回落，说明短线杠杆资金边际热度下降。该信号更偏交易层面，不构成基本面变化。对于长期持仓，更应关注后续汽车玻璃需求、海外工厂利润率、汇率/能源成本和新产品渗透，而非单日两融波动。\n\n## 关联\n- [福耀玻璃6月18日收盘与资金流：主力净流出3531.39万元](investing/福耀玻璃6月18日收盘与资金流-主力净流出3531-39万元.md)", "n10": "source_url: https://stock.stockstar.com/RB2026061800037075.shtml\nsource: 证券之星\npublished_or_observed: 2026-06-18\ncategory: investing\n---\n\n# 福耀玻璃6月18日收盘与资金流：主力净流出3531.39万元\n\n## 摘要\n证券之星消息，截至2026年6月18日收盘，福耀玻璃（600660）报49.95元，下跌1.46%，换手率       "background-color":"data(color)","label":"data(label)","color":"#0f172a",
      "font-size":9.5,"text-valign":"bottom","text-margin-y":3,"text-wrap":"wrap","text-max-width":100,
      "width":"data(size)","height":"data(size)","border-width":1,"border-color":"data(color)",
      "opacity":.92,"transition-property":"opacity","transition-duration":150,
    }},
    { selector:"node:selected", style:{"border-width":3,"border-color":"#f59e0b"} },
    { selector:"edge", style:{"width":1.5,"line-color":"#cbd5e1","target-arrow-color":"#cbd5e1","target-arrow-shape":"triangle","curve-style":"bezier","arrow-scale":.8} },
    { selector:".dim", style:{"opacity":.08} },
    { selector:".hidden", style:{"display":"none"} },
  ],
  layout: { name: connected?"cose":"grid", animate:false, padding:30, ...(connected?{}:{rows:Math.ceil(Math.sqrt(B.nodes.length))}) },
  wheelSensitivity: .2,
});

cy.on("tap","node",evt=>showDetail(evt.target.id()));
cy.on("tap",evt=>{if(evt.target===cy)clearSelection()});
}) : { // cytoscape 降级
  on(){}, elements(){return{unselect(){}}}, getElementById(){},
  nodes(){return{filter:()=>({length:0})}}, fit(){}, animate(){}, layout(){run(){}}, batch(fn){fn()}, zoom(){return 1}
};

// ── Search ──
let searchQ = "";
document.getElementById("search").addEventListener("input",e=>{
  searchQ = e.target.value.trim().toLowerCase();
  applyFilters();
});

// ── Layout ──
if (HAS_CYTOSCAPE) {
document.getElementById("layout").addEventListener("change",e=>{
  const name = e.target.value;
  const opts = { name, animate:false, padding:30 };
  if (name==="grid") opts.rows = Math.ceil(Math.sqrt(cy.nodes(":visible").length||1));
  cy.layout(opts).run();
});

document.getElementById("reset").addEventListener("click",()=>{cy.fit(null,30);clearSelection()});
}

// ── View toggle ──
document.querySelectorAll(".view-toggle button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".view-toggle button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const isGraph = btn.dataset.view === "graph";
    document.getElementById("graph").style.display = isGraph?"":"none";
    document.getElementById("table-view").classList.toggle("active",!isGraph);
    if (isGraph) { cy.resize(); cy.fit(null,30); }
  });
});

// ── Filters ──
function applyFilters(){
  if (!HAS_CYTOSCAPE) return;
  cy.batch(()=>{
    cy.nodes().forEach(n=>{
      const d = n.data();
      let visible = true;
      if (activeType && d.type !== activeType) visible = false;
      if (searchQ) {
        const hay = (d.label||"").toLowerCase()+" "+d.id+" "+(d.tags||[]).join(" ").toLowerCase();
        if (!hay.includes(searchQ)) visible = false;
      }
      n.toggleClass("dim",!visible).toggleClass("hidden", false);
    });
    cy.edges().forEach(e=>{
      e.toggleClass("dim",e.source().hasClass("dim")||e.target().hasClass("dim"));
    });
  });
  // 更新计数
  const v = cy.nodes(":visible").filter(n=>!n.hasClass("dim")).length;
  document.getElementById("filter-count").textContent = v===B.nodes.length?"":`${v}/${B.nodes.length}`;
}

// ── Detail ──
function clearSelection(){
  cy.elements().unselect();
  document.getElementById("detail-empty").style.display = "";
  document.getElementById("detail-content").style.display = "none";
}

function showDetail(nid){
  const d = nodeIdx[nid]; if(!d) return;
  cy.elements().unselect();
  const n = cy.getElementById(nid); if(n) n.select();

  document.getElementById("detail-empty").style.display = "none";
  const content = document.getElementById("detail-content");
  content.style.display = "";
  content.scrollTop = 0;

  const badge = document.getElementById("detail-type");
  badge.textContent = d.data.type; badge.style.background = d.data.color;

  document.getElementById("detail-title").textContent = d.data.label;
  document.getElementById("detail-description").textContent = d.data.description||"—";

  const resEl = document.getElementById("detail-resource");
  resEl.innerHTML = "";
  const resource = d.data.resource||"";
  const isUrl = /^https?:\/\//.test(resource);
  if (isUrl) {
    const a = document.createElement("a");
    a.href = resource; a.target = "_blank"; a.rel = "noopener";
    a.textContent = resource.length>80?resource.slice(0,77)+"...":resource;
    resEl.appendChild(a);
  } else { resEl.textContent = resource||"—"; }

  const tagsEl = document.getElementById("detail-tags");
  tagsEl.innerHTML = d.data.tags?.length
    ? d.data.tags.map(t=>`<span class="tag">${t}</span>`).join("") : "—";

  const bodyText = B.bodies[nid]||"";
  const bodyEl = document.getElementById("detail-body");
  bodyEl.innerHTML = renderMD(bodyText);

  const bl = backlinks[nid]||[];
  const blSec = document.getElementById("detail-backlinks");
  const blList = document.getElementById("backlinks-list");
  blList.innerHTML = "";
  if (bl.length) {
    blSec.hidden = false;
    bl.forEach(s=>{
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.textContent = nodeIdx[s]?.data?.label||s;
      a.addEventListener("click",()=>showDetail(s));
      li.appendChild(a);
      blList.appendChild(li);
    });
  } else { blSec.hidden = true; }

cy.animate({center:{eles:n},zoom:Math.max(cy.zoom(),1.0)},{duration:200});
}

// ── Table view ──
if (!connected) {
  document.getElementById("graph-hint").hidden = false;
}
// ── Legend ──
types.forEach(t=>{
  const c = p[t]||"#94a3b8";
  document.getElementById("legend").innerHTML += `<span class="legend-item"><span class="stats-dot" style="background:${c}"></span>${t}</span>`;
});

// ── Table ──
const tbody = document.getElementById("table-body");
B.nodes.forEach(n=>{
  const d = n.data;
  const tr = document.createElement("tr");
  tr.innerHTML = `<td class="title"><span class="type-badge" style="background:${d.color};font-size:10px;margin-right:6px">${d.type}</span>${d.label}</td><td class="desc">${d.description||""}</td>`;
  tr.addEventListener("click",()=>{
    document.querySelectorAll(".view-toggle button").forEach(b=>b.classList.remove("active"));
    document.querySelector('[data-view="graph"]').classList.add("active");
    document.getElementById("graph").style.display="";
    document.getElementById("table-view").classList.remove("active");
    showDetail(d.id);
  });
  tbody.appendChild(tr);
});

// ── 内置 Markdown 渲染（无 CDN 依赖） ──
function renderMD(text) {
  if (!text) return "";
  let html = text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // 代码块
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_,lang,code)=>
    `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`);
  // 行内代码
  html = html.replace(/`([^`]+)`/g,"<code>$1</code>");
  // 标题
  html = html.replace(/^#### (.+)$/gm,"<h4>$1</h4>");
  html = html.replace(/^### (.+)$/gm,"<h3>$1</h3>");
  html = html.replace(/^## (.+)$/gm,"<h2>$1</h2>");
  html = html.replace(/^# (.+)$/gm,"<h1>$1</h1>");
  // 粗体/斜体
  html = html.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  html = html.replace(/\*(.+?)\*/g,"<em>$1</em>");
  // 图片
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2">');
  // 链接
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  // 水平线
  html = html.replace(/^---$/gm,"<hr>");
  // 无序列表
  html = html.replace(/^[\*\-] (.+)$/gm,"<li>$1</li>");
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g,"<ul>$1</ul>");
  // 有序列表
  html = html.replace(/^\d+\. (.+)$/gm,"<li>$1</li>");
  // 引用
  html = html.replace(/^&gt; (.+)$/gm,"<blockquote>$1</blockquote>");
  // 段落（连续的纯文本行）
  html = html.replace(/\n\n+/g,"</p><p>");
  html = "<p>" + html + "</p>";
  // 清理空段落
  html = html.replace(/<p>\s*<\/p>/g,"");
  html = html.replace(/<p>(<(?:h[1-4]|ul|ol|pre|blockquote|hr|table)[\s\S]*?<\/\1>)<\/p>/g,"$1");
  return html;
}

// Auto-init
if (B.nodes.length) showDetail(B.nodes[0].data.id);
</script>
