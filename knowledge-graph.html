<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>知识图谱</title>
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"
  onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js'"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --accent:#3b82f6;--hover:#f1f5f9;--radius:8px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
}
body{
  font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  color:var(--text);background:var(--bg);display:flex;flex-direction:column;height:100vh;
}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
}
.brand{display:flex;align-items:baseline;gap:8px}
.brand strong{font-size:15px}
.brand .muted{font-size:12px;color:var(--muted)}
.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.controls input{width:180px;font-size:13px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;outline:none;transition:border-color .15s}
.controls input:focus{border-color:var(--accent)}
.controls button,.controls select{
  font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface);cursor:pointer;transition:all .15s;
}
.controls button:hover,.controls select:hover{background:var(--hover)}
.controls button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Chips */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{
  font-size:11px;padding:3px 10px;border-radius:12px;border:1.5px solid var(--border);
  background:var(--surface);cursor:pointer;transition:all .15s;user-select:none;
  display:inline-flex;align-items:center;gap:5px;
}
.chip::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--chip-color,#94a3b8)}
.chip:hover{background:var(--hover)}
.chip.active{color:#fff;border-color:transparent;background:var(--chip-color,#3b82f6)}
.chip.active::before{background:#fff}
.chip[data-all]::before{display:none}

/* ── Main ── */
main{display:flex;flex:1;min-height:0}
#graph-panel{flex:1 1 55%;display:flex;flex-direction:column;min-width:0;position:relative;background:var(--surface);border-right:1px solid var(--border)}
#graph{flex:1;position:relative}
#table-view{flex:1;overflow-y:auto;display:none;padding:0}
#table-view.active{display:block}
#detail{flex:0 0 45%;overflow-y:auto;padding:20px 24px;background:var(--surface)}
#detail-content{display:block!important}
#detail-content[hidden]{display:none!important}

.view-toggle{position:absolute;top:8px;right:8px;z-index:20;display:flex;gap:4px}
.view-toggle button{
  font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;
  background:var(--surface);cursor:pointer;
}
.view-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.graph-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;
  text-align:center;color:var(--muted);font-size:14px;pointer-events:none;
}
.graph-hint b{color:var(--text)}

/* ── Table ── */
.entry-table{width:100%;border-collapse:collapse;font-size:13px}
.entry-table thead{position:sticky;top:0;z-index:1;background:var(--surface)}
.entry-table th{
  text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);
  color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer
}
.entry-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.entry-table tr{cursor:pointer;transition:background .1s}
.entry-table tr:hover{background:var(--hover)}
.entry-table td.title{font-weight:500}
.entry-table td.type{font-size:11px}
.entry-table td.desc{color:var(--muted);font-size:12px;max-width:300px}

/* ── Detail ── */
#detail-empty{text-align:center;margin-top:80px}
.detail-header{margin-bottom:14px}
.detail-header h1{font-size:18px;margin:6px 0 4px;font-weight:600;line-height:1.3}
.type-badge{
  display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;
  font-size:11px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.5px;
}
dl.meta{display:grid;grid-template-columns:70px 1fr;gap:6px 12px;margin:10px 0 16px;font-size:13px}
dl.meta dt{color:var(--muted);font-weight:500}
dl.meta dd{word-break:break-all}
dl.meta a{color:var(--accent)}
.tag{display:inline-block;padding:1px 8px;margin:0 4px 4px 0;border-radius:4px;background:var(--hover);color:#475569;font-size:11px}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}

#detail-body{font-size:13px;line-height:1.7}
#detail-body h1{font-size:17px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
#detail-body h2{font-size:15px;margin:16px 0 8px}
#detail-body h3{font-size:13px;margin:12px 0 6px}
#detail-body p{margin:8px 0}
#detail-body code{background:var(--hover);padding:1px 5px;border-radius:3px;font-size:12px;font-family:ui-monospace,monospace}
#detail-body pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:var(--radius);overflow-x:auto;font-size:12px}
#detail-body pre code{background:transparent;color:inherit;padding:0}
#detail-body ul,#detail-body ol{padding-left:22px;margin:8px 0}
#detail-body li{margin:3px 0}
#detail-body table{border-collapse:collapse;margin:10px 0;font-size:12px}
#detail-body th,#detail-body td{border:1px solid var(--border);padding:5px 10px}
#detail-body blockquote{border-left:3px solid var(--border);margin:10px 0;padding:4px 14px;color:var(--muted)}
#detail-body img{max-width:100%;border-radius:var(--radius)}
#detail-body a{color:var(--accent)}

#detail-backlinks{margin-top:20px}
#detail-backlinks h2{font-size:13px;color:var(--muted);margin-bottom:8px}
#detail-backlinks ul{padding-left:18px}
#detail-backlinks li{margin:3px 0}
#detail-backlinks a{color:var(--accent);cursor:pointer}

/* Stats bar */
.stats-bar{
  position:absolute;bottom:10px;left:14px;right:14px;z-index:10;
  display:flex;gap:16px;font-size:11px;color:var(--muted);
  pointer-events:none;
}
.stats-bar span{display:inline-flex;align-items:center;gap:4px}
.stats-dot{width:6px;height:6px;border-radius:50%}
.legend{position:absolute;top:10px;left:14px;z-index:10;display:flex;gap:12px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.legend-item{display:inline-flex;align-items:center;gap:4px}

/* Connectivity badge */
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.badge-warn{background:#fef3c7;color:#92400e}
.badge-ok{background:#d1fae5;color:#065f46}
</style>
</head>
<body>
<header>
  <div class="brand">
    <strong>🧠 知识图谱</strong>
    <span class="muted">29 节点 · 92 关联</span>
    <span class="badge badge-ok" id="conn-badge">92 关联, 2 孤立</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="搜索..."><span class="muted" id="filter-count" style="width:50px"></span>
    <select id="layout">
      <option value="cose">力导向</option><option value="concentric">同心圆</option>
      <option value="breadthfirst">层级</option><option value="circle">环形</option><option value="grid">网格</option>
    </select>
    <button id="reset">↺</button>
  </div>
  <div class="chip-row" id="type-chips" style="flex-basis:100%;padding-top:4px">
    <span class="chip active" data-all style="font-weight:500">全部</span>
  </div>
</header>
<main>
  <section id="graph-panel">
    <div class="view-toggle">
      <button data-view="graph" class="active">◉ 图谱</button>
      <button data-view="table">☰ 列表</button>
    </div>
    <div id="graph">
      <div class="graph-hint" id="graph-hint" hidden>
        <b>🔗 暂无关联</b><br><span style="font-size:12px">导入时为条目添加交叉引用，图谱将显示关联连线</span>
      </div>
      <div class="legend" id="legend"></div>
    </div>
    <div id="table-view"><table class="entry-table"><thead><tr><th>条目</th><th>描述</th></tr></thead><tbody id="table-body"></tbody></table></div>
  </section>
  <section id="detail">
    <div id="detail-empty" class="muted">◀ 点击节点或列表项查看详情</div>
    <article id="detail-content">
      <header class="detail-header">
        <span class="type-badge" id="detail-type"></span>
        <h1 id="detail-title"></h1>
      </header>
      <dl class="meta">
        <dt>描述</dt><dd id="detail-description"></dd>
        <dt>来源</dt><dd id="detail-resource"></dd>
        <dt>标签</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>↩ 被引用</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

e": "n25", "target": "n21"}}, {"data": {"id": "n25__n22", "source": "n25", "target": "n22"}}, {"data": {"id": "n25__n23", "source": "n25", "target": "n23"}}, {"data": {"id": "n25__n19", "source": "n25", "target": "n19"}}, {"data": {"id": "n25__n18", "source": "n25", "target": "n18"}}, {"data": {"id": "n26__n27", "source": "n26", "target": "n27"}}, {"data": {"id": "n26__n28", "source": "n26", "target": "n28"}}, {"data": {"id": "n27__n26", "source": "n27", "target": "n26"}}, {"data": {"id": "n27__n28", "source": "n27", "target": "n28"}}, {"data": {"id": "n27__n10", "source": "n27", "target": "n10"}}, {"data": {"id": "n28__n26", "source": "n28", "target": "n26"}}, {"data": {"id": "n28__n27", "source": "n28", "target": "n27"}}, {"data": {"id": "n28__n19", "source": "n28", "target": "n19"}}], "bodies": {"n0": "# BNP Paribas: SK HYNIX — Enhanced AI Memory Leadership; Less Concern on Oversupply\n\n**报告日期**: 2026-04-23 | **券商**: BNP Paribas | **分析师**: Alex Chang, Scarlett Ge, Gwen Wang  \n**评级**: Outperform (维持) | **目标价**: KRW 2,000,000（上调自 KRW 1,590,000）| **涨幅**: +63%\n\n## 摘要\nBNP Paribas维持SK海力士Outperform，上调目标价26%至KRW 2,000,000。1Q26营收创历史新高KRW 52.6tn（+60% q-q/+198% y-y），OP KRW 37.6tn（OPM ~72%）。DRAM ASP中60%+/NAND ASP中70%+大幅增长，HBM4E预期>50%份额（TSMC base-die合作+1cnm技术优势）。产能扩张有纪律（龙仁Cluster灵活分期），净现金KRW 35tn。主要风险：Capex激增和通用服务器需求疲弱。\n\n## 关键要点\n- 1Q26营收创历史新高KRW 52.6tn（+60% q-q/+198% y-y），OP KRW 37.6tn（OPM ~72%）\n- DRAM ASP中60%+增长，NAND ASP中70%+增长\n- HBM4E预期>50%份额：与TSMC base-die合作 + SK海力士1cnm DRAM技术\n- HBM4E样品2H26，目标2027量产\n- 净现金KRW 35tn，负债权益比降至12%\n- 产能扩张有纪律，龙仁Cluster灵活分期降低供应过剩风险\n- 目标价KRW 2,000,000（基于3x 2027E BVPS），较保守\n- 龙仁 Cluster Phase 1 洁净室提前 3 个月至 2027 年 2 月完工\n- Phase 2-6 建设节奏视市场状况灵活调整\n- 偏好灵活性，考虑中长期需求可见性和优化的 LTA 条款\n- 321L NAND 目标年底占国内 NAND 生产 50%（全球 30%）\n\n### 内存优化技术不构成威胁\n- BNP 认为内存优化技术（如 Google TurboQuant）旨在提升 AI 服务的经济性，最终扩大 TAM\n- 例证：Google TPU 8t/8i HBM3E 容量仍从 192GB 增至 216/288GB\n\n### 其他要点\n- 专注高密度服务器模组和 321L SSD\n- ADR 注册文件已提交 SEC，目标年内上市\n- 关键材料供应链已多元化（氦气/溴/钨）\n- 目标净现金 KRW 100tn 确保穿越周期投资\n\n## 关键财务预测\n\n| 指标 | 2025A | 2026E | 2027E | 2028E |\n|------|-------|-------|-------|-------|\n| 营收 (KRW bn) | 97,147 | 281,119 | 288,082 | 272,664 |\n| Adj. EBITA (KRW bn) | 47,206 | 211,335 | 199,806 | 172,820 |\n| Adj. EPS (KRW) | 60,403 | 256,038 | 235,214 | 210,352 |\n| ROCE (%) | 35.7 | 112.1 | 95.6 | 74.0 |\n| P/E (x) | 5.1 | 4.8 | 5.2 | 5.8 |\n\n## 估值\n- TP KRW 2,000,000 = 3x 2027E BVPS（不变）\n- 目标 P/B 基于 2027E ROE 44% + CoE 14.7%（beta 2.0x, RFR 3.7%, ERP 5.5%）\n- EPS 上调 56%/25%/14%（2026/27/28），主因 ASP 和 GPM 上修\n\n## 关联\n- [JPMorgan: SK hynix LTA paves path for new valuation framework, raising PT to W3M](entries/JPMorgan-SK-hynix-LTA-paves-path-for-new-valuation-framework-raising-PT-to-W3M.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(19): es, an, asp, ve\n- [Macquarie: SK Hynix — Giddy profit growth at a low PE multiple, raise TP to KRW 2.9M](entries/Macquarie-SK-Hynix-Giddy-profit-growth-at-a-low-PE-multiple.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(18): sk, 2027e, pl, ix\n- [HSBC: SK Hynix — Another surprise in DRAM prices, raise TP to KRW 2.9M](entries/HSBC-SK-Hynix-Another-surprise-in-DRAM-prices-raise-TP.md) — 共享标签: 2026-Q1, valuation, sk-hynix; 同标的: sk-hynix; 共同关键词(19): es, ri, 2026, yn\n- [Nomura: SK Hynix 1Q26 earnings beat; LTAs to make profitability sustainable](entries/Nomura-SK-Hynix-1Q26-earnings-beat-LTAs-to-make-profitability-sustainable.md) — 共享标签: 2026-Q1, valuation, sk-hynix; 同标的: sk-hynix; 共同关键词(18): hynix, lta, su, ea", "n1": "# HSBC: SK Hynix — Another Surprise in DRAM Prices\n\n**报告日期**: 2026-05-11 | **券商**: HSBC | **分析师**: Ricky Seo, Han Kil Chang  \n**评级**: Buy (维持) | **目标价**: KRW 2,900,000（上调自 KRW 1,800,000）| **涨幅**: +54.3%\n\n## 摘要\nHSBC维持SK海力士Buy，目标价从KRW 1,800,000大幅上调至KRW 2,900,000（+54%）。核心催化剂：通用服务器DRAM需求爆发，AI服务器与通用服务器的比例从4-8:1快速趋于1:1。2Q26 OP上调14%至KRW 65tn，2026全年OP上调13%至KRW 265tn。HBM3e价格回升、SO-CAMM2增长提供额外ASP支撑。CSP 2026年Capex预期USD 640bn（+70% YoY）。\n\n## 关键要点\n- 2Q26 OP预计KRW 65tn（+73% q-q/+606% y-y），较此前预测高14%\n- 2Q26营收预计KRW 80tn（+52% q-q/+260% y-y）\n- 2026全年OP上调13%至KRW 265tn（+460% y-y），营收上调至KRW 329tn（+238% y-y）\n\n### CSP 资本开支持续激进\n- 四大 CSP 2026 年 capex 增长上调至 USD 640bn（+70% y-o-y）\n- 服务费上升 + 更好的 ROIC 预期，使数据中心投资更易决策\n- AI Agent 推动 Token 需求，降低每 Token 成本后 AI 使用量加速\n\n### 估值方法切换\n- 从 P/B 切换到 2027-28 平均 BVPS（稳健盈利趋势 + 延长的上行周期）\n- 目标 P/B 从 2.4x 上调至 2.8x（历史峰值）\n- 即使目标价，隐含 P/E 仅 7x 2027/28E 平均 EPS\n- OP 预测比 Bloomberg 共识高 9-13%（2027-28E）\n\n## 关键财务预测\n\n| 指标 | 2025A | 2026E | 2027E | 2028E |\n|------|-------|-------|-------|-------|\n| 营收 (KRW bn) | 97,147 | 328,665 | 475,836 | 563,132 |\n| EBITDA (KRW bn) | 61,136 | 288,195 | 418,350 | 447,138 |\n| OP (KRW bn) | 47,206 | 264,565 | 387,653 | 407,145 |\n| HSBC EPS (KRW) | 62,330 | 287,363 | 421,807 | 443,537 |\n| P/E (x) | 30.2 | 6.5 | 4.5 | 4.2 |\n| ROE (%) | 44.2 | 90.7 | 64.0 | 41.6 |\n| EV/EBITDA (x) | 21.7 | 4.2 | 2.4 | 1.8 |\n\n## 风险\n- 美国高利率（neo-CSP 和 OpenAI 依赖融资）\n- 存储器厂商产能激进扩张\n- 中东地缘冲突\n\n## 关联\n- [Macquarie: SK Hynix — Giddy profit growth at a low PE multiple, raise TP to KRW 2.9M](entries/Macquarie-SK-Hynix-Giddy-profit-growth-at-a-low-PE-multiple.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(23): to, tp, rw, pr\n- [JPMorgan: SK hynix LTA paves path for new valuation framework, raising PT to W3M](entries/JPMorgan-SK-hynix-LTA-paves-path-for-new-valuation-framework-raising-PT-to-W3M.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(17): sk, is, ix, es\n- [Nomura: SK Hynix 1Q26 earnings beat; LTAs to make profitability sustainable](entries/Nomura-SK-Hynix-1Q26-earnings-beat-LTAs-to-make-profitability-sustainable.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(17): sk, ix, to, in\n- [BNP Paribas: SK HYNIX — Enhanced AI memory leadership, less concern on oversupply](entries/BNP-Paribas-SK-HYNIX-Enhanced-AI-memory-leadership-less-concern-on-oversupply.md) — 共享标签: 2026-Q1, valuation, sk-hynix; 同标的: sk-hynix; 共同关键词(19): es, ri, 2026, yn", "n2": "# JPMorgan: SK hynix LTA Paves Path for New Valuation Framework\n\n**报告日期**: 2026-05-17 | **券商**: JPMorgan | **分析师**: Jay Kwon, Sangsik Lee, Neelay Y Kamath  \n**评级**: Overweight (维持) | **目标价**: KRW 3,000,000（上调自 KRW 1,800,000）| **涨幅**: +67%\n\n## 摘要\nJPMorgan维持SK海力士Overweight，目标价从KRW 1,800,000大幅上调至KRW 3,000,000（全市场最高之一）。核心催化：LTA谈判进入关键拐点，将推动存储器行业从P/B迁移至P/E估值框架（基于8x FY26-27E EPS）。大幅上调FY26-28E EPS 9-20%，股东回报计划KRW 240tn。\n\n## 关键要点\n- LTA 将推动存储器业务模式从\"周期性\"转向\"结构性/长期性\"\n- 存储器供需失衡短期内难以缓解，存储器厂商和 CSP 达成 LTA 的概率很高\n- LTA 将提升存储器盈利质量，成为估值重估的核心驱动因素\n\n### 从 P/B 转向 P/E 估值框架\n- JPMorgan 认为 P/E 估值框架更合理，使用 8x FY26-27E EPS\n- 历史对比：2024 年以来平均 FTM P/E 仅 3x，当前约 6x\n- 5 倍 EPS 增长后（FY26E），预计 FY28 前 EPS CAGR 仍达 31%\n- Dec-26 目标价 KRW 3,000,000 = 8x 平均 FY26-27E EPS\n\n### 盈利假设大幅上调\n- FY26-28E EPS 上调 9-20%，反映更强的 DRAM/NAND/HBM 定价预期\n- DRAM ASP 展望从低-40% q-q 上调至低-50% q-q\n- 服务器 DRAM（AI 向 CPU 扩散）和移动 DRAM（LPDDR5X 竞争）共同驱动价格\n- 三星罢工也对定价情绪产生积极影响\n- HBM ASP 谈判预计对存储器厂商有利，明年 ASP 增长加速\n\n### 股东回报与现金生成\n- 预计 2025-27E 累计 FCF 达 KRW 240tn 用于股东回报\n- 2026E/27E TSR 收益率达 5%/12%\n- 官方股东回报政策：TSR = FCF 的 50%（三年累计基准）、25% 固定 DPS 提升、资本强度目标中 30%+、资产负债改善计划\n\n### 核心催化剂与风险\n**催化剂**: LTA 量/价协议披露 + 股东回报执行 + EPS 持续上修  \n**风险**: LTA 谈判停滞、AI 需求放缓、地缘政治风险、技术突破减少 AI 机架内存需求、存储器供给超预期\n\n## 关键财务预测\n\n| 指标 | FY25A | FY26E | FY27E | FY28E |\n|------|-------|-------|-------|-------|\n| 营收 (KRW bn) | 97,147 | 347,547 | 490,631 | 597,583 |\n| Adj. EBIT (KRW bn) | 47,206 | 275,573 | 393,141 | 469,691 |\n| Adj. EPS (KRW) | 58,987 | 316,147 | 433,828 | 539,093 |\n| EBIT 利润率 (%) | 48.6 | 79.3 | 80.1 | 78.6 |\n| ROE (%) | 44.1 | 90.8 | 59.1 | 46.9 |\n| Adj. P/E (x) | 30.5 | 5.7 | 4.1 | 3.3 |\n\n## 季度 EPS 展望\n\n| | 1Q | 2Q | 3Q | 4Q | FY |\n|---|----|----|----|----|----|\n| 2025A | 11,136 | 9,609 | 17,302 | 20,940 | 58,987 |\n| 2026E | 56,603A | 76,447 | 87,648 | 95,044 | 316,147 |\n| 2027E | 97,854 | 107,375 | 112,376 | 116,036 | 433,828 |\n\n## 估值重估路线\n- 股价 YTD +201%（vs 存储器同行 +255%，SOX +70%）\n- 市场对 2027E 存储器盈利信心增强，存储器上行周期延长\n- 多重重估空间：从 P/B 到 P/E 的框架迁移是关键\n\n## 关联\n- [BNP Paribas: SK HYNIX — Enhanced AI memory leadership, less concern on oversupply](entries/BNP-Paribas-SK-HYNIX-Enhanced-AI-memory-leadership-less-concern-on-oversupply.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(19): es, an, asp, ve\n- [Macquarie: SK Hynix — Giddy profit growth at a low PE multiple, raise TP to KRW 2.9M](entries/Macquarie-SK-Hynix-Giddy-profit-growth-at-a-low-PE-multiple.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(19): to, sk, at, th\n- [HSBC: SK Hynix — Another surprise in DRAM prices, raise TP to KRW 2.9M](entries/HSBC-SK-Hynix-Another-surprise-in-DRAM-prices-raise-TP.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(17): sk, is, ix, es", "n3": "# MSFT AI基础设施货币化：仍处AI周期早期阶段，营收预估可能滞后\n\n## 摘要\nMorgan Stanley从\"每兆瓦营收\"（Revenue per MW）角度分析微软的云与AI基础设施扩张，认为市场对AI营收的预估可能显著滞后于基础设施部署节奏。维持Overweight，目标价$650（同业最高）。\n\n## 关键要点：营收/MW持续下行暗示上行空间\n- 微软云生态系统当前每MW年化营收约$2000-3000万\n- 随着DC容量从FY24的~5GW扩至FY28的~20GW，每MW营收预估降至$1700万+\n- 营收/MW下降并不代表变现能力恶化——恰恰相反，这反映微软正大规模超前部署AI基础设施，营收尚未完全跟上\n- 若AI采用加速、推理负载放量或软件附加率（Copilot/Azure/Dynamics/GitHub/M365）提升，现有的DC足迹可支撑远高于当前预估的营收\n\n## 基础设施部署规模\n- 微软DC装机容量：~5GW（FY24）→ 7-9GW（CY25末）→ ~20GW（FY28）\n- \"我们将今年AI容量提升80%以上，未来两年DC足迹翻倍\"——管理层\n- 仅FQ3就新增1.0GW GPU容量，连续两季维持此节奏\n- Capex隐含AI服务器：到FY29相当于~9820万块H100等效算力\n\n## Capex驱动营收模型\n- MS构建了capex隐含AI营收模型，将AI专项资本支出与营收生成关联\n- 假设Azure AI毛利率在15-60%区间，capex隐含的AI营收远高于当前bottom-up预估\n- 只要Azure AI毛利率>15-20%，当前cap ex水平就支撑显著的上行空间\n- capex分配需同时考虑：1P应用、内部R&D、训练需求、替换周期、土地/建筑等长周期资产\n\n## 投资启示\n- MS的装机容量分析暗示营收预估可能\"不恰当地滞后\"（inappropriately lagging）\n- 营收修订的方向更可能是向上而非向下\n- 短期内capex高峰和FCF承压（FY27 FCF约-$210亿）是主要担忧\n- 但30年DC资产和6年芯片投资的长期回报率应最终可观\n- 在AI周期早期阶段，当前股价（$416）的估值提供了良好入场点\n\n## 财务预测\n- FY26/27/28 EPS（MS ModelWare）：$17.35/$19.71/$24.03\n- 目标价$650（30x CY27 Base Case EPS $21.76）\n- 30x PE略高于大型软件同业，1.5x PEG与MSFT历史PEG基本一致\n- 上行风险：云采用加速且Azure成为赢家；AI领导地位带来实质性营收贡献\n- 下行风险：宏观经济影响IT支出；AI采用受限；投资侵蚀利润率", "n4": "# MSFT：Anthropic合作有望成为Azure $430亿年化增量机会\n\n## 摘要\nHSBC认为Anthropic协议深化有望为Azure带来巨额增量营收。HSBC预估Anthropic 2030年将产生$650亿营收，其中$430亿将流向Azure（按40-50%分润估计），同时Anthropic在Azure上的训练/推理支出将进一步推动Azure AI营收。但上调目标价面临的模型风险：Anthropic营收可能被过度放大。\n\n## 关键要点\n- Anthropic年化营收从2025年12月的~$90亿飙升至2026年5月的~$400亿（据The Information报道）\n- HSBC预估Anthropic 2030年营收可达~$2410亿（vs 2025年不到$50亿）\n- Anthropic目前仅占微软RPO的~5%（vs OpenAI占~46%），表明未来增长空间巨大\n- 若Anthropic 2030年计算需求为其营收的60%，则=$1440亿云基础设施年化机会\n- 若Azure获得该机会的30%份额（与HSBC 2030年市场份额预估一致），则=$430亿/年增量\n\n## 企业AI超级周期\n- 全球企业AI营收（除中国）预计2030年达$6120亿\n- HSBC认为AI算力需求将超过供给持续数年，微软处于这一超级周期的中心\n- Azure 3QFY26录得40%同比（CCY 39%）增长，管理层指引4QFY26 CCY 39-40%并进一步加速\n- 支持增长需要持续高capex：CY26超$1900亿，HSBC支持此激进投资策略\n\n## 财务预测\n- 微软FY25-28营收CAGR 21.3%，非GAAP EPS CAGR 20.8%\n- HSBC FY26/27/28 EPS预估：$16.92/$20.71/$24.68（全部上调1-13%）\n- FY27营收预估$4062亿，OPM 46.8%\n- FY27 capex $2400亿（从$1620亿上调），FY27 FCF约-$23亿\n\n## 估值\n- 股价：$418.57（5/25收盘），目标价$571（29x NTM非GAAP EPS $19.68）\n- 当前P/NTM 21.3x，远低于5年均值29.2x\n- 目标价隐含36.4%上行空间，维持Buy评级\n\n## 交叉验证\n- BNP Paribas（5/26）同样强调OpenAI关系去风险和Anthropic作为新增长引擎的潜力\n- Azure 40%+增长持续性得到多方共识：BNPP、HSBC、Morgan Stanley\n- 但UBS对Anthropic机会持保留态度，更关注OpenAI非排他性带来的竞争压力", "n5": "# MSFT FQ3'26 深度分析：Capex飙升、Azure加速与定价模式转型\n\n## 摘要\nUBS在微软FQ3'26财报后深度分析：Azure CCY增长39%超预期，AI贡献$240亿年化营收（超预期$30亿），但Capex指引$1900亿大幅上修引发FCF担忧。M365 CoPilot席位2000万+、GitHub Copilot营收$30亿+均加速。维持Buy，目标价$510。\n\n## 关键要点\n- FQ3 Azure CCY 39%符合预期，但FQ4指引39-40%（高于市场预期的37-38%）是积极惊喜\n- 更重要：管理层罕见指引\"温和加速\"发生在H2 CY26，UBS据此将Azure增速预估上调至42.0%/42.5%（Sep/Dec'26）\n- 微软FQ3新增1.0GW GPU容量（连续两季），过去6个月新增2GW vs FY25全年新增2GW\n- 但需注意：AWS同期加速4个百分点、GCP加速15个百分点，微软的\"数个百分点\"加速相对温和\n- OpenAI对Azure的消费（含CPU服务如CosmosDB）计入Azure营收，构成H2加速的一部分解释\n\n## Capex的惊人跳升\n- FQ3 capex $319亿 → FQ4指引$400亿+ → H2 CY26平均每季~$600亿 → CY26合计$1900亿\n- UBS将FY27 capex从$1810亿大幅上调至$2340亿，FY27 FCF预估从+$150亿转为-$210亿\n- $250亿增量来自内存硬件通胀（HBM等），$250亿来自需求驱动的主动扩张\n- 管理层明确表示2/3 capex用于短周期资产（GPU服务器），说明对需求可见度极高\n- 投资者通常直接将$600亿/季的年化数字推演到FY27\n\n## 从席位到用量的定价变革\n- 本次财报电话会可能被铭记为软件业定价模式转型的关键时刻\n- GitHub Copilot token用量YTD大幅攀升，AI编码Agent是驱动因素\n- Anthropic年化营收从$90亿（'25年底）飙升至$300亿（3月底）是最明显的证据\n- 但转型带来短期阵痛：D365增长放缓、续约推迟、毛利率承压、capex被迫更高\n- 问题在于：非编码场景（知识工作、安全等）能否复现AI编码Agent的用量增长？\n\n## 各板块详情\n- **M365 Commercial Cloud**（~$900亿规模）：增长15%，席位增长6%稳定，ARPU由E5升级和Copilot驱动。FQ4指引13-14% CCY\n- **Copilot席位**：2000万符合预期，FQ4指引2500万+，开始改变\"Copilot令人失望\"的叙事\n- **Windows OEM**：因内存硬件通胀和PC预算受限将大幅下滑\n- **Dynamics 365**：指引\"低双位数\"（从17%大幅减速），客户因评估新AI定价模式暂停续约\n- **Commercial Bookings**：剔除OpenAI后仅+7%（FY23以来最差），含OpenAI为-6%\n- **AI营收$370亿年化**（+123% YoY），占总营收11%，含OpenAI在Azure上的CPU服务支出\n\n## 利润率展望\n- 毛利率承压：FQ4指引仅66.2%（环比-240bps），云计算毛利率从66%降至64%\n- 抵消因素：OpenAI协议修订后微软不再支付收入分成（此前在COGS中），从FQ4开始提振毛利率\n- 管理层暗示FY27 OI\"双位数增长\"，UBS预期14%，将通过裁员和控制OPEX实现\n- FY27非GAAP EPS预估从$19.21上调至$19.49（+1%）\n\n## OpenAI修订影响\n- 取消AGI条款：微软认为这是重大胜利\n- 取消微软向OpenAI的收入分成（此前在COGS而非收入抵减项），提振毛利率\n- 非排他性IP授权至2032年，但OpenAI可多云分发\n- OpenAI损失对GAAP EPS的拖累已降至最低（接近累计亏损上限）\n\n## 关联\n- [MSFT FQ3'26 财报速览：Azure加速 + Copilot起飞 (BNP Paribas/HSBC/UBS综合)](entries/MSFT-FQ3-26-财报速览-Azure加速-Copilot起飞-BNP-Paribas-HSBC-UBS综合.md) — 共享标签: 2026-Q1, microsoft, competitive-advantage; 同标的: microsoft, azure; 共同关键词(18): q3, bs, ms, az", "n6": "# MSFT FQ3'26 财报速览：Azure加速 + Copilot起飞\n\n## 摘要\n微软FQ3'26（2026年4月）财报表现强劲：营收$828.86亿（+18.3%），Non-GAAP EPS $4.27（+19.9%），Azure CCY增长39%超预期。M365 Copilot席位达2000万（环比+500万），AI年化营收$370亿（+123%）。最大争议是Capex指引大幅上修至$1900亿（含$250亿组件通胀），引发FCF担忧。三大券商综合评级Buy，目标价$510-571。\n\n## 关键要点\n1. **Azure增长引擎强劲**：39% CCY增长超指引（37-38%），FQ4指引39-40%，管理层罕见指引H2 CY26加速。AWS和GCP同期亦大幅加速，反映AI算力需求极度旺盛\n2. **Capex大幅上修成最大争议**：CY26 capex指引$1900亿（vs此前共识~$1600亿），含$250亿内存硬件通胀。UBS将FY27 capex预估从$1810亿上调至$2340亿，FY27 FCF预估转负（-$210亿）\n3. **Copilot拐点渐近**：20M付费席位环比+33%，FQ4指引2500万+。微软转向混合席位+消费模式，GitHub Copilot token消耗大幅增长\n4. **OpenAI协议调整利好Azure**：修订后微软不再向OpenAI支付收入分成（原计入COGS），剔除后Azure增长更\"纯粹\"。UBS指出该分成此前为COGS项而非收入抵减项\n5. **Dynamics 365和Windows承压**：D365指引\"低双位数\"增速（显著减速），客户因评估新AI定价场景而推迟续约。Windows OEM因内存通胀和PC预算紧张面临量收缩\n6. **估值处历史低位**：NTM P/E 21-22x（5年均值29x），HSBC目标价$571（29x NTMEPS），UBS目标价$510（22x CY27E），BNPP目标价$555\n7. **Microsoft AI营收已达$370亿年化**，OpenAI占显著部分，但剔除收入分成后的基础AI营收增长仍然强劲\n\n## 评级与目标价\n- BNP Paribas：Outperform，目标价$555（SOTP，25x FY28 P/E）\n- HSBC：Buy，目标价$571（29x NTM非GAAP EPS，原$593因下调倍数）\n- UBS：Buy，目标价$510（22x CY27非GAAP P/E）\n- 股价：~$424（4/29收盘）\n\n## 综合判断\nFQ3整体为强劲财报，Azure再加速和Copilot初步兑现缓解了市场对AI叙事的主要担忧。但capex大幅超预期和利润率承压（毛利率Q4指引仅66.2%，环比-240bps）构成主要矛盾点。关键在于微软能否证明$1900亿+的年化资本支出能转化为可持续的营收增长和投资回报率。\n\n## 关联\n- [MSFT 跟进分析：Copilot起飞在即，Azure 40%+增长可持续 (BNP Paribas 5/26)](entries/MSFT-跟进分析-Copilot起飞在即-Azure-40-增长可持续-BNP-Paribas-5-26.md) — 共享标签: copilot, competitive-advantage, microsoft; 同标的: copilot, microsoft; 共同关键词(29): ba, ar, 起飞, zu\n- [MSFT FQ3'26 深度分析：Capex飙升、Azure加速与定价模式转型 (UBS)](entries/MSFT-FQ3-26-深度分析-Capex飙升-Azure加速与定价模式转型-UBS.md) — 共享标签: 2026-Q1, microsoft, competitive-advantage; 同标的: microsoft, azure; 共同关键词(18): q3, bs, ms, az", "n7": "# MSFT 跟进分析：Copilot起飞在即，Azure 40%+增长可持续\n\n## 摘要\nBNP Paribas在微软FQ3'26后持续跟进，看好Copilot从\"尝鲜→部署\"的拐点。M365 Copilot席位Q4指引2500万+，Azure 40%+增长可持续至H2 CY26。GitHub Copilot营收$30亿+。AI贡献$350亿+年化营收。维持买入，目标价$530。\n\n## 关键要点\n- **用户反馈质变**：社交媒体和用户论坛上对Copilot的评价从怀疑转向谨慎乐观甚至赞赏。Agent Mode成为M365套件默认体验后，大量用户首次接触到此前已有但尚未GA的新功能\n- **Copilot Cowork获好评**：Frontier项目用户反馈积极，\"game changer\"、\"最接近真实AI助手\"等评价，虽仍落后Claude Cowork但基础框架已就位\n- **量化指标改善**：微软博客数据显示Word/Excel/PowerPoint的Copilot使用频率、新用户留存和满意度在一个月内显著提升\n- **席位加速**：FQ3 2000万 → FQ4指引2500万+（两季度净增1000万+），企业部署正在加速\n- **混合定价模式**：席位+消费的双轨模式使AI收入能更贴合实际用量，减少对续约周期的依赖\n\n## Azure 40%+增长可持续性\n- GPU租赁价格持续攀升（H100自年初+15%），支撑旧硬件续约合同定价\n- Fairwater Wisconsin已于4月16日上线（500MW+），Fairwater Atlanta接近满负荷\n- 新一代系统（GB300、Vera Rubin）每GW营收显著高于前代（Crusoe预估Vera Rubin每GW$150亿）\n- BNPP预估Azure CCY增长40%+可持续至FQ3'27，高于共识预期\n- 1P容量分配虽持续但新增产能规模足以支撑外部客户需求\n\n## OpenAI关系进一步去风险\n- AGI条款移除：增加微软对合作关系的可见度\n- OpenAI成功融资$1220亿，使其有能力履行$2500亿+Azure承诺\n- OpenAI近期法庭胜诉，可能打开短期内IPO的大门\n- 微软约24%的OpenAI股权（post-money）价值将随IPO兑现\n\n## 估值与目标价\n- 股价：$418.6（5/22收盘）\n- SOTP估值：核心业务25x FY28 P/E + OpenAI股权价值 → 目标价$555\n- FY27营收预估$3890亿，EBITA $1831亿，EPS $19.74（GAAP）\n- FY27 FCF仅$215亿（因capex高峰），FY28恢复至$649亿\n\n## 风险提示\n- Copilot用户反馈改善是否可持续？企业IT部署的滞后效应可能扭曲短期数据\n- Capex回报率：$1900亿+年化capex需在中期产生可观ROIC\n- 与Anthropic的合作可能稀释Azure上OpenAI工作负载份额\n- PC/Windows周期下行压力持续\n\n## 关联\n- [MSFT FQ3'26 财报速览：Azure加速 + Copilot起飞 (BNP Paribas/HSBC/UBS综合)](entries/MSFT-FQ3-26-财报速览-Azure加速-Copilot起飞-BNP-Paribas-HSBC-UBS综合.md) — 共享标签: copilot, competitive-advantage, microsoft; 同标的: copilot, microsoft; 共同关键词(29): ba, ar, 起飞, zu", "n8": "# Macquarie: SK Hynix — Giddy Profit Growth at a Low PE Multiple\n\n**报告日期**: 2026-05-14 | **券商**: Macquarie | **分析师**: Daniel Kim, Jacob Kim  \n**评级**: Outperform (维持) | **目标价**: KRW 2,900,000（上调自 KRW 1,800,000）| **涨幅**: +46.8%\n\n## 摘要\nMacquarie维持SK海力士Outperform，上调目标价61%至KRW 2,900,000（6x 2027E PE）。核心逻辑：存储器短缺将持续恶化至2027年后，HBM 2027年价格有望大涨>50%。Hynix对LTA拥有选择权可精选有利条款。ADR发行+回购将收缩流通股并引入外资。当前估值仅3x ex-cash 2027E PE，严重低估。\n\n## 关键要点\n- 存储器短缺将持续恶化：DRAM位供给增长受限（1d/0a nm die增长放缓+HBM trade ratio恶化）\n- HBM 2027年价格有望大涨>50%，供给持续紧张\n- Macquarie 认为主要 AI 芯片公司将不得不接受 2027 年 HBM 的大幅价格上调（>50%）\n- 原因是为确保所需的 DRAM 晶圆产能\n- HBM 买家必须避免重蹈 2026 年未能锁定足够供应的覆辙\n- Hynix 需要对齐 HBM 和 DRAM 之间的利润水平\n\n### Hynix 对 LTA 拥有选择权\n- 棘手的部分在于 Hynix 愿意将多少量承诺给多年期合同\n- LTA 应能限制下行风险，季度定价仍在一个宽幅区间内波动\n- Hynix 可以\"精挑细选\"对其最有利的 LTA 条款\n\n### ADR 上市催化估值重估\n- 预计 Hynix 未来两年花费约 KRW 250tn 用于股份回购和注销\n- ADR 初始发行后（约 2% 流通股），预计 ADR 比例将持续提升至 15%+\n- 本地流通股将收缩，而 ADR 因有限的互换性应享有溢价\n- ADR 发行将引入外国被动资金流入\n\n### 估值\n- 以 6x 2027E PE 为目标（从 2026 切换至 2027 为基准年）\n- 目标价上调 61% 至 KRW 2,900,000\n- Hynix 目前交易在 3x ex-cash 2027E PE，对应 2025-28E 10 倍 EPS 增长\n\n## 关键财务预测\n\n| 指标 | 2025A | 2026E | 2027E | 2028E |\n|------|-------|-------|-------|-------|\n| 营收 (KRW bn) | 97,147 | 322,408 | 541,564 | 764,436 |\n| EBIT (KRW bn) | 47,206 | 256,669 | 456,768 | 660,084 |\n| Adj. EPS (KRW) | 58,955 | 300,117 | 477,207 | 693,583 |\n| ROE (%) | 44.2 | 93.7 | 67.3 | 53.7 |\n| P/E (adj, x) | 33.5 | 6.6 | 4.1 | 2.8 |\n| EV/EBITDA (x) | 21.8 | 4.7 | 2.7 | 1.9 |\n\n## 催化剂\n- LTA 合同签署\n- 2027 年 HBM 供应合同\n- 股东回报政策修订\n- ADR 上市\n\n## 主要风险\n- AI 基础设施投资放缓\n- 电源等瓶颈产品延迟 AI 数据中心项目\n- 无锡 DRAM 工厂 EUV 不可用限制技术升级（超 1a nm）\n- CXMT 在高端 DRAM 市场取得进展\n- HBM4 产能爬坡和良率问题\n\n## 关联\n- [HSBC: SK Hynix — Another surprise in DRAM prices, raise TP to KRW 2.9M](entries/HSBC-SK-Hynix-Another-surprise-in-DRAM-prices-raise-TP.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(23): to, tp, rw, pr\n- [Nomura: SK Hynix 1Q26 earnings beat; LTAs to make profitability sustainable](entries/Nomura-SK-Hynix-1Q26-earnings-beat-LTAs-to-make-profitability-sustainable.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(22): ar, to, fi, pr\n- [JPMorgan: SK hynix LTA paves path for new valuation framework, raising PT to W3M](entries/JPMorgan-SK-hynix-LTA-paves-path-for-new-valuation-framework-raising-PT-to-W3M.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(19): to, sk, at, th\n- [BNP Paribas: SK HYNIX — Enhanced AI memory leadership, less concern on oversupply](entries/BNP-Paribas-SK-HYNIX-Enhanced-AI-memory-leadership-less-concern-on-oversupply.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(18): sk, 2027e, pl, ix", "n9": "# Nomura: SK Hynix 1Q26 Earnings Beat; LTAs to Make Profitability Sustainable\n\n**报告日期**: 2026-04-23 | **券商**: Nomura | **分析师**: CW Chung, Eon Hwang, YJ Kim  \n**评级**: Buy (维持) | **目标价**: KRW 2,340,000（上调自 KRW 1,930,000）| **隐含涨幅**: +82%\n\n## 摘要\nNomura维持SK海力士Buy评级，上调目标价至KRW 2,340,000（+82%隐含涨幅）。1Q26营收/OP均超市场预期，DRAM/NAND ASP环比大幅提升。Nomura上调2026F/27F OP分别9%/4%。核心焦点在于LTA（长期协议）谈判推进，若落地将推动存储器行业从周期性转向结构性高盈利。KRW升值是主要下行风险，但公司FCF回报率17%/33%提供安全垫。\n\n## 关键要点\n- 1Q26营收/OP均超预期，DRAM ASP环比大幅提升，NAND价格动能同样强劲\n- 2026F/27F OP预测分别上调9%/4%，反映优于预期的盈利前景\n- LTA谈判推进中，若落地将成为行业范式转变——从周期波动转向结构性高盈利\n- KRW升值是主要宏观风险，影响以美元计价的DRAM/NAND营收\n- FCF回报率17%/33%（2026F/27F），估值安全垫充足\n- EPS预估较同行保守，若LTA落地有进一步上调空间\n- 这将降低存储器公司的风险溢价（目前显著高于其他科技公司），支撑进一步估值重估\n\n### 韩元升值影响\n- Nomura 假设 2027F/28F USD/KRW 为 1,270/1,220，意味着韩元走强 14%/17%\n- KRW 升值对收入有负面影响（以 KRW 计收入下降），但对成本的减少有限（薪资等固定成本占比上升）\n- 2027F 收入仅下调 -0.2%，OP 反而上调 +3.7%\n- 以 USD 计价的 2027F 收入/OP 增长 9%/14%——隐含 USD 回报更大\n\n### 股东回报\n- 预计 2026F/27F FCF 回报率（vs 市值）达 17%/33%\n- 若 50% FCF 用于股东回报，总股东回报率为 8%/17%\n\n## 关键财务预测\n\n| 指标 | FY25 | FY26F | FY27F | FY28F |\n|------|------|-------|-------|-------|\n| 营收 (KRW bn) | 97,147 | 357,774 | 491,909 | 602,521 |\n| OP (KRW bn) | 47,206 | 279,548 | 378,862 | 438,954 |\n| Normalized EPS (KRW) | 58,710 | 328,664 | 426,766 | 352,286 |\n| ROE (%) | 44.1 | 100.1 | 70.8 | 51.8 |\n| P/E (x) | 21.9 | 3.9 | 3.0 | 2.4 |\n\n## 估值方法\n- 目标 P/B 3.5x（不变），对应 12MF BPS KRW 668,186\n- 目标价隐含 91% KRW 涨幅，若考虑 KRW 升值则 USD 涨幅达 112%\n\n## 关键风险\n- 韩元升值对 KRW 计价的营收和利润构成下行压力\n- LTA 谈判进展不及预期\n- AI 需求放缓\n\n## 关联\n- [Macquarie: SK Hynix — Giddy profit growth at a low PE multiple, raise TP to KRW 2.9M](entries/Macquarie-SK-Hynix-Giddy-profit-growth-at-a-low-PE-multiple.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(22): ar, to, fi, pr\n- [HSBC: SK Hynix — Another surprise in DRAM prices, raise TP to KRW 2.9M](entries/HSBC-SK-Hynix-Another-surprise-in-DRAM-prices-raise-TP.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(17): sk, ix, to, in\n- [BNP Paribas: SK HYNIX — Enhanced AI memory leadership, less concern on oversupply](entries/BNP-Paribas-SK-HYNIX-Enhanced-AI-memory-leadership-less-concern-on-oversupply.md) — 共享标签: 2026-Q1, valuation, sk-hynix; 同标的: sk-hynix; 共同关键词(18): hynix, lta, su, ea", "n10": "---\ntype: Analysis\ntitle: 华泰证券腾讯1Q26前瞻：AI布局和云业务迎来拐点，维持买入\ndescription: 华泰证券预计腾讯1Q26营收+11%/经调整净利+10%，AI Agent赛道迎拐点(龙虾产品矩阵升级/云提价/混元3.0发布)，SOTP目标价716港元，预计26年营收8410亿\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/腾讯控股/20260410-华泰证券-腾讯控股-0700.HK-AI布局和云业务迎来拐点.pdf\nsource_type: pdf\ntags: [tencent, profit-trend, business-model, 2026-Q1]\n---\n\n# 华泰证券腾讯1Q26前瞻：AI布局和云业务迎来拐点\n\n## 摘要\n华泰证券2026年4月发布腾讯1Q26前瞻报告。预计1Q26营收+11%至2015亿，经调整归母净利润+10%至673亿。核心看点：AI Agent赛道迎来拐点——龙虾(WorkBuddy)产品矩阵持续升级（嵌入微信/企业微信、多Agent协同、Skillhub生态打通），云业务提价+海外扩张驱动增长拐点。混元3.0预计4月上线。维持买入评级，SOTP目标价716港元。\n\n## 关键要点\n- 预计1Q26营收+11%（游戏+13%/广告+19%/金融科技+9%），经调整净利+10%至673亿\n- AI Agent赛道迎拐点：龙虾体系化升级，嵌入微信/小程序/企业微信，支持多Agent协同\n- 云业务驱动力：海外亚洲扩张、德国新区2Q26上线、混元API提价、AI算力需求释放\n- 4月将上线混元3.0大模型，建议关注Agent赛道的潜在拐点\n- 《洛克王国：世界》稳居iOS畅销榜前列\n- 26年营收预测8410亿（+12%），经调整净利2830亿（+9%）\n- 目标价716港元（基于SOTP），调整后PE 14.2x\n\n## 关联\n- [申万宏源腾讯深度之三：AI时代核心受益者](entries/申万宏源腾讯深度之三-AI时代核心受益者-超级入口与生态壁垒的再进化.md) — 申万宏源同样深入分析腾讯AI战略\n- [腾讯控股2026Q1正式业绩：营收1965亿(+9%)，Non-IFRS净利+11%](entries/腾讯控股2026Q1正式业绩-营收1965亿-9-Non-IFRS净利-11.md) — 后续业绩验证了基本面\n\n## 引用\n- [华泰证券-腾讯控股AI布局和云业务迎来拐点](res/腾讯控股/20260410-华泰证券-腾讯控股-0700.HK-AI布局和云业务迎来拐点.pdf)\n- [腾讯控股JPM 1Q26：转向更积极，双P&L披露化解AI稀释担忧](entries/腾讯控股JPM-1Q26-转向更积极-双P-L披露化解AI稀释担忧.md) — 共享标签: tencent, 2026-Q1, profit-trend; 同标的: tencent; 共同关键词(8): q2, ai, pdf, 1q", "n11": "# BNP Paribas：台积电推出A13并更新技术路线图\n\n## 摘要\nBNP Paribas（分析师Alex Chang）在台积电2026年北美技术研讨会后发布快评。关键发布包括A13制程（2029年HVM，A14光学缩小版，面积节省6%，完全向后兼容）、A12预览（Super Power Rail背面供电，针对AI/HPC）、N2U（2028年HVM，相比N2P速度提升3-4%或功耗降低8-10%，逻辑密度提升1.02-1.03x）。先进封装方面，CoWoS扩展至14-reticle尺寸（可容纳10个大型计算芯片+20个HBM堆栈），A14-to-A14 SoIC 3D堆叠（IO密度提升1.8x），COUPE硅光子（2x能效提升，10倍延迟降低）。维持Outperform评级，目标价TWD2,520/USD478。\n\n## 关键要点\n- A13（2029年HVM）：A14光学缩小，面积节省6%，完全向后兼容，降低客户tape-out成本，支持快速迁移\n- A12（2029年HVM）：A14平台增强版，Super Power Rail背面供电，针对AI/HPC应用，实现高端市场细分\n- N2U（2028年HVM）：2nm平台进一步演进，相比N2P速度+3-4%或功耗-8-10%，逻辑密度提升1.02-1.03x，为AI/HPC/移动应用提供成熟选择\n- CoWoS扩展：14-reticle尺寸（2028年），可集成10个大型计算芯片+20个HBM堆栈，解决AI集群瓶颈\n- SoIC 3D堆叠（2029年HVM）：A14-to-A14堆叠，die-to-die IO密度相比N2-to-N2提升1.8倍\n- COUPE硅光子：2倍能效提升，10倍延迟降低（机架间数据传输）\n- N2A汽车级：首次将纳米片带入汽车领域，2028年完成认证，比N3A速度提升15-20%\n- 投资观点：Foundry 2.0下TAM翻倍以上，支持约24%的2025-28E营收CAGR；美国投资US$165b缓解关税风险但长期稀释利润率\n\n## 关联\n- [UBS US技术研讨会（2026-04-23）](entries/台积电UBS-US技术研讨会-A13-A12-N2U路线图与AI护城河.md)\n- [BofA产能与技术爬坡（2026-05-15）](entries/台积电BofA-产能与技术爬坡-缓解竞争担忧.md)\n\n## 引用\n- [BNP Paribas - TSMC debuts A13](res/台积电/2026-04-24-2330.TW-BNP Paribas-TSMC  TSMC debuts A13 and updates tech roadmap-121610129.pdf)\n- [UBS：台积电US技术研讨会——A13/A12/N2U路线图与AI护城河](entries/台积电UBS-US技术研讨会-A13-A12-N2U路线图与AI护城河.md) — 共享标签: A12, technology-roadmap, advanced-packaging; 同标的: A12, technology-roadmap; 共同关键词(11): 积电, 2026, 路线, to", "n12": "# BofA：台积电产能与技术爬坡斜率更陡——缓解竞争担忧\n\n## 摘要\nBofA（分析师Haas Liu）在台积电台湾技术研讨会后发布报告，强调5nm和3nm的大规模产能（3nm 4Q26达190k WPM、2027年达230k WPM，远高于三星SF3或Intel 18A的20-25k WPM）限制了客户流失风险。N2作为首个纳米片节点，缺陷密度已达目标水平，比3nm同阶段领先2个季度。CoWoS良率已达98%+（5.5x reticle）。维持买入评级，目标价NT$2,560（20x 2027E PE），当前股价NT$2,270。\n\n## 关键要点\n- 5nm/3nm产能优势：台积电目标2022-2027年5nm和3nm产能CAGR达25%，设备共通性和AI驱动的生产力提升使产能高效转换\n- 3nm产能规模：预计4Q26达190k WPM，2027年达230k WPM；对比三星SF3或Intel 18A仅20-25k WPM且良率低\n- N2首次采用纳米片：缺陷密度已达目标水平，比3nm同阶段领先2个季度；N2家族2026-2028产能CAGR达70%\n- N2首年爬坡：比3nm多45%产能，同时推出5座晶圆厂，技术转移时间减少20%\n- N2/A16利润率：良率曲线优于3nm，预计享有更好的利润率（3nm约11个季度才到公司平均GM）\n- CoWoS产能：2022-2027年CoWoS产能CAGR达80%，SoIC达90%；技术升级时间减少30%（CoWoS）和75%（SoIC）\n- CoWoS良率：5.5x reticle良率已达98%+，2029年将推出14x+ reticle方案\n- 财务预测：2026E营收NT$5.24兆，净利润NT$2.57兆；2027E营收NT$6.68兆，净利润NT$3.32兆\n\n## 关联\n- [UBS US技术研讨会（2026-04-23）](entries/台积电UBS-US技术研讨会-A13-A12-N2U路线图与AI护城河.md)\n- [BofA资本支出报告（2026-05-17）](entries/台积电BofA-先进节点资本支出-Arizona盈利改善.md)\n\n## 引用\n- [BofA - Strong capacity and tech ramp](res/台积电/2026-05-15-2330.TW-BofA Global Research-Taiwan Semiconductor Manufacturing Co. Strong capacity and ...-122056887.undefined.pdf)", "n13": "# BofA：台积电先进节点需求管道强劲——2026-27资本支出展望上调\n\n## 摘要\nBofA在台积电董事会批准US$31bn资本拨款后发布报告，指出资本支出正加速向先进制程前端倾斜（LTM 53% vs 2024-25年的37%）。基于对GPU、ASIC、x86/ARM服务器CPU和网络交换机的WPY需求测算，2026年资本支出有望达到公司指引的US$56bn，2027年更可能升至US$75bn（vs BofA/市场预估US$63bn/US$65bn）。亚利桑那州晶圆厂1Q26实现NT$39bn营收和NT$19bn净利润，剔除政府补贴后营业利润率约45%，远超预期。维持买入评级，目标价NT$2,560（20x 2027E PE）。\n\n## 关键要点\n- 资本拨款规模：台积电董事会批准US$31bn资本拨款，重点用于先进制程前端产能和晶圆厂建设\n- 资本支出结构变化：前端扩产占比升至53%（LTM，vs 2024-25年的37%），设施/洁净室占比降至39%（vs 50%）\n- 2026-27资本支出预测：2026年US$56bn（符合指引），2027年可能达US$75bn（vs BofA预估US$63bn/市场US$65bn）\n- 亚利桑那州运营显著改善：1Q26营收NT$39bn，净利润NT$19bn（vs 2025全年NT$67bn营收/NT$16bn净利润）\n- 亚利桑那利润率：剔除政府补贴后1Q26营业利润率约45%，虽低于公司OpMs 58%，但稀释程度好于预期\n- 毛利率扩张逻辑：HPC应用强劲需求+高端移动芯片组，使台积电能更好反映技术领先价值\n- 财务预测：2026E营收NT$5.24兆，资本支出NT$1.78兆；2027E营收NT$6.68兆，资本支出NT$1.98兆\n\n## 关联\n- [BofA产能与技术爬坡（2026-05-15）](entries/台积电BofA-产能与技术爬坡-缓解竞争担忧.md)\n- [BofA AGM更新（2026-06-04）](entries/台积电BofA-股东大会AI需求与技术执行.md)\n\n## 引用\n- [BofA - Strong advanced node demand pipeline](res/台积电/2026-05-17-2330.TW-BofA Global Research-Taiwan Semiconductor Manufacturing Co. Strong advanced node...-122084481.undefined.pdf)", "n14": "# BofA：股东大会更新——AI驱动的强劲需求与技术执行支撑营收/毛利率展望\n\n## 摘要\nBofA在台积电2026年6月4日年度股东大会后发布报告，重申买入评级和NT$2,560目标价（20x 2027E PE）。管理层在股东会上表达了高度信心：1）对2030年前的营收可见度高度乐观，AI、EV和机器人应用持续扩展；2）56%+长期毛利率指引保持不变；3）N2结构性利润率将优于N3，且N3利润率仍在改善中。会议还讨论了竞争格局，Intel位列台积电前十大客户，合作关系将继续。台积电未考虑股票分割或回购。\n\n## 关键要点\n- AI需求高度乐观：管理层对2030年前增长可见度充满信心，AI、EV和机器人应用推动需求扩张\n- AI瓶颈：AI导致的瓶颈贯穿电力、芯片、设备和上游供应链，台积电正全力以赴满足需求\n- 资本支出展望：未来数年资本支出将持续增长，台湾仍为主要生产基地，同时推进海外扩张\n- 定价策略：反映更高效的产出价值，同时与客户保持可持续合作关系，而非机会主义定价\n- 毛利率指引：56%+长期GM指引不变；N2结构性利润率将优于N3，N3利润率仍在改善中\n- 竞争格局：先进制程路线图和先进封装规模控制竞争风险；Intel是台积电前十大客户，合作继续\n- CoPoS进展：目前试产中，2-3年内准备就绪量产\n- 出售VIS股份：因产业布局考虑出售世界先进（VIS）股份，但技术合作关系不变\n- 股票回购/分割：目前不考虑股票分割或回购\n- R&D承诺：持续推进先进制程路线图，保持对三星、Intel乃至Terafab的竞争优势\n\n## 关联\n- [BofA资本支出报告（2026-05-17）](entries/台积电BofA-先进节点资本支出-Arizona盈利改善.md)\n- [BofA产能与技术爬坡（2026-05-15）](entries/台积电BofA-产能与技术爬坡-缓解竞争担忧.md)\n- [UBS五月销售额（2026-06-10）](entries/台积电UBS-5月营收4170亿-Q2稳步推进-目标价上调至3000.md)\n\n## 引用\n- [BofA - AGM update solid AI-centered demand](res/台积电/2026-06-04-2330.TW-BofA Global Research-Taiwan Semiconductor Manufacturing Co. AGM update solid AI...-122413976.undefined.pdf)", "n15": "# UBS快速解读：台积电4月营收NT$4,107亿——Q2开局符合预期\n\n## 摘要\nUBS在台积电4月营收数据发布后发布快评。4月营收NT$4,107亿（-1.1% MoM，+17.5% YoY），Q2累计营收完成UBSe预测的32.3%，QoQ增长约12%的预测在轨道上。N3强劲增长（新AI加速器）和N2更快爬坡将成为2026年主要增长动力。维持买入评级，目标价NT$2,650（21x 2027E PE）。股价NT$2,290（2026年5月8日）。\n\n## 关键要点\n- 4月营收NT$4,107亿（-1.1% MoM，+17.5% YoY），符合季节性模式\n- Q2追踪完成UBSe预测的32.3%，QoQ增长约12%的预测稳步推进\n- 2026年美元营收增长预测35%，受N3 AI加速器和N2更快爬坡驱动\n- 强大的云AI机会提升领先制程产能利用率、混合ASP和结构性毛利率\n- 维持买入评级，目标价NT$2,650（21x 2027E PE）\n- UBS EPS预测高于共识：2026E NT$97.98（vs 市场NT$96.59），2027E NT$126.05（vs NT$123.21）\n\n## 关联\n- [UBS五月销售额（2026-06-10）](entries/台积电UBS-5月营收4170亿-Q2稳步推进-目标价上调至3000.md)\n- [UBS US技术研讨会（2026-04-23）](entries/台积电UBS-US技术研讨会-A13-A12-N2U路线图与AI护城河.md)\n\n## 引用\n- [UBS - TSMC April Sales Fast Take](res/台积电/2026-05-08-2330.TW-UBS Equities-UBS Fast Take Taiwan Semiconductor Manufacturing _Apr sale...-121916347.pdf)\n- [UBS快速解读：台积电5月营收NT$4,170亿——Q2稳步推进，目标价上调至NT$3,000](entries/台积电UBS-5月营收4170亿-Q2稳步推进-目标价上调至3000.md) — 共享标签: N2, monthly-sales, tsmc; 同标的: N2, monthly-sales; 共同关键词(18): 2027e, 积电, bs, q2", "n16": "# UBS快速解读：台积电5月营收NT$4,170亿——Q2稳健增长，目标价上调至NT$3,000\n\n## 摘要\nUBS在台积电5月营收数据发布后发布快评。5月营收NT$4,170亿（+1.5% MoM，+30.1% YoY），Q2累计营收已完成UBSe预测的65%，QoQ增长约12%的预测仍在轨道上。UBS将2026年营收增长预测上调至36%（美元计），主要受AI加速器和CPU的N3强劲增长及N2更快爬坡驱动。值得注意的是，UBS将目标价从NT$2,650大幅上调至NT$3,000（基于23x 2027E PE），为所有覆盖报告中最高目标价，反映出对台积电增长前景的强烈信心。但UBS也指出H2毛利率可能从H1的66.8%降至65%，受N2爬坡和海外扩张的稀释影响。\n\n## 关键要点\n- 5月营收数据：NT$4,170亿（+1.5% MoM，+30.1% YoY），增速较4月的+17.5% YoY明显加快\n- Q2追踪进度：Q2累计营收已达UBS预估的65%，QoQ增长约12%的预测稳步推进\n- 2026年营收预测上调：预计2026年营收增长36%（美元计），较此前预测的35%小幅上调\n- H2毛利率压力：预计H2毛利率从H1的66.8%降至65%，因N2爬坡初期稀释和海外扩张成本\n- EPS预测上调：2026E EPS NT$98.86（此前NT$97.98），2027E EPS NT$130.54（此前NT$126.05）\n- 长期增长可见度扩展至2030年：首次加入2029-30E财务预测，2029E EPS NT$204.08，2030E EPS NT$243.45\n- 目标价大幅上调：从NT$2,650上调至NT$3,000（+13.2%），基于23x 2027E PE（此前21x），估值倍数扩张反映增长可见度提升\n- UBS vs 市场共识：2026E EPS NT$98.86 vs 市场NT$97.04；2027E EPS NT$130.54 vs 市场NT$124.04\n\n## 关联\n- [UBS四月销售额（2026-05-08）](entries/台积电UBS-4月营收4107亿-符合Q2预期.md)\n- [UBS US技术研讨会（2026-04-23）](entries/台积电UBS-US技术研讨会-A13-A12-N2U路线图与AI护城河.md)\n- [BofA AGM更新（2026-06-04）](entries/台积电BofA-股东大会AI需求与技术执行.md)\n\n## 引用\n- [UBS - TSMC May Sales Fast Take](res/台积电/2026-06-10-2330.TW-UBS Equities-UBS Fast Take Taiwan Semiconductor Manufacturing _May sale...-122508216.pdf)\n- [UBS快速解读：台积电4月营收NT$4,107亿——Q2开局符合预期](entries/台积电UBS-4月营收4107亿-符合Q2预期.md) — 共享标签: N2, monthly-sales, tsmc; 同标的: N2, monthly-sales; 共同关键词(18): 2027e, 积电, bs, q2", "n17": "# UBS：台积电US技术研讨会——通过技术堆栈扩展云AI护城河\n\n## 摘要\nUBS在台积电2026年北美技术研讨会后发布深度报告，维持买入评级与NT$2,650目标价（基于21x 2027E PE）。报告详细分析了台积电在先进制程、先进封装和硅光子领域的扩展路线图，强调其持续的技术领先地位。A13/A12作为A14系列的衍生节点引入，N2U作为N2平台的进一步演进，以及CoWoS扩展至14-reticle尺寸，均显示出台积电在AI时代的全面技术布局。UBS预计2026年营收达NT$5.21兆（+36.8% YoY），EPS NT$97.98（+47.9% YoY）。\n\n## 关键要点\n- A13节点：A14的衍生直接缩小版，面积节省6%，与A14设计规则完全兼容，客户可快速迁移，计划2029年量产\n- A12预览：A14的另一衍生节点，采用Super Power Rail背面供电技术，针对AI/HPC优化，计划2029年量产\n- N2U节点：N2新衍生版本，相比N2P速度提升3-4%或功耗降低8-10%，2028年量产，是成本/性能平衡方案\n- CoWoS扩展：14-reticle尺寸CoWoS，可集成约10个大型计算芯片和20个HBM堆栈，2028年量产，2029年扩展至14+ reticle\n- SoIC 3D堆叠：A14-to-A14 SoIC将于2029年量产，die-to-die IO密度相比N2-to-N2提高1.8倍\n- 硅光子COUPE：2026年达到关键量产里程碑，从CPO交换机开始\n- 财务预测：预计2026年营收NT$5.21兆（+36.8%），EBIT利润率57.2%，EPS NT$97.98\n- 高NA EUV：台积电路线图尚未采用高NA光刻，略落后于UBS对ASML的预期，但分析师认可台积电务实的技术升级策略\n\n## 关联\n- [BNP Paribas TSMC技术路线图（2026-04-24）](entries/台积电BNP-技术路线图-A13更新-重申Outperform.md)\n- [BofA产能与技术爬坡（2026-05-15）](entries/台积电BofA-产能与技术爬坡-缓解竞争担忧.md)\n\n## 引用\n- [UBS - TSMC US Tech Symposium](res/台积电/2026-04-23-2330.TW-UBS Equities-Taiwan Semiconductor Manufacturing _US Tech Symposium Scali...-121597085.pdf)\n- [BNP Paribas：台积电推出A13并更新技术路线图——重申Outperform](entries/台积电BNP-技术路线图-A13更新-重申Outperform.md) — 共享标签: A12, technology-roadmap, advanced-packaging; 同标的: A12, technology-roadmap; 共同关键词(11): 积电, 2026, 路线, to", "n18": "---\ntype: Analysis\ntitle: 宁波银行2026Q1：营收和利润重回双位数增长，Morgan Stanley维持Top Pick\ndescription: 宁波银行2026Q1营收+10.2% YoY，净利润+10.3% YoY，NIM环比回升5bps至1.73%，贷款+15.7% YoY持续市占率提升，资产质量稳定(NPL 0.76%)，MS目标价45元对应0.87x 2026E P/B\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/宁波银行/2026-04-26-002142.SZ-Morgan Stanley-Bank of Ningbo Co. Ltd 1Q26 Revenue, PPOP and profit growt...-121638787.undefined.pdf\nsource_type: pdf\ntags: [bank-of-ningbo, profit-trend, valuation, 2026-Q1]\n---\n\n# 宁波银行2026Q1：营收和利润重回双位数增长\n\n## 摘要\n宁波银行2026Q1营收和净利润重回双位数增长（+10.2%/+10.3% YoY），主要由NII强劲增长（+14.4% YoY）和手续费收入反弹（+81.7% YoY）驱动。NIM环比回升5bps至1.73%，贷款余额同比+15.7%，持续市占率提升（对公贷款+16.6% QoQ）。资产质量稳定，NPL比率持平于0.76%，拨备覆盖率369.4%。Morgan Stanley维持Overweight评级和Top Pick，目标价45元，当前估值0.87x 2026E P/B具吸引力。\n\n## 关键要点\n- 2026Q1营收同比+10.2%（vs 2025全年+8.0%），净利润同比+10.3%（vs 2025全年+8.1%），增速明显加速\n- NII同比+14.4%，NIM环比回升5bps至1.73%，受益于贷款收益率提升（对公贷款+16.6% QoQ，票据-12.1%）\n- 手续费收入同比+81.7%，由财富管理和资管业务驱动\n- 贷款同比+15.7%，存款同比+10.6%，均大幅高于行业均值（行业贷款+3.2% QoQ，存款+4.2% QoQ）\n- 资产质量稳定：NPL比率0.76%持平QoQ，关注类贷款比率-8bps至1.06%，逾期90天以上贷款比率-2bps至0.58%\n- MS目标价45元（+39%上行空间），当前估值0.87x 2026E P/B\n- 2026E/2027E EPS预测4.80/5.55元，ROE 14.3%/14.8%\n\n## 关联\n- [宁波银行UBS 1Q26快评：超预期+分红提升](entries/宁波银行UBS-1Q26快评.md) — UBS同样给出正面评价，补充分红率提升至27%的关键信息\n\n## 引用\n- [Morgan Stanley - Bank of Ningbo 1Q26 Update](res/宁波银行/2026-04-26-002142.SZ-Morgan Stanley-Bank of Ningbo Co. Ltd 1Q26 Revenue, PPOP and profit growt...-121638787.undefined.pdf)\n- [宁波银行UBS 1Q26快评：超预期+分红率大幅提升至27%](entries/宁波银行UBS-1Q26快评-超预期-分红率大幅提升至27.md) — 共享标签: valuation, profit-trend, bank-of-ningbo; 同标的: bank-of-ningbo; 共同关键词(15): 银行, bank, yoy, 2026\n- [福耀玻璃BofA 1Q26：EBIT超预期10%，ASP增长11%驱动](entries/福耀玻璃BofA-1Q26-EBIT超预期10-ASP增长11-驱动.md) — 共享标签: valuation, profit-trend, 2026-Q1; 共同关键词(10): yoy, 2026, pdf, 增长\n- [福耀玻璃BNP 1Q26：运营和利润率保持稳健，重申Outperform](entries/福耀玻璃BNP-1Q26-运营和利润率保持稳健-重申Outperform.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(9): 和利, yoy, or, 2026\n- [福耀玻璃MS 1Q26电话会：ASP超指引，市占率持续提升](entries/福耀玻璃MS-1Q26电话会-ASP超指引-市占率持续提升.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(8): yoy, 2026, pdf, 00\n- [福耀玻璃UBS 1Q26快评：毛利率超预期，剔除汇兑利润+10% YoY](entries/福耀玻璃UBS-1Q26快评-毛利率超预期-剔除汇兑利润-10-YoY.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(7): yoy, 2026, pdf, 利润\n- [福耀玻璃JPM 1Q26：管理层看好2Q26订单动能，ASP增长可持续](entries/福耀玻璃JPM-1Q26-管理层看好2Q26订单动能-ASP增长可持续.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(6): 2026, pdf, 增长, 00", "n19": "---\ntype: Analysis\ntitle: 宁波银行UBS 1Q26快评：超预期+分红率大幅提升至27%\ndescription: 宁波银行2026Q1营收/净利润+10.2%/+10.3%超预期，NIM环比+5bps至1.73%，手续费收入+81.7% YoY，2025年分红率从21.9%大幅提升至27.0%，股息率3.7%\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/宁波银行/2026-04-27-002142.SZ-UBS Equities-First Read Bank of Ningbo _Q126 a clean beat; sizable divid...-121640444.pdf\nsource_type: pdf\ntags: [bank-of-ningbo, profit-trend, valuation, 2026-Q1]\n---\n\n# 宁波银行UBS 1Q26快评：超预期+分红率大幅提升\n\n## 摘要\nUBS对宁波银行2026Q1给出\"clean beat\"评价。营收同比+10.2%（vs 2025全年+8.0%），净利润同比+10.3%（vs 2025全年+8.1%），均超预期。NIM环比回升5bps至1.73%，受益于存款成本持续下行（H225存款成本-42bps YoY）。手续费收入同比+81.7%，反映存款搬家背景下理财产品分销放量。资产质量稳定，NPL比率0.76%持平，年化不良生成率78bps。更值得关注的是2025年分红率从21.9%大幅提升至27.0%（DPS 1.2元），股息率3.7%，对股价形成正面催化。当前估值0.85x 2026E P/B。\n\n## 关键要点\n- 2026Q1营收+10.2% YoY，净利润+10.3% YoY，均超预期，增速较2025全年（+8.0%/+8.1%）明显加速\n- NIM 1.73%（环比+5bps/同比-7bps），资产收益率3.18%（环比-4bps/同比-48bps），存款成本持续快速下行\n- 手续费收入同比+81.7%，受益存款搬家至理财产品\n- PPOP同比+15.3%，营业费用同比-1.7%，成本管控良好\n- 贷款同比+15.7%（对公+29.9% YoY，零售-3.2% YoY），存款同比+2.9%（增速明显放缓）\n- 资产质量稳定：NPL 0.76%持平，拨备覆盖率369.4%，关注类贷款比率1.06%（-8bps QoQ）\n- 2025年分红率从21.9%大幅提升至27.0%（DPS 1.2元），股息率3.7%\n- UBS预测2026E/2027E EPS 4.78/5.38元，ROE 13.2%/13.5%\n\n## 关联\n- [宁波银行2026Q1：营收和利润重回双位数增长，Morgan Stanley维持Top Pick](entries/宁波银行2026Q1-营收和利润重回双位数增长-Morgan-Stanley维持Top-Pick.md) — MS同样给出正面评价，目标价45元更乐观\n\n## 引用\n- [UBS - Bank of Ningbo Q126 First Read](res/宁波银行/2026-04-27-002142.SZ-UBS Equities-First Read Bank of Ningbo _Q126 a clean beat; sizable divid...-121640444.pdf)\n- [福耀玻璃UBS 1Q26快评：毛利率超预期，剔除汇兑利润+10% YoY](entries/福耀玻璃UBS-1Q26快评-毛利率超预期-剔除汇兑利润-10-YoY.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(17): ubs, first, yoy, 2026\n- [福耀玻璃BofA 1Q26：EBIT超预期10%，ASP增长11%驱动](entries/福耀玻璃BofA-1Q26-EBIT超预期10-ASP增长11-驱动.md) — 共享标签: valuation, profit-trend, 2026-Q1; 共同关键词(12): yoy, beat, 2026, pdf\n- [福耀玻璃MS 1Q26电话会：ASP超指引，市占率持续提升](entries/福耀玻璃MS-1Q26电话会-ASP超指引-市占率持续提升.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(8): yoy, 2026, pdf, 00\n- [福耀玻璃BNP 1Q26：运营和利润率保持稳健，重申Outperform](entries/福耀玻璃BNP-1Q26-运营和利润率保持稳健-重申Outperform.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(7): yoy, 2026, pdf, 00\n- [腾讯控股UBS 1Q26：符合预期，低估值的期权价值](entries/腾讯控股UBS-1Q26-符合预期-低估值的期权价值.md) — 共享标签: profit-trend, valuation, 2026-Q1; 共同关键词(14): read, ub, 2026, 1q26", "n20": "---\ntype: Analysis\ntitle: 申万宏源腾讯深度之三：AI时代核心受益者，超级入口与生态壁垒的再进化\ndescription: 申万宏源 ，H股目标价HKD80（+27%），EPS预测小幅下调4%。\n\n## 关键要点\n- 汽车玻璃收入+6.9% YoY：量-3.7%/价+11%，ASP增长是核心驱动力\n- 国内汽车玻璃收入+3.2% YoY，海外收入+11.2% YoY（海外增速显著快于国内）\n- 毛利率37.4%（+2.0ppt YoY/+0.3ppt QoQ），超市场预期\n- 铝饰条业务（Fuyao SAM）亏损持续收窄，预计2026年盈亏平衡\n- BNP维持Outperform，A股目标价CNY80（+33%），H股目标价HKD80（+27%）\n- EPS预测下调4%（非实质性调整）\n- 估值基于DCF，关键风险：中国汽车销量超预期下滑、美国工厂爬坡延迟、能源/原材料成本上升\n\n## 关联\n- [福耀玻璃UBS 1Q26快评：毛利率超预期，剔除汇兑利润+10% YoY](entries/福耀玻璃UBS-1Q26快评-毛利率超预期-剔除汇兑利润+10%-YoY.md) — UBS补充汇兑损益影响和纯碱降价细节\n- [福耀玻璃MS 1Q26电话会：ASP超指引，市占率持续提升](entries/福耀玻璃MS-1Q26电话会-ASP超指引-市占率持续提升.md) — MS补充高附加值产品占比57.6%和2Q26展望\n\n## 引用\n- [BNP Paribas - Fuyao Glass 1Q26](res/福耀玻璃/2026-04-22-600660.SS-BNP Paribas-FUYAO GLASS - H  Operation and margin remain robust; reiter...-121560357.pdf)\n- [福耀玻璃BofA 1Q26：EBIT超预期10%，ASP增长11%驱动](entries/福耀玻璃BofA-1Q26-EBIT超预期10-ASP增长11-驱动.md) — 共享标签: profit-trend, 2026-Q1, fuyao-glass; 同标的: fuyao-glass; 共同关键词(17): 1q26, yoy, 2026, 耀玻\n- [福耀玻璃UBS 1Q26快评：毛利率超预期，剔除汇兑利润+10% YoY](entries/福耀玻璃UBS-1Q26快评-毛利率超预期-剔除汇兑利润-10-YoY.md) — 共享标签: profit-trend, competitive-advantage, 2026-Q1; 同标的: fuyao-glass; 共同关键词(15): yoy, 2026, 耀玻, 毛利率37\n- [福耀玻璃JPM 1Q26：管理层看好2Q26订单动能，ASP增长可持续](entries/福耀玻璃JPM-1Q26-管理层看好2Q26订单动能-ASP增长可持续.md) — 共享标签: profit-trend, competitive-advantage, 2026-Q1; 同标的: fuyao-glass; 共同关键词(12): 1q26, 2026, 耀玻, pdf\n- [宁波银行2026Q1：营收和利润重回双位数增长，Morgan Stanley维持Top Pick](entries/宁波银行2026Q1-营收和利润重回双位数增长-Morgan-Stanley维持Top-Pick.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(9): 和利, yoy, or, 2026\n- [宁波银行UBS 1Q26快评：超预期+分红率大幅提升至27%](entries/宁波银行UBS-1Q26快评-超预期-分红率大幅提升至27.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(7): yoy, 2026, pdf, 00", "n22": "---\ntype: Analysis\ntitle: 福耀玻璃BofA 1Q26：EBIT超预期10%，ASP增长11%驱动\ndescription: 福耀玻璃2026Q1营业利润+8% YoY超BofA预期10%，毛利率37.4%远超预测33.6%，ASP+11%抵消量-3.7%，BofA目标价HKD70/A股CNY67，2026E净利97亿\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/福耀玻璃/2026-04-22-600660.SS-BofA Global Research-Fuyao Glass (HA) 1Q26 EBIT beat on ASP growth  resilient ...-121574015.undefined.pdf\nsource_type: pdf\ntags \n## 关联\n- [腾讯控股JPM 1Q26：转向更积极，双P&L披露化解AI稀释担忧](entries/腾讯控股JPM-1Q26-转向更积极-双P-L披露化解AI稀释担忧.md) — JPM的深度分析，目标价690港元\n- [腾讯控股UBS 1Q26：符合预期，低估值的期权价值](entries/腾讯控股UBS-1Q26-符合预期-低估值的期权价值.md) — UBS认为当前估值低估了AI期权的价值\n\n## 引用\n- [腾讯控股-截至2026年3月31日止三个月业绩公布](res/腾讯控股/2026-05-13-腾讯控股-0700.HK-截至2026年3月31日止三个月业绩公布.pdf)", "n27": "---\ntype: Analysis\ntitle: 腾讯控股JPM 1Q26：转向更积极，双P&L披露化解AI稀释担忧\ndescription: JPMorgan在腾讯2026Q1后转向更积极，管理层首次披露双P&L：Non-IFRS OP ex-AI为844亿(+17%) vs 含AI的756亿(+9%)，将AI稀释从叙事担忧转化为可审计数据，目标价690港元\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/腾讯控股/2026-05-13-0700.HK-JPMorgan-Tencent (0700) First Take 1Q26 - two PLs under one ticker-122024510.pdf\nsource_type: pdf\ntags: [tencent, profit-trend, valuation, 2026-Q1]\n---\n\n# 腾讯控股JPM 1Q26：转向更积极，双P&L披露化解AI稀释担忧\n\n## 摘要\nJPMorgan在腾讯2026Q1业绩后发布深度分析，核心亮点是管理层首次正式披露\"双P&L\"：Non-IFRS经营利润扣除新AI产品后为844亿（+17% YoY），而含AI投入为756亿（+9% YoY）。这实质上将\"AI稀释盈利\"的熊方叙事从无法证实的担忧转化为有数据支撑的可审慎指标。广告收入+20%超预期，国内游戏+6%稳健。JPM维持Overweight，目标价690港元。另一份详细报告《Compounding core, bounded AI, trough multiple》进一步阐述核心业务持续增长、AI投入可控、估值处于历史低位的三重逻辑。\n\n## 关键要点\n- 管理层首次披露双P&L：ex-AI的Non-IFRS OP 844亿（+17%）vs 含AI的756亿（+9%），AI投入约88亿/季\n- 营收1965亿略低于JPM预期（-4%），但经营利润673.8亿超JPM预期（+5%）\n- 广告收入382亿（+20% YoY），超出预期（+1% vs JPMe）\n- 国内游戏454亿（+6% YoY），低于预期（-4%），但多款长青游戏流水创新高\n- 国际游戏188亿（+13% YoY），低于预期（-13%），预计后续季度加速\n- 金融科技599亿（+9% YoY），符合预期\n- 目标价690港元（基于SOTP），核心业务估值合理+AI期权价值\n- JPM认为腾讯估值处于历史低位（约13x Forward PE），下行风险有限\n\n## 关联\n- [腾讯控股2026Q1正式业绩：营收1965亿(+9%)，Non-IFRS净利+11%](entries/腾讯控股2026Q1正式业绩-营收1965亿-9-Non-IFRS净利-11.md) — 官方业绩数据\n- [腾讯控股UBS 1Q26：符合预期，低估值的期权价值](entries/腾讯控股UBS-1Q26-符合预期-低估值的期权价值.md) — UBS同样看好当前低估值\n\n## 引用\n- [JPMorgan - Tencent 1Q26 First Take](res/腾讯控股/2026-05-13-0700.HK-JPMorgan-Tencent (0700) First Take 1Q26 - two PLs under one ticker-122024510.pdf)\n- [JPMorgan - Tencent Compounding core](res/腾讯控股/2026-05-13-0700.HK-JPMorgan-Tencent (0700) Compounding core, bounded AI, trough multiple-122031596.pdf)\n- [华泰证券腾讯1Q26前瞻：AI布局和云业务迎来拐点，维持买入](entries/华泰证券腾讯1Q26前瞻-AI布局和云业务迎来拐点-维持买入.md) — 共享标签: tencent, 2026-Q1, profit-trend; 同标的: tencent; 共同关键词(8): q2, ai, pdf, 1q", "n28": "---\ntype: Analysis\ntitle: 腾讯控股UBS 1Q26：符合预期，低估值的期权价值\ndescription: UBS认为腾讯2026Q1业绩符合预期，核心业务盈利能力稳健(+17% ex-AI)，当前约13x Forward PE处于历史低位，AI期权价值未充分定价，目标价516港元\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/腾讯控股/2026-05-14-0700.HK-UBS Equities-First Read Tencent Holdings _1Q26 inline; undervalue option...-122029104.pdf\nsource_type: pdf\ntags: [tencent, valuation, profit-trend, 2026-Q1]\n---\n\n# 腾讯控股UBS 1Q26：符合预期，低估值的期权价值\n\n## 摘要\nUBS对腾讯2026Q1给出\"符合预期\"评价。非IFRS经营利润756亿（+9% YoY/环比+10%），略高于UBS预期750亿。分业务看，广告+20% YoY超预期，金融科技+9%符合预期，游戏国内+6%/国际+13%略低于预期。UBS认为当前核心业务估值约13x Forward PE处于历史低位，AI带来的增量价值未充分反映在股价中。维持Buy评级，目标价516港元（基于SOTP估值）。\n\n## 关键要点\n- Non-IFRS OP 756亿（+9% YoY/+10% QoQ），略超UBS预期750亿\n- 广告382亿（+20% YoY）为最大超预期亮点，视频号广告持续放量\n- 国内游戏454亿（+6% YoY）符合预期，王者荣耀/和平精英流水创新高\n- 国际游戏188亿（+13% YoY）低于预期，但Supercell表现强劲\n- 目标价516港元（基于SOTP），当前股价约460港元有约12%上行空间\n- 核心业务估值13x Forward PE，低于5年均值约18x\n- 腾讯AI投资（Hy3模型、WorkBuddy）尚未贡献显著收入，但提供期权价值\n- 视频号广告加载率仍远低于行业水平，长期变现空间大\n\n## 关联\n- [腾讯控股2026Q1正式业绩：营收1965亿(+9%)，Non-IFRS净利+11%](entries/腾讯控股2026Q1正式业绩-营收1965亿-9-Non-IFRS净利-11.md) — 官方业绩数据\n- [腾讯控股JPM 1Q26：转向更积极，双P&L披露化解AI稀释担忧](entries/腾讯控股JPM-1Q26-转向更积极-双P-L披露化解AI稀释担忧.md) — JPM更乐观的目标价690港元\n\n## 引用\n- [UBS - Tencent 1Q26 First Read](res/腾讯控股/2026-05-14-0700.HK-UBS Equities-First Read Tencent Holdings _1Q26 inline; undervalue option...-122029104.pdf)\n- [宁波银行UBS 1Q26快评：超预期+分红率大幅提升至27%](entries/宁波银行UBS-1Q26快评-超预期-分红率大幅提升至27.md) — 共享标签: profit-trend, valuation, 2026-Q1; 共同关键词(14): read, ub, 2026, 1q26"}, "types": ["Analysis"], "palette": {"Article": "#3b82f6", "Analysis": "#8b5cf6", "Synthesis": "#ec4899", "Reference": "#10b981", "Metric": "#f59e0b", "Playbook": "#ef4444", "Note": "#94a3b8"}, "stats": {"total_nodes": 29, "total_edges": 92, "orphans": 2}};</script>
<script>
const B = window.BUNDLE;
const connected = B.edges.length > 0;
const HAS_CYTOSCAPE = typeof cytoscape !== "undefined";
document.title = `知识图谱 — ${B.nodes.length} 节点`;

if (!HAS_CYTOSCAPE) {
  document.getElementById("graph").innerHTML =
    '<div class="graph-hint"><b>⚠ CDN 未加载</b><br><span style="font-size:12px">请切换到列表视图</span></div>';
  document.querySelector('[data-view="table"]').click();
}

// ── Indexes ──
const nodeIdx = {}; B.nodes.forEach(n => nodeIdx[n.data.id] = n.data);
const backlinks = {}; B.edges.forEach(e => {(backlinks[e.data.target]||=[]).push(e.data.source)});

// ── Type chips ──
const p = B.palette;
const types = B.types;
let activeType = null;

const chipRow = document.getElementById("type-chips");
// "全部" chip
chipRow.querySelector("[data-all]").addEventListener("click", ()=>{
  activeType = null;
  chipRow.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  chipRow.querySelector("[data-all]").classList.add("active");
  applyFilters();
});
types.forEach(t => {
  const ch = document.createElement("span");
  ch.className = "chip"; ch.textContent = t;
  ch.style.setProperty("--chip-color", p[t]||"#94a3b8");
  ch.addEventListener("click", () => {
    if (activeType === t) {
      activeType = null;
      chipRow.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      chipRow.querySelector("[data-all]").classList.add("active");
    } else {
      activeType = t;
      chipRow.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      ch.classList.add("active");
    }
    applyFilters();
  });
  chipRow.appendChild(ch);
});

// ── Layout (自适应：无边→grid，有边→cose) ──
const layoutSelect = document.getElementById("layout");
if (!connected) layoutSelect.value = "grid";

// cytoscape 不可用时提供空壳对象
const cy = HAS_CYTOSCAPE ? cytoscape({
  container: document.getElementById("graph"),
  elements: [...B.nodes, ...B.edges],
  style: [
    { selector:"node", style:{
      "background-color":"data(color)","label":"data(label)","color":"#0f172a",
      "font-size":9.5,"text-valign":"bottom","text-margin-y":3,"text-wrap":"wrap","text-max-width":100,
      "width":"data(size)","height":"data(size)","border-width":1,"border-color":"data(color)",
      "opacity":.92,"transition-property":"opacity","transition-duration":150,
    }},
    { selector:"node:selected", style:{"border-width":3,"border-color":"#f59e0b"} },
    { selector:"edge", style:{"width":1.5,"line-color":"#cbd5e1","target-arrow-color":"#cbd5e1","target-arrow-shape":"triangle","curve-style":"bezier","arrow-scale":.8} },
    { selector:".dim", style:{"opacity":.08} },
    { selector:".hidden", style:{"display":"none"} },
  ],
  layout: { name: connected?"cose":"grid", animate:false, padding:30, ...(connected?{}:{rows:Math.ceil(Math.sqrt(B.nodes.length))}) },
  wheelSensitivity: .2,
});

cy.on("tap","node",evt=>showDetail(evt.target.id()));
cy.on("tap",evt=>{if(evt.target===cy)clearSelection()});
}) : { // cytoscape 降级
  on(){}, elements(){return{unselect(){}}}, getElementById(){},
  nodes(){return{filter:()=>({length:0})}}, fit(){}, animate(){}, layout(){run(){}}, batch(fn){fn()}, zoom(){return 1}
};

// ── Search ──
let searchQ = "";
document.getElementById("search").addEventListener("input",e=>{
  searchQ = e.target.value.trim().toLowerCase();
  applyFilters();
});

// ── Layout ──
if (HAS_CYTOSCAPE) {
document.getElementById("layout").addEventListener("change",e=>{
  const name = e.target.value;
  const opts = { name, animate:false, padding:30 };
  if (name==="grid") opts.rows = Math.ceil(Math.sqrt(cy.nodes(":visible").length||1));
  cy.layout(opts).run();
});

document.getElementById("reset").addEventListener("click",()=>{cy.fit(null,30);clearSelection()});
}

// ── View toggle ──
document.querySelectorAll(".view-toggle button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".view-toggle button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const isGraph = btn.dataset.view === "graph";
    document.getElementById("graph").style.display = isGraph?"":"none";
    document.getElementById("table-view").classList.toggle("active",!isGraph);
    if (isGraph) { cy.resize(); cy.fit(null,30); }
  });
});

// ── Filters ──
function applyFilters(){
  if (!HAS_CYTOSCAPE) return;
  cy.batch(()=>{
    cy.nodes().forEach(n=>{
      const d = n.data();
      let visible = true;
      if (activeType && d.type !== activeType) visible = false;
      if (searchQ) {
        const hay = (d.label||"").toLowerCase()+" "+d.id+" "+(d.tags||[]).join(" ").toLowerCase();
        if (!hay.includes(searchQ)) visible = false;
      }
      n.toggleClass("dim",!visible).toggleClass("hidden", false);
    });
    cy.edges().forEach(e=>{
      e.toggleClass("dim",e.source().hasClass("dim")||e.target().hasClass("dim"));
    });
  });
  // 更新计数
  const v = cy.nodes(":visible").filter(n=>!n.hasClass("dim")).length;
  document.getElementById("filter-count").textContent = v===B.nodes.length?"":`${v}/${B.nodes.length}`;
}

// ── Detail ──
function clearSelection(){
  cy.elements().unselect();
  document.getElementById("detail-empty").style.display = "";
  document.getElementById("detail-content").style.display = "none";
}

function showDetail(nid){
  const d = nodeIdx[nid]; if(!d) return;
  cy.elements().unselect();
  const n = cy.getElementById(nid); if(n) n.select();

  document.getElementById("detail-empty").style.display = "none";
  const content = document.getElementById("detail-content");
  content.style.display = "";
  content.scrollTop = 0;

  const badge = document.getElementById("detail-type");
  badge.textContent = d.data.type; badge.style.background = d.data.color;

  document.getElementById("detail-title").textContent = d.data.label;
  document.getElementById("detail-description").textContent = d.data.description||"—";

  const resEl = document.getElementById("detail-resource");
  resEl.innerHTML = "";
  const resource = d.data.resource||"";
  const isUrl = /^https?:\/\//.test(resource);
  if (isUrl) {
    const a = document.createElement("a");
    a.href = resource; a.target = "_blank"; a.rel = "noopener";
    a.textContent = resource.length>80?resource.slice(0,77)+"...":resource;
    resEl.appendChild(a);
  } else { resEl.textContent = resource||"—"; }

  const tagsEl = document.getElementById("detail-tags");
  tagsEl.innerHTML = d.data.tags?.length
    ? d.data.tags.map(t=>`<span class="tag">${t}</span>`).join("") : "—";

  const bodyText = B.bodies[nid]||"";
  const bodyEl = document.getElementById("detail-body");
  bodyEl.innerHTML = renderMD(bodyText);

  const bl = backlinks[nid]||[];
  const blSec = document.getElementById("detail-backlinks");
  const blList = document.getElementById("backlinks-list");
  blList.innerHTML = "";
  if (bl.length) {
    blSec.hidden = false;
    bl.forEach(s=>{
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.textContent = nodeIdx[s]?.data?.label||s;
      a.addEventListener("click",()=>showDetail(s));
      li.appendChild(a);
      blList.appendChild(li);
    });
  } else { blSec.hidden = true; }

cy.animate({center:{eles:n},zoom:Math.max(cy.zoom(),1.0)},{duration:200});
}

// ── Table view ──
if (!connected) {
  document.getElementById("graph-hint").hidden = false;
}
// ── Legend ──
types.forEach(t=>{
  const c = p[t]||"#94a3b8";
  document.getElementById("legend").innerHTML += `<span class="legend-item"><span class="stats-dot" style="background:${c}"></span>${t}</span>`;
});

// ── Table ──
const tbody = document.getElementById("table-body");
B.nodes.forEach(n=>{
  const d = n.data;
  const tr = document.createElement("tr");
  tr.innerHTML = `<td class="title"><span class="type-badge" style="background:${d.color};font-size:10px;margin-right:6px">${d.type}</span>${d.label}</td><td class="desc">${d.description||""}</td>`;
  tr.addEventListener("click",()=>{
    document.querySelectorAll(".view-toggle button").forEach(b=>b.classList.remove("active"));
    document.querySelector('[data-view="graph"]').classList.add("active");
    document.getElementById("graph").style.display="";
    document.getElementById("table-view").classList.remove("active");
    showDetail(d.id);
  });
  tbody.appendChild(tr);
});

// ── 内置 Markdown 渲染（无 CDN 依赖） ──
function renderMD(text) {
  if (!text) return "";
  let html = text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // 代码块
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_,lang,code)=>
    `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`);
  // 行内代码
  html = html.replace(/`([^`]+)`/g,"<code>$1</code>");
  // 标题
  html = html.replace(/^#### (.+)$/gm,"<h4>$1</h4>");
  html = html.replace(/^### (.+)$/gm,"<h3>$1</h3>");
  html = html.replace(/^## (.+)$/gm,"<h2>$1</h2>");
  html = html.replace(/^# (.+)$/gm,"<h1>$1</h1>");
  // 粗体/斜体
  html = html.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  html = html.replace(/\*(.+?)\*/g,"<em>$1</em>");
  // 图片
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2">');
  // 链接
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  // 水平线
  html = html.replace(/^---$/gm,"<hr>");
  // 无序列表
  html = html.replace(/^[\*\-] (.+)$/gm,"<li>$1</li>");
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g,"<ul>$1</ul>");
  // 有序列表
  html = html.replace(/^\d+\. (.+)$/gm,"<li>$1</li>");
  // 引用
  html = html.replace(/^&gt; (.+)$/gm,"<blockquote>$1</blockquote>");
  // 段落（连续的纯文本行）
  html = html.replace(/\n\n+/g,"</p><p>");
  html = "<p>" + html + "</p>";
  // 清理空段落
  html = html.replace(/<p>\s*<\/p>/g,"");
  html = html.replace(/<p>(<(?:h[1-4]|ul|ol|pre|blockquote|hr|table)[\s\S]*?<\/\1>)<\/p>/g,"$1");
  return html;
}
