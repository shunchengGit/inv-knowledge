<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>知识图谱</title>
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"
  onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js'"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --accent:#3b82f6;--hover:#f1f5f9;--radius:8px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
}
body{
  font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  color:var(--text);background:var(--bg);display:flex;flex-direction:column;height:100vh;
}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
}
.brand{display:flex;align-items:baseline;gap:8px}
.brand strong{font-size:15px}
.brand .muted{font-size:12px;color:var(--muted)}
.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.controls input{width:180px;font-size:13px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;outline:none;transition:border-color .15s}
.controls input:focus{border-color:var(--accent)}
.controls button,.controls select{
  font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface);cursor:pointer;transition:all .15s;
}
.controls button:hover,.controls select:hover{background:var(--hover)}
.controls button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Chips */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{
  font-size:11px;padding:3px 10px;border-radius:12px;border:1.5px solid var(--border);
  background:var(--surface);cursor:pointer;transition:all .15s;user-select:none;
  display:inline-flex;align-items:center;gap:5px;
}
.chip::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--chip-color,#94a3b8)}
.chip:hover{background:var(--hover)}
.chip.active{color:#fff;border-color:transparent;background:var(--chip-color,#3b82f6)}
.chip.active::before{background:#fff}
.chip[data-all]::before{display:none}

/* ── Main ── */
main{display:flex;flex:1;min-height:0}
#graph-panel{flex:1 1 55%;display:flex;flex-direction:column;min-width:0;position:relative;background:var(--surface);border-right:1px solid var(--border)}
#graph{flex:1;position:relative}
#table-view{flex:1;overflow-y:auto;display:none;padding:0}
#table-view.active{display:block}
#detail{flex:0 0 45%;overflow-y:auto;padding:20px 24px;background:var(--surface)}
#detail-content{display:block!important}
#detail-content[hidden]{display:none!important}

.view-toggle{position:absolute;top:8px;right:8px;z-index:20;display:flex;gap:4px}
.view-toggle button{
  font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;
  background:var(--surface);cursor:pointer;
}
.view-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.graph-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;
  text-align:center;color:var(--muted);font-size:14px;pointer-events:none;
}
.graph-hint b{color:var(--text)}

/* ── Table ── */
.entry-table{width:100%;border-collapse:collapse;font-size:13px}
.entry-table thead{position:sticky;top:0;z-index:1;background:var(--surface)}
.entry-table th{
  text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);
  color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer
}
.entry-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.entry-table tr{cursor:pointer;transition:background .1s}
.entry-table tr:hover{background:var(--hover)}
.entry-table td.title{font-weight:500}
.entry-table td.type{font-size:11px}
.entry-table td.desc{color:var(--muted);font-size:12px;max-width:300px}

/* ── Detail ── */
#detail-empty{text-align:center;margin-top:80px}
.detail-header{margin-bottom:14px}
.detail-header h1{font-size:18px;margin:6px 0 4px;font-weight:600;line-height:1.3}
.type-badge{
  display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;
  font-size:11px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.5px;
}
dl.meta{display:grid;grid-template-columns:70px 1fr;gap:6px 12px;margin:10px 0 16px;font-size:13px}
dl.meta dt{color:var(--muted);font-weight:500}
dl.meta dd{word-break:break-all}
dl.meta a{color:var(--accent)}
.tag{display:inline-block;padding:1px 8px;margin:0 4px 4px 0;border-radius:4px;background:var(--hover);color:#475569;font-size:11px}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}

#detail-body{font-size:13px;line-height:1.7}
#detail-body h1{font-size:17px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
#detail-body h2{font-size:15px;margin:16px 0 8px}
#detail-body h3{font-size:13px;margin:12px 0 6px}
#detail-body p{margin:8px 0}
#detail-body code{background:var(--hover);padding:1px 5px;border-radius:3px;font-size:12px;font-family:ui-monospace,monospace}
#detail-body pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:var(--radius);overflow-x:auto;font-size:12px}
#detail-body pre code{background:transparent;color:inherit;padding:0}
#detail-body ul,#detail-body ol{padding-left:22px;margin:8px 0}
#detail-body li{margin:3px 0}
#detail-body table{border-collapse:collapse;margin:10px 0;font-size:12px}
#detail-body th,#detail-body td{border:1px solid var(--border);padding:5px 10px}
#detail-body blockquote{border-left:3px solid var(--border);margin:10px 0;padding:4px 14px;color:var(--muted)}
#detail-body img{max-width:100%;border-radius:var(--radius)}
#detail-body a{color:var(--accent)}

#detail-backlinks{margin-top:20px}
#detail-backlinks h2{font-size:13px;color:var(--muted);margin-bottom:8px}
#detail-backlinks ul{padding-left:18px}
#detail-backlinks li{margin:3px 0}
#detail-backlinks a{color:var(--accent);cursor:pointer}

/* Stats bar */
.stats-bar{
  position:absolute;bottom:10px;left:14px;right:14px;z-index:10;
  display:flex;gap:16px;font-size:11px;color:var(--muted);
  pointer-events:none;
}
.stats-bar span{display:inline-flex;align-items:center;gap:4px}
.stats-dot{width:6px;height:6px;border-radius:50%}
.legend{position:absolute;top:10px;left:14px;z-index:10;display:flex;gap:12px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.legend-item{display:inline-flex;align-items:center;gap:4px}

/* Connectivity badge */
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.badge-warn{background:#fef3c7;color:#92400e}
.badge-ok{background:#d1fae5;color:#065f46}
</style>
</head>
<body>
<header>
  <div class="brand">
    <strong>🧠 知识图谱</strong>
    <span class="muted">61 节点 · 40 关联</span>
    <span class="badge badge-ok" id="conn-badge">已关联</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="搜索..."><span class="muted" id="filter-count" style="width:50px"></span>
    <select id="layout">
      <option value="cose">力导向</option><option value="concentric">同心圆</option>
      <option value="breadthfirst">层级</option><option value="circle">环形</option><option value="grid">网格</option>
    </select>
    <button id="reset">↺</button>
  </div>
  <div class="chip-row" id="type-chips" style="flex-basis:100%;padding-top:4px">
    <span class="chip active" data-all style="font-weight:500">全部</span>
  </div>
</header>
<main>
  <section id="graph-panel">
    <div class="view-toggle">
      <button data-view="graph" class="active">◉ 图谱</button>
      <button data-view="table">☰ 列表</button>
    </div>
    <div id="graph">
      <div class="graph-hint" id="graph-hint" hidden>
        <b>🔗 暂无关联</b><br><span style="font-size:12px">导入时为条目添加交叉引用，图谱将显示关联连线</span>
      </div>
      <div class="legend" id="legend"></div>
    </div>
    <div id="table-view"><table class="entry-table"><thead><tr><th>条目</th><th>描述</th></tr></thead><tbody id="table-body"></tbody></table></div>
  </section>
  <section id="detail">
    <div id="detail-empty" class="muted">◀ 点击节点或列表项查看详情</div>
    <article id="detail-content">
      <header class="detail-header">
        <span class="type-badge" id="detail-type"></span>
        <h1 id="detail-title"></h1>
      </header>
      <dl class="meta">
        <dt>描述</dt><dd id="detail-description"></dd>
        <dt>来源</dt><dd id="detail-resource"></dd>
        <dt>标签</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>↩ 被引用</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

022年点亮、2023年量产，V2从点亮到量产周期明显压缩\n- 竞争格局：字节跳动四大芯片产品线（AI/CPU/DPU/VPU），快手凌川SL200面向视频直播（成本降40%）\n- 投资意义：自研芯片降本路径兑现，视频编解码是腾讯云+内容业务基础设施，带宽和算力成本有望持续下降\n## 关联\n- [腾讯控股投资者关系页面-2026年Q1财报与股价数据](腾讯控股投资者关系页面-2026年Q1财报与股价数据.md) — 腾讯整体业务与财务背景\n- [台积电核心竞争力深度分析](台积电核心竞争力深度分析.md) — 芯片产业链上下游：腾讯做IC设计 vs 台积电做制造", "n1": "# 福耀玻璃2026年一季报业绩分析\n\n## 摘要\n福耀玻璃2026年Q1营收104.13亿元（同比+5.08%），归母净利润17.12亿元（同比-15.68%）。利润下滑主因汇兑损益逆转：2025Q1汇兑收益2.4亿元，2026Q1汇兑亏损4.4亿元，单此一项影响盈利约6.8亿元。剔除汇兑影响后，主业经营基本平稳。\n\n## 关键数据\n- 营收：104.13亿元（+5.08%）\n- 归母净利润：17.12亿元（-15.68%）\n- 扣非净利润：16.43亿元（-17.32%）\n- 毛利率：37.38%\n- ROE：4.37%（同比-1.01pct）\n- 资产负债率：46.63%\n- 经营现金流：3.57亿元（-82.22%）\n- 摊薄每股收益：0.66元（-15.38%）\n\n## 关键要点\n- 汇兑损益是Q1利润下滑主因：人民币对欧元升值3%导致汇兑亏损4.4亿元\n- 汽车玻璃销量下滑3.7%，但单价提升约11%\n- 经营现金流大幅下降82%，需关注后续季度改善情况\n- 全年展望：若汇率稳定，全年盈利可能中个位数下降\n\n## 关联\n- [福耀玻璃2026年Q1汇兑风险深度分析](investing/福耀玻璃2026年Q1汇兑风险深度分析.md)\n- [福耀玻璃2026年Q1汇兑风险深度分析](entries/福耀玻璃2026年Q1汇兑风险深度分析.md) — 共享标签: valuation, quarterly-report, 2026-Q1; 共同关键词(10): 玻璃, 26, 20, 璃2, 耀玻", "n2": "## 摘要\nASML 2026年High-NA EUV光刻机持续推进，5份外资研报（BofA×2/BNP×1/UBS×1/JPMorgan×1）一致看好其垄断地位。High-NA导入节奏虽有微调但不改长期增长逻辑，memory客户需求为额外催化剂。\n\n## 关键要点\n- High-NA：BofA认为\"re-times, not reset\"（节奏调整非重置），长期增长逻辑不变\n- BNP：A Tale of Two Apertures — 低NA+高NA双轨并行\n- UBS：Why ASML Is Our Top Pick — 三大驱动因素\n- 风险：地缘政治出口管制、客户CapEx周期、High-NA良率爬坡", "n3": "---\ntype: Article\ntitle: BNP Paribas — SK海力士 1Q26业绩点评：AI内存领导力增强，目标价上调至₩2,000,000\ndescription: BNP维持SK海力士Outperform，目标价从₩1,590,000上调至₩2,000,000（基于3x 2027E BVPS），1Q26营收₩52.6万亿创历史新高，OP₩37.6万亿接近翻倍\ntimestamp: 2026-04-23T00:00:00+08:00\nresource: res/SK海力士/2026-04-23-000660.KS-BNP Paribas-SK HYNIX (+)  Enhanced AI memory leadership; less concern o...-121592694.pdf\nsource_type: pdf\ntags: [sk-hynix, valuation, profit-trend, semiconductor, 2026-Q1]\n---\n\n# BNP Paribas — SK海力士1Q26业绩点评\n\n## 摘要\nBNP维持SK海力士Outperform评级，目标价从159万韩元大幅上调至200万韩元（基于3x 2027E BVPS，ROE 44%，COE 14.7%）。1Q26营收52.6万亿韩元创历史新高（+198% y-y），OP 37.6万亿接近翻倍（+405% y-y），OPM升至72%。DRAM/NAND ASP分别上涨mid-60%和mid-70%。管理层强调内存正从简单存储组件转型为AI核心计算支柱，HBM以外需求已扩展至高密度服务器模组和企业级SSD。上调2026/2027/2028 EPS预测56%/25%/14%，主要因ASP假设大幅上调。\n\n## 关键要点\n- TP ₩2,000,000 → 较当时股价₩1,226,000有63%上行空间\n- 净现金35万亿韩元，负债率降至12%，目标100万亿净现金后考虑回购\n- 龙仁集群一期洁净室提前3个月至2027年2月\n- ADR上市文件已提交SEC，目标2026年内完成\n- 关键材料（氦/溴/钨）供应商已多元化，地缘政治风险可控\n- 2026E营收281万亿（+268% y-y），OP 280万亿（+492% y-y）\n- PC和手机市场因成本压力疲软，但服务器需求强劲足以抵消\n\n## 关联\n- [Nomura SK海力士1Q26业绩点评](entries/Nomura-SK海力士-1Q26业绩点评-Beat-目标价₩2340000.md) — 同为1Q26业绩点评，Nomura更乐观\n- [HSBC SK海力士1Q26业绩点评](entries/HSBC-SK海力士-1Q26业绩点评-服务器需求超预期.md) — 同为1Q26点评，HSBC聚焦CSP资本开支\n\n## 引用\n- [BNP Paribas: SK Hynix - Enhanced AI memory leadership](res/SK海力士/2026-04-23-000660.KS-BNP Paribas-SK HYNIX (+)  Enhanced AI memory leadership; less concern o...-121592694.pdf)", "n4": "---\ntype: Article\ntitle: BofA \"Future Car\" Review #78 — BYD Datang D-class seven-seater flagship SUV\ndescription: 美银第78期\"未来汽车\"评测：比亚迪大唐D级7座旗舰纯电SUV正式上市，售价23.99-30.99万元，对比竞品（零跑D19、领克900、乐道L80、银河M9、小鹏GX）在空间/动力/性价比维度领先\ntimestamp: 2026-06-18T00:00:00+08:00\nresource: res/行业研究-汽车/BofA-Greater-China-EV-Future-Car-2026-06-18.pdf\nsource_type: pdf\ntags: [byd, 行业研究-汽车, competitive-advantage, product-comparison, 2026-06]\n---\n\n# BofA \"Future Car\" Review #78 — BYD Datang D-class seven-seater flagship SUV\n\n## 摘要\n2026年6月17日，比亚迪正式发布大唐（Datang），一款D级旗舰7座纯电SUV，售价23.99-30.99万元（较预售25-32万低1万）。大唐搭载第二代刀片电池、1000V高压架构、兆瓦级闪充（10C充电倍率），续航最高950km，零百加速3.9秒。配备天神之眼B 5.0智驾系统（1颗激光雷达+32传感器）和DiLink 300智能座舱。据管理层披露，自4月24日预售以来已获超15万台可退订订单。美银认为大唐在空间、动力总成和性价比方面优于同级别竞品。\n\n## 关键要点\n- 定价竞争力：23.99-30.99万，较预售降1万，处于大型SUV中低价位段\n- 技术亮点：第二代刀片电池、1000V高压、10C兆瓦闪充、CLTC续航950km\n- 智驾配置：天神之眼B 5.0 + 1颗激光雷达 + 32传感器（同级标配水平）\n- 订单数据：预售超15万台（可退订），显示强劲初期需求\n- 竞品对比：大唐在轴距(3130mm)、功率(585kW)、续航(950km)维度领先零跑D19/领克900/乐道L80/银河M9/小鹏GX\n- 大型SUV月度销量参考：乐道L80 5M26月均4,946辆、银河M9 2,882辆、零跑D19 EV 1,376辆\n\n## 关联\n- 暂无关联条目（知识库首条汽车行业研报）\n\n## 引用\n- [BofA Global Research - Greater China EV and EV battery: China \"Future Car\" Review #78](res/行业研究-汽车/BofA-Greater-China-EV-Future-Car-2026-06-18.pdf)", "n5": "---\ntype: Note\ntitle: BofA邀请CRIC林波——端午后中国地产实地考察电话会议（2026-06-22）\ndescription: 美银邀请克而瑞研究中心副总经理林波主持电话会议，讨论端午后中国房地产市场实地考察及6月下旬新盘推盘高峰\ntimestamp: 2026-06-18T00:00:00+08:00\nresource: res/行业研究-房地产/BofA-China-Property-Conference-Call-2026-06-22.pdf\nsource_type: pdf\ntags: [行业研究-房地产, sentiment, 2026-06]\n---\n\n# BofA China Property Conference Call — 端午后实地考察\n\n## 摘要\n美银于2026年6月18日发出邀请，6月22日下午4点（北京时间）举办中国房地产市场电话会议。嘉宾为克而瑞信息集团研究中心副总经理林波，主持人为美银地产研究团队Karl Choi/Eric Du。会议主题为端午后地产实地考察及6月下旬新盘推盘高峰。会议采用中文进行。\n\n## 关键要点\n- 嘉宾：克而瑞（CRIC）研究中心副总林波——一手市场数据源\n- 时间节点：6月下旬是传统新盘集中推盘的高峰期\n- 美银主持人：Karl Choi（地产股权研究）、Eric Du（地产股权研究）、Sirius Chan（信用研究）\n- 会后可回放\n\n## 关联\n- 暂无（首个地产行业条目）\n\n## 引用\n- [BofA Conference Call Invitation: China property physical market ground check post Dragon Boat Festival](res/行业研究-房地产/BofA-China-Property-Conference-Call-2026-06-22.pdf)", "n6": "---\ntype: Article\ntitle: HSBC — SK海力士1Q26业绩点评：服务器需求超预期，维持Buy目标₩1,800,000\ndescription: HSBC维持SK海力士Buy评级和180万韩元目标价，1Q26 OP 37.6万亿低于HSBC乐观预期10%（因奖金计提），但强调推理/AI Agent驱动KV缓存需求激增，CSP服务费涨价支撑资本开支\ntimestamp: 2026-04-23T00:00:00+08:00\nresource: res/SK海力士/2026-04-23-000660.KS-HSBC Global Investme-SK Hynix (000660 KP) Buy Sequential earnings expansion set ...-121603390.pdf\nsource_type: pdf\ntags: [sk-hynix, profit-trend, semiconductor, sentiment, 2026-Q1]\n---\n\n# HSBC — SK海力士1Q26业绩点评\n\n## 摘要\nHSBC维持SK海力士Buy评级，目标价180万韩元。1Q26 OP 37.6万亿（+405% y-y）低于HSBC预期10%，主因高于预期的年度奖金计提和NAND出货量下降。HSBC认为市场过度担忧软件压缩和SRAM LPU——效率提升降低单token成本反而会驱动AI使用量增长。提出1990-95年办公室自动化引发的6年DRAM短缺类比，认为当前AI驱动的内存超级周期处于中段。预计2Q26 OP再创新高至57万亿（+52% q-q），2026全年OP 235万亿。\n\n## 关键要点\n- DRAM ASP q-q涨65%（HSBC原预期56%），主要由服务器DRAM驱动\n- 推理和Agent AI产生超预期KV缓存需求，CSP正在堆积通用服务器\n- Vera CPU每台DRAM含量从0.6TB升至1.5TB，SO-CAMM2占2026年DRAM需求6%\n- HBM3e与commodity DRAM利润率差距扩大，海力士将提高新HBM3e价格\n- 2026E EPS 257,077韩元（+312% y-y），2027E ROE 60%\n- CAPEX 2026E 60万亿（+119% y-y），较指导显著增长\n\n## 关联\n- [BNP SK海力士1Q26业绩点评](entries/BNP-Paribas-SK海力士-1Q26业绩点评-AI内存领导力增强-目标价₩2000000.md) — 同为1Q26点评，BNP上调TP更多\n- [Nomura SK海力士1Q26业绩点评](entries/Nomura-SK海力士-1Q26业绩点评-Beat-目标价₩2340000.md) — HSBC对内存超级周期的类比视角独特\n\n## 引用\n- [HSBC: SK Hynix - Sequential earnings expansion set to continue](res/SK海力士/2026-04-23-000660.KS-HSBC Global Investme-SK Hynix (000660 KP) Buy Sequential earnings expansion set ...-121603390.pdf)", "n7": "---\ntype: Synthesis\ntitle: JPMorgan: 中国外卖行业 — 即时配送监管新规影响分析\ndescription: JPMorgan 2026年6月研报，分析中国外卖行业即时配送监管新规对美团、饿了么等平台的潜在影响\ntimestamp: 2026-06-23T00:00:00+08:00\nresource: res/pdfs/行业研究-互联网/\nsource_type: pdf\ntags: [meituan, food-delivery, regulation, industry-policy, 2026-06]\n---\n\n# JPMorgan: 中国外卖行业 — 即时配送监管新规影响分析\n\n## 摘要\nJPMorgan 2026年6月研报，分析中国外卖行业即时配送监管新规对美团、饿了么等平台的潜在影响\n\n## 研报原文提取\n### 2026-04-20-JPMorgan-China Internet What the Market May Be Missing on SAMR’s Ghos...-121484311.pdf\npages=14 timeliness=fresh\n\n--- page 1 ---\nwww.jpmorganmarkets.com\nAsia Pacific Equity Research\n20 April 2026\nChina Internet\n \nWhat the Market May Be Missing on SAMR’s Ghost-\nRestaurant Crackdown\n \nHead of China Equity Research \nand Co-Head of Asia TMT \nResearch\nAlex Yao AC\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSAC Registration Number: S1730523020001\nAndre Chang, CFA\n(86-21) 6106 6362\nandre.ch.chang@jpmorgan.com\nSAC Registration Number: S1730520080002\nNancy Liu\n(86 21) 6106 6343\nnancy.liu@jpmorgan.com\nSAC Registration Number: S1730524090001\nJ.P. Morgan Securities (China) Company \nLimited\nSee page 9 for analyst certification and important disclosures, including non-US analyst disclosures.\nWe believe the market may misread SAMR’s 17 April ghost-restaurant ruling \nas another turn tighter in China Internet regulation and a simple EPS \nheadwind for food delivery platforms. Our view is more constructive and \nmore differentiated by stock. The direct fine is manageable and the \noperational remedy is narrow. The more important effect is economic: the \nruling removes a pool of non-compliant, low-AOV, structurally loss-making \norders, which should improve industry order quality and support higher AOV, \nrevenue, and operating profit per order. On that basis, we see JD as the \nclearest positive read-through, Alibaba constructive via narrative de-risking, \nMeituan largely priced in, and PDD incrementally negative.\n• What the market may be missing is that the affected volume is not high-\nquality demand. Ghost restaurants were concentrated in delayed-delivery \ncake orders and skewed to low-ticket baskets that added volume but diluted \nunit economics. In our framework, removing that volume should reduce \ntotal orders modestly but improve the mix of orders that remain. That is \nwhy we read the ruling as supportive for industry profitability rather than as \na broad demand shock. We also think the action matters beyond the one-off \nfine because it increases the probability of a more rational operating \nbackdrop, even without assuming an explicit policy-led end to the subsidy \nwar.\n• The stock call therefore depends on what is already in numbers. For \nAlibaba, our model already embeds substantial food delivery and quick \ncommerce loss narrowing, so the main benefit is lower narrative risk rather \nthan incremental EPS upside versus consensus. For Meituan, the 2027 food \ndelivery profit flip is already in our model and, we believe, largely in \nconsensus. JD stands out because expectations remain low: our 2026E group \nearnings sit above consensus while our new initiatives loss path still assumes \nessentially no narrowing. Against that backdrop, even modest cost savings \nfrom cleaner order mix and potential subsidy rationalization matter more for \nthe stock. PDD is the exception: the fine is absorbable, but the one-store-\none-penalty precedent adds a tail-risk overlay that we do not think the \nmarket fully prices.\n• The main risks include: our thesis would weaken if ghost-restaurant \nexposure is smaller than we assume, if attrition of non-compliant low-AOV \norders proves limited, or if platforms replace removed volume with equally \nuneconomic subsidized demand. The Alibaba de-risking mechanism also \ndepends on management’s next public framing; if management reiterates \naggressive investment without clearer discipline, the narrative benefit could \nfade. More broadly, if SAMR treats this as a one-off food-safety case rather \nthan part of a wider push toward better order quality and more rational \ncompetition, the valuation read-through is likely to be more muted.\n--- page 2 ---\n2\nAsia Pacific Equity Research\n20 April 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nBottom line\nThe investment question is not whether the RMB3.6bn aggregate fine \nmatters to 2026 EPS. It is whether the 17 April SAMR ruling changes \nearnings expectations, valuation, or near-term positioning across the sector. \nWe think the stock-relevant content lies in the interaction between what the \nruling enables and what the market already discounts. On that basis, we \nrank the impact across our coverage as JD > Alibaba > Meituan, with \nPDD incrementally negative because of both the fine and the precedent \nset by the one-store-one-penalty template. In form, this is a one-time fine \nwith narrow operational remedies. In economic substance, it improves \nindustry order quality, narrows Alibaba’s credibility gap around a loss path \nthat we believe is already in the stock, and establishes a reusable \nenforcement mechanism that raises tail risk at PDD.\nJD is the clearest actionable expression of the ruling. On our estimates, the \norder-quality cleanup adds RMB0.7bn-1.6bn of annual run-rate cost \nsavings as structurally loss-making sub-RMB30 orders exit the platforms. \nThat more than covers roughly RMB300mn of recurring compliance cost \nand absorbs the RMB635mn fine within a single annual run-rate. More \nimportantly, this positive increment sits on top of a pre-existing \nexpectations gap: our 2026E group adjusted net income estimate is double-\ndigit percentage above consensus, while our new initiatives loss forecast of \nRMB46bn in 2025 and RMB45bn in 2026 still assumes essentially no \nnarrowing and is consistent with where consensus sits. That is why we \nview JD as the cleanest single-stock way to express the ruling.\nAlibaba is constructive, but the mechanism is narrative de-risking rather \nthan incremental P&L upside versus consensus. Our food delivery and \nquick commerce loss forecasts of RMB88bn in FY26, RMB47bn in FY27, \nRMB23bn in FY28, and profitability in FY29 already imply an aggressive \nnarrowing path. We believe the market broadly discounts a similar \ntrajectory. The ruling does not, in our view, push P&L materially beyond \nthat path. What it does is reduce the risk that management’s public \nlanguage on aggressive investment leads investors to question whether the \nnarrowing path will be followed. We see scope for a 5-10% equity re-\nrating over a three- to six-month horizon via multiple, contingent on \nmanagement’s next public framing shifting toward discipline, quality-led \ngrowth, and sustainable unit economics. We no longer view a 20% P&L-\ndriven upside framing as defensible against the loss baseline currently in \nthe market.\nMeituan looks different. Our model already embeds a 2027 food delivery \nprofit flip from a RMB19bn loss in 2026 to a RMB16bn profit in 2027, and \nwe believe consensus broadly captures the same transition. The ruling \nmodestly de-risks that path through better order mix, but it neither raises \nnor lowers the ceiling in a meaningful way. PDD is the main incremental \nnegative. The RMB1.52bn fine is the largest single-group tranche at 42% \nof the aggregate, and, more importantly, the one-store-one-penalty \ntemplate is now a demonstrated regulatory tool that could be reused\n--- page 3 ---\n3\nAsia Pacific  Equity Research\n20 April 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nwherever platform merchant-vetting duties are the operative legal hook. \nWe do not think that tail risk is priced in.\nNear term, we expect first-wave sell-side reactions within 48 hours to skew \nneutral to slightly negative and to focus on a generic regulatory overhang \nand the one-off EPS hit. We think that is likely to miss the stock-relevant \nmechanism. Our base case remains that the asymmetric opportunity \nwindow is two to six weeks. The key dates are Meituan, JD and Alibaba’s \n1Q26 disclosure and any follow-on SAMR action over the next 60-90 days. \nThe key risk to the Alibaba de-risking mechanism is straightforward: if \nmanagement reiterates aggressive continued investment without discipline \nqualifiers, the narrative benefit weakens materially.\nConsensus revision map and positioning\nWe expect the first wave of research within 48 hours to skew neutral to \nslightly negative and to focus on a generic regulatory overhang and the \nmechanical EPS hit from the fine. We think that could miss the key point. \nThe fine itself is not large enough to change group earnings paths in a \nmaterial way. The more important read-through is where the ruling \nintersects with what is already priced: little incremental P&L at Alibaba \nbeyond the loss path already in the stock, modest de-risking of Meituan’s \n2027 flip, a positive incremental on top of an existing earnings gap at JD, \nand a new tail-risk overlay at PDD.\nThat leaves the positioning flow uneven. JD is the cleanest positive \nbecause the ruling adds to a pre-existing out-of-consensus earnings view. \nAlibaba is constructive, but via multiple rather than EPS, and the key \nobservable is management’s next public framing. Meituan should see \nlimited revision because the 2027 flip is already widely modeled, and we \nwould discourage chasing a post-event Meituan call on the view that the \nruling resets medium-term earnings power. PDD is where we would expect \nthe market to underappreciate the tail risk embedded in the stacking \ntemplate. Our base case remains that the best asymmetric window is two to \nsix weeks, not a same-day EPS revision trade.\nThe 17 April ruling: what happened and why it matters\nWhat happened: Per SAMR’s April 17, 2026 public statement, the \nregulator imposed administrative penalties on PDD, Meituan, JD, Ele.me \n(now Taobao Flash Buy), Douyin, Taobao and Tmall in a series of “ghost \nrestaurant” cases, saying the platforms had failed to properly verify food \nmerchants’ licenses and had not taken necessary action against order-\ntransfer arrangements that harmed consumers. SAMR ordered the seven \nplatforms to rectify the violations, suspend new cake-shop onboarding for \nthree to nine months, and pay a combined RMB3.597bn in fines and \nconfiscations; it also said the platforms had already taken down the\n--- page 4 ---\n4\nAsia Pacific Equity Research\n20 April 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nunaudited “ghost stores” and stopped cooperating with the relevant \ntransfer-order platforms after the investigation began.\nThe case matters because the economic substance is easy to miss if it is \nframed only as a generic food-safety action. The enforcement path began \nwith a single consumer complaint in July 2025. A Beijing resident ordered \na cake from a storefront called Tianyan Qingshu on a food delivery app, \nreceived a cake decorated with inedible and potentially toxic fresh roses, \nand filed a complaint. The local SAMR office could not find the store at its \nregistered address, could not verify the uploaded food business license \nagainst the government database, and found that the listed supervising \nofficer did not exist. The investigation then established that all 378 chain \nlocations trading under the same brand name used forged licenses and \noperated without physical kitchens.\nSAMR’s subsequent test-buy showed that the order had in fact been \nfulfilled by a different licensed bakery. The ghost storefront routed the \norder through Zhuandan Bao, a third-party order-transfer platform that \noperates a reverse auction, and the bakery fulfilled the order at the winning \nbid. That workflow, rather than a simple food-quality lapse, is the core of \nthe case.\nTable 1: Ghost-storefront order economics\nParticipant\nReceives (RMB)\nShare of consumer spend\nRole\nConsumer\n252.4\n100.0% outflow\nPays full price\nPlatform\n50.4\n20.0%\nService fee\nGhost restaurant\n122.0\n48.3%\nPure intermediation; no kitchen, no production\nZhuandan Bao\n3.2\n1.3%\nOrder-transfer fee\nLicensed bakery\n76.8\n30.4%\nActual producer; arranges delivery\nSource: J.P. Morgan estimates.\nWe think three features of this structure explain the severity of the \nresponse. First, the ghost storefront captured 48% of consumer spend for \nno production or delivery role, which supports SAMR’s view that this was \na compliance-failure ecosystem rather than a pricing issue. Second, the \nactual producer was invisible to both the consumer and the platform’s \ncompliance architecture, breaking the food-safety accountability chain that \nArticle 62 of the Food Safety Law is designed to preserve. Third, Article \n18 of the Administrative Measures on Online Catering Service Food Safety \nexplicitly prohibits order subcontracting by online food-service providers, \nwhich makes the transfer platforms, in the regulator’s framing, a \nmechanism to evade the law rather than a neutral intermediary.\nScale is what turned a statutory cap into a sector-level penalty event. \nSAMR identified 67,604 ghost storefronts across seven platforms and \nmore than 3.6mn transferred cake orders, including 1.2mn+ through \nZhuandan Bao and 2.4mn+ through Anhui Xunmeng, which we \nunderstand is PDD-affiliated. We think that, together with SAMR’s public \nreference to “violent and soft resistance to enforcement” during the \ninvestigation phase, helps explain why PDD absorbed RMB1.52bn, or \n42% of the aggregate fine.\n--- page 5 ---\n5\nAsia Pacific  Equity Research\n20 April 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nAn important boundary condition is that the action is confined to cake. \nCake is the only food-delivery sub-category in which consumers routinely \naccept scheduled rather than real-time delivery, which is what makes \nreverse-auction subcontracting operationally feasible. That is why the \nthree- to nine-month onboarding freeze applies only to cake shops. We \ntherefore do not view the ruling as a template for broad category-level \nvolume disruption.\nFrom direct fine to stock impact: four layers\nLayer 1: direct P&L impact\nTable 2: Fines’ direct impact on P&L  \nGroup\nPlatform entity fined\nFine (RMB \nmn)\n2026E adj. NI \n(RMB bn)\nFine as % of \nadj. NI\nRead\nPinduoduo\nShanghai Xunmeng\n1,522\n116.3\n1.31%\nLargest single-group tranche; not in consensus; \nincremental negative\nMeituan\nBeijing Sankuai\n746\n(12.0)\nn/m\nDeepens projected 2026 adj. NI loss by ~6.2%; dominated \nby order-quality channel\nAlibaba\nShanghai Lazhasi 558 + Taobao \n47 + Tmall 32\n637\n133.8 (FY2027E)\n0.48%\nImmaterial on P&L; relevance is strategic-posture channel, \nnot fine\nJD\nBeijing Jingdong\n635\n35.1\n1.81%\nHighest gross % impact; absorbed in one year by order-\nquality cost saving\nDouyin \n(unlisted)\nBeijing Douyin\n57\nn/a\nn/a\nSignaling, not financial\nTotal\n3,597\nSource: J.P. Morgan estimates.\nThree points matter. First, PDD’s 42% share of the aggregate fine is the \nkey signal. The cash cost is absorbable; the precedent is not. Second, JD \nhas the highest gross fine-to-NI ratio at 1.81%, but this is a one-time item \nand, on our estimates, the Layer 3 benefit absorbs it within one annual run-\nrate. Third, Alibaba’s RMB637mn across three legal entities is the smallest \nfine among the food-delivery incumbents, which is directionally consistent \nwith our “permission slip” framing: Alibaba is penalized, but not in a way \nthat changes the economic ceiling of the loss-narrowing path already \nembedded in the stock.\nLayer 2: compliance floor\nWe estimate the compliance cost increment at RMB200mn-400mn per \nyear in run-rate cost at Meituan and at a similar level at Alibaba, with \nsmaller absolute increments but a higher cost-base ratio at JD, at roughly \nRMB300mn, and at PDD. The gross burden is asymmetric toward sub-\nscale operators. Even so, we do not think the gross compliance cost is the \ndominant P&L channel for any of the four listed names. The order-quality \ncleanup channel in Layer 3 exceeds the compliance-cost channel across all \nfour names, which is why we read the ruling as net positive for industry \nunit economics despite the higher compliance floor.\nLayer 3: order quality, not volume, is the key earnings channel\nOur framework starts with unit economics. In our Meituan deep-dive report \npublished on 9 April (link), we estimated a delivery cost floor of \napproximately RMB6.3 per order, comprising rider cost of RMB5.0-5.3\n\n### 2026-04-23-JPMorgan-China Internet Post 4Q25 Re-evaluating the Sector; Tencent ...-121601321.pdf\npages=12 timeliness=fresh\n\n--- page 1 ---\nwww.jpmorganmarkets.com\nAsia Pacific Equity Research\n23 April 2026\nChina Internet\n \nPost 4Q25: Re-evaluating the Sector; Tencent Our \nTop Pick\n \nHead of China Equity Research \nand Co-Head of Asia TMT \nResearch\nAlex Yao AC\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSAC Registration Number: S1730523020001\nDaniel Chen\n(86-21) 6106 6205\ndaniel.q.chen@jpmorgan.com\nSAC Registration Number: S1730521040001\nNancy Liu\n(86 21) 6106 6343\nnancy.liu@jpmorgan.com\nSAC Registration Number: S1730524090001\nJ.P. Morgan Securities (China) Company \nLimited\nSee page 7 for analyst certification and important disclosures, including non-US analyst disclosures.\nThe six weeks since Tencent's 4Q25 print have seen a repricing of China internet \nnames along a different axis than the AI-narrative rally that carried the sector into \nlate January. Earnings revisions now dominate share price direction, AI capex is \npenalized rather than rewarded, and buy-side conversations have converged on a \n\"real multiple plus earnings floor plus dated catalyst\" framework for sizing \npositions. Against that tape, we refresh our sector view and rank Tencent as our \ntop pick. Sector top picks: Tencent, JD, Trip.com, Baidu, Alibaba and Bilibili.\n• We apply four filters consistently across our coverage universe: whether the \ncurrent multiple represents a real earnings floor; whether disclosed AI spend is \nself-funded rather than dilutive; whether consensus earnings are set too low; \nand whether a dated catalyst exists in the next three to six months. Tencent is \nthe only name that clears all four criteria. JD and Trip.com clear three on \ndifferentiated grounds. Alibaba, Meituan, and PDD clear fewer, for reasons we \ndetail in the body.\n• The case for Tencent rests on four pillars the market is, in our view, mis-\npricing. The earnings floor is real: FY25 free cash flow of RMB182.6bn \ncomfortably funds the current AI investment framework, and our 2026E EPS \ngrowth estimate of c8% already embeds elevated spend. The AI monetization \nbridge is narrower in scope and more advanced in execution than consensus \nframes it; the disclosed RMB18bn of 2025 spend and the “more than double” in \n2026 framework refer to new AI products, not full company-wide infrastructure, \nand monetization is already live in advertising and gaming. We think the gaming \nand licensing moat is underappreciated because licensing, not model quality, is \nthe scarce asset in China. Lastly, Weixin carries long-duration optionality to \nwhich the current multiple ascribes negligible value.\n• Why now? Consensus has reset to \"real 14x, earnings floor intact, awaiting a \ncatalyst\". Positioning is washed out. The April calendar is dense: Hunyuan 3.0 \nrolls out as the first real test of domestic AI credibility - the \"Gemini 3 moment\" \nanalog investors explicitly reference - and there are low expectations for the \nHonor of King World launch. Cloud monetization should accelerate through the \nyear, and a second model or AI application release later in 2026 provides a \nfurther potential catalyst.\n• Our thesis is not without risk. Hunyuan 3.0 reception is genuinely binary. AI \nspend could overshoot the current framework. Core advertising or gaming \nsoftness would erode the floor the entire setup rests on. ByteDance, a private-\ncompany AI leader investors cannot directly own, may structurally cap listed \nmultiples. We view these risks as priced in; the potential upside is not.\n--- page 2 ---\n2\nAsia Pacific Equity Research\n23 April 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nThe six weeks since the 4Q25 reporting season has seen a repricing of China internet stocks along a different axis than the \nAI-narrative rally that ran through January 2026. Earnings revisions now dominate share price direction, AI capex is \npenalized rather than rewarded, and the buy-side has converged on a \"real multiple plus earnings floor plus dated catalyst\" \nframework for sizing positions. Against this tape, we refresh our sector view and rank Tencent (0700 HK) as our top pick.\nOur conviction rests on four filters we apply consistently across the coverage universe: whether the current multiple \nrepresents a real earnings floor; whether AI spend is self-funded rather than dilutive; whether consensus earnings are set too \nlow; and whether a dated catalyst exists in the next three to six months. Tencent is the only name that passes all four. The \nsetup is asymmetric: downside looks capped near 14x 2026E PE with management preserving financial flexibility, and \nupside is gated by catalyst delivery in April and beyond rather than by a multi-quarter narrative build.\nWe retain a constructive position on JD and Trip.com on a more selective basis, remain Neutral on Meituan, and view PDD \nas having a balanced risk/reward post the recent multiple reset. This report focuses on the sector reset and the relative case \nfor Tencent.\nFigure 1: YTD sector share price performance summary\nSource: Bloomberg Finance L.P (as of Apr 23, 2026).\nCompany\nTicker\nMarket cap \n(US$m)\nPrice\nStock \nReturn\nRelative \nreturn vs. \nMXCN Index\nChange in \n26E PE \n26CY EPS \nrevision\n26CY \nRevenue \nrevision\nTencent\n700 HK\n604,830\n519\n-16%\n-13%\n-12%\n-4%\n0%\nAlibaba\nBABA US\n323,208\n135\n-7%\n-4%\n25%\n-26%\n-1%\nPinduoduo\nPDD US\n140,531\n99\n-12%\n-9%\n-8%\n-4%\n0%\nNetEase\nNTES US\n73,260\n115\n-18%\n-15%\n-15%\n-3%\n-2%\nMeituan Dianping\n3690 HK\n68,165\n86\n-18%\n-16%\n-183%\n-199%\n-2%\nZhipu AI\n2513 HK\n54,089\n950\n749%\n751%\n1043%\n-26%\n77%\nBaidu\nBIDU US\n42,018\n123\n-6%\n-3%\n3%\n-8%\n-3%\nJD.com\nJD US\n41,685\n31\n7%\n9%\n21%\n-12%\n0%\nMiniMax\n100 HK\n35,987\n899\n462%\n465%\n315%\n36%\n9%\nTrip.com\nTCOM US\n35,719\n55\n-25%\n-22%\n-20%\n-7%\n1%\nKuaishou\n1024 HK\n25,747\n46\n-29%\n-26%\n-2%\n-28%\n-4%\nBeike\nBEKE US\n18,841\n16\n1%\n4%\n11%\n-9%\n-9%\nDidi\nDIDIY US\n17,715\n4\n-25%\n-23%\n688%\n-91%\n0%\nTME\nTME US\n15,141\n10\n-45%\n-43%\n-43%\n-4%\n-2%\nBilibili\nBILI US\n9,933\n23\n-7%\n-5%\n6%\n-12%\n1%\nAlibaba Health\n241 HK\n9,750\n4.7\n-9%\n-6%\n-9%\n0%\n0%\nVipshop\nVIPS US\n7,079\n14.7\n-17%\n-15%\n-17%\n0%\n-2%\nKanzhun\nBZ US\n6,682\n14\n-33%\n-30%\n-31%\n-4%\n-1%\nKingsoft Cloud\nKC US\n5,253\n17.6\n67%\n69%\n46%\n14%\n9%\nKingsoft\n3888 HK\n4,327\n24.5\n-14%\n-11%\n1%\n-15%\n-4%\nXD\n2400 HK\n4,062\n65\n-2%\n0%\n-3%\n1%\n-6%\nPing An Healthcare \n1833 HK\n3,381\n12.3\n-15%\n-12%\n-22%\n9%\n-1%\nYY\nJOYY US\n3,091\n60.6\n-9%\n-6%\n-6%\n-3%\n2%\nWeride\nWRD US\n2,716\n8\n-7%\n-5%\n261%\n-74%\n-14%\nDamai Entertainment 1060 HK\n2,335\n0.6\n-37%\n-34%\n-37%\n0%\n-1%\nAutoHome\nATHM US\n2,154\n18.7\n-16%\n-13%\n-3%\n-14%\n-13%\nWeibo\nWB US\n2,113\n9\n-16%\n-14%\n-11%\n-6%\n6%\niQiyi\nIQ US\n1,274\n1.3\n-35%\n-32%\n171%\n-76%\n-6%\nMomo\nMOMO US\n1,207\n6.3\n-4%\n-1%\n-3%\n-1%\n-1%\nMaoyan\n1896 HK\n893\n6.0\n-15%\n-12%\n9%\n-21%\n-10%\nHuya\nHUYA US\n682\n3\n11%\n14%\n4%\n7%\n3%\nDingdong\nDDL US\n631\n2.7\n6%\n9%\n-1%\n7%\n1%\nKWEB\nKWEB US EQUITY\n6,605\n29.4\n-14%\n-12%\nMSCI China\nMXCN INDEX\n12,457,231\n81.9\n-3%\n0%\n-11%\n10%\n9%\nMean\n27%\n30%\n68%\n-18%\n1%\n--- page 3 ---\n3\nAsia Pacific  Equity Research\n23 April 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nWhat Has Changed Since the 4Q25 Earnings Season\nThe 4Q25 reporting cycle that began on 18 March with Tencent's print did not produce large absolute earnings surprises, \nbut it did reset the framework through which the market is underwriting China internet. In our view, six shifts matter.\nMarket regime inversion. Through late January 2026, Alibaba and Baidu rallied on an AI narrative despite weak \nfundamentals. After late January, profit-taking and a lower global risk appetite re-anchored the tape on near-term earnings \nand free cash flow. Most of the China internet names saw estimate cuts into and out of the 4Q print. Alibaba's US$100bn \nfive-year cloud target, implying roughly a 47% cloud revenue 5-year CAGR did not support the stock. Long-dated narrative \nclaims now carry a materially lower multiple than they did in 4Q25.\nAI capex is being penalized, not rewarded. The US software analog rerating, IGV (iShares expanded Tech-Software \nSector ETF) weakness and fears of disruption to core franchises have arrived in China with a lag. Linear extrapolations of \nAI spend (Tencent RMB36–40bn this year per the company), Alibaba's rapidly scaling of the \"all others\" line) produce ROI \nanxiety that the market is translating into multiple compression rather than multiple expansion. The burden of proof has \nshifted from \"show us AI monetization is possible\" to \"show us AI monetization within the spend framework.\"\nRegulatory wave re-opened, but bounded. The SAMR ghost-kitchen ruling landed on 18 April, with RMB35.97bn in \naggregate industry penalties. PDD's RMB1.5bn fine is financially immaterial but carries signaling weight given unusually \nvivid domestic media coverage. A separate State Council-linked office probe into food delivery subsidy practices remains \nlive. Trip.com's antitrust investigation, launched in early January, should be resolved on a four-to-six-month precedent \ntimetable, implying May to July 2026. In our view, these are clearing events within an already-established framework, not a \n2021-style systemic reset, but stocks tied to unresolved cases continue to trade as \"dead money\" until resolution.\nFood-delivery subsidy intensity easing at the margin. Alibaba's FY27–29 loss-narrowing roadmap, roughly halving each \nyear from a base of RMB85–90bn, is now in consensus and largely priced in. The incremental underwriting question has \nshifted away from food delivery to Alibaba's \"all others\" AI spending line, where the cadence accelerated from \napproximately RMB3bn in the September quarter to RMB20bn in the March quarter. Scale remains small relative to food \ndelivery losses, but the acceleration and the opacity are what matter.\nBuy-side positioning reset. Late-April counterparty conversations are converging on \"14x is real, earnings floor intact, \nneeds a model-quality or gaming catalyst\" for Tencent; on \"JD has the most FD-easing upside surprise\"; on \"Trip.com is \nattractive on 11–12x if the near-term earnings outlook won’t be compressed by investment”; and on Alibaba as a multiple-\nnot-EPS story. Expectations are washed out across most of the cohort. Investors are unwilling to size positions ahead of \ndated events, but are willing to underwrite real earnings floors.\nPrivate-company overhang has intensified. Buy-side framing now treats ByteDance as the China-specific analog of \nAnthropic: the strongest AI competitor that investors cannot directly own, structurally capping listed multiples. This is a \nrelative-positioning risk, not a disintermediation risk, and the two should not be conflated, in our view.\nRevised Sector Framework\nWe apply four filters to rank names in the current regime. Each filter corresponds to a feature of the 2026 tape rather than a \nview on any single company.\nFilter one: is the current multiple a real floor? A low multiple is only meaningful if earnings downside is capped. We \ntest this through three inputs: management signaling on the earnings trajectory, our own estimate range for 2026 EPS, and \nfree cash flow durability against disclosed investment plans. Tencent and Trip.com both clear this filter. Meituan does not \nclear it cleanly because normalized food delivery economics still span a wide range (roughly RMB0.2–0.3 per order in the \nlow scenario versus RMB1.0–1.1 per order in the high scenario), depending primarily on Alibaba's strategic posture rather \nthan on policy.\n--- page 4 ---\n4\nAsia Pacific Equity Research\n23 April 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nBased on Tencent’s AI investment of Rmb18bn in 2025 (disclosed by management during the 4Q25 earnings call), we \nestimate that consensus earnings have largely factored in incremental investments in AI in 2026; we estimate even a \nRmb60bn AI investment (over 3 times that of 2025’s level) would only imply 6% downside to consensus earnings. This \nwould imply limited room for further earnings cuts, in our view.\nTable 1: Tencent new AI product investment analysis and EPS sensitivity\nTencent 2026 new AI product investment (JPMe, Rmb bn)\n0\n15\n30\n45\n60\n75\nDelta to 2025 AI investment\n-100%\n-17%\n67%\n150%\n233%\n317%\nTencent 2026E adj NI (Rmb bn) (JPMe)\n315\n302\n290\n277\n264\n251\nDelta to consensus\n12%\n8%\n3%\n-1%\n-6%\n-10%\nSource: J.P. Morgan estimates, Bloomberg Finance L.P (as of Apr 23, 2026).\nFigure 2: Tencent trades close to 10 year trough\nSource: Bloomberg Finance L.P. (as of Apr 23, 2026)\nFilter two: is AI spend self-funded or dilutive? We look for three pieces of evidence: explicit scoping of the disclosed \nspend figure (new products versus total infrastructure), visibility of AI-linked revenue contribution in existing businesses, \nand a credible monetization sequence. We believe that Tencent’s RMB18bn new AI product investment in 2025 and the \nroughly RMB36-40bn 2026 framework (per the company) refer to investment in new AI products rather than full company-\nwide AI infrastructure, with advertising and gaming already benefiting and cloud next in sequence. Alibaba has not \nprovided equivalent scoping on the \"all others\" line, which we think is the primary reason multiples on BABA trail the \nunderlying operating improvement.\nFilter three: is there out-of-consensus earnings upside? We look for gaps between consensus and our numbers that could \nclose on a defined print. JD ranks highest on this filter given a meaningful quarter-on-quarter improvement in food-delivery \nand new-business losses, while consensus appears to assume roughly flat year-on-year new business losses. Meituan's \nsubstantial next-year profit improvement is already embedded in consensus and is therefore priced in.\nFilter four: is there a dated catalyst in the next three to six months? We look for binary events that could reopen the \nnarrative on a defined timeline. Tencent's April calendar, Hunyuan 3.0 rollout and Honor of King World launch, is the \ndensest in the cohort. Trip.com's potential antitrust resolution between May and July would be a clearing event. JD's 1Q26 \nprint is its primary earnings catalyst. Alibaba's next inflection point depends on the performance of its \"all others\" business \nsegment, which is not a single-date event.\n--- page 5 ---\n5\nAsia Pacific  Equity Research\n23 April 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nApplying these filters, Tencent is the only name that clears all four. JD clears three (floor, out-of-consensus earnings, \ncatalyst). Trip.com clears three (floor, clearing event, manageable near-term earnings risk). Baidu clears three (floor, self-\nfunded AI investment, catalyst). Alibaba clears one. Meituan clears one (catalyst, through FD easing, although already \npriced). This ranking is the spine of our top-pick call.\nWhy Tencent Tops the Ranking\nThesis \nTencent trades at roughly 14x 2026E PE based on Bloomberg consensus, offering a credible earnings floor with \nasymmetric optionality on sequenced, self-funded AI monetization. Downside is capped by fundamentals; upside potential \nis catalyst-gated rather than narrative-gated. This is the cleanest structure in the sector, in our view.\nPillar one: the earnings floor is real. FY25 produced revenue of RMB751.8bn, non-IFRS net profit of RMB267.0bn, and \nfree cash flow of RMB182.6bn. Our 2026 EPS growth estimate of c.8% already embeds elevated AI investment. \nManagement has framed 2026 as a year when revenue growth will outpace earnings growth by design, not because cost \ndiscipline is deteriorating. That framing is compatible with earnings that continue to grow, even if modestly, and is the \nfoundation of the floors, in our view.\nPillar two: AI spend is self-funded, not dilutive. The disclosed RMB18bn of 2025 spend and the roughly RMB36-40bn \n2026 framework refer to new AI products, not Tencent's full company-wide AI infrastructure. Linear extrapolations to \nRMB70bn or RMB100bn in future years therefore mis-scope the underwriting, in our view. More importantly, \nmonetization is already live in the businesses that investors can underwrite today: advertising, where AI is improving \ntargeting and click-through, and gaming, where AI is accelerating the production of skins, assets, and monetizable content \non top of a large licensed installed base. Cloud is the next layer as GPU capacity expands. Token monetization and Weixin \nagent monetization remain back-end-loaded but carry the largest long-duration optionality.\nPillar three: The gaming and licensing moat is underappreciated, in our view. In China, game licensing remains the scarce \nasset, not model quality. Tencent's edge in AI-enabled gaming is its orchestration across the production and live-operations \nstack, deployed onto the largest licensed installed base in the market. This is not a moat that a frontier-model competitor \ncan replicate without also securing license approvals and distribution. Honor of King World launches into this moat.\nPillar four: Weixin carries long-duration optionality the market is not paying for. Management has framed the core \nconsumer AI opportunity as improving task completion and deepening transaction behavior inside Weixin, payments, mini-\nshops, commerce, and related advertising, rather than as standalone token sales. This is consistent with the public framing \nfrom Shunyu Yao - that Tencent's consumer AI edge is augmenting user context rather than pure model scaling. We do not \nunderwrite this pillar in the 2026 numbers, but we note that the current multiple ascribes negligible value to it. Therefore, \nthe Google re-rating mechanism (model quality improvement, distribution surface, token monetization, multiple expansion \npath) offers potential upside to the share price, in our view.\nWhy now?\nConsensus has converged on \"real 14x, earnings floor intact, needs a catalyst.\" Positioning is washed out. The April catalyst \ncalendar is loaded: Hunyuan 3.0 rolls out as the first real test of domestic AI credibility - the \"Gemini 3 moment\" analog the \nbuy-side explicitly references - and Honor of King World launches into a low-expectation tape. Cloud monetization should \naccelerate as GPU capacity expands, and a second major model or AI application release later in 2026 would provide a \nsecond bite. Google's rerating from the mid-teens to the high-20s on Gemini 3 and product integration is the most relevant \ntemplate, in our view. We do not claim Tencent will trace the same path, but we observe that the mechanism, a credible \nmodel inflection combined with a distribution surface, is the same.\nVariant perception\nThe market is pricing Tencent as an AI-cost-burden story. We think the causality is backwards in two specific ways. First, \nthe disclosed spend frame is narrow, not total. Second, the ByteDance overhang is a relative-positioning concern, not a\n\n### 2026-04-27-0700.HK-HSBC Global Investme-China Internet HSBC Global Investment Summit 2026 tour takea...-121648328.pdf\npages=23 timeliness=fresh\n\n--- page 1 ---\nDisclosures & Disclaimer \nThis report must be read with the disclosures and the analyst certifications in \nthe Disclosure appendix, and with the Disclaimer, which forms part of it. \n  \n \nIssuer of report: The Hongkong and Shanghai \nBanking Corporation Limited, Singapore Branch \nView HSBC Global Investment Research at: \nhttps://www.research.hsbc.com \n                                          \n             \n                               \n   \n \n◆ We visited 6 companies under coverage and hosted online ads, \ngames, local services and other experts during a 3-day tour \n◆ AI investment and monetisation remain the core investor focus \n◆ Investor sentiment on local services improved on easing \ncompetition and ad vertical faces higher compliance costs \nOur thoughts and investor feedback: We like Alibaba for its to-B AI monetisation \npotential, and Tencent for its to-C AI monetisation potential and resilience from ads \nand games. Investors broadly share our positive view, especially Alibaba, although \nsome are cautious on the near-term to-C AI monetisation outlook. We like buy-rated \nFull Truck Alliance for its attractive valuation. Its earnings growth appears to be \nbottoming out and shareholder returns are improving. Investors have turned more \nconstructive on Meituan (MT) as quick commerce competition is easing and \nimproved unit economics (UE) in 1Q26 highlighted its moat in food delivery. Aside \nfrom the names above, Bilibili and PDD were among the most inquired about names \nfrom investors. Below are our 8-10 April tour takeaways. \nGames could continue to benefit from a rising paying ratio and ARPPU, back by \nmore customised live operations and better AI driven efficiencies. A favourable \npipeline - pet collection (Roco Kingdom: World), extraction shooter (Delta Force), and \nlife simulation (Animula Nook) – could solidify Tencent’s leadership in growth in 2026.  \nLocal services players are expected to focus more on profitability, as MT and \nDouyin are sourcing growth from diverging segments and subsidy intensity may only \nremain relatively high in dining. Competition in food delivery has stabilised, too. \nBeverage orders could pick up into the summer months, changing the dynamics \nagain but the long-term trend of continuous uplift in unit economics should continue \n(see page 5-7 for details).  \nAd market growth should see support from demand in AI short dramas, AI applications \nand incremental budgets released from lower iOS channel costs. However, overall \nindustry growth could see a 3ppt drag in 2026 due to higher compliance costs associated \nwith two tax-related policy changes: e-commerce tax and traffic acquisition cost tax. Short \nvideo platforms could see more impact. Companies such as Tencent and Xiaohonshu \n(XHS) are more insulated from the tax changes and should continue to gain share.  \nAI budget increase as a share of IT spend supported by productivity gains, run-cost \nreduction, and targeted revenue uplift suggest ample room for revenue growth in AI \nand Cloud. Performance typically eclipses cost in the initial model selection process, \nand it is unlikely that one model will fit all use cases. GPU resources remain scarce, \nsustaining potential price hikes. Competitive energy pricing could give Chinese \ncompanies a long-term edge.  \n27 April 2026\nCharlene Liu* \nHead of Internet and Gaming Research, Asia Pacific \nThe Hongkong and Shanghai Banking Corporation \nLimited, Singapore Branch \ncharlene.r.liu@hsbc.com.sg \n+65 6658 0615 \nRitchie Sun*, CFA \nAnalyst, Internet Research \nThe Hongkong and Shanghai Banking Corporation Limited \nritchie.k.h.sun@hsbc.com.hk \n+852 2822 4392 \nCharlotte Wei* \nAnalyst, Internet Research \nThe Hongkong and Shanghai Banking Corporation Limited \ncharlotte.wei@hsbc.com.hk \n+852 2996 6539 \nChristina Chen*, CFA \nAnalyst, Internet Research \nThe Hongkong and Shanghai Banking Corporation Limited \nchristina.z.chen@hsbc.com.hk \n+852 2822 2912 \n* Employed by a non-US affiliate of HSBC Securities (USA) Inc, and is \nnot registered/ qualified pursuant to FINRA regulations \nChina Internet \nEquities \nInternet Software & Services  \n \n \nChina \nHSBC Global Investment Summit 2026 tour takeaways\n--- page 2 ---\nEquities ● Internet Software & Services \n27 April 2026\n2 \nExhibit 1: Summary of TPs and ratings of the stocks mentioned \nCompany \nBBG Ticker \nMkt Cap \n(USDbn) \nHSBC Rating \nCCY \nCMP Target Price Upside/down\nside \nTencent \n700 HK \n574.7 \nBuy \nHKD \n493.40 \n750.00 \n52.0% \nNetEase \nNTES US \n70.0 \nBuy \nUSD \n110.58 \n185.00 \n67.3% \nMeituan \n3690 HK \n65.0 \nBuy \nHKD \n82.45 \n104.00 \n26.1% \nAlibaba \nBABA US \n325.8 \nBuy \nUSD \n135.82 \n172.00 \n26.6% \nPinduoduo \nPDD US \n139.2 \nBuy \nUSD \n98.03 \n159.00 \n62.2% \nJD.com \nJD US \n42.6 \nBuy \nUSD \n30.27 \n35.00 \n15.6% \nKuaishou \n1024 HK \n24.2 \nBuy \nHKD \n43.70 \n65.00 \n48.7% \nBilibili \nBILI US \n7.5 \nBuy \nUSD \n22.25 \n30.00 \n34.8% \nFull Truck Alliance \nYMM US \n9.0 \nBuy \nUSD \n8.66 \n13.80 \n59.4% \nPerfect World * \n002624 CH \n4.9 \nBuy \nRMB \n17.12 \n30.00 \n75.2% \nSource: Bloomberg, LESG, HSBC estimates; priced as of 24 April 2026 (* based on HSBC Qianhai Securities estimates) \nGames \nWe hosted Kern Zhang (Team Lead of Account Management, GCR) and Abbie Li (Senior Sales \nDirector) from Sensor Tower and Mr. Xie (freelancer; former overseas market distribution and \noperations director at Mihoyo).  \nIndustry growth trend and drivers \nMr. Xie forecasts China games industry to grow at 7-10% y-o-y in 2026e, driven by higher \npaying ratio and ARPPU. Mr. Xie is more constructive on pet catching, extraction shooter, and \nlife simulation sub-segments, which he expects to drive overall industry growth this year (more \ndetails below). \nMr. Zhang notes that the global mobile games industry grew 8-10% y-o-y in 2025 in revenue, \nbut downloads only grew 2.5-3% y-o-y. This suggests users are less inclined to try new games, \nwhich also coincides with far fewer new game launches than 10 years ago. For PC and console \ngames, revenue in 2025 was 50% higher than 2021, but the market size remains small (c16-\n20% of the mobile game market). He notes three key growth opportunities: \n◆ Mini games: Tencent remains the leading distribution platform, but ByteDance is stepping \nup investment and team expansion.  \n◆ Games as a Service (GaaS): Mr. Zhang thinks customised live operations could emerge \nas a big opportunity. For example, despite classic gameplay, Kingshot, Last War: Survival \nGame, Infinite Borders and FWJ  now all offer personalised bonuses, promotions and \ndifficulty levels to each user, enhancing user retention and propensity to pay. He also notes \nthat in the US, Gossip Harbor: Merge & Story launches personalised promotions to users \naround payroll timelines, and adjusts prices for in-game items according to macroeconomic \nconditions so that users will not feel pressured to spend and eventually get burnt out by the \ngame. To differentiate going forward, we think it comes down to a company’s ability to use \nAI to analyse in-game user data and make relevant recommendations. Both large and \nsmall-to-mid-sized game companies can benefit from this trend by leveraging third-party \ndata platforms to strengthen their data analytics capacity.  \n◆ Demographic shifts: Mr. Zhang notices a few interesting behavioural shifts: 1) Young \ngamers in Japan are more willing to pay for PvP titles, supporting the strong performance of \nValorant and Apex Legends; 2) games with “winning big” potential (e.g., casino, extraction \nshooter) are able to win over younger users; 3) in China market, Black Myth: Wukong has \nattracted interest from older gamers who had not played games before.\n--- page 3 ---\n3 \nEquities ● Internet Software & Services \n27 April 2026\nFavourable regulation \nMr. Zhang thinks the regulatory stance has turned more supportive. Regulators are encouraging \nlarge game companies to promote Chinese culture via expansion in overseas markets, building \non the success of Black Myth: Wukong. Small-and-mid-sized game companies have seen \nproportionately higher percentage of approved game licenses, allowing them to enjoy better \nmonetidation opportunities domestically.  \nObservations and thoughts by different genre \nAs discussed, Mr. Xie is more constructive on pet catching, extraction shooter and life simulation.  \n◆ Pet catching: The pioneer in this genre is Pokémon GO. Tencent launched Roco \nKingdom: World on 26 March under this vertical, with 60m+ pre-registrations, and strong \ninitial grossing performance. Mr. Xie believes it has strong potential in overseas markets, \ntoo. He also expects strong performance from the new launches such as Yimoo from \nFunplus and Honkai: Nexus Anima from Mihoyo, given encouraging testing feedback.  \n◆ Extraction shooter: Mr. Xie believes the success of Delta Force has proved that this genre \nis highly popular across demographics covering both younger and older players, as it also \nbenefits from promotion through Tencent’s social network. Mr. Zhang notes that research \nshows younger players like extraction shooters, as they provide a sense of achievement \nand a taste of success, which have become harder to attain in real life. \n◆ Life simulation: Mr. Xie notes that Animula Nook from Tencent and Petit Planet from \nMihoyo have strong testing feedback, and both games leverage the social strengths of \nTencent and content-driven and storytelling strengths of Mihoyo, respectively. \nMr. Xie also discussed his thoughts and outlook on open-world games and SLG games, where \nhe expects stronger contenders in the pipeline.  \n◆ Open world - new launches: Mr. Xie believes Tencent’s Honor of Kings: World benefits \nfrom the IP appeal of HoK (and therefore requires less marketing) and notes solid initial \nlaunch performance for the PC version (mobile version to come later in April). He believes \nPerfect World has leveraged the experience of making Tower of Fantasy and kept the R&D \ncost low for Neverness to Everness (NTE), allowing it to allocate more resources to \npromote the game and still maintain decent margin. Mr. Xie expects NetEase to launch \nAnanta in 4Q26. But he has a mixed expectation on the performance of the game, as the \nmobile experience has yet to be refined in the mobile version, which could affect its user \nbase and ability to cover substantial upfront R&D costs. On the other hand, he believes \nNetEase’s Sea of Remnants could be a blockbuster in overseas markets (with a larger \ngrossing contribution than in China), given the unique gameplay and genre. \n◆ Competition in SLG games: Mr. Xie notes that SLG competition in China is very intense. \nGiven the high ARPPU nature of the genre, top-tier SLG games focus on acquiring and \nretaining whale users with customised services (e.g., private messages), making it difficult \nfor new entrants to acquire these users. However, SLG games can still grow well in \noverseas markets given lower ARPPUs, with various companies, such as Funplus and \nDiandian, having growth opportunities.  \nOpportunities and risks from AI in games \nOutside of GaaS, AI has also been widely adopted in many areas. According to Mr. Xie: 1) \nlocalisation (translation); 2) traffic acquisition and ad materials generation; 3) art design \n(covering 2D/3D assets), motion capture and voice-over generation; 4) coding; 5) project \nmanagement (e.g., data analysis and replacing part of the outsourcing work); 6) customer \nservice and personalised interactions with NPCs (e.g., Peacekeeper Elite and Where Winds \nMeet). He believes AI adoption can lead to layoffs across the industry.\n--- page 4 ---\nEquities ● Internet Software & Services \n27 April 2026\n4 \nMr. Xie also believes larger players tend to have an advantage, as they develop and use their \nproprietary foundation models. Small-to-mid-sized players rely on open-weight models and need \nto spend extra time and resources to fine-tune the models for their own use with uncertain \noutcomes. AI can substantially improve production efficiency for large players, weakening the \nadvantages of small-to-mid-sized game companies, which are known for nimble organisational \nstructure and rapid development pace.  \nWhile Mihoyo has explored ways to generate games using AI, Mr. Xie believes the technology is \nnot mature enough to autonomously generate facial expressions and motions based on real-\ntime interactions, given bottlenecks in the computing power and model capability. Mr. Xie \nshares that during the game development process, he uses GPT (strong reasoning), Gemini \n(image editing and video generation), and Kimi (for Chinese long-context, graphics and video \nattachment analysis, meeting summary, and data analysis).  \nLocal services \nWe hosted Mr. Shi, Founder of Yuzhibo Information Technology (Nanjing) Company. \nStrategy for Meituan (MT) vs. Douyin (DY) in local services \nMr. Shi estimates that Meituan is aiming for RMB1.45-1.5trn GTV in 2026e for in-store, hotel \nand travel (IHT), tracking over 20% y-o-y growth. By sub-segment: \n◆ In-store dining: He expects growth to sustain at 15-16% y-o-y, but below overall segmental \ngrowth due to competition. Based on his observations, GTV validation rates, better order \nquality and a higher emphasis on formal meals take priority. He also thinks MT is leveraging \nAI to enhance operating efficiency for merchants.  \n◆ In-store services: He expects it to be a key growth driver for the segment, as MT expands \ninto new category such as services delivered to the home (e.g., home cleaning, repairs, \narranging photographers and personal trainers), and high-value prepaid cards for services \n(e.g. massage, yoga, bars, etc). MT helps audit the merchants, and ensures the merchants \nare properly vetted as business entities. MT also provides deposit custody to protect \nconsumers’ interests. \n◆ Hotel & travel: He expects MT to focus on low-ADR bed & breakfast and high-ADR hotels \nas growth drivers. MT rolls out “Hotel+X” strategy, where X historically consisted mainly of \nbreakfast. MT is more actively upselling other value-added services such as tourist \nattraction tickets, experience packages like photo shoots to further improve average order \nvalue and margins. It is also beefing up vacation and road trip-related content for the travel \ncategory to stimulate demand. \nMr. Shi expects Meituan to prioritise GTV, followed by profit and then revenue, with dynamic \nadjustment in subsidies to protect margins.  \nAs for DY, Mr. Shi estimates a target of 50% GTV growth to RMB1.27trn in 2026. Beyond \ngrowing GTV, Douyin also aims to increase commission revenue and reach profitability by \nreducing subsidies. Mr. Shi also thinks the introduction of Doushengsheng precisely allows DY \nto do more targeted subsidies.  \n◆ Doushengsheng: DY launched a standalone Doushengsheng app to enhance conversion \nefficiency. Doushengsheng would also help merchants to achieve a target ROI through a \none-stop shop for automated ad placement. Mr Shi believes Doushengsheng can \neffectively help DY acquire traffic from lower tier cities.\n--- page 5 ---\n5 \nEquities ● Internet Software & Services \n27 April 2026\n◆ Category differentiation: Rather than competing head-on with MT in categories like \nmedical beauty services, DY turns its focus to physical goods in-store retail (such as \nvouchers to buy gold, apparel, etc), leveraging its e-commerce mindshare. \n◆ Hotel & travel: Mr. Shi notes that DY’s strength lies in its ability to market attraction \nticketing and culture/tourism via short videos, but its GTV validation rate remains far below \npeers, partly due to the younger demographic it tends to attract.  \nMr. Shi takes the view that asset/labour-heavy business development team remains an \nimportant moat for MT. MT adopts a mix of direct-operation and third-party agency model in \nbusiness development. The agencies are often staffed by former Meituan or credit-card \nbusiness development employees. They can withstand MT’s rigorous evaluation process on \nmetrics like GTV, orders, revenue and customer satisfaction; those who fall short would face \npenalties or termination of collaboration. MT’s approach takes time to work, but merchant \nstickiness tends to be higher and it can also better penetrate SME merchants. DY’s approach \ndiffers, as it leverages third-party agencies with marketing/media background. DY takes a more \nrelaxed approach to vetting agencies, as the KPI is on the coverage ramp-up pace and GTV. \nThis also means the focus tends to be on larger-sized chain merchants that generate more GTV \nrather than SME merchants. Mr. Shi sees merits in both approaches.   \nOverall, Mr. Shi thinks that DY’s sizable traffic pool could effectively generate GTV, while \nMeituan’s operating experience, understanding of users, dynamic adjustment of subsidies, and \ncross-selling potential could enable consistent profitability.  \nFood delivery (FD) \nMr. Shi shared his estimates for the key operating metrics for Meituan and Taobao in FD in \n1Q26:  \n◆ Daily orders: Meituan (62-63m), Taobao (50-51m). \n◆ Unit Economics (UE): Meituan (less than RMB1 loss/order in March 2026), with UE gap \nversus Taobao staying at RMB2/order. \nMr. Shi expects long-run order market share for Meituan/Taobao should be 53-54%/46-47%, \nwhile GTV market share should be 60%/40%. He expects Meituan’s UE to turn positive in 3Q26 \nor October 2026. He notes Meituan still has a better conversion rate (from milk tea to high-AOV \norders) than Taobao, while Taobao’ cross-selling ratio remains very low. Mr. Shi believes while \nit is difficult for Taobao to maintain its market share after cutting subsidies, what Taobao could \ndo is to follow Meituan’s subsidies strategy in different cities to defend market share, and target \nsubsidies at those higher-value users (e.g. membership users). Mr. Shi also notes that Amap is \nramping its business development team, but performance in trial cities is mixed given the lack of \nsynergies with Taobao.  \nIs AI an edge? \nMr. Shi believes that, in the current macro environment, users prefer to compare prices across \nmerchants and categories. However, Qwen can only facilitate price comparison within its own \necosystem. He thinks the bigger moat is physical execution, such as fulfilment capability and \nbreadth of merchant and category coverage.  \nKeeta \nMr. Shi shared his views on Keeta’s performance and strategy in various markets: \n◆ Hong Kong: Market share is 40-50%, with over HKD1 OP/order (breakeven in 4Q25; \nprofitable in 1Q26).  \n◆ Saudi Arabia: Daily orders are at 0.6m, with market share at 24-25% (number 2 player). \nAfter breakeven, Mr. Shi thinks Keeta will launch grocery business.\n\n### 2026-04-28-JPMorgan-China Telecom Sector What we learned from China telcos 1Q26...-121678208.pdf\npages=9 timeliness=fresh\n\n--- page 1 ---\nwww.jpmorganmarkets.com\nAsia Pacific Equity Research\n28 April 2026\nChina Telecom Sector\n \nWhat we learned from China telcos' 1Q26 results\n \nInternet\nDaniel Chen AC\n(86-21) 6106 6205\ndaniel.q.chen@jpmorgan.com\nSAC Registration Number: S1730521040001\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSAC Registration Number: S1730523020001\nOlivia Xu\n(86-21) 6106 6138\nolivia.w.xu@jpmorgan.com\nSAC Registration Number: S1730525060001\nJ.P. Morgan Securities (China) Company \nLimited\nSee page 2 for analyst certification and important disclosures, including non-US analyst disclosures.\n• We summarize key takeaways after China telecom operators’ 1Q26 results. \nOverall, CM/CT/CU’s service revenue was -1%/-2%/-1% YoY in 1Q26, with \nnet profit -4%/-17%/-18%, respectively, due mainly to the impact from the \nVAT adjustment. CM’s profit decline is in line with our estimate, while CT/CU \nare below our estimates (JPMe -7% YoY each for 2026E profit), due to higher \npersonnel costs. Cash flow is a bright spot: CM’s 1Q26 FCF of Rmb41bn is \nsubstantially stronger than the Rmb5bn outflow in 1Q25, while CT’s 1Q26 FCF \nof Rmb8.4bn is much stronger than Rmb3.4bn outflow in 1Q25. This \ndemonstrates China telecom operators' focus on growth quality and should \nsupport sustainable dividend payouts, in our view. On the industrial internet \nside, China Telecom Cloud revenue was +7% YoY, and China Unicom \ncompute power revenue was +8% YoY in 1Q26. \n• Our order of preference among H-share names is CM-H > CT-H > CU-H: \nWe note that CM-H/CT-H’s share prices have been resilient post the 1Q26 \nresults. We believe the key rationales are: CM-H (solid large-cap high yielder at \n6% dividend yield on 2026E), CT-H (potentially due to strong sentiment on \ncloud/data center sector post DeepSeek V4 launch recently, which confirms the \npractical feasibility of domestic chips for frontier AI model inference. Please \nrefer to the report on China AI from Olivia Xu. Our order of preference is now \nbased mainly on affordability of dividend payout and cloud exposure. We prefer \nCM-H the most, as it has the mildest impact from VAT adjustment in 2026 (due \nto its substantially higher margin than peers), and its dividend yield of 6.2% in \n2026E (on JPMe) is largest among the Big 3. While CT-H is the most expensive \nof the three (trades at 16x 2026E P/E if we assume similar profit YoY decline \nfor full year 2026E as 1Q26), its positioning as a ‘cloud play’ among the big \nthree telcos (25% of total service revenue in 2025, vs 12%/21% of CM-H/CU-\nH) makes it a potential beneficiary of the China domestic cloud thematic trade. \nWe prefer CU-H least as it trades at a similar P/E as CM-H (12x 2026E if we \nassume similar profit YoY decline for full year 2026 as 1Q26) and the \nlikelihood for higher dividend payout ratio in 2026E is low (due to profit impact \nfrom VAT).\n--- page 2 ---\n2\nAsia Pacific Equity Research\n28 April 2026\nDaniel Chen\n(86-21) 6106 6205\ndaniel.q.chen@jpmorgan.com\nCompanies Discussed in This Report (all prices in this report as of market close on 28 April 2026, unless otherwise \nindicated)\nChina Mobile - H(0941.HK/HK$84.65/OW), China Telecom - H(0728.HK/HK$5.17/OW), China Unicom - \nH(0762.HK/HK$7.30/OW) \nAnalyst Certification: The Research Analyst(s) denoted by an “AC” on the cover of this report certifies (or, where multiple Research \nAnalysts are primarily responsible for this report, the Research Analyst denoted by an “AC” on the cover or within the document \nindividually certifies, with respect to each security or issuer that the Research Analyst covers in this research) that: (1) all of the views \nexpressed in this report accurately reflect the Research Analyst’s personal views about any and all of the subject securities or issuers; and \n(2) no part of any of the Research Analyst's compensation was, is, or will be directly or indirectly related to the specific recommendations \nor views expressed by the Research Analyst(s) in this report. For all Korea-based Research Analysts listed on the front cover, if \napplicable, they also certify, as per KOFIA requirements, that the Research Analyst’s analysis was made in good faith and that the views \nreflect the Research Analyst’s own opinion, without undue influence or intervention.\nAll authors named within this report are Research Analysts who produce independent research unless otherwise spec
