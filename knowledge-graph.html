d) of plus 15% or minus 10% within a 12-month period.\nUnderperform - Describes securities that we expect to provide a total return (price appreciation plus yield) of minus 10% or less within a 12-month period.\nThe expected total return (price appreciation plus yield) for Buy rated securities with an average security price consistently below $10 is 20% or more within\na 12-month period as these companies are typically more volatile than the overall stock market. For Hold rated securities with an average security price\nconsistently below $10, the expected total return (price appreciation plus yield) is plus or minus 20% within a 12-month period. For Underperform rated\nsecurities with an average security price consistently below $10, the expected total return (price appreciation plus yield) is minus 20% or less within a 12-\nmonth period.\nNR - The investment rating and price target have been temporarily suspended. Such suspensions are in compliance with applicable regulations and/or\nJefferies policies.\nCS - Coverage Suspended. Jefferies has suspended coverage of this company.\nNC - Not covered. Jefferies does not cover this company.\nRestricted - Describes issuers where, in conjunction with Jefferies engagement in certain transactions, company policy or applicable securities regulations\nprohibit certain types of communications, including investment recommendations.\nMonitor - Describes securities whose company fundamentals and financials are being monitored, and for which no financial projections or opinions on the\ninvestment merits of the company are provided.\nValuation Methodology\nJefferies' methodology for assigning ratings may include the following: market capitalization, maturity, growth/value, volatility and expected total return\nover the next 12 months. The price targets are based on several methodologies, which may include, but are not restricted to, analyses of market risk,\ngrowth rate, revenue stream, discounted cash flow (DCF), EBITDA, EPS, cash flow (CF), free cash flow (FCF), EV/EBITDA, P/E, PE/growth, P/CF, P/FCF,\npremium (discount)/average group EV/EBITDA, premium (discount)/average group P/E, sum of the parts, net asset value, dividend returns, and return on\nequity (ROE) over the next 12 months.\nJefferies Franchise Picks\nJefferies Franchise Picks include stock selections from among the best stock ideas from our equity analysts over a 12 month period. Stock selection is\nbased on fundamental analysis and may take into account other factors such as analyst conviction, differentiated analysis, a favorable risk/reward ratio\nand investment themes that Jefferies analysts are recommending. Jefferies Franchise Picks will include only Buy rated stocks and the number can vary\ndepending on analyst recommendations for inclusion. Stocks will be added as new op\nвҖҰ(жҲӘж–ӯ)", "n43": "### 2026-05-28-Jefferies-Huaweis _Tau_ Scaling Law - Not Yet a DeepSeek Moment for C...-122278601.pdf  (жҖ»йЎөж•°=12)\n\n--- з¬¬1йЎө ---\nChina (PRC) | Technology\nEquity Research\nMay 28, 2026\n \nNickВ ChengВ *В  | Equity Analyst\n+852 3743 8750 | nick.cheng@jefferies.com\nEdisonВ Lee, CFAВ *В  | Equity Analyst\n852 3743 8009 | edison.lee@jefferies.com\nJackyВ HeВ *В  | Equity Analyst\n+852 3743 8084 | jacky.he@jefferies.com\nMattВ MaВ *В  | Equity Analyst\n852 3767 1109 | matt.ma@jefferies.com\nAnnieВ Ping, CFA, FRMВ *В  | Equity Associate\n+852 3767 1273 | annie.ping@jefferies.com\nHuawei's \"Tau\" Scaling Law - Not Yet a\nDeepSeek Moment for China Semi\nHuawei's top-down system topology aims at making chips without EUV\nthat could perform like 1.4nm chips (2031). One key is Logic Folding,\nwhich connects two chips using hybrid bonding as a routing resource. This\ncould reduce die size (potentially higher yield) and shorten transmission\ndistance (higher performance). But we see challenges in heat dissipation,\nwafer variations, hybrid bonding density and more. Positive for EDA, WFE,\nfoundries and optics.\nHuaweiвҖҷs (HW) П„ Scaling Law reframes chip performance from node-based scaling to\nsystem-level time optimization. Presented at ISCAS 2026, HuaweiвҖҷs П„ / Tau Scaling Law shifts\nfocus from traditional geometry scaling / MooreвҖҷs Law toward a holistic, top-down design\nmethodology. Instead of treating process node size, such as вҖңx nm,вҖқ as the primary proxy\nfor performance, HW argues that time-to-computation / П„ should become the key metric.\nPerformance gains can come not only from transistor shrink, but also from circuit design,\nchip architecture, packaging, interconnect, and system-level optimization. This roadmap is\nespecially relevant as MooreвҖҷs Law slows and Huawei faces restricted access to leading-edge\nprocess technologies.\nLogic Folding is HWвҖҷs most notable example of using 3D design to reduce critical-path\ndelay. In chip design, performance is capped by the slowest signal path, known as the critical\npath. Traditionally, engineers shorten this path through better place-and-route or by moving to\na more advanced process node. HWвҖҷs Logic Folding concept attempts to вҖңfoldвҖқ a 2D chip layout\ninto a 3D structure by stacking logic layers, allowing connected elements to be placed closer\ntogether vertically. Although this resembles existing 3D-IC and chiplet approaches, HWвҖҷs vision\nis more integrated: instead of treating chiplets as separate black boxes connected through\nlimited I/O, Logic Folding aims to co-optimize multiple layers as one unified design.\nFull Logic Folding could create major opportunities, but it faces significant technical\nchallenges. The roadmap can be viewed in three stages: basic 3D stacking (ie, 3D-IC proposed\nby TSMC/Intel), co-simulation-level Logic Folding, and ultimately co-design-level Logic Folding.\nThe most advanced stage would require EDA tools to treat hybrid-bonding layers as routing\nresources, effectively moving chip design from 2D into true 3D. This would require a major\nredesign of the EDA toolchain and create demand for 3D-aware place-and-route, timing,\nthermal, and reliability tools. However, major obstacles remain, including overheating, wafer-to-\nwafer variation, limited hybrid-bonding density, TSV reliability, yield risk, and manufacturability.\nAs a result, full commercial viability may take a long time.\nWe examine how this roadmap would impact different supply chain players. HW also\nextends П„ scaling beyond chips through its System-as-One-Chip concept, using Unified Bus\nand Hi-ONE optical interconnects to optimize the entire AI system. This could simplify data-\ncenter architecture, reduce latency, improve heat dissipation, and lower total cost of ownership\nby replacing fragmented protocols with a more unified topology. If successful, the roadmap\ncould benefit EDA vendors (higher demand but needs innovations), hybrid bonding equipment\nsuppliers, optical interconnect players, and advanced node foundries. However, it could\npressure AI server ODMs (simplified configuration), cooling (reduced demand) and power\nsuppliers (lower power density), and independent Chinese AI chip design houses, if HW gains a\nproprietary system-level performance advantage. This roadmap will likely have global impact,\nas non-Chinese players could also pursue this approach and geometry scaling simultaneously.\nChart 1 - Bottom-up System Design\n.\nSource: Jefferies\nChart 2 - Space Folding\n.\nSource: Jefferies\nChart 3 - Core Concept of П„ (Tau) Scaling\n.\nSource: Jefferies\nChart 4 - Face to Face Hybrid Bonding\n.\nSource: Jefferies\n \nPlease see analyst certifications, important disclosure information, and information regarding the status of non-US analysts on pagesВ  7В -В 12 of this report.\nВ *В Jefferies Hong Kong Limited\n--- з¬¬2йЎө ---\nTechnology\nEquity Research\nMay 28, 2026\n \nOn 2026 May 25, Huawei presented вҖңП„ (Tau) Scaling LawвҖқ at the IEEE International Symposium\non Circuits and Systems (ISCAS) 2026. The company turned their design strategy to a more\nholistic/top-down approach from a bottom up/lego-like approach, which the industry has\nbeen using for decades. The change/innovation is more on design methodology rather than\nmanufacturing technologies, so it offers the industry a way to pursue better performance without\naccessing the latest process node tech. Although there are still technological challenges to\novercome, the proposal already made a вҖңdimensionalвҖқ impact on computing, including AI, system\ndesign.\nВ \nChart 5 - П„ (Tau) Scaling\n.\nSource: Jefferies\nВ \nВ \nChart 6 - Core Concept of П„ (Tau) Scaling\n.\nSource: Jefferies\nВ \nВ \nВ \nHuawei first proposed вҖңП„ scalingвҖқ as the new metric to replace traditional вҖңgeometry scaling/\nMooreвҖҷs lawвҖқ to evaluate a new system. It is because while geometry scaling can lead to\ncomputing performance gain, it is not the only factor. Device shrink (geometry scaling), circuit\ndesign, chip design and system design improvement can all improve the performance of a compute\nsystem. From HuaweiвҖҷs perspective, as MooreвҖҷs law slows down, geometry shrink will create less\nincremental performance gain, so geometry scaling (such as x nm) can no longer be used as the\nonly proxy of performance. They believe time, which shows how fast a computation can be done,\nshould be the new metric of evaluating systems performance.\nВ \nВ \nThis concept is not entirely new. Due to geopolitical tension, Huawei has been trying to use\nbetter system design to overcome US restrictions that constrain their chip performance. However,\nin IC design, chip performance is usually balanced against other requirements, such as power\nefficiency, heat control, cost, reliability, and many more We believe Huawei, as one of the best chip\ndesign houses globally, clearly understands that. Thus, we see the announcement of this вҖңП„ ScalingвҖқ\nroadmap a declaration that Huawei would pursue higher chip performance at all costs.\nВ \nIn the presentation, Huawei used some examples to demonstrate how this new roadmap will be\nexecuted. Among all the examples, вҖңLogic-foldingвҖқ is the most eye-catching one.\nSci-Fi fans must be familiar with вҖңspace foldingвҖқ and вҖңwormholeвҖқ. A typical demonstration for space\nfolding is to draw two points on a paper. On a 2-dimensional paper, the closest distance of the\ntwo points is the straight line between the two. However, in a 3-dimensional space, the paper can\nbe folded so the two points overlap each other and the distance between them is practically zero.\nWhen moving from a lower dimension world to a higher one, space can be folded, and distance\ncan be shortened.\nВ \n \nPlease see important disclosure information on pages 7 - 12 of this report.\nThis report is intended for Jefferies clients only. Unauthorized distribution is prohibited.\n2\n--- з¬¬3йЎө ---\nTechnology\nEquity Research\nMay 28, 2026\n \nChart 7 - Space Folding\n.\nSource: Jefferies\nВ \nВ \nChip-performance is capped by the slowest part of the chip, which is determined by the distance\nbetween two connected transistors (because signal's travel time will be longer for longer distance).\nThe industry's term for the longest connection is вҖңcritical pathвҖқ. In other words, if engineers can\nshorten the вҖңcritical pathвҖқ, they can boost the performance of the chip. Traditionally, this can be\nachieved by:\n1.\nOptimizing Place & Route (P&R): It means cleverly placing all related transistors closer to\neach other to minimize critical path. This is one of the most critical functions of EDA tools.\n2.\nUsing more advanced node manufacturing tech: transistor size and wire lengths among them\nnaturally shrink as the chip migrates to more advanced node. In consequence, critical path\nalso naturally shortens.\nВ \nBoth methods aim to shorten critical paths in a two-dimensional (2D) space because modern\nвҖңchipвҖқ design is essentially a 2D design, where all transistors are placed on the same surface. If\nengineers have already done their best in P&R, traditionally, the only way to improve further is to\nadopt more advanced node. Therefore, the industry sees geometry scaling the proxy and metric of\nchip performance improvement.\nВ \nWith the holistic approach, Huawei argues that design engineers should only focus on the вҖңend\nperformance (П„)вҖқ instead of geometry scaling, which is just one of the factors that might lead to\nbetter performance. They transformed the 2D space in a chip into a three-dimensional (3D) space\nby stacking one chip on top of another. Just like folded paper we discussed above, the space is\nfolded, and the longest distance (critical path) is shortened. Hence the performance (П„) increases\nwithout any change in geometry scale.\nВ \nFor many tech investors, this may sound very similar to the 3D-IC concept that TSMC and Intel\nproposed long time ago. However, there are some significant differences.\nAn analogy for the differences is connecting two apartment units with one directly above the other\nto create a duplex. If you ask two interior design teams to work on each unit separately, there\nwould be some redundancies and suboptimal design between the two units. If a single team takes\na holistic view to design the entire duplex, the team will likely be able to utilize the entire space more\nefficiently by, for example, putting all bedrooms upstairs, and creating a bigger living room and also\na bigger kitchen downstairs.\nВ \nTSMCвҖҷs current chip-let/3D-IC approach is similar to the first approach. Each chip-let is self-\noptimized within its own and use very limited I/O ports to communicate with other chip-lets. In other\nwords, TSMC's job is only to build a staircase to connect the two floors. Each floor is designed\nby separate teams with possibly different objectives. However, Huawei wants to design the entire\nduplex with a unified approach and style\nВ \n \nPlease see important disclosure information on pages 7 - 12 of this report.\nThis report is intended for Jefferies clients only. Unauthorized distribution is prohibited.\n3\n--- з¬¬4йЎө ---\nTechnology\nEquity Research\nMay 28, 2026\n \nWe see three levels of 3D chip design:\n1. 3D Stacking (Current TSMC's SoIC solutions)\na. Each chip-let is a black box. Design engineers only know the I/O information about the chip.\nThe benefit of this is to allow multiple companies' IPs to co-exist in the same 3D chip.\nb. This is the least integrated solution.\nChart 8 - 3D Stacking\n.\nSource: Jefferies\nВ \n2. Co-simulation-level Logic Folding*\na. The box needs to share its model (gate level design Information) so that the other chip may\nuse this information to identify critical path.\nb. EDA tools still do the simulation separately in 2D chips and then optimize by identifying and\nshortening critical paths via vertical connections.\nc. This approach is less likely to allow collaboration as no design houses want to share their\nmodels (gate level design information), which are considered commercial secrets.\nd. The existing EDA tools already can achieve this. TSMC already provides PDK and EDA vendors\nuse TSMC's PDK to simulate TSV and related circuit. According to HuaweiвҖҷs paper, we believe\nthey are at this stage\nвҖҰ(жҲӘж–ӯ)", "n44": "### 2026-04-27-0700.HK-HSBC Global Investme-China Internet HSBC Global Investment Summit 2026 tour takea...-121648328.pdf  (жҖ»йЎөж•°=23)\n\n--- з¬¬1йЎө ---\nDisclosures & Disclaimer \nThis report must be read with the disclosures and the analyst certifications in \nthe Disclosure appendix, and with the Disclaimer, which forms part of it. \n  \n \nIssuer of report: The Hongkong and Shanghai \nBanking Corporation Limited, Singapore Branch \nView HSBC Global Investment Research at: \nhttps://www.research.hsbc.com \n                                          \n             \n                               \n   \n \nв—Ҷ We visited 6 companies under coverage and hosted online ads, \ngames, local services and other experts during a 3-day tour \nв—Ҷ AI investment and monetisation remain the core investor focus \nв—Ҷ Investor sentiment on local services improved on easing \ncompetition and ad vertical faces higher compliance costs \nOur thoughts and investor feedback: We like Alibaba for its to-B AI monetisation \npotential, and Tencent for its to-C AI monetisation potential and resilience from ads \nand games. Investors broadly share our positive view, especially Alibaba, although \nsome are cautious on the near-term to-C AI monetisation outlook. We like buy-rated \nFull Truck Alliance for its attractive valuation. Its earnings growth appears to be \nbottoming out and shareholder returns are improving. Investors have turned more \nconstructive on Meituan (MT) as quick commerce competition is easing and \nimproved unit economics (UE) in 1Q26 highlighted its moat in food delivery. Aside \nfrom the names above, Bilibili and PDD were among the most inquired about names \nfrom investors. Below are our 8-10 April tour takeaways. \nGames could continue to benefit from a rising paying ratio and ARPPU, back by \nmore customised live operations and better AI driven efficiencies. A favourable \npipeline - pet collection (Roco Kingdom: World), extraction shooter (Delta Force), and \nlife simulation (Animula Nook) вҖ“ could solidify TencentвҖҷs leadership in growth in 2026.  \nLocal services players are expected to focus more on profitability, as MT and \nDouyin are sourcing growth from diverging segments and subsidy intensity may only \nremain relatively high in dining. Competition in food delivery has stabilised, too. \nBeverage orders could pick up into the summer months, changing the dynamics \nagain but the long-term trend of continuous uplift in unit economics should continue \n(see page 5-7 for details).  \nAd market growth should see support from demand in AI short dramas, AI applications \nand incremental budgets released from lower iOS channel costs. However, overall \nindustry growth could see a 3ppt drag in 2026 due to higher compliance costs associated \nwith two tax-related policy changes: e-commerce tax and traffic acquisition cost tax. Short \nvideo platforms could see more impact. Companies such as Tencent and Xiaohonshu \n(XHS) are more insulated from the tax changes and should continue to gain share.  \nAI budget increase as a share of IT spend supported by productivity gains, run-cost \nreduction, and targeted revenue uplift suggest ample room for revenue growth in AI \nand Cloud. Performance typically eclipses cost in the initial model selection process, \nand it is unlikely that one model will fit all use cases. GPU resources remain scarce, \nsustaining potential price hikes. Competitive energy pricing could give Chinese \ncompanies a long-term edge.  \n27 April 2026\nCharlene Liu* \nHead of Internet and Gaming Research, Asia Pacific \nThe Hongkong and Shanghai Banking Corporation \nLimited, Singapore Branch \ncharlene.r.liu@hsbc.com.sg \n+65 6658 0615 \nRitchie Sun*, CFA \nAnalyst, Internet Research \nThe Hongkong and Shanghai Banking Corporation Limited \nritchie.k.h.sun@hsbc.com.hk \n+852 2822 4392 \nCharlotte Wei* \nAnalyst, Internet Research \nThe Hongkong and Shanghai Banking Corporation Limited \ncharlotte.wei@hsbc.com.hk \n+852 2996 6539 \nChristina Chen*, CFA \nAnalyst, Internet Research \nThe Hongkong and Shanghai Banking Corporation Limited \nchristina.z.chen@hsbc.com.hk \n+852 2822 2912 \n* Employed by a non-US affiliate of HSBC Securities (USA) Inc, and is \nnot registered/ qualified pursuant to FINRA regulations \nChina Internet \nEquities \nInternet Software & Services  \n \n \nChina \nHSBC Global Investment Summit 2026 tour takeaways\n--- з¬¬2йЎө ---\nEquities в—Ҹ Internet Software & Services \n27 April 2026\n2 \nExhibit 1: Summary of TPs and ratings of the stocks mentioned \nCompany \nBBG Ticker \nMkt Cap \n(USDbn) \nHSBC Rating \nCCY \nCMP Target Price Upside/down\nside \nTencent \n700 HK \n574.7 \nBuy \nHKD \n493.40 \n750.00 \n52.0% \nNetEase \nNTES US \n70.0 \nBuy \nUSD \n110.58 \n185.00 \n67.3% \nMeituan \n3690 HK \n65.0 \nBuy \nHKD \n82.45 \n104.00 \n26.1% \nAlibaba \nBABA US \n325.8 \nBuy \nUSD \n135.82 \n172.00 \n26.6% \nPinduoduo \nPDD US \n139.2 \nBuy \nUSD \n98.03 \n159.00 \n62.2% \nJD.com \nJD US \n42.6 \nBuy \nUSD \n30.27 \n35.00 \n15.6% \nKuaishou \n1024 HK \n24.2 \nBuy \nHKD \n43.70 \n65.00 \n48.7% \nBilibili \nBILI US \n7.5 \nBuy \nUSD \n22.25 \n30.00 \n34.8% \nFull Truck Alliance \nYMM US \n9.0 \nBuy \nUSD \n8.66 \n13.80 \n59.4% \nPerfect World * \n002624 CH \n4.9 \nBuy \nRMB \n17.12 \n30.00 \n75.2% \nSource: Bloomberg, LESG, HSBC estimates; priced as of 24 April 2026 (* based on HSBC Qianhai Securities estimates) \nGames \nWe hosted Kern Zhang (Team Lead of Account Management, GCR) and Abbie Li (Senior Sales \nDirector) from Sensor Tower and Mr. Xie (freelancer; former overseas market distribution and \noperations director at Mihoyo).  \nIndustry growth trend and drivers \nMr. Xie forecasts China games industry to grow at 7-10% y-o-y in 2026e, driven by higher \npaying ratio and ARPPU. Mr. Xie is more constructive on pet catching, extraction shooter, and \nlife simulation sub-segments, which he expects to drive overall industry growth this year (more \ndetails below). \nMr. Zhang notes that the global mobile games industry grew 8-10% y-o-y in 2025 in revenue, \nbut downloads only grew 2.5-3% y-o-y. This suggests users are less inclined to try new games, \nwhich also coincides with far fewer new game launches than 10 years ago. For PC and console \ngames, revenue in 2025 was 50% higher than 2021, but the market size remains small (c16-\n20% of the mobile game market). He notes three key growth opportunities: \nв—Ҷ Mini games: Tencent remains the leading distribution platform, but ByteDance is stepping \nup investment and team expansion.  \nв—Ҷ Games as a Service (GaaS): Mr. Zhang thinks customised live operations could emerge \nas a big opportunity. For example, despite classic gameplay, Kingshot, Last War: Survival \nGame, Infinite Borders and FWJ  now all offer personalised bonuses, promotions and \ndifficulty levels to each user, enhancing user retention and propensity to pay. He also notes \nthat in the US, Gossip Harbor: Merge & Story launches personalised promotions to users \naround payroll timelines, and adjusts prices for in-game items according to macroeconomic \nconditions so that users will not feel pressured to spend and eventually get burnt out by the \ngame. To differentiate going forward, we think it comes down to a companyвҖҷs ability to use \nAI to analyse in-game user data and make relevant recommendations. Both large and \nsmall-to-mid-sized game companies can benefit from this trend by leveraging third-party \ndata platforms to strengthen their data analytics capacity.  \nв—Ҷ Demographic shifts: Mr. Zhang notices a few interesting behavioural shifts: 1) Young \ngamers in Japan are more willing to pay for PvP titles, supporting the strong performance of \nValorant and Apex Legends; 2) games with вҖңwinning bigвҖқ potential (e.g., casino, extraction \nshooter) are able to win over younger users; 3) in China market, Black Myth: Wukong has \nattracted interest from older gamers who had not played games before.\n--- з¬¬3йЎө ---\n3 \nEquities в—Ҹ Internet Software & Services \n27 April 2026\nFavourable regulation \nMr. Zhang thinks the regulatory stance has turned more supportive. Regulators are encouraging \nlarge game companies to promote Chinese culture via expansion in overseas markets, building \non the success of Black Myth: Wukong. Small-and-mid-sized game companies have seen \nproportionately higher percentage of approved game licenses, allowing them to enjoy better \nmonetidation opportunities domestically.  \nObservations and thoughts by different genre \nAs discussed, Mr. Xie is more constructive on pet catching, extraction shooter and life simulation.  \nв—Ҷ Pet catching: The pioneer in this genre is PokГ©mon GO. Tencent launched Roco \nKingdom: World on 26 March under this vertical, with 60m+ pre-registrations, and strong \ninitial grossing performance. Mr. Xie believes it has strong potential in overseas markets, \ntoo. He also expects strong performance from the new launches such as Yimoo from \nFunplus and Honkai: Nexus Anima from Mihoyo, given encouraging testing feedback.  \nв—Ҷ Extraction shooter: Mr. Xie believes the success of Delta Force has proved that this genre \nis highly popular across demographics covering both younger and older players, as it also \nbenefits from promotion through TencentвҖҷs social network. Mr. Zhang notes that research \nshows younger players like extraction shooters, as they provide a sense of achievement \nand a taste of success, which have become harder to attain in real life. \nв—Ҷ Life simulation: Mr. Xie notes that Animula Nook from Tencent and Petit Planet from \nMihoyo have strong testing feedback, and both games leverage the social strengths of \nTencent and content-driven and storytelling strengths of Mihoyo, respectively. \nMr. Xie also discussed his thoughts and outlook on open-world games and SLG games, where \nhe expects stronger contenders in the pipeline.  \nв—Ҷ Open world - new launches: Mr. Xie believes TencentвҖҷs Honor of Kings: World benefits \nfrom the IP appeal of HoK (and therefore requires less marketing) and notes solid initial \nlaunch performance for the PC version (mobile version to come later in April). He believes \nPerfect World has leveraged the experience of making Tower of Fantasy and kept the R&D \ncost low for Neverness to Everness (NTE), allowing it to allocate more resources to \npromote the game and still maintain decent margin. Mr. Xie expects NetEase to launch \nAnanta in 4Q26. But he has a mixed expectation on the performance of the game, as the \nmobile experience has yet to be refined in the mobile version, which could affect its user \nbase and ability to cover substantial upfront R&D costs. On the other hand, he believes \nNetEaseвҖҷs Sea of Remnants could be a blockbuster in overseas markets (with a larger \ngrossing contribution than in China), given the unique gameplay and genre. \nв—Ҷ Competition in SLG games: Mr. Xie notes that SLG competition in China is very intense. \nGiven the high ARPPU nature of the genre, top-tier SLG games focus on acquiring and \nretaining whale users with customised services (e.g., private messages), making it difficult \nfor new entrants to acquire these users. However, SLG games can still grow well in \noverseas markets given lower ARPPUs, with various companies, such as Funplus and \nDiandian, having growth opportunities.  \nOpportunities and risks from AI in games \nOutside of GaaS, AI has also been widely adopted in many areas. According to Mr. Xie: 1) \nlocalisation (translation); 2) traffic acquisition and ad materials generation; 3) art design \n(covering 2D/3D assets), motion capture and voice-over generation; 4) coding; 5) project \nmanagement (e.g., data analysis and replacing part of the outsourcing work); 6) customer \nservice and personalised interactions with NPCs (e.g., Peacekeeper Elite and Where Winds \nMeet). He believes AI adoption can lead to layoffs across the industry.\n--- з¬¬4йЎө ---\nEquities в—Ҹ Internet Software & Services \n27 April 2026\n4 \nMr. Xie also believes larger players tend to have an advantage, as they develop and use their \nproprietary foundation models. Small-to-mid-sized players rely on open-weight models and need \nto spend extra time and resources to fine-tune the models for their\nвҖҰ(жҲӘж–ӯ)", "n45": "### 2026-06-02-BofA Global Research-Internete-Commerce May app data Mixed bag for Online medi...-122359248.undefined.pdf  (жҖ»йЎөж•°=15)\n\n--- з¬¬1йЎө ---\nBofA Securities does and seeks to do business with issuers covered in its research \nreports. As a result, investors should be aware that the firm may have a conflict of \ninterest that could affect the objectivity of this report. Investors should consider this \nreport as only a single factor in making their investment decision. \nRefer to important disclosures on page 13 to 15.  \n12980218 \n \n \nInternet/e-Commerce \nMay app data: Mixed bag for Online media, \ndelivery decelerates, & AI apps strong \nIndustry Overview \n   \n \n \nMay app trends: big eCommerce consolidates DAUs \nWe track monthly global mobile app DAUs and downloads per Sensor Tower to gauge \nuser trends across top subsectors including social media, eCommerce, subscription \nservices, and travel.  For May, Online Media DAU trends were mixed, with Facebook \nDAUs decelerating and Pinterest accelerating.  DAU growth for Amazon accelerated \nwhile many smaller platforms slowed, possibly reflecting a shift toward value as inflation \nincreases.  Delivery DAUs decelerated, with Uber Eats an exception. AI app DAUs mostly \nslowed, but y/y growth was still strong; ChatGPT was up 68%, Gemini grew 320%, and \nMeta AI was up 1,300%, while Claude growth accelerated to over 1,300%. \nOnline Media: Mixed May DAU trends, Pinterest best m/m \nFacebook DAUs contracted 4% y/y in May, a modest deceleration from -2% y/y in Apr, \nwhile Instagram DAU growth of 4% y/y accelerated 1ppt m/m. YouTube DAUs were \nstable (at flat y/y) and DLs slowed to +2% y/y. Snap DAUs grew a stable 3%, while DLs \ndeclined 7% (6ppt decel). Pinterest DAUs grew 14% y/y (4ppt accel) and DLs increased \n2% y/y (4ppt decel).  Reddit DAUs declined 1% (stable m/m), and DLs declined 37% (y/y \ncomps get easier next month). Roblox DAU growth slowed 4ppts to +9%. Google DAUs \ngrew a stable 12% y/y, with DLs declining 8% y/y (an 8ppt decel vs Apr). \neComm: Amazon, Wayfair, and Carvana outperform m/m \nAmazon DAU growth of 4% y/y in May accelerated 1ppt from Apr, while DL growth of \n4% was stable.  eBay DAUs declined 2% y/y (3ppt decel m/m). Etsy DAUs grew 6% y/y \n(6ppt decel from Apr), while DLs contracted 18% (9ppt decel).  Chewy DAUs grew 17% \ny/y, a 20ppt decel. from Apr, while DL trends slowed 9ppts to -20% y/y.  Wayfair DAUs \ngrew 4% y/y, accelerating 8ppts on 21ppt easier comp.  Carvana DAU growth \naccelerated to 24% y/y (from 20% in Apr), also on an easier comp. \nGig: Uber relatively stable at +10%, Dash/Cart decelerates \nUber DAUs grew 10% y/y, a modest decel. of 1ppt from April, while DL growth of 10% \nslowed 2ppts.  Lyft DAUs/DLs were -2%/-1% y/y (1ppt accel/decel).  Waymo DAUs \ngrew a stable 43% y/y.  DoorDash DAUs growth of 6% y/y slowed 2ppts from Apr, will \nDLs fell 8% y/y, also a 2ppt decel.  Uber Eats DAUs were +3% y/y in May (3ppt accel), \nwith DLs up 4% (6ppt accel).  Instacart DAUs declined 5% y/y (4ppt decel) and DLs \nwere down 6% y/y (4ppt accel from April). \nTravel & Other: DAU growth for ABNB/BKNG accelerates \nBooking y/y DAUs grew 4% y/y in May (1ppt accel from Apr) while DLs were flat y/y \n(7ppt decel).  Expedia DAUs grew 4% y/y, a 1ppt decel, while DLs declined 33% y/y \n(stable m/m). Airbnb DAUs/DLs grew 11%/30%, an acceleration of 2ppts/7ppts from \nApril.  Vrbo DAU growth decelerated 1ppt to 12%. Duolingo DAU growth of 11% \naccelвҖҷd 1ppt m/m. StubHub DAUs grew 26% y/y, accelerating 28ppts from Apr, while \nVivid Seats DAUs declined 3%, decelerating 6ppts m/m. \n02 June 2026   \nEquity \nUnited States \nJustin Post \nResearch Analyst \nBofAS \n+1 415 676 3547 \njustin.post@bofa.com \nMichael McGovern \nResearch Analyst \nBofAS \nmmcgovern@bofa.com \nOmar Dessouky, CFA \nResearch Analyst \nBofAS \nomar.dessouky@bofa.com \nNafeesa Gupta \nResearch Analyst \nBofAS \nnafeesa.gupta@bofa.com \nNitin Bansal, CFA \nResearch Analyst \nBofAS \nnbansal7@bofa.com \nSteven McDermott \nResearch Analyst \nBofAS \nsteven.mcdermott@bofa.com \nHarvey Qin \nResearch Analyst \nBofAS \nhuiyu.qin@bofa.com \nDAU: Daily Active User \nDL: Download \nOTA: Online Travel Agency \nAccessible version \nTimestamp: 02 June 2026 03:00AM EDT\nCR\n--- з¬¬2йЎө ---\n2 \nInternet/e-Commerce | 02 June 2026 \n \n \n Mobile app data update \nSensor Tower DAU & Download estimates combine App Store & Google Play data \nprovided by Publisher & Developer partnerships, as well as signals from the stores to \nbackfill non-partner data. Sensor Tower has data sharing partnerships with Publishers & \nDevelopers that collectively represent 50%+ of all App Store revenues. We have \naggregated this data to gauge potential user & usage trends. Sensor Tower regularly \nrevises their Active User & Download estimates.  Per Sensor Tower, these revisions \nare expected to improve estimate measurements for apps. \nSnap \nPer Sensor Tower, global Snap DAUs were 395mn in May, growing 3.0% y/y and slowing \na modest 20bps from April.  Since March, DAUs are up 2mn to 395mn. Gross downloads \ndeclined 7% y/y to 29mn in April, decelerating from -1% y/y in April. \nExhibit 1: Snap DAUs were 395.3mn in May \nSnap Worldwide DAUs (mn) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \nExhibit 2: Snap DAUs grew 3.0% y/y in May \nSnap Worldwide DAUs (Y/Y) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \n \nExhibit 3: Snap downloads were 28.8mn in May \nSnap Gross Downloads (mn) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \nExhibit 4: Snap downloads declined 7.4% y/y in May \nSnap Gross Downloads (Y/Y) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \n \nPinterest \nGlobal Pinterest DAUs were 209mn in May, growing 14% y/y and accelerating 4ppts \nfrom April.  Since March, DAUs are up 10mn to 209mn.  Gross downloads grew 2% y/y to \n20mn in May, decelerating from 6% y/y in April. \n0\n50\n100\n150\n200\n250\n300\n350\n400\n450\n0%\n10%\n20%\n30%\n0\n15\n30\n45\n-50%\n-25%\n0%\n25%\n50%\n75%\n100%\n125%\n150%\nCR\n--- з¬¬3йЎө ---\nInternet/e-Commerce | 02 June 2026\n3\n \n \nExhibit 5: Pinterest DAUs were 208.7mn in May \nPinterest Worldwide DAUs (mn) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \nExhibit 6: Pinterest DAUs grew 14% y/y in May \nPinterest Worldwide DAUs (Y/Y) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \n \nEx
