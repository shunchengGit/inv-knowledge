<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --accent:#3b82f6;--hover:#f1f5f9;--radius:8px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
}
body{
  font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  color:var(--text);background:var(--bg);display:flex;flex-direction:column;height:100vh;
}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
}
.brand{display:flex;align-items:baseline;gap:8px}
.brand strong{font-size:15px}
.brand .muted{font-size:12px;color:var(--muted)}
.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.controls input{width:180px;font-size:13px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;outline:none;transition:border-color .15s}
.controls input:focus{border-color:var(--accent)}
.controls button,.controls select{
  font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface);cursor:pointer;transition:all .15s;
}
.controls button:hover,.controls select:hover{background:var(--hover)}
.controls button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Chips */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{
  font-size:11px;padding:3px 10px;border-radius:12px;border:1.5px solid var(--border);
  background:var(--surface);cursor:pointer;transition:all .15s;user-select:none;
  display:inline-flex;align-items:center;gap:5px;
}
.chip::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--chip-color,#94a3b8)}
.chip:hover{background:var(--hover)}
.chip.active{color:#fff;border-color:transparent;background:var(--chip-color,#3b82f6)}
.chip.active::before{background:#fff}
.chip[data-all]::before{display:none}

/* ── Main ── */
main{display:flex;flex:1;min-height:0}
#graph-panel{flex:1 1 55%;display:flex;flex-direction:column;min-width:0;position:relative;background:var(--surface);border-right:1px solid var(--border)}
#graph{flex:1;position:relative}
#table-view{flex:1;overflow-y:auto;display:none;padding:0}
#table-view.active{display:block}
#detail{flex:0 0 45%;overflow-y:auto;padding:20px 24px;background:var(--surface)}
#detail-content{display:block!important}
#detail-content[hidden]{display:none!important}

.view-toggle{position:absolute;top:8px;right:8px;z-index:20;display:flex;gap:4px}
.view-toggle button{
  font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;
  background:var(--surface);cursor:pointer;
}
.view-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.graph-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;
  text-align:center;color:var(--muted);font-size:14px;pointer-events:none;
}
.graph-hint b{color:var(--text)}

/* ── Table ── */
.entry-table{width:100%;border-collapse:collapse;font-size:13px}
.entry-table thead{position:sticky;top:0;z-index:1;background:var(--surface)}
.entry-table th{
  text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);
  color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer
}
.entry-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.entry-table tr{cursor:pointer;transition:background .1s}
.entry-table tr:hover{background:var(--hover)}
.entry-table td.title{font-weight:500}
.entry-table td.type{font-size:11px}
.entry-table td.desc{color:var(--muted);font-size:12px;max-width:300px}

/* ── Detail ── */
#detail-empty{text-align:center;margin-top:80px}
.detail-header{margin-bottom:14px}
.detail-header h1{font-size:18px;margin:6px 0 4px;font-weight:600;line-height:1.3}
.type-badge{
  display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;
  font-size:11px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.5px;
}
dl.meta{display:grid;grid-template-columns:70px 1fr;gap:6px 12px;margin:10px 0 16px;font-size:13px}
dl.meta dt{color:var(--muted);font-weight:500}
dl.meta dd{word-break:break-all}
dl.meta a{color:var(--accent)}
.tag{display:inline-block;padding:1px 8px;margin:0 4px 4px 0;border-radius:4px;background:var(--hover);color:#475569;font-size:11px}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}

#detail-body{font-size:13px;line-height:1.7}
#detail-body h1{font-size:17px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
#detail-body h2{font-size:15px;margin:16px 0 8px}
#detail-body h3{font-size:13px;margin:12px 0 6px}
#detail-body p{margin:8px 0}
#detail-body code{background:var(--hover);padding:1px 5px;border-radius:3px;font-size:12px;font-family:ui-monospace,monospace}
#detail-body pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:var(--radius);overflow-x:auto;font-size:12px}
#detail-body pre code{background:transparent;color:inherit;padding:0}
#detail-body ul,#detail-body ol{padding-left:22px;margin:8px 0}
#detail-body li{margin:3px 0}
#detail-body table{border-collapse:collapse;margin:10px 0;font-size:12px}
#detail-body th,#detail-body td{border:1px solid var(--border);padding:5px 10px}
#detail-body blockquote{border-left:3px solid var(--border);margin:10px 0;padding:4px 14px;color:var(--muted)}
#detail-body img{max-width:100%;border-radius:var(--radius)}
#detail-body a{color:var(--accent)}

#detail-backlinks{margin-top:20px}
#detail-backlinks h2{font-size:13px;color:var(--muted);margin-bottom:8px}
#detail-backlinks ul{padding-left:18px}
#detail-backlinks li{margin:3px 0}
#detail-backlinks a{color:var(--accent);cursor:pointer}

/* Stats bar */
.stats-bar{
  position:absolute;bottom:10px;left:14px;right:14px;z-index:10;
  display:flex;gap:16px;font-size:11px;color:var(--muted);
  pointer-events:none;
}
.stats-bar span{display:inline-flex;align-items:center;gap:4px}
.stats-dot{width:6px;height:6px;border-radius:50%}
.legend{position:absolute;top:10px;left:14px;z-index:10;display:flex;gap:12px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.legend-item{display:inline-flex;align-items:center;gap:4px}

/* Connectivity badge */
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.badge-warn{background:#fef3c7;color:#92400e}
.badge-ok{background:#d1fae5;color:#065f46}
</style>
</head>
<body>
<header>
  <div class="brand">
    <strong>🧠 知识图谱</strong>
    <span class="muted">94 节点 · 102 关联</span>
    <span class="badge badge-warn" id="conn-badge">102 关联, 58 孤立</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="搜索..."><span class="muted" id="filter-count" style="width:50px"></span>
    <select id="layout">
      <option value="cose">力导向</option><option value="concentric">同心圆</option>
      <option value="breadthfirst">层级</option><option value="circle">环形</option><option value="grid">网格</option>
    </select>
    <button id="reset">↺</button>
  </div>
  <div class="chip-row" id="type-chips" style="flex-basis:100%;padding-top:4px">
    <span class="chip active" data-all style="font-weight:500">全部</span>
  </div>
</header>
<main>
  <section id="graph-panel">
    <div class="view-toggle">
      <button data-view="graph" class="active">◉ 图谱</button>
      <button data-view="table">☰ 列表</button>
    </div>
    <div id="graph">
      <div class="graph-hint" id="graph-hint" hidden>
        <b>🔗 暂无关联</b><br><span style="font-size:12px">导入时为条目添加交叉引用，图谱将显示关联连线</span>
      </div>
      <div class="legend" id="legend"></div>
    </div>
    <div id="table-view"><table class="entry-table"><thead><tr><th>条目</th><th>描述</th></tr></thead><tbody id="table-body"></tbody></table></div>
  </section>
  <section id="detail">
    <div id="detail-empty" class="muted">◀ 点击节点或列表项查看详情</div>
    <article id="detail-content">
      <header class="detail-header">
        <span class="type-badge" id="detail-type"></span>
        <h1 id="detail-title"></h1>
      </header>
      <dl class="meta">
        <dt>描述</dt><dd id="detail-description"></dd>
        <dt>来源</dt><dd id="detail-resource"></dd>
        <dt>标签</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>↩ 被引用</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>

 EUV层数增加，ASML预估DRAM成为最大终端市场\n- **High-NA产品即将面世**：数月内将有High-NA生产的产品可用，客户接近HVM ready\n- **吞吐量路线图**：E工具（220wph）今年主流，F工具（260wph）明年起量，长期目标300-500wph\n- **浸没式DUV需求强劲**：2025年水平将重现，H2更强劲\n- **评级Overweight**，目标价€1,515（ADR $1,813）\n\n## 标签\nASML, EUV光刻, DRAM, High-NA, 半导体设备, analysis-dimension:业绩展望, time:2026Q2\n\n## 关联\n- [ASML首选股：三大驱动因素](entries/ASML首选股：三大驱动因素.md)\n- [ASML深度分析：High-NA EUV采用时间线调整](entries/ASML深度分析：High-NA-EUV采用时间线调整.md)", "n1": "# ASML 分析：两种孔径的故事——High-NA与Low-NA的博弈\n\n**报告来源：** BNP Paribas（2026-05-11）\n\n## 描述\nBNP Paribas于2026年5月11日发布ASML研究报告，题为\"两种孔径的故事\"（A Tale of Two Apertures），评级Outperform，目标价€1,550（ADR $1,850）。报告详细分析了ASML在High-NA与Low-NA EUV光刻技术之间的市场动态，认为ASML凭借超过80%的光刻机市场份额，将持续受益于半导体制造复杂度的提升。\n\n## 摘要\nBNP Paribas认为ASML作为全球最大的光刻机供应商（市占率超80%），在半导体制造中扮演关键角色。2025年ASML营收区域分布为：中国29%、台湾26%、韩国25%、美国13%、日本4%。公司业务75%来自系统销售，25%来自服务/现场选项。BNPP给出2026-30E EPS预测为€33.74/€49.30/€55.32/€64.40/€69.85，远期P/E从39.1x（2026E）降至18.9x（2030E）。\n\n## 关键要点\n- **评级Outperform**，目标价€1,550（ADR $1,850），较当前股价有17%上行空间\n- **营收强劲增长**：2026E营收€399亿，2027E €497亿，2028E €578亿\n- **毛利率持续扩张**：预计从2025年的约35%提升至2028年约44%\n- **EPS预测**：2026E €33.74 → 2028E €55.32 → 2030E €69.85\n- **FCF收益率**：2026E仅0.8%，但到2030E提升至5.0%\n- **EV/EBITDA估值**：从2026E的30.9x下降至2030E的13.8x\n\n## 标签\nASML, EUV光刻, 半导体设备, analysis-dimension:估值分析, time:2026Q2\n\n## 关联\n- [ASML深度分析：High-NA EUV采用时间线调整](entries/ASML深度分析：High-NA-EUV采用时间线调整.md)", "n2": "# ASML 深度分析：High-NA EUV 采用时间线调整，Low-NA 推动盈利上调\n\n**报告来源：** BofA Global Research（2026-05-07）\n\n## 描述\nBofA 在2026年5月7日发布ASML深度报告，认为High-NA EUV的采用将以DRAM为先、台积电最晚（A10节点约2032年），Low-NA EUV出货量上调至2026/27/28年65/85/87台（此前62/81/75），EPS上调2.8-14.5%至€33.2/€46.5/€58.1。目标价上调至€1,710（30x CY27E EV/EBITDA），重申买入/首选股评级。\n\n## 摘要\nASML的High-NA EUV光刻技术虽然光学性能优越，但拼接（stitching）和设计技术协同优化（DTCO）重置使得平台代工厂在经济上不具吸引力。BofA通过自下而上的客户模型分析，认为DRAM供应商将成为High-NA的早期采用者（2028年起），而台积电预计到A10节点（~2032年）才会采用。Low-NA EUV仍然是ASML的主要盈利驱动力，受先进逻辑AI相关计算和DRAM EUV层数增加的推动。BofA测算2030年EPS敏感性区间为€66-€92，中点为€78。\n\n## 关键要点\n- **High-NA采用路径**：DRAM优先（三星/SK海力士2028年），英特尔和三星代工其次，台积电最晚（~2032年A10节点）\n- **Low-NA出货量上调**：2026E/27E/28E从62/81/75台上调至65/85/87台，DRAM EUV强度持续上升\n- **盈利预测上调**：2026-28E EPS上调2.8-14.5%至€33.2/€46.5/€58.1，高于共识3-20%\n- **目标价€1,710**：基于30x CY27E EV/EBITDA，EBITDA CAGR 2025-28E约29%\n- **2030年情景分析**：EPS范围€66-€92（中点€78），ASML无需High-NA加速即可实现强劲增长\n- **关键风险**：High-NA采用延迟、毛利率低于预期、半导体资本支出放缓、中国出口限制\n\n## 标签\nASML, EUV光刻, High-NA, 半导体设备, analysis-dimension:EUV技术路线, time:2026Q2\n\n## 关联\n- [台积电BofA-技术路线图-A13更新-重申Outperform](entries/台积电BofA-技术路线图-A13更新-重申Outperform.md)", "n3": "# ASML首选股：三大驱动因素——产能、存储器与High-NA\n\n**报告来源：** UBS Equities（2026-05-19）\n\n## 描述\nUBS于2026年5月19日发布报告，重申ASML为首选股，提出三大买入理由：产能瓶颈担忧被夸大、存储器曝光度提升以及High-NA故事未完。上调2027/28E EPS 9%/20%（高于共识15-20%），目标价从€1,600上调至€1,900。预计2027 EUV收入同比+37%，2028年+10%。\n\n## 摘要\nUBS认为ASML产能瓶颈担忧被夸大——ASML 2027年实际理论最大产能可超100台EUV（已沟通超80台），而需求增长仅约25-30%。ASML目前是半导设备股中存储器曝光度最高的公司（~30-35%收入来自存储器，2026年），存储器资本支出强度（litho/WFE）从2020年11%升至2025年约15%，预计2027/28E达15-20%。High-NA虽在台积电采用延迟，但可在关键层提供20-40%成本节省，且可通过替换多重图案化（如SAQP）释放超过100%的产能增益。UBS DCF估值€1,900，隐含2027E P/E 39.2x。\n\n## 关键要点\n- **产能远超需求**：ASML 2027年产能支持>50%领先边缘晶圆产出增长，而需求仅~25-30%\n- **存储器曝光度最高**：ASML存储器收入CAGR 2020-25为23%（同业~6%），DRAM EUV层数从1b到1c增加~30% die/wafer\n- **High-NA价值巨大**：1次High-NA曝光+个位数工艺步骤可替换3次Low-NA曝光+40个步骤\n- **EUV收入预测调整**：2027E同比+37%（此前26%），2028E同比+10%（此前-1%）\n- **DRAM EUV自下而上模型**：三星、SK海力士、美光各客户EUV采用路径详细分析\n- **目标价€1,900**：基于DCF估值，上行情景€2,216（2027E EPS €55.8）\n\n## 标签\nASML, EUV光刻, 存储器, High-NA, 半导体设备, analysis-dimension:产能分析, time:2026Q2\n\n## 关联\n- [ASML深度分析：High-NA EUV采用时间线调整](entries/ASML深度分析：High-NA-EUV采用时间线调整.md)\n- [ASML分析：两种孔径的故事](entries/ASML分析：两种孔径的故事.md)", "n4": "# Asia Pacific Equity Research\n\n**机构**: JPMorgan | **类别**: 行业研究-AI | **期间**: 2026-Q2\n\n## 摘要\n\n- Energy’s previous announcement on MAS with hyperscalers, we believe these\n- batteries to DTE Energy. This is in line with our key takeaways from the expert call\n- highlight key OW-rated names under J.P. Morgan APAC coverage: CATL-H/A,\n- Key takeaways from the AIDC ESS developments: We have seen a few positive\n\n## 关键要点\n\n- Ong) also announced that it has signed a $1.6bn contract to supply 6GWh of ESS\n\n## 关联\n\n- 行业: 行业研究-AI\n- 机构: JPMorgan\n- 期间: 2026-Q2", "n5": "# BNP Paribas: SK HYNIX — Enhanced AI Memory Leadership; Less Concern on Oversupply\n\n**报告日期**: 2026-04-23 | **券商**: BNP Paribas | **分析师**: Alex Chang, Scarlett Ge, Gwen Wang  \n**评级**: Outperform (维持) | **目标价**: KRW 2,000,000（上调自 KRW 1,590,000）| **涨幅**: +63%\n\n## 摘要\nBNP Paribas维持SK海力士Outperform，上调目标价26%至KRW 2,000,000。1Q26营收创历史新高KRW 52.6tn（+60% q-q/+198% y-y），OP KRW 37.6tn（OPM ~72%）。DRAM ASP中60%+/NAND ASP中70%+大幅增长，HBM4E预期>50%份额（TSMC base-die合作+1cnm技术优势）。产能扩张有纪律（龙仁Cluster灵活分期），净现金KRW 35tn。主要风险：Capex激增和通用服务器需求疲弱。\n\n## 关键要点\n- 1Q26营收创历史新高KRW 52.6tn（+60% q-q/+198% y-y），OP KRW 37.6tn（OPM ~72%）\n- DRAM ASP中60%+增长，NAND ASP中70%+增长\n- HBM4E预期>50%份额：与TSMC base-die合作 + SK海力士1cnm DRAM技术\n- HBM4E样品2H26，目标2027量产\n- 净现金KRW 35tn，负债权益比降至12%\n- 产能扩张有纪律，龙仁Cluster灵活分期降低供应过剩风险\n- 目标价KRW 2,000,000（基于3x 2027E BVPS），较保守\n- 龙仁 Cluster Phase 1 洁净室提前 3 个月至 2027 年 2 月完工\n- Phase 2-6 建设节奏视市场状况灵活调整\n- 偏好灵活性，考虑中长期需求可见性和优化的 LTA 条款\n- 321L NAND 目标年底占国内 NAND 生产 50%（全球 30%）\n\n### 内存优化技术不构成威胁\n- BNP 认为内存优化技术（如 Google TurboQuant）旨在提升 AI 服务的经济性，最终扩大 TAM\n- 例证：Google TPU 8t/8i HBM3E 容量仍从 192GB 增至 216/288GB\n\n### 其他要点\n- 专注高密度服务器模组和 321L SSD\n- ADR 注册文件已提交 SEC，目标年内上市\n- 关键材料供应链已多元化（氦气/溴/钨）\n- 目标净现金 KRW 100tn 确保穿越周期投资\n\n## 关键财务预测\n\n| 指标 | 2025A | 2026E | 2027E | 2028E |\n|------|-------|-------|-------|-------|\n| 营收 (KRW bn) | 97,147 | 281,119 | 288,082 | 272,664 |\n| Adj. EBITA (KRW bn) | 47,206 | 211,335 | 199,806 | 172,820 |\n| Adj. EPS (KRW) | 60,403 | 256,038 | 235,214 | 210,352 |\n| ROCE (%) | 35.7 | 112.1 | 95.6 | 74.0 |\n| P/E (x) | 5.1 | 4.8 | 5.2 | 5.8 |\n\n## 估值\n- TP KRW 2,000,000 = 3x 2027E BVPS（不变）\n- 目标 P/B 基于 2027E ROE 44% + CoE 14.7%（beta 2.0x, RFR 3.7%, ERP 5.5%）\n- EPS 上调 56%/25%/14%（2026/27/28），主因 ASP 和 GPM 上修\n\n## 关联\n- [JPMorgan: SK hynix LTA paves path for new valuati  目标 P/B 从 2.4x 上调至 2.8x（历史峰值）\n- 即使目标价，隐含 P/E 仅 7x 2027/28E 平均 EPS\n- OP 预测比 Bloomberg 共识高 9-13%（2027-28E）\n\n## 关键财务预测\n\n| 指标 | 2025A | 2026E | 2027E | 2028E |\n|------|-------|-------|-------|-------|\n| 营收 (KRW bn) | 97,147 | 328,665 | 475,836 | 563,132 |\n| EBITDA (KRW bn) | 61,136 | 288,195 | 418,350 | 447,138 |\n| OP (KRW bn) | 47,206 | 264,565 | 387,653 | 407,145 |\n| HSBC EPS (KRW) | 62,330 | 287,363 | 421,807 | 443,537 |\n| P/E (x) | 30.2 | 6.5 | 4.5 | 4.2 |\n| ROE (%) | 44.2 | 90.7 | 64.0 | 41.6 |\n| EV/EBITDA (x) | 21.7 | 4.2 | 2.4 | 1.8 |\n\n## 风险\n- 美国高利率（neo-CSP 和 OpenAI 依赖融资）\n- 存储器厂商产能激进扩张\n- 中东地缘冲突\n\n## 关联\n- [Macquarie: SK Hynix — Giddy profit growth at a low PE multiple, raise TP to KRW 2.9M](entries/Macquarie-SK-Hynix-Giddy-profit-growth-at-a-low-PE-multiple.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(23): to, tp, rw, pr\n- [JPMorgan: SK hynix LTA paves path for new valuation framework, raising PT to W3M](entries/JPMorgan-SK-hynix-LTA-paves-path-for-new-valuation-framework-raising-PT-to-W3M.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(17): sk, is, ix, es\n- [Nomura: SK Hynix 1Q26 earnings beat; LTAs to make profitability sustainable](entries/Nomura-SK-Hynix-1Q26-earnings-beat-LTAs-to-make-profitability-sustainable.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(17): sk, ix, to, in\n- [BNP Paribas: SK HYNIX — Enhanced AI memory leadership, less concern on oversupply](entries/BNP-Paribas-SK-HYNIX-Enhanced-AI-memory-leadership-less-concern-on-oversupply.md) — 共享标签: 2026-Q1, valuation, sk-hynix; 同标的: sk-hynix; 共同关键词(19): es, ri, 2026, yn", "n19": "--- page 1 ---\nAsia Pacific Equity Research\n13 May 2026\nJ P M O R G A N\nwww.jpmorganmarkets.com\nHengrui\nA record-setting US$15.2bn multi-asset global alliance, \nstrengthening Hengrui’s shift from licensor to strategic \nco-creator\nThis material is neither intended to be distributed to Mainland China investors nor to provide securities investment consultancy services within the \nterritory of Mainland China. This material or any portion hereof may not be reprinted, sold or redistributed without the written consent of J.P. Morgan.  \nHealthcare\nYang Huang AC\n(852) 2800 3812\nyang.huang@jpmorgan.com\nJ.P. Morgan Securities (Asia Pacific) Limited/ J.P. \nMorgan Broking (Hong Kong) Limited\nEric Zhao, CFA\n(86-21) 6106 6256\neric.zhao@jpmorgan.com\nSAC Registration Number: S1730524050001\nJ.P. Morgan Securities (China) Company Limited\nDerek Choi\n(852) 2800-8744\nderek.c.choi@jpmorgan.com\nJ.P. Morgan Securities (Asia Pacific) Limited/ J.P. \nMorgan Broking (Hong Kong) Limited\n 600276.SS, 600276 CH  \n Overweight  \n Price (12 May 26):  Rmb56.11  \n Price Target (Dec-26):  Rmb70.00  \n 1276.HK, 1276 HK  \n Neutral  \n Price (12 May 26):  HK$69.25  \n Price Target (Dec-26):  HK$70.00  \n \n \n \n \nHengrui announced a global strategic collaboration and licensing agreement with \nBristol-Myers Squibb (BMS) yesterday (May 12), covering 13 early-stage projects \nspanning oncology, hematology, and immunology, with a potential total \ntransaction value of up to US$15.2bn. This represents Hengrui’s largest BD \ntransaction to date and is the second-largest China pharma out-licensing deal by \ntotal deal size — behind only AstraZeneca’s US$18.5bn licensing agreement with \nCSPC signed earlier in 2026. The deal also marks a meaningful strategic step-up \nfrom Hengrui’s prior landmark deal with GSK in 2025 (total deal size up to ~US\n$12bn), which management described on yesterday’s investor call as the deal that \nvalidated the Chinese pharma-MNC alliance model; the BMS transaction builds \non that foundation by introducing Co-Co optionality and joint early-stage \ndiscovery that the GSK deal did not include. We see the capital markets reacted \ndecisively: H-shares surged as much as 15% intraday before settling at \napproximately +4.8% on the announcement (vs. HSHCI: -0.5%), while A-shares \nalso gained 5% (vs. CSI Healthcare -0.5%). The deal is subject to US HSR antitrust \nclearance, with closing expected in 3Q26. We believe this deal not only showcases \nHengrui’s comprehensive and deep early pipeline, but also once again confirms \nthat China's innovative drug industry has differentiated drug discovery and early-\nstage clinical development capabilities, valued by MNC pharma companies. The \ndeal suggests BMS is not concerned about the news that the US House has asked \nthe FDA to not consider clinical data from China for IND (investigational new \ndrug) applications (see our note). We expect more similar deals could occur \nbetween China biotech/pharma and MNCs in the future. We reiterate our OW/N \nratings for Hengrui’s A/H shares.\n•\nThe collaboration is organized into three modules, with the earliest P&L \ncontribution expected in 4Q26. Module 1 consists of four Hengrui-originated \noncology and hematology assets with FIC (first-in-class) or BIC (best-in-\nclass) potential, for which BMS acquires exclusive ex-Greater China \ndevelopment, manufacturing, and commercialization rights. Module 2 \nconsists of four BMS-originated immunology assets, also carrying FIC/BIC \nprofiles, for which Hengrui receives exclusive Greater China rights. Module \n3 consists of five wholly new co-developed projects to be built from scratch on \nHengrui’s proprietary technology platforms, with both parties jointly selecting \ntargets, designing R&D plans, and sharing development responsibilities from \nthe discovery stage onward. Hengrui additionally retains Co-Co optionality: \nthe right to elect into co-development on selected assets and participate in co-\ncommercialization within BMS territories, providing potential upside \neconomics beyond milestone payments and royalties (although mgmt. has not \ndisclosed which assets might be developed under the Co-Co structure). \nFinancially, BMS will pay up to US$950mn in near-term consideration — \nincluding a US$600mn upfront, an unconditional first-anniversary payment of \nUS$175mn payable in 2027, and a conditional second-anniversary payment of \nSee page 5 for analyst certification and important disclosures, including non-US analyst disclosures.\n--- page 2 ---\n2\nYang Huang AC\n(852) 2800 3812\nyang.huang@jpmorgan.com\nAsia Pacific Equity Research\n13 May 2026\nJ P M O R G A N\nUS$175mn in 2028 — plus up to US$14.3bn in development, regulatory, and \ncommercialization milestones, and tiered royalties on BMS-territory net sales reaching \nup to double-digits. On revenue recognition, management confirmed the treatment \nmirrors the GSK deal: the US$600mn upfront will be allocated across all 13 projects by \nrelative fair value, with each project’s allocated portion recognized progressively in line \nwith that project’s individual R&D completion progress — producing a multi-year \nincome tail rather than a front-loaded lump sum, with the earliest P&L contribution \nexpected in 4Q26. The two anniversary payments follow an identical per-project \nallocation and milestone-progress recognition framework. More granular disclosure will \nappear in the 1H26 semi-annual report.\n•\nThe deal is structured to extract the complementary strengths of both parties and \ncould drive further globalization for Hengrui as its first co-co deal. For Hengrui, the \ntransaction monetizes its pre-clinical pipeline at a significant valuation, provides direct \naccess to BMS’s three proprietary discovery platforms — targeted protein degradation, \ncell therapy, and radioligand therapy — through the co-development module, and it \nbrings four BMS immunology assets into Hengrui’s China portfolio, selected specifically \nfor their mechanistic complementarity with Hengrui’s existing immunology pipeline. \nThe Co-Co structure further gives Hengrui access to BMS’s global clinical and \ncommercial infrastructure, enabling the company to build global development \ncapabilities. Management described this arrangement as providing hands-on exposure to \nleading international standards in clinical development, regulatory strategy, and \ncommercial execution. For BMS, the collaboration provides efficient access to one of \nChina’s most productive drug-development engines: Hengrui fields over 5,600 R&D \npersonnel across 15 global research centers, maintains over 100 clinical-stage products, \noperates more than 10 proprietary technology platforms including ADC, bispecific \nantibody, and protein degradation, and produces approximately 20 FIC/BIC new \nmolecules entering clinical development annually. This pipeline depth and execution \nspeed is directly responsive to BMS’s strategic need to replenish its early-stage portfolio \nahead of looming patent expiries. The clinical execution model further reinforces the fit: \nfor all eight licensed assets across Modules 1 and 2, Hengrui will lead early clinical \ndevelopment through proof-of-concept, leveraging China’s large patient population and \nits clinical operations strength to accelerate PoC timelines. Management confirmed that \nthese China-run PoC (proof of concept) studies are specifically designed to generate data \ncapable of supporting global registrational trials — meaning they are calibrated to feed \nBMS’s ex-China Ph3 programs directly. BMS in turn provides its overseas clinical \nnetwork to support ex-China early development.\n•\nBeyond the BMS partnership, the near-term pipeline catalyst stack is also broad. \nFor ASCO’26, Hengrui has secured multiple oral presentations, with the key watch items \nbeing updated data on SHR-A2102 (Nectin-4) ADC, SHR-A1811 (HER2 ADC), \ncamrelizumab in GI oncology, and its newer CLDN18.2/4-1BB bispecific antibody \nSHR-3821.We are also expecting key Ph3 readouts in the next 12 months, including: \nSHR-A1811 (HER2 ADC) in ovarian cancer and BTC (biliary tract cancer), SHR-A2009 \n(HER3 ADC) in 2L EGFRm NSCLC, HER2-low breast cancer, and 1L HER2+ BC, \nHRS-7535 (oral GLP-1) in T2D (type 2 diabetes).\n--- page 3 ---\n3\nYang Huang AC\n(852) 2800 3812\nyang.huang@jpmorgan.com\nAsia Pacific Equity Research\n13 May 2026\nJ P M O R G A N\nInvestment Thesis, Valuation and Risks\nHengrui - A (Overweight; Price Target: Rmb70.00)\nInvestment Thesis\nHengrui-A is one of the largest pharma companies in China in terms of market cap. We like \nHengrui’s strong R&D portfolio in China, solid sales capabilities, and sustained global \nbusiness development potential. Also, we believe Hengrui could still enjoy a beta run if the \noverall market can maintain momentum from potential fiscal stimulus. After the recent \ncorrection, we believe Hengrui-A’s valuation is more digestible and see it as a good time to \nbuy the stock. We rate Hengrui-A OW. \nValuation\nOur Dec-26 PT of Rmb70 is based on a DCF valuation. We estimate free cash flow for \nHengrui until 2033, assuming a terminal growth rate of 3% and a WACC of 9.6%.\nDCF valuation\nSource: J.P. Morgan estimates.\nRisks to Rating and Price Target\nKey downside risks to our rating and price target include: 1) PD-1 marketing application \nbeing rejected by the FDA; and 2) clinical data of its ADC program coming in below our \nexpectations. Key upside risks include stronger-than-expected sales growth and earnings.\n--- page 4 ---\n4\nYang Huang AC\n(852) 2800 3812\nyang.huang@jpmorgan.com\nAsia Pacific Equity Research\n13 May 2026\nJ P M O R G A N\nInvestment Thesis, Valuation and Risks\nHengrui - H (Neutral; Price Target: HK$70.00)\nInvestment Thesis\nHengrui-H is one of the largest pharma companies in China in terms of market cap. We like \nHengrui’s strong R&D portfolio in China, solid sales capabilities, and sustained global \nbusiness development potential. Also, we believe Hengrui could still enjoy a beta run if the \noverall market can maintain momentum from a potential fiscal stimulus. However, \nHengrui’s current valuation is higher than that of many of its peers, which we think will limit \nits future upside. We rate the stock Neutral.  \nValuation\nOur Dec-26 PT of HK$70 is based on a DCF valuation. We estimate free cash flow for \nHengrui until 2033, assuming a terminal growth rate of 3% and a WACC of 9.6%.  \nDCF valuation\nSource: J.P. Morgan estimates.\nRisks to Rating and Price Target\nKey downside risks to our rating and price target include: 1) PD-1 marketing application \nbeing rejected by the FDA; 2) clinical data of its ADC program coming in below our \nexpectations; and 3) H-shr market sentiment deterioration. \nKey upside risks include 1) stronger-than-expected sales growth and earnings; and 2) H-shr \nmarket sentiment improvement.\n--- page 5 ---\n5\nYang Huang AC\n(852) 2800 3812\nyang.huang@jpmorgan.com\nAsia Pacific Equity Research\n13 May 2026\nJ P M O R G A N\n Analyst Certification:  The Research Analyst(s) denoted by an “AC” on the cover of this report certifies (or, where multiple Research Analysts \nare primarily responsible for this report, the Research Analyst denoted by an “AC” on the cover or within the document individually certifies, \nwith respect to each security or issuer that the Research Analyst covers in this research) that: (1) all of the views expressed in this report \naccurately reflect the Research Analyst’s personal views about any and all of the subject securities or issuers; and (2) no part of any of the \nResearch Analyst's compensation was, is, or will be directly or indirectly related to the specific recommendations or views expressed by the \nResearch Analyst(s) in this report. For all Korea-based Research Analysts listed on the front cover, if applicable, they also certify, as per KOFIA \nrequirements, that the Research Analyst’s analysis was made in good faith and that the views reflect the Research Analyst’s own opinion, \nwithout undue influence or intervention.\n All authors named within this report are Research Analysts who produce independent research unless otherwise specified. In Europe, Sector \nSpecialists (Sales and Trading) may be ELL’s upcoming earnings, despite our 12mo UW rating. But for the market to take\n- upcoming earnings, and broadly remain Cautious our group, but share further\n- We believe Lenovo's outperformance Friday was moreso reflective of\n\n## 关联\n\n- 行业: 行业研究-科技硬件\n- 机构: Morgan Stanley\n- 期间: 2026-Q2", "n21": "# Internet  | North America\n\n**机构**: Morgan Stanley | **类别**: 行业研究-互联网 | **期间**: 2026-Q2\n\n## 摘要\n\n本报告由Morgan Stanley于2026-Q2发布，分析行业研究-互联网行业最新动态。\n\n## 关键要点\n\n- EPS (-11%/+2%/-23% vs TTM avg).\n\n## 关联\n\n- 行业: 行业研究-互联网\n- 机构: Morgan Stanley\n- 期间: 2026-Q2", "n22": "# Investor Presentation  | Asia Pacific\n\n**机构**: Morgan Stanley | **类别**: 行业研究-科技硬件 | **期间**: 2026-Q2\n\n## 摘要\n\n本报告由Morgan Stanley于2026-Q2发布，分析行业研究-科技硬件行业最新动态。\n\n## 关键要点\n\n- • Opportunities in AI GPU and ASIC server/rack design upgrades\n- • Major design upgrades for upcoming Vera Rubin platform, Kyber architecture and LPX/Vera CPU rack.\n- • AI ASIC server upgrade and volume expansion magnitude – mainly TPU and Trainium platform\n- • Consumer electronics (smartphones/PC) demand and margin impact in 2H impacted by memory inflation\n- • Raw material price hike (copper, nickel) and supply tightness a margin headwind\n\n## 关联\n\n- 行业: 行业研究-科技硬件\n- 机构: Morgan Stanley\n- 期间: 2026-Q2", "n23": "# JPMorgan 2026 Global China Summit - 中国互联网行业关键洞察\n\n**来源**: 行业研究-互联网 | **机构**: jpmorgan\n\n## 摘要\n\nJPMorgan于2026年5月举办全球中国峰会，汇聚中国互联网行业核心企业高管。\n重点讨论AI应用商业化进程、中国互联网企业海外扩张策略、以及竞争格局变化。\n行业普遍看好AI对搜索、电商、内容平台的改造机会，2026年有望成为AI应用规模化元年。\n\n## 关键要点\n\n- AI应用将是2026-2027年中国互联网行业核心增长驱动力\n- 多个平台型企业加速AI功能集成，从搜索到电商到内容推荐全面AI化\n- 互联网企业海外业务增速快于国内，东南亚和中东是主要增长区域\n- 监管环境趋于稳定，企业更聚焦利润增长而非单纯用户扩张\n- 云业务成为互联网巨头第二增长曲线，AI云服务需求强劲\n\n## 关联\n\n- 行业: china-internet\n- 机构: jpmorgan\n- 事件: global-china-summit-2026\n- 相关: ai-monetization, cloud-computing", "n24": "# JPMorgan: SK hynix LTA Paves Path for New Valuation Framework\n\n**报告日期**: 2026-05-17 | **券商**: JPMorgan | **分析师**: Jay Kwon, Sangsik Lee, Neelay Y Kamath  \n**评级**: Overweight (维持) | **目标价**: KRW 3,000,000（上调自 KRW 1,800,000）| **涨幅**: +67%\n\n## 摘要\nJPMorgan维持SK海力士Overweight，目标价从KRW 1,800,000大幅上调至KRW 3,000,000（全市场最高之一）。核心催化：LTA谈判进入关键拐点，将推动存储器行业从P/B迁移至P/E估值框架（基于8x FY26-27E EPS）。大幅上调FY26-28E EPS 9-20%，股东回报计划KRW 240tn。\n\n## 关键要点\n- LTA 将推动存储器业务模式从\"周期性\"转向\"结构性/长期性\"\n- 存储器供需失衡短期内难以缓解，存储器厂商和 CSP 达成 LTA 的概率很高\n- LTA 将提升存储器盈利质量，成为估值重估的核心驱动因素\n\n### 从 P/B 转向 P/E 估值框架\n- JPMorgan 认为 P/E 估值框架更合理，使用 8x FY26-27E EPS\n- 历史对比：2024 年以来平均 FTM P/E 仅 3x，当前约 6x\n- 5 倍 EPS 增长后（FY26E），预计 FY28 前 EPS CAGR 仍达 31%\n- Dec-26 目标价 KRW 3,000,000 = 8x 平均 FY26-27E EPS\n\n### 盈利假设大幅上调\n- FY26-28E EPS 上调 9-20%，反映更强的 DRAM/NAND/HBM 定价预期\n- DRAM ASP 展望从低-40% q-q 上调至低-50% q-q\n- 服务器 DRAM（AI 向 CPU 扩散）和移动 DRAM（LPDDR5X 竞争）共同驱动价格\n- 三星罢工也对定价情绪产生积极影响\n- HBM ASP 谈判预计对存储器厂商有利，明年 ASP 增长加速\n\n### 股东回报与现金生成\n- 预计 2025-27E 累计 FCF 达 KRW 240tn 用于股东回报\n- 2026E/27E TSR 收益率达 5%/12%\n- 官方股东回报政策：TSR = FCF 的 50%（三年累计基准）、25% 固定 DPS 提升、资本强度目标中 30%+、资产负债改善计划\n\n### 核心催化剂与风险\n**催化剂**: LTA 量/价协议披露 + 股东回报执行 + EPS 持续上修  \n**风险**: LTA 谈判停滞、AI 需求放缓、地缘政治风险、技术突破减少 AI 机架内存需求、存储器供给超预期\n\n## 关键财务预测\n\n| 指标 | FY25A | FY26E | FY27E | FY28E |\n|------|-------|-------|-------|-------|\n| 营收 (KRW bn) | 97,147 | 347,547 | 490,631 | 597,583 |\n| Adj. EBIT (KRW bn) | 47,206 | 275,573 | 393,141 | 469,691 |\n| Adj. EPS (KRW) | 58,987 | 316,147 | 433,828 | 539,093 |\n| EBIT 利润率 (%) | 48.6 | 79.3 | 80.1 | 78.6 |\n| ROE (%) | 44.1 | 90.8 | 59.1 | 46.9 |\n| Adj. P/E (x) | 30.5 | 5.7 | 4.1 | 3.3 |\n\n## 季度 EPS 展望\n\n| | 1Q | 2Q | 3Q | 4Q | FY |\n|---|----|----|----|----|----|\n| 2025A | 11,136 | 9,609 | 17,302 | 20,940 | 58,987 |\n| 2026E | 56,603A | 76,447 | 87,648 | 95,044 | 316,147 |\n| 2027E | 97,854 | 107,375 | 112,376 | 116,036 | 433,828 |\n\n## 估值重估路线\n- 股价 YTD +201%（vs 存储器同行 +255%，SOX +70%）\n- 市场对 2027E 存储器盈利信心增强，存储器上行周期延长\n- 多重重估空间：从 P/B 到 P/E 的框架迁移是关键\n\n## 关联\n- [BNP Paribas: SK HYNIX — Enhanced AI memory leadership, less concern on oversupply](entries/BNP-Paribas-SK-HYNIX-Enhanced-AI-memory-leadership-less-concern-on-oversupply.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(19): es, an, asp, ve\n- [Macquarie: SK Hynix — Giddy profit growth at a low PE multiple, raise TP to KRW 2.9M](entries/Macquarie-SK-Hynix-Giddy-profit-growth-at-a-low-PE-multiple.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(19): to, sk, at, th\n- [HSBC: SK Hynix — Another surprise in DRAM prices, raise TP to KRW 2.9M](entries/HSBC-SK-Hynix-Another-surprise-in-DRAM-prices-raise-TP.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(17): sk, is, ix, es", "n25": "# JPMorgan中国AI应用调研：从模型竞赛到应用落地的转折点\n\n**来源**: 行业研究-AI | **机构**: jpmorgan\n\n## 摘要\n\nJPMorgan调研中国AI应用生态，认为2026年是AI应用规模化元年。\n企业级AI应用需求强劲，金融、医疗、教育是率先落地的行业。\nAI Agent(智能体)成为中国AI应用最热门方向之一。\n\n## 关键要点\n\n- 中国AI应用市场2026年有望实现3-5倍增长\n- 金融行业AI渗透率最高，智能客服、风控、投研是主要场景\n- 企业级AI Agent产品开始贡献可观收入\n- AI编程助手在国内开发者中渗透率快速提升\n- 数据壁垒和行业know-how是AI应用公司的核心护城河\n\n## 关联\n\n- 行业: ai-industry\n- 机构: jpmorgan\n- 主题: china-ai-application\n- 相关: ai-agent, enterprise-ai", "n26": "# JPMorgan中国AI芯片Fabless深度报告：供应短期瓶颈与客户突破长期驱动\n\n**来源**: 行业研究-半导体 | **机构**: jpmorgan\n\n## 摘要\n\nJPMorgan预计中国本土AI芯片需求将以约40%的5年CAGR增长至2030年。\n供应端是短期瓶颈——全球先进制程代工受美国出口管制严重影响。\nCSP（云服务提供商）客户突破是中长期增长的关键驱动力。\n\n## 关键要点\n\n- 预计中国本土AI芯片2026-2030年40%单位CAGR\n- 供应是最大瓶颈：先进制程代工受限，多数二线fabless需依赖库存维持6-12个月\n- CSP客户突破是关键——目前二线AI芯片仅用于政府/AIDC项目，尚未进入头部CSP\n- 首予Iluvatar CoreX增持评级(OW)：凭借高效架构设计可保障产能并受益于P/D解耦趋势\n- 首予MetaX中性评级(Neutral)：本土供应链优势但估值偏高\n- 建议关注供应有保障且有望切入CSP供应链的fabless标的\n\n## 关联\n\n- 行业: china-semiconductor\n- 机构: jpmorgan\n- 主题: ai-chip-localization\n- 相关: iluvatar-corex, metax", "n27": "# JPMorgan中国房地产5月数据：一线城市房价初现企稳迹象\n\n**来源**: 行业研究-房地产 | **机构**: jpmorgan\n\n## 摘要\n\n5月国家统计局数据显示一线城市房价环比止跌，为2025年以来首次。\n新房销售面积同比降幅收窄，但二手房挂牌量仍高企。\n开发商资金面边际改善，但销售回款仍是主要矛盾。\n\n## 关键要点\n\n- 一线城市新房价格环比持平/微涨，为2025年初以来首次正增长\n- 全国新房销售面积同比下降约8%，降幅较4月收窄\n- 二手房挂牌量仍处高位，去化周期约18个月\n- 头部房企融资环境边际改善，信用利差收窄\n- 政策端仍有放松空间，房贷利率可能进一步下调\n- 维持对优质国企地产股的增持评级\n\n## 关联\n\n- 行业: china-property\n- 机构: jpmorgan\n- 数据: nbs-may-2026\n- 相关: tier-1-cities, housing-price", "n28": "# JPMorgan中国电池行业精选：供给侧改革与全球化布局中的机会\n\n**来源**: 行业研究-新能源 | **机构**: jpmorgan\n\n## 摘要\n\nJPMorgan分析中国电池行业供需格局，认为供给侧改革将淘汰落后产能。\n龙头企业在技术和成本上领先优势扩大，全球化布局加速。\n储能电池需求增速超过动力电池，成为新的增长极。\n\n## 关键要点\n\n- 中国动力电池产能利用率约60%，行业出清仍在进行中\n- 宁德时代和比亚迪的全球市场份额进一步提升，合计超50%\n- 储能电池出货量同比增长50%+，增速超过动力电池\n- 磷酸铁锂(LFP)电池海外需求快速增长\n- 固态电池产业化进程加速，2027年有望小批量量产\n- 建议关注宁德时代、亿纬锂能等龙头企业\n\n## 关联\n\n- 行业: new-energy\n- 机构: jpmorgan\n- 主题: battery-supply-reform\n- 相关: catl, byd, solid-state", "n29": "# JPMorgan半导体行业4月WSTS数据：增长再加速，AI和存储驱动\n\n**来源**: 行业研究-半导体 | **机构**: jpmorgan\n\n## 摘要\n\n4月全球半导体销售额同比增速再次加速，AI芯片和HBM存储是最大增长引擎。\n存储芯片价格在HBM高带宽内存需求拉动下持续上行。\n非存储芯片领域，逻辑芯片和模拟芯片增速温和复苏。\n\n## 关键要点\n\n- 4月全球半导体销售额同比增长超20%，环比持续改善\n- 存储芯片增长最为强劲，DRAM/NAND价格上行趋势延续\n- HBM占DRAM总出货比例持续提升，达15%+\n- 逻辑芯片增长稳健，先进制程利用率高位运行\n- 模拟芯片和MCU需求呈现温和复苏迹象\n- 中国半导体进口数据持续强劲，国产替代加速\n\n## 关联\n\n- 行业: semicon-industry\n- 机构: jpmorgan\n- 数据: wsts-april-2026\n- 相关: memory, hbm, ai-chip", "n30": "# Jefferies AI系列#41：DeepSeek V4发布后的新进展\n\n**来源**: 行业研究-AI | **机构**: jefferies\n\n## 摘要\n\nDeepSeek V4发布后引发AI行业广泛关注，其性能接近闭源顶级模型。\n开源模型能力提升将加速AI应用普及，但可能降低模型层议价能力。\n对中国AI芯片产业而言，更高效的模型架构降低了对算力的绝对依赖。\n\n## 关键要点\n\n- DeepSeek V4性能接近GPT-4o/Claude 3.5水平，但训练成本显著更低\n- 开源模型生态繁荣将降低AI应用开发门槛\n- 对算力需求的影响存在分歧——更高效模型 vs 更多应用带来Jevons悖论\n- 中国AI模型能力差距缩小，有利于AI应用层发展\n- 硬件层面，推理算力需求增长确定性高于训练算力\n\n## 关联\n\n- 行业: ai-industry\n- 机构: jefferies\n- 主题: deepseek-v4\n- 相关: open-source-llm, inference", "n31": "--- page 1 ---\n>> Employed by a non-US affiliate of BofAS and is not registered/qualified as a research analyst \nunder the FINRA rules. \nRefer to \"Other Important Disclosures\" for information on certain BofA Securities entities that take \nresponsibility for the information herein in particular jurisdictions. \nBofA Securities does and seeks to do business with issuers covered in its research \nreports. As a result, investors should be aware that the firm may have a conflict of \ninterest that could affect the objectivity of this report. Investors should consider this \nreport as only a single factor in making their investment decision. \nRefer to important disclosures on page 10 to 12. Analyst Certification on page 6. Price \nObjective Basis/Risk on page 6.  \n12963997 \n \n \nKweichow Moutai Co. Ltd. (A) \n1Q a mixed bag; strong i-Moutai with \nmargin pressure set to ease ahead \nReiterate Rating: BUY | PO: 1,630 CNY | Price: 1,458 CNY   \n  \n \n \n1Q a mixed bag; i-Moutai strength vs. margin erosion \n1Q was largely in-line, with revenue/NPAT +6.3%/+1.5%. Revenue resilience was owing \nto i-Moutai, though margins declined due to an unfavorable mix shift and lower ASPs of \ncustomized and series liquor. We broadly maintain estimates and reiterate Buy with PO \nof RMB1630 for three reasons. 1) Easier comps should emerge, as the industry will lap \nthe anti-graft campaign from May and P&L cleanup from 2H. 2) We view Moutai as the \nmost defensive proxy for a likely bottoming cycle, with better visibility on branding and \nchannel reforms, which have driven a recovery in sell‑out and channel profitability & \ncash flow, alongside stabilization of channel prices. In contrast, other large-cap peers all \nface their own issues. 3) Moutai offers a 3.6% dividend yield, or c.4% total shareholder \nyield, including share buyback, which appears attractive in a low-interest-rate \nenvironment.   \n2026E: sales +6%; margin pressure to ease ahead \nWe expect FY26 sales to be +6%, with 2Q growth to be below 1Q on a low season, but \n2H to accelerate on a low base (revenue was +11%/+7%/flat/-19% in 1Q/2Q/3Q/4Q25). \nWe expect margin erosion to ease ahead, due to 1) Moutai’s recent Feitian price hike, 2) \nApril rollout of consignment sales for customized liquor and 3) easy comps by 2H. \n1Q26 result highlights: decoding the mix change \n1) Moutai liquor’s sales were +5.6%. We estimate Feitian to be +70% and customized \nliquor to be -60-70%. 2) Series liquor sales were +12.2%. 3) Customer advance payment \nwas -66% YoY/-62% QoQ, due to a mix shift to DTC sales. 4) By channel, DTC sales were \n+27% YoY (55% of sales), 73% of which was i-Moutai (+267% to RMB21.55bn). We \nestimate 75-80% of i-Moutai 1Q sales to be Feitian. Wholesale was -11% YoY, partly on \nlower shipment to SOE distributors, per channel checks. 5) Gross margin was -331bp to \n74.9%, as we estimate customized liquor (with higher margins) dropped to <20% of \nMoutai liquor sales (vs. c.50% in 2025) after recent channel reforms. S&D/sales was \nlargely flat at 2.9%, and G&A/sales was -29bp to 3.5%. As a result, operating margin was \n-338bp to 68.6%.  \nEstimates (Dec) (CNY) \n2024A\n2025A\n2026E\n2027E\n2028E\nNet Income (Adjusted - mn) \n86,228 \n82,320 \n84,833 \n90,683 \n96,209 \nEPS \n68.64 \n65.74 \n67.53 \n72.19 \n76.59 \nEPS Change (YoY) \n15.4% \n-4.2% \n2.7% \n6.9% \n6.1% \nConsensus EPS (Visible Alpha) \n \n \n69.33 \n73.78 \n78.62 \nDividend / Share \n51.48 \n51.93 \n52.84 \n56.48 \n59.93 \nFree Cash Flow / Share \n69.88 \n46.63 \n66.03 \n70.16 \n78.88 \nValuation (Dec) \nP/E \n21.25x \n22.19x \n21.60x \n20.20x \n19.04x \nDividend Yield \n3.53% \n3.56% \n3.62% \n3.87% \n4.11% \nEV / EBITDA* \n13.90x \n14.38x \n13.95x \n13.02x \n12.28x \nFree Cash Flow Yield* \n4.81% \n3.20% \n4.53% \n4.81% \n5.41% \n* For full definitions of iQmethod SM measures, see page 9. \n27 April 2026   \nEquity \nKey Changes \n(CNY) \nPrevious\nCurrent\n2026E EPS \n68.99 \n67.53 \n2027E EPS \n72.43 \n72.19 \n2028E EPS \n76.30 \n76.59 \n2026E EBITDA (m) \n122,170.7 \n119,625.3 \n2027E EBITDA (m) \n128,546.6 \n128,130.1 \n2028E EBITDA (m) \n135,333.5 \n135,841.0 \nChen Luo, CFA >> \nResearch Analyst \nMerrill Lynch (Hong Kong) \n+852 3508 2009 \nchen.luo@bofa.com \nLucy Yu >> \nResearch Analyst \nMerrill Lynch (Singapore) \n+65 6678 0417 \nlucy.yu@bofa.com \nJonas Yang >> \nResearch Analyst \nMerrill Lynch (Hong Kong) \n+852 3508 5834 \njonas.yang@bofa.com \nAlice Ma >> \nResearch Analyst \nMerrill Lynch (Hong Kon . Moutai’s 4Q should also set the tone for the \nbaijiu sector with broad-based declines in 4Q25/1Q26. 3) Moutai has not offered 2026 \nguide in the filing (an unusual move). However, we expect mid-single digit growth given \na lower base from its 4Q miss, a solid start to 2026 and c.5% GDP growth target of \nGuizhou (its home province). 4) Dividend payout was 79% in 2025 (vs.75% in 2024), and \ndividend dollars were +0.6% YoY despite EPS declines, offering downside protection.  \n1Q result is key in the near term; maintain Buy \n1Q will be key in the near term, and we remain constructive. 1) We expect the industry \nto see easier comps ahead given the lap of anti-graft campaigns from May, and P&L \ncleanup from 2H. 2) Moutai enjoys better visibility, while other large-cap peers all face \ntheir own issues. 3) Moutai offers a 3.6% dividend yield, or c.4% total shareholder yield, \nincluding share buyback, which appears attractive in a low-interest-rate environment. \nResults highlight \n1) 2025. Moutai liquor’s sales were +0.4%, with volume +0.7% to 46.8k tons. Series \nliquor sales were -9.8%. DTC was +13% (or 50% of sales). 2) 4Q25. Revenue/NPAT was -\n19.3%/-30.3%. Advance payment was +3% QoQ, or -17% YoY. DTC was +27% YoY, and \ntraditional channel were -58% YoY. GPM was -459bp to 74.7%. S&D/sales was +399bp to \n6.7%, and G&A/sales was +392bp to 13.8%. Hence, OPM was -843bp to 61.5%. \nEstimates (Dec) (CNY) \n2024A\n2025A\n2026E\n2027E\n2028E\nNet Income (Adjusted - mn) \n86,228 \n82,320 \n86,660 \n90,982 \n95,845 \nEPS \n68.64 \n65.74 \n68.99 \n72.43 \n76.30 \nEPS Change (YoY) \n15.4% \n-4.2% \n4.9% \n5.0% \n5.3% \nConsensus EPS (Visible Alpha) \n \n \n75.48 \n81.42 \n85.55 \nDividend / Share \n51.48 \n51.93 \n53.98 \n56.67 \n59.70 \nFree Cash Flow / Share \n69.88 \n46.63 \n68.16 \n75.75 \n78.09 \nValuation (Dec) \nP/E \n21.31x \n22.25x \n21.21x \n20.20x \n19.17x \nDividend Yield \n3.52% \n3.55% \n3.69% \n3.87% \n4.08% \nEV / EBITDA* \n13.95x \n14.42x \n13.70x -6 months with retail sales largely resuming positive YoY.\nImmune to raw-material price shocks. Unlike other staple and alcohol companies, we believe\nMoutai's high margins make it immune to raw-material cost shocks. In addition, utilities and\ntransportation costs appear insignificant to Moutai's margins. We do not see oil shortage as\na risk to Moutai's production.\nChannel reform to drive 2H26 earnings rebound. We estimate Moutai to accelerate its market\nshare gain in major premium baijiu price ranges (above RMB1,000 per bottle, 600-1,000,\n400-600), thanks to:\n(1) On-line and off-line integration: Moutai's greater control of Feitian prices has prevented the\non-line off-line resell activities (traders buying Feitian on-line and sell them in the off-line). This\nallows Moutai to better utilize the on-line channel: to enjoy the traffic as well as subsidies from\nthe e-commerce platforms. We believe Moutai is the first mover to embrace e-commerce and\nquick commerce in the baijiu industry. This should help Moutai take market share from its\nlagging competitors.\n(2) Distributor incentives: Despite Moutai's DTC push, we expect distributors to remain\nencouraged. The product overhaul of Moutai 1935 and Moutai Prince is proven to be\nsuccessful, in our view. This facilitates distributors' new sources of earnings, in additional to\ntraditionally only relying on the Feitian. As a result, distributors are now incentivized to promote\nMoutai's full range of products, based on our checks. Moutai's positive distributor sentiment\nand margins is a rare trait in today's baijiu industry, and should help Moutai take market share,\nin our view.\nModel updates. The demand shock from adverse policy in 2H25 has led to greater-than-\nexpected impacts on Moutai's 2H25 earnings. We cut our forecasts and DCF-based PT\naccordingly. Having said that, Moutai's earnings continue to be much more resilient than the\n>30% YoY decline seen at other baijiu peers. In the longer-term, we continue to believe that\nMoutai will deliver steady sales growth and operating leverage while freeing up more cash.\nThis should enable a stronger free cash flow CAGR than top-line.\nTARGET |  ESTIMATE CHANGE\nRATING\nBUY\nPRICE\nRmb1,458.49^\nPRICE TARGET | % TO PT\n Rmb2,100.00\n(Rmb2,300.00) | +44%\n52W HIGH-LOW\nRmb1,645.00 -\nRmb1,322.01\nFLOAT (%) | ADV MM (USD) 38.5% | 741.35\nMARKET CAP\nCNY1.8T | $268.1B\nTICKER\n600519 CH\n^Prior trading day's closing price unless otherwise\nnoted.\n \nFY (Dec)\nCHANGE TO JEFe\nJEF vs CONS\n2026\n2027\n2026\n2027\nREV\n-6%\n-6%\n-2%\nNM\nEPS\n-7%\n-6%\nNM\nNM\n2026 (RMB)\nQ1\nQ2\nQ3\nQ4\nFY\nEPS\n--\n--\n--\n--\n 72.56\nPREV\n78.26\n \nPlease see analyst certifications, important disclosure information, and information regarding the status of non-US analysts on pages  4 - 9 of this report.\n * Jefferies Hong Kong Limited\n--- page 2 ---\nKweichow Moutai Co Ltd (600519 CH)\nEquity Research\nApril 27, 2026\n The Long View: Kweichow Moutai\nInvestment Thesis\n• Moutai is the dominant player in China's super-premium liquor market,\nwith its brand equity among the strongest.\n• We estimate Moutai's latest channel strategy (to give the market back to\nlarge distributors) will help stabilize the prices of Feitian.\n• We forecast mid- to high-single-digit volume growth for the next three\nyears. Price hikes and product mix changes are likely to be the key drivers\nof sales growth.\n• In addition to the flagship Feitian Moutai product, we also expect\nsustainable growth for peripheral Moutai products, including 1935.\nRisk/Reward - 12 Month View\n2800\n2600\n2400\n2200\n2000\n1800\n1600\n1400\n1200\n1000\n2026\n2025\n+12 mo.\n(+44%)\n2100\n(+85%)\n2700\n(-25%)\n1100\n:\nUpside Downside\n:\n3.46 1\n \nBase Case,\nCNY2100, +44%\n• Macro environment is stable in the longer\nterm. Demand for premium liquor keeps\ngrowing amid steady consumer sentiment.\nConsumers trade up to premium liquor.\n• Moutai maintains a substantial gap between\nFeitian's ex-factory price and wholesale price\nin preparation for ex-factory price hikes.\n• DCF-based price target of RMB2,100.\nUpside Scenario,\nCNY2700, +85%\n• Macroeconomic \ngrowth \nis \nbetter \nthan\nexpectations. Helped by strong consumer\nsentiment, premium liquor demand growth\naccelerates. Increasing number of consumers\ntrade up to premium liquor.\n• Moutai \nraises \nex-factory \nprices \nmore\nfrequently.\n• Product mix improves significantly due to\nincreasing sales of super premium Moutai.\n• DCF-based price target of RMB 2,700.\nDownside Scenario,\nCNY1100, -25%\n• Macroeconomic \ngrowth \nslows \ndown\nsignificantly. Consumers' income growth\ndecelerates, and they trade down to cheaper\nliquor.\n• Moutai does not raise prices in the near future;\nit needs to control supply to support its retail\nprice.\n• Product mix downgrade due to lower sales\nof super-premium Moutai as a result of weak\ndemand.\n• DCF-based price target of RMB1,100.\n \nSustainability Matters\nTop Material Issue(s): 1) Food safety and product quality are the most important for F&B\nmanufacturers. The company adheres to the 'Five Craftsmanship' philosophy and built its '365' quality\nmanagement system. 2) Environment protection is also a key issue for baijiu manufacturers as they\nuse water as a major resource and impact the ecosystem around their factories. Natural gas, water,\nslag, green environment, carbon and other ecological factors all matter. 3) Corruption is an issue that\nhigh-end baijiu companies need to face.\nCompany Target(s): 1) Starting from 2014, the company plans to invest RMB50 million per year for 10\nconsecutive years (RMB500 million in total) for ecosystem protection of the Chishui River basin. Buffer\nzones and construction-prohibited zones for interim and long-term ecological environment protection\nhave been planned. 2) Comply with SDGs.\nQs to Mgmt: 1) How do you balance ecological conservation with the capacity expansion plan? 2)\nWhat level of environmental protection costs do you expect to incur in the mid-long term?\nCatalysts\n• Ex-factory price hike\n• Increase in Feitian retail price\n• Traffic \ngrowth \nat \ndirect-to-consumer\nchannels, especially iMoutai\n \nPlease see important disclosure information on pages 4 - 9 of this report.\nThis report is intended for Jefferies clients only. Unauthorized distribution is prohibited.\n2\n--- page 3 ---\nKweichow Moutai Co Ltd (600519 CH)\nEquity Research\nApril 27, 2026\n \nChart 1 - Moutai: Income statment and balance sheet\n.\nIncome Statement (600519 CH)\nCNYmn\n2021\n2022\n2023\n2024\n2025\n2026E\n2027E\n2028E\nRevenue\n109,464\n127,554\n150,560\n174,144\n172,054\n186,192\n201,255\n218,583\nCost of sales\n-9,157\n-10,199\n-11,981\n-13,895\n-15,068\n-16,599\n-17,995\n-19,547\nGross profit\n100,307\n117,355\n138,579\n160,249\n156,986\n169,593\n183,260\n199,036\nSales tax\n-15,304\n-18,496\n-22,234\n-26,926\n-27,354\n-29,232\n-30,993\n-33,006\nSales expense\n-2,737\n-3,298\n-4,649\n-5,639\n-7,253\n-5,476\n-5,114\n-4,899\nAdministrative expenses\n-8,512\n-9,147\n-9,887\n-9,534\n-8,510\n-8,958\n-9,481\n-10,079\nOther income (expense)\n-159\n-104\n63\n18\n72\n93\n101\n109\nEBIT\n73,594\n86,310\n101,873\n118,168\n113,940\n126,020\n137,771\n151,161\nFinance income (expense)\n935\n1,392\n1,790\n1,470\n815\n654\n764\n875\nIncome from associate\n0\n0\n0\n0\n0\n0\n0\n0\nProfit before tax\n74,528\n87,701\n103,663\n119,639\n114,755\n126,674\n138,536\n152,036\nIncome tax\n-18,808\n-22,325\n-26,141\n-30,304\n-29,445\n-32,503\n-35,547\n-39,011\nMinority interest\n-3,260\n-2,659\n-2,787\n-3,107\n-2,990\n-3,301\n-3,610\n-3,962\nNet profit\n52,460\n62,717\n74,734\n86,228\n82,320\n90,870\n99,379\n109,064\nEPS (CNY/share)\n41.76\n                  \n49.93\n                  \n59.49\n                  \n68.64\n                  \n65.74\n                  \n72.56\n                  \n79.36\n                  \n87.09\n                  \nBalance Sheet (600519 CH)\nCNYmn\n2021\n2022 iquor in 1951. The company has a nationwide distribution network in China and sells to over\n100 countries and regions across the world. The company was listed on the Shanghai Stock Exchange in 2001.\nCompany Valuation/Risks\nKweichow Moutai\nWe value Kweichow Moutai based on a fundamental DCF approach. Downside risks include unexpected channel destocking, macro slowdown,\nand food safety issues.\nAnalyst Certification:\nI, John Chou, certify that all of the views expressed in this research report accurately reflect my personal views about the subject security(ies) and subject\ncompany(ies). I also certify that no part of my compensation was, is, or will be, directly or indirectly, related to the specific recommendations or views\nexpressed in this research report.\nI, Lisa Liao, certify that all of the views expressed in this research report accurately reflect my personal views about the subject security(ies) and subject\ncompany(ies). I also certify that no part of my compensation was, is, or will be, directly or indirectly, related to the specific recommendations or views\nexpressed in this research report.\nI, Boya Zhen, certify that all of the views expressed in this research report accurately reflect my personal views about the subject security(ies) and subject\ncompany(ies). I also certify that no part of my compensation was, is, or will be, directly or indirectly, related to the specific recommendations or views\nexpressed in this research report.\nI, Anne Ling, certify that all of the views expressed in this research report accurately reflect my personal views about the subject security(ies) and subject\ncompany(ies). I also certify that no part of my compensation was, is, or will be, directly or indirectly, related to the specific recommendations or views\nexpressed in this research report.\nRegistration of non-US analysts: John Chou is employed by Jefferies Hong Kong Limited, a non-US affiliate of Jefferies LLC and is not registered/qualified\nas a resear irect sales composition; 2) \nreformed non-Feitian high-end product distributor fee structure; and 3) lowered ex-\nfactory price of Moutai 1935 and non-Feitian high-end SKUs; as part of company's \nmarket-oriented pricing actions this year.\nOur take:  The price hike plan should be EPS accretive for Moutai. Based on our \nunderstanding, the price hike should reflect Moutai's gauge of \"real demand\" for \nFeitian, especially after it was launched on iMoutai platform.  We expect wholesale \nprices to rebound in the near term, reacting to the price hikes, but eventually \ndemand-supply will be the key factor to decide wholesale prices. The higher price \nfor Feitian Moutai could provide some buffer to possible volume cuts on non-Feitain \nMoutai SKUs, in our view. \nMorgan Stanley Asia Limited+\nLillian Lou\nEquity Analyst\n Lillian.Lou@morganstanley.com  \n  +852 2848-6502 \nWilkins Tong\nEquity Analyst\n Wilkins.Tong@morganstanley.com  \n  +852 2848-7408 \nKweichow Moutai Company Ltd. (600519.SS, 600519 \nCG)\nChina/Hong Kong Consumer | China\nStock Rating\nOverweight\nIndustry View\nIn-Line\nPrice target\nRmb1,790.00\nUp/downside to price target (%)\n26\nShr price, close (Mar 30, 2026)\nRmb1,420.00\n52-Week Range\nRmb1,645.00-\n1,322.01\nSh out, dil, curr (mn)\n1,256\nMkt cap, curr (mn)\nRmb1,783,801\nEV, curr (mn)\nRmb1,627,874\nAvg daily trading value (mn)\nRmb5,376\nFiscal Year Ending\n12/24 12/25e 12/26e 12/27e\nEPS (Rmb)**\n68.64\n71.68\n74.83\n80.77\nEPS, consensus, mean \n4 weeks prior (Rmb)§\n68.49\n72.08\n75.98\n81.34\nRevenue, net (Rmb bn)\n170.61\n178.55\n187.25\n202.16\nEBITDA (Rmb mn)\n116,815 122,846 128,447 138,782\nModelWare net inc \n(Rmb mn)\n86,228\n90,048\n93,998 101,468\nP/E\n22.2\n19.2\n19.0\n17.6\nRNOA (%)\n142.0\n117.2\n121.9\n121.4\nROE (%)\n40.0\n38.6\n32.6\n32.2\nUnless otherwise noted, all metrics are based on Morgan Stanley ModelWare \nframework\n** = Based on consensus methodology\n§ = Consensus data is provided by Refinitiv Estimates\ arie Equity Research\n11 May 2026\nLaopu Gold\nInitiation: As good as it can get\nKey Points\n• Among luxury brands in China, Laopu Gold has the highest revenue per\nshopping mall and revenue per available square metre (in 2025).\n• We have concerns that Chinese consumption power cannot match\nfrequent price hikes, resulting in volume growth moderating.\n• We initiate coverage of Laopu at Underperform, with a HK$453 TP,\nbased on 10x 2027E PER.\nCan demand outpace the gold price rally? Gold price rallied by >60% YoY\nin 2025 and Laopu went through by four rounds of price hikes. We have\nconcerns that Chinese consumption power cannot match the frequent\nprice hikes over the last two years, resulting in volume growth moderation.\nIf the gold price remains rangebound, gold jewellery purchase demand\nis likely to moderate. Meanwhile, frequent discounts in 2025 could be a\npotential risk to Laopu's brand building.\nGrowth moderation from a high base and rising competition. Laopu\nsame-store sales reached Rmb600-700mn per year in 2025. We saw limited\nupside since the store efficiency has exceeded top international luxury\nbrands. Laopu is a first-mover in promoting heritage gold consumption in\nChina; its success also attracts competitors to the space, which is likely be a\nheadwind diluting store efficiency. Its operating expense ratio was only 14%\nin FY25, vs >40% for international peers. We think it is likely to see more\nchannel and brand building investment in the future. As the company’s\nstore size keeps expanding, we are concerned operating deleverage will be\nsevere once sales growth moderates.\nDilemma between growth and capital management. At the end of 2025,\nthe company had Rmb4.2bn net debt or Rmb6.26bn interest-bearing\nborrowings. We believe it could stretch its balance sheet to further expand\nits network. The company declared no less than a 50% dividend payout,\nimplying 6.7% cash dividend yield for FY26E.\nEarnings: We expect 140% net profit growth in FY26E, while in FY27E/28E\nwe expect -40%/1%, due to SSS decline and operating deleveraging.\nValuation: We initiate coverage of Laopu at Underperform, with a HK$453\nTP, based on industry average multiple of 10x 2027E PER.\nCatalysts: Earnings release, overseas expansion, operational update.\nInvestment Thesis and Recommendation\nWe initiate coverage of Laopu at Underperform as we expect its superior\nstore efficiency may not be sustainable amid competition and frequent\nprice hikes, and potential operating deleverage risks.\nConsumer Durables & Apparel\nHong Kong\nLinda\nHuang, CFA\nSharon\nYi\n6181 HK\nUnderperform\nPrice (at 8 May 2026)\nHK$592.50\n12-month target\nHK$453.00\n12-month TSR (%)\n(17.0)\nMarket Cap (Local) (m)\n104,721\nMarket Cap (USD) (m)\n13,376\nFree Float (%)\n37\n30-day avg turnover (USD) (m)\n69.6\n \nInvestment Fundamentals\nYear end 31 Dec\n2025A 2026E 2027E 2028E\nRevenue (m)\n27,303\n50,023\n39,987\n42,016\nRevenue growth (%)\n221.0\n83.2\n(20.1)\n5.1\nEBIT (m)\n6,519\n15,470\n9,364\n9,442\nEBIT growth (%)\n230.2\n137.3\n(39.5)\n0.8\nReported profit (m)\n4,868\n11,683\n7,066\n7,151\nAdjusted profit (m)\n4,868\n11,683\n7,066\n7,151\nEPS rep [CNY]\n28.5\n67.8\n41.0\n41.5\nEPS rep growth (%)\n201.0\n138.0\n(39.5)\n1.2\nEPS adj [CNY]\n28.5\n67.8\n41.0\n41.5\nEPS adj (¢)\n28.5\n67.8\n41.0\n41.5\nEPS adj growth (%)\n203.9\n138.2\n(39.5)\n1.2\nNet debt/equity (%)\n37.8\n(0.1)\n3.0\n(22.8)\nROA (%)\n47.3\n66.5\n35.9\n34.1\nROE (%)\n64.8\n76.9\n35.7\n32.3\nPER rep (x)\n18.1\n7.6\n12.6\n12.4\nPER adj (x)\n18.1\n7.6\n12.6\n12.4\nEV/EBITDA (x)\n13.5\n5.9\n9.7\n9.6\nP/BV (x)\n8.0\n4.6\n4.4\n3.7\nTotal div yield (%)\n4.2\n6.6\n4.0\n4.0\nQuant (rank vs. global sector)\n418 / 687\n6181 HK rel HSI performance, & rec\nhistory\nSource: FactSet, Macquarie Research, May 2026 (all figures in\nCNY unless noted, TP in HKD)\nFor important disclosures and analyst certification, refer to page 22 or go to www.macquarie.com/research/disclosures. \n1\n--- page 2 --- ily on high same-store sales growth to drive its overall\nrevenue performance. This strategy was effective during the early stages of development,\nparticularly as the company benefited from its first-mover advantage in the heritage gold\nsegment, strong product innovation, and Chinese chic-brand positioning strategy.\nAccording to the company, in 2025, Laopu achieved an average annualised sales amount (tax-\ninclusive) of nearly Rmb1bn per shopping mall. According to Frost & Sullivan, among global\nluxury groups in 2025, it ranked first in terms of revenue per shopping mall and revenue per\navailable square metre in China.\nHowever, we believe the strong gold price rally is one of the most important drivers for Laopu\nGold's market-share gains in the jewellery market. While we appreciate the company's unique\nproduct strategy, refined product craftsmanship and brand positioning, we expect limited\nupside for its average single store sales due to 1) sales volume growth moderation amid\na surging gold price; and 2) Laopu's store efficiency has exceeded top international luxury\nbrands.\n•\nBased on historical Chow Tai Fook's gold products SSSG, we see a negative correlation\nbetween gold sales volume and the gold-price trend. We are concerned that Chinese\nconsumers’ purchasing power has not kept pace with frequent price hikes, leading to further\nsales volume deterioration. Even if gold prices stabilise or decline, this would still be a weak\nconsumption backdrop, as consumers primarily buy gold jewellery for value preservation.\nIs operating leverage sustainable?\nLaopu is benefiting from significant same-store sales growth, which creates substantial\noperating leverage and fast margin expansion. However, despite accelerating top-line\nperformance, we see operating margin expansion and operating leverage benefits\nmoderating.\nMeanwhile, average gross margin and operating margin of major luxury/jewellery brands\nfor FY25 is 65% and 24% respectively. Laopu is priced and performing like an optimised\n\"best-case scenario\" luxury brand, with an operating margin higher than most luxury groups\nexcept for Hermes, despite a much lower gross margin. As the company’s store size keeps\nexpanding, we believe any normalisation in China's \"gold fever\" or a moderation in its revenue\ngrowth will lead to severe operating deleveraging risks.\nDilemma between growth and capital management. At the end of 2025, the company\nhad Rmb4.2bn net debt on its balance sheet and 45 stores worldwide. The company could\nstretch its balance sheet further or fund raise to further expand its network.\n11 May 2026\n3\n--- page 4 ---\nMacquarie Equity Research\nLaopu Gold\nFigure 3 - Same store sales and SSSG\n-40%\n-20%\n0%\n20%\n40%\n60%\n80%\n100%\n120%\n140%\n160%\n180%\n0\n100\n200\n300\n400\n500\n600\n700\n2021\n2022\n2023\n2024\n2025\nRmb mn\nSame store sales\nSSSG\nSource: Macquarie Research, May 2026\nFigure 4 - We believe the elevated gold price to\nweigh on gold jewellery volume growth\n115.4%\n104.2%\n136.0%\n200.8%\n129.1%\n15%\n14%\n32%\n40%\n50%\n0.0%\n50.0%\n100.0%\n150.0%\n200.0%\n250.0%\n2023\n1H24\n2H24\n1H25\n2H25\nComparable store sales growth\nGold price increase YoY\nVolume (MQe)\nSource: Company data, Macquarie Research, May 2026\nFigure 5 - Laopu has showed decelerating\noperating leverage despite stellar SSSG\n-50%\n0%\n50%\n100%\n150%\n200%\n250%\n0%\n5%\n10%\n15%\n20%\n25%\n30%\n35%\n2021\n2022\n2023\n1H24\n2H24\n1H25\n2H25\nAdministrative expenses ratio\nSelling & Marketing ratio\nSSSG\nSource: Company data, Macquarie Research, May 2026\nFigure 6 - Laopu has net debt of Rmb4.2bn as end\nof FY25\n0.0\n500.0\n1000.0\n1500.0\n2000.0\n2500.0\n3000.0\n3500.0\n4000.0\n4500.0\n2021\n2022\n2023\n2024\n2025\nRmb mn\nNet debt\nSource: Company data, Macquarie Research, May 2026\n11 May 2026\n4\n--- page 5 ---\nMacquarie Equity Research\nLaopu Gold\nFinancials and valuations\nRevenue\nOur Macquarie Desk strategists forecast the average gold price to rise 58%/18% in 1H/2H26\nYoY, and then decline 13%/7% YoY in 1H27/2H27, Thus, we expect fixed-price gold\nmomentum to slow in 2027.\n•\nFor 2026E, we expect 35% SSSG, driven mainly by elevated gold prices and price hikes. We\nforecast 83% revenue growth YoY, with 59% growth in offline boutiques and 200% growth\nonline, supported by strong SSSG, store expansion, and gold price momentum.\nFor 2027E, we expect a 40% SSS decline as lower gold prices weigh on sales volumes. We\nforecast a 20% revenue decline, with a 32% drop in boutique sales, partly offset by 12%\nonline revenue growth.\nFigure 7 - Macquarie gold price forecast\n-20.0%\n-10.0%\n0.0%\n10.0%\n20.0%\n30.0%\n40.0%\n50.0%\n60.0%\n70.0%\n80.0%\n0\n1000\n2000\n3000\n4000\n5000\n6000\n1Q23\n2Q23\n3Q23\n4Q23\n1Q24\n2Q24\n3Q24\n4Q24\n1Q25\n2Q25\n3Q25\n4Q25\n1Q26\n2Q26E\n3Q26E\n4Q26E\n1Q27E\n2Q27E\n3Q27E\n4Q27E\n1Q28E\n2Q28E\n3Q28E\n4Q28E\nUS$/Oz\nGold price (US$/oz)\nYoY\nSource: Macquarie Desk Strategy, May 2026\nFigure 8 - Revenue forecast by channels\n-100%\n-50%\n0%\n50%\n100%\n150%\n200%\n250%\n300%\n350%\n400%\n0\n5,000\n10,000\n15,000\n20,000\n25,000\n30,000\n35,000\n40,000\n2021\n2022\n2023\n2024\n2025 2026E 2027E 2028E\nRmb mn\nBoutiques\nOnline platforms\nYoY - Boutique\nYoY - Online platforms\nSource: Macquarie Research, May 2026\nGross profit\n•\nFor 2026E, we expect gross margin to recover to 43.3%, supported by price hikes and the\nbenefit of gold inventory built in 2025.\n•\nFor 2027E, we expect gross margin to drop to 39.3% due to more promotions amid\ncompetition.\nOperating profit\n•\nIn 2026E, we expect operating profit to grow 137% YoY, driven by operating leverage and\ngross margin expansion.\n•\nIn 2027E, we expect operating profit to decline 39% YoY, reflecting lower gross margins,\nhigher brand investment and operating deleverage.\nNet income\n•\nWe estimate net income growth of 140%/-40%/1% for FY26E/27E/28E.\nCash and debt\n•\nOver 2023 to 2025, the company's gross debt grew substantially from Rmb128mn to\nRmb6.3bn due to fast-business expansion. By end-2025, it recorded net debt of Rmb4.2bn.\nValuation and target price\n•\nOur HK$453 target price is based on 10x FY27E PER, in line with HK/China gold jewellery\nretailers.\n11 May 2026\n5\n--- page 6 ---\nMacquarie Equity Research\nLaopu Gold\nFigure 9 - Gross margin forecast\n34.0%\n35.0%\n36.0%\n37.0%\n38.0%\n39.0%\n40.0%\n41.0%\n42.0%\n43.0%\n44.0%\n0\n5,000\n10,000\n15,000\n20,000\n25,000\n2021\n2022\n2023\n2024\n2025\n2026E 2027E 2028E\nRmb mn\nGross profit\nGross profit margin\nSource: Macquarie Research, May 2026\nFigure 10 - Operating profit forecast\n-100%\n-50%\n0%\n50%\n100%\n150%\n200%\n250%\n300%\n350%\n0\n2,000\n4,000\n6,000\n8,000\n10,000\n12,000\n14,000\n16,000\n18,000\n2021\n2022\n2023\n2024\n2025\n2026E 2027E 2028E\nRmb mn\nOperating profit\nOperating profit margin\nYoY\nSource: Macquarie Research, May 2026\nFigure 11 - Net profit forecast\n-100%\n-50%\n0%\n50%\n100%\n150%\n200%\n250%\n300%\n350%\n400%\n0\n2,000\n4,000\n6,000\n8,000\n10,000\n12,000\n14,000\n2021\n2022\n2023\n2024\n2025\n2026E 2027E 2028E\nRmb mn\nNet profit\nYoY\nSource: Macquarie Research, May 2026\nFigure 12 - Gross debt and Net debt from 2021 to\n2025\n0\n1,000\n2,000\n3,000\n4,000\n5,000\n6,000\n7,000\n2021\n2022\n2023\n2024\n2025\nRmb mn\nGross Debt\nNet Debt\nSource: Company data, Macquarie Research, May 2026\n11 May 2026\n6\n--- page 7 ---\nMacquarie Equity Research\nLaopu Gold\nFigure 13 - Peer valuation comparison for Laopu Gold\nCompany Name\nCode\nPrice\nRatings\nTP\nUpside\nMkt Cap \nP/E (x)\nP/B (x)\nDiv yield (%)\n(lcy/sh)\n(lcy/sh)\n(%)\nUS$m\n2026E\n2027E\n2026E\n2027E\n2026E\n2027E\n2026E\n2027E\n2026E\n2027E\n2026E\nLaopu Gold\n6181 HK\n586\nUP\n453.00\n(22.7)\n        \n12,587.3\n       \n7.9\n           \n12.9\n         \n4.8\n              \n4.5\n              \n60.6\n         \n34.8\n         \n148.4\n          \n(39.0)\n        \n0.1\n         \n(0.3)\n          \n6.3\nChina gold j 37": "--- page 1 ---\nwww.jpmorganmarkets.com\nAsia Pacific Equity Research\n28 April 2026\nLaopu Gold - H\n \nOverweight\n6181.HK, 6181 HK\n \nResilient demand; likely no financial needs in the \nnear term; attractive valuation; top pick\n \nPrice (28 Apr 26): HK$573.00\nPrice Target (Dec-26): HK$1,296.00\n \nChina\nConsumer\nQian Yao AC\n(86-21) 6106 6277\nqian.q.yao@jpmorgan.com\nSAC Registration Number: S1730521050001\nCarson Fan\n(86-21) 6106-6294\nrong.fan@jpmorgan.com\nSAC Registration Number: S1730522070002\nJ.P. Morgan Securities (China) Company Limited\nKey Changes (FYE Dec)\nPrev \nCur \nΔ \nRevenue - 26E (Rmb \nmn) \n40,136 \n43,128 \n7.5% \nRevenue - 27E (Rmb \nmn) \n52,486 \n54,666 \n4.2% \nStyle Exposure\nSources for: Style Exposure – J.P. Morgan Global Markets Strategy; all other tables are company data and J.P. Morgan estimates.\n \nSee page 8 for analyst certification and important disclosures, including non-US analyst disclosures.\nLaopu’s share price has fallen 22% in Apr-to-date (vs. HSI/MSCI China \n+5%/+5%), due mainly to investors’ worries about the retail sales trend \namid gold price dynamics (down 14% vs. peak at end Jan) and potential \nplacement. We remain positive on Laopu, given: 1) the resilient demand \nin the recent festive events; 2) the low possibility of share placement in \nthe near term; and, 3) channel upgrades. We think the risk reward is \nattractive, with the current valuation (10.7x/8.7x 26E/27E P/E, Bloomberg \nconsensus), and expect re-rating from here. We are confident in Laopu’s \n2026 (JPMe sales/earnings +58%/+71%), driven by: 1) strengthening \nbrand equity; 2) new product pipelines; 3) channel upgrades & expansion; \nand 4) VIC management bearing fruit. We raise our 26-27E earnings \nestimates by 5-8% (given the resilient demand). Our DCF-based PT \nremains at HK$1,296, implying 19x 2027E P/E. We see Laopu as best \npositioned to benefit from experience-led growth with a systematic \napproach (disciplined store count, a direct to consumer model and \ndifferentiated service quality upheld by a highly selective/trained team). \nLaopu is our top pick in the China consumer sector.   \n• Resilient demand amid gold price fluctuations. Our recent channel \nchecks in Shanghai (>one fifth offline sales) suggested resilient \nconsumer demand during festival events (started on 25 Apr). Key \nfindings: 1) solid traffic: 10-30min line-up (stronger than peers); 2) \nrobust conversion rate: c30 orders per hour (>70% conversion rate); 3) \nfurther penetration into new customers: c50% were new customers; 4) \nshortage of popular SKUs, such as the new Rose Window Necklace with  \nPink Sapphire (launched in Mar). We also noticed Laopu’s active \ninitiatives to strengthen its sense of value to customers amid gold price \ndynamics, such as a lower threshold for gifts (e.g., 5g gold coin gifts for \nticket size over Rmb250k currently, vs. Rmb500k prior). Laopu’s \nresilient trend vs. peers, demonstrates its strengthening brand equity and \nleading position in the heritage gold market.  \n• Low possibility of a capital raise, near-term. We expect sufficient \ninternal cash to support inventory preparation, near-term (calculations \nper Table 1). This should ease investors’ concern on a share placement \nin the near term (to recap, Laopu placed new shares 2 times in 2025, one \nin mid-May for new store openings and one at end Oct mainly for \ninventory reserves for the upcoming peak season, in our view). \n• Channel upgrades: We think Laopu is on track to upgrade channels to \nstrengthen growth visibility in 2026: with 1) upgrades of 8-12 domestic \nstores (better locations and larger selling areas); and, 2) 4-6 new \noverseas stores (mainly in 2H26). Potential markets include Singapore, \nHK, Macau, Japan, Korea, Malaysia and Thailand. \n24 Mar 2026 Laopu: Strategic resilience \namid current gold market volatility  \n23 Mar 2026 Laopu: First Take \n8 Mar 2026 China Jewelry & Sportswear: \nTakeaways ecelerate, mitigated by increasing online \nsales mix and strong productivity of stores opened or expanded in 2025-26. We estimate \nthat NPM for online channel is L-MSD higher than offline channel considering savings on \nrental and depreciation, which more than offset platform commission fee and a \npotentially lower GPM than offline. We introduced a scenario analysis for Laopu 2026 \nearnings forecast with three key drivers: 1) online sales mix, 2) same-store volume \ngrowth, and 3) productivity of new stores. Our base case comes to 55%/ 67% YoY \ngrowth for revenue/ net profit in 2026E, implying 20-30% growths in Q2-Q426E. Our \nupside/ downside case leads to 131%/ 29% YoY net profit growth.\nChannel check update: negative 20-30% SSSG in March and April-to-date\nBased on our observations and channel check, we noticed 20-30% SSSG decline in \nMarch and April-to-date in the Beijing high-base store, which achieved 50% growth in \nCNY holiday season. We attribute the decline to 1) weak gold price, 2) a shortened \nshopping festival (20 days in 2026 March-April vs c40 days in 2025 March-April), and 3) \ninventories that Daigou purchased in Jan-Feb before price raise have not yet been fully \nconsumed. Both ticket size and transaction volume have declined. By consumer group, \nwe noticed a deeper sales decline among Daigou than ordinary consumers. Demand \nfrom VIC consumers showed better resiliency than middle class and entry-level \nconsumer groups. We view the trend in line with our expectation.\nNear-term sector demand shifted by weak gold price\nAfter reaching US$5,300 in early March, gold price retracted to around US$4,700 with \nnear-term uncertainties from Middle East situation. This has pressured demand for fixed-\nprice gold jewelry in the near-term, while supported demand for weight-based gold \njewelry on a low base. Though we are in the latter stage of gold's bull cycle, UBS view on \ngold price to reach new highs remain unchanged (see Global Precious Metals Outlook \nreport). We expect fixed-price gold demand to recover if gold price resumes the upward \ntrend and that brands have presence outside of Mainland China to benefit more, \nconsidering the pricing gap post domestic VAT change.\nValuation: Buy rating; PT of HK$930.0\nTrading at 11x 2026E PE on a 6.6% dividend yield, we view risk reward of Laopu \nattractive. Our upside/ downside case suggest that Laopu is trading at 8x -15x 2026E PE. \nOur DCF-derived PT implies 18x 2026E PE on the base case.\nHighlights (Rmbm)\n12/23\n12/24\n12/25\n12/26E\n12/27E\n12/28E\n12/29E\n12/30E\nRevenues\n3,180\n8,506\n27,303\n42,212\n47,150\n52,530\n58,352\n64,173\nEBIT (UBS)\n571\n1,974\n6,519\n10,947\n12,437\n13,941\n15,586\n17,239\nNet earnings (UBS)\n416\n1,473\n4,868\n8,136\n9,258\n10,387\n11,619\n12,860\nEPS (UBS, diluted) (Rmb)\n3.03\n9.47\n28.25\n45.97\n52.49\n58.89\n65.87\n72.91\nDPS (net) (HK$)\n0.00\n6.35\n21.34\n38.93\n47.16\n50.88\n57.58\n64.45\nNet (debt) / cash\n(352)\n(967)\n(4,513)\n(3,388)\n(2,962)\n(3,149)\n(2,827)\n(2,475)\nProfitability/valuation\n12/23\n12/24\n12/25\n12/26E\n12/27E\n12/28E\n12/29E\n12/30E\nEBIT (UBS) margin %\n18.0\n23.2\n23.9\n25.9\n26.4\n26.5\n26.7\n26.9\nROIC (EBIT) %\n37.8\n58.4\n63.3\n63.2\n62.4\n63.2\n64.0\n64.6\nEV/EBITDA (UBS core) x\n-\n10.7\n16.3\n8.3\n7.3\n6.5\n5.8\n5.3\nP/E (UBS, diluted) x\n-\n14.1\n22.5\n11.2\n9.8\n8.7\n7.8\n7.0\nEquity FCF (UBS) yield %\n-\n(6.6)\n(6.7)\n5.4\n8.1\n9.0\n10.3\n11.6\nDividend yield (net) %\n-\n4.4\n3.1\n6.6\n8.0\n8.7\n9.8\n11.0\nSource: Company accounts, LSEG Eikon, UBS estimates. Metrics marked as (UBS) have had analyst adjustments applied. Valuations: based on an average share price that year, (E): based on a share \nprice of HK$ 588.00 on 23-Apr-2026\nThis report has been prepared by UBS Securities Asia Limited. ANALYST CERTIFICATION AND REQUIRED DISCLOSURES, \nincluding information on the Quantitative Research Review published by UBS, begin on page 5.  \nEquities\nChina\nRetailers, Specialty rst boutique in Beijing in 2009, Laopu was the first gold jewellery company in \nChina to promote the concept of heritage gold. It also pioneered embedding diamonds in \npure gold and introducing pure gold enamel jewellery. Laopu differentiates its products with \ninnovative and complex craftsmanship. As of December 2024, Laopu self-operated 36 \nboutiques at high-end shopping malls in the mainland's high-tier cities, as well as in Hong \nKong and Macau.\nValuation Method and Risk Statement\nWe base our price target on a DCF methodology.\nWe think key risks facing China's jewellery sector include: 1) a slowdown in China's economy, \nwhich could dampen consumers' spending on jewellery; 2) lab-grown diamonds could gain \nmarket share and intensify consumers' price sensitivity; 3) high volatility in gold prices may \nwaver consumers’ purchasing decision; and 4) competition from the Shuibei model, which \nsells retail gold jewellery at wholesale prices.\nCompany-specific downside risks include: 1) competition from other jewellers as consumers \nmight not be able to differentiate their products; 2) fixed-price gold being criticised for its \nambiguous pricing structure; 3) consumers may turn to imitation products at lower prices; \nand 4) the potential stock selling of cornerstone and other IPO/pre-IPO investors after their \nlock-up period.\n--- page 4 ---\nFirst Read: Laopu Gold 23 April 2026\nab 4\nQuantitative Research Review\nUBS Global Research publishes a quantitative assessment of its analysts' responses to certain questions about the likelihood of an occurrence \nof a number of short term factors in a product known as the 'Quantitative Research Review'.  The views for this month can be found below. \nViews contained in this assessment on a particular stock reflect only the views on those short term factors which are a different timeframe to \nthe 12-month timeframe reflected in any equity rating set out in this note.  For previous responses please make reference
