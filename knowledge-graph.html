: investing\n---\n\n# 腾讯控股最近7天投资相关信息汇总（截至2026-05-27）\n\n## 摘要\n截至2026年5月27日，腾讯控股（0700.HK）近期投资相关高价值信息包括：回购持续每日约5亿港元、自研沧海V2视频编解码芯片即将量产、微信小游戏变现收入同比增超20%、5月游戏版号获批、云/AI资本开支上行信号确认。南向资金短期净卖出约15.7亿港元，属资金面波动而非基本面信号。\n\n## 关键要点\n\n### 一、股东回报 — 回购持续\n- 5月27日：斥资5.01亿港元回购114.9万股，回购价433.6-442港元\n- 5月26日：斥资5.01亿港元回购股份\n- 5月21日、5月18日：均有\"已发行股份变动及股份购回\"公告\n- 回购节奏稳定在每日约5亿港元，年化回购约1200亿港元+，股东回报态度积极\n\n### 二、业务进展 — 三个高信号事件\n\n**1. 沧海V2自研芯片即将量产（5月27日，投资相关性：高）**\n- 沧海V2已成功点亮，编解码/极速高清/渲染三大能力全面升级\n- 2026年下半年全面提供线上服务\n- 沧海V1已在腾讯云+自有场景部署超10万片\n- 自研芯片降本路径清晰，视频编解码是腾讯云+内容业务基础设施，降本增效空间大\n\n**2. 微信小游戏变现收入同比增长超20%（5月27日，投资相关性：高）**\n- 2026年1-5月小游戏变现收入同比+20%+，流量主数量+20%\n- 小游戏商家预算同比+115%\n- 月活破5亿\n- 小游戏是微信生态高增长变现渠道，广告+内购双轮驱动，利润率高于传统游戏\n\n**3. 5月游戏版号获批，腾讯新游在列（5月26日，投资相关性：中）**\n- 5月共158款游戏获批，腾讯、网易新游在列\n- 版号常态化发放，游戏管线供给稳定\n\n### 三、资本开支/云需求信号\n- 香农芯创（5月26日）：预计2026年来自阿里、腾讯、字节跳动的收入有较大增长\n- 互联网大厂云/AI资本开支上行周期确认，腾讯云需求端受益\n\n### 四、AI生态扩展\n- 擎朗智能XMAN-L1机器人（5月26日）：接入豆包、腾讯等大模型\n- 腾讯混元大模型在机器人场景落地，属生态卡位，非核心收入贡献\n\n### 五、资金面\n- 南向资金5月26日净卖出腾讯约15.7亿港元，为当日卖出最多标的\n- 短期资金流出，可能与恒生科技板块整体调整有关\n\n### 六、行情与估值快照（5月27日收盘）\n- 股价：434.40 HKD（-1.05%）\n- 总市值：39,609亿港元\n- 市盈率(动)：~18.9x\n- 市净率：3.10x\n- 成交额：108.36亿港元\n\n### 投资相关性排序\n1. 回购持续（每日5亿港元级）— 股东回报纪律性强，对估值有支撑\n2. 沧海V2芯片量产 — 自研降本逻辑兑现，云业务毛利率改善预期\n3. 小游戏高增长（变现+20%+）— 微信生态变现深化，利润率高的增量收入\n4. 版号+云需求信号 — 游戏供给端稳定，云/AI资本开支上行\n5. 南向资金净卖出 — 短期波动，非基本面信号\n## 关联\n- [腾讯控股投资者关系页面-2026年Q1财报与股价数据](腾讯控股投资者关系页面-2026年Q1财报与股价数据.md) — 市场信息需对照官方数据验证\n- [腾讯沧海V2视频编解码芯片下半年量产](2026-05-27-腾讯沧海V2视频编解码芯片下半年量产.md) — 沧海V2是近期最重要的催化事件", "n30": "### 2026-06-02-JPMorgan-AIDC ESS Reference Architectures and Early Orders Point to E...-122368714.pdf  (总页数=11)\n\n--- 第1页 ---\nAsia Pacific Equity Research\n02 June 2026\nJ P M O R G A N\nwww.jpmorganmarkets.com\nThis material is neither intended to be distributed to Mainland China investors nor to provide securities investment consultancy services within the \nterritory of Mainland China. This material or any portion hereof may not be reprinted, sold or redistributed without the written consent of J.P. Morgan.  \nAPAC Utilities & Renewables | \nSustainable Investing\nAlan Hon AC\n(852) 2800-8573\nalan.hon@jpmorgan.com\nJ.P. Morgan Securities (Asia Pacific) Limited/ J.P. \nMorgan Broking (Hong Kong) Limited\nRebecca Wen AC\n(852) 2800-8505\nrebecca.y.wen@jpmorgan.com\nJ.P. Morgan Securities (Asia Pacific) Limited/ J.P. \nMorgan Broking (Hong Kong) Limited\nDaqi Jiao\n(852) 2800-8595\ndaqi.jiao@jpmorgan.com\nJ.P. Morgan Securities (Asia Pacific) Limited/ J.P. \nMorgan Broking (Hong Kong) Limited\nParsley Ong\n(65) 6882-8578\nparsley.rh.ong@jpmorgan.com\nJ.P. Morgan Securities Singapore Private Limited/ \nJ.P. Morgan Securities (Asia Pacific) Limited/ J.P. \nMorgan Broking (Hong Kong) Limited\nSonny Lee\n(82-2) 758 5716\nsonny.lee@jpmorgan.com\nJ.P. Morgan Securities (Far East) Limited, Seoul \nBranch\nNick Lai\n(65) 6801-3176\nnick.yc.lai@jpmorgan.com\nJ.P. Morgan Securities Singapore Private Limited/ \nJ.P. Morgan Securities (Asia Pacific) Limited/ J.P. \nMorgan Broking (Hong Kong) Limited\nStephen Tsui, CFA\n(852) 2800-8592\nstephen.tsui@jpmorgan.com\nJ.P. Morgan Securities (Asia Pacific) Limited/ J.P. \nMorgan Broking (Hong Kong) Limited\nSiemens (SIE GR, OW, covered by Phil Buller) announced that it is working with \nNVIDIA (NVDA US, OW, Covered by Harlan Sur) and partnering with Fluence \nEnergy (FLNC US, Neutral, covered by Mark Strouse) to develop reference \npower-and-controls architecture for AIDCs. Within this architecture, Fluence \nEnergy contributes the battery energy storage system. Together with Fluence \nEnergy’s previous announcement on MAS with hyperscalers, we believe these \nshould rebuff market concerns on whether AIDCs need ESS. During our recent \nvisit to Sungrow, management shared a similar view that ESS is a major solution \nto AIDC power constraints and they have already received ESS orders from data-\ncenter power developers. Meanwhile, LEGS (373220 KS, OW, covered by Parsley \nOng) also announced that it has signed a $1.6bn contract to supply 6GWh of ESS \nbatteries to DTE Energy. This is in line with our key takeaways from the expert call \nwe hosted (link), where the expert saw that ESS is likely to be part of the AIDC \npower solution in a tight power supply market, but orders will likely be more back-\nend loaded, due to the development sequence. Within the APAC region, we \nhighlight key OW-rated names under J.P. Morgan APAC coverage: CATL-H/A, \nSungrow, Samsung SDI, LGES and Nari.\nSiemens partners with Fluence Energy to develop power architecture for \nAIDCs: Siemens, working with NVIDIA and partnering with Fluence Energy, \nhas developed UL-aligned reference power-and-controls architecture for next-\ngeneration AIDCs that translates the “AI factory” concept into a deployable, \nmodular \nelectrical \nblueprint \n(official \nrelease \nlink). \nWithin \nthis \narchitecture, Fluence Energy contributes battery energy storage to add \nresilience and flexibility in power-constrained environments – supporting \ncapabilities such as ride-through, black start, demand response, and AI load \nsmoothing – so operators can bring extreme-density compute online faster while \nstaying within fixed power envelopes.\nKey takeaways from the AIDC ESS developments: We have seen a few positive \ndevelopments with respect to AIDC ESS. In addition to the one mentioned above, \nin early May 2026, Fluence Energy announced that it had signed Master Supply \nAgreements (MAS) with two hyperscalers and expected first orders during F3Q \n(report link). We believe these developments should rebuff market concerns on \nwhether AIDCs need ESS and result in rising expectations for AIDC ESS demand \ninto FY26/27.\nHow this aligns with APAC companies: During our visit to Sungrow (report link) \nin mid May 2026, management shared that ESS is a major solution to AIDC power \nconstraints; Sungrow has already received ESS orders from data-center power \ndevelopers, while these ESS will be used to support AIDCs. This should further \nreinforce the thesis for AIDC ESS deployment. In late May 2026, LG Energy \nSolution (373220 KS, OW, covered by Parsley Ong) announced that it had signed \na $1.6bn contract to supply 6GWh of ESS batteries to DTE Energy (see Parsley’s \nreport link). \nSee page 5 for analyst certification and important disclosures, including non-US analyst disclosures.\nAIDC ESS\nReference Architectures and Early Orders Point to ESS \nAdoption\n--- 第2页 ---\n2\nAlan Hon AC\n(852) 2800-8573\nalan.hon@jpmorgan.com\nAsia Pacific Equity Research\n02 June 2026\nJ P M O R G A N\nRe-cap from the AIDC ESS expert call: We hosted an expert call on AIDC ESS (report link) \nin late April 2026, where an industry expert shared that ESS is likely to be part of the AIDC \npower solution in a tight power supply market, as most new AIDCs will require BESS for \nreliability and optimization, with rising attachment rates and durations. However, AIDC ESS \nwill likely be more back-end loaded, due to the development sequence. Furthermore, distinct \nAIDC ESS requirements favour leading players with strong product quality, i.e. Sungrow and \nLGES.\n•\nESS adoption in AIDCs appears slow, development sequence explains the lag: AIDC \nESS adoption is taking time due to construction sequencing, not a lack of demand. ESS \ninstallation in a typical AIDC build occurs in the later stages — after land and civil works, \nfoundation works, onsite power generation and the construction of data center halls and \ncontrol buildings. Most large-scale AIDCs are still in the early construction phases. ESS \nprocurement and installation should accelerate meaningfully as these projects progress \ntoward completion. The expert’s view is that the best period for ESS demand is still ahead, \nconcentrated in the back half of the current build cycle.\n•\nDistinct AIDC ESS requirements favor players with strong product quality: AIDC \nESS is a distinct product category from utility-scale ESS, despite similar battery \nhardware. Utility-scale ESS is optimized for energy arbitrage, daily cycling and \npredictable loads. In contrast, AIDC ESS is designed for power quality, redundancy and \nthe protection of valuable IT equipment, requiring rapid response, high power density and \nfrequent micro-cycling. This demands high-quality product. The industry is moving \ntoward integrating BESS and UPS into a unified energy layer. \nFigure 1: Levels of energy storage in a data center\nSource: BloombergNEF. PPA = power purchasing agreement; UPS = uninterruptible power supply.\nMix of launches of BESS in data centers, by \nstorage duration\n<2 hours, 23%\n2 hours, 23%\n4 hours, 33%\n4-10 hours, \n15%\n10+ hours, 8%\nSource: BloombergNEF. Note: Not all projects disclose \nstorage duration. Data as of 30 March 2026.\nMix of AIDC ESS use cases (in terms of \ncapacity) in the US, averaged over 2026E-\n30E\nUPS, 9%\nSolar and \nstorage PPAs, \n23%\nGas generation \nsupport, 34%\nFlexibility, 29%\nPower \nsmoothing, 5%\nSource: BloombergNEF.\n--- 第3页 ---\n3\nAlan Hon AC\n(852) 2800-8573\nalan.hon@jpmorgan.com\nAsia Pacific Equity Research\n02 June 2026\nJ P M O R G A N\nFigure 2: Types of energy storage used in data centers\nSource: BloombergNEF. Note: UPS = uninterruptible power supply; NMC = nickel manganese cobalt; LFP = lithium iron phosphate; BBU = battery backup unit.\nRecommendations\nThe table below summarizes the key relevant stocks under J.P. Morgan coverage and their \nexposure to the ESS business.\n•\nWe recently initiated coverage of Deye at OW. Deye is a distributed generation (DG) \nenergy storage (ESS) producer with a first-mover advantage in Emerging Markets (EM). \nWe see structural growth in ESS globally, on energy transition and renewables’ \nintermittent issues. ESS battery shipment data in April also indicated DG has higher \ngrowth (C&I +154%yoy) than utility-scale (+93% yoy). By geography, multiple EM \nregions will see >50% 2025-27 installation CAGR, per Bloomberg New Energy Finance \n(BNEF). Near term, energy supply shocks are catalyzing faster adoption of DG of solar\n+storage, especially in regions where DG diesel was adopted. Longer term, we may see \na policy tilt towards energy resilience, providing a long-term growth tailwind. Deye’s \nlegacy exposure to home appliances enables its cost leadership, owing to the rise in in-\nhouse fabrication (link to initiation report).\n•\nLargest PCS supplier – Sungrow (OW): Sungrow is the world’s largest solar inverter \nproducer by volume, gaining market share in recent years due to cost advantage. Sungrow \noffers superior product quality and stronger brand recognition compared to domestic \npeers. We expect Sungrow to benefit from robust ESS demand and rising orders from \nutilities and data centers.\n•\nChina ESS battery: CATL-A (OW) is the largest ESS battery maker globally and our \ntop pick in China’s battery value chain. EVE Energy (N) has the highest ESS exposure \namong covered battery makers, followed by CALB (N). We also favor BYD-H/A (OW), \ngiven strong demand for its EV models in overseas markets and benefits from vertical \nintegration in EV and ESS.\n--- 第4页 ---\n4\nAlan Hon AC\n(852) 2800-8573\nalan.hon@jpmorgan.com\nAsia Pacific Equity Research\n02 June 2026\nJ P M O R G A N\n•\nKorean battery players see improved opportunities and margins in US ESS: ESS \norder win momentum at LGES (OW) has been strong, and we estimate that the company \nhas the largest LFP ESS order backlog among Korean battery makers. ESS visibility is \nalso improving for SDI (OW): US battery import data indicate that China-origin \nshipments have fallen further since July 2025 (post-OBBBA), while Korea-origin \n(largely SDI) shipments have risen sequentially, supporting an ongoing sourcing shift as \nUS regulations remain effective. SDI’s LFP cathode contract with L&F implies \n~25GWh/year of US ESS shipments by 2028-29.\nFigure 3: Summary of ESS value chain stocks under J.P. Morgan coverage\nSource: Company data, J.P. Morgan estimates. Note: ESS battery may include BMS or system integration. EVE’s ESS volume exposure refers to ESS battery volume over total power battery, not incl. consumer \nbattery. Note: Gotion FY25 exposure is JPMe. Note: SDI's total revenue includes electronic materials and small battery while volume excludes electronic materials and small battery.\n--- 第5页 ---\n5\nAlan Hon AC\n(852) 2800-8573\nalan.hon@jpmorgan.com\nAsia Pacific Equity Research\n02 June 2026\nJ P M O R G A N\n Companies Discussed in This Report (all prices in this report as of market close on 02 June 2026, unless otherwise indicated)\nBYD Company Limited - A(002594.SZ/Rmb96.76/OW), BYD Company Limited - H(1211.HK/HK$96.75/OW), \nCALB(3931.HK/HK$31.96/OW), CATL - A(300750.SZ/Rmb433.89/OW), CATL - H(3750.HK/HK$779.50/OW), Deye - \nA(605117.SS/Rmb111.10/OW), EVE Energy(300014.SZ/Rmb65.48/N), LG Energy Solution(373220.KS/W443,500/OW), Nari \nTechnology - A(600406.SS/Rmb24.64/OW), Samsung SDI(006400.KS/W601,000/OW), Sungrow - A(300274.SZ/Rmb172.70/\nOW) \n Analyst Certification:  The Research Analyst(s) denoted by an “AC” on the cover of this report certifies (or, where multiple Research Analysts \nare primarily responsible for this report, the Research Analyst denoted by an “AC” on the cover or within the document individually certifies, \nwith respect to each security or issuer that the Research Analyst covers in this research) that: (1) all of the views expressed in this report \naccurately reflect the Research Analyst’s personal views about any and all of the subject securities or issuers; and (2) no part of any of the \nResearch Analyst's compensation was, is, or will be directly or indirectly related to the sp\n…(截断)", "n31": "### 2026-05-22-JPMorgan-China Artificial Intelligence China AI Application Tour Take...-122171752.pdf  (总页数=17)\n\n--- 第1页 ---\nwww.jpmorganmarkets.com\nAsia Pacific Equity Research\n22 May 2026\nChina Artificial Intelligence\n \nChina AI Application Tour Takeaways: Early Evidence \nof Workflow-Led Monetization\n \nHead of China Equity Research \nand Co-Head of Asia TMT \nResearch\nAlex Yao AC\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSAC Registration Number: S1730523020001\nOlivia Xu\n(86-21) 6106 6138\nolivia.w.xu@jpmorgan.com\nSAC Registration Number: S1730525060001\nJiajie Shen, CFA\n(86-21) 6106 6352\njiajie.shen@jpmchase.com\nSAC Registration Number: S1730520030006\nJ.P. Morgan Securities (China) Company \nLimited\nSee page 9 for analyst certification and important disclosures, including non-US analyst disclosures.\nEight meetings across autonomy, independent model development, enterprise \nworkflow software and vertical AI applications point to early evidence of \nworkflow-led monetization in selected use cases. The most recurring theme is \nthat value creation appears increasingly tied to proprietary data, workflow \ncontext, customer integration and deployment know-how. Foundation models \nremain important, while many companies are using them as flexible inputs \nwithin broader product and workflow stacks. A useful working framework is \n“own the context, rent the model,” although we would still treat this as a \ndirection of travel that needs more public-market proof.\nThis pattern appeared across enterprise data integration, insurance and \nfinancial-services \nrisk, \ncross-border \nmarketing, \nindependent \nmodel \ndevelopment and listed model-plus-infrastructure businesses. Several \ncompanies described routing tasks across different domestic and frontier \nmodels based on price, performance and use case. One listed model-plus-\ninfrastructure company also acknowledged that raw API switching costs can \nbe low, with customer stickiness improving after enterprise data and workflow \nintegration. We view this as an important signal that base-model \ndifferentiation alone may face pressure over time, with the degree of pressure \nlikely varying by use case, customer segment and workflow ownership.\nThe tour modestly changes our prior assumption in two directions. Previously, \nwe viewed robotaxi as a cost line with limited near-term standalone \neconomics, \nAI \napplication \nmonetization \nas \nstill \nearly, \nand \ninfrastructure/compute as the clearest listed exposure. The meetings suggest \nthe first two views deserve more nuance. Some vertical and enterprise AI \ncompanies described recurring revenue, value-based pricing and operating-\nlevel profitability, while autonomy companies pointed to improving unit \neconomics in selected deployments. These datapoints are mostly management-\nstated, often private-company specific, and still require verification through \nfilings, customer evidence and repeatable public-company disclosures.\nAs a result, our takeaway is that selected AI applications are showing early \nsigns of commercial relevance, particularly in workflow-heavy and data-rich \nverticals. The key question is whether these early signals can translate into \ndurable, scalable and software-like economics. Similarly, the tour suggests \nrising risk that base-model access becomes a more competitive and \ninterchangeable input in some enterprise settings. Model vendors may still \ndefend economics in high-value workflows such as coding, agents and \nenterprise software use cases where they control the user surface, workflow \nmemory or data loop. \nOur investment stance shifts incrementally. We become more constructive on \nAI infrastructure, compute, domestic-chip, memory and storage beneficiaries, \nas they can benefit from broader AI deployment even when model leadership \nrotates. We also become more positive on AI applications and workflow-layer \ncompanies that can translate model capability into customer-facing value \nthrough proprietary data, workflow ownership, pricing power, retention and\n--- 第2页 ---\n2\nAsia Pacific Equity Research\n22 May 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\ndeep customer integration. Autonomy also moves from a pure cost-center \nframework toward an early-commercial hypothesis in selected ADAS and \noverseas robotaxi deployments, while third-party-verifiable unit economics \nremain necessary before assigning broader valuation credit.\nKey observations\nObservation 1: Early evidence suggests model access may become \nmore interchangeable in select enterprise use cases\nThis was the most consistent signal across our meetings, although the \nconclusion still needs to be tested against public-company disclosures and \ncustomer behavior over time. Across multiple meetings, companies \ndescribed base-model capability as necessary, while customer value \nappeared to depend more on task completion, workflow integration, \nproprietary data and deployment quality. One independent model \ndeveloper argued that customers in the agentic era care less about using the \nlargest model and more about reliable task completion. A listed model-\nplus-infrastructure incumbent acknowledged low API switching costs and \nlocated customer stickiness in enterprise-data integration. Two vertical AI \napplication companies said that newer or cheaper models could be \nintegrated into their products, with limited impact on customer-facing \noutcomes because the application value sat in vertical data, workflow \ndesign and deployment context.\nThis updates our framework from a pure model-capability debate toward a \nbroader capability-plus-context debate. In many enterprise use cases, \ncustomers appear willing to use whichever model is adequate, cost-\neffective and available, while paying for the workflow layer that embeds \nAI into business processes. This does not mean model quality loses \nrelevance. It means model capability may need to be paired with \nproprietary workflow control, user interface ownership, data feedback \nloops and customer integration in order to support durable value capture.\nThe read-through is constructive for workflow-led AI companies and \nselective for model-led valuations. Base-model leadership can still matter \nin high-value workflows such as coding, agents, enterprise software \nautomation and other tasks where reliability, context length, tool use and \nmulti-step completion rates directly affect business outcomes. At the same \ntime, generic API access may face growing pricing pressure if customers \ncan route across multiple models with limited operational friction. For \nlisted model companies, the key question is whether they can prove \nworkflow ownership, retention, pricing power and rising enterprise value \ncapture beyond benchmark leadership.\nObservation 2: Select vertical and enterprise AI applications are \nshowing early commercial signals\n--- 第3页 ---\n3\nAsia Pacific  Equity Research\n22 May 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSeveral private vertical AI vendors described recurring revenue, value-\nbased pricing and operating-level profitability. The strongest examples \ncame from insurance and financial-services risk, enterprise data integration \nand cross-border marketing. We deliberately do not reproduce the specific \nfigures because they are non-public and several companies are private or \npotentially in listing processes.\nOn our rubric, these businesses appear to sit between Early-Commercial \nand Scaled. This represents a potential upgrade from our prior assumptions, \nwhich treated most AI-application monetization as early-stage and difficult \nto underwrite. The meetings indicate that some customers are paying, and \nin select cases pricing is linked to measurable business value, such as risk \nreduction, workflow efficiency, marketing conversion or decision \nautomation.\nAt the same time, the broader usefulness of LLM-driven applications \nremains debatable. The evidence we saw points to promising signals in \nworkflow-heavy, data-rich verticals, with less proof for the AI applications \nas a whole. The figures are self-reported and still need independent \nverification. Some management teams also acknowledged high customer \nconcentration, sub-scale wallet share at large clients, and lower-margin \nservice-heavy or human-assisted cold-start segments. These caveats matter \nbecause the economics may look less software-like once customer \nacquisition cost, implementation work, human assistance and concentration \nrisk are fully reflected.\nAs a result, our takeaway is that select AI applications are moving from \nnarrative toward early commercial validation, supported by signs of \nrecurring revenue, value-based pricing and operating-level profitability in \nsome verticals. We would still treat this as an emerging thesis. The \ndurability, scalability and software-like quality of these economics need to \nbe tested through filings, customer evidence and repeatable listed-company \ndisclosures.\nObservation 3: Autonomy may be moving from pure cost center \ntoward early-commercial in select use cases\nAutonomy was the area where the tour most challenged our prior \nassumptions. We previously viewed robotaxi as a cost line with limited \nnear-term standalone economics. The tour suggests that this view may be \ntoo conservative in select segments, although broader sector underwriting \nstill requires stronger verification.\nThe distinction between ADAS and L4 matters. Mass-production ADAS \nappears closer to Scaled, supported by OEM adoption, real-world data \nloops and software-like margin potential at volume. Robotaxi is earlier. \nListed L4 operators pointed to improving city-level economics, declining \nvehicle costs and better economics in certain overseas deployments, while \ncompany-level profitability remains a later-stage objective and regulatory \ngating remains material. L4 fleets therefore remain Early-Commercial in \nselect cities and Pilot in broader deployment terms.\n--- 第4页 ---\n4\nAsia Pacific Equity Research\n22 May 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nThe investable conclusion is selective. ADAS and supplier exposure look \nmore underwritable than L4 robotaxi pure plays because they are closer to \nmass production, OEM attach rates and visible revenue contribution. \nOverseas robotaxi deployments may offer better pricing and less \ncompetition, although current evidence remains early and management-\nstated. For listed L4 companies, the key test is auditable segment \neconomics, license-city expansion, vehicle cost-down, safety record and \nregulatory continuity.\nObservation 4: Neutral specialists are winning some OEM and \nenterprise sockets\nThe tour complicates our platform-distribution prior. We had previously \nassumed that platforms with distribution surfaces, cloud infrastructure and \necosystem control would capture much of the AI application value. The \nmeetings suggest a more mixed outcome.\nOne independent, non-platform model developer described winning OEM \nand enterprise deals partly because it is perceived as neutral, customizable \nand less tied to a competing consumer or cloud ecosystem. Its model \nconsumes platform cloud and map infrastructure as inputs. This points to a \nsplit-value chain where neutral specialists can own deployment context, \nwhile platforms monetize cloud, maps, compute and supporting \ninfrastructure.\nThis remains relevant for platform valuation. Large platforms like Tencent \nand Alibaba can still benefit through cloud, maps, compute, data \ninfrastructure and enterprise distribution. At the same time, platform-\nowned models may face a more selective path in OEM and enterprise \nprocurement when customers prioritize neutrality, customization and \nworkflow integration. Distribution remains important, yet procurement \ndecisions may increasingly depend on trust, integration depth and vertical \nimplementation capability.\nObservation 5: Compute and inference demand appears to be \nbroadening across use cases\nEvery company we met was a net consumer of compute, whether through \nm\n…(截断)", "n32": "### 2026-05-10-Jefferies-AI Series #41 New Developments of DeepSeek Post V4-121942676.pdf  (总页数=8)\n\n--- 第1页 ---\nChina (PRC) | Internet\nEquity Research\nMay 10, 2026\n \nThomas Chong *  | Equity Analyst\n852 3743 8016 | thomas.chong@jefferies.com\nZoey Zong *  | Equity Analyst\n852 3743 8163 | zoey.zong@jefferies.com\nAI Series #41: New Developments of\nDeepSeek Post V4\nHighlights (1) media last Fri reported on DeepSeek's plan to raise USD7bn.\nWe view AI Labs have respective strengths in different use cases. Talent\nacquisition and commercialization are important to AI Labs; (2) Baidu\nCreate 2026 will be held in BJ on Wed. This comes after filing of IPO\ncoaching of KLX last week (link); (3) Further integrations of Qwen app /\nTaobao; (4) capex spending of ByteDance is said to have been revised up\nfor 2026.\nMedia reports DeepSeek plans to raise USD7bn with valuation to exceed USD51.5bn after\ncompletion. According to media reports (e.g. The Information), DeepSeek will (1) speed up\nrevenue generation; (2) release V4.1 in Jun with more tools for enterprise users and better\nsupport for MCP. V4.1 will be able to process image and audio. The company has not\ncommented on the report. In our view, (1) AI Labs have respective strengths in different\nuse cases (e.g. MiniMax: multimodality, Zhipu: Coding); (2) talent retention/acquisitions is\nimportant (3) commercialization is key amid model-tiering industry trends. On the other hand,\nDS promotions will end on 31 May. The latest valuation of different players (a) DS: USD51.5bn;\n(b) Zhipu: USD53bn; (c) MiniMax USD30bn; (d) Kimi USD20bn\nBaidu Create 2026 to be held in BJ on Wed (13 May); ERNIE 5.1 was released during\nweekend. The topic is “Agents at Scale” which covers areas (a) implications of self-evolving\nagents for the industry; (b) AI agents trends; (c) coding agents. Meanwhile, ERNIE 5.1 was\nreleased on Sat (9 May). Highlights (1) about 6% of pre-training cost of comparable models,\nthanks to multi-dimensional pre-training inherited from ERNIE 5.0. ERNIE 5.1 reduces total\nparameters to about 1/3, active parameters to about 1/2; (2) upgrade search, reasoning,\nknowledge Q&A, creative writing and agentic capabilities; (3) ERNIE 5.1 was ranked no. 4\nglobally in LMArena’s Search Leaderboard which reflects strong multi-source retrieval and\nsynthesis which provide users with more consistent and reliable answers.\nMedia reports enhanced functionalities with the integration of Qwen app and Taobao. This\nis another upgrade of Qwen app offerings since Jan-26 (link). In Jan-26, Qwen app connected\nwith BABA’s ecosystem (e.g. Taobao, Instant Commerce, Figgy). According to media (e.g.\nReuters) on 10 May, users can browse, compare and purchase items via full product listings of\nTaobao/Tmall. Qwen app provides recommendations based on users preferences. Meanwhile,\nTaobao will introduce Qwen powered AI shopping assistant (e.g. virtual try-ons, 30-day price\ntracking).\nCapex spend remains one of the focus areas in upcoming earnings. Following the increase\nin capex by US hyperscalers (Alphabet, Meta) in 1Q earnings, media (e.g. SCMP) reports\nByteDance plans to raise capex by at least 25% to RMB200bn in 2026 due to surge in AI demand\nand memory costs. The company has not commented on the report.\nBAT, KC, and AI labs are Beneficiaries. We expect a surge in token consumption on rising\ndemand for AI models and agents to benefit CSPs like Baidu, Alibaba, Tencent (BAT), Kingsoft\nCloud (KC), and AI labs. Market is likely watching out for the coming reviews of Hang Seng\nFamily of Indexes on 22 May with effect on 8 Jun. According to third party SemiAnalysis\non 1 May, Anthropic ARR is forecast to reach USD44bn. According to analysis from Artificial\nAnalysis, (1) there is a narrowing intelligence gap between US and China models; (2) API cost\nis just a fraction vs US benefiting from MoE, linear attention, and MFU; (3) Coding, Workspace\nscenario and mid- to long-form content should see significant opportunities ahead.\n \nPlease see analyst certifications, important disclosure information, and information regarding the status of non-US analysts on pages  2 - 8 of this report.\n * Jefferies Hong Kong Limited\n--- 第2页 ---\nInternet\nEquity Research\nMay 10, 2026\n \nWe would like to thank Fiona Fan, employee of Evalueserve Inc., for providing research support services to our preparation of this report.\nWe would like to thank Han Wang, employee of Evalueserve Inc., for providing research support services to our preparation of this report.\nWe would like to thank Erica Qiu, employee of Evalueserve Inc., for providing research support services to our preparation of this report.\nCompany Valuation/Risks\nAlibaba Group Holding Limited\nOur price target of US$185/HK$179 is based on SOTP valuation. Key risks include: (1) severe macroeconomic slowdown impacts online shopping\ngrowth; (2) aggressive marketing spending in local services and globalization due to intensified competition; and (3) user growth is below\nexpectations.\nBaidu Inc.\nWe have a Buy rating and PT of USD181/HKD176, based on SOTP valuation. Risks include: (1) ad demand being severely affected by macro\nheadwinds; (2) intensified competitive landscape in the online video sector, and (3) slower-than-expected user growth.\nKingsoft Cloud\nWe have a Buy rating and PT of US$19 based on DCF valuation, considering strategic support of Xiaomi and Kingsoft in the long run. Key risks\ninclude (1) intensified competition in terms of price wars; (2) premium customers relying on in-house resources when shifting to private cloud;\nand (3) stringent regulations.\nMiniMax Group Inc.\nWe have a Buy rating and PT of HKD1,118 based on (1) 49x 2028E price-to-sales on the back of fast revenue growth at 123% CAGR between 2027\nand 2030. We apply 60% valuation discount due to its scale vs overseas peers. (2) Our PT is based on WACC 13% and discounted back to 2026.\nRisks include (1) slower-than-expected pace in innovations; (2) AI-native products are not well received by users and enterprises; (3) geopolitical\ntension on chip export controls on advanced chips.\nTencent Holdings Ltd.\nWe have a Buy rating and SOTP-based PT of HK$795. Risks include (1) unsuccessful launch of new games; (2) slower-than-expected growth in\nonline ads on macro headwinds; and (3) aggressive investment in new initiatives.\nAnalyst Certification:\nI, Thomas Chong, certify that all of the views expressed in this research report accurately reflect my personal views about the subject security(ies) and\nsubject company(ies). I also certify that no part of my compensation was, is, or will be, directly or indirectly, related to the specific recommendations or\nviews expressed in this research report.\nI, Zoey Zong, certify that all of the views expressed in this research report accurately reflect my personal views about the subject security(ies) and subject\ncompany(ies). I also certify that no part of my compensation was, is, or will be, directly or indirectly, related to the specific recommendations or views\nexpressed in this research report.\nRegistration of non-US analysts: Thomas Chong is employed by Jefferies Hong Kong Limited, a non-US affiliate of Jefferies LLC and is not registered/\nqualified as a research analyst with FINRA. This analyst(s) may not be an associated person of Jefferies LLC, a FINRA member firm, and therefore may\nnot be subject to the FINRA Rule 2241 and restrictions on communications with a subject company, public appearances and trading securities held by\na research analyst.\nRegistration of non-US analysts: Zoey Zong is employed by Jefferies Hong Kong Limited, a non-US affiliate of Jefferies LLC and is not registered/qualified\nas a research analyst with FINRA. This analyst(s) may not be an associated person of Jefferies LLC, a FINRA member firm, and therefore may not be subject\nto the FINRA Rule 2241 and restrictions on communications with a subject company, public appearances and trading securities held by a research analyst.\nAs is the case with all Jefferies employees, the analyst(s) responsible for the coverage of the financial instruments discussed in this report receives\ncompensation based in part on the overall performance of the firm, including investment banking income. We seek to update our research as appropriate,\nbut various regulations may prevent us from doing so. Aside from certain industry reports published on a periodic basis, the large majority of reports are\npublished at irregular intervals as appropriate in the analyst's judgement.\nInvestment Recommendation Record\n(Article 3(1)e and Article 7 of MAR)\nRecommendation Published\nMay 10, 2026 6:01 A.M.\nRecommendation Distributed\nMay 10, 2026 6:01 A.M.\nCompany Specific Disclosures\nExplanation of Jefferies Ratings\n \nPlease see important disclosure information on pages 2 - 8 of this report.\nThis report is intended for Jefferies clients only. Unauthorized distribution is prohibited.\n2\n--- 第3页 ---\nInternet\nEquity Research\nMay 10, 2026\n \nBuy - Describes securities that we expect to provide a total return (price appreciation plus yield) of 15% or more within a 12-month period.\nHold - Describes securities that we expect to provide a total return (price appreciation plus yield) of plus 15% or minus 10% within a 12-month period.\nUnderperform - Describes securities that we expect to provide a total return (price appreciation plus yield) of minus 10% or less within a 12-month period.\nThe expected total return (price appreciation plus yield) for Buy rated securities with an average security price consistently below $10 is 20% or more within\na 12-month period as these companies are typically more volatile than the overall stock market. For Hold rated securities with an average security price\nconsistently below $10, the expected total return (price appreciation plus yield) is plus or minus 20% within a 12-month period. For Underperform rated\nsecurities with an average security price consistently below $10, the expected total return (price appreciation plus yield) is minus 20% or less within a 12-\nmonth period.\nNR - The investment rating and price target have been temporarily suspended. Such suspensions are in compliance with applicable regulations and/or\nJefferies policies.\nCS - Coverage Suspended. Jefferies has suspended coverage of this company.\nNC - Not covered. Jefferies does not cover this company.\nRestricted - Describes issuers where, in conjunction with Jefferies engagement in certain transactions, company policy or applicable securities regulations\nprohibit certain types of communications, including investment recommendations.\nMonitor - Describes securities whose company fundamentals and financials are being monitored, and for which no financial projections or opinions on the\ninvestment merits of the company are provided.\nValuation Methodology\nJefferies' methodology for assigning ratings may include the following: market capitalization, maturity, growth/value, volatility and expected total return\nover the next 12 months. The price targets are based on several methodologies, which may include, but are not restricted to, analyses of market risk,\ngrowth rate, revenue stream, discounted cash flow (DCF), EBITDA, EPS, cash flow (CF), free cash flow (FCF), EV/EBITDA, P/E, PE/growth, P/CF, P/FCF,\npremium (discount)/average group EV/EBITDA, premium (discount)/average group P/E, sum of the parts, net asset value, dividend returns, and return on\nequity (ROE) over the next 12 months.\nJefferies Franchise Picks\nJefferies Franchise Picks include stock selections from among the best stock ideas from our equity analysts over a 12 month period. Stock selection is\nbased on fundamental analysis and may take into account other factors such as analyst conviction, differentiated analysis, a favorable risk/reward ratio\nand investment themes that Jefferies analysts are recommending. Jefferies Franchise Picks will include only Buy rated stocks and the number can vary\ndepending on analyst recommendations for inclusion. Stocks will be added as new op\n…(截断)", "n33": "### 2026-05-28-Jefferies-Huaweis _Tau_ Scaling Law - Not Yet a DeepSeek Moment for C...-122278601.pdf  (总页数=12)\n\n--- 第1页 ---\nChina (PRC) | Technology\nEquity Research\nMay 28, 2026\n \nNick Cheng *  | Equity Analyst\n+852 3743 8750 | nick.cheng@jefferies.com\nEdison Lee, CFA *  | Equity Analyst\n852 3743 8009 | edison.lee@jefferies.com\nJacky He *  | Equity Analyst\n+852 3743 8084 | jacky.he@jefferies.com\nMatt Ma *  | Equity Analyst\n852 3767 1109 | matt.ma@jefferies.com\nAnnie Ping, CFA, FRM *  | Equity Associate\n+852 3767 1273 | annie.ping@jefferies.com\nHuawei's \"Tau\" Scaling Law - Not Yet a\nDeepSeek Moment for China Semi\nHuawei's top-down system topology aims at making chips without EUV\nthat could perform like 1.4nm chips (2031). One key is Logic Folding,\nwhich connects two chips using hybrid bonding as a routing resource. This\ncould reduce die size (potentially higher yield) and shorten transmission\ndistance (higher performance). But we see challenges in heat dissipation,\nwafer variations, hybrid bonding density and more. Positive for EDA, WFE,\nfoundries and optics.\nHuawei’s (HW) τ Scaling Law reframes chip performance from node-based scaling to\nsystem-level time optimization. Presented at ISCAS 2026, Huawei’s τ / Tau Scaling Law shifts\nfocus from traditional geometry scaling / Moore’s Law toward a holistic, top-down design\nmethodology. Instead of treating process node size, such as “x nm,” as the primary proxy\nfor performance, HW argues that time-to-computation / τ should become the key metric.\nPerformance gains can come not only from transistor shrink, but also from circuit design,\nchip architecture, packaging, interconnect, and system-level optimization. This roadmap is\nespecially relevant as Moore’s Law slows and Huawei faces restricted access to leading-edge\nprocess technologies.\nLogic Folding is HW’s most notable example of using 3D design to reduce critical-path\ndelay. In chip design, performance is capped by the slowest signal path, known as the critical\npath. Traditionally, engineers shorten this path through better place-and-route or by moving to\na more advanced process node. HW’s Logic Folding concept attempts to “fold” a 2D chip layout\ninto a 3D structure by stacking logic layers, allowing connected elements to be placed closer\ntogether vertically. Although this resembles existing 3D-IC and chiplet approaches, HW’s vision\nis more integrated: instead of treating chiplets as separate black boxes connected through\nlimited I/O, Logic Folding aims to co-optimize multiple layers as one unified design.\nFull Logic Folding could create major opportunities, but it faces significant technical\nchallenges. The roadmap can be viewed in three stages: basic 3D stacking (ie, 3D-IC proposed\nby TSMC/Intel), co-simulation-level Logic Folding, and ultimately co-design-level Logic Folding.\nThe most advanced stage would require EDA tools to treat hybrid-bonding layers as routing\nresources, effectively moving chip design from 2D into true 3D. This would require a major\nredesign of the EDA toolchain and create demand for 3D-aware place-and-route, timing,\nthermal, and reliability tools. However, major obstacles remain, including overheating, wafer-to-\nwafer variation, limited hybrid-bonding density, TSV reliability, yield risk, and manufacturability.\nAs a result, full commercial viability may take a long time.\nWe examine how this roadmap would impact different supply chain players. HW also\nextends τ scaling beyond chips through its System-as-One-Chip concept, using Unified Bus\nand Hi-ONE optical interconnects to optimize the entire AI system. This could simplify data-\ncenter architecture, reduce latency, improve heat dissipation, and lower total cost of ownership\nby replacing fragmented protocols with a more unified topology. If successful, the roadmap\ncould benefit EDA vendors (higher demand but needs innovations), hybrid bonding equipment\nsuppliers, optical interconnect players, and advanced node foundries. However, it could\npressure AI server ODMs (simplified configuration), cooling (reduced demand) and power\nsuppliers (lower power density), and independent Chinese AI chip design houses, if HW gains a\nproprietary system-level performance advantage. This roadmap will likely have global impact,\nas non-Chinese players could also pursue this approach and geometry scaling simultaneously.\nChart 1 - Bottom-up System Design\n.\nSource: Jefferies\nChart 2 - Space Folding\n.\nSource: Jefferies\nChart 3 - Core Concept of τ (Tau) Scaling\n.\nSource: Jefferies\nChart 4 - Face to Face Hybrid Bonding\n.\nSource: Jefferies\n \nPlease see analyst certifications, important disclosure information, and information regarding the status of non-US analysts on pages  7 - 12 of this report.\n * Jefferies Hong Kong Limited\n--- 第2页 ---\nTechnology\nEquity Research\nMay 28, 2026\n \nOn 2026 May 25, Huawei presented “τ (Tau) Scaling Law” at the IEEE International Symposium\non Circuits and Systems (ISCAS) 2026. The company turned their design strategy to a more\nholistic/top-down approach from a bottom up/lego-like approach, which the industry has\nbeen using for decades. The change/innovation is more on design methodology rather than\nmanufacturing technologies, so it offers the industry a way to pursue better performance without\naccessing the latest process node tech. Although there are still technological challenges to\novercome, the proposal already made a “dimensional” impact on computing, including AI, system\ndesign.\n \nChart 5 - τ (Tau) Scaling\n.\nSource: Jefferies\n \n \nChart 6 - Core Concept of τ (Tau) Scaling\n.\nSource: Jefferies\n \n \n \nHuawei first proposed “τ scaling” as the new metric to replace traditional “geometry scaling/\nMoore’s law” to evaluate a new system. It is because while geometry scaling can lead to\ncomputing performance gain, it is not the only factor. Device shrink (geometry scaling), circuit\ndesign, chip design and system design improvement can all improve the performance of a compute\nsystem. From Huawei’s perspective, as Moore’s law slows down, geometry shrink will create less\nincremental performance gain, so geometry scaling (such as x nm) can no longer be used as the\nonly proxy of performance. They believe time, which shows how fast a computation can be done,\nshould be the new metric of evaluating systems performance.\n \n \nThis concept is not entirely new. Due to geopolitical tension, Huawei has been trying to use\nbetter system design to overcome US restrictions that constrain their chip performance. However,\nin IC design, chip performance is usually balanced against other requirements, such as power\nefficiency, heat control, cost, reliability, and many more We believe Huawei, as one of the best chip\ndesign houses globally, clearly understands that. Thus, we see the announcement of this “τ Scaling”\nroadmap a declaration that Huawei would pursue higher chip performance at all costs.\n \nIn the presentation, Huawei used some examples to demonstrate how this new roadmap will be\nexecuted. Among all the examples, “Logic-folding” is the most eye-catching one.\nSci-Fi fans must be familiar with “space folding” and “wormhole”. A typical demonstration for space\nfolding is to draw two points on a paper. On a 2-dimensional paper, the closest distance of the\ntwo points is the straight line between the two. However, in a 3-dimensional space, the paper can\nbe folded so the two points overlap each other and the distance between them is practically zero.\nWhen moving from a lower dimension world to a higher one, space can be folded, and distance\ncan be shortened.\n \n \nPlease see important disclosure information on pages 7 - 12 of this report.\nThis report is intended for Jefferies clients only. Unauthorized distribution is prohibited.\n2\n--- 第3页 ---\nTechnology\nEquity Research\nMay 28, 2026\n \nChart 7 - Space Folding\n.\nSource: Jefferies\n \n \nChip-performance is capped by the slowest part of the chip, which is determined by the distance\nbetween two connected transistors (because signal's travel time will be longer for longer distance).\nThe industry's term for the longest connection is “critical path”. In other words, if engineers can\nshorten the “critical path”, they can boost the performance of the chip. Traditionally, this can be\nachieved by:\n1.\nOptimizing Place & Route (P&R): It means cleverly placing all related transistors closer to\neach other to minimize critical path. This is one of the most critical functions of EDA tools.\n2.\nUsing more advanced node manufacturing tech: transistor size and wire lengths among them\nnaturally shrink as the chip migrates to more advanced node. In consequence, critical path\nalso naturally shortens.\n \nBoth methods aim to shorten critical paths in a two-dimensional (2D) space because modern\n“chip” design is essentially a 2D design, where all transistors are placed on the same surface. If\nengineers have already done their best in P&R, traditionally, the only way to improve further is to\nadopt more advanced node. Therefore, the industry sees geometry scaling the proxy and metric of\nchip performance improvement.\n \nWith the holistic approach, Huawei argues that design engineers should only focus on the “end\nperformance (τ)” instead of geometry scaling, which is just one of the factors that might lead to\nbetter performance. They transformed the 2D space in a chip into a three-dimensional (3D) space\nby stacking one chip on top of another. Just like folded paper we discussed above, the space is\nfolded, and the longest distance (critical path) is shortened. Hence the performance (τ) increases\nwithout any change in geometry scale.\n \nFor many tech investors, this may sound very similar to the 3D-IC concept that TSMC and Intel\nproposed long time ago. However, there are some significant differences.\nAn analogy for the differences is connecting two apartment units with one directly above the other\nto create a duplex. If you ask two interior design teams to work on each unit separately, there\nwould be some redundancies and suboptimal design between the two units. If a single team takes\na holistic view to design the entire duplex, the team will likely be able to utilize the entire space more\nefficiently by, for example, putting all bedrooms upstairs, and creating a bigger living room and also\na bigger kitchen downstairs.\n \nTSMC’s current chip-let/3D-IC approach is similar to the first approach. Each chip-let is self-\noptimized within its own and use very limited I/O ports to communicate with other chip-lets. In other\nwords, TSMC's job is only to build a staircase to connect the two floors. Each floor is designed\nby separate teams with possibly different objectives. However, Huawei wants to design the entire\nduplex with a unified approach and style\n \n \nPlease see important disclosure information on pages 7 - 12 of this report.\nThis report is intended for Jefferies clients only. Unauthorized distribution is prohibited.\n3\n--- 第4页 ---\nTechnology\nEquity Research\nMay 28, 2026\n \nWe see three levels of 3D chip design:\n1. 3D Stacking (Current TSMC's SoIC solutions)\na. Each chip-let is a black box. Design engineers only know the I/O information about the chip.\nThe benefit of this is to allow multiple companies' IPs to co-exist in the same 3D chip.\nb. This is the least integrated solution.\nChart 8 - 3D Stacking\n.\nSource: Jefferies\n \n2. Co-simulation-level Logic Folding*\na. The box needs to share its model (gate level design Information) so that the other chip may\nuse this information to identify critical path.\nb. EDA tools still do the simulation separately in 2D chips and then optimize by identifying and\nshortening critical paths via vertical connections.\nc. This approach is less likely to allow collaboration as no design houses want to share their\nmodels (gate level design information), which are considered commercial secrets.\nd. The existing EDA tools already can achieve this. TSMC already provides PDK and EDA vendors\nuse TSMC's PDK to simulate TSV and related circuit. According to Huawei’s paper, we believe\nthey are at this stage\n…(截断)", "n34": "### 2026-04-27-0700.HK-HSBC Global Investme-China Internet HSBC Global Investment Summit 2026 tour takea...-121648328.pdf  (总页数=23)\n\n--- 第1页 ---\nDisclosures & Disclaimer \nThis report must be read with the disclosures and the analyst certifications in \nthe Disclosure appendix, and with the Disclaimer, which forms part of it. \n  \n \nIssuer of report: The Hongkong and Shanghai \nBanking Corporation Limited, Singapore Branch \nView HSBC Global Investment Research at: \nhttps://www.research.hsbc.com \n                                          \n             \n                               \n   \n \n◆ We visited 6 companies under coverage and hosted online ads, \ngames, local services and other experts during a 3-day tour \n◆ AI investment and monetisation remain the core investor focus \n◆ Investor sentiment on local services improved on easing \ncompetition and ad vertical faces higher compliance costs \nOur thoughts and investor feedback: We like Alibaba for its to-B AI monetisation \npotential, and Tencent for its to-C AI monetisation potential and resilience from ads \nand games. Investors broadly share our positive view, especially Alibaba, although \nsome are cautious on the near-term to-C AI monetisation outlook. We like buy-rated \nFull Truck Alliance for its attractive valuation. Its earnings growth appears to be \nbottoming out and shareholder returns are improving. Investors have turned more \nconstructive on Meituan (MT) as quick commerce competition is easing and \nimproved unit economics (UE) in 1Q26 highlighted its moat in food delivery. Aside \nfrom the names above, Bilibili and PDD were among the most inquired about names \nfrom investors. Below are our 8-10 April tour takeaways. \nGames could continue to benefit from a rising paying ratio and ARPPU, back by \nmore customised live operations and better AI driven efficiencies. A favourable \npipeline - pet collection (Roco Kingdom: World), extraction shooter (Delta Force), and \nlife simulation (Animula Nook) – could solidify Tencent’s leadership in growth in 2026.  \nLocal services players are expected to focus more on profitability, as MT and \nDouyin are sourcing growth from diverging segments and subsidy intensity may only \nremain relatively high in dining. Competition in food delivery has stabilised, too. \nBeverage orders could pick up into the summer months, changing the dynamics \nagain but the long-term trend of continuous uplift in unit economics should continue \n(see page 5-7 for details).  \nAd market growth should see support from demand in AI short dramas, AI applications \nand incremental budgets released from lower iOS channel costs. However, overall \nindustry growth could see a 3ppt drag in 2026 due to higher compliance costs associated \nwith two tax-related policy changes: e-commerce tax and traffic acquisition cost tax. Short \nvideo platforms could see more impact. Companies such as Tencent and Xiaohonshu \n(XHS) are more insulated from the tax changes and should continue to gain share.  \nAI budget increase as a share of IT spend supported by productivity gains, run-cost \nreduction, and targeted revenue uplift suggest ample room for revenue growth in AI \nand Cloud. Performance typically eclipses cost in the initial model selection process, \nand it is unlikely that one model will fit all use cases. GPU resources remain scarce, \nsustaining potential price hikes. Competitive energy pricing could give Chinese \ncompanies a long-term edge.  \n27 April 2026\nCharlene Liu* \nHead of Internet and Gaming Research, Asia Pacific \nThe Hongkong and Shanghai Banking Corporation \nLimited, Singapore Branch \ncharlene.r.liu@hsbc.com.sg \n+65 6658 0615 \nRitchie Sun*, CFA \nAnalyst, Internet Research \nThe Hongkong and Shanghai Banking Corporation Limited \nritchie.k.h.sun@hsbc.com.hk \n+852 2822 4392 \nCharlotte Wei* \nAnalyst, Internet Research \nThe Hongkong and Shanghai Banking Corporation Limited \ncharlotte.wei@hsbc.com.hk \n+852 2996 6539 \nChristina Chen*, CFA \nAnalyst, Internet Research \nThe Hongkong and Shanghai Banking Corporation Limited \nchristina.z.chen@hsbc.com.hk \n+852 2822 2912 \n* Employed by a non-US affiliate of HSBC Securities (USA) Inc, and is \nnot registered/ qualified pursuant to FINRA regulations \nChina Internet \nEquities \nInternet Software & Services  \n \n \nChina \nHSBC Global Investment Summit 2026 tour takeaways\n--- 第2页 ---\nEquities ● Internet Software & Services \n27 April 2026\n2 \nExhibit 1: Summary of TPs and ratings of the stocks mentioned \nCompany \nBBG Ticker \nMkt Cap \n(USDbn) \nHSBC Rating \nCCY \nCMP Target Price Upside/down\nside \nTencent \n700 HK \n574.7 \nBuy \nHKD \n493.40 \n750.00 \n52.0% \nNetEase \nNTES US \n70.0 \nBuy \nUSD \n110.58 \n185.00 \n67.3% \nMeituan \n3690 HK \n65.0 \nBuy \nHKD \n82.45 \n104.00 \n26.1% \nAlibaba \nBABA US \n325.8 \nBuy \nUSD \n135.82 \n172.00 \n26.6% \nPinduoduo \nPDD US \n139.2 \nBuy \nUSD \n98.03 \n159.00 \n62.2% \nJD.com \nJD US \n42.6 \nBuy \nUSD \n30.27 \n35.00 \n15.6% \nKuaishou \n1024 HK \n24.2 \nBuy \nHKD \n43.70 \n65.00 \n48.7% \nBilibili \nBILI US \n7.5 \nBuy \nUSD \n22.25 \n30.00 \n34.8% \nFull Truck Alliance \nYMM US \n9.0 \nBuy \nUSD \n8.66 \n13.80 \n59.4% \nPerfect World * \n002624 CH \n4.9 \nBuy \nRMB \n17.12 \n30.00 \n75.2% \nSource: Bloomberg, LESG, HSBC estimates; priced as of 24 April 2026 (* based on HSBC Qianhai Securities estimates) \nGames \nWe hosted Kern Zhang (Team Lead of Account Management, GCR) and Abbie Li (Senior Sales \nDirector) from Sensor Tower and Mr. Xie (freelancer; former overseas market distribution and \noperations director at Mihoyo).  \nIndustry growth trend and drivers \nMr. Xie forecasts China games industry to grow at 7-10% y-o-y in 2026e, driven by higher \npaying ratio and ARPPU. Mr. Xie is more constructive on pet catching, extraction shooter, and \nlife simulation sub-segments, which he expects to drive overall industry growth this year (more \ndetails below). \nMr. Zhang notes that the global mobile games industry grew 8-10% y-o-y in 2025 in revenue, \nbut downloads only grew 2.5-3% y-o-y. This suggests users are less inclined to try new games, \nwhich also coincides with far fewer new game launches than 10 years ago. For PC and console \ngames, revenue in 2025 was 50% higher than 2021, but the market size remains small (c16-\n20% of the mobile game market). He notes three key growth opportunities: \n◆ Mini games: Tencent remains the leading distribution platform, but ByteDance is stepping \nup investment and team expansion.  \n◆ Games as a Service (GaaS): Mr. Zhang thinks customised live operations could emerge \nas a big opportunity. For example, despite classic gameplay, Kingshot, Last War: Survival \nGame, Infinite Borders and FWJ  now all offer personalised bonuses, promotions and \ndifficulty levels to each user, enhancing user retention and propensity to pay. He also notes \nthat in the US, Gossip Harbor: Merge & Story launches personalised promotions to users \naround payroll timelines, and adjusts prices for in-game items according to macroeconomic \nconditions so that users will not feel pressured to spend and eventually get burnt out by the \ngame. To differentiate going forward, we think it comes down to a company’s ability to use \nAI to analyse in-game user data and make relevant recommendations. Both large and \nsmall-to-mid-sized game companies can benefit from this trend by leveraging third-party \ndata platforms to strengthen their data analytics capacity.  \n◆ Demographic shifts: Mr. Zhang notices a few interesting behavioural shifts: 1) Young \ngamers in Japan are more willing to pay for PvP titles, supporting the strong performance of \nValorant and Apex Legends; 2) games with “winning big” potential (e.g., casino, extraction \nshooter) are able to win over younger users; 3) in China market, Black Myth: Wukong has \nattracted interest from older gamers who had not played games before.\n--- 第3页 ---\n3 \nEquities ● Internet Software & Services \n27 April 2026\nFavourable regulation \nMr. Zhang thinks the regulatory stance has turned more supportive. Regulators are encouraging \nlarge game companies to promote Chinese culture via expansion in overseas markets, building \non the success of Black Myth: Wukong. Small-and-mid-sized game companies have seen \nproportionately higher percentage of approved game licenses, allowing them to enjoy better \nmonetidation opportunities domestically.  \nObservations and thoughts by different genre \nAs discussed, Mr. Xie is more constructive on pet catching, extraction shooter and life simulation.  \n◆ Pet catching: The pioneer in this genre is Pokémon GO. Tencent launched Roco \nKingdom: World on 26 March under this vertical, with 60m+ pre-registrations, and strong \ninitial grossing performance. Mr. Xie believes it has strong potential in overseas markets, \ntoo. He also expects strong performance from the new launches such as Yimoo from \nFunplus and Honkai: Nexus Anima from Mihoyo, given encouraging testing feedback.  \n◆ Extraction shooter: Mr. Xie believes the success of Delta Force has proved that this genre \nis highly popular across demographics covering both younger and older players, as it also \nbenefits from promotion through Tencent’s social network. Mr. Zhang notes that research \nshows younger players like extraction shooters, as they provide a sense of achievement \nand a taste of success, which have become harder to attain in real life. \n◆ Life simulation: Mr. Xie notes that Animula Nook from Tencent and Petit Planet from \nMihoyo have strong testing feedback, and both games leverage the social strengths of \nTencent and content-driven and storytelling strengths of Mihoyo, respectively. \nMr. Xie also discussed his thoughts and outlook on open-world games and SLG games, where \nhe expects stronger contenders in the pipeline.  \n◆ Open world - new launches: Mr. Xie believes Tencent’s Honor of Kings: World benefits \nfrom the IP appeal of HoK (and therefore requires less marketing) and notes solid initial \nlaunch performance for the PC version (mobile version to come later in April). He believes \nPerfect World has leveraged the experience of making Tower of Fantasy and kept the R&D \ncost low for Neverness to Everness (NTE), allowing it to allocate more resources to \npromote the game and still maintain decent margin. Mr. Xie expects NetEase to launch \nAnanta in 4Q26. But he has a mixed expectation on the performance of the game, as the \nmobile experience has yet to be refined in the mobile version, which could affect its user \nbase and ability to cover substantial upfront R&D costs. On the other hand, he believes \nNetEase’s Sea of Remnants could be a blockbuster in overseas markets (with a larger \ngrossing contribution than in China), given the unique gameplay and genre. \n◆ Competition in SLG games: Mr. Xie notes that SLG competition in China is very intense. \nGiven the high ARPPU nature of the genre, top-tier SLG games focus on acquiring and \nretaining whale users with customised services (e.g., private messages), making it difficult \nfor new entrants to acquire these users. However, SLG games can still grow well in \noverseas markets given lower ARPPUs, with various companies, such as Funplus and \nDiandian, having growth opportunities.  \nOpportunities and risks from AI in games \nOutside of GaaS, AI has also been widely adopted in many areas. According to Mr. Xie: 1) \nlocalisation (translation); 2) traffic acquisition and ad materials generation; 3) art design \n(covering 2D/3D assets), motion capture and voice-over generation; 4) coding; 5) project \nmanagement (e.g., data analysis and replacing part of the outsourcing work); 6) customer \nservice and personalised interactions with NPCs (e.g., Peacekeeper Elite and Where Winds \nMeet). He believes AI adoption can lead to layoffs across the industry.\n--- 第4页 ---\nEquities ● Internet Software & Services \n27 April 2026\n4 \nMr. Xie also believes larger players tend to have an advantage, as they develop and use their \nproprietary foundation models. Small-to-mid-sized players rely on open-weight models and need \nto spend extra time and resources to fine-tune the models for their\n…(截断)", "n35": "### 2026-06-02-BofA Global Research-Internete-Commerce May app data Mixed bag for Online medi...-122359248.undefined.pdf  (总页数=15)\n\n--- 第1页 ---\nBofA Securities does and seeks to do business with issuers covered in its research \nreports. As a result, investors should be aware that the firm may have a conflict of \ninterest that could affect the objectivity of this report. Investors should consider this \nreport as only a single factor in making their investment decision. \nRefer to important disclosures on page 13 to 15.  \n12980218 \n \n \nInternet/e-Commerce \nMay app data: Mixed bag for Online media, \ndelivery decelerates, & AI apps strong \nIndustry Overview \n   \n \n \nMay app trends: big eCommerce consolidates DAUs \nWe track monthly global mobile app DAUs and downloads per Sensor Tower to gauge \nuser trends across top subsectors including social media, eCommerce, subscription \nservices, and travel.  For May, Online Media DAU trends were mixed, with Facebook \nDAUs decelerating and Pinterest accelerating.  DAU growth for Amazon accelerated \nwhile many smaller platforms slowed, possibly reflecting a shift toward value as inflation \nincreases.  Delivery DAUs decelerated, with Uber Eats an exception. AI app DAUs mostly \nslowed, but y/y growth was still strong; ChatGPT was up 68%, Gemini grew 320%, and \nMeta AI was up 1,300%, while Claude growth accelerated to over 1,300%. \nOnline Media: Mixed May DAU trends, Pinterest best m/m \nFacebook DAUs contracted 4% y/y in May, a modest deceleration from -2% y/y in Apr, \nwhile Instagram DAU growth of 4% y/y accelerated 1ppt m/m. YouTube DAUs were \nstable (at flat y/y) and DLs slowed to +2% y/y. Snap DAUs grew a stable 3%, while DLs \ndeclined 7% (6ppt decel). Pinterest DAUs grew 14% y/y (4ppt accel) and DLs increased \n2% y/y (4ppt decel).  Reddit DAUs declined 1% (stable m/m), and DLs declined 37% (y/y \ncomps get easier next month). Roblox DAU growth slowed 4ppts to +9%. Google DAUs \ngrew a stable 12% y/y, with DLs declining 8% y/y (an 8ppt decel vs Apr). \neComm: Amazon, Wayfair, and Carvana outperform m/m \nAmazon DAU growth of 4% y/y in May accelerated 1ppt from Apr, while DL growth of \n4% was stable.  eBay DAUs declined 2% y/y (3ppt decel m/m). Etsy DAUs grew 6% y/y \n(6ppt decel from Apr), while DLs contracted 18% (9ppt decel).  Chewy DAUs grew 17% \ny/y, a 20ppt decel. from Apr, while DL trends slowed 9ppts to -20% y/y.  Wayfair DAUs \ngrew 4% y/y, accelerating 8ppts on 21ppt easier comp.  Carvana DAU growth \naccelerated to 24% y/y (from 20% in Apr), also on an easier comp. \nGig: Uber relatively stable at +10%, Dash/Cart decelerates \nUber DAUs grew 10% y/y, a modest decel. of 1ppt from April, while DL growth of 10% \nslowed 2ppts.  Lyft DAUs/DLs were -2%/-1% y/y (1ppt accel/decel).  Waymo DAUs \ngrew a stable 43% y/y.  DoorDash DAUs growth of 6% y/y slowed 2ppts from Apr, will \nDLs fell 8% y/y, also a 2ppt decel.  Uber Eats DAUs were +3% y/y in May (3ppt accel), \nwith DLs up 4% (6ppt accel).  Instacart DAUs declined 5% y/y (4ppt decel) and DLs \nwere down 6% y/y (4ppt accel from April). \nTravel & Other: DAU growth for ABNB/BKNG accelerates \nBooking y/y DAUs grew 4% y/y in May (1ppt accel from Apr) while DLs were flat y/y \n(7ppt decel).  Expedia DAUs grew 4% y/y, a 1ppt decel, while DLs declined 33% y/y \n(stable m/m). Airbnb DAUs/DLs grew 11%/30%, an acceleration of 2ppts/7ppts from \nApril.  Vrbo DAU growth decelerated 1ppt to 12%. Duolingo DAU growth of 11% \naccel’d 1ppt m/m. StubHub DAUs grew 26% y/y, accelerating 28ppts from Apr, while \nVivid Seats DAUs declined 3%, decelerating 6ppts m/m. \n02 June 2026   \nEquity \nUnited States \nJustin Post \nResearch Analyst \nBofAS \n+1 415 676 3547 \njustin.post@bofa.com \nMichael McGovern \nResearch Analyst \nBofAS \nmmcgovern@bofa.com \nOmar Dessouky, CFA \nResearch Analyst \nBofAS \nomar.dessouky@bofa.com \nNafeesa Gupta \nResearch Analyst \nBofAS \nnafeesa.gupta@bofa.com \nNitin Bansal, CFA \nResearch Analyst \nBofAS \nnbansal7@bofa.com \nSteven McDermott \nResearch Analyst \nBofAS \nsteven.mcdermott@bofa.com \nHarvey Qin \nResearch Analyst \nBofAS \nhuiyu.qin@bofa.com \nDAU: Daily Active User \nDL: Download \nOTA: Online Travel Agency \nAccessible version \nTimestamp: 02 June 2026 03:00AM EDT\nCR\n--- 第2页 ---\n2 \nInternet/e-Commerce | 02 June 2026 \n \n \n Mobile app data update \nSensor Tower DAU & Download estimates combine App Store & Google Play data \nprovided by Publisher & Developer partnerships, as well as signals from the stores to \nbackfill non-partner data. Sensor Tower has data sharing partnerships with Publishers & \nDevelopers that collectively represent 50%+ of all App Store revenues. We have \naggregated this data to gauge potential user & usage trends. Sensor Tower regularly \nrevises their Active User & Download estimates.  Per Sensor Tower, these revisions \nare expected to improve estimate measurements for apps. \nSnap \nPer Sensor Tower, global Snap DAUs were 395mn in May, growing 3.0% y/y and slowing \na modest 20bps from April.  Since March, DAUs are up 2mn to 395mn. Gross downloads \ndeclined 7% y/y to 29mn in April, decelerating from -1% y/y in April. \nExhibit 1: Snap DAUs were 395.3mn in May \nSnap Worldwide DAUs (mn) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \nExhibit 2: Snap DAUs grew 3.0% y/y in May \nSnap Worldwide DAUs (Y/Y) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \n \nExhibit 3: Snap downloads were 28.8mn in May \nSnap Gross Downloads (mn) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \nExhibit 4: Snap downloads declined 7.4% y/y in May \nSnap Gross Downloads (Y/Y) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \n \nPinterest \nGlobal Pinterest DAUs were 209mn in May, growing 14% y/y and accelerating 4ppts \nfrom April.  Since March, DAUs are up 10mn to 209mn.  Gross downloads grew 2% y/y to \n20mn in May, decelerating from 6% y/y in April. \n0\n50\n100\n150\n200\n250\n300\n350\n400\n450\n0%\n10%\n20%\n30%\n0\n15\n30\n45\n-50%\n-25%\n0%\n25%\n50%\n75%\n100%\n125%\n150%\nCR\n--- 第3页 ---\nInternet/e-Commerce | 02 June 2026\n3\n \n \nExhibit 5: Pinterest DAUs were 208.7mn in May \nPinterest Worldwide DAUs (mn) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \nExhibit 6: Pinterest DAUs grew 14% y/y in May \nPinterest Worldwide DAUs (Y/Y) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \n \nExhibit 7: Pinterest downloads were 20.5mn in May \nPinterest Gross Downloads (mn) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \nExhibit 8: Pinterest downloads grew 2.1% y/y in May \nPinterest Gross Downloads (Y/Y) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \n \nReddit \nGlobal Reddit DAUs were 81mn in May, declining 1% y/y (a 40bps accel from April), but \nwere up 2% m/m.  Since March, DAUs are up 2mn to 81mn.  Gross downloads grew 37% \ny/y to 4mn in May, while m/m downloads grew 7%.  Y/Y comps are significantly easier \nnext month. \n0\n50\n100\n150\n200\n250\n0%\n25%\n50%\n75%\n0\n5\n10\n15\n20\n25\n-25%\n0%\n25%\n50%\n75%\n100%\nCR\n--- 第4页 ---\n4 \nInternet/e-Commerce | 02 June 2026 \n \n \nExhibit 9: Reddit DAUs were 81.4mn in May \nReddit Worldwide DAUs (mn) \nSource: Sensor Tower  \nBofA GLOBAL RESEARCH \nExhibit 10: Reddit DAUs declined 1% y/y in May \nReddit Worldwide DAUs (Y/Y) \nSource: Sen
