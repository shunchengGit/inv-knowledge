ices were provided within the \npast 12 months.\nKEY DEFINITIONS:Forecast Stock Return (FSR) is defined as expected percentage price appreciation plus gross dividend yield over \nthe next 12 months. In some cases, this yield may be based on accrued dividends. Market Return Assumption (MRA) is defined as \nthe one-year local market interest rate plus 5% (a proxy for, and not a forecast of, the equity risk premium). Under \nвҖҰ(жҲӘж–ӯ)", "n71": "# и°·жӯҢ(GOOG)з ”жҠҘ вҖ” еҫ·ж„Ҹеҝ—й“¶иЎҢ вҖ” 2026-04-30\n\n## з ”жҠҘжҰӮиҰҒ\n\n- **ж Үзҡ„**: и°·жӯҢ / Alphabet (GOOG/GOOGL)\n- **еҲёе•Ҷ**: еҫ·ж„Ҹеҝ—й“¶иЎҢ\n- **ж—Ҙжңҹ**: 2026-04-30\n- **жқҘжәҗ**: PDFз ”жҠҘ\n\n## ж ёеҝғеҶ…е®№ж‘ҳиҰҒ\n\n--- з¬¬1йЎө ---\nT2se3r0Ot6kwoPa\nT2se3r0Ot6kwoPa\nDistributed on: 30/04/2026 11:08:15 GMT\nDistributed on: 30/04/2026 11:08:15 GMT\n30 April 2026\nAlphabet reported strong results, with growth across all major segments, \nhighlighted by significant outperformance in Cloud and strong results in Search. \nConsolidated revenues grew to $109.9bn, +22% y/y (+19% FXN), outperforming \nthe street by a significant margin. Capex guidance for FY26 was increased by \nanother $5bn at the mid-point, and the company expects FY27 capex to increase \nsignificantly compared to 2026, we think the resulting infrastructure footprint \ncreates a meaningful moat that few (if any) can replicate. We believe Alphabet can \nbest monetize this via the combination of its broad service offering (both \nadvertising and subscriptions) as well as through the rapidly accelerating Cloud \nbusiness.\nOn Search, AI features like AI Overviews and AI Mode are driving overall Search \ngrowth, with queries at an all-time high. These new features drive improvements \nin ads quality, a better understanding of user intent, new AI user experiences, and \nAI-powered advertiser tools. This is already contributing to accelerated Search & \nother revenue growth, which was up 19% to $60.4bn, driven primarily by the retail \nand finance verticals. On the monetization side, more than 30% of customer search \nspend now uses AI-enabled campaigns like AI Max or Performance Max. This is an \nimportant growth vector, as AI (specifically Gemini) significantly expands the ability \nto deliver ads on longer, more complex searches that were previously difficult to \nmonetize. As such, even modest improvements in identifying and capitalizing on \ncommercial-adjacent queries could unlock meaningful incremental growth \nopportunities for Google.\nCloud was a standout this quarter. While the y/y growth acceleration to 63% was \nencouraging, we were even more impressed by the near-doubling of the backlog \nsequentially to over $460bn, highlighting the outsized demand for GCP services. \nThis backlog increase was driven by strong demand for enterprise AI offerings and \nthe inclusion of TPU hardware sales. The company expects to recognize a small \npercentage of this TPU hardware revenue later in FY26, with the majority to be \nrealized in FY27. Additionally, the acquisition of Wiz, a leading cloud and security \nAI platform, closed in March and will be reported within the Google Cloud segment. \nThe company expects the acquisition to be a LSD point headwind to Cloud's \noperating margin for the remainder of FY26. It increasingly appears that the \nGoogle's full-stack, vertically integrated approach is a key selling point, with the \ncompany signing multiple $1bn+ deals and doubling the number of deals between \n$100mn and $1bn y/y. FY26 capex guidance was increased to $180-$190bn, up \nBenjamin Black, CFA\nResearch Analyst\n+1-212-250-9218\nKunal Madhukar, CFA\nResearch Analyst\n+1-212-250-9357\nJeff Seiner, CFA\nResearch Associate\n+1-212-250-8153\nRaymond Wong\n\n---\n\n*еҺҹе§ӢPDFе…ұ 13 йЎөпјҢжӯӨеӨ„дёәеүҚ 13 йЎөзҡ„иҮӘеҠЁжҸҗеҸ–еҶ…е®№гҖӮ*", "n72": "# и°·жӯҢ(GOOG)з ”жҠҘ вҖ” ж‘©ж №еЈ«дё№еҲ© вҖ” 2026-05-20\n\n## з ”жҠҘжҰӮиҰҒ\n\n- **ж Үзҡ„**: и°·жӯҢ / Alphabet (GOOG/GOOGL)\n- **еҲёе•Ҷ**: ж‘©ж №еЈ«дё№еҲ©\n- **ж—Ҙжңҹ**: 2026-05-20\n- **жқҘжәҗ**: PDFз ”жҠҘ\n\n## ж ёеҝғеҶ…е®№ж‘ҳиҰҒ\n\n--- з¬¬1йЎө ---\nM\n Idea\nAlphabet Inc.  | North America\nSparking the Agentic Torch\nI/O вҖҷ26 showcased new, more efficient models, and agentic \nofferings across commerce, travel and daily life (Spark). Some \nproducts will leverage GOOGLвҖҷs full distribution, while most will \nsit behind subscription paywalls (for now)...but agentic sparks \nare set to fly with GOOGL lighting the torch.\n Agentic Sparks to Start Flying: GOOGL introduced its personal agent, known as \nGemini Spark...which will roll out across the Gemini app (now 900M+ MAUs), \nSearch, Gmail, Google Calendar, Google Drive and other GOOGL apps. In addition to \nGOOGL's owned and operated distribution surfaces, Gemini Spark will be \nintegrating with 3P apps via MCP (an open standard that allows AI agents to \nsecurely connect with external apps and services), including DASH/UBER/LYFT/\nCART, as well as BKNG/EXPE (more on that below). Gemini Spark will be available \nfor Google's top tier AI Ultra plan starting in Beta next week and will be available \ndirectly within Chrome later this summer.\nNew, Faster and More Efficient Models: GOOGL announced Gemini 3.5 Flash, a \nnew, notably faster version of the Gemini model, with Gemini 3.5 Pro set to release \nnext month (see here for the model release blog post and benchmark summary). \nGOOGL Gemini also continues to improve compute cost efficiency with Gemini 3.5 \nFlash API pricing of $1.50/$9.00 per million input/output tokensвҖҰwhich is \n70%/70% lower than competitorsвҖҷ leading models. We see GOOGLвҖҷs ability to \ncontinue building more efficient and faster models as an important driver of \nadoption and competitive differentiation. \nGOOGL Leverages Distribution and Lower Pricing on Subscription Tiers: While \nmany new/early agentic products from today (discussed below) are only available to \nsubscribers in the near-term 1) multiple new products, including Gemini Flash 3.5, \nIntelligent Search Box,  and Universal Cart are being deployed to the full GOOGL \nuser base (leveraging their leading distribution) and 2) GOOGL reduced the pricing \nof its premium Ultra subscription tier by 20%  (down to $200/mo from $250/mo \npreviously) and introduced a new, intermediate tier for $100/mo. This again speaks \nto GOOGLвҖҷs ability to reduce inference cost and leverage its distribution to make it \nmore difficult to compete against.\nNew World and Video Diffusion Models: GOOGL also released a new multi-modal \nworld model, Gemini Omni...which is set to lead to more differentiated video \ncreative capabilities (like Nano Banana did for image creation). With Omni, users can \ncombine images, audio, video and text as input to generate high-quality videos \ngrounded in Gemini's real-world knowledge. Over time we see these models driving \na multitude of engagement and monetization opportunities including: video creative \nfor enterprises/SMBs/creators/influencers/users, gaming/interactive media creation, \nadvertising creative for more personalized, custom ads and more. \nAgentic Travel is Coming\n\n---\n\n*еҺҹе§ӢPDFе…ұ 13 йЎөпјҢжӯӨеӨ„дёәеүҚ 13 йЎөзҡ„иҮӘеҠЁжҸҗеҸ–еҶ…е®№гҖӮ*", "n73": "# и°·жӯҢ(GOOG)з ”жҠҘ вҖ” жұҮдё°е…ЁзҗғжҠ•иө„ вҖ” 2026-04-30\n\n## з ”жҠҘжҰӮиҰҒ\n\n- **ж Үзҡ„**: и°·жӯҢ / Alphabet (GOOG/GOOGL)\n- **еҲёе•Ҷ**: жұҮдё°е…ЁзҗғжҠ•иө„\n- **ж—Ҙжңҹ**: 2026-04-30\n- **жқҘжәҗ**: PDFз ”жҠҘ\n\n## ж ёеҝғеҶ…е®№ж‘ҳиҰҒ\n\n--- з¬¬1йЎө ---\nDisclosures & Disclaimer \nThis report must be read with the disclosures and the analyst certifications in \nthe Disclosure appendix, and with the Disclaimer, which forms part of it. \n  \n \nIssuer of report: HSBC Bank plc \nView HSBC Global Investment Research at: \nhttps://www.research.hsbc.com \n                                                  \n             \n   \n \nв—Ҷ Q1 results: ~9% beat on an EBIT level, driven by beats from \nboth Services and Cloud. EPS distorted by equity gains  \nв—Ҷ Minor ~3% capex hike for FY26e, вҖңsignificantвҖқ increase for \nFY27e. We lift our estimate to USD250bn (USD185bn)  \nв—Ҷ Retain Buy, lifting TP to USD435 (USD385), implying ~18% \nupside. GOOGL remains uniquely placed to benefit from AI \nQ1 results a 9.2% EBIT beat, EPS distorted by equity gains: Total revenues were \n+21.8% yoy to USD109.9bn and 2.7% ahead vs VA consensus at USD107.0bn. Total \nEBIT was USD39.7bn, +29.7% yoy and 9.2% ahead of consensus at USD36.4bn. At an \nEPS level, diluted EPS was +81.8% yoy to USD5.11 and +87.3% ahead of consensus of \nUSD2.73 driven once again by gains in equity securities of USD36.9bn, which we think is \nlikely due to Anthropic and/or SpaceX (both private businesses). Removing this impact, \ndiluted EPS would have been USD2.76, broadly in-line with consensus.  \nв—Ҷ Google Services revenues were +16.0% yoy to USD89.6bn and a 1.7% beat vs \nconsensus. The growth was driven by strong GCP across both AI solutions and \nenterprise AI infrastructure. GAAP EBIT was +24.2% to USD40.6bn, an 8.0% beat vs \nconsensus. This represents an EBIT margin of 45.3%, a record high. We assume \nthis quarter is the high for the year but note risk to the upside. \nв—Ҷ Google Cloud revenues +63.4% to USD20.0bn and an 8.8% beat vs consensus. \nEBIT was +~200% to USD6.6bn, a 30.9% beat and implying a margin of 32.9%, \n+282bps. The cloud backlog number grew by nearly 2x qoq rising to ~USD460bn, \nfrom ~USD240bn. Of the backlog, it was noted on the call that the vast majority is for \nthe GCP platform with some due to external chip sales expected to impact the \nrevenue line from the tail end of FY26e, with a greater impact from FY27e. It was \nalso noted that the acquisition of Wiz will lead to lower sequential margins at Google \nCloud over the remainder of the year by a вҖңlow single digit pointвҖқ. We conservatively \nassume -3% vs Q1 for the remainder.  \nCapex guidance hiked for FY26e & 27e: For FY26e, capex guidance has been lifted to \nUSD180-190bn from USD175-185bn. However, for FY27e, the commentary is for a \nвҖңsignificantвҖқ increase. We now assume USD250bn for FY27e, +32% yoy, but note the last \ntime вҖңsignificantвҖқ increases were guided to it lead to a ~100% increase or USD100bn in \nabsolute terms. The company bought back no shares in Q1; thus, we cut our \nexpectations going forward to nil, helping to fund this capex increase.  \nRemain Buy rated with USD435.00 TP (from USD385.00), implying ~18% upside: \nWe update our model for the release, increasing our EBIT expectation\n\n---\n\n*еҺҹе§ӢPDFе…ұ 10 йЎөпјҢжӯӨеӨ„дёәеүҚ 10 йЎөзҡ„иҮӘеҠЁжҸҗеҸ–еҶ…е®№гҖӮ*", "n74": "# и°·жӯҢ(GOOG)з ”жҠҘ вҖ” жұҮдё°е…ЁзҗғжҠ•иө„ вҖ” 2026-06-02\n\n## з ”жҠҘжҰӮиҰҒ\n\n- **ж Үзҡ„**: и°·жӯҢ / Alphabet (GOOG/GOOGL)\n- **еҲёе•Ҷ**: жұҮдё°е…ЁзҗғжҠ•иө„\n- **ж—Ҙжңҹ**: 2026-06-02\n- **жқҘжәҗ**: PDFз ”жҠҘ\n\n## ж ёеҝғеҶ…е®№ж‘ҳиҰҒ\n\n--- з¬¬1йЎө ---\nDisclosures & Disclaimer \nThis report must be read with the disclosures and the analyst certifications in \nthe Disclosure appendix, and with the Disclaimer, which forms part of it. \n  \n \nIssuer of report: HSBC Bank plc \nView HSBC Global Investment Research at: \nhttps://www.research.hsbc.com \n                                                  \n             \n   \n \nв—Ҷ Unexpected Google capital raise adds to IPO activity at wider \nsector level that now includes Anthropic IPO \nв—Ҷ Proposed capital raise to fund AI infrastructure / compute \ngrowth and employee equity grant tax obligations \nв—Ҷ Retain Buy, cut TP to USD420 (from USD435), implying ~14% \nupside. GOOGL remains uniquely placed to benefit from AI \nGoogle raise adds to IPO activity at wider sector level: Alphabet has already \nscaled back buybacks and raised capital via the bond markets to support increased \ncapex spend / M&A in 2026, and flagged a further significant increase in capex in \n2027 (see our note: вҖҳGlobal Tech: 2026 HSBCвҖҷs key tech discussion points updatedвҖҷ, \n22 May 2026). However, an announced proposed capital raise so soon was \nunexpected and adds to elevated fundraising / IPO activity at the wider sector level \nthat now includes Anthropic, which confidentially filed an intention to float on 1 June \n2026, and ahead of an anticipated filing from OpenAI. So as not to be put at a \ncompetitive disadvantage, we cannot rule out further capital raises from other \nhyperscalers looking to build out AI infrastructure / compute capabilities against what \nappears to be a backdrop of strong investor demand. \nCapital raise to fund AI infrastructure / compute and employee tax obligations: \nв—Ҷ Concurrent underwritten offerings: USD30bn public offerings, consisting of: \nUSD15bn in depositary shares representing mandatory convertible preferred \nstock; and USD15bn in common shares.  \nв—Ҷ At-the-market offering: USD40bn at-the-market (ATM), offering for Class A \nCommon Stock and Class C Capital Stock over time, expected to begin in Q3.  \nв—Ҷ Alphabet will sell USD10bn of stock to Berkshire Hathaway (BRK US, \nUSD471.58, n/r) in a private placement comprising USD5bn of Class A and Class \nC shares at price of USD351.81 and USD348.20 per share respectively. \nUse of proceeds: Alphabet will use the net proceeds from the underwritten public \nofferings and private placement, i.e. USD40bn, to expand AI infrastructure / compute \ncapabilities and for general corporate purposes. The latter includes the cost of related \ncapped call transactions funded specifically from depositary share proceeds, and thus \ntheoretically capped at USD15bn. The ATM offering will facilitate, for a вҖҳperiod of timeвҖҷ, \nadministrative changes to how the company meets vesting employee equity award tax \nobligations, which Alphabet will now settle on behalf of employees with corporate \ncash, up to an expected value of USD30bn in 2026.  \nRemain Buy rated with USD420.00 TP (from USD435.00), implying ~14% upside: \nWe update our model for th\n\n---\n\n*еҺҹе§ӢPDFе…ұ 9 йЎөпјҢжӯӨеӨ„дёәеүҚ 9 йЎөзҡ„иҮӘеҠЁжҸҗеҸ–еҶ…е®№гҖӮ*", "n75": "# и°·жӯҢ(GOOG)з ”жҠҘ вҖ” з‘һй“¶иҜҒеҲё вҖ” 2026-06-03\n\n## з ”жҠҘжҰӮиҰҒ\n\n- **ж Үзҡ„**: и°·жӯҢ / Alphabet (GOOG/GOOGL)\n- **еҲёе•Ҷ**: з‘һй“¶иҜҒеҲё\n- **ж—Ҙжңҹ**: 2026-06-03\n- **жқҘжәҗ**: PDFз ”жҠҘ\n\n## ж ёеҝғеҶ…е®№ж‘ҳиҰҒ\n\n--- з¬¬1йЎө ---\nab\n3 June 2026\nGlobal Research\nAlphabet Inc. - Class A\nStacking the Backlog from the AI Labs, Meta, \nand Vertex\nKey Takeaway\nThe top debates on Google right now are around the cloud backlog to revenue \ndrawdown rate and the impact of chip sales and larger AI lab deals on margins. To \naddress these questions we refine our Google Cloud buildout methodology today where \nwe split the Performance Obligation (backlog) into its constituent pieces - these include \nthe \"Core\" non-AI piece, Vertex, as well as the recent large contracts signed with \nAnthropic, OpenAI and Meta. Our updated process drives our Google Cloud revenue up \n~24% and ~34% for 2026 and 2027, respectively,  as some of the backlog conversion \ninto revenue - particularly the TPU sales - is pulled forward from 2028. This alteration \nresults in our comparable period gross revenues moving up by ~5% and ~10%. On the \nother hand, our Google EPS estimates for 2026 and 2027  decrease ~1% and ~7% \nrespectively as we account for lower margins on chip sales as well as pare back margins \non non-Vertex backlog conversion. Our 2026 / 2027 revenue estimates are now ~7% / \n~16% above Street's, respectively, but our EPS estimates are in line and only 1% ahead. \nOur price target remains at $410 and  we keep our Neutral rating.\nVariability in 2026/2027/2028 Cloud Segment Growth\nOur 2028 Cloud and gross revenue estimates come down by ~4% and ~1% \nrespectively, as we move on from the straightforward ~50% conversion of the backlog \ninto revenue over 24 months methodology to pulling in the TPU sales into 4Q26-3Q27. \nWhile there can be incremental deals to be signed with the AI labs - as we have also \ndone with our AWS forecasts - our backlog growth expectations contemplate ongoing \ngrowth of core and Vertex.  And for 2028, we are now effectively ~32% below \nconsensus in our Cloud segment revenue projections. \nVariability in Margins Near Term as Well\nAnthropic, OpenAI and Meta  will account for 21%, 7% and 1% of 2026 Google Cloud \nrevenues, respectively, and 44%, 5% and 1% of 2027 revenues. Further given the \ngreater mix of TPU sales revenue in 4Q26 and 1Q27-3Q27 - which is likely lower margin, \nwe see Google cloud margins compressing to 27.3% by 2027 from 32.9% in 1Q26. We \ndo think that margins will begin expanding again in 2028 as Vertex AI begins to account \nfor a larger portion of the mix (we project 36% Google cloud rev from Vertex; 38.7%  \nmargins for the segment).\nValuation:\nWe maintain our price targets on GOOGL & GOOG at $410 (unch) based on 26x (unch)  \nour 3Q27E-2Q28E (vs 12-months ending 1Q28 prior)  GAAP diluted EPS of $15.81. \nPlease note that the EPS shown on the front cover is UBS-adjusted EPS and differs from \nthe company's disclosed GAAP diluted EPS.\nHighlights (US$m)\n12/23\n12/24\n12/25\n12/26E\n12/27E\n12/28E\n12/29E\n12/30E\nRevenues\n307,394\n350,018\n402,836\n518,970\n669,129\n661,510\n729,977\n788,587\nEBIT (UBS)\n84,293\n112,390\n129,039\n172,446\n211,519\n238,604\n258,715\n265,861\nNet earnings (U\n\n---\n\n*еҺҹе§ӢPDFе…ұ 20 йЎөпјҢжӯӨеӨ„дёәеүҚ 20 йЎөзҡ„иҮӘеҠЁжҸҗеҸ–еҶ…е®№гҖӮ*", "n76": "# и°·жӯҢ(GOOG)з ”жҠҘ вҖ” з‘һй“¶иҜҒеҲё вҖ” 2026-06-08\n\n## з ”жҠҘжҰӮиҰҒ\n\n- **ж Үзҡ„**: и°·жӯҢ / Alphabet (GOOG/GOOGL)\n- **еҲёе•Ҷ**: з‘һй“¶иҜҒеҲё\n- **ж—Ҙжңҹ**: 2026-06-08\n- **жқҘжәҗ**: PDFз ”жҠҘ\n\n## ж ёеҝғеҶ…е®№ж‘ҳиҰҒ\n\n--- з¬¬1йЎө ---\nab\n8 June 2026\nGlobal Research\nFast Take\nAlphabet Inc. - Class A\nHeadline\nWWDC 2026: Apple showcases new Siri with Gemini powering its foundational \nmodels\nOur Take\nDirectionally negative update for  chat app operators (MetaAI, ChatGPT, Gemini) as \nApple/iOS owner releases a more competitive Siri; economics unclear, but in \nGoogle's case th   Search growth accelerated to 19% y/y (vs Street 16%), while Cloud was the big \nsurprise at 63% y/y (vs Street 50%). 1Q Op. margin at 41.9% beat Street at 39.6%, with  \nCloud at 32.9% (vs 27.4% est.) suggesting AI cycle returns are trending positively. EPS \nalso benefited from $37.7bn in Other Income from unrealized private asset appreciation. \nPositive surprises: Cloud backlog & external TPU sales \nCloud backlog grew 90% q/q to $462bn, with 50% expected to be recognized over next \n24 months, helping validate infrastructure investments and advantages of GoogleвҖҷs \nGemini and TPU offerings. Based on backlog on the books ($230bn to be recognized \nover the next 8 quarters), we expect significant increases in Street Cloud revenue \ngrowth estimates. A portion of the q/q growth represented contracted TPU sales to \nexternal customers, a new, potentially large, and profitable business for Google.  \nRaising 2027 net revenue by 10% and EPS by 12%  \nRaising estimates to reflect higher search growth, Cloud backlog and Cloud margins. For \n2026, we raise revenue by 4% to $424bn and EPS by 26% to $14.43. For 2027, we raise \nrevenue by 10% to $522bn, EPS by 12% to $14.49.  We also raise 2027 capex by 25% \n(+$70bn y/y) to $257bn, which we think is justified by material backlog expansion.  We \nRaise our PO to $430 based on a higher вҖҷ27 EPS & higher 28x multiple (vs 27x) given \ngrowing mix of recurring Cloud revenue. \nAI strengthening core business and growth outlook; Buy \nAnother quarter of strong revenues and margins reinforces our view that Google is a top \nAI play, with increasing search usage, improving ad targeting, durable Cloud advantages \nfrom Gemini/TPUs, and growing subscription revenues from Gemini.  We think AI \ntailwinds for Search are still in early stages and future LLM improvements will drive \ndurable growth. For Cloud, added capacity and TPU sales could further drive upside. At \nAH price of ~$372, stock is at 25x our revised 2027E EPS, and we think search strength \nand Cloud backlog visibility warrant a higher multiple. Next catalysts: I/O Conf (May 19), \nupgraded Gemini model, consumer agentic launches, and new Cloud deals. Reit Buy. \nEstimates (Dec) (US$) \n2024A\n2025A\n2026\n\n---\n\n*еҺҹе§ӢPDFе…ұ 14 йЎөпјҢжӯӨеӨ„дёәеүҚ 14 йЎөзҡ„иҮӘеҠЁжҸҗеҸ–еҶ…е®№гҖӮ*", "n78": "# и°·жӯҢ(GOOG)з ”жҠҘ вҖ” зҫҺй“¶е…Ёзҗғз ”з©¶ вҖ” 2026-05-05\n\n## з ”жҠҘжҰӮиҰҒ\n\n- **ж Үзҡ„**: и°·жӯҢ / Alphabet (GOOG/GOOGL)\n- **еҲёе•Ҷ**: зҫҺй“¶е…Ёзҗғз ”з©¶\n- **ж—Ҙжңҹ**: 2026-05-05\n- **жқҘжәҗ**: PDFз ”жҠҘ\n\n## ж ёеҝғеҶ…е®№ж‘ҳиҰҒ\n\n--- з¬¬1йЎө ---\nBofA Securities does and seeks to do business with issuers covered in its research \nreports. As a result, investors should be aware that the firm may have a conflict of \ninterest that could affect the objectivity of this report. Investors should consider this \nreport as only a single factor in making their investment decision. \nRefer to important disclosures on page 18 to 21. Analyst Certification on page 16. Price \nObjective Basis/Risk on page 16.  \n12968958 \n \n \nAlphabet \nAI Wars: Claude & Gemini momentum \ncontinues, with stable Google growth \nMaintain Rating: BUY | PO: 430.00 USD | Price: 383.25 USD   \n  \n \n \nTraffic: Gemini +9% m/m, ChatGPT -1%, Claude +33% \nPer Similarweb, April global daily avg. web visits to Google increased 4% y/y to 2.8bn, \nChatGPT was up 7% y/y to 183mn, Gemini was up 572% y/y to 92mn, and Claude was up \n745% y/y to 27mn.  On m/m basis, Google traffic was up 1%, ChatGPT was down 1%, \nGemini was up 9% and Claude was up 33%.  US web visits to Google were up 2% y/y to \n546mn, ChatGPT was up 30% y/y to 34mn (6% of Google), Bing was down 6% y/y to \n44mn. On m/m basis, Google traffic was up 1%, ChatGPT was up 1%, Claude was up \n28%, and Gemini was up 8%.   \nDAUs: Gemini +13% m/m, ChatGPT flat, Google +1%  \nIn Apr, per Sensor Tower, Google global mobile DAUs increased 12% y/y (+1% m/m) to \n2.2bn, ChatGPT +88% y/y to 429mn (flat m/m), Gemini +336% y/y to 101mn (+13% \nm/m), Claude +1,252% to 14mn (+41% m/m), Perplexity +104% y/y to 9mn, & Grok was \nat 11mn.  In Apr, Gemini added 11mn DAUs m/m, ChatGPT was +2mn, and Claude +4mn. \nSearch share: Google global share marginally up y/y \nPer Statcounter, GoogleвҖҷs global search share was up 7bps m/m vs. Bing up 1bp m/m. On \na y/y basis, GoogleвҖҷs market share was up 37bps y/y to 90.0% while BingвҖҷs gained \n125bps y/y to 5.1%, and Others were down 179bps y/y to 3.3%. In the US, GoogleвҖҷs \nsearch market share was up 16bps m/m to 85.2% (down 155bps y/y), while Bing was \ndown 3bps m/m and up 232bps y/y to 9.8%. \nClaude and Gemini traction continues, Google still growing \nIn Apr, Google traffic and user growth was largely stable while ChatGPT growth has \ndecelerated, possibly due to growing traction of Claude & Gemini. We think traffic data \ncontinues to validate our thesis that AI is driving an expansionary search usage cycle.  \nOn top of strong usage, we expect AI integrations to aid search monetization through \nimproved intent understanding and higher monetization of zero-click queries, while \nagentic capabilities could enhance performance and measurement. Maintain Buy on \nGoogle.  Next Catalysts: I/O Conf (May 19), upgraded Gemini model launch, and optimism \non Gemini monetization, include agentic launches. Risk is relatively elevated valuation (vs \nrecent history) and new competitive product launches (GPT-6, OpenAI ad ramp, etc.).  \nEstimates (Dec) (US$) \n2024A\n2025A\n2026E\n2027E\n2028E\nEPS \n8.04 \n10.81 \n14.43 \n14.49 \n17.62 \nEPS Change (YoY) \n38.6% \n34.5% \n33.5% \n0.4% \n21.6% \nCon\n\n---\n\n*еҺҹе§ӢPDFе…ұ 21 йЎөпјҢжӯӨеӨ„дёәеүҚ 21 йЎөзҡ„иҮӘеҠЁжҸҗеҸ–еҶ…е®№гҖӮ*", "n79": "# и°·жӯҢ(GOOG)з ”жҠҘ вҖ” зҫҺй“¶е…Ёзҗғз ”з©¶ вҖ” 2026-06-08\n\n## з ”жҠҘжҰӮиҰҒ\n\n- **ж Үзҡ„**: и°·жӯҢ / Alphabet (GOOG/GOOGL)\n- **еҲёе•Ҷ**: зҫҺй“¶е…Ёзҗғз ”з©¶\n- **ж—Ҙжңҹ**: 2026-06-08\n- **жқҘжәҗ**: PDFз ”жҠҘ\n\n## ж ёеҝғеҶ…е®№ж‘ҳиҰҒ\n\n--- з¬¬1йЎө ---\nBofA Securities does and seeks to do business with issuers covered in its research \nreports. As a result, investors should be aware that the firm may have a conflict of \ninterest that could affect the objectivity of this report. Investors should consider this \nreport as only a single factor in making their investment decision. \nRefer to important disclosures on page 18 to 21. Analyst Certification on page 16. Price \nObjective Basis/Risk on page 16.  \n12982117 \n \n \nAlphabet \nAI Wars: Claude and Gemini ramping, Meta \nAI small base but growing, Google stable \nMaintain Rating: BUY | PO: 430.00 USD | Price: 368.53 USD   \n  \n \n \nWeb traffic: Claude and Meta AI have best m/m growth \nPer Similarweb, May global daily avg. web visits to Google were up 5% y/y to 2.8bn, \nChatGPT was +2% y/y to 180mn, Gemini was +451% y/y, Claude was +857% y/y, and \nMeta AI was +105% y/y.  On m/m basis, Google was flat, ChatGPT was down 2%, Gemini \nwas +2%, Claude was +14%, and Meta AI was +17%.  In the US, Web visits to Google \nwere +2% y/y to 535mn, ChatGPT was +25% y/y to 32mn (6% of Google), Gemini was \n+289% y/y, Claude was +760% y/y, and Meta AI was +42% y/y. On m/m basis, Google \nwas down 2%, ChatGPT was -7%, Gemini was -5%, Claude was +2%, & Meta AI +2%. \nMobile DAUs: Gemini and ChatGPT add 10mn users m/m \nIn May, per Sensor Tower, Google global mobile DAUs increased 12% y/y (+1% m/m) to \n2.2bn, ChatGPT was up 68% y/y to 438mn (+2% m/m), Gemini up 321% y/y to 110mn \n(+10% m/m), Claude +1,349% to 17mn (+22% m/m), Meta AI +1,321% to 10mn (+25% \nm/m), & Perplexity +67% y/y to 8m. In the month of May, Gemini added 10mn DAUs \nm/m, ChatGPT also added 10mn, Claude added 3mn while Meta AI added 3mn.  \nSearch share: Google global share marginally up y/y \nPer Statcounter, GoogleвҖҷs global search share was up 44bps m/m vs. Bing down 16bps \nm/m. On a y/y basis, GoogleвҖҷs market share was up 89bps y/y to 90.5% while BingвҖҷs \ngained 100bps y/y to 5.0%, and Others were down 195bps y/y to 3.2%. In the US, \nGoogleвҖҷs search market share was up 66bps m/m to 85.8% (down 111bps y/y). \nClaude and Gemini growth strong, Google trends stable \nIn May, Google traffic & user growth was largely stable while ChatGPT grew but decelerated \non a y/y basis, while Claude, Gemini and Meta AI continued to gain traction. We think the \nnew ad formats Google announced at Marketing Live should help capitalize on growing AI \nsearch format usage (1bn users of AI Mode, Gemini at 900mn MAUs) and could accelerate \nSearch monetization. Maintain Buy on Alphabet. Also, data suggests growing engagement \non the standalone Meta AI app, as Meta utilizes its large user base to drive adoption of new \nsurfaces. Maintain Buy on Meta. Next Google usage catalysts: Broader availability of Gemini \n3.5 Pro and rollout of new agentic search features announced at I/O. \nEstimates (Dec) (US$) \n2024A\n2025A\n2026E\n2027E\n2028E\nEPS \n8.04 \n10.81 \n14.43 \n14.49 \n17.62 \nEPS Change (YoY) \n38.6% \n34.5% \n33.5% \n0.4% \n21.6% \nConsensus E\n\n---\n\n*еҺҹе§ӢPDFе…ұ 21 йЎөпјҢжӯӨеӨ„дёәеүҚ 21 йЎөзҡ„иҮӘеҠЁжҸҗеҸ–еҶ…е®№гҖӮ*"}, "types": ["Analysis", "Article", "Note", "Reference", "ResearchReport", "Synthesis", "иЎҢдёҡз ”жҠҘ"], "palette": {"Article": "#3b82f6", "Analysis": "#8b5cf6", "Synthesis": "#ec4899", "Reference": "#10b981", "Metric": "#f59e0b", "Playbook": "#ef4444", "Note": "#94a3b8"}};</script>
<script>
const B = window.BUNDLE;
const connected = B.edges.length > 0;
const HAS_CYTOSCAPE = typeof cytoscape !== "undefined";
document.title = `зҹҘиҜҶеӣҫи°ұ вҖ” ${B.nodes.length} иҠӮзӮ№`;

if (!HAS_CYTOSCAPE) {
  document.getElementById("graph").innerHTML =
    '<div class="graph-hint"><b>вҡ  CDN жңӘеҠ иҪҪ</b><br><span style="font-size:12px">иҜ·еҲҮжҚўеҲ°еҲ—иЎЁи§Ҷеӣҫ</span></div>';
  document.querySelector('[data-view="table"]').click();
}

// в”Җв”Җ Indexes в”Җв”Җ
const nodeIdx = {}; B.nodes.forEach(n => nodeIdx[n.data.id] = n.data);
const backlinks = {}; B.edges.forEach(e => {(backlinks[e.data.target]||=[]).push(e.data.source)});

// в”Җв”Җ Type chips в”Җв”Җ
const p = B.palette;
const types = B.types;
let activeType = null;

const chipRow = document.getElementById("type-chips");
// "е…ЁйғЁ" chip
chipRow.querySelector("[data-all]").addEventListener("click", ()=>{
  activeType = null;
  chipRow.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  chipRow.querySelector("[data-all]").classList.add("active");
  applyFilters();
});
types.forEach(t => {
  const ch = document.createElement("span");
  ch.className = "chip"; ch.textContent = t;
  ch.style.setProperty("--chip-color", p[t]||"#94a3b8");
  ch.addEventListener("click", () => {
    if (activeType === t) {
      activeType = null;
      chipRow.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      chipRow.querySelector("[data-all]").classList.add("active");
    } else {
      activeType = t;
      chipRow.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      ch.classList.add("active");
    }
    applyFilters();
  });
  chipRow.appendChild(ch);
});

// в”Җв”Җ Layout (иҮӘйҖӮеә”пјҡж— иҫ№вҶ’gridпјҢжңүиҫ№вҶ’cose) в”Җв”Җ
const layoutSelect = document.getElementById("layout");
if (!connected) layoutSelect.value = "grid";

// cytoscape дёҚеҸҜз”Ёж—¶жҸҗдҫӣз©әеЈіеҜ№иұЎ
const cy = HAS_CYTOSCAPE ? cytoscape({
  container: document.getElementById("graph"),
  elements: [...B.nodes, ...B.edges],
  style: [
    { selector:"node", style:{
      "background-color":"data(color)","label":"data(label)","color":"#0f172a",
      "font-size":9.5,"text-valign":"bottom","text-margin-y":3,"text-wrap":"wrap","text-max-width":100,
      "width":"data(size)","height":"data(size)","border-width":1,"border-color":"data(color)",
      "opacity":.92,"transition-property":"opacity","transition-duration":150,
    }},
    { selector:"node:selected", style:{"border-width":3,"border-color":"#f59e0b"} },
    { selector:"edge", style:{"width":1.5,"line-color":"#cbd5e1","target-arrow-color":"#cbd5e1","target-arrow-shape":"triangle","curve-style":"bezier","arrow-scale":.8} },
    { selector:".dim", style:{"opacity":.08} },
    { selector:".hidden", style:{"display":"none"} },
  ],
  layout: { name: connected?"cose":"grid", animate:false, padding:30, ...(connected?{}:{rows:Math.ceil(Math.sqrt(B.nodes.length))}) },
  wheelSensitivity: .2,
});

cy.on("tap","node",evt=>showDetail(evt.target.id()));
cy.on("tap",evt=>{if(evt.target===cy)clearSelection()});
}) : { // cytoscape йҷҚзә§
  on(){}, elements(){return{unselect(){}}}, getElementById(){},
  nodes(){return{filter:()=>({length:0})}}, fit(){}, animate(){}, layout(){run(){}}, batch(fn){fn()}, zoom(){return 1}
};

// в”Җв”Җ Search в”Җв”Җ
let searchQ = "";
document.getElementById("search").addEventListener("input",e=>{
  searchQ = e.target.value.trim().toLowerCase();
  applyFilters();
});

// в”Җв”Җ Layout в”Җв”Җ
if (HAS_CYTOSCAPE) {
document.getElementById("layout").addEventListener("change",e=>{
  const name = e.target.value;
  const opts = { name, animate:false, padding:30 };
  if (name==="grid") opts.rows = Math.ceil(Math.sqrt(cy.nodes(":visible").length||1));
  cy.layout(opts).run();
});

document.getElementById("reset").addEventListener("click",()=>{cy.fit(null,30);clearSelection()});
}

// в”Җв”Җ View toggle в”Җв”Җ
document.querySelectorAll(".view-toggle button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".view-toggle button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const isGraph = btn.dataset.view === "graph";
    document.getElementById("graph").style.display = isGraph?"":"none";
    document.getElementById("table-view").classList.toggle("active",!isGraph);
    if (isGraph) { cy.resize(); cy.fit(null,30); }
  });
});

// в”Җв”Җ Filters в”Җв”Җ
function applyFilters(){
  if (!HAS_CYTOSCAPE) return;
  cy.batch(()=>{
    cy.nodes().forEach(n=>{
      const d = n.data();
      let visible = true;
      if (activeType && d.type !== activeType) visible = false;
      if (searchQ) {
        const hay = (d.label||"").toLowerCase()+" "+d.id+" "+(d.tags||[]).join(" ").toLowerCase();
        if (!hay.includes(searchQ)) visible = false;
      }
      n.toggleClass("dim",!visible).toggleClass("hidden", false);
    });
    cy.edges().forEach(e=>{
      e.toggleClass("dim",e.source().hasClass("dim")||e.target().hasClass("dim"));
    });
  });
  // жӣҙж–°и®Ўж•°
  const v = cy.nodes(":visible").filter(n=>!n.hasClass("dim")).length;
  document.getElementById("filter-count").textContent = v===B.nodes.length?"":`${v}/${B.nodes.length}`;
}

// в”Җв”Җ Detail в”Җв”Җ
function clearSelection(){
  cy.elements().unselect();
  document.getElementById("detail-empty").style.display = "";
  document.getElementById("detail-content").style.display = "none";
}

function showDetail(nid){
  const d = nodeIdx[nid]; if(!d) return;
  cy.elements().unselect();
  const n = cy.getElementById(nid); if(n) n.select();

  document.getElementById("detail-empty").style.display = "none";
  const content = document.getElementById("detail-content");
  content.style.display = "";
  content.scrollTop = 0;

  const badge = document.getElementById("detail-type");
  badge.textContent = d.data.type; badge.style.background = d.data.color;

  document.getElementById("detail-title").textContent = d.data.label;
  document.getElementById("detail-description").textContent = d.data.description||"вҖ”";

  const resEl = document.getElementById("detail-resource");
  resEl.innerHTML = "";
  const resource = d.data.resource||"";
  const isUrl = /^https?:\/\//.test(resource);
  if (isUrl) {
    const a = document.createElement("a");
    a.href = resource; a.target = "_blank"; a.rel = "noopener";
    a.textContent = resource.length>80?resource.slice(0,77)+"...":resource;
    resEl.appendChild(a);
  } else { resEl.textContent = resource||"вҖ”"; }

  const tagsEl = document.getElementById("detail-tags");
  tagsEl.innerHTML = d.data.tags?.length
    ? d.data.tags.map(t=>`<span class="tag">${t}</span>`).join("") : "вҖ”";

  const bodyText = B.bodies[nid]||"";
  const bodyEl = document.getElementById("detail-body");
  bodyEl.innerHTML = renderMD(bodyText);

  const bl = backlinks[nid]||[];
  const blSec = document.getElementById("detail-backlinks");
  const blList = document.getElementById("backlinks-list");
  blList.innerHTML = "";
  if (bl.length) {
    blSec.hidden = false;
    bl.forEach(s=>{
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.textContent = nodeIdx[s]?.data?.label||s;
      a.addEventListener("click",()=>showDetail(s));
      li.appendChild(a);
      blList.appendChild(li);
    });
  } else { blSec.hidden = true; }

cy.animate({center:{eles:n},zoom:Math.max(cy.zoom(),1.0)},{duration:200});
}

// в”Җв”Җ Table view в”Җв”Җ
if (!connected) {
  document.getElementById("graph-hint").hidden = false;
}
// в”Җв”Җ Legend в”Җв”Җ
types.forEach(t=>{
  const c = p[t]||"#94a3b8";
  document.getElementById("legend").innerHTML += `<span class="legend-item"><span class="stats-dot" style="background:${c}"></span>${t}</span>`;
});

// в”Җв”Җ Table в”Җв”Җ
const tbody = document.getElementById("table-body");
B.nodes.forEach(n=>{
  const d = n.data;
  const tr = document.createElement("tr");
  tr.innerHTML = `<td class="title"><span class="type-badge" style="background:${d.color};font-size:10px;margin-right:6px">${d.type}</span>${d.label}</td><td class="desc">${d.description||""}</td>`;
  tr.addEventListener("click",()=>{
    document.querySelectorAll(".view-toggle button").forEach(b=>b.classList.remove("active"));
    document.querySelector('[data-view="graph"]').classList.add("active");
    document.getElementById("graph").style.display="";
    document.getElementById("table-view").classList.remove("active");
    showDetail(d.id);
  });
  tbody.appendChild(tr);
});

// в”Җв”Җ еҶ…зҪ® Markdown жёІжҹ“пјҲж—  CDN дҫқиө–пјү в”Җв”Җ
function renderMD(text) {
  if (!text) return "";
  let html = text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // д»Јз Ғеқ—
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_,lang,code)=>
    `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`);
  // иЎҢеҶ…д»Јз Ғ
  html = html.replace(/`([^`]+)`/g,"<code>$1</code>");
  // ж Үйўҳ
  html = html.replace(/^#### (.+)$/gm,"<h4>$1</h4>");
  html = html.replace(/^### (.+)$/gm,"<h3>$1</h3>");
  html = html.replace(/^## (.+)$/gm,"<h2>$1</h2>");
  html = html.replace(/^# (.+)$/gm,"<h1>$1</h1>");
  // зІ—дҪ“/ж–ңдҪ“
  html = html.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  html = html.replace(/\*(.+?)\*/g,"<em>$1</em>");
  // еӣҫзүҮ
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2">');
  // й“ҫжҺҘ
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  // ж°ҙе№ізәҝ
  html = html.replace(/^---$/gm,"<hr>");
  // ж— еәҸеҲ—иЎЁ
  html = html.replace(/^[\*\-] (.+)$/gm,"<li>$1</li>");
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g,"<ul>$1</ul>");
  // жңүеәҸеҲ—иЎЁ
  html = html.replace(/^\d+\. (.+)$/gm,"<li>$1</li>");
  // еј•з”Ё
  html = html.replace(/^&gt; (.+)$/gm,"<blockquote>$1</blockquote>");
  // ж®өиҗҪпјҲиҝһз»ӯзҡ„зәҜж–Үжң¬иЎҢпјү
  html = html.replace(/\n\n+/g,"</p><p>");
  html = "<p>" + html + "</p>";
  // жё…зҗҶз©әж®өиҗҪ
  html = html.replace(/<p>\s*<\/p>/g,"");
  html = html.replace(/<p>(<(?:h[1-4]|ul|ol|pre|blockquote|hr|table)[\s\S]*?<\/\1>)<\/p>/g,"$1");
  return html;
}

// Auto-init
if (B.nodes.length) showDetail(B.nodes[0].data.id);
</script>
</body>
