<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>知识图谱</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;
  --accent:#3b82f6;--hover:#f1f5f9;--radius:8px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
}
body{
  font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  color:var(--text);background:var(--bg);display:flex;flex-direction:column;height:100vh;
}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
}
.brand{display:flex;align-items:baseline;gap:8px}
.brand strong{font-size:15px}
.brand .muted{font-size:12px;color:var(--muted)}
.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.controls input{width:180px;font-size:13px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;outline:none;transition:border-color .15s}
.controls input:focus{border-color:var(--accent)}
.controls button,.controls select{
  font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface);cursor:pointer;transition:all .15s;
}
.controls button:hover,.controls select:hover{background:var(--hover)}
.controls button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Chips */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{
  font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;transition:all .15s;user-select:none;
}
.chip:hover{background:var(--hover)}
.chip.active{color:#fff;border-color:transparent}

/* ── Main ── */
main{display:flex;flex:1;min-height:0}
#graph-panel{flex:1 1 60%;display:flex;flex-direction:column;min-width:0;position:relative;background:var(--surface);border-right:1px solid var(--border)}
#graph{flex:1;position:relative}
#table-view{flex:1;overflow-y:auto;display:none;padding:0}
#table-view.active{display:block}
#detail{flex:0 0 42%;overflow-y:auto;padding:24px;background:var(--surface)}

.view-toggle{position:absolute;top:8px;right:8px;z-index:20;display:flex;gap:4px}
.view-toggle button{
  font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;
  background:var(--surface);cursor:pointer;
}
.view-toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.graph-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;
  text-align:center;color:var(--muted);font-size:14px;pointer-events:none;
}
.graph-hint b{color:var(--text)}

/* ── Table ── */
.entry-table{width:100%;border-collapse:collapse;font-size:13px}
.entry-table thead{position:sticky;top:0;z-index:1;background:var(--surface)}
.entry-table th{
  text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);
  color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer
}
.entry-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.entry-table tr{cursor:pointer;transition:background .1s}
.entry-table tr:hover{background:var(--hover)}
.entry-table td.title{font-weight:500}
.entry-table td.type{font-size:11px}
.entry-table td.desc{color:var(--muted);font-size:12px;max-width:300px}

/* ── Detail ── */
#detail-empty{text-align:center;margin-top:80px}
.detail-header{margin-bottom:14px}
.detail-header h1{font-size:18px;margin:6px 0 4px;font-weight:600;line-height:1.3}
.type-badge{
  display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;
  font-size:11px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.5px;
}
dl.meta{display:grid;grid-template-columns:70px 1fr;gap:6px 12px;margin:10px 0 16px;font-size:13px}
dl.meta dt{color:var(--muted);font-weight:500}
dl.meta dd{word-break:break-all}
dl.meta a{color:var(--accent)}
.tag{display:inline-block;padding:1px 8px;margin:0 4px 4px 0;border-radius:4px;background:var(--hover);color:#475569;font-size:11px}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}

#detail-body{font-size:13px;line-height:1.7}
#detail-body h1{font-size:17px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
#detail-body h2{font-size:15px;margin:16px 0 8px}
#detail-body h3{font-size:13px;margin:12px 0 6px}
#detail-body p{margin:8px 0}
#detail-body code{background:var(--hover);padding:1px 5px;border-radius:3px;font-size:12px;font-family:ui-monospace,monospace}
#detail-body pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:var(--radius);overflow-x:auto;font-size:12px}
#detail-body pre code{background:transparent;color:inherit;padding:0}
#detail-body ul,#detail-body ol{padding-left:22px;margin:8px 0}
#detail-body li{margin:3px 0}
#detail-body table{border-collapse:collapse;margin:10px 0;font-size:12px}
#detail-body th,#detail-body td{border:1px solid var(--border);padding:5px 10px}
#detail-body blockquote{border-left:3px solid var(--border);margin:10px 0;padding:4px 14px;color:var(--muted)}
#detail-body img{max-width:100%;border-radius:var(--radius)}
#detail-body a{color:var(--accent)}

#detail-backlinks{margin-top:20px}
#detail-backlinks h2{font-size:13px;color:var(--muted);margin-bottom:8px}
#detail-backlinks ul{padding-left:18px}
#detail-backlinks li{margin:3px 0}
#detail-backlinks a{color:var(--accent);cursor:pointer}

/* Stats bar */
.stats-bar{
  position:absolute;bottom:10px;left:14px;right:14px;z-index:10;
  display:flex;gap:16px;font-size:11px;color:var(--muted);
  pointer-events:none;
}
.stats-bar span{display:inline-flex;align-items:center;gap:4px}
.stats-dot{width:6px;height:6px;border-radius:50%}
.legend{position:absolute;top:10px;left:14px;z-index:10;display:flex;gap:12px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.legend-item{display:inline-flex;align-items:center;gap:4px}

/* Connectivity badge */
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.badge-warn{background:#fef3c7;color:#92400e}
.badge-ok{background:#d1fae5;color:#065f46}
</style>
</head>
<body>
<header>
  <div class="brand">
    <strong>🧠 知识图谱</strong>
    <span class="muted">30 节点 · 5 关联</span>
    <span class="badge badge-ok" id="conn-badge">已关联</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="搜索..."><span class="muted" id="filter-count" style="width:50px"></span>
    <select id="layout">
      <option value="cose">力导向</option><option value="concentric">同心圆</option>
      <option value="breadthfirst">层级</option><option value="circle">环形</option><option value="grid">网格</option>
    </select>
    <button id="reset">↺</button>
  </div>
  <div class="chip-row" id="type-chips" style="flex-basis:100%;padding-top:4px">
    <span class="chip active" data-all style="font-weight:500">全部</span>
  </div>
</header>
<main>
  <section id="graph-panel">
    <div class="view-toggle">
      <button data-view="graph" class="active">◉ 图谱</button>
      <button data-view="table">☰ 列表</button>
    </div>
    <div id="graph">
      <div class="graph-hint" id="graph-hint" hidden>
        <b>🔗 暂无关联</b><br><span style="font-size:12px">导入时为条目添加交叉引用，图谱将显示关联连线</span>
      </div>
      <div class="legend" id="legend"></div>
    </div>
    <div id="table-view"><table class="entry-table"><thead><tr><th>条目</th><th>描述</th></tr></thead><tbody id="table-body"></tbody></table></div>
  </section>
  <section id="detail">
    <div id="detail-empty" class="muted">◀ 点击节点或列表项查看详情</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-badge" id="detail-type"></span>
        <h1 id="detail-title"></h1>
      </header>
      <dl class="meta">
        <dt>描述</dt><dd id="detail-description"></dd>
        <dt>来源</dt><dd id="detail-resource"></dd>
        <dt>标签</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>↩ 被引用</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

hromium的 AI Coding 开发体系", "type": "Article", "description": "url: https://mp.weixin.qq.com/s/sCmRKJjTpdB4k3145OzZMg", "resource": "https://mp.weixin.qq.com/s/sCmRKJjTpdB4k3145OzZMg", "tags": ["chromium", "ai-coding", "cpp", "google", "development-system"], "color": "#3b82f6", "size": 37, "path": "programming/深入解析Chromium的-AI-Coding-开发体系.md"}}], "edges": [{"data": {"id": "n7__n4", "source": "n7", "target": "n4"}}, {"data": {"id": "n7__n1", "source": "n7", "target": "n1"}}, {"data": {"id": "n19__n18", "source": "n19", "target": "n18"}}, {"data": {"id": "n20__n21", "source": "n20", "target": "n21"}}, {"data": {"id": "n21__n22", "source": "n21", "target": "n22"}}], "bodies": {"n0": "> **状态**: ✅ 已总结 | **总结时间**: 2026-05-16\n\n点亮👆“☆”星标，不错过推送内容~\n\n全文速读\n\n当 90% 以上代码由 AI 生成，决定系统走向的不是谁写得更快，而是约束 AI 的能力。没有统一规范，AI 只会成倍放大混乱。本文基于 31 万行代码重构实践，分享我们如何用 Agent 评测思路管理 AI Coding——通过技术债梳理、建设Rule、重构 SOP 和 Pre-PR 机制，把重构从高成本专项变成随迭代持续推进的日常动作。我们沉淀的关键经验：\n\n用评测 Agent 的方式管理 AI Coding：我们团队负责 Agent 评测业务，在实践中沉淀出“人人对齐→人机对齐”的核心理念，而管理 AI Coding 的底层逻辑与之完全相同。先让团队形成统一共识（人人对齐），再将共识固化为 AI 可执行的约束（人机对齐）。顺序错了，AI Rule 写得再好也是一纸空文。\nAI 重新定义了“经验”的价值边界：利用 AI 工具，工程师短时间内就发现了 10 个性能隐患。过去要靠三年经验才能建立的代码全局感，AI 给所有人都配上了。经验的价值正在从“能看全”转移到“能判断什么重要” —— 这才是人不可替代的部分。\n技术债可以像业务需求一样被迭代消化：重构不需要排期，需要拆解能力。我们没有申请一天专门的重构时间，31 万行代码在业务交付中被渐进式消化。关键在于能不能把技术债拆解为业务需求的顺带动作。这需要极强的技术判断力，但一旦跑通，重构就不再是与业务争资源的零和博弈。\n工程师的角色变了：当 90% 代码由 AI 生成，团队成员的工作重心应从“写代码”转向“设计并维护一个能让 AI 可靠产出代码的工程环境”。\n\n🎈我们在文末还增加了读者互动环节，欢迎大家晒出自己的见解、思考，分享实践经验，一起交流学习。\n\n本文目录\n一、背景\n二、为什么要重构？\n三、重构时间线与执行路径\n阶段一：定义问题，借助 AI 梳理技术债（2026 年2月启动）\n阶段二：调研并制定 AI 友好的研发规范（2026年2月底完成）\n阶段三：建立 SOP，“见缝插针”完成渐进式重构（2026年3月-4月）\n四、总结\n我们沉淀的关键经验\n行动指南：如果你的团队也想落地\n\n当团队 90% 以上的代码由 AI 生成，31 万行的复杂业务系统还在高速膨胀，你会发现一个反直觉的事实：AI Coding 不会自动收敛复杂度 —— 没有统一规范的约束，不同人用 AI 写出的代码风格各异，系统反而会加速腐化。\n\n本文记录了我们如何在不停止业务交付的前提下，完成这场重构。在这个过程中，我们积累了三个关键经验，希望这篇实战经验能提供一些可复用的思路。\n\n经验一：用 Agent 评测思路管理 AI Coding。我们团队负责 Agent 评测业务，在实践中沉淀出一套核心标准对齐理念：“人人对齐→人机对齐”。我们发现管理 AI Coding 的底层逻辑一模一样 —— 先让团队形成统一共识（人人对齐），再将共识固化为 AI 可执行的约束（人机对齐）。本质上，就是同一套方法论在两个领域的复用。\n经验二：AI 正在重新定义“经验”的价值边界。利用 AI 工具，工程师短时间内就发现了 10 个性能隐患——过去需要长期积累才能建立的代码全局感，现在借助 AI，团队中的每个人都能快速具备。经验的价值正在从“能看全”转移到“能判断什么重要”。\n经验三：技术债可以像业务需求一样被迭代消化。 行业谈重构，要么推倒重来，要么申请专项。我们给出了第三条路：把技术债拆解为业务需求的“顺带动作”，借着迭代渐进式消化。\n一、背景\n\nAgent 评测系统长期承载多个核心业务场景，它同时承担了数据生产、流程编排、质量控制与多人协作等复杂能力，业务复杂度和工程复杂度都很高。具体来看，我们面对的复杂性主要体现在三个维度：\n\n业务仍处于探索期，导致需求高度模糊：全行业都在探索 Agent 评测，用户也不了解应该如何评测。这个大背景导致评测的需求又急又模糊。急，希望快速试错；模糊，业务方也不确定这条路是否真的有价值。\n庞大且高频的迭代体量：系统从 2025 年 6 月约不足 5 万行代码快速扩展至 31 万行，保持着月均 16 个需求（80% 业务需求 + 20% 技术需求）的高负荷运转。\n“笛卡尔积”级别的业务场景矩阵：系统底层支持 6 种多模态数据评测，上层构建了多种核心任务视图和精细化业务动作，并配套了十余种质检机制。这些能力交织着多种标签体系与动态分配策略，意味着系统每天都需要稳健处理成百上千种截然不同的复杂业务流组合。\n二、为什么要重构？\n\n当业务进入快速迭代与试错期，上述庞大的业务体量与原有底层架构之间的矛盾就会集中爆发，迫使我们必须启动本次大规模重构。核心动因直指以下三个痛点：\n\n1. 业务模型亟需升级，旧架构无法支撑探索性业务\n\n随着业务交互的丰富度和复杂度增加，旧有数据模型扩展能力不足导致“烟囱式”功能开发，几乎每新增业务形式都需要新增代码来实现。\n\n2. 代码严重腐化，技术债拖垮迭代效率\n\n过去长期采用“按需求建包”的模式开发，代码缺乏合理的工程分层，Controller 等各种复杂逻辑揉在一个包内，形成了严重的“面条式代码”。在 31 万行代码的体量下，这种深度的技术债让日常开发“牵一发而动全身”，导致一线同学开发异常痛苦，交付效率遭遇严重瓶颈。\n\n3. 协作模式风险放大，缺乏规范的 AI Coding 加速系统腐化\n\n一年左右的时间，团队成员规模增至 3 倍，并且团队成员技术背景复杂，涵盖高并发、机器学习离线训练、管理后端开发以及实习生，复杂业务系统开发经验不足。在这样一个高人员流动和跨技术栈的背景下，再叠加 90% 以上代码由 AI 辅助编写这一事实，如果不建立硬性的底层架构规范，不同背景的同学各自用 AI Coding，系统必将以极快的速度产生不可控的腐化与新债。\n\n因此，我们不仅需要工程重构，而且要建设符合 AI Coding 规范的工程重构。规范才可以帮助我们团队消灭旧技术债，规避新技术债。\n\n三、重构时间线与执行路径\n| 阶段一：定义问题，借助 AI 梳理技术债（2026 年2月启动）\n\n在需求高压背景下，要梳理技术债面临着一个极其现实的困境：量太大，根本看不完，也看不全。\n\n面对膨胀至 31 万行以上的代码库，试图靠人力逐行阅读来建立全局的可靠认知是不现实的。我们的代码库中同样伴随着典型的高危特征：很多地方文档不全、大量隐式逻辑和历史兼容分支藏在细节里。一个看起来不起眼的接口，背后可能挂着一串极长的调用链。所以，梳理技术债最大的难点，在于人力永远无法在短时间内穷举和穿透这些错综复杂的关联逻辑 —— 单段代码谁都能读懂，但没人能在短时间内把 31 万行的调用链全部穿透。\n\n我们采用的是一种更适合复杂系统的方式：“专家经验定向 + AI 辅助排查”。\n\n不再试图人工遍历，而是由核心开发圈定高危的排查边界，然后把穷举和扫描的脏活累活交给 AI。通过这种方式，我们快速摸清了系统底层的 P0/P1 级技术债（如业务模型缺陷、数据库查询性能隐患、状态管理技术债、索引技术债等）。\n\n这一步中，我们最大的体会是 AI 很适合帮我们把问题“看全”，但什么问题最重要，什么问题值得优先改，还是要由人来判断。具体来说，人负责圈定 P0/P1 级问题和优先级，AI 负责在圈定的方向上做穷举扫描——比如梳理业务模型问题、定位大数据量性能隐患、排查状态管理和索引层面的技术债。\n\n实践下来，这一步的 ROI 很高。我们仅仅投入了有限的资源，就完成了 3 个 P0 技术债和 2 个 P1 技术债的梳理。但最让我们意外的是下面这件事：\n\n短时间内，工程师就利用 AI 辅助精准定位了 10 个隐藏极深、靠肉眼极难发现的性能隐患。 这些隐患藏在复杂的调用链深处，即使是资深工程师逐行阅读也很难穷举到。这在纯人工阅读代码的模式下是几乎不可能的。\n\n这个结果迫使我们重新思考“经验”的定义。过去，“能看全”是资深工程师的核心壁垒 —— 你需要在系统里泡三年，才能建立起对调用链、隐式依赖和历史兼容逻辑的全局感知。但 AI 把“看全”的门槛打到了几乎为零。经验的价值正在从“能看全”转移到“能判断什么重要”——这才是人不可替代的部分。\n\n这一步对我们后面的启发很大，因为只有问题定义清楚了，后面的规范、分层和迁移，才不会做成无源之水。\n\n| 阶段二：调研并制定 AI 友好的研发规范（2026年2月底完成）\n\n通过技术债梳理，我们解决了重构哪里的问题，那么接下来要解决的就是“代码应该怎么写”。在全员 90% 代码依赖 AI Coding 的现状下，核心要解决的问题是“如何将一两个用好 AI 的人的经验，高质量泛化到全组”。\n\n为什么规范的价值被放大了？\n\n在传统研发模式下，开发规范的主要作用是帮助团队协作、Code Review 和新人上手。但当 AI 已经成为主要编码产能后，规范的意义发生了本质变化。大模型生成代码时，会强依赖当前上下文和现有代码模式。如果代码库本身风格混乱、团队对规范理解不一致，AI 不会自动纠偏，反而会把差异进一步放大，导致多人协作下持续产出”千人千面”的代码。因此，AI Coding 时代的研发规范已经升级为约束 AI 产出、阻止系统继续长新债的基础设施，远不止协作建议那么简单。\n\n用评测 Agent 的方式，管理 AI Coding\n\n但只让 AI 遵循规范还不够 —— AI 只能执行输入，不能替代团队形成统一判断。如果团队成员自己没有先对齐分层原则、建模方式和依赖边界，同一份规范就会被不同人解释成不同版本。\n\n这个问题让我们想到了自己的本职工作。我们团队负责 Agent 评测业务，在长期实践中沉淀出一套核心理念：\n\n标准对齐（人人对齐）：需要 1 位强有力的角色拉齐产品、运营、算法、QA 等所有角色的评测标准 —— 1个”独裁者”好过 10 个”民主者”。\n\n人机对齐：评测标准对齐后，通过模型选型和评测指标的优化，实现人机对齐，人机一致率达到基本阈值（例如 90%），才能认为机器的评价可信。\n\n我们发现，管理 AI Coding 与评测 Agent 的底层逻辑一模一样。 先通过规范拉齐团队的工程标准（人人对齐），再通过 AI Rule 和 Skill 约束大模型的生成结果（人机对齐）。一个做 AI 评测的团队，用评测的思维解决了工程治理问题。\n\n顺序至关重要：先”人人对齐”，再”人机对齐”。 很多团队以为配置好 AI Rule 就完事了，但真正的瓶颈在人，不在工具。团队自己没有统一共识，AI Rule 写得再好也会被不同人解释成不同版本。人的共识是 AI 约束的前提。\n\n将规范转化为 AI 的执行约束\n\n我们先调研了业内成熟团队的研发规范，并结合自身流程，沉淀出一套 AI 友好的工程约束，包括工程分层规范、业务域模型规约和仓储层规约。关键一步是没有把规范停留在文档层面，而是将其落地为 always 级别的 AI Rule，用于约束 AI 编码过程，并前置到预 CR 环节，帮助研发在提交前完成基础规范校验。\n\n与此同时，针对最容易产生分歧的领域职责划分问题，我们围绕”编排类”与”能力类”的职责边界进行了组内统一，并将共识沉淀为编码时渐进式加载的 Skill。\n\n| 阶段三：建立 SOP，“见缝插针”完成渐进式重构（2026年3月- 4月）\nAction 1：100% 借助 AI 完成工程分层与解耦重构\n\n我们将过去“按需求建包”的面条式代码，逐步迁移到标准四层架构（Starter / Application / Infrastructure / Common）以及按业务域组织的新结构中。但这次重构的重点，并不只是物理目录的调整，而是借此机会系统性治理历史代码中长期存在的深度耦合问题，尤其是底层数据对象 PO 在全链路中的泄露与上浮。围绕这一问题，我们分三步推进：第一步，补齐业务对象与数据转换层，收口散落各处的转换逻辑；第二步，在 Application 层重建接口契约，严格阻断底层数据对象向上层泄露；第三步，基于新契约修复上游全链路的参数依赖。\n\n这类重构的特点是：改造规则相对明确，但涉及范围极广、重复劳动密集。我们的做法是先由重构主 R 亲自完成两个最复杂包的迁移，在过程中沉淀出一套可让 AI 执行的标准化迁移 SOP。有了这套 SOP，重构工作不再依赖某一个人的经验——团队其他成员只需按照 SOP 指导 AI 完成剩余包的迁移，研发本人聚焦业务语义验收和 Code Review 即可。通过这种“主 R 打样→SOP 分发→全组并行执行”的方式，我们快速完成了十余个核心包的工程结构迁移。\n\n重构前\n\t\n重构后\n\n\n\t\nAction 2：零排期重构——借着业务需求“渐进式重构业务模型”\n\n本次重构的深水区。行业里谈重构，通常只有两条路：要么推倒重来，要么申请专项排期。我们走了第三条路 —— 把技术债拆解为业务需求的“顺带动作”，借着迭代渐进式消化，没有申请一天专门的重构时间。\n\n具体做法是将技术债拆解到日常高优需求中。例如，借着某个核心功能迭代需求，顺势设计并落地了全新的业务模型；借着另一个功能升级需求，我们设计了全新的质检业务模型，并在迅速完成了全量迁移（一举兼容了多条业务链路，以及多视图、多区域的复杂交叉验证）。\n\n这条路的难点在于拆解的精度——哪些业务需求能“顺带”消化哪些技术债，需要逐个判断：既不能让重构拖慢业务交付，也不能让业务需求绕过技术债继续堆新债。最终我在不停止业务交付的前提下，完成了核心数据模型的平滑升级。\n\nAction 3：重构质量保证\n\n1. 建设 AI CR 与 Pre-PR 机制\n\n随着 AI 编码效率飞跃式提升，我们很快遇到了“木桶效应”：Code Review 成了全链路中最拥堵的瓶颈：AI 极大地压缩了编码时间，压力系统性地向下游 CR 环节集中。如果 CR 效率不提升，AI Coding 的提效红利会被 CR 瓶颈吞掉。\n\n我们团队达成的共识：\n\n人工 CR 的价值，应该从“你写得对吗？”转变为“我们是否在正确的约束下解决正确的问题？”\nAI 审查规范类问题，做业务逻辑初筛；\n人重点在前置技术方案评审环节把关，Review 最终代码实现是否符合技术方案、代码业务逻辑问题。\n\n我们的实践经验：\n\n1、引入 Pre-PR（预审）机制：\n\n提交代码前，要求 RD 必须先用 AI 审查代码进行多轮自查，修复所有 AI 能发现的问题（规范类、Bug类、异常处理、一致性、可扩展性及性能问题等）。\n确认通过后，提交标准的 PR 文档（重点说明改动点、影响范围、需重点 Review 的业务逻辑，AI 根据代码改动按模板生成）。\n这样 Reviewer 拿到的就是一份“已过滤掉基础规范错误”的高质量代码，只需聚焦核心业务语义，认知负担大幅降低。\n\n2、高阶模型审查低阶模型：使用高配模型作为 Judge Model，审查低阶模型产出的编码。\n\n3、不同厂商模型对抗互相审核：使用不同厂商的模型互相审查对方的编码产出，通过差异化的模型能力形成互补，实测下来 CR 覆盖面更全。\n\n2. 调研取经，建立AI 辅助测试用例生成规范\n\n我们团队 100% 的需求由研发兼任测试（RD as QA）。在探索 AI 辅助自测时，团队自然演化出两条路线：路线 A 让 AI 全自动生成用例，人只做最后把关；路线 B 由人界定测试范围和风险级别，AI 负责代码扫描和用例步骤填充。\n\n实践下来，路线 A 很快暴露出严重的工程问题 —— AI 缺乏全局业务认知，极度依赖 PRD 质量，容易漏掉隐性关联的高危场景，同时发散出大量无价值的边缘用例，反而增加 Review 负担。与专业 QA 团队交流后，我们确认了路线 B（人工主导，AI 辅助）的方向，并沉淀为一套 Human-in-the-loop 的测试 SOP：\n\n步骤\n\t\n目标\n\t\n人做什么\n\t\nAI做什么\n\t\nAI提效点\n\n\nStep1 建立范围\n\t\n确定要测哪些接口\n\t\n审核并确认最终测试范围，排除误报\n\t\n从流量监控+代码变更双向扫描，自动收集受影响接口清单\n\t\n省去人工逐个翻代码找接口的时间，避免遗漏\n\n\nStep2 风险分级\n\t\n决定每个接口测多深\n\t\n根据 AI 提供的信息判定风险等级，决定测试深度\n\t\n读代码回答三个问题：改了多少、分支在哪、旧数据是否兼容\n\t\n把“读代码评估风险”从小时级压缩到分钟级\n\n\nStep3 设计分组\n\t\n最小化用例数量\n\t\n审核分组合理性，补充业务特殊场景\n\t\n用判定表方法“先拆后合”，自动生成最小Case组合\n\t\n组合爆炸的场景下，AI比人算得快且不易出错\n\n\nStep4 生成步骤\n\t\n写出可执行的测试步骤\n\t\n校验步骤是否匹配实际改动，补充边界条件\n\t\n按“一步操作、多维验证”模板展开，匹配改动级别生成步骤\n\t\n批量生成结构化用例。人只需 Review 不需从零写\n\n\nStep5 验证覆盖\n\t\n确保不漏不多\n\t\n最终确认覆盖矩阵无盲区\n\t\n自动生成接口×维度的覆盖矩阵，标记未覆盖项\n\t\n交叉验证靠人肉极易遗漏，AI 做矩阵比对零成本\n四、总结\n| 我们沉淀的关键经验\n用评测 Agent 的方式管理 AI Coding：我们团队负责 Agent 评测业务，在实践中沉淀出“人人对齐→人机对齐”的核心理念，而管理 AI Coding 的底层逻辑与之完全相同。先让团队形成统一共识（人人对齐），再将共识固化为 AI 可执行的约束（人机对齐）。顺序错了，AI Rule 写得再好也是一纸空文。\nAI 重新定义了“经验”的价值边界：利用 AI 工具，工程师短时间内就发现了 10 个性能隐患。过去要靠三年经验才能建立的代码全局感，AI 给所有人都配上了。经验的价值正在从“能看全”转移到“能判断什么重要” —— 这才是人不可替代的部分。\n技术债可以像业务需求一样被迭代消化：重构不需要排期，需要拆解能力。我们没有申请一天专门的重构时间，31 万行代码在业务交付中被渐进式消化。关键在于能不能把技术债拆解为业务需求的顺带动作。这需要极强的技术判断力，但一旦跑通，重构就不再是与业务争资源的零和博弈。\n工程师的角色变了：当 90% 代码由 AI 生成，团队成员的工作重心应从“写代码”转向“设计并维护一个能让 AI 可靠产出代码的工程环境”。\n| 行动指南：如果你的团队也想落地\n第一步：盘清技术债。不要试图人工遍历，由核心开发圈定高危方向，让 AI 做穷举扫描。投入相对较小，但能建立全局认知。\n第二步：制定规范并落地为 AI Rule、Skill。先组织团队对齐分层原则、建模方式、依赖边界等核心共识，再将共识固化为 AI 编码时 always 加载的 Rule。规范不落地到 AI 工具链里，就只是一纸空文。\n第三步：由主 R 打样，沉淀可复用的迁移 SOP。不要让每个人自己摸索，先由一个人跑通一个模块的完整迁移流程，把步骤沉淀为 AI 可执行的 SOP，再推广到全组。\n第四步：建立 Pre-PR 机制。要求每次提交前先用 AI 按团队规范自查，过滤掉基础问题，让人工 CR 只聚焦业务语义。AI 编码提速后，CR 会成为新瓶颈，这一步不能省。\n\n\n\n\n你所在的团队有没有遇到“AI 加速腐化”的问题，是怎么解决的？技术债“随需求顺带消化”这个思路，你们有落地的故事吗？\n\n欢迎大家在文末\n\n\n_（原文过长，仅显示前8000字。完整内容见 ddcursor/31万行代码重构：用评测管好AI Coding/content.raw.txt）_", "n1": "# AgentScope Java 1.1.0 Harness Framework 详解\n\n## 摘要\n<!-- AI 待填充 -->\n\n## 关键要点\n<!-- AI 待填充 -->\n\n## 原文内容\n\n要点\n\nAgentScope Java 1.1 把 Harness Engineering 收敛成 HarnessAgent + Workspace + 可插拔 Filesystem + Hook 管线。个人场景当加强版 ReAct Agent，企业场景开启隔离和多租户。参考链接:\n\n- https://github.com/agentscope-ai/agentscope-java/blob/main/docs/zh/harness/overview.md\n- https://github.com/agentscope-ai/agentscope-java/blob/main/docs/zh/harness/filesystem.md\n- https://java.agentscope.io", "n2": "# \n\n## 摘要\n<!-- AI 待填充 -->\n\n## 关键要点\n<!-- AI 待填充 -->\n\n## 原文内容\n\n五、后续规划\n\n- 已探索 React、Vue 转译，正在探索原生应用代码向 Kuikly 转码\n- 整套 AI 转码方案已筹备开源", "n3": "## 四、知识分层架构：五层存储 × 五种类型 × 三级成熟度\n\n### 4.1 三维正交体系\n\n| 维度 | 回答 | 定义 |\n|------|------|------|\n| 存储层（在哪） | 知识存在哪里？ | Layer 0-P/0-T/1/2/3 |\n| 知识类型（是什么） | 知识描述的是什么？ | model/decision/guideline/pitfall/process |\n| 成熟度（多可信） | 知识经过多少验证？ | draft → verified → proven |\n\n### 4.2 五层存储\n\n| 层 | 内容 | 范围 |\n|----|------|------|\n| Layer 0-P | 个人偏好（~/.ai-team/） | 纯本地，不共享 |\n| Layer 0-T | 团队约定（team-conventions/） | 团队级，Git 共享 |\n| Layer 1 | 技术知识（tech-wiki/） | 团队级，跨项目 |\n| Layer 2 | 业务知识（biz-wiki/{domain}/） | 团队级，按领域 |\n| Layer 3 | 项目知识（docs/knowledge/） | 项目级，随项目走 |\n\n关键设计：知识可\"向上提升\"。Layer 3 知识若判定为跨项目通用，自动提升到 Layer 1 或 2。\n\n### 4.3 五种知识类型（MECE 互斥）\n\n| 类型 | 定义 | 示例 |\n|------|------|------|\n| model | 实体定义、数据结构 | \"广告计划包含预算/出价/投放时段\" |\n| decision | 技术选型、架构决策 | \"选择事件驱动而非 RPC 同步\" |\n| guideline | 推荐/禁止做法 | \"公共模块变更后的兼容性检查清单\" |\n| pitfall | 已知风险、故障模式 | \"广告预算扣减在高并发下会超扣\" |\n| process | 业务流程、状态机 | \"广告审核：提交→机审→人审→上线\" |\n\n### 4.4 三级成熟度 + 自动衰减\n\ndraft（新提取）→ 1 个工作流中引用 → verified（单项目验证）→ ≥2 个不同项目中验证 → proven（成熟可信赖）\n\n| 衰减规则 | 触发条件 | 动作 |\n|----------|----------|------|\n| proven → verified | 12 个月未引用 | 降级 |\n| verified → draft | 6 个月未引用 | 降级 |\n| draft 持续未引用 | + Lint 标记 | 归档，移出活跃索引 |\n\n设计借鉴 Karpathy LLM Wiki 的 Lint 操作：定期识别矛盾、孤儿页、缺失交叉引用。\n\n---\n\n## 五、团队知识库：如何共享和更新\n\n### 5.1 独立 Git 仓库\n\n团队知识库独立于业务项目，结构：\n```\nteam-knowledge.git\n├── knowledge-catalog.md    ← 全景目录\n├── .knowledge-config.yaml  ← 团队配置\n├── team-conventions/       ← Layer 0-T\n├── tech-wiki/              ← Layer 1\n├── biz-wiki/{domain}/      ← Layer 2\n├── project-profiles/       ← 项目画像\n└── contributions/          ← 贡献暂存区\n```\n\n独立仓库的原因：跨项目共享、生命周期独立于项目、权限独立管理。\n\n### 5.2 三种角色\n\n| 角色 | 权限 | 适用 |\n|------|------|------|\n| maintainer | 裁决冲突、审批 proven、管理成员 | 负责人/资深工程师 |\n| contributor | 自动贡献（创建/验证/标记矛盾） | 正式团队成员 |\n| reader | 只消费知识，不贡献 | 新成员试用期 |\n\n### 5.3 贡献暂存 + 异步合并\n\n借鉴区块链思想用 Git 实现：log.md 只追加不修改、贡献可溯源（evidence.contributors[]）、共识机制（draft→verified 需 1 人验证，verified→proven 需 ≥2 人 + ≥2 项目）。\n\n### 5.4 冲突解决\n\n纯新增/证据追加/成熟度提升：自动合并。内容矛盾：写入 conflicts/ 通知 maintainer 裁决。成熟度冲突：保留较低成熟度 + 标记 contradiction。\n\n---\n\n## 六、工作流如何服务于知识沉淀\n\n### 6.1 三通道沉淀\n\n```\n/flow-import（冷启动）      /flow-run（每次需求）\n     │                           │\n     ▼                           ▼\nINIT: git pull 知识仓库       3 Agent 管道\n+ 注入查询入口                 各阶段按需查询知识\n                                │\n                                ▼\n                           ARCHIVE: 知识提取+提升判定\n                           ├→ Layer 3: docs/knowledge/\n                           ├→ Layer 1: tech-wiki/\n                           └→ Layer 2: biz-wiki/\n                                │\n                                ▼\n                           下一个 /flow-run 自动受益\n```\n\n三个关键时刻：\n- **INIT（注入）：** git pull + 注入全景目录\n- **执行中（消费）：** Agent 在各决策点按需查询\n- **ARCHIVE（提取）：** 架构决策→decision，踩坑→pitfall，经验→guideline\n\n### 6.2 各阶段查询预算\n\n| 阶段 | 查询焦点 | 知识类型 |\n|------|----------|----------|\n| ANALYSE_PRODUCT | 业务知识 + 历史需求 | model, process, pitfall |\n| ANALYSE_TECH | 技术知识 + 归档索引 | decision, guideline(avoid), pitfall |\n| ARCHITECT | 架构模式 + 实体关系 | decision, model |\n| IMPLEMENT | 编码实践 + 团队约定 | guideline, pitfall |\n| BUILD_VERIFY | 反模式库 | pitfall, guideline(avoid) |\n\n限制查询预算防止上下文膨胀——精准消费而非贪婪读取。\n\n### 6.3 冷启动导入 /flow-import\n\n3 Agent 管道：@doc-collector（多源收集）→ @codebase-profiler（代码画像，60 次搜索预算）→ @knowledge-builder（知识标准化，4 维基线 + ≤13 条条目）\n\n---\n\n## 七、知识的按需消费：三级索引 + 查询预算\n\n### 7.1 从\"推送\"到\"主动查询\"\n\n传统做法启动时推送一堆知识 → 信息过载 + 不精准。新设计：Agent 通过三级渐进式索引主动按需查阅。\n\n### 7.2 三级渐进式索引（借鉴 Karpathy LLM Wiki Pattern）\n\n| 层级 | 文件 | 大小 | 作用 |\n|------|------|------|------|\n| Layer A | knowledge-catalog.md | ~50 行 | 全景目录：知识库有什么 |\n| Layer B | 各目录 catalog.md | ~100-300 行 | 分类清单：每条一行摘要 |\n| Layer C | TK-*.md / BK-*.md | ~50-200 行 | 完整条目：详细内容 |\n\n查询流程：~50 行了解全貌 → ~300 行定位 → 按需 50-200 行深读。对比一次性推送（5000-10000 行），上下文效率提升一个数量级。\n\n### 7.3 知识引用追踪闭环\n\nAgent 输出记录 knowledgeReferences → ARCHIVE 阶段批量更新 evidence.last_referenced → 自动驱动成熟度提升/衰减。\n\n---\n\n## 八、突破人机交互瓶颈：随时随地保障工作流流转\n\n### 8.1 问题：Harness 工作流的\"在场依赖\"\n\n传统 Agent 假设人在工位随时响应。现实：一天真正能操控 Agent 的时间可能不到 4 小时。\n\n### 8.2 解法：远程操控 + 跨设备接管\n\n引入 Hapi 内网版：手机远程接管开发机上的 AI 编程会话。\n\n| 能力 | 说明 | 意义 |\n|------|------|------|\n| 跨设备会话接管 | 手机/平板/电脑均可 | 工作流不因设备切换中断 |\n| 24 小时待机 | Agent 持续运行 | 7×24 流转 |\n| PWA 原生体验 | 安装桌面像原生 App | 降低门槛 |\n| 多助手切换 | 支持 Codebuddy/Codex/Gemini | 适配不同引擎 |\n| 自主模式 | YOLO 模式自主执行 | 减少人工确认 |\n\n### 8.3 与知识沉淀闭环的结合\n\n暂停不会丢数据（文件系统即状态机），但暂停过久导致：交付周期拉长、知识沉淀时效性下降、碎片时间浪费。远程操控让碎片时间推动工作流更紧凑走完全流程。\n\n### 8.4 工程启示\n\n好的 Harness 不仅设计\"Agent 怎么跑\"，更要设计\"人怎么随时参与\"：状态持久化、断点恢复、异步审批、通知触达。\n\n---\n\n## 九、落地经验与思考\n\n### 9.1 冷启动挑战\n\n多源收集（Git/TAPD/iWiki/本地/口述）+ 渐进导入（初始 draft）+ 断点恢复（import-state.json）。\n\n### 9.2 Lint 机制\n\n| 检查项 | 处理 |\n|--------|------|\n| 索引不一致 | 自动修复 |\n| 孤儿条目 | 降级 draft |\n| 矛盾检测 | 标记，maintainer 裁决 |\n| 过时（6 月未引用的 draft） | 自动归档 |\n| 重复/相似 | 标记合并候选 |\n| 成熟度衰减 | 按规则自动降级 |\n\n每 10 个工作流自动触发，或 /knowledge lint 手动触发。\n\n### 9.3 Big Model vs Big Harness\n\n知识工程投入是确定性回报（每条 proven 知识所有后续工作流受益），模型能力提升是概率性回报。两者不是非此即彼，知识架构应对模型提升保持开放。\n\n### 9.4 从\"文件即状态\"到\"知识即资产\"\n\n所有知识以 Markdown 文件存在（无数据库、无独立平台）：可见性、可版本化（Git）、可迁移性、IDE 原生（.codebuddy/ 零配置）。\n\n---\n\n## 十、总结与展望\n\n核心实践：\n- 五层存储 × 五种类型 × 三级成熟度 → 清晰组织\n- 独立 Git 仓库 + 三种角色 + 自动冲突解决 → 团队共享\n- INIT 注入 → 按需查询 → ARCHIVE 提取 → 自动受益\n- 三级渐进式索引 + 查询预算 → 精准消费\n- 自动衰减 + Lint + 引用追踪 → 保持健康\n- 远程操控 + 跨设备 + 异步审批 → 7×24 流转\n\n未来方向：语义检索增强、跨团队知识联邦、知识质量自动评估、全异步工作流。\n\n> **核心信念：Skill、Agent、工具链会随模型迭代更新，但领域知识是永恒的。**_", "n4": "# Skill Factory：三天手搓面向Harness设计的技能工厂（附AI coding实践）\n\n## 摘要\n<!-- AI 待填充 -->\n\n## 关键要点\n<!-- AI 待填充 -->\n\n## 原文内容\n\n附录：三种模式对比\n\n| 维度 | 模式一：人工编写 | 模式二：对话生成 | 模式三：SkillFactory |\n|---|---|---|---|\n| 核心逻辑 | 人脑驱动，依赖个人经验 | 对话驱动，依赖 Prompt 与上下文窗口 | 流程驱动，标准化流水线 + TDD |\n| 生产效率 | 低（天/周） | 高 | 高 |\n| 代码质量 | 波动大，风格不统一 | 随机性强，缺乏异常处理/类型提示 | 标准化高，下限有保证 |\n| 测试验证 | 依赖人工，无自动化闭环 | 无自动化闭环 | **自动化闭环，先有测试再生成，自动回归验证** |\n| 多方案探索 | 单线程，推翻重来成本高 | 串行迭代，难并行对比 | **多路并行竞优，3 种策略择优录用** |\n| 工程化程度 | 格式规范易出错 | 缺乏鲁棒性与安全规范 | 可注入测试逻辑，达到生产级交付 |\n| 知识复用 | 通用逻辑重复造轮子 | 对话记录难共享 | 自动识别重复模块，建议公共库化 |\n| 核心缺陷 | 效率瓶颈 + 质量黑盒 | 不可控 + 缺乏工程验证 | 初期搭建成本高 |", "n5": "# 深度解析LLM Wiki - Obsidian-Wiki - GBrain：Agent时代知识的“自组织”与“自进化”\n\n## 摘要\n<!-- AI 待填充 -->\n\n## 关键要点\n<!-- AI 待填充 -->\n\n## 原文内容\n\n阿里妹导读\n\n\n\n\n本文是「项目深度解析」系列的第4篇，系列文章为《深度解析OpenClaw》、《深度解析Claude Code》、《深度解析Hermes Agent》。（文章内容基于作者个人技术实践与独立思考，旨在分享经验，仅代表个人观点。）\n\n背景\n\n不知不觉，本文已经是深度解析系列的第四篇了。上一篇解析文章《深度解析 Hermes Agent 如何实现“自进化”及其 Prompt / Context / Harness 的设计实践》在发布后，引发了许多同学的讨论和关注。大家关注的焦点非常集中，主要围绕在“自进化”这个概念，包括“Skill 的自动沉淀”以及“RL（强化学习）训练”这两个核心维度上。\n\n其实，关于RL训练这一块，我在之前的文章里有提到，官方也明确说过，这更多是面向AI研究人员或者算法同学所设计的。如果你的目标是在某个特定领域的垂直任务，或者在特定的 Benchmark 上追求极致的性能效果，那么通过 RL 进行深度训练，确实是让模型突破瓶颈、获得更好效果的有效路径。但对于大多数工程落地场景而言，这种方式的门槛和成本都相对较高。因此，除了RL这条“重资产”路线外，另一种更轻量、更具普适性的方式，就是通过“Skill”的机制来实现 Agent 的自进化。\n\n然而，仅仅是通过Skill自动更新来解决 Agent 的“自进化”，其实还是有点不够的，也有很多人反映真正在用 Hermes Agent 的时候，也没感觉到明显的变聪明，或者看到自动沉淀的比较好的 Skill。这是因为，自动沉淀 Skill 的机制很多时候还是取决于模型自己的判断和决策，这种判断和决策的触发时机和可控性相对就比较低了。因此，通过人给予Agent更多的“知识”来提升 Agent 的能力，甚至存放知识的这个“知识库”如果能“自动梳理”、“自动组织”、“自动更新”甚至“自动进化”，那就更好了，从而就能推动 Agent 的不断“自进化”。\n\n所以，今天的这个深度解析文章就特殊一点，我不按照之前的结构去分析Prompt、Context、Harness这些维度了，我将会从 Knowledge Engineering（知识工程）的角度展开，但知识的效果也是影响Prompt、Context、Harness 非常重要的一部分，并且也是我们的主线话题“如何构建一个好的Agent”中非常重要但提及较少的一个部分。\n\n从“知识堆积”到“结构化记忆”\n\n前段时间，Andrej Karpathy（OpenAI联合创始人）开源了一个名为“LLM-Wiki”的项目[1]，核心其是就一个 Markdown文件，目标是指导大模型Agent进行知识的更新与结构化，整个过程如下图所示[2]。这个项目的本质，其实是解决了一个长期困扰我们的痛点：如何让 Agent 自动将非结构化的资料转化为 “AI能理解”、“有结构”的知识库。另外，今天还会介绍一个项目叫做“Gbrain”[3]，它是由 Y Combinator 总裁兼 CEO Garry Tan 构建的，一个思想和 LLM-Wiki 类似但更工程化一点的知识库项目。\n\n这背后折射出的，是人类在知识管理上的天然短板。人类其实非常擅长“无脑堆积”知识——看到好的文章就收藏，遇到有用的文档就保存（此刻，可以打开看下你的网页收藏夹、各类APP的收藏夹，以及混乱的电脑桌面文件，是不是有很多已经“落灰”很久了，哈哈哈~）。这说明人类很不擅长“组织”知识。要把这些零散的信息梳理成体系化的结构，不仅耗时耗力，更因为缺乏统一的整理标准而变得很困难，容易拖延，拖着拖着就算了。无论是从个人层面看，收藏信息、文件是真的杂乱；还是从企业层面看，以我在阿里云售后做智能客服相关算法多年的经验，企业级知识库的维护成本更是非常之高，这主要体现在两个维度：\n\n时效性与动态维护。知识是有生命周期的，它会随着产品迭代、业务变更而过时或失效。如何精准识别并剔除失效知识，同时无缝接入新知识，本身就是一个巨大的挑战。\n\n组织结构的复杂性。知识该如何分类？以我们阿里云的服务领域来看，是按产品维度？问题场景维度？还是按关键词维度？比如，“镜像”主要集中在ECS、轻量应用服务器这些产品，而OpenClaw的相关知识就可能横跨多个产品线，简单的树状层级结构很难刻画这种复杂的网状关系。这种多维度的交叉关联，使得人工构建和维护一个完美的类似知识图谱之类的方案几乎成为不可能完成的任务。\n\n而在 AI 时代，尤其是对于 Agent 而言，知识的质量直接决定了效果的上限。正如我在前文中说过的，Context 不仅仅包含当前的对话指令和历史记录，更核心的组成部分是外部注入的知识。这里的“知识”是一个广义的概念，它主要包含经验性知识，也就是完成特定任务所需的策略、步骤和隐性经验；事实性知识，比如领域内的客观信息、文档、FAQ 等静态数据。\n\n以 AI Coding 场景为例，当我让 Agent 去写代码时，我期望它遵循的不仅仅是一个语法正确的结果，而是一套完整的“编码习惯”。比如：我喜欢用什么样的命名规范、注释风格？是应该先设计接口再实现细节，还是先跑通 Demo 再重构？优先使用哪些成熟的库或框架？写完代码后，是否自动进行单元测试或静态检查？\n\n这些隐性的、带有个人色彩的经验法则，其实就是典型的经验性知识。在 Hermes Agent 或 OpenClaw 的体系中，我们将这类经验封装为 Skill。Skill 本质上是一种结构化的经验沉淀，它告诉 Agent “在这个特定场景下，应该按照什么步骤、用什么工具、遵循什么标准去行动”。\n\n另一类事实性知识，就比较通俗易懂了。比如：某个概念、术语的定义是什么？某个报错原理背后的机制是怎样的？针对某类常见问题的最佳实践解决方案有哪些？甚至是网上最新的技术博客摘要。这些信息构成了 Agent 回答问题的基础素材。\n\n如果说 Prompt Engineering 是在教模型“完成什么样的任务”，那么 Knowledge Engineering（知识工程）就是在教模型“应该知道什么”以及“如何运用已知信息”。Karpathy 的 LLM-Wiki 思路之所以具有突破性，是因为它突破了传统 RAG “每次查询从头检索”的局限。通过 Schema 文件指导 LLM 主动维护结构化的 Markdown Wiki，它将原始资料“编译”为带有交叉引用、矛盾标注的持久化知识体。\n\n在这种设计下，知识不再是静态的死水，而是随着使用持续累积、增厚的活体，避免了重复推导带来的算力浪费。在这个新范式下，人类的角色发生了转变：我们只需专注于“提问题”和“堆知识”，而将繁琐的维护工作交给大模型。再配合上 Obsidian 这类知识维护的 IDE，Agent 就成为了那个不知疲倦的知识管理助手，可以自动完成知识的清洗、去重与结构化整合。\n\n大家在使用各类 Agent 工具的过程中，尤其是在“养虾🦞”（OpenClaw）的时候，大家会深刻体会到这 Skill 的重要性。但是，这里存在一个明显的痛点：Skill 的编写是有门槛的。 虽然市面上有很多教程教你怎么写出一个高效的 Prompt 或 Skill，但这依然需要开发者对业务逻辑有深刻的理解，并且要花费大量时间去调试和优化指令。对于普通用户而言，手动将隐性经验转化为显性的、机器可执行的 Skill，成本依然很高。\n\n这正是 Hermes Agent 引入“自进化”机制的价值所在——它试图通过自动化生成的方式，降低这一门槛。Agent 不再仅仅被动地接收人类编写的 Skill，而是能够在交互过程中，自动从历史对话、成功/失败的案例中提取模式，自动生成或优化新的 Skill。这种从“人工编写 Skill”到“Agent 自动生成 Skill”的转变，才是实现真正意义上“知识自进化”的关键一步。这个自动化生成 Skill的过程呢，这种其实也是一种也是一种自动化沉淀知识的能力。\n\nSkillify：渐进式披露式的“知识形态”\n\n无论是Andrej Karpathy 的 LLM Wiki，还是Garry Tan 的 GBrain。这两个项目在某种程度上都对 “Skill” 这个概念进行了泛化。\n\n传统意义上的 Skill，往往被固化为一个特定的 SKILL.md 文件或指令集，大模型读取它来掌握某项特定技能。但 LLM Wiki 和 GBrain 的核心创新在于：它们将 Skill 泛化为一种知识组织形态。 在这种范式下，Skill 不再局限于某种固定格式，它可以是任何 Markdown 文件、文档片段甚至是零散的笔记。关键在于，通过定义清晰的元数据（Metadata）或 Schema，描述清楚“在什么场景下应该调用哪些文件”，从而实现知识的渐进式披露（Progressive Disclosure）。\n\nGBrain 的创始人 Garry Tan 甚至使用了一个词叫“Skillify”，也有的论文里使用的词是 “Skillfully”，whatever，这两个词都挺形象的，指的就是去写 Skill 或者像 Skill 一样去组织和加载知识。这种机制允许 各类 Agent 接收各类文件、文本、链接，然后自动将其“编译”并归档到一个统一的个人知识库中。你可以把这个知识库想象成一个巨大的、结构化的 “Skill 包”，它不仅包含事实性知识、经验性知识，还可以容纳你的长期记忆、个人喜好、过往经历等所有碎片化信息。\n\n这就好比拥有一个私人的 AI 助理，它帮你把杂乱无章的桌面文件、散落的笔记，按照 AI 可理解的方式分门别类地管理起来。你无需关心底层的存储细节，只需负责“投喂”资料，Agent 负责整理、索引和持久化。当下次遇到相关问题时，它能直接从“缓存”中提取已内化的知识，而不是重新去搜索。这种理念不仅适用于个人知识管理，对企业级知识库的建设同样具有极高的参考价值。\n\n我回顾一下阿里云智能客服的发展历程，其实知识体系的演进大致也经历了三个阶段，这也折射出当前技术范式的变化。第一个就是“传统智能知识库时代”，从2016~2022年，早期的智能客服基本上就是面向搜索引擎的知识库。知识必须由人工进行严格的分类、打标和归档，形成树状或标签体系。检索时，系统通过关键词匹配召回相关条目。这种方式非常高度依赖人工维护成本，且灵活性比较差，难以应对长尾问题。\n\n到了后面就是2023年，随着大模型的兴起，进入到了“RAG时代”，RAG成为主流技术。核心逻辑就是是“前置小模型检索 + 后置大模型生成”。但是，我在之前的文章《Agent / Skills / Teams架构演进过程及技术选型之道》里提到过，虽然RAG解决了海量知识的存储和召回问题，但存在几个问题：\n\n模型能力断层：前置的检索模型通常比较小，语义理解能力有限，容易漏召或误召关键信息，导致后端大模型“无米之炊”。\n\n搜索独立性：每次交互都是独立的检索过程。即使上一次成功找到了答案，下一次面对相似问题时，仍需重新搜索。这不仅浪费算力，更带来了结果的不确定性，导致“上次搜得准，下次未必准”。\n\n知识未沉淀：为了解决这些问题，在 Agent 时代出现了Agentic RAG，虽然可以通过让大模型反复优化搜索关键词来提升召回率，但这本质上是在用昂贵的推理成本去弥补检索能力的不足，并且且依然无法解决“知识未沉淀”的问题。\n\n在第三个阶段“Agent时代”，知识的组织再次发生变化。相比于RAG，LLM Wiki 和 GBrain 的核心优势就在于“一次学习，永久可用”：\n\n消除重复搜索：当新知识被录入并结构化后，它就成为了 Agent 内部知识库的一部分。下次遇到类似问题，Agent 直接读取已整理的知识，无需再次触发外部检索，极大地提升了稳定性和响应速度。\n\n全链路大模型参与：从知识的解析、结构化到最终的调用，主要由大模型主导。大模型像阅读一本书的目录一样，根据上下文动态决定加载哪部分知识（就是渐进式披露），避免了小模型检索带来的语义偏差。\n\n知识的累积效应：每一次交互都在丰富知识库，Agent 越用越聪明，形成了真正的“飞轮效应”。\n\n简而言之，如果说 RAG 是让大模型“带着书本进考场”，那么 Skillify 则是让大模型“把书读透并记成整理后的笔记”。前者依赖临场发挥、现找资料，后者依赖深厚积累、精准定位。对于追求高稳定性、高准确率的复杂 Agent 场景而言，构建这种基于渐进式披露的持久化知识库，或许是现阶段比单纯优化 RAG 检索策略更本质的解法。\n\nLLM Wiki：三层架构的知识闭环\n\n核心思路捋清楚账号，接下来，我们先深入看一下 Karpathy 提出的 LLM Wiki。他本身就是一个 llm-wiki.md 文件，具体内容我放进来，大家可以仔细看一下：\n\nllm-wiki.md\n\n# LLM Wiki\n\n\nA pattern for building personal knowledge bases using LLMs.\n\n\nThis is an idea file, it is designed to be copy pasted to your own LLM Agent (e.g. OpenAI Codex, Claude Code, OpenCode / Pi, or etc.). Its goal is to communicate the high level idea, but your agent will build out the specifics in collaboration with you.\n\n\n## The core idea\n\n\nMost people's experience with LLMs and documents looks like RAG: you upload a collection of files, the LLM retrieves relevant chunks at query time, and generates an answer. This works, but the LLM is rediscovering knowledge from scratch on every question. There's no accumulation. Ask a subtle question that requires synthesizing five documents, and the LLM has to find and piece together the relevant fragments every time. Nothing is built up. NotebookLM, ChatGPT file uploads, and most RAG systems work this way.\n\n\nThe idea here is different. Instead of just retrieving from raw documents at query time, the LLM **incrementally builds and maintains a persistent wiki** — a structured, interlinked collection of markdown files that sits between you and the raw sources. When you add a new source, the LLM doesn't just index it for later retrieval. It reads it, extracts the key information, and integrates it into the existing wiki — updating entity pages, revising topic summaries, noting where new data contradicts old claims, strengthening or challenging the evolving synthesis. The knowledge is compiled once and then *kept current*, not re-derived on every query.\n\n\nThis is the key difference: **the wiki is a persistent, compounding artifact.** The cross-references are already there. The contradictions have already been flagged. The synthesis already reflects everything you've read. The wiki keeps getting richer with every source you add and every question you ask.\n\n\nYou never (or rarely) write the wiki yourself — the LLM writes and maintains all of it. You're in charge of sourcing, exploration, and asking the right questions. The LLM does all the grunt work — the summarizing, cross-referencing, filing, and bookkeeping that makes a knowledge base actually useful over time. In practice, I have the LLM agent open on one side and Obsidian open on the other. The LLM makes edits based on our conversation, and I browse the results in real time — following links, checking the graph view, reading the updated pages. Obsidian is the IDE; the LLM is the programmer; the wiki is the codebase.\n\n\nThis can apply to a lot of different contexts. A few examples:\n\n\n- **Personal**: tracking your own goals, health, psychology, self-improvement — filing journal entries, articles, podcast notes, and building up a structured picture of your\n\n\n_（原文过长，仅显示前8000字。完整内容见 .claw/raw/深度解析LLM Wiki - Obsidian-Wiki - GBrain：Agent时代知识的“自组织”与“自进化”/content.raw.txt）_", "n6": "# 让AI自己做增长：基于OPC和Harness思想的自主增长系统探索\n\n# 让 AI 自己做增长：基于OPC和Harness思想的自主增长系统探索\n\n## 摘要\n高德地图PC站团队借鉴OPC（一人公司）理念和Harness Engineering思想，构建了多Agent自主增长系统。系统从发现增长机会、生成提案、编写PRD到代码实现、部署上线全流程零人工干预。以\"路书\"功能验证，连续运行4小时实现完整应用，主流程无P0 Bug。文章详细阐述了多Agent架构设计、长任务状态机、上下文污染解决方案、独立评估体系、Benchmark构建及三轮优化闭环。\n\n## 关键要点\n\n### 核心理念\n- OPC（一人公司）：AI Agent独立自主完成从需求到上线的全流程，一人监护多个并行任务\n- Harness Engineering：围绕AI Agent设计约束机制、反馈回路、工作流控制和持续改进循环\n- Anthropic实践参考：Planner→Generator→Evaluator三层架构，Evaluator配备Playwright MCP\n\n### 多Agent架构\n- Orchestrator：总控调度，监听和派发任务状态\n- Planner拆分：product_agent（PRD）、design_agent（UI/UX）、arch_agent（技术架构）\n- Builder拆分：testcase_agent（测试用例）、builder_agent（功能实现）\n- Memory系统：文件形式记录日志和流转，上游产出自动成为下游输入\n- 每次任务启动新SubAgent：避免上下文污染\n\n### 长任务保障\n- 状态机：DISPATCHED → ACKED → RUNNING → SUCCEEDED/FAILED\n- 心跳监控+超时恢复+条件门禁+失败分类处理\n\n### 评估独立性\n- 评审与生成分离、零信任验证、零Broken Feature\n- 6个独立评审Agent覆盖提案/PRD/契约/测试/实现/前端设计\n\n### Benchmark与评分\n- 元评估：评Evaluator评得准不准\n- 两层：code snippets + full_runtime\n- 三层评审：代码质量→静态质量→动态运行质量（快速失败优先）\n- 三轮优化：64.5→67.5→83.4，精确匹配25%→42%→78%\n\n### 踩坑经验\n- 环境/SDK/组件面向AI工具化，skill接入后成功率从10-20%→接近100%\n- 端到端自动化工程量被严重低估\n- 线上部署保留人工确认，小步快跑每次只解决一个点\n- 长链路1-3次循环修P0\n\n### 未来方向\n- 数据集覆盖更多Agent的元评估，自建bad/good case+标准答案", "n7": "# 都是 AI Coding，为什么 Java 体验差了一个量级？五条方法论帮你构建自己的 Harness 环境\n\n## 摘要\n<!-- AI 待填充 -->\n\n## 关键要点\n<!-- AI 待填充 -->\n\n## 原文内容\n\n1. 体验差距到底在哪\n\n在依赖比较轻的项目里（比如前端、CLI 工具、纯本地的 Python 脚本），AI Coding 的体验是这样的：\n编辑代码 → 本地运行 → 测试验证 → AI 读取结果 → 自动修复 → 再次验证 → ...\n\n整个循环在本地完成，不需要人盯着。你甚至可以用上 autoresearch 的思想，和 AI 说：「帮我持续优化迭代这个功能，排查并修复bug，至少10轮」，AI Agent 就可以自己迭代几十轮，直到功能跑通。\n\n但 Java 微服务项目里，这个闭环基本是断的。\n\n这周让 AI 给一个 Agent 应用加一个新的 Tool 实现，逻辑不复杂，大概 150 行代码。AI 写完之后很自信地说\"已完成\"，但它没有任何办法验证自己写的东西能不能跑。因为这个项目依赖 OSS、远程沙箱、HSF 一整套云端基础设施，本地 mvn spring-boot:run 直接启动失败。\n\n于是进入了经典循环：我把代码推到预发，等 5 分钟部署完成，手动触发一次调用，发现 NPE，截图贴回给 AI，AI 改了两行，我再推预发，再等 5 分钟……三轮下来半小时过去了，改的只是一个参数注入顺序的问题。\n\n如果是一个本地能跑的项目，AI 自己跑一下测试就能发现这个错误，整个修复可能 30 秒就结束了。同样的模型、同样的 Prompt，差距不在 AI 能力，在如何构建 AI 友好的工程环境，即 Harness Engineering。\n\n2. 问题的本质\n\n这个体验差距不是偶然的，根源在微服务时代的技术架构。\n\n通常 Java 项目都重度依赖云端微服务基础设施：HSF 做服务调用、TDDL 做数据库路由、Diamond/Switch 做配置下发、MetaQ 做消息队列。一个看起来很简单的 @Autowired，背后可能牵着一整套分布式基础设施。这些东西在云端跑得很好，但在本地全部不可用。\n\n说白了，微服务架构天然不 AI 友好。AI Coding Agent 需要一个能在本地跑起来的环境来验证自己的输出，但微服务架构把运行时依赖全部推到了云端。项目在本地跑不起来，AI 就没办法自主验证，只能靠人去推预发、看结果、再反馈。\n\n于是就出现了一个很常见的工作流：\n\n本地 Vibe Coding 开发\n  → 推预发部署\n    → 人工在预发环境验证结果\n      → 人工把验证结果反馈给 AI\n        → AI 继续改\n          → 再次推预发 → 再次人工验证 → ...\n\n人在每个环节都是阻塞点。跟那些本地能直接跑的项目里 AI 能自己迭代几十轮比起来，Java 微服务项目里 AI 每做一步都得等人。\n\n最近社区关于 Harness Engineering 的讨论很多，大家聊的焦点通常在 CLAUDE.md 怎么写、lint 规则怎么配、验证脚本怎么跑。但对于 Java 微服务项目，还有一个更基础的问题：项目在本地能跑起来吗？ CLAUDE.md 写得再好，AI 连代码能不能编译通过都验证不了，后面的一切都是空谈。\n\n这篇文章聊的就是这个问题：怎么让 Java 微服务项目的本地环境变得 AI 友好，让 AI 拥有自主验证的能力。做法来自一个 Agent 应用的实际改造，算是抛砖引玉。\n\n3. 三条改造原则\n\n我在这次改造中总结出三条原则，后面逐个展开。\n\n3.1 依赖倒置，接口先行\n\n上层逻辑依赖抽象接口，不依赖具体实现。云端和本地只是接口的不同实现。\n\n这是经典的依赖倒置（DIP），但在本地 Harness 的场景下有了实际的意义：它决定了你的系统能不能在本地跑起来。\n\n拿我的实际改造举例。线上环境中，Agent 的文件系统（AgentFs）基于 OSS 对象存储，命令执行走远程沙箱（Sandbox），两者通过 OSS Mount 共享文件系统。这套架构在云端跑得好好的，但本地完全不可用，没有 OSS 服务，也没有远程沙箱。\n\n改造前的依赖关系：\n\nFilesystemService → OssStorageAdapter (具体类，直接调 OSS SDK)\nAgentWorkspace → SandboxCommandExecutor (具体类，调远程沙箱 API)\n\n上层直接依赖了具体的云端实现，想在本地跑就得把整个 OSS 和 Sandbox 搬过来。不现实。\n\n改造后，我抽了一个 StorageAdapter 接口，把上传、下载、判断存在、删除、列举这些操作统一定义好。线上的 OSS 实现加一行 implements StorageAdapter，本地新写一个 LocalStorageAdapter，用 java.nio.file 把逻辑 key 映射到本地路径。工厂类在创建文件系统时，检测到有本地参数就走本地实现，否则走 OSS 实现。\n\nStorageAdapter (接口)\n  ├── OssStorageAdapter (线上，走 OSS SDK)\n  └── LocalStorageAdapter (本地，走 java.nio.file)\nCommandExecutor (接口)\n  ├── SandboxCommandExecutor (线上，调远程沙箱 API)\n  └── LocalCommandExecutor (本地，ProcessBuilder + bash -c)\n\n上层所有用到文件操作和命令执行的代码完全不用改。它们只依赖接口，不关心底层是 OSS 还是本地文件系统。切换运行环境就是换一个接口实现，不用重写上层逻辑。\n\n3.2 零侵入，Profile 隔离\n\n本地改造不能让线上代码路径多走一行额外的代码。\n\n这条容易被忽视。很多团队做本地化适配时，会在主流程里加 if (isLocal) 分支，线上代码路径变复杂了，出问题的风险也跟着上去。\n\n我的做法是严格的零侵入：\n\nSpring Profile 隔离：本地专属的 Bean 通过 @Profile(\"local\") 装配，线上专属的通过 @Profile(\"!local\") 守卫。两套配置编译期就彼此不可见。\n\n@Configuration\n@Profile(\"local\")\npublic class LocalRepositoryConfig {\n    @Bean\n    CommandExecutor localCommandExecutor() { ... }\n    @Bean(\"localFsBasePath\")\n    String localFsBasePath() { ... }\n    // 用 AtomicLong 替代 TDDL GroupSequence\n    @Bean(\"sessionSequence\")\n    Sequence sessionSequence() { return new LocalSequence(); }\n}\n\n同时在本地启动入口通过 @ComponentScan 的正则过滤，把线上专属的包（远程沙箱、OpenTelemetry 观测等）整个排除掉，不用在每个类上加条件注解。\n\n@Nullable 参数注入：可选依赖标 @Nullable，不存在时 Spring 注入 null，不用写 @ConditionalOnBean。\n\npublic AgentRunner(@Nullable @Qualifier(\"localFsBasePath\") String localFsBasePath, ...) {\n    // 线上环境：localFsBasePath = null，走 OSS 路径\n    // 本地环境：localFsBasePath = \"/tmp/agentfs\"，走本地路径\n}\n\n条件守卫：运行时通过 null 检查决定走哪条路径。localFsBasePath 不为空就走本地，ossClient 不为空就走线上，逻辑非常简单。\n\n最终效果按侵入性分级：\n\n侵入级别\n\n\t\n\n改动类型\n\n\t\n\n示例\n\n\n\n\n零侵入\n\n\t\n\n新建文件\n\n\t\n\n新接口、新的本地实现类\n\n\n\n\n极低\n\n\t\n\n加一行声明\n\n\t\n\n线上实现类加 implements 接口\n\n\n\n\n低\n\n\t\n\n类型上提\n\n\t\n\n字段类型从实现类改为接口\n\n\n\n\n中等\n\n\t\n\n新增可选参数\n\n\t\n\n构造器加可选的本地路径参数（原有构造器不动）\n\n线上代码路径中，这些新增代码全部被跳过：null 检查不通过、Profile 不匹配、接口多态自然走原有实现。一个检验标准：删掉所有本地相关代码后，线上行为完全不变。\n\n3.3 工具 AI 化：CLI 优先\n\nAI Agent 的能力边界 = 它能调用的工具的边界。GUI 对 AI 不可见，CLI 才是 AI 能用的东西。\n\nJava 生态有大量运维和管理工具，但大多是 Web 控制台：Switch 管理台、Diamond 配置中心、HSF 服务治理台。人用着方便，但 AI Coding Agent 完全用不了。\n\n我的做法是用 CLI 桥接企业内部系统：\n\n# 通过 mw-cli 查询 Diamond 运行时配置值\nmw diamond get --unit online --data-id application.properties --group DEFAULT_GROUP\n# 通过 mw-cli 查询 HSF 服务地址\nmw hsf address --unit daily --app my-application\n\n这些命令的输出是结构化文本，AI 直接就能解析。改造过程中，我写了一个 scripts/fetch-switch-config.sh，用 mw-cli 从预发 Diamond 拉 Switch 配置，解析成 properties 格式写到本地：\n\n# fetch-switch-config.sh 核心逻辑\nmw diamond get idealab-agent-runtime asp-switch --env staging --unit pre -o json\n# → 解析 JSON，写入 switch-config-local.properties\n# → switch.modelApiKey=xxx\n# → switch.defaultTimeoutMs=60000\n# → switch.maxReactIterations=10\n\nAI 也能直接跑这个脚本来同步最新的线上配置，不用人工登录管理台复制粘贴。\n\n我还通过 Skill 把这些 CLI 能力注册到 AI Agent 的工具箱里，让 AI 需要的时候自己调用。\n\n工具 AI 化的优先级：\n\n优先级\n\n\t\n\n工具形态\n\n\t\n\nAI 可用性\n\n\t\n\n示例\n\n\n\n\n1\n\n\t\n\nCLI\n\n\t\n\n直接可用\n\n\t\n\nmw-cli, mvn, git, arthas\n\n\n\n\n2\n\n\t\n\nMCP Server\n\n\t\n\n协议适配\n\n\t\n\n数据库查询、监控数据\n\n\n\n\n3\n\n\t\n\nSkill / Tool\n\n\t\n\n自定义封装\n\n\t\n\n配置查询、服务诊断\n\n\n\n\n4\n\n\t\n\nGUI\n\n\t\n\n不可用\n\n\t\n\nWeb 管理台、IDE 插件\n\n4. 实践案例：从\"推预发验证\"到\"本地闭环\"\n\n4.1 改造前\n\n这个 Agent 应用是一个 AI Agent 运行时平台，核心能力之一是让 AI Agent 可以操作文件（ReadFile/WriteFile）和执行命令（Bash）。\n\n线上架构：\n\n文件操作：AgentFs → OSS 对象存储\n\n命令执行：远程 Sandbox（容器沙箱）\n\n文件共享：Sandbox 通过 OSS Mount 挂载 Agent 的 OSS 存储桶\n\n本地开发时：没有 OSS、没有 Sandbox、没有 OSS Mount。Agent 的 ReadFile 写到 OSS 里的文件，Bash 在本地根本看不到。文件系统是割裂的，没法用。\n\n4.2 改造方案\n\n核心思路：一个接口，两套实现，Profile 条件装配。工厂类根据参数自动选择实现，上层完全无感。\n\n改造后，本地 @Profile(\"local\") 激活时：\n\n文件系统工厂检测到本地参数，自动创建 LocalStorageAdapter，文件存到 /tmp/agentfs/{sessionId}/...\n\nBash 走 LocalCommandExecutor，用 ProcessBuilder 在本机执行 bash -c 命令，工作目录指向同一个本地路径\n\nReadFile/WriteFile 和 Bash 看到的是同一套文件，闭环打通了\n\n除了文件系统和命令执行，还有一整套配套改造（详见附录）：H2 替代 TDDL 数据源，AtomicLong 替代分布式 Sequence，本地 Switch 配置文件替代 Switch Center，ComponentScan 排除线上专属的 sandbox 和 observation 包。最终效果是一个完全自包含的本地运行环境，不依赖任何远程基础设施。\n\n4.3 改造效果\n\n对比项\n\n\t\n\n改造前\n\n\t\n\n改造后\n\n\n\n\n文件操作验证\n\n\t\n\n推预发，通过 OSS 控制台查看\n\n\t\n\n本地直接 ls 查看\n\n\n\n\nBash 执行验证\n\n\t\n\n推预发，登录沙箱查看\n\n\t\n\n本地 Terminal 直接看\n\n\n\n\nAI 自主验证\n\n\t\n\n做不到\n\n\t\n\nReadFile → 验证 WriteFile 结果\n\n\n\n\n单次迭代耗时\n\n\t\n\n5-10 分钟（含部署等待）\n\n\t\n\n秒级\n\n\n\n\nAI 自主修复轮数\n\n\t\n\n0（每轮都要人工介入）\n\n\t\n\n平均 3-5 轮后自行收敛\n\n改造前后的核心差异：一个完整的 bug fix 流程，改造前需要 3-4 轮人工推预发验证、总耗时 30 分钟以上；改造后 AI 在本地自主迭代，通常 2 分钟内收敛，人只需要最后 review 一下结果。\n\n5. 配合 Harness Engineering 落地\n\n本地 Harness 跑起来之后，还需要配合 Context Engineering 才能让 AI 真正高效地工作。具体来说，有几件事需要做：\n\n5.1 CLAUDE.md：给 AI 一张地图\n\n项目根目录放一份 CLAUDE.md，告诉 AI 这个项目是什么、怎么构建、怎么测试、本地环境怎么启动。不需要写得很长，100 行以内，重点是让 AI 在拿到任务后能快速定位该看哪些代码、该跑什么命令。\n\n# 项目简介\nAI Agent 运行时平台，支持 ReadFile/WriteFile/Bash 等 Tool。\n# 本地开发\n- 启动：`mvn spring-boot:run -Dspring.profiles.active=local`\n- 测试：`mvn test`\n- 本地文件系统根目录：`/tmp/agentfs/`\n# 架构约束\n- 上层模块只依赖接口，不依赖具体实现类\n- 本地专属代码通过 @Profile(\"local\") 隔离\n- 新增本地适配不得修改线上代码路径\n\n5.2 验证脚本：让 AI 自己检查\n\nChecklist 是给人看的，AI 需要的是可执行的验证命令。我在项目里加了一个 scripts/verify-local.sh：\n\n#!/bin/bash\n# 本地 Harness 验证脚本：AI 可以直接跑这个来确认本地环境是否正常\nset -e\necho \"=== 1. 编译检查 ===\"\nmvn compile -q -Dspring.profiles.active=local\necho \"=== 2. 单元测试 ===\"\nmvn test -q 2>&1 | tail -5\necho \"=== 3. 本地启动检查 ===\"\ntimeout 30 mvn spring-boot:run -Dspring.profiles.active=local &\nPID=$!\nsleep 15\nif curl -s http://localhost:8080/actuator/health | grep -q \"UP\"; then\n    echo \"✓ 本地启动成功，health check 通过\"\nelse\n    echo \"✗ 本地启动失败\"\n    exit 1\nfi\nkill $PID 2>/dev/null\necho \"=== 4. 文件系统闭环检查 ===\"\n# 验证 ReadFile/WriteFile 和 Bash 看到的是同一套文件\nTEST_FILE=\"/tmp/agentfs/test-$(date +%s)/verify.txt\"\nmkdir -p $(dirname $TEST_FILE)\necho \"hello\" > $TEST_FILE\nif [ -f \"$TEST_FILE\" ] && [ \"$(cat $TEST_FILE)\" = \"hello\" ]; then\n    echo \"✓ 文件系统闭环正常\"\nelse\n    echo \"✗ 文件系统闭环异常\"\n    exit 1\nfi\nrm -rf $(dirname $TEST_FILE)\necho \"=== 全部通过 ===\"\n\nAI 改完代码后跑一次 bash scripts/verify-local.sh，不需要人工介入就能知道本地环境是不是还能正常工作。这比 Checklist 有用得多。\n\n6. Harness Engineering Checklist\n\n这份清单可以用来评估任意 Java 项目的本地 AI Coding 友好度，也可以当改造的行动指引。\n\n项目能否在本地通过一条命令启动？（mvn spring-boot:run 或等价命令）\n\n启动是否依赖外部中间件？如果是，有没有本地替代？（H2 替代 MySQL、内存队列替代 MetaQ 等）\n\n外部依赖是否通过接口抽象？能否通过 Profile 切换实现？\n\n可测试性\n\nAI 能否在本地运行测试并读取结果？（mvn test 输出是否结构化）\n\n核心逻辑是否有单元测试？AI 改完代码后能否立即验证？\n\n端到端验证是否需要人工？能否通过 API 调用 + 断言自动完成？\n\n可观测性\n\n日志是否结构化（JSON 格式）、可 grep？\n\n是否集成了 CLI 化的 JVM 诊断工具？（Arthas、jstack 脚本等）\n\nAI 是否能通过命令行获取运行时状态？（health check endpoint、metrics 输出等）\n\n工具 AI 化\n\n团队使用的运维工具是否有 CLI 入口？\n\n配置管理（Switch/Diamond）是否可通过命令行查询？\n\n是否有 MCP Server 或 Skill 将内部系统能力暴露给 AI Agent？\n\n隔离性\n\n本地改造是否通过 @Profile 隔离？\n\n本地代码是否对线上代码路径零侵入？\n\n删除所有本地相关代码后，线上行为是否完全不变？\n\n7. 方法论总结\n\n回过头来看这次改造，有几个可以复用的方法论。\n\n第一，找到最小可运行子集。 不需要把所有线上能力都搬到本地，只需要找到核\n\n\n_（原文过长，仅显示前8000字。完整内容见 .claw/raw/都是 AI Coding，为什么 Java 体验差了一个量级？五条方法论帮你构建自己的 Harness 环境/content.raw.txt）_\n\n## 关联\n- [Skill Factory：三天手搓面向Harness设计的技能工厂（附AI coding实践）](ai-engineering/Skill Factory：三天手搓面向Harness设计的技能工厂（附AI coding实践）.md)\n- [AgentScope Java 1.1.0 Harness Framework 详解](ai-engineering/AgentScope Java Harness Framework 详解.md)", "n8": "# 必需字段\nname: dingtalk-webhook-skill\ndescription: 通过钉钉自定义机器人 Webhook 发送群消息。当用户提到钉钉、机器人、webhook、群消息、通知、dingtalk、发消息时触发。\n# 可选字段（按需添加）\nlicense: MIT\ncompatibility:\n  - claude-3.5+\n  - aone-copilot\nallowed-tools: Read Bash WebFetch\nmetadata:\n  author: zefei.szf\n  version: 1.2.0\n  category: communication\n  tags: [dingtalk, webhook, notification]\n---\n字段\n\t\n是否必需\n\t\n说明\n\nname\t必需\t\nSkill 的唯一标识符。最长 64 字符，仅允许小写字母/数字/连字符，如 dingtalk-webhook-skill\n\ndescription\t必需\t\nSkill 的触发描述。这是 Agent 判断是否使用该 Skill 的核心依据，最长 1024 字符，务必写清「做什么」和「什么时候用」\n\nlicense\t\n可选\n\t\n许可证名称或对 LICENSE 文件的引用，如 MIT、Apache-2.0\n\ncompatibility\t\n可选\n\t\n适配的 Agent / 平台 / 模型范围，如 claude-3.5+、aone-copilot\n\nallowed-tools\t\n可选\n\t\n预授权工具白名单，空格分隔，如 Read Edit Bash\n\nmetadata\t\n可选\n\t\n任意 KV 元数据，常用子字段：author（作者）、version（语义化版本，如 1.0.0）、category（分类）、tags（标签数组）\n\n📖 字段规范来源：以上字段遵循 Anthropic Agent Skills[4] v0.1 开源规范（业界事实标准），同时兼容 skills.sh / ClawHub / Aone Skills 等主流平台。其中 name 和 description 是所有平台都强制要求的核心字段，其余按需添加。\n\n⚠️ description 是触发的关键\n\nAgent 目前倾向于「少触发」而非「多触发」。因此，description 要写得稍微「积极」一些，多列举可能的触发关键词和场景。例如：\n\n❌ 不够好：发送钉钉消息的技能\n✅ 推荐写法：通过钉钉自定义机器人 Webhook 发送群消息。当用户提到钉钉、机器人、webhook、群消息、通知、dingtalk、发消息时触发。\nMarkdown 正文\n\n正文就是你给 Agent 的「操作手册」，通常包含以下部分：\n\n1.快速开始 / 使用示例 — 给出 1-2 个典型的用户输入示例，让 Agent 快速理解使用场景\n2.参数列表 — 用表格清晰列出每个参数的名称、是否必需、默认值和说明\n3.工作流 / 执行步骤— Skill 的核心，用分步骤的方式描述 Agent 应该如何执行任务\n4.错误处理 — 列出常见的错误场景和对应的处理方式\n5.附加资源引用 — 如果有 scripts/ 或 references/，明确指出何时、如何使用\n\n3.4 Skill规范与最佳实践\n\n创作思维\n\n在动笔写 SKILL.md 之前，先按下面的四步思考，能让你的 Skill 结构更清晰、触发更精准、行为更可控：\n\n1.确定触发时机：先想清楚\"用户在什么场景会用到\"，把关键词、口令、上下文条件梳理出来 —— 这直接决定description 怎么写。\n2.确定输入与输出：明确 Skill 需要哪些参数、最终交付什么产物，避免后续流程发散。\n3.确定大致流程：把核心步骤、调用的工具、依赖的外部资源用 3-7 步串起来，先骨架后细节。\n4.补充细节与规则：补全边界情况、错误处理、约束条件，并准备好示例或模板，让 Agent 在执行时有据可依。\n\n💡 顺序很重要：很多人一上来就写第 3 步流程，结果触发不准（缺第 1 步）或者交付不稳（缺第 2 步）。务必从「触发时机」开始倒推。\n\n写作原则\n\n📝 用祈使句 — 直接告诉 Agent 该做什么，而不是描述性地说明\n\n✅ 从用户输入中提取 webhook_url 参数\n❌ Agent 应该从用户输入中提取参数\n\n🎯 解释「为什么」 — 与其堆砌 MUST / SHOULD，不如解释原因，让 Agent 理解意图后自主决策\n\n✅ 使用 --headed 模式打开浏览器，因为会议室平台会检测 headless 环境并拒绝访问\n\n📏 控制篇幅 — SKILL.md 正文建议控制在 500 行以内。超出时，将详细内容拆分到 references/ 目录，在正文中用链接引用\n\n🌍 保持通用性 — Skill 应该是通用的，不要过度绑定到特定的示例。用理论指导代替硬编码的特例\n\ndescription 编写技巧\n\ndescription 是 Skill 被触发的唯一入口，它的质量直接决定了 Skill 的可用性。\n\n\n\n\t\n写法\n\t\n问题\n\n\n❌\n\t帮助用户处理工单\t\n太笼统，Agent 不知道什么时候该触发\n\n\n✅\n\t工单批量预处理技能。当用户提到\"处理所有工单\"、\"排查所有工单\"、\"批量处理工单\"、\"我的工单有多少\"、\"帮我看看工单\"时，立即触发此技能。\t\n关键词丰富，触发场景明确\n资源组织模式\n\n当 Skill 需要支持多个变体（如不同框架、不同平台）时，推荐按变体组织 references：\n\ncloud-deploy/\n├── SKILL.md              ← 通用工作流 + 变体选择逻辑\n└── references/\n    ├── aliyun.md         ← 阿里云部署指南\n    ├── aws.md            ← AWS 部署指南\n    └── azure.md          ← Azure 部署指南\n\nAgent 会根据用户的实际需求，只读取相关的 reference 文件，避免无关信息占用上下文。\n\n脚本编写建议\n零依赖优先：脚本尽量使用语言标准库，避免需要额外安装依赖\n多语言 fallback：提供 Python → Node.js → Shell 的降级方案，适配不同环境\n结构化输出：脚本输出 JSON 到 stdout，方便 Agent 解析结果\n明确退出码：成功返回 0，失败返回非 0，让 Agent 能判断执行结果\n\n💡 脚本的妙用\n\nscripts/ 目录下的脚本可以不加载到上下文就直接执行。这意味着你可以把复杂的、确定性的操作（如签名计算、数据格式转换）封装成脚本，Agent 直接调用即可，既省上下文又保证准确性。\n\n3.5 一个完整的Skill示例\n\n让我们来看一个真实的 Skill 示例 —— 一个用于发送钉钉群消息的 Skill：\n\n---\nname: dingtalk-notifier\nversion: 1.0.0\ndescription: 通过钉钉机器人发送群消息通知。当用户提到\"发钉钉消息\"、\n  \"钉钉通知\"、\"群消息\"、\"webhook\"时触发。\n---\n# 钉钉群消息通知\n通过钉钉自定义机器人 Webhook 发送群消息。\n## 快速开始\n用户输入示例：\n> 帮我发一条钉钉消息到部署群，内容是：v2.1.0 已发布上线\n## 参数列表\n| 参数 | 必需 | 默认值 | 说明 |\n|------|------|--------|------|\n| webhook_url | 是 | - | 机器人的 Webhook 地址 |\n| message | 是 | - | 消息正文 |\n| msg_type | 否 | markdown | 消息类型 |\n## 工作流\n### Step 1：解析参数\n从用户输入中提取 webhook_url、message 等参数。\n缺少必要参数时，友好地向用户询问。\n### Step 2：发送消息\n执行 scripts/send.py 发送消息：\npython3 scripts/send.py --url URL --msg \"消息内容\"\n### Step 3：确认结果\n检查返回的 errcode，向用户报告发送结果。\n## 错误处理\n| 错误 | 处理方式 |\n|------|---------|\n| token 无效 | 提示用户检查 Webhook 地址 |\n| 签名错误 | 提示用户检查加签密钥 |\n\n🎉 恭喜！ 如果你跟到了这里，你已经掌握了创建 Skill 的核心知识。接下来我们来看看如何让你的 Skill 写得更好。\n\n四、十分钟学会管理我的 Skill（可以不看）\n\n一个 Skill 从诞生到被广泛使用，需要经历完整的生命周期：发布、更新、安装。\n\n4.1 管理流程总览\n\n✏️ 编写  →  🧪 测试  →  📤 发布  →  📥 安装  →  🔄 更新  →  📊 反馈迭代\n\n4.2 发布到 Aone 开放平台\n\n为什么选择 Aone 平台发布 Skill\n\n🔗 打通 Code 平台、关联 Git 仓库，开发体验友好：创建 Skill 时自动生成对应的 Git 仓库，本地 push 即可触发发布，告别\"压 zip → 上传 → 替换\"的繁琐流程，写代码与发版无缝衔接。\n🏷️ 自动版本管理，无需手动\n\n\n## 五、阶段性总结：三大现实痛点（推荐看）\n\n### 痛点 1：跨平台、跨模型的一致性\n\n写完 Skill 换个平台跑不了，往往是三类「污染」：\n\n| 污染类型 | 例子 | 解法 |\n|------|------|------|\n| 平台语法污染 | `@task`、`/review`、`!search` 换平台就不认识 | 正文全部用纯 Markdown，不加平台专属语法 |\n| 工具命名污染 | Claude 叫 `Bash`，Codex 叫 `Shell`，Cursor 叫 `Terminal` | 用能力描述代替工具名：\"执行 Shell 命令\" |\n| 路径环境污染 | 硬编码 `~/.claude/skills/`，换个 Agent 就无效 | 路径不写死，用相对路径或变量 |\n\n💡 **「三纯净」原则：** 正文纯文本、工具用能力描述、路径不写死\n- 平台专属指令用 HTML 注释隔离：`<!-- platform: aone-copilot -->`\n- 发布时提供「三检测」检查清单：语法检测 / 工具名检测 / 路径检测\n\n### 痛点 2：版本管理 & 更新分发\n\nSkill 没有 npm/pip 那样的成熟包管理体系，只要 push 就发版，缺少 CR、灰度、评测。\n\n解法：把 Skill 当「代码包」而不仅是「文档」\n- **发布严肃化：** CR、CI 校验、eval 门禁、灰度、SPE 安全扫描\n- **自动更新：** 显式版本号、平台自动升级、CHANGELOG、弃用告警、版本锁定\n\n### 痛点 3：开发与调试效率\n\n当前「改一行 → 重启会话 → 复测」，一次迭代 5-10 分钟。\n\n解法：\n- Hot Reload / Symlink 软链\n- 本地开发循环模板\n- Eval-Driven Dev：用固定用例跑评测，不用每次手动对话\n- 双窗口对照调试\n\n💡 **进阶——让 Skill 自我进化：**\n1. 执行 → 自动打分（Binary Eval）\n2. 失败 → Reflection Agent 分析原因\n3. 提炼修复 → 自动 git commit\n\n穷版方案：SKILL.md 末尾加 meta-instruction + 执行日志脚本 + skill-creator eval\n\n---\n\n## 六、其实你只要一个 Skill / 一站式开发助手发布（必看）\n\n### 核心观点\n\nAI 时代技术井喷，不可能什么都学。每次花几周学新工具，学会了可能已过时。\n\n**人的价值不在学了多少工具，而在 Experience（体验）和 Judgment（判断）。**\n\n如果所有开发的终点都是「用 Skill 沉淀」，那**只需要一个 Skill 就够了**——用它帮你生成其他所有 Skill。\n\n### skill-dev-aio：一站式 Skill 开发助手\n\n| 能力 | 说明 |\n|------|------|\n| 快速创建 | 一句话描述需求，自动生成完整 SKILL.md + 脚本 |\n| 一键发布 | 自动走完 Aone 发布流水线 |\n| 优化 / 评测 | 内置 eval 用例，自动跑测并给出改进建议 |\n| 巡检 / 查询 | 查询已安装 Skill 的状态、版本、更新 |\n| 跨平台迁移 | 一键将 Skill 适配到其他 Agent 平台 |\n| 批量更新 | 一键升级所有已安装 Skill |\n\n> **总结：** 你只需要学会「用 Skill 创造 Skill」，剩下的 Skill 替你学、替你记、替你跑。", "n9": "> **状态**: ✅ 已总结 | **总结时间**: 2026-05-16", "n10": "## 历史需求经验复用：全链路闭环\n\n核心洞察：同仓库需求有连贯性。需求时间距离与代码相关性呈衰减关系：\n- 较近需求（60% 代码可直接参考）\n- 中等距离需求（35% 架构决策可借鉴）\n- 较远需求（15% 底层模式可参考）\n\n策略：优先召回同仓库时间近的需求，而非跨仓库按关键词匹配。\n\n全链路数据打通：对话会话 → SPEC 技术方案 → 代码分支 → 需求 → 代码变更。系统天然知道每个需求对应哪些对话、生了什么 SPEC、改了哪些代码。\n\n---\n\n## 云端统一下发：配置跟着业务走\n\n问题：中后台仓库极其分散（一个业务域上百个页面仓库），手动配置不现实。\n\n现有方案局限：\n| 方案 | 痛点 |\n|------|------|\n| 按人/团队下发 | 跨业务域开发时配置不匹配 |\n| 按脚手架模板 | 存量项目覆盖不到 |\n| 本地手动配置 | 新人上手难、更新不同步 |\n\n解法：通过 Git Group/Repo 自动匹配业务域 → 自动下发配置。三原则：仓库维度（配置跟仓库不跟人）、增量更新（保留用户自定义）、自动写入（零手动）。\n\n效果：初次配置从 30 分钟到 0 分钟，规则变更从逐一通知到云端修改自动同步。\n\n---\n\n## 多来源知识汇聚\n\n三类知识来源协同：\n\n| 来源 | 内容 | 维护方式 |\n|------|------|----------|\n| 平台基建 | 组件文档、API 文档、平台规范 | 对接平台自动同步 |\n| 业务语义 | 业务规范、编码约定、架构决策 | 知识库管理端人工维护 |\n| 踩坑经验 | 调试记录、边缘场景、高频问答 | AI 信号驱动自动捕获 |\n\n业务域隔离：每个业务域独立 agent.md、mcp.json、skills 目录，物理隔离确保知识不混淆。\n\n---\n\n## 整体落地效果\n\n试点 2 个月效果：\n- 后端全栈交付 40+ 个前端需求\n- AI 辅助编码占比 78%（从 0 起步）\n- 周反馈问题从 10+ 降到 1-2 个\n- 人均生产效率提升 35%\n\n关键指标：\n| 指标 | 数值 |\n|------|------|\n| 自动沉淀经验数 | 128 条/月 |\n| 知识置信度 | 0.92（平均） |\n| 高置信度占比 | 83% |\n| 知识召回率 | 85% |\n| pitfall 召回率 | 88%（最高） |\n| 问题解决时间 | 30-60min → 1-2min |\n\n---\n\n## 总结与未来方向\n\n核心理念：「数据飞轮」——使用越多 → 数据越丰富 → AI 越精准 → 更多人使用。\n\n未来方向：\n1. 向量检索升级（Embedding + LanceDB）\n2. 跨业务域知识迁移\n3. 知识质量自动迭代（低召回条目自动标记/下线）\n4. 从\"辅助编码\"走向\"辅助决策\"（需求评审、架构选型、风险评估）\n_", "n11": "# 台积电商业模式与护城河分析\n\n## 摘要\n台积电是全球最大的专业晶圆代工（Foundry），不做芯片设计，只负责把别人的设计做成真实芯片。全球晶圆代工约60%份额，服务500+客户，覆盖90%顶级芯片设计公司。\n\n## 关键数据\n- **2024年营收**：约2.89万亿新台币\n- **2024年净利**：3,746亿新台币\n- **市占率**：约60%（全球晶圆代工）\n- **客户数**：500+\n- **毛利率**：长期≥55%\n\n## 商业模式\n- **定位**：全球最大的专业晶圆代工（Foundry）\n- **模式**：开创\"无工厂模式\"——设计（Fabless）交给客户，制造交给台积电\n- **类比**：像\"云计算里的 AWS\"，把复杂昂贵的\"制造基础设施\"抽象成服务\n\n## 产品结构\n\n### 工艺平台（Process Nodes）\n- **先进制程**：N3家族（3nm），N2（2nm计划）→ 高性能/高能效\n- **主流制程**：5nm/7nm/16nm/28nm → 性价比与成熟生态\n- **特殊工艺**：高压/射频/车规/嵌入式存储等 → 细分场景\n\n### 制造与质量\n- 良率管理、缺陷分析、产能规划、稼动率优化\n- 设备/材料/光刻（EUV/DUV）协同\n\n### 先进封装与系统整合（SIPs）\n- **CoWoS**（高带宽封装）/ **SoIC**（3D堆叠）\n- **InFO**（轻薄移动封装）\n\n### 设计支持生态（DFx）\n- PDK/参考流程/与EDA/IP伙伴的协作\n- DFM/DFT（为制造与测试优化的设计方法）\n\n## 护城河\n\n### 1. 技术迭代飞轮\n- 先进工艺节点持续领先（3nm量产、2nm规划）\n- 研发与量产形成闭环\n\n### 2. 规模与良率\n- 越大规模，越能摊薄成本、积累缺陷数据库、提升良率\n- 形成正反馈\n\n### 3. 客户黏性与信任\n- 顶级客户的联合开发（JDP）与保密协作\n- 切入后替代难度极高\n\n### 4. 供应链掌控力\n- 对EUV设备、上游材料、封装/测试的系统级整合能力\n\n### 5. 生态标准\n- PDK/DFM/EDA流程像\"行业公路规则\"，黏住上下游\n\n## 关键术语\n- **Foundry**：纯制造，不做设计\n- **Tape-out**：设计定版送厂流片\n- **Yield（良率）**：合格芯片占比，决定成本与交付\n- **PPA**：Performance/Power/Area 的三角取舍\n- **EUV**：极紫外光刻，先进节点必需\n- **CoWoS / SoIC**：先进封装与3D堆叠，AI算力模块关键\n- **NRE**：一次性工程费用，如掩模/导入成本\n\n## 投资信号\n- 台积电=\"全球算力与终端的制造底座\"\n- 平台化的先进工艺 + 规模化的制造体系 + 生态协同\n- 把极端复杂的芯片制造变成可复用、可预测、可交付的\"服务产品\"", "n12": "# 台积电核心竞争力深度分析\n\n## 摘要\n台积电（TSMC）在芯片制造领域占据绝对领导地位，市场占有率稳定在约60%，最大竞争对手三星电子的市占率仅为11%。本文从商业模式、经营理念、技术积累、产能管理、生态建设、企业架构六个维度深入分析台积电的核心竞争力。\n\n## 关键要点\n\n### 1. 商业模式创新\n- 开创\"Fabless-Foundry\"垂直分工模式，仅制造芯片、不设计芯片\n- 让IC设计客户专注于设计和创新，扮演行业\"赋能者\"\n- 扶植大量有潜力的IC设计公司：高通、博通、英伟达、赛灵思、联发科、Marvell等\n\n### 2. 经营原则\n- **不与客竞争**：从不与客户竞争，确保利益协同\n- **密切服务客户**：CEO与前20-30名客户保持密切联络，为每家客户配备专职团队\n- 苹果A10起成为独家供应商，核心优势是客户信任\n\n### 3. 技术领先\n- 研发费用每年保持在公司净收入的8%以上\n- 坚持自主创新，多次引领技术创新（0.13微米、28纳米等关键节点）\n- 技术迭代稳扎稳打，遵循摩尔定律\n- 先进封装（InFO、CoWoS）成为AI服务器芯片主要封装技术\n- \"夜鹰计划\"：24小时不间断加速研发\n\n### 4. 产能管理\n- 制造重心集中在台湾（新竹、台中、台南），互为备用产能\n- 采取超大型晶圆厂（Giga Fab）群聚布局，形成\"产业聚落\"\n- 云端自动化统筹管理，跨厂合作提升产能利用率\n- **全球布局**：美国亚利桑那州（先进制程）、日本熊本（28纳米）、德国德雷斯顿（28/22纳米和16/12纳米）\n- N-1战略：境外工艺技术比台湾本地量产工艺低一代\n\n### 5. 生态系统\n- 开放创新平台（OIP）：联合EDA和IP公司形成\"虚拟IDM\"\n- 超过3,000名TSMC员工 + 100多家合作伙伴的10,000名员工\n- 43,000个技术文件和2,800个PDK\n\n### 6. 企业架构\n- 股权结构分散，前十大股东均为全球重量级投资机构\n- 董事会由世界级专业人士组成\n- 双首长平行领导模式（董事长刘德音 + CEO魏哲家）\n\n## 投资信号\n- 台积电在晶圆代工领域寡头地位稳固，技术领先优势明显\n- AI及高性能计算芯片对先进封装（CoWoS）需求日益提升\n- 全球产能布局分散地缘政治风险，但海外建厂成本高昂（美国高4-5倍）\n- 前十大客户中七家总部位于美国，贡献约60%收入", "n13": "# 曹德旺2025年度股东大会表态：\"大不了把美国工厂关掉\"\n\n## 摘要\n2026年4月21日，福耀玻璃2025年度股东大会上，78岁曹德旺针对美国关税问题强硬表态。福耀美国工厂累计投资超10亿美元，占全美30%市场份额，2025年营收79.17亿元，净利润8.84亿元。曹德旺强调企业经营以盈利为根本，绝不接受不合理政策导致持续亏损。\n\n## 关键数据\n- 美国工厂累计投资：超10亿美元\n- 美国市场份额：30%\n- 美国员工：超3000名\n- 2025年美国营收：79.17亿元（+25.43%）\n- 2025年美国净利润：8.84亿元（+40.91%）\n- 原材料本土化采购率：70%\n- 产能利用率：80%以上\n\n## 核心要点\n- 2026年美国对全球商品加征15%全域关税，汽车零部件延续高额关税\n- 曹德旺底线：企业经营以盈利为根本，不合理关税导致亏损则关厂\n- 美国工厂是福耀海外业务核心支柱，但非不可替代\n- 曹德旺高度评价儿子曹晖：\"干得比我强\"\n- 从父辈强硬守底线到新生代深耕技术，福耀完成平稳传承", "n14": "# 福耀玻璃2024年年报核心要点\n\n## 摘要\n福耀玻璃2024年营收392.52亿元（+18.37%），归母净利润74.98亿元（+33.20%），连续四年双增长，均创历史新高。分红46.98亿元，分红率62.65%。\n\n## 关键数据\n- 营收：392.52亿元（+18.37%）\n- 归母净利润：74.98亿元（+33.20%）\n- 扣非净利润：74.46亿元（+34.71%）\n- 汽车玻璃销量：155.87百万平方米（+11.21%）\n- 研发投入：16.78亿元（+19.58%）\n- 分红：46.98亿元（分红率62.65%）\n- 累计现金分红：333.34亿元\n- 员工总数：37,910人\n\n## 核心要点\n- 连续四年营收净利双增长，盈利质量高\n- 2024年资本开支54.81亿元，重点投向美国、合肥、福建等项目\n- 合肥、福清新项目合计投资约90亿元\n- 美国伊利诺伊汽车级浮法玻璃生产线增资4亿美元\n- 上市以来平均分红率62.59%，派息融资比4675.25%", "n15": "# 福耀玻璃2025年年报业绩概览\n\n## 摘要\n福耀玻璃2025年营收457.87亿元（+16.65%），归母净利润93.12亿元（+24.20%），连续四年双增长，均创历史新高。分红46.98亿元，分红率62.65%，累计分红超333亿元。\n\n## 关键数据\n- 营收：457.87亿元（+16.65%）\n- 归母净利润：93.12亿元（+24.20%）\n- 扣非净利润：——\n- 研发投入：19.13亿元（占营收4.18%）\n- 分红：46.98亿元（分红率62.65%）\n- 累计现金分红：333.34亿元\n- 员工总数：43,328人\n\n## 核心要点\n- 四年连续双增长，盈利质量高（利润主要来自主营业务）\n- 全球化布局加速：美国、安徽、福建等多地产能扩张\n- 研发投入持续加码，高附加值产品占比54.20%\n- 股东回报丰厚，派息融资比超46倍\n- 2024年资本开支约54.81亿元，重点投向美国、合肥、福建等项目", "n16": "# 福耀玻璃2025年度ESG报告解读\n\n## 摘要\n福耀玻璃2025年度ESG报告系统披露了环境、社会及治理领域的实践与绩效。报告基于双重重要性原则，识别出24个ESG议题，其中5个高财务重要性议题。公司设定2030年单位产值碳排放较2019年下降50%的目标。\n\n## 关键数据\n- 温室气体排放总量：6,104,918.13吨CO2当量\n- 汽车玻璃单位产值碳排放强度：0.24吨/万元（较2024年下降20%）\n- 光伏及余热发电装机规模：168.86MWp\n- 工业用水重复利用率：93.58%\n- 研发投入：191,308.22万元（占营收4.18%）\n- 高附加值产品营收占比：54.20%\n- 绿色创新产品营收占比：20.18%\n- 全年申请专利：932件，授权492件\n\n## 核心要点\n- 投资32.5亿元建设福清零碳智能工厂，预计2027年实现净零排放\n- 清洁技术投资实际投入39.54亿元，通过节能技改实现年节电851,000kWh\n- ESG评级提升有助于降低融资约束\n- 需注意范围三温室气体排放量大幅增加（统计范围扩大导致）\n- 包装材料使用总量增长近一倍，需持续跟踪减量化进展", "n17": "# 福耀玻璃2026年4月股价行情\n\n## 摘要\n截至2026年4月14日，福耀玻璃股价58.54元，总市值1527.74亿元。2025年全年营收457.87亿元（+16.65%），归母净利润93.12亿元（+24.20%）。A股上市后累计派现356.83亿元。\n\n## 关键数据\n- 股价：58.54元（+2.06%）\n- 总市值：1527.74亿元\n- 换手率：0.34%\n- 股东户数：11.79万户（较上期+21.31%）\n- 2025年营收：457.87亿元（+16.65%）\n- 2025年归母净利润：93.12亿元（+24.20%）\n- A股累计派现：356.83亿元\n- 近三年累计派现：137.01亿元\n\n## 核心要点\n- 主力资金净流入2003.91万元\n- 香港中央结算持股3.83亿股（减少1530.65万股）\n- 华泰柏瑞沪深300ETF持股2642.33万股（减少82.43万股）\n- 主营业务：汽车玻璃91.49%，浮法玻璃14.15%\n- 概念标签：证金持股、特斯拉概念、光伏概念", "n18": "# 福耀玻璃2026年Q1汇兑风险深度分析\n\n## 摘要\n2026年Q1福耀玻璃汇兑损益逆转是利润下滑的核心原因。2025Q1汇兑收益2.4亿元（欧元贬值贡献），2026Q1汇兑亏损4.4亿元（美元欧元双升值）。全年汇兑影响预计超6亿元，是2026年盈利的关键变量。\n\n## 关键数据\n- 2025Q1汇兑损益：收益2.4亿元\n- 2026Q1汇兑损益：亏损4.4亿元\n- 2026Q1人民币vs美元：升值1.3%\n- 2026Q1人民币vs欧元：升值3%\n- 2025年海外收入占比：46.3%\n- 2026H1汇兑影响预测：亏损超6亿元（同期收益6亿）\n- 2026全年汇兑影响预测：亏损超6亿元（同期收益3亿）\n\n## 核心要点\n- 汇兑损益是2026年Q1利润下滑15.7%的主因\n- 福耀外汇风险敞口不仅挂钩美元，还涉及较大比例欧元\n- 2025年Q1欧元贬值3.7%带来汇兑收益，2026年Q1欧元升值3%导致亏损\n- 全年盈利预计中个位数下降，若汇率稳定\n- 股价从高点74元回调至55元附近，静态PE约15.5倍\n- 股息率约3.86%，具备一定防御性", "n19": "# 福耀玻璃2026年一季报业绩分析\n\n## 摘要\n福耀玻璃2026年Q1营收104.13亿元（同比+5.08%），归母净利润17.12亿元（同比-15.68%）。利润下滑主因汇兑损益逆转：2025Q1汇兑收益2.4亿元，2026Q1汇兑亏损4.4亿元，单此一项影响盈利约6.8亿元。剔除汇兑影响后，主业经营基本平稳。\n\n## 关键数据\n- 营收：104.13亿元（+5.08%）\n- 归母净利润：17.12亿元（-15.68%）\n- 扣非净利润：16.43亿元（-17.32%）\n- 毛利率：37.38%\n- ROE：4.37%（同比-1.01pct）\n- 资产负债率：46.63%\n- 经营现金流：3.57亿元（-82.22%）\n- 摊薄每股收益：0.66元（-15.38%）\n\n## 核心要点\n- 汇兑损益是Q1利润下滑主因：人民币对欧元升值3%导致汇兑亏损4.4亿元\n- 汽车玻璃销量下滑3.7%，但单价提升约11%\n- 经营现金流大幅下降82%，需关注后续季度改善情况\n- 全年展望：若汇率稳定，全年盈利可能中个位数下降\n\n## 关联\n- [福耀玻璃2026年Q1汇兑风险深度分析](investing/福耀玻璃2026年Q1汇兑风险深度分析.md)", "n20": "source_url: https://stock.10jqka.com.cn/20260619/c677584845.shtml\nsource: 同花顺财经\npublished_or_observed: 2026-06-19\ncategory: investing\n---\n\n# 福耀玻璃6月18日两融数据：融资余额21.41亿元\n\n## 摘要\n同花顺 iFinD 数据显示，福耀玻璃（600660）6月18日获融资买入1726.14万元，融资偿还1952.22万元，融资余额21.41亿元，占流通市值2.14%，处于历史较高分位。融券方面，6月18日融券卖出1.40万股、融券偿还1.60万股，融券余额1429.57万元。综合两融余额21.55亿元，较前一日小幅下降0.12%。\n\n## 关键要点\n- 2026-06-18：融资买入额 1726.14 万元；融资偿还额 1952.22 万元；融资余额 21.4114 亿元。\n- 2026-06-17：融资买入额 1756.46 万元；融资偿还额 2736.69 万元；融资余额 21.4341 亿元。\n- 2026-06-16：融资买入额 4402.07 万元；融资偿还额 4013.31 万元；融资余额 21.5321 亿元。\n- 2026-06-18：两融余额 21.5544 亿元，较昨日减少约257.4万元。\n- 信号方向：短期杠杆资金边际降温，但仍处较高水平。\n\n## 投资视角\n短期两融余额仍在高位，但6月17日、6月18日连续小幅回落，说明短线杠杆资金边际热度下降。该信号更偏交易层面，不构成基本面变化。对于长期持仓，更应关注后续汽车玻璃需求、海外工厂利润率、汇率/能源成本和新产品渗透，而非单日两融波动。\n\n## 关联\n- [福耀玻璃6月18日收盘与资金流：主力净流出3531.39万元](investing/福耀玻璃6月18日收盘与资金流-主力净流出3531-39万元.md)", "n21": "source_url: https://stock.stockstar.com/RB2026061800037075.shtml\nsource: 证券之星\npublished_or_observed: 2026-06-18\ncategory: investing\n---\n\n# 福耀玻璃6月18日收盘与资金流：主力净流出3531.39万元\n\n## 摘要\n证券之星消息，截至2026年6月18日收盘，福耀玻璃（600660）报49.95元，下跌1.46%，换手率0.49%，成交量9.78万手，成交额4.91亿元。资金流向方面，主力资金净流出3531.39万元，占总成交额7.19%；游资资金净流入1302.91万元，占总成交额2.65%；散户资金净流入2228.48万元，占总成交额4.54%。\n\n## 关键要点\n- 收盘价：49.95 元，日跌幅 -1.46%。\n- 成交额：4.91 亿元；换手率：0.49%。\n- 主力资金净流出：3531.39 万元，占成交额 7.19%。\n- 游资资金净流入：1302.91 万元，占成交额 2.65%。\n- 散户资金净流入：2228.48 万元，占成交额 4.54%。\n- 文章引用2026年一季报：营收104.13亿元，同比增长5.08%；归母净利润17.12亿元，同比下降15.68%；毛利率37.38%。\n- 信号方向：交易资金偏弱，但未构成基本面恶化证据。\n\n## 投资视角\n6月18日资金面偏弱，表现为股价下跌叠加主力资金净流出。但单日资金流属于交易噪音，不能直接等同于公司基本面恶化。更有用的跟踪点是：Q2收入增速能否恢复、海外产能利润率是否修复、汇兑/财务费用压力是否缓解。\n\n## 关联\n- [福耀玻璃H股6月17日南向资金减持12.28万股](investing/福耀玻璃H股6月17日南向资金减持12-28万股.md)", "n22": "source_url: https://stock.stockstar.com/RB2026061800003048.shtml\nsource: 证券之星 / 香港交易所数据\npublished_or_observed: 2026-06-18\ncategory: investing\n---\n\n# 福耀玻璃H股6月17日南向资金减持12.28万股\n\n## 摘要\n证券之星援引香港交易所数据称，6月17日南向资金减持福耀玻璃（03606.HK）12.28万股。近5个交易日中，南向资金连续减持，累计净减持236.77万股；近20个交易日中有19天减持，累计净减持918.57万股。截至该数据时点，南向资金持有福耀玻璃H股8249.91万股，占公司已发行普通股的13.59%。\n\n## 关键要点\n- 2026-06-17：南向资金减持 12.28 万股。\n- 近5个交易日：累计净减持 236.77 万股。\n- 近20个交易日：19天减持，累计净减持 918.57 万股。\n- 南向持股：8249.91 万股，占已发行普通股 13.59%。\n- 信号方向：港股端短线资金偏谨慎，需观察是否延续。\n\n## 投资视角\n南向资金连续减持显示港股端短线资金偏谨慎，可能与H股估值、汇率、汽车链情绪或获利了结有关。该信号本身不代表经营质量变化，但会影响短期股价弹性。若南向持续减持同时叠加基本面数据走弱，才需要提高关注级别。", "n23": "# 福耀玻璃深度分析：\"汽车强国\"背后的\"卖铲人\"\n\n## 摘要\n福耀玻璃国内汽车玻璃市占率约70%，全球36%（第一）。文章深度分析了福耀的四大竞争壁垒：中国国运红利、柔性生产能力、垂直产业一体化、持续降本理念。2026年Q1业绩下滑主因汇兑损益逆转，全年盈利预计中个位数下降。\n\n## 关键数据\n- 国内汽车玻璃市占率：~70%\n- 全球汽车玻璃市占率：36%\n- 2025年营收：超450亿元\n- 2025年归母净利润：超90亿元\n- 2010-2025年营收复合增速：~11%\n- 2010-2025年净利润复合增速：~11%\n- 毛利率：37.3%（领先国际巨头10个百分点以上）\n\n## 核心要点\n- 四大护城河：中国国运红利、柔性生产、垂直一体化、持续降本\n- 柔性生产能力：常规规格换型仅需1小时，国际同行需3-5天\n- 垂直一体化：上游5个砂矿→6个浮法基地→17个汽玻基地\n- 2026年汇兑风险：美元+欧元双敞口，Q1汇兑亏损4.4亿元\n- 股价从高点74元回调至55元附近，静态PE约15.5倍\n- 股息率约3.86%（按60%分红率计算）", "n24": "# 福耀玻璃竞争壁垒与护城河分析\n\n## 摘要\n福耀玻璃的四大竞争壁垒：中国国运红利、柔性生产能力、垂直产业一体化、持续降本理念。国内市占率70%，全球36%，毛利率37.3%领先国际巨头10个百分点以上。\n\n## 关键数据\n- 国内市占率：~70%\n- 全球市占率：36%\n- 毛利率：37.3%\n- 常规规格换型时间：1小时（国际同行3-5天）\n- 产能布局：国内11个+海外2个，共13个综合性工厂\n- 产能规模：近5000万套\n- 原材料本土化采购率（美国）：70%\n\n## 核心要点\n- 中国国运红利：完善的汽车产业链、高素质产业工人、\"低成本、高品质、快交付\"\n- 柔性生产能力：适配新能源时代多品种、小批量、高频迭代需求\n- 垂直一体化：上游砂矿→浮法基地→汽玻基地，紧密产业集群\n- 持续降本：2008-2025年从\"减少物料损耗\"到\"精益五星管理模式\"\n- 全球四大巨头格局：福耀36%、旭硝子/圣戈班/板硝子各14%-16%\n- 新增产能：福清、合肥新增600万套产能爬坡中", "n25": "# 福耀玻璃雪球财务分析（2025Q1数据）\n\n## 摘要\n福耀玻璃2025Q1营收99.1亿元（+12.16%），净利润20.3亿元（+46.25%）。全球市占率约34%，国内约68%。公司面临汇兑风险、法律风险、原材料成本波动等挑战。\n\n## 关键数据\n- 2025Q1营收：99.1亿元（+12.16%）\n- 2025Q1净利润：20.3亿元（+46.25%）\n- 2024年营收：392.5亿元（+18.37%）\n- 2024年利润总额：89.91亿元（+33.87%）\n- 加权平均ROE：22.72%\n- 全球市占率：约34%\n- 国内市占率：约68%\n- 2024年研发投入：16.78亿元（占营收4.27%）\n- 国内外收入占比：国内53.90%，海外44.72%\n\n## 核心要点\n- 高毛利率和净利率，盈利能力和成本控制能力强\n- 全球市场占有率和品牌影响力稳固\n- 汇兑风险：销售回款以美元、欧元为主，汇率波动影响大\n- 法律风险：2023年美国俄亥俄州工厂遭国土安全部调查\n- 原材料成本波动：玻璃原片受国际市场价格波动影响", "n26": "# 腾讯控股投资者关系页面 - 2026年Q1财报与股价数据\n\n# 腾讯控股投资者关系页面\n\n## 摘要\n腾讯官方投资者关系页面，包含2026年第一季度财报、股价数据、投资者资料等核心信息。\n\n## 关键数据\n- 股票代码：0700.HK\n- 当前股价：HKD 590.5（-7.5，-1.25%）\n- 市值：5659.7万亿 HKD\n- 52周高点：614.0\n- 52周低点：316.8\n- 成交量：8.9万股\n\n## 2026年Q1财报\n- 财报发布日期：2026年5月13日\n- 财报链接：已发布\n- 业绩演示文稿：已发布\n- 网络直播回放：已提供\n\n## 投资者资料\n- 公司概览演示文稿（PDF）\n- 股东回报资料（PDF）\n- 历史运营指标（XLS）\n\n## 近期公告\n- 2026年5月29日：翌日披露报表\n- 2026年5月28日：翌日披露报表\n- 2026年5月27日：翌日披露报表（已发行股份变动及股份回购）\n\n## 财务报告\n- 2025年年报（PDF）\n- 2025年中期报告（PDF）\n- 2024年年报（PDF）\n- 2024年中期报告（PDF）\n- 2023年年报（PDF）\n- 2023年中期报告（PDF）\n\n## ESG\n- 环境、社会及管治报告\n- ESG评级信息\n\n## 分类\n- 类别：investing\n- 子类别：company-analysis\n- 导入时间：2026-05-31", "n27": "url: https://www.cls.cn/searchPage?keyword=%E8%85%BE%E8%AE%AF&type=all\nimported: 2026-05-27\ncategory: investing\n---\n\n# 腾讯控股最近7天投资相关信息汇总（截至2026-05-27）\n\n## 摘要\n截至2026年5月27日，腾讯控股（0700.HK）近期投资相关高价值信息包括：回购持续每日约5亿港元、自研沧海V2视频编解码芯片即将量产、微信小游戏变现收入同比增超20%、5月游戏版号获批、云/AI资本开支上行信号确认。南向资金短期净卖出约15.7亿港元，属资金面波动而非基本面信号。\n\n## 关键要点\n\n### 一、股东回报 — 回购持续\n- 5月27日：斥资5.01亿港元回购114.9万股，回购价433.6-442港元\n- 5月26日：斥资5.01亿港元回购股份\n- 5月21日、5月18日：均有\"已发行股份变动及股份购回\"公告\n- 回购节奏稳定在每日约5亿港元，年化回购约1200亿港元+，股东回报态度积极\n\n### 二、业务进展 — 三个高信号事件\n\n**1. 沧海V2自研芯片即将量产（5月27日，投资相关性：高）**\n- 沧海V2已成功点亮，编解码/极速高清/渲染三大能力全面升级\n- 2026年下半年全面提供线上服务\n- 沧海V1已在腾讯云+自有场景部署超10万片\n- 自研芯片降本路径清晰，视频编解码是腾讯云+内容业务基础设施，降本增效空间大\n\n**2. 微信小游戏变现收入同比增长超20%（5月27日，投资相关性：高）**\n- 2026年1-5月小游戏变现收入同比+20%+，流量主数量+20%\n- 小游戏商家预算同比+115%\n- 月活破5亿\n- 小游戏是微信生态高增长变现渠道，广告+内购双轮驱动，利润率高于传统游戏\n\n**3. 5月游戏版号获批，腾讯新游在列（5月26日，投资相关性：中）**\n- 5月共158款游戏获批，腾讯、网易新游在列\n- 版号常态化发放，游戏管线供给稳定\n\n### 三、资本开支/云需求信号\n- 香农芯创（5月26日）：预计2026年来自阿里、腾讯、字节跳动的收入有较大增长\n- 互联网大厂云/AI资本开支上行周期确认，腾讯云需求端受益\n\n### 四、AI生态扩展\n- 擎朗智能XMAN-L1机器人（5月26日）：接入豆包、腾讯等大模型\n- 腾讯混元大模型在机器人场景落地，属生态卡位，非核心收入贡献\n\n### 五、资金面\n- 南向资金5月26日净卖出腾讯约15.7亿港元，为当日卖出最多标的\n- 短期资金流出，可能与恒生科技板块整体调整有关\n\n### 六、行情与估值快照（5月27日收盘）\n- 股价：434.40 HKD（-1.05%）\n- 总市值：39,609亿港元\n- 市盈率(动)：~18.9x\n- 市净率：3.10x\n- 成交额：108.36亿港元\n\n### 投资相关性排序\n1. 回购持续（每日5亿港元级）— 股东回报纪律性强，对估值有支撑\n2. 沧海V2芯片量产 — 自研降本逻辑兑现，云业务毛利率改善预期\n3. 小游戏高增长（变现+20%+）— 微信生态变现深化，利润率高的增量收入\n4. 版号+云需求信号 — 游戏供给端稳定，云/AI资本开支上行\n5. 南向资金净卖出 — 短期波动，非基本面信号", "n28": "# 腾讯沧海V2视频编解码芯片下半年量产\n\n## 摘要\n腾讯自研视频编解码芯片沧海V2已完成点亮并进入量产周期，计划2026年下半年全面提供线上服务。在MSU硬件视频编码比赛中，沧海在各速度档位SSIM/PSNR/VMAF指标均排名第一，多项领先超30%。V2同时支持H.265和H.266，压缩率较V1大幅提升，单颗芯片编解码处理能力翻倍，内置GPU实现渲染与编码协同。\n\n## 关键要点\n- 沧海V2已完成点亮，2026年下半年量产上线；V1已在腾讯云部署超10万片\n- MSU大赛（视频编解码权威赛事）中沧海全赛道排名第一，多项指标领先超30%\n- V2同时支持H.265+H.266两种标准，H.265压缩率较V1提升超10%，H.266提升超30%\n- 单颗芯片编解码处理能力较V1翻倍，算力性价比进一步提升\n- V2内置GPU核心，渲染与编码在同一芯片协同（共享显存），压缩率再提升5%+，切中云游戏场景痛点\n- 沧海项目2019年启动，V1 2022年点亮、2023年量产，V2从点亮到量产周期明显压缩\n- 竞争格局：字节跳动四大芯片产品线（AI/CPU/DPU/VPU），快手凌川SL200面向视频直播（成本降40%）\n- 投资意义：自研芯片降本路径兑现，视频编解码是腾讯云+内容业务基础设施，带宽和算力成本有望持续下降", "n29": "url: https://mp.weixin.qq.com/s/sCmRKJjTpdB4k3145OzZMg\nimported: 2026-06-01\ncategory: programming\n---\n\n# 深入解析Chromium的 AI Coding 开发体系\n\n## 摘要\nChromium 是全球最大的开源 C++ 项目之一（3500万+ 行代码），在源码仓库中构建了一整套 AI Agent 基础设施。本文深入解析其 AI Policy、Prompts（四层分层提示词体系）、Skills（18+ 个可复用技能）、Knowledge Base（三层 Agentic RAG）、Eval（评估测试框架）和 Projects（大规模代码改造）六大核心机制，以及三者（Prompts + Knowledge + Skills）在实际开发中的协同工作方式。\n\n## 关键要点\n\n### 1. AI Policy：人类始终是最终责任人\n- 作者必须在发送 Review 前自行审查并理解所有代码\n- 无论是否使用 AI，作者必须声明代码为自己的原创作品\n- 如果 AI Agent 创建的 CL 或 Bug 收到了人类的反馈，必须由人类操作者亲自回复\n- 违规后果：提交不理解的代码 → 剥夺 Committer 权限，再犯 → 封禁账号\n\n### 2. Prompts：四层分层提示词体系\n```\n┌─────────────────────────────────────────────────┐\n│  第四层：Task Prompts（任务提示词）                 │\n│  一次性任务指令，如 /cr:gerrit/cl-description       │\n├─────────────────────────────────────────────────┤\n│  第三层：Templates（平台模板）                      │\n│  desktop.md / android.md / ios.md / rust.md     │\n├─────────────────────────────────────────────────┤\n│  第二层：common.md（完整工作流）                    │\n│  8 步标准编辑流程 + 知识库引用                      │\n├─────────────────────────────────────────────────┤\n│  第一层：common.minimal.md（核心指令）              │\n│  构建、测试、编码、JNI 等基础规范                    │\n└─────────────────────────────────────────────────┘\n```\n- 8 步标准工作流：深度理解 → 编写代码 → 编写测试 → 构建 → 修复编译错误 → 运行测试 → 修复测试错误 → 迭代\n- 维护机制：源文件是 `.tmpl.md`，通过 `process_prompts.py` 脚本自动生成 `.md`\n\n### 3. Skills：18+ 个按需激活的专业技能\n- Skills 是专家模块，与 Prompts（始终加载的通用指令）不同，Skills 是按需激活的\n- 包括：feature-flag-removal、fuzzing、histograms、cl-description、git-cl-helper、chromium-docs 等\n- 每个 Skill 包含完整的 checklist、代码模板、验证流程\n\n### 4. Knowledge Base：三层 Agentic RAG\n**核心理念：Consult, then Answer**\n- **第一层**：knowledge_base.md — 静态路由表（任务关键词 → 文档路径的 if-then 规则引擎）\n- **第二层**：chromium-docs Skill — 本地文档检索工具（2000+ md 文件索引，Python 脚本辅助 AI 定位文档）\n- **第三层**：MCP 扩展 — 外部知识源（blink-spec、build-information、depot-tools 等）\n\n**与传统 RAG 的对比**：\n| 维度 | 传统 RAG | Chromium 的 Agentic RAG |\n|:---|:---|:---|\n| 检索方式 | 用户 query → 向量检索 → 返回 chunks | AI 自主判断 → 按规则读取文件 → 按需搜索 |\n| 知识来源 | 预构建的向量数据库 | 源码树中的原始文档（实时读取） |\n| 路由机制 | 纯语义相似度 | 静态规则表 + 动态搜索 + MCP 外部查询 |\n| 更新方式 | 需要重新 embedding | 文档随代码同步更新，索引按需重建 |\n\n### 5. Eval：评估测试套件\n- 15+ 个评估用例（构建配置、测试生成、重构、修复测试、Fuzz 测试等）\n- Pass@K 机制：一个用例运行 N 次，只要 K 次通过就算成功\n- 隔离执行：每个测试在独立的 WorkDir 中运行（btrfs 快照）\n- CI 级基础设施：Swarming 分片并行、Docker 沙箱隔离、ResultDB 上报\n\n### 6. Projects：AI 驱动的大规模代码改造\n- **bedrock/modularize-chrome-browser**：将 `chrome/browser/` 拆分为独立模块（6 阶段流程，SKILL.md 长达 344 行）\n- **code-health/**：代码健康自动化治理框架（histogram-cleanup、lint-sync 等）\n- **modernization/**：代码现代化自动修复（AutoFixer 框架，最多 3 轮循环）\n\n### 三大机制的协同关系\n```\n                    ┌─────────────┐\n                    │  开发者需求   │\n                    └──────┬──────┘\n                           │\n                    ┌──────▼──────┐\n                    │   Prompts   │  ← 定义\"怎么做\"（8 步工作流）\n                    │ (工作流引擎) │\n                    └──────┬──────┘\n                           │\n              ┌────────────┼────────────┐\n              │            │            │\n       ┌──────▼──────┐ ┌──▼───┐ ┌──────▼──────┐\n       │  Knowledge  │ │Skills│ │    Task     │\n       │  (知识增强)  │ │(专业 │ │   Prompts   │\n       │             │ │ 技能)│ │  (快捷命令)  │\n       │ 告诉 AI     │ │告诉AI│ │  加速关键    │\n       │\"去哪找信息\" │ │\"如何 │ │   环节执行   │\n       │             │ │做特定│ │             │\n       │             │ │任务\" │ │             │\n       └─────────────┘ └──────┘ └─────────────┘\n```\n\n## 文档积累历史\n- Chromium 的文档从 **2015 年**开始积累，跨越 **11 年**，总计 **6445 次提交**\n- `agents/` 目录于 **2025 年 7 月 10 日**创建\n- `chromium-docs` 核心 Skill 于 **2026 年 1 月**由一位微软工程师提交"}, "types": ["Article", "pitfall"], "palette": {"Article": "#3b82f6", "Analysis": "#8b5cf6", "Synthesis": "#ec4899", "Reference": "#10b981", "Metric": "#f59e0b", "Playbook": "#ef4444", "Note": "#94a3b8"}};</script>
<script>
const B = window.BUNDLE;
const connected = B.edges.length > 0;
document.title = `知识图谱 — ${B.nodes.length} 节点`;

// ── Indexes ──
const nodeIdx = {}; B.nodes.forEach(n => nodeIdx[n.data.id] = n.data);
const backlinks = {}; B.edges.forEach(e => {(backlinks[e.data.target]||=[]).push(e.data.source)});

// ── Type chips ──
const p = B.palette;
const types = B.types;
let activeType = null;

const chipRow = document.getElementById("type-chips");
// "全部" chip
chipRow.querySelector("[data-all]").addEventListener("click", ()=>{
  activeType = null;
  chipRow.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  chipRow.querySelector("[data-all]").classList.add("active");
  applyFilters();
});
types.forEach(t => {
  const ch = document.createElement("span");
  ch.className = "chip"; ch.textContent = t;
  ch.style.setProperty("--chip-color", p[t]||"#94a3b8");
  ch.addEventListener("click", () => {
    if (activeType === t) { activeType = null; chipRow.querySelectorAll(".chip").forEach(c => c.classList.remove("active")); chipRow.querySelector("[data-all]").classList.add("active"); }
    else { activeType = t; chipRow.querySelectorAll(".chip").forEach(c => {c.classList.toggle("active", c.textContent===t||c.hasAttribute("data-all")&&t===null)}); }
    applyFilters();
  });
  chipRow.appendChild(ch);
});

// ── Layout (自适应：无边→grid，有边→cose) ──
const layoutSelect = document.getElementById("layout");
if (!connected) layoutSelect.value = "grid";

const cy = cytoscape({
  container: document.getElementById("graph"),
  elements: [...B.nodes, ...B.edges],
  style: [
    { selector:"node", style:{
      "background-color":"data(color)","label":"data(label)","color":"#0f172a",
      "font-size":9.5,"text-valign":"bottom","text-margin-y":3,"text-wrap":"wrap","text-max-width":100,
      "width":"data(size)","height":"data(size)","border-width":1,"border-color":"data(color)",
      "opacity":.92,"transition-property":"opacity","transition-duration":150,
    }},
    { selector:"node:selected", style:{"border-width":3,"border-color":"#f59e0b"} },
    { selector:"edge", style:{"width":1.5,"line-color":"#cbd5e1","target-arrow-color":"#cbd5e1","target-arrow-shape":"triangle","curve-style":"bezier","arrow-scale":.8} },
    { selector:".dim", style:{"opacity":.08} },
    { selector:".hidden", style:{"display":"none"} },
  ],
  layout: { name: connected?"cose":"grid", animate:false, padding:30, ...(connected?{}:{rows:Math.ceil(Math.sqrt(B.nodes.length))}) },
  wheelSensitivity: .2,
});

cy.on("tap","node",evt=>showDetail(evt.target.id()));
cy.on("tap",evt=>{if(evt.target===cy)clearSelection()});

// ── Search ──
let searchQ = "";
document.getElementById("search").addEventListener("input",e=>{
  searchQ = e.target.value.trim().toLowerCase();
  applyFilters();
});

// ── Layout ──
document.getElementById("layout").addEventListener("change",e=>{
  const name = e.target.value;
  const opts = { name, animate:false, padding:30 };
  if (name==="grid") opts.rows = Math.ceil(Math.sqrt(cy.nodes(":visible").length||1));
  cy.layout(opts).run();
});

document.getElementById("reset").addEventListener("click",()=>{cy.fit(null,30);clearSelection()});

// ── View toggle ──
document.querySelectorAll(".view-toggle button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".view-toggle button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const isGraph = btn.dataset.view === "graph";
    document.getElementById("graph").style.display = isGraph?"":"none";
    document.getElementById("table-view").classList.toggle("active",!isGraph);
    if (isGraph) { cy.resize(); cy.fit(null,30); }
  });
});

// ── Filters ──
function applyFilters(){
  cy.batch(()=>{
    cy.nodes().forEach(n=>{
      const d = n.data();
      let visible = true;
      if (activeType && d.type !== activeType) visible = false;
      if (searchQ) {
        const hay = (d.label||"").toLowerCase()+" "+d.id+" "+(d.tags||[]).join(" ").toLowerCase();
        if (!hay.includes(searchQ)) visible = false;
      }
      n.toggleClass("dim",!visible).toggleClass("hidden", false);
    });
    cy.edges().forEach(e=>{
      e.toggleClass("dim",e.source().hasClass("dim")||e.target().hasClass("dim"));
    });
  });
  // 更新计数
  const v = cy.nodes(":visible").filter(n=>!n.hasClass("dim")).length;
  document.getElementById("filter-count").textContent = v===B.nodes.length?"":`${v}/${B.nodes.length}`;
}

// ── Detail ──
function clearSelection(){
  cy.elements().unselect();
  document.getElementById("detail-empty").hidden = false;
  document.getElementById("detail-content").hidden = true;
}

function showDetail(nid){
  const d = nodeIdx[nid]; if(!d) return;
  cy.elements().unselect();
  const n = cy.getElementById(nid); if(n) n.select();

  document.getElementById("detail-empty").hidden = true;
  document.getElementById("detail-content").hidden = false;

  const badge = document.getElementById("detail-type");
  badge.textContent = d.data.type; badge.style.background = d.data.color;

  document.getElementById("detail-title").textContent = d.data.label;
  document.getElementById("detail-description").textContent = d.data.description||"—";
  document.getElementById("detail-resource").innerHTML = d.data.resource
    ? `<a href="${d.data.resource}" target="_blank" rel="noopener">${d.data.resource}</a>` : "—";
  document.getElementById("detail-tags").innerHTML = d.data.tags?.length
    ? d.data.tags.map(t=>`<span class="tag">${t}</span>`).join("") : "—";
  document.getElementById("detail-body").innerHTML = marked.parse(B.bodies[nid]||"",{breaks:false,gfm:true});

  const bl = backlinks[nid]||[];
  document.getElementById("detail-backlinks").hidden = !bl.length;
  document.getElementById("backlinks-list").innerHTML = bl.map(s=>`<li><a>${nodeIdx[s]?.data?.label||s}</a></li>`).join("");
  document.querySelectorAll("#backlinks-list a").forEach(a=>{
    const tgt = bl.find(s=>nodeIdx[s]?.data?.label===a.textContent);
    if(tgt) a.addEventListener("click",()=>showDetail(tgt));
  });

  cy.animate({center:{eles:n},zoom:Math.max(cy.zoom(),1.0)},{duration:200});
}

// ── Table view ──
if (!connected) {
  document.getElementById("graph-hint").hidden = false;
}
// ── Legend ──
types.forEach(t=>{
  const c = p[t]||"#94a3b8";
  document.getElementById("legend").innerHTML += `<span class="legend-item"><span class="stats-dot" style="background:${c}"></span>${t}</span>`;
});

// ── Table ──
const tbody = document.getElementById("table-body");
B.nodes.forEach(n=>{
  const d = n.data;
  const tr = document.createElement("tr");
  tr.innerHTML = `<td class="title"><span class="type-badge" style="background:${d.color};font-size:10px;margin-right:6px">${d.type}</span>${d.label}</td><td class="desc">${d.description||""}</td>`;
  tr.addEventListener("click",()=>{
    document.querySelectorAll(".view-toggle button").forEach(b=>b.classList.remove("active"));
    document.querySelector('[data-view="graph"]').classList.add("active");
    document.getElementById("graph").style.display="";
    document.getElementById("table-view").classList.remove("active");
    showDetail(d.id);
  });
  tbody.appendChild(tr);
});

// Auto-init
if (B.nodes.length) showDetail(B.nodes[0].data.id);
</script>
</body>
</html>
