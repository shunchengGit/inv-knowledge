n51% \n24% \n33% \n44% \n47% \n16% \n9% \n11% \n…(截断)", "n36": "### 2026-06-18-JPMorgan-China Food Delivery Not Just a Soft Draft Disclosure Rules ...-122636767.pdf  (总页数=15)\n\n--- 第1页 ---\nwww.jpmorganmarkets.com\nAsia Pacific Equity Research\n18 June 2026\nChina Food Delivery\n \nNot Just a Soft Draft: Disclosure Rules Could Cool the \nFood Delivery Subsidy War\n \nHead of China Equity Research \nand Co-Head of Asia TMT \nResearch\nAlex Yao AC\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSAC Registration Number: S1730523020001\nNancy Liu\n(86 21) 6106 6343\nnancy.liu@jpmorgan.com\nSAC Registration Number: S1730524090001\nJ.P. Morgan Securities (China) Company \nLimited\nSee page 7 for analyst certification and important disclosures, including non-US analyst disclosures.\nSAMR’s draft food-delivery rules reduce Meituan’s downside tail, but they do not \nyet turn regulatory relief into a positive earnings catalyst, in our view. We \nreiterate Neutral on Meituan with a Dec-26 PT of HK$85, making no changes to \nour estimates considering the draft’s scenario framework. The call rests on one \nload-bearing assumption: SAMR’s funding-source language has real behavioral \nbite and limits capital-funded subsidy attacks on food delivery. If that premise \nholds, our reading of the draft lowers the probability of our bear case (Table 4), in \nwhich prolonged capital-funded competition weakens the delivery profit pool and \nMeituan’s fair value falls to around HK$51. If the premise does not hold, the rules \nbecome disclosure without much strategic value. We do not use the draft alone as \nthe basis to change our estimates, but we see it as a near-term sentiment stabilizer \nahead of the final text due after the July 17, 2026 consultation deadline, and \nconsidering 3Q26 subsidy evidence.\n• The market appears to be pricing the absence of explicit subsidy caps as \nevidence that the draft lacks bite. In our view, that misreads the mechanism. The \ndraft does not need to cap every campaign to matter; it needs to make the most \naggressive campaigns slower, more visible, and easier to challenge. Seven-day \npre-disclosure reduces surprise value, while funding-source reporting and \ncompetitive-impact self-assessment create an evidentiary trail for regulators, \ncompetitors, merchants, riders, and media to scrutinize extreme promotions.\n• The relative stock implication favors Meituan on this specific catalyst, although \nnot enough for us to prefer it outright over Alibaba (9988 HK/BABA US, OW) \nat the portfolio level. Meituan’s advantages lie in order density, routing \nefficiency, merchant coverage, rider management, and consumer habit \nformation. If the rules shift competition away from fast capital-funded cash \nsubsidy toward operating execution, the battleground moves back onto \nMeituan’s terrain.\n• We would change our view if the final rules explicitly allow group-level \noperating profit to satisfy the funding-source requirement, if platforms keep \nrunning aggressive disclosed campaigns without regulatory response, or if \nAlibaba redirects the fight into higher-AOV use cases where Meituan’s profit \npool is more exposed. The clearest falsification test is 3Q26 subsidy intensity: if \nreporting and industry checks show subsidies remain near 1H26 levels with no \nmoderation, our interpretation weakens. Conversely, final wording that \npreserves Provision 3, first disclosures that force campaign economics into view, \nand evidence of easing subsidy intensity would support a shift of probability \nweight from the HKD51 bear case toward the HKD92 base and the HKD128 \nbull case.\nJPM view\nThe market is likely to read the draft as soft because it lacks hard caps. We think that misses the point. The draft does not \ntry to regulate subsidies mainly by setting a price ceiling, in our view. It regulates them by making aggressive campaigns \nslower, more visible, and easier to challenge. In food delivery, that is meaningful. The most damaging form of competition\n--- 第2页 ---\n2\nAsia Pacific Equity Research\n18 June 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nis not ordinary promotion; it is fast, capital-funded subsidy escalation designed to change consumer and merchant behavior \nbefore the incumbent can respond. Seven-day disclosure and funding-source reporting directly target that mechanism.\nOur view is therefore simple: disclosure, funding-source scrutiny, and competitive-impact self-assessment are the \nenforcement mechanism.\nStock implication: The draft is likely to reduce bear case probability of Meituan but this is not a reason to flip Meituan \nover Alibaba outright. Alibaba remains a broader AI/cloud/platform optionality story. The point is narrower: on this \nspecific food-delivery catalyst, the relative value setup favors Meituan more than the market is likely to price.\nWhat has changed?\nSAMR released the draft Food Delivery Platform Subsidy Conduct Rules for public consultation on June 17, with \ncomments open through July 17, 2026. The draft is framed under China’s anti-monopoly, anti-unfair competition, price, e-\ncommerce, and food-safety regimes.\nThe draft has three elements that matter most for investors:\nTable 1: Key details in Food Delivery Platform Subsidy Conduct Rules\nRule element\nWhat it requires\nWhy it matters\nFunding-source discipline\nSubsidies should be funded from own operating profit, \nnot capital advantage\nLimits the ability of challengers to fund food-delivery losses with \ngroup-level capital\nSeven-day pre-disclosure\nPlatforms must disclose campaigns before launch\nReduces speed and surprise in subsidy wars\nCompetitive-impact reporting\nPlatforms must disclose campaign design, funding \nsource, and competitive impact\nCreates a written record that can later support enforcement\nSource: SAMR (link), J.P. Morgan.\nThe timing also matters. The draft lands during the 618 promotional window, exactly when renewed subsidy escalation \nwould have tested the bear case for Meituan.\nWhy disclosure is enforcement\nThe first instinct is that “no caps” means “no bite.” We disagree.\nThe disclosure regime changes the economics of subsidy competition in three ways.\nFirst, it slows the game down. Food-delivery subsidy wars are reactive. A challenger launches a promotion, the incumbent \nresponds, and the market tests how far each side is willing to go. A seven-day public notice window reduces the value of \nsurprise and weakens the tit-for-tat dynamic.\nSecond, it creates evidence. Funding-source disclosure and competitive-impact self-assessment force platforms to write \ndown the facts that regulators would later need to evaluate whether a campaign relied on capital advantage or unfair \ncompetition.\nThird, it raises the cost of aggression before penalties arrive. A campaign that must be disclosed in advance is easier for \ncompetitors, merchants, riders, media, and regulators to monitor. That reputational and enforcement risk should reduce the \nwillingness to run extreme campaigns.\nThis is why we view the draft as more binding than it appears. It does not need to ban every subsidy to change platform \nbehavior. It only needs to make the most aggressive campaigns harder to launch, justify, and repeat.\n--- 第3页 ---\n3\nAsia Pacific  Equity Research\n18 June 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nThe key interpretive issue: segment profit or group profit?\nProvision 3 is the load-bearing clause, in our view. It requires subsidies to come from own operating profit rather than \ncapital advantage.\nThe investment conclusion depends on how “own operating profit” is interpreted.\nTable 2: Possible interpretations for ‘own operating profit' term\nInterpretation\nImplication\nSegment-level or near-segment-level profit\nStrongly favors Meituan; challengers cannot easily fund delivery losses with group capital\nGroup-level profit\nWeakens the asymmetry; Alibaba could argue that group profitability supports continued investment\nVague final wording\nKeeps the issue alive; enforcement behavior becomes more important than the text itself\nSource: J.P. Morgan.\nOur base interpretation is that the “capital advantage” language is intended to limit cross-subsidy and balance-sheet-funded \nshare attacks. That is why the rule matters for Meituan. But this is also the biggest risk to our view. If the final text \nexplicitly allows group-level profit to satisfy the requirement, the strategic benefit to Meituan would be materially smaller.\nHow the rule changes competition\nThe draft shifts the battleground from cash subsidy toward operating quality.\nTable 3: Changes in key dimensions post the SAMR draft\nDimension\nBefore the draft\nAfter the draft\nRelative beneficiary\nCampaign speed\nFlash promotions and rapid response\nSeven-day pre-disclosure\nIncumbent with scale and density\nFunding source\nGroup capital can support delivery losses\nOwn operating profit becomes more \nimportant\nMeituan\nCompetitive lever\nCash subsidy and user incentives\nFulfillment, routing, merchant depth, \nreliability\nMeituan\nMerchant/rider economics\nMore room for cost shifting\nCost-shifting restrictions\nSector-wide cost floor rises\nProfit pool\nHigher risk of multi-quarter loss-funded war\nLower probability of negative-profit tail\nMeituan structurally\nSource: J.P. Morgan.\nThis does not mean food-delivery competition goes away. It means the easiest way to attack the incumbent, using capital to \nsubsidize losses, becomes more expensive and more visible. Competition can still move into fulfillment quality, merchant \nselection, membership benefits, logistics, and high-AOV use cases. But those are precisely the areas where scale, density, \nand operating capability matter more than headline cash burn.\nIndustry implications\nCompetition: less cash burn, more operating execution\nThe rule reduces the value of capital-funded subsidy as a competitive shortcut. A challenger can still invest, but it becomes \nharder to disguise a share-buying campaign as ordinary promotion if the campaign must be disclosed in advance, justified \npublicly, and linked to a compliant funding source.\nThat matters because Meituan’s moat is operational rather than financial. Its advantage sits in order density, routing \nefficiency, merchant coverage, rider network management, and consumer habit formation. If the competitive game moves \nback toward these variables, Meituan’s relative position improves.\nOperations: subsidy relief, but a higher cost floor\nThe draft should reduce the probability of extreme promotional escalation. At the same time, it reinforces a higher sector \ncost floor. Rules against forcing merchants or riders to bear subsidy costs, combined with rider social-insurance pressure, \nmake it harder for platforms to offset promotion through cost shifting.\n--- 第4页 ---\n4\nAsia Pacific Equity Research\n18 June 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nFor Meituan, this is a mixed but net constructive outcome. The subsidy line should face less tail risk, but delivery costs are \nunlikely to return cleanly to pre-2025 levels. Our model already assumes rider cost per order moving from around RMB5.0 \ntoward RMB5.2–5.3. The draft reinforces that direction.\nProfit pool: the floor improves more than the ceiling\nWe retain our published industry profit-pool framework. In our base case, Meituan captures all or almost all positive food-\ndelivery industry profit. In the fragmented bear case, the profit pool can turn negative.\nThe draft could reduce the probability of that negative-pool scenario. It does not restore the industry to a 2024-style profit \nceiling. Redirected competition into service quality, logistics, and merchant support will still cost money. The more \nimportant change is that sustained loss-funded subsidy competition becomes harder to justify.\nStock implications\nMeituan: the strategic beneficiary\nMeituan is the stock most helped by the strategic logic of the draft. The rule reduces the probability of a prolonged capital-\nfunded attack on its core delivery profit pool. It also arrives at the moment when subsidy reacceleration would have been \nthe clearest bear-case trigger.\nThe caveat \n…(截断)", "n37": "### 2026-05-27-JPMorgan-China Internet JPM 2026 Global China Summit Key Takeaways-122259534.pdf  (总页数=25)\n\n--- 第1页 ---\nwww.jpmorganmarkets.com\nAsia Pacific Equity Research\n27 May 2026\nChina Internet\n \nJPM 2026 Global China Summit Key Takeaways\n \nHead of China Equity Research \nand Co-Head of Asia TMT \nResearch\nAlex Yao AC\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSAC Registration Number: S1730523020001\nDaniel Chen\n(86-21) 6106 6205\ndaniel.q.chen@jpmorgan.com\nSAC Registration Number: S1730521040001\nOlivia Xu\n(86-21) 6106 6138\nolivia.w.xu@jpmorgan.com\nSAC Registration Number: S1730525060001\nNancy Liu\n(86 21) 6106 6343\nnancy.liu@jpmorgan.com\nSAC Registration Number: S1730524090001\nJ.P. Morgan Securities (China) Company \nLimited\nSee page 17 for analyst certification and important disclosures, including non-US analyst disclosures.\n• We hosted JPM 22nd Global China Summit last week in Shanghai, conducting \nmanagement meetings across platform incumbents, listed AI pure-plays, and \nconsumer internet companies spanning our coverage universe. The observation \nthat most reframes the China AI investment debate is that AI profit pool is \nexpanding, but economic surplus is accruing upstream, to compute owners and \nspecialized hardware lessors, not to the model companies generating demand \nfor that infrastructure. Inference capacity, not training scale, is the binding \nconstraint on industry revenue growth. The market prices model-layer \ncompanies as primary AI beneficiaries while the economics we observed \nsuggest investors should assess upstream value capture leakage before \nunderwriting margin expansion.\n• The inference bottleneck has restructured compute procurement in ways not yet \nreflected in consensus models, in our view. Supply has migrated from major \nCSPs toward specialized leasing companies, where rental costs are rising. One \nmodel company almost doubled prices yet saw only marginal margin \nimprovement as server costs absorbed the gain. Revenue growth at the model \nlayer is supply-constrained, not demand-constrained, a distinction with direct \nearnings implications.\n• Model convergence is compounding this pressure. Multiple management teams \nacknowledged that capability gaps among leading domestic models are \nnarrowing, shifting competition from quality toward distribution and ecosystem \nintegration — structurally constructive for platform incumbents, more \nchallenging for pure-plays whose valuations embed durable quality premiums. \nTwo distinct platform strategies have crystallized: Alibaba pursuing external \ncloud monetization, Tencent prioritizing internal ecosystem integration, \nimplying divergent margin profiles the market cannot evaluate with a single AI-\nrevenue benchmark. Coding has emerged as the consensus monetization wedge, \nbut subscription economics are already breaking down in favor of usage-based \nbilling. No management team presented a convincing near-term path to mass \nconsumer AI monetization, reinforcing a predominantly B2B revenue trajectory \nover the next 12–18 months.\n• At the stock level, Tencent delivered the most significant AI narrative upgrade \nsince 1Q26, with Hunyuan 3 adoption across 100-plus internal teams validating \nthe ecosystem-first approach. Alibaba offered its clearest cloud margin \ndisclosure to date, though macro commentary turned notably darker. Zhipu AI \nprovided the sharpest illustration of upstream value capture, pricing power exists \nbut surplus flows to lessors, ahead of the June 8 Stock Connect catalyst. \nMiniMax showed the strongest revenue acceleration but carries coding \nconcentration risk and a July lock-up overhang. Baidu’s candid acknowledgment \nof foundation model momentum loss sharpens the full-stack thesis but \nintroduces multi-quarter execution risk.\n--- 第2页 ---\n2\nAsia Pacific Equity Research\n27 May 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nThematic Takeaways\nThe inference bottleneck is repricing the AI value chain in \nreal time\nThe single most decision-useful observation from the Summit is that China’s AI \nprofit pool is growing but currently captured upstream, by compute owners and \nhardware lessors, less by the model companies generating demand for that \ncompute.\nAccording to management of a leading domestic foundation model developer, the \ncompany had raised pricing on its latest-generation model by roughly double, yet \nmargins improved only marginally because server rental costs rose sharply in a \nsingle recent month with no visible ceiling. A second model company reported that \nAPI and token-plan revenue has become the majority of total revenue, up from a \nminority share at year-end, with text-model API gross margins meaningfully above \nwhat it characterized as industry averages, driven by throughput efficiency rather \nthan pricing. Despite this strong unit economics profile, the company’s ability to \nscale revenue remains constrained by inference compute availability, not demand.\nWe heard corroboration of this dynamic from the supply side. A global AI chip \nexecutive framed modern data centers as “token factories” where throughput \nconverts directly to revenue and efficiency determines margins. His \ncharacterization of agentic AI systems as requiring “hundreds to thousands of \ntimes more compute” than earlier generative models reinforces the thesis that \ninference demand is likely to compound even as model architectures stabilize.\nJPM view: the investable implication is that the market is pricing model-company \nequity narratives as if they are the primary beneficiaries of AI adoption, when in \npractice the economic surplus is flowing to compute infrastructure. This dynamic \nfavors listed companies with vertically integrated chip-to-cloud stacks (Baidu via \nits proprietary AI chip subsidiary, Alibaba via T-Head/PPU) or platform \nincumbents that can internalize inference cost through proprietary hardware and \necosystem monetization (Tencent). Pure-play model companies (Zhipu AI, \nMiniMax) face the more precarious position of generating demand for compute \nwithout yet capturing proportional economics.\nThe compute supply chain has restructured, and the \nmarket has not caught up\nAccording to management of multiple foundation model developers, they have \nshifted compute procurement away from major cloud service providers and toward \nspecialized compute leasing companies, because the CSPs themselves are now \nconstrained and competing for the same GPU resources they previously supplied. \nThis is a structural change from last year, when CSPs were the primary \nprocurement channel.\nRental cost inflation is severe and accelerating. One company described the rental \nprice of one specific server as having risen by roughly a third in the most recent \nmonth, on top of prior months of increases. The distinction between nominal \nglobal chip production capacity and actual cards reaching China was emphasized \nrepeatedly: supply chain disruptions involving specific server integrators were\n--- 第3页 ---\n3\nAsia Pacific  Equity Research\n27 May 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\ncited as having made procurement harder and more expensive than headline \nproduction volumes imply.\nDomestic chip alternatives remain a complement rather than a replacement. One \ncompany reported a domestic supplier offering only 50 cards in an entire month. \nThe main domestic suppliers with meaningful inference volume were identified as \nChina’s leading telecom equipment maker and a domestic AI chip designer, with \npractical inference usability for their latest-generation chips generally estimated at \nQ3 2026 or later.\nJPM view: model-company revenue growth over the next two to three quarters is \nlikely constrained by compute availability more than by demand. Any easing of \nsupply, whether through domestic chip ramp or rental price stabilization, would be \na meaningful catalyst for the entire sector, benefiting Zhipu AI, MiniMax, and \nother model developers most directly. Conversely, continued rental inflation \ndirectly compresses the margin expansion case for model companies that lack \nproprietary chip supply. Cloud platforms that own proprietary chip capacity \n(Alibaba, Baidu) are relatively better positioned to absorb this cost pressure, \nthough even they face constraints on available volume.\nDomestic model convergence shifts competition from \ncapability to distribution\nAccording to management of multiple foundation model developers, the domestic \ncompetitive landscape has no generational capability gap among leading players. \nOne described the market as not winner-take-all, with enterprise users combining \nmodels based on task-specific features (speed, long-context performance, \nmultimodal understanding, reasoning difficulty) rather than consolidating around a \nsingle provider. A second company argued that benchmark leadership has become \n“easily optimized” and the meaningful test is whether paying customers choose the \nmodel in production workflows. A senior technology panel participant reinforced \nthis from a product perspective, arguing that platform integration, user context \naccumulation, and workflow lock-in are becoming the durable moats.\nThis convergence thesis has asymmetric implications across the coverage universe. \nFor platform incumbents, it is constructive: if the model layer is approaching \n“good enough” quality, then distribution, ecosystem, and data advantages become \nthe primary competitive differentiators. One major platform demonstrated this \noperationally, describing how a rebuilt AI team delivered a competitive model \nwithin 88 days of full team readiness, which was then integrated across more than \n100 internal product teams within weeks.\nFor pure-play model companies at high ARR multiples, the convergence thesis is \nmore challenging. One such company defended premium pricing by arguing that at \nclose to a leading US lab’s capability level, discounting makes no sense because \ncustomers will simply pay slightly more for the genuine article. This logic depends \non a quality gap that the broader summit evidence suggests is narrowing. We note, \nhowever, that this company’s own customer feedback and retention data were \ndescribed as strong. The tension between “we are the best” self-assessments and \nthe broader “no generational gap” market structure observation is itself an \nimportant analytical signal, and the resolution likely determines the direction of AI \npure-play valuations over the next 6–12 months.\n--- 第4页 ---\n4\nAsia Pacific Equity Research\n27 May 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nJPM view: model convergence is structurally constructive for Tencent \n(distribution via WeChat, mini-programs, payments) and Alibaba (cloud platform, \nmerchant ecosystem, payment rails). It is more threatening for Zhipu AI and \nMiniMax, whose valuations depend on durable quality premiums. Baidu sits in \nbetween: its model capability has lagged recently, but its proprietary AI chip \nadvantage becomes more valuable in a world where the model layer commoditizes \nand value migrates to infrastructure.\nCoding is the consensus monetization wedge, but \nsubscription economics are failing\nAcross foundation model companies, cloud platforms, and internet incumbents, \ncoding emerged as the vertical where AI revenue is actually materializing at scale. \nOne company reported that the vast majority of token consumption is coding-\nrelated. Another described coding as its priority weakness and the area requiring \nthe most urgent improvement. A third platform claimed its coding product leads \ndomestic DAU rankings in the category. A Chinese AI executive positioned \ncoding as the fastest area for top domestic models to catch up with US labs.\nBut the subscription model around coding is breaking. According to management \nacross multiple sessions, coding plans are economically problematic: users exploit \nunlimited packages and resell unused quotas on secondary markets. At least one \nmajor platform has moved away from coding plans\n…(截断)", "n38": "### 2026-04-23-JPMorgan-China Internet Post 4Q25 Re-evaluating the Sector; Tencent ...-121601321.pdf  (总页数=12)\n\n--- 第1页 ---\nwww.jpmorganmarkets.com\nAsia Pacific Equity Research\n23 April 2026\nChina Internet\n \nPost 4Q25: Re-evaluating the Sector; Tencent Our \nTop Pick\n \nHead of China Equity Research \nand Co-Head of Asia TMT \nResearch\nAlex Yao AC\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSAC Registration Number: S1730523020001\nDaniel Chen\n(86-21) 6106 6205\ndaniel.q.chen@jpmorgan.com\nSAC Registration Number: S1730521040001\nNancy Liu\n(86 21) 6106 6343\nnancy.liu@jpmorgan.com\nSAC Registration Number: S1730524090001\nJ.P. Morgan Securities (China) Company \nLimited\nSee page 7 for analyst certification and important disclosures, including non-US analyst disclosures.\nThe six weeks since Tencent's 4Q25 print have seen a repricing of China internet \nnames along a different axis than the AI-narrative rally that carried the sector into \nlate January. Earnings revisions now dominate share price direction, AI capex is \npenalized rather than rewarded, and buy-side conversations have converged on a \n\"real multiple plus earnings floor plus dated catalyst\" framework for sizing \npositions. Against that tape, we refresh our sector view and rank Tencent as our \ntop pick. Sector top picks: Tencent, JD, Trip.com, Baidu, Alibaba and Bilibili.\n• We apply four filters consistently across our coverage universe: whether the \ncurrent multiple represents a real earnings floor; whether disclosed AI spend is \nself-funded rather than dilutive; whether consensus earnings are set too low; \nand whether a dated catalyst exists in the next three to six months. Tencent is \nthe only name that clears all four criteria. JD and Trip.com clear three on \ndifferentiated grounds. Alibaba, Meituan, and PDD clear fewer, for reasons we \ndetail in the body.\n• The case for Tencent rests on four pillars the market is, in our view, mis-\npricing. The earnings floor is real: FY25 free cash flow of RMB182.6bn \ncomfortably funds the current AI investment framework, and our 2026E EPS \ngrowth estimate of c8% already embeds elevated spend. The AI monetization \nbridge is narrower in scope and more advanced in execution than consensus \nframes it; the disclosed RMB18bn of 2025 spend and the “more than double” in \n2026 framework refer to new AI products, not full company-wide infrastructure, \nand monetization is already live in advertising and gaming. We think the gaming \nand licensing moat is underappreciated because licensing, not model quality, is \nthe scarce asset in China. Lastly, Weixin carries long-duration optionality to \nwhich the current multiple ascribes negligible value.\n• Why now? Consensus has reset to \"real 14x, earnings floor intact, awaiting a \ncatalyst\". Positioning is washed out. The April calendar is dense: Hunyuan 3.0 \nrolls out as the first real test of domestic AI credibility - the \"Gemini 3 moment\" \nanalog investors explicitly reference - and there are low expectations for the \nHonor of King World launch. Cloud monetization should accelerate through the \nyear, and a second model or AI application release later in 2026 provides a \nfurther potential catalyst.\n• Our thesis is not without risk. Hunyuan 3.0 reception is genuinely binary. AI \nspend could overshoot the current framework. Core advertising or gaming \nsoftness would erode the floor the entire setup rests on. ByteDance, a private-\ncompany AI leader investors cannot directly own, may structurally cap listed \nmultiples. We view these risks as priced in; the potential upside is not.\n--- 第2页 ---\n2\nAsia Pacific Equity Research\n23 April 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nThe six weeks since the 4Q25 reporting season has seen a repricing of China internet stocks along a different axis than the \nAI-narrative rally that ran through January 2026. Earnings revisions now dominate share price direction, AI capex is \npenalized rather than rewarded, and the buy-side has converged on a \"real multiple plus earnings floor plus dated catalyst\" \nframework for sizing positions. Against this tape, we refresh our sector view and rank Tencent (0700 HK) as our top pick.\nOur conviction rests on four filters we apply consistently across the coverage universe: whether the current multiple \nrepresents a real earnings floor; whether AI spend is self-funded rather than dilutive; whether consensus earnings are set too \nlow; and whether a dated catalyst exists in the next three to six months. Tencent is the only name that passes all four. The \nsetup is asymmetric: downside looks capped near 14x 2026E PE with management preserving financial flexibility, and \nupside is gated by catalyst delivery in April and beyond rather than by a multi-quarter narrative build.\nWe retain a constructive position on JD and Trip.com on a more selective basis, remain Neutral on Meituan, and view PDD \nas having a balanced risk/reward post the recent multiple reset. This report focuses on the sector reset and the relative case \nfor Tencent.\nFigure 1: YTD sector share price performance summary\nSource: Bloomberg Finance L.P (as of Apr 23, 2026).\nCompany\nTicker\nMarket cap \n(US$m)\nPrice\nStock \nReturn\nRelative \nreturn vs. \nMXCN Index\nChange in \n26E PE \n26CY EPS \nrevision\n26CY \nRevenue \nrevision\nTencent\n700 HK\n604,830\n519\n-16%\n-13%\n-12%\n-4%\n0%\nAlibaba\nBABA US\n323,208\n135\n-7%\n-4%\n25%\n-26%\n-1% Q25 reporting cycle that began on 18 March with Tencent's print did not produce large absolute earnings surprises, \nbut it did reset the framework through which the market is underwriting China internet. In our view, six shifts matter.\nMarket regime inversion. Through late January 2026, Alibaba and Baidu rallied on an AI narrative despite weak \nfundamentals. After late January, profit-taking and a lower global risk appetite re-anchored the tape on near-term earnings \nand free cash flow. Most of the China internet names saw estimate cuts into and out of the 4Q print. Alibaba's US$100bn \nfive-year cloud target, implying roughly a 47% cloud revenue 5-year CAGR did not support the stock. Long-dated narrative \nclaims now carry a materially lower multiple than they did in 4Q25.\nAI capex is being penalized, not rewarded. The US software analog rerating, IGV (iShares expanded Tech-Software \nSector ETF) weakness and fears of disruption to core franchises have arrived in China with a lag. Linear extrapolations of \nAI spend (Tencent RMB36–40bn this year per the company), Alibaba's rapidly scaling of the \"all others\" line) produce ROI \nanxiety that the market is translating into multiple compression rather than multiple expansion. The burden of proof has \nshifted from \"show us AI monetization is possible\" to \"show us AI monetization within the spend framework.\"\nRegulatory wave re-opened, but bounded. The SAMR ghost-kitchen ruling landed on 18 April, with RMB35.97bn in \naggregate industry penalties. PDD's RMB1.5bn fine is financially immaterial but carries signaling weight given unusually \nvivid domestic media coverage. A separate State Council-linked office probe into food delivery subsidy practices remains \nlive. Trip.com's antitrust investigation, launched in early January, should be resolved on a four-to-six-month precedent \ntimetable, implying May to July 2026. In our view, these are clearing events within an already-established framework, not a \n2021-style systemic reset, but stocks tied to unresolved cases continue to trade as \"dead money\" until resolution.\nFood-delivery subsidy intensity easing at the margin. Alibaba's FY27–29 loss-narrowing roadmap, roughly halving each \nyear from a base of RMB85–90bn, is now in consensus and largely priced in. The incremental underwriting question has \nshifted away from food delivery to Alibaba's \"all others\" AI spending line, where the cadence accelerated from \napproximately RMB3bn in the September quarter to RMB20bn in the March quarter. Scale remains small relative to food \ndelivery losses, but the acceleration and the opacity are what matter.\nBuy-side positioning reset. Late-April counterparty conversations are converging on \"14x is real, earnings floor intact, \nneeds a model-quality or gaming catalyst\" for Tencent; on \"JD has the most FD-easing upside surprise\"; on \"Trip.com is \nattractive on 11–12x if the near-term earnings outlook won’t be compressed by investment”; and on Alibaba as a multiple-\nnot-EPS story. Expectations are washed out across most of the cohort. Investors are unwilling to size positions ahead of \ndated events, but are willing to underwrite real earnings floors.\nPrivate-company overhang has intensified. Buy-side framing now treats ByteDance as the China-specific analog of \nAnthropic: the strongest AI competitor that investors cannot directly own, structurally capping listed multiples. This is a \nrelative-positioning risk, not a disintermediation risk, and the two should not be conflated, in our view.\nRevised Sector Framework\nWe apply four filters to rank names in the current regime. Each filter corresponds to a feature of the 2026 tape rather than a \nview on any single company.\nFilter one: is the current multiple a real floor? A low multiple is only meaningful if earnings downside is capped. We \ntest this through three inputs: management signaling on the earnings trajectory, our own estimate range for 2026 EPS, and \nfree cash flow durability against disclosed investment plans. Tencent and Trip.com both clear this filter. Meituan does not \nclear it cleanly because normalized food delivery economics still span a wide range (roughly RMB0.2–0.3 per order in the \nlow scenario versus RMB1.0–1.1 per order in the high scenario), depending primarily on Alibaba's strategic posture rather \nthan on policy.\n--- 第4页 ---\n4\nAsia Pacific Equity Research\n23 April 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nBased on Tencent’s AI investment of Rmb18bn in 2025 (disclosed by management during the 4Q25 earnings call), we \nestimate that consensus earnings have largely factored in incremental investments in AI in 2026; we estimate even a \nRmb60bn AI investment (over 3 times that of 2025’s level) would only imply 6% downside to consensus earnings. This \nwould imply limited room for further earnings cuts, in our view.\nTable 1: Tencent new AI product investment analysis and EPS sensitivity\nTencent 2026 new AI pr\n…(截断)", "n39": "### 2026-04-20-JPMorgan-China Internet What the Market May Be Missing on SAMR’s Ghos...-121484311.pdf  (总页数=14)\n\n--- 第1页 ---\nwww.jpmorganmarkets.com\nAsia Pacific Equity Research\n20 April 2026\nChina Internet\n \nWhat the Market May Be Missing on SAMR’s Ghost-\nRestaurant Crackdown\n \nHead of China Equity Research \nand Co-Head of Asia TMT \nResearch\nAlex Yao AC\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSAC Registration Number: S1730523020001\nAndre Chang, CFA\n(86-21) 6106 6362\nandre.ch.chang@jpmorgan.com\nSAC Registration Number: S1730520080002\nNancy Liu\n(86 21) 6106 6343\nnancy.liu@jpmorgan.com\nSAC Registration Number: S1730524090001\nJ.P. Morgan Securities (China) Company \nLimited\nSee page 9 for analyst certification and important disclosures, including non-US analyst disclosures.\nWe believe the market may misread SAMR’s 17 April ghost-restaurant ruling \nas another turn tighter in China Internet regulation and a simple EPS \nheadwind for food delivery platforms. Our view is more constructive and \nmore differentiated by stock. The direct fine is manageable and the \noperational remedy is narrow. The more important effect is economic: the \nruling removes a pool of non-compliant, low-AOV, structurally loss-making \norders, which should improve industry order quality and support higher AOV, \nrevenue, and operating profit per order. On that basis, we see JD as the \nclearest positive read-through, Alibaba constructive via narrative de-risking, \nMeituan largely priced in, and PDD incrementally negative.\n• What the market may be missing is that the affected volume is not high-\nquality demand. Ghost restaurants were concentrated in delayed-delivery \ncake orders and skewed to low-ticket baskets that added volume but diluted \nunit economics. In our framework, removing that volume should reduce \ntotal orders modestly but improve the mix of orders that remain. That is \nwhy we read the ruling as supportive for industry profitability rather than as \na broad demand shock. We also think the action matters beyond the one-off \nfine because it increases the probability of a more rational operating \nbackdrop, even without assuming an explicit policy-led end to the subsidy \nwar.\n• The stock call therefore depends on what is already in numbers. For \nAlibaba, our model already embeds substantial food delivery and quick \ncommerce loss narrowing, so the main benefit is lower narrative risk rather \nthan incremental EPS upside versus consensus. For Meituan, the 2027 food \ndelivery profit flip is already in our model and, we believe, largely in \nconsensus. JD stands out because expectations remain low: our 2026E group \nearnings sit above consensus while our new initiatives loss path still assumes \nessentially no narrowing. Against that backdrop, even modest cost savings \nfrom cleaner order mix and potential subsidy rationalization matter more for \nthe stock. PDD is the exception: the fine is absorbable, but the one-store-\none-penalty precedent adds a tail-risk overlay that we do not think the \nmarket fully prices.\n• The main risks include: our thesis would weaken if ghost-restaurant \nexposure is smaller than we assume, if attrition of non-compliant low-AOV \norders proves limited, or if platforms replace removed volume with equally \nuneconomic subsidized demand. The Alibaba de-risking mechanism also \ndepends on management’s next public framing; if management reiterates \naggressive investment without clearer discipline, the narrative benefit could \nfade. More broadly, if SAMR treats this as a one-off food-safety case rather \nthan part of a wider push toward better order quality and more rational \ncompetition, the valuation read-through is likely to be more muted.\n--- 第2页 ---\n2\nAsia Pacific Equity Research\n20 April 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nBottom line\nThe investment question is not whether the RMB3.6bn aggregate fine \nmatters to 2026 EPS. It is whether the 17 April SAMR ruling changes \nearnings expectations, valuation, or near-term positioning across the sector. \nWe think the stock-relevant content lies in the interaction between what the \nruling enables and what the market already discounts. On that basis, we \nrank the impact across our coverage as JD > Alibaba > Meituan, with \nPDD incrementally negative because of both the fine and the precedent \nset by the one-store-one-penalty template. In form, this is a one-time fine \nwith narrow operational remedies. In economic substance, it improves \nindustry order quality, narrows Alibaba’s credibility gap around a loss path \nthat we believe is already in the stock, and establishes a reusable \nenforcement mechanism that raises tail risk at PDD.\nJD is the clearest actionable expression of the ruling. On our estimates, the \norder-quality cleanup adds RMB0.7bn-1.6bn of annual run-rate cost \nsavings as structurally loss-making sub-RMB30 orders exit the platforms. \nThat more than covers roughly RMB300mn of recurring compliance cost \nand absorbs the RMB635mn fine within a single annual run-rate. More \nimportantly, this positive increment sits on top of a pre-existing \nexpectations gap: our 2026E group adjusted net income estimate is double-\ndigit percentage above consensus, while our new initiatives loss forecast of \nRMB46bn in 2025 and RMB45bn in 2026 still assumes essentially no \nnarrowing and is consistent with where consensus sits. That is why we \nview JD as the cleanest single-stock way to express the ruling.\nAlibaba is constructive, but the mechanism is narrative de-risking rather \nthan incremental P&L upside versus consensus. Our food delivery and \nquick commerce loss forecasts of RMB88bn in FY26, RMB47bn in FY27, \nRMB23bn in FY28, and profitability in FY29 already imply an aggressive \nnarrowing path. We believe the market broadly discounts a similar \ntrajectory. The ruling does not, in our view, push P&L materially beyond \nthat path. What it does is reduce the risk that management’s public \nlanguage on aggressive investment leads investors to question whether the \nnarrowing path will be followed. We see scope for a 5-10% equity re-\nrating over a three- to six-month horizon via multiple, contingent on \nmanagement’s next public framing shifting toward discipline, quality-led \ngrowth, and sustainable unit economics. We no longer view a 20% P&L-\ndriven upside framing as defensible against the loss baseline currently in \nthe market.\nMeituan looks different. Our model already embeds a 2027 food delivery \nprofit flip from a RMB19bn loss in 2026 to a RMB16bn profit in 2027, and \nwe believe consensus broadly captures the same transition. The ruling \nmodestly de-risks that path through better order mix, but it neither raises \nnor lowers the ceiling in a meaningful way. PDD is the main incremental \nnegative. The RMB1.52bn fine is the largest single-group tranche at 42% \nof the aggregate, and, more importantly, the one-store-one-penalty \ntemplate is now a demonstrated regulatory tool that could be reused\n--- 第3页 ---\n3\nAsia Pacific  Equity Research\n20 April 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nwherever platform merchant-vetting duties are the operative legal hook. \nWe do not think that tail risk is priced in.\nNear term, we expect first-wave sell-side reactions within 48 hours to skew \nneutral to slightly negative and to focus on a generic regulatory overhang \nand the one-off EPS hit. We think that is likely to miss the stock-relevant \nmechanism. Our base case remains that the asymmetric opportunity \nwindow is two to six weeks. The key dates are Meituan, JD and Alibaba’s \n1Q26 disclosure and any follow-on SAMR action over the next 60-90 days. \nThe key risk to the Alibaba de-risking mechanism is straightforward: if \nmanagement reiterates aggressive continued investment without discipline \nqualifiers, the narrative benefit weakens materially.\nConsensus revision map and positioning\nWe expect the first wave of research within 48 hours to skew neutral to \nslightly negative and to focus on a generic regulatory overhang and the \nmechanical EPS hit from the fine. We think that could miss the key point. \nThe fine itself is not large enough to change group earnings paths in a \nmaterial way. The more important read-through is where the ruling \nintersects with what is already priced: little incremental P&L at Alibaba \nbeyond the loss path already in the stock, modest de-risking of Meituan’s \n2027 flip, a positive incremental on top of an existing earnings gap at JD, \nand a new tail-risk overlay at PDD.\nThat leaves the positioning flow uneven. JD is the cleanest positive \nbecause the ruling adds to a pre-existing out-of-consensus earnings view. \nAlibaba is constructive, but via multiple rather than EPS, and the key \nobservable is management’s next public framing. Meituan should see \nlimited revision because the 2027 flip is already widely modeled, and we \nwould discourage chasing a post-event Meituan call on the view that the \nruling resets medium-term earnings power. PDD is where we would expect \nthe market to underappreciate the tail risk embedded in the stacking \ntemplate. Our base case remains that the best asymmetric window is two to \nsix weeks, not a same-day EPS revision trade.\nThe 17 April ruling: what happened and why it matters\nWhat happened: Per SAMR’s April 17, 2026 public statement, the \nregulator imposed administrative penalties on PDD, Meituan, JD, Ele.me \n(now Taobao Flash Buy), Douyin, Taobao and Tmall in a series of “ghost \nrestaurant” cases, saying the platforms had failed to properly verify food \nmerchants’ licenses and had not taken necessary action against order-\ntransfer arrangements that harmed consumers. SAMR ordered the seven \nplatforms to rectify the violations, suspend new cake-shop onboarding for \nthree to nine months, and pay a combined RMB3.597bn in fines and \nconfiscations; it also said the platforms had already taken down the\n--- 第4页 ---\n4\nAsia Pacific Equity Research\n20 April 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nunaudited “ghost stores” and stopped cooperating with the relevant \ntransfer-order platforms after the investigation began.\nThe case matters because the economic substance is easy to miss if it is \nframed only as a generic food-safety action. The enforcement path began \nwith a single consumer complaint in July 2025. A Beijing resident ordered \na cake from a storefront called Tianyan Qingshu on a food delivery app, \nreceived a cake decorated with inedible and potentially toxic fresh roses, \nand filed a complaint. The local SAMR office could not find the store at its \nregistered address, could not verify the uploaded food business license \nagainst the government database, and found that the listed supervising \nofficer did not exist. The investigation then established that all 378 chain \nlocations trading under the same brand name used forged licenses and \noperated without physical kitchens.\nSAMR’s subsequent test-buy showed that the order had in fact been \nfulfilled by a different licensed bakery. The ghost storefront routed the \norder through Zhuandan Bao, a third-party order-transfer platform that \noperates a reverse auction, and the bakery fulfilled the order at the winning \nbid. That workflow, rather than a simple food-quality lapse, is the core of \nthe case.\nTable 1: Ghost-storefront order economics\nParticipant\nReceives (RMB)\nShare of consumer spend\nRole\nConsumer\n252.4\n100.0% outflow\nPays full price\nPlatform\n50.4\n20.0%\nService fee\nGhost restaurant\n122.0\n48.3%\nPure intermediation; no kitchen, no production\nZhuandan Bao\n3.2\n1.3%\nOrder-transfer fee\nLicensed bakery\n76.8\n30.4%\nActual producer; arranges delivery\nSource: J.P. Morgan estimates.\nWe think three features of this structure explain the severity of the \nresponse. First, the ghost storefront captured 48% of consumer spend for \nno production or delivery role, which supports SAMR’s view that this was \na compliance-failure ecosystem rather than a pricing issue. Second, the \nactual producer was invisible to both the consumer and the platform’\n…(截断)", "n40": "### 2026-04-28-JPMorgan-China Telecom Sector What we learned from China telcos 1Q26...-121678208.pdf  (总页数=9)\n\n--- 第1页 ---\nwww.jpmorganmarkets.com\nAsia Pacific Equity Research\n28 April 2026\nChina Telecom Sector\n \nWhat we learned from China telcos' 1Q26 results\n \nInternet\nDaniel Chen AC\n(86-21) 6106 6205\ndaniel.q.chen@jpmorgan.com\nSAC Registration Number: S1730521040001\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSAC Registration Number: S1730523020001\nOlivia Xu\n(86-21) 6106 6138\nolivia.w.xu@jpmorgan.com\nSAC Registration Number: S1730525060001\nJ.P. Morgan Securities (China) Company \nLimited\nSee page 2 for analyst certification and important disclosures, including non-US analyst disclosures.\n• We summarize key takeaways after China telecom operators’ 1Q26 results. \nOverall, CM/CT/CU’s service revenue was -1%/-2%/-1% YoY in 1Q26, with \nnet profit -4%/-17%/-18%, respectively, due mainly to the impact from the \nVAT adjustment. CM’s profit decline is in line with our estimate, while CT/CU \nare below our estimates (JPMe -7% YoY each for 2026E profit), due to higher \npersonnel costs. Cash flow is a bright spot: CM’s 1Q26 FCF of Rmb41bn is \nsubstantially stronger than the Rmb5bn outflow in 1Q25, while CT’s 1Q26 FCF \nof Rmb8.4bn is much stronger than Rmb3.4bn outflow in 1Q25. This \ndemonstrates China telecom operators' focus on growth quality and should \nsupport sustainable dividend payouts, in our view. On the industrial internet \nside, China Telecom Cloud revenue was +7% YoY, and China Unicom \ncompute power revenue was +8% YoY in 1Q26. \n• Our order of preference among H-share names is CM-H > CT-H > CU-H: \nWe note that CM-H/CT-H’s share prices have been resilient post the 1Q26 \nresults. We believe the key rationales are: CM-H (solid large-cap high yielder at \n6% dividend yield on 2026E), CT-H (potentially due to strong sentiment on \ncloud/data center sector post DeepSeek V4 launch recently, which confirms the \npractical feasibility of domestic chips for frontier AI model inference. Please \nrefer to the report on China AI from Olivia Xu. Our order of preference is now \nbased mainly on affordability of dividend payout and cloud exposure. We prefer \nCM-H the most, as it has the mildest impact from VAT adjustment in 2026 (due \nto its substantially higher margin than peers), and its dividend yield of 6.2% in \n2026E (on JPMe) is largest among the Big 3. While CT-H is the most expensive \nof the three (trades at 16x 2026E P/E if we assume similar profit YoY decline \nfor full year 2026E as 1Q26), its positioning as a ‘cloud play’ among the big \nthree telcos (25% of total service revenue in 2025, vs 12%/21% of CM-H/CU-\nH) makes it a potential beneficiary of the China domestic cloud thematic trade. \nWe prefer CU-H least as it trades at a similar P/E as CM-H (12x 2026E if we \nassume similar profit YoY decline for full year 2026 as 1Q26) and the \nlikelihood for higher dividend payout ratio in 2026E is low (due to profit impact \nfrom VAT).\n--- 第2页 ---\n2\nAsia Pacific Equity Research\n28 April 2026\nDaniel Chen\n(86-21) 6106 6205\ndaniel.q.chen@jpmorgan.com\nCompanies Discussed in This Report (all prices in this report as of market close on 28 April 2026, unless otherwise \nindicated)\nChina Mobile - H(0941.HK/HK$84.65/OW), China Telecom - H(0728.HK/HK$5.17/OW), China Unicom - \nH(0762.HK/HK$7.30/OW) \nAnalyst Certification: The Research Analyst(s) denoted by an “AC” on the cover of this report certifies (or, where multiple Research \nAnalysts are primarily responsible for this report, the Research Analyst denoted by an “AC” on the cover or within the document \nindividually certifies, with respect to each security or issuer that the Research Analyst covers in this research) that: (1) all of the views \nexpressed in this report accurately reflect the Research Analyst’s personal views about any and all of the subject securities or issuers; and \n(2) no part of any of the Research Analyst's compensation was, is, or will be directly or indirectly related to the specific recommendations \nor views expressed by the Research Analyst(s) in this report. For all Korea-based Research Analysts listed on the front cover, if \napplicable, they also certify, as per KOFIA requirements, that the Research Analyst’s analysis was made in good faith and that the views \nreflect the Research Analyst’s own opinion, without undue influence or intervention.\nAll authors named within this report are Research Analysts who produce independent research unless otherwise specified. In Europe, \nSector Specialists (Sales and Trading) may be shown on this report as contacts but are not authors of the report or part of the Research \nD s EV/EBITDA Multiples by ~30%, on Average\n13.2x\n9.5x\n13.8x\n8.8x\n20.9x\n3.7x\n11.4x\n5.9x\n14.6x\n14.6x\n16.6x\n12.2x\n28.9x\n6.4x\n13.1x\n6.0x\n0.0x\n10.0x\n20.0x\n30.0x\n40.0x\n50.0x\n60.0x\n…(截断)", "n44": "### 2026-06-10-JPMorgan-Asian Semis April WSTS data Strong YoY growth continues, be...-122503869.pdf  (总页数=10)\n\n--- 第1页 ---\nAsia Pacific Equity Research\n10 June 2026\nJ P M O R G A N\nwww.jpmorganmarkets.com\nTechnology and Telecoms\nGokul Hariharan AC\n(852) 2800-8564\ngokul.hariharan@jpmorgan.com\nJ.P. Morgan Securities (Asia Pacific) Limited/ J.P. \nMorgan Broking (Hong Kong) Limited\nJennifer Hsieh\n(886-2) 2725-9868\njennifer.hsieh@jpmorgan.com\nJ.P. Morgan Securities (Taiwan) Limited\nDavid Chou\n(886-2) 2725-9618\ndavid.chou@jpmorgan.com\nJ.P. Morgan Securities (Taiwan) Limited\nJason Chen\n(886-2) 2725-9864\njason.bh.chen@jpmorgan.com\nJ.P. Morgan Securities (Taiwan) Limited\nSubham Singhania\n(91-22) 6157-3801\nsubham.singhania@jpmorgan.com\nJ.P. Morgan India Private Limited\nOverall semi revenues rose 106% YoY in April (vs. 88% YoY in March), with logic \nsemis increasing 33% YoY (vs. 25% YoY in March) and memory increasing 359% \nYoY (vs. 269% YoY in March). Semis marked the eighth consecutive month of \nacceleration and the highest YoY growth since 1994. This was mostly due to 1) \nsustained AI compute demand driven by strong growth in AI accelerators (GPUs \nand ASICs), networking and server CPUs, and 2) ongoing memory ASP strength \namid persistently tight supply conditions. Memory growth was driven by CSP-led \ndemand across both HBM and conventional memory, with suppliers continuing to \nprioritize HBM allocation.\n•\nLogic semi revenue rose 33% YoY (vs. 25% in March), marking 32 \nconsecutive months of YoY growth. We believe this was mostly due to \nleading-edge demand, which continues to tighten. Strong demand for N5/N3 \nwafers—driven by GPUs/ASICs, server CPUs, networking, and Apple \niPhone/Mac products—has kept the capacity tight. We believe N3 will be the \nprimary bottleneck for AI accelerators, as most leading AI accelerators (such \nas NVIDIA Rubin, Google TPU v8t/i, and AWS Trn 3) are expected to adopt \nN3. We have also seen recent upside in server CPU demand due to booming \ndemand for agentic AI. We now estimate the demand–supply gap for N3 in \n2026 at ~600K wafers, equivalent to $15bn–18bn in foundry revenues. \nContinued upward revisions to US CSP capex (with total capex for the top four \nUS CSPs now indicating 80%+ YoY growth in 2026) suggest more structural \nAI demand. We expect the AI-driven semi upcycle to extend at least through \n2026, with robust leading-edge demand continuing into 2028. For mature \nfoundries, we see strong demand for AI peripheral products such as PMICs, \nearly signs of industrial recovery, and some PC pull-in. However, downside \nrisk remains from tepid consumer electronics demand given rising memory \ncosts in 2H26.\n•\nOverall, semis units increased 15% YoY (vs. 10% YoY in March). Memory \nunits increased 54% YoY (vs. 21% YoY in March). We forecast the HBM \nS-D shortage to worsen over the next three years, with DRAM wafer allocation \nto HBM continuing to rise (from 24% in 2026E to 31% in 2028E), adding \ngreater pressure on conventional DRAM S-D, as HBM bit installation demand \nCAGR is likely to be +85% over the next three years. Logic semis units \nincreased 14% YoY (vs. 9% YoY in March). We believe this growth is \nsupported by demand for AI alongside pockets of strength in industrials. In \naddition, resilient iPhone 17 demand (iPhone shipments up 9% YoY versus \noverall smartphone shipments down 11% YoY in 2Q26E) especially share \ngains in the China market and strong customer interest in the MacBook Neo are \nhelping offset weakness in mid- to low-end smartphone demand.\n•\nOverall, semis ASPs were up 79% YoY (vs. 71% YoY in March), driven by \ntight S-D across leading-edge and memory. Memory ASPs surged 198% \nYoY (vs. 206% YoY in March). We expect memory prices to increase 220-\n250% YoY this year, although we see a rather stable pricing trend next year, \nsupported by a rising LTA contract sales mix. Given the dollar per bit crossover \nSee page 5 for analyst certification and important disclosures, including non-US analyst disclosures.\nAsian Semis \nApril WSTS data: Strong YoY growth continues, \nbecoming more broad-based with healthy unit growth \nand ex-memory ASP uptick\n--- 第2页 ---\n2\nGokul Hariharan AC\n(852) 2800-8564\ngokul.hariharan@jpmorgan.com\nAsia Pacific Equity Research\n10 June 2026\nJ P M O R G A N\nbetween HBM and non-HBM, we expect memory makers to turn vocal on raising HBM \nASPs next year (+10% YoY like-for-like, +30% blended). Logic semi ASPs rose 18% \nYoY (vs. 15% in March), supported by price hikes in leading edge node and a continued \nmix shift toward advanced nodes (higher N3/N5 mix). ASP growth is further supported \nby rising demand for mature-node (primarily 8\") products, driven by AI-related PMICs, \npower discrete, and industrial applications, with selective price hikes observed in 1H this \nyear. For 2H26, we believe leading edge pricing for hot-runs and super-hot-runs has \nmoved up, but regular N3 pricing is unchanged.\n•\nLooking ahead, we expect leading-edge capacity tightness to persist well into 2027 \nor early 2028, driven by strong AI accelerator demand, increasing demand for AI \ninterconnect, rising AI-driven power demand and continued strength from Apple \niPhone and Mac. For memory, our team has revised up the FY26E/28E memory TAM \nby 37/53% (vs. the Mar-26 model). We now forecast capex at US$450bn in memory \nspending over the next three years (vs. US$300bn in Dec-25 model), with DRAM CY28-\nend WSPM at 2.8mn (up 880k from CY25-end) and 60% of incremental WSPM \nallocation directed toward HBM, keeping S-D tight and pricing biased to the upside. \nOverall, we reiterate our top picks among major AI beneficiaries: TSMC, Mediatek, \nLasertec, Tokyo Electron, ASMPT, ASE, Alchip, Unimicron, EMC, SEC, and SK Hynix.\n--- 第3页 ---\n3\nGokul Hariharan AC\n(852) 2800-8564\ngokul.hariharan@jpmorgan.com\nAsia Pacific Equity Research\n10 June 2026\nJ P M O R G A N\nKey charts  \nFigure 1: Semi ex-memory revenue YoY (May-24 onwards)\n4%3%\n7%6%\n14%\n9%8% 8%11%\n19%18%\n22%\n18%\n20%\n26%\n23%\n20%\n24%\n27%\n28%31%28%25%\n33%\n0%\n5%\n10%\n15%\n20%\n25%\n30%\n35%\n40%\nMay-24\nJun-24\nJul-24\nAug-24\nSep-24\nOct-24\nNov-24\nDec-24\nJan-25\nFeb-25\nMar-25\nApr-25\nMay-25\nJun-25\nJul-25\nAug-25\nSep-25\nOct-25\nNov-25\nDec-25\nJan-26\nFeb-26\nMar-26\nApr-26\nSemi-ex Memory Revenue YoY (%)\nSource: WSTS.\nFigure 2: Memory revenue YoY (May-24 onwards)\n121%68%87%\n148%\n60%\n53%\n89%39%\n30%\n27%21%\n26%19%15%30%22%\n51%66% 68%\n77%\n160%\n259%\n269%\n359%\n0%\n50%\n100%\n150%\n200%\n250%\n300%\n350%\n400%\nMay-24\nJun-24\nJul-24\nAug-24\nSep-24\nOct-24\nNov-24\nDec-24\nJan-25\nFeb-25\nMar-25\nApr-25\nMay-25\nJun-25\nJul-25\nAug-25\nSep-25\nOct-25\nNov-25\nDec-25\nJan-26\nFeb-26\nMar-26\nApr-26\nMemory Revenue YoY (%)\nSource: WSTS.\nFigure 3: Semi revenue (monthly) and YoY \nUS$mn, %\n-60%\n-40%\n-20%\n0%\n20%\n40%\n60%\n80%\n100%\n120%\n0\n20000\n40000\n60000\n80000\n100000\n120000\n140000\nApr-02\nApr-03\nApr-04\nApr-05\nApr-06\nApr-07\nApr-08\nApr-09\nApr-10\nApr-11\nApr-12\nApr-13\nApr-14\nApr-15\nApr-16\nApr-17\nApr-18\nApr-19\nApr-20\nApr-21\nApr-22\nApr-23\nApr-24\nApr-25\nApr-26\nSemi revenue (US$mn)\nYoY (%)\nSource: WSTS.\nFigure 4: Semi units (monthly) and YoY \nmn, %\n-60%\n-40%\n-20%\n0%\n20%\n40%\n60%\n80%\n100%\n0\n20000\n40000\n60000\n80000\n100000\n120000\nApr-02\nApr-03\nApr-04\nApr-05\nApr-06\nApr-07\nApr-08\nApr-09\nApr-10\nApr-11\nApr-12\nApr-13\nApr-14\nApr-15\nApr-16\nApr-17\nApr-18\nApr-19\nApr-20\nApr-21\nApr-22\nApr-23\nApr-24\nApr-25\nApr-26\nOverall Semi units (Mn)\nYoY (%)\nSource: WSTS.\nFigure 5: Semi ASP and YoY  \nUS$, %\n-40%\n-20%\n0%\n20%\n40%\n60%\n80%\n100%\n -\n 0.20\n 0.40\n 0.60\n 0.80\n et of exceeding US$100bn, with further substantial \ngrowth into FY28. On program cadence, management highlighted multi‑year, \nmulti‑GW ramps across Google (multi‑generation TPUs plus AI networking \nunder a long‑term agreement), Anthropic (additional TPU‑based compute \nbeginning 2027), OpenAI (production in late 2026 with contractual \ndeployments in 2027), and Meta (MTIA XPU partnership; initial 1GW order \nwith deliveries starting 2H27). Management also referenced another two \ncustomers (ByteDance and SoftBank/ARM, based on our supply chain checks) \nwith shipments starting in late 2026 and accelerating into 2027, with purchase \norders to date cited at ~US$6bn. Broadcom’s lack of numerical upside to 2027 \nguidance, while TPU ests have moved up and Mediatek pulling in its ASIC \nguidance ahead by a year is likely to be seen as a concession of meaningful \nshare loss within the TPU program, in our view.\n•\nTPU supply diversification acknowledged by the management; positive \nfor Mediatek: Management acknowledged that, despite a very substantial \nlong‑term commitment under the Google agreement, Google is likely to \nmaintain some diversity of sources for its TPU/AI compute stack. This is \nconsistent with MediaTek’s collaboration with Google on TPU (v8t Zebrafish \nand upcoming v9 Humufish) and the potential for Marvell to cooperate with \nGoogle on an LPU‑like chip. Longer term, we believe it could become the norm \nfor large CSPs to engage 2–3 back‑end design service vendors, driven by: (1) \na broader set of product types (AI accelerators, AI CPUs, LPU-like, etc.); and \n(2) customers experimenting with different commercial structures (e.g., \nsemi‑CoT vs. full CoT) as their front‑end design capabilities mature. In this \ncontext, we see MediaTek and Alchip as key potential beneficiaries as CSPs \nmove towards CoT / semi-CoT models, given their structurally lower margin \nprofiles (40%+/teens% GM for MediaTek/ Alchip) versus turnkey service \nvendors with front-end design services (60+% GM).\n•\nAI bookings >$30bn; visibility extended into 2028: Management disclosed \nAI semiconductor bookings of over US$30bn in the quarter, noting customers \nare pulling orders forward due to long lead times—not only for wafers and \nmemory (HBM/DRAM), but also for power readiness. Importantly, \nmanagement said visibility now extends into 2028, adding that Broadcom is \ncomfortable securing supply for 2026–27 and is already working on 2028–29. \nThis aligns with our Asia supply‑chain checks that 3–5Y LTAs are increasingly \nin place across key bottlenecks such as substrates, HBM, and CCL, while \nleading‑edge wafers still remain on annual negotiation cycles. We therefore \nhave higher confidence that key supply constraints could persist through 2027 \nand potentially into 2028. Key beneficiaries, in our view, will be TSMC, ASE, \nSK Hynix, Samsung, Unimicron, Ibiden, and EMC.\nSee page 3 for analyst certification and important disclosures, including non-US analyst disclosures.\nAsian Tech\nKey takeaways from Broadcom’s Apr-Q results\n--- 第2页 ---\n2\nGokul Hariharan AC\n(852) 2800-8564\ngokul.hariharan@jpmorgan.com\nAsia Pacific Equity Research\n04 June 2026\nJ P M O R G A N\n•\nStrong Networking performance (now ~40% of AI revenue): Networking/\ninterconnect is a key theme at 2026 Computex Taipei (June 2-5), supported by strong \ndemand for high‑bandwidth data transmission as agentic AI drives larger scale-up, scale-\nout domains. Broadcom indicated networking represented nearly 40% of 2Q AI revenue, \nreflecting strong attach of switching/SerDes/connectivity content across both its custom \nXPU and non‑XPU products. That said, management suggested the ~40% mix is likely \nelevated and could normalize closer to ~30% over time as XPUs ramp faster in the next \nfew quarters. On products, management emphasized leadership in scale‑up copper/\nSerDes and switching, including over 1 year shipments of the 100Tb Ethernet switch \n(Tomahawk 6), and highlighted optics/CPO building blocks (1.6T DSPs, CW/EML \nlasers) positioning Broadcom as the industry standard. Management also noted that the \nnext‑generation 200Tb switch is planned to tape out this quarter. We expect networking \nto remain an increasingly important investor focus. While CPO is a key long‑term topic \nas copper approaches its limits, Broadcom appears to be still more conservative on CPO \nramp, aligned with the ramp schedule for ASIC customers (likely two years later than \nNVDA, in our view).  \n•\nNon-AI semi improving; margins are mix-driven while operating leverage holds: \nOutside AI, management highlighted non‑AI semiconductor revenue of US$4.2bn (+6% \nYoY) and bookings above US$6bn as early signs of a cyclical recovery, and guided for \n3Q non‑AI semiconductor revenue to improve sequentially to ~US$4.5bn (+12% YoY). \nOur Asia supply‑chain checks echo Broadcom’s commentary, with mainstream seeing \nsome momentum supported by: (1) a gradual recovery in auto and industrial; (2) an AI \ncrowd‑out effect that is tightening capacity in mainstream; and (3) rising AI‑adjacent \ndemand (e.g., PMIC). We believe the latter two drivers could support stronger \nmomentum as pricing improves under tighter S/D, benefiting mature foundries such as \nVIS, OSATs such as ASE, and passive component vendors such as YAGEO and Murata. \nBroadcom (AVGO US, OW) is covered by J.P. Morgan US analyst Harlan Sur.\n--- 第3页 ---\n3\nGokul Hariharan AC\n(852) 2800-8564\ngokul.hariharan@jpmorgan.com\nAsia Pacific Equity Research\n04 June 2026\nJ P M O R G A N\n Companies Discussed in This Report (all prices in this report as of market close on 04 June 2026, unless otherwise indicated)\nASE Technology Holding Co Ltd(3711.TW/NT$593.00/OW), Alchip Technologies(3661.TW/NT$4,340.00/OW), Broadcom \nInc(AVGO/$479.23[03 June 2026]/OW), Elite Material Co(2383.TW/NT$4,830.00/OW), Ibiden (4062)(4062.T/¥21,940[03 June \n2026]/OW), MediaTek Inc.(2454.TW/NT$4,430.00/OW), Mu
