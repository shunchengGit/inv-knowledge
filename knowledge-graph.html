 S1730522100001\nCherry Liu\n(86-21) 6106-6200\nye.liu@jpmorgan.com\nSAC Registration Number: S1730521090001\nJ.P. Morgan Securities (China) Company \nLimited\nSee page 13 for analyst certification and important disclosures, including non-US analyst disclosures.\nwww.jpmorganmarkets.com\nOn an estimated ~40% unit CAGR for the China indigenous AI chip fabless sector \nover 2026-30, we believe tier-2 suppliers with: 1) secured foundry supply, and 2) \npotential cloud service provider (CSP) client breakthrough could outperform. We \ninitiate coverage of Iluvatar CoreX with an OW rating (link), as we believe the \ncompany is less constrained by supply and could benefit from the prefill/decode \n(P/D) disaggregation trend. We also like MetaX (link), which adopts a fully \nlocalized supply chain and benefits from China government-sponsored AI \napplications. However, given its stretched valuation, we recommend waiting for a \nbetter entry point and we initiate coverage with a Neutral rating. \nвҖў Indigenous AI chip demand set to soar. Based on our token assumptions, with \nthe added uncertainties of US AI chip supply, we expect China indigenous AI \nchip demand (units) to hit a c.40% 5-year CAGR by 2030. With superior single \nchip performance and local foundry capacity, we believe tier-1 suppliers could \nbe imminent substitutes for US AI chips, while select tier-2 suppliers could \noffer higher sales growth, with an elaborate product strategy and \ninference/application focus. \nвҖў Supply is a key bottleneck. Global advanced foundry services have been \nsignificantly disrupted since 1H25 with US export controls/regulations. The \nimpact on tier-2 AI chip fabless has been more severe with limited local foundry \ncapacity for advanced node. Most tier-2 suppliers have had to leverage existing \ninventory to fulfill demand in the next 6-12 months; product and supply chain \nstrategy are key factors for longer-term sales growth, in our view. \nвҖў CSP client breakthrough a pivotal driver. Tier-2 suppliers are more focused \non government-sponsored AI projects currently, such as local government AIDC \nand smart city. As top CSPs have not yet deployed tier-2 AI chips substantially, \ndesign-wins for CSP clients could drive higher growth potential for select tier-2 \nplayers, in our view. \nвҖў Iluvatar CoreX our top pick. With efficient architecture design, we believe \nIluvatar CoreX can not only secure chip supply, but also benefit from the P/D \ndisaggregation trend and break into the supply chain of the top CSPs. MetaX is \nbetter positioned in government-sponsored projects, thanks to its sufficient \ninventory and fully localized supply chain. The sector is currently trading at 27x \n2027E P/S on average, based on consensus estimates. We initiate coverage of \nIluvator CoreX at OW with a Jun-27 PT of HK$620 (based on 20x forward P/S), \nand we initiate coverage of MetaX at Neutral with a Jun-27 PT of Rmb550 \n(based on 30x forward P/S). \nTable 1: Equity ratings and Price Targets\nTicker\nCompany name\nRating\nPrice target (Jun-27)\nShare price\nUpside/Downside (%)\n9903 HK\nILUVATAR COREX\nOW\nHK$620.00\nHK$219.80\n182%\n688802 CH\nMETAX\nN\nRmb550.00\nRmb599.87\n-8%\nSource: Bloomberg Finance L.P., J.P. Morgan estimates. Iluvatar CoreX price as of 02 Apr 2026 and MetaX price as of 07 Apr 2026\n--- з¬¬2йЎө ---\n2\nAsia Pacific Equity Research\n07 April 2026\nBilly Feng\n(86-21) 6106 6359\nbilly.feng@jpmorgan.com\n    \n    \n    \nTable of Contents\nInvestment Thesis.....................................................................3\nIndigenous AI chip demand is set to ramp ...................................................................3\nTwo types of indigenous AI chip fabless .....................................................................4\nSupply is the key bottleneck, in the short to mid term .................................................5\nBreakthrough at CSP clients a pivotal growth driver...................................................7\nInitiate coverage of China AI chip fabless sector.........................................................9\nIluvatar CoreX is our top pick ....................................................................................10\n--- з¬¬3йЎө ---\n3\nAsia Pacific Equity Research\n07 April 2026\nBilly Feng\n(86-21) 6106 6359\nbilly.feng@jpmorgan.com\n    \n    \n    \nInvestment Thesis \nIndigenous AI chip demand is set to ramp\nPost the crowded IPOs of Chinese AI chip companies over the past 3-4 months, we \nbelieve we are now in the phase of commercialization or industrialization of \ndomestic GPUs or AI ASICs, given the intensive expected investment in AI \ninfrastructure. \nWe believe soaring token consumption in China is a substantial demand driver for \nindigenous AI chips. Our JPM Internet team is forecasting (link) China token \nconsumption to show an approximately 330% CAGR over 2025-30, driven by: 1) \npenetration rises across both consumer users and enterprise workloads, and 2) use case \nexpansion from conversational AI toward agentic and multimodal output (increasing \ntokens per session). \nWe believe the rapidly rising token consumption is largely driven by inference, and \nthe incremental demand from training should be marginal (increasing parameters and \nmultimodal as key catalysts). Based on our token demand forecasts, we derive our \nchip demand forecasts suggesting a ~40% CAGR for AI chip unit demand over \n2026-30E. \nSuch AI chip unit demand is based on our throughput assumption per processor (i.e. \ntokens per second per TFLOPS to increase from 1.0 in 2025 to 3.3 in 2030), with a \nspecific service level for inference (e.g. 20 tokens/second output with a batch size of \n128 and KV Cache Length of 4,096). Meanwhile, the other key underlying \nassumptions include: 1) single compute die per AI chip, 2) steady compute die \nperformance improvement in coming years, and 3) an increasing utilization rate of \nChina AIDC capacity. \nFigure 1: China inference token demand (annual) \nTn\nSource: National Data Administration (24 Mar 2026), J.P. Morgan estimates. \nFigure 2: Incremental AI chip demand (annual basis)\nk units\nSource: J.P. Morgan estimates. \n0\n500,000\n1,000,000\n1,500,000\n2,000,000\n2,500,000\n3,000,000\n3,500,000\n4,000,000\n4,500,000\n2025E\n2026E\n2027E\n2028E\n2029E\n2030E\n0\n2,000\n4,000\n6,000\n8,000\n10,000\n12,000\n14,000\n16,000\n2025E\n2026E\n2027E\n2028E\n2029E\n2030E\n--- з¬¬4йЎө ---\n4\nAsia Pacific Equity Research\n07 April 2026\nBilly Feng\n(86-21) 6106 6359\nbilly.feng@jpmorgan.com\n    \n    \n    \nTwo types of indigenous AI chip fabless\nWe categorize China indigenous AI chip fabless companies into two groups: \nTier-1 suppliers: The revenue size is approaching ~Rmb10bn in 2026E, with \nexisting sales exposed to ChinaвҖҷs top CSPs (i.e. Alibaba, Tencent and Bytedance). \nWe believe there are 4 players in tier-1: Huawei, Cambricon, Kunlunxin, and T-\nHead. \nTier-1 suppliers hold some advantages: 1) higher single chip performance (Huawei, \nCambricon); 2) capacity support from local/global foundries (Huawei, Cambricon, \nKunlunxin); and 3) relationships with top CSPs (Kunlunxin, T-head). With the \nuncertainties of US AI chip supply, tier-1 suppliers are set to substitute US chips \nimminently, in our view. \nTier-2 suppliers: The revenue base is relatively low for tier-2 suppliers, and they \nhave limited exposure to China top CSPs. Companies in this group include: Biren, \nMetaX, Iluvatar CoreX, Moore Threads and Enflame. \nFigure 3: Comparison of performance and interconnection \nSource: Company websites (03 Apr 2026), IPO prospectus (03 Apr 2026), J.P. Morgan. \nFigure 4: Revenue size of key AI chip vendors in China\nRmb mn\nNote: 2025(E) for Cambricon, Moore Threads, MetaX, Biren and Iluvatar CoreX, and \n2024 for Enflame\nSource: 2025 annual reports (Cambricon, MetaX), Public filings (Moore Threads, Biren, \nlluvatar CoreX, 03 Apr 2026), IPO prospectus (Enflame, 03 Apr 2026).\nChips of tier-2 suppliers are currently more exposed to government-sponsored and \napplication-specific projects, such as local government AIDCs, and traffic control or \nhealthcare applications, finance and research institutions. These chips are largely \nadopted for inference loadings, in our view. \nWe believe tier-2 suppliers are facing greater challenges after international foundries \nsuspended services for advanced node in 1H25, owing to limited availability of \nadvanced node capacity from local foundries. We believe most tier-2 suppliers are \nlikely to rely on existing inventory to fulfill customer demand in the next 6-12 months. \nIn the longer term, we believe product and supply chain strategy will be pivotal: \nselected tier-2 suppliers could break into the supply chain of the top CSPs and deliver \nmuch higher sales growth. \nNVIDIA A100\nNVIDIA H100\nNVIDIA H200\nHuawei Ascend \n910C\nCambricon MLU 590\nKunlunxin P800\nMetaX C550\nMoore Threads \nS4000\nHygon BW1000\n0\n100\n200\n300\n400\n500\n600\n700\n800\n900\n1,000\n0\n200\n400\n600\n800\n1,000\n1,200\n1,400\n1,600\n1,800\nInterconnect bandwidth (GB/s)\nFP16 performance (TFLOPS)\n0\n1,000\n2,000\n3,000\n4,000\n5,000\n6,000\n7,000\nCambricon\nMoore Threads\nMetaX\nBiren\nIluvatar CoreX\nEnflame\n--- з¬¬5йЎө ---\n5\nAsia Pacific Equity Research\n07 April 2026\nBilly Feng\n(86-21) 6106 6359\nbilly.feng@jpmorgan.com\n    \n    \n    \nSupply is the key bottleneck, in the short to mid term\nGiven Chinese AI chip companies only have limited access to advanced capacity \noverseas, especially under certain transistor density or technology nodes, they have \nno choice but to transfer chip production to local leading-edge foundries such as \nSMIC (0981 HK) or at least to prepare indigenous supply chain locally. However, \nthe existing advanced capacity for GPU/ AI ASICs has been largely occupied by \nHuawei Ascend and Cambricon, based on our supply chain checks. \nDue to the difficulty of building leading-edge capacity and inferior production yields, \nwe believe the availability of wafer fabrication would be the key bottleneck at the \ncurrent stage. Also, a lack of critical equipment such as Extreme Ultraviolet (EUV) \nlithography system, inspection and metrology caused the longer learning curve and \nthen slower capacity ramp-up; our supply chain checks suggest tier-2 players were \nonly able to initiate the tape-in process at leading-edge tech node by late 2025, hence \nsignificant shipments of local-produced chips should be expected from 2H26 \nonwards. \nConsidering both exponential (inference) demand and likely restrained overseas \nsupply, we expect domestic AI computing chips to remain a seller's market for the \nnext 6 to 18 months, under a progressive release of fab capacity locally (assumed). \nWith that said, we believe chip players with a high inventory buffer could be \npreferred by customers in the near term. Meanwhile, we have observed that many \ncompanies have prepared high inventory (comparable to revenue) to ensure smooth \nand timely delivery to customers. \nFigure 5: Inventory vs revenue of key AI chip companies \nRmb mn\nNote: 3Q25/9M25 for Moore Threads and Enflame; 2025 for Cambricon, MetaX, Biren and Iluvatar CoreX \nSource: 2025 annual reports (Cambricon, MetaX), Public filings (Moore Threads, Biren, lluvatar CoreX, 03 Apr 2026), IPO prospectus \n(Enflame, 03 Apr 2026). \nAvailability of foundry (or domestic) capacity is the foundation for the mid term \n(12-24 months) or long term\nMany of the US restrictions on China or Chinese entities to access advanced \nsemiconductor products date back to 2022, and the main constraints include: 1) \nleading-edge wafer fabrication, 2) key equipment or materials for advanced tech \nnodes, and 3) the procurement of advanced \nвҖҰ(жҲӘж–ӯ)", "n58": "### 2026-06-12-JPMorgan-Semiconductors April WSTS Growth Accelerates Again, Driven ...-122546555.pdf  (жҖ»йЎөж•°=11)\n\n--- з¬¬1йЎө ---\nNorth America Equity Research\n11 June 2026\nJ P M O R G A N\nwww.jpmorganmarkets.com\nSemiconductors & Semiconductor \nCapital Equipment / IT Hardware\nHarlan Sur AC\n(1-415) 315-6700\nharlan.sur@jpmorgan.com\nMayur Ramdhani\n(1-212) 622-1664\nmayur.ramdhani@jpmorgan.com\nJ.P. Morgan Securities LLC\nWSTS semiconductor industry data was published for the month of April 2026. \nAfter an 88% Y/Y increase in industry sales in March 2026 (up 25% Y/Y ex. \nmemory), April industry sales growth accelerated to +106% Y/Y (up 33% Y/Y \nex.memory). On an M/M basis, after a 14% M/M increase in sales in March(+12% \nM/M ex. memory), April industry sales declined 2.2% M/M (-0.7% M/M ex. \nmemory). Overall units (ex-discretes) declined 4% M/M (+24% Y/Y), while \npricing climbed 1.8% M/M (and was up 70% Y/Y вҖ“ a step-up relative to +62% Y/Y \nin March). Memory pricing improved materially again in April, with DRAM up \n55% M/M and flash up 41% M/M, while analog was essentially flat (below \nhistorical +LSD% M/M trends) and MCU up ~2% M/M (~better than typical -\nLSD-MSD%). Unit shipment growth of -2% M/M was ahead of seasonal trends, \ndriven by better-than-typical sequential performance in analog, MCU, MPU and \nflash, but offset by moderately below-seasonal growth in DRAM. On a trailing \n3-month basis, semis revenue grew +29% Y/Y  вҖ“ a slight uptick from +28% Y/Y \nin March. With significant momentum coming out of Q1, even if we were to \nassume Q2/Q3/Q4 growth rates in line with historical seasonal trends (highly \nconservative, in our view), full-year industry sales would be up ~80% Y/Y, and in \nthe range of $1.4-1.5T (representing 5/10-yr CAGRs of ~20%/~16% for the \nindustry). Overall, growth trends are consistent with post-Q1 commentary from \nsemis companies under our coverage, indicating further uplift in demand \nmomentum, with bookings, backlog, and customer escalations continuing to build \nin the weeks since the companiesвҖҷ Q1 prints (as we highlighted in our TMC \nconference takeaways report). Against this backdrop, we see continued support for \nour 2026 sector/stock outlook thesis that calls for outsized growth in industry \nrevenue, underpinned by continued momentum in AI spending that broadly \nbenefits the semis value chain, with providers of accelerated compute, memory and \nnetworking being most favorably levered to incremental growth in spending. We \nalso continue to anticipate improvements in cyclical trends across most end \nmarkets, aided by a much healthier customer and channel inventory environment, \nthough we remain cognizant of potential negative impacts of elevated memory \npricing and supply shortages on demand within consumer/client-levered end \nmarkets (see our global teamвҖҷs latest memory update here).\nSee page 6 for analyst certification and important disclosures.\nSemiconductors\nApril WSTS: Growth Accelerates Again, Driven by \nContinued Cyclical  Momentum, AI Spending Strength \nand Favorable Pricing Dynamics; Stay OW the Group\n--- з¬¬2йЎө ---\n2\nHarlan Sur AC\n(1-415) 315-6700\nharlan.sur@jpmorgan.com\nNorth America Equity Research\n11 June 2026\nJ P M O R G A N\nTable 1: Total Semiconductor MoM Summary\n$ in billions, %, $/unit\nApr-26\nMar-26\nActual\nSeasonal\nActual\nSales\n113.7\n116.2\nMoM\n-2.2%\n-14.5%\n14.4%\nYoY\n106.4%\n12.1%\n88.1%\nSales - 3M roll avg.\n110.5\n99.5\nYoY\n93.9%\n79.1%\nUnits\n53.4\n55.5\nMoM\n-3.7%\n-0.4%\n18.5%\nYoY\n23.7%\n9.1%\n18.5%\nASP\n2.07\n2.04\nMoM\n1.8%\n-7.0%\n-3.8%\nYoY\n69.9%\n2.8%\n61.8%\nSource: SIA Bluebook and J.P. Morgan estimates. Ex-discretes. Seasonal average since 1992.\nTable 2: Total Semiconductor Ex-Memory MoM Summary \n% Change\nApr-26\nMar-26\nActual\nSeasonal\nActual\nSales\n57.2\n57.6\nMoM\n-0.7%\n-10.5%\n11.9%\nYoY\n33.0%\n7.0%\n24.9%\nSales - 3M roll avg.\n53.7\n53.7\nYoY\n24.6%\n27.6%\nUnits\n48.9\n51.0\nMoM\n-4.2%\n-7.0%\n18.9%\nYoY\n20.6%\n6.4%\n17.8%\nSource: SIA Bluebook and J.P. Morgan estimates. Ex-discretes. g 1-800-477-0406, or e-mailing research.disclosure.inquiries@jpmorgan.com with your \nrequest.\nExplanation of Equity Research Ratings, Designations and Analyst(s) Coverage Universe: \nJ.P. Morgan uses the following rating system: Overweight (over the duration of the price target indicated in this report, we expect this stock will \noutperform the average total return of the stocks in the Research AnalystвҖҷs, or the Research AnalystвҖҷs teamвҖҷs, coverage universe); Neutral (over \nthe duration of the price target indicated in this report, we expect this stock will perform in line with the average total return of the stocks in the \nResearch AnalystвҖҷs, or the Research AnalystвҖҷs teamвҖҷs, coverage universe); and Underweight (over the duration of the price target indicated\nвҖҰ(жҲӘж–ӯ)", "n59": "### 2026-06-01-Morgan Stanley-Semiconductors Takeaways from our meetings in Taiwan-122325978.undefined.pdf  (жҖ»йЎөж•°=12)\n\n--- з¬¬1йЎө ---\nM\n Update\nSemiconductors  | North America\nTakeaways from our meetings in \nTaiwan\nMeetings at and adjacent to our AI summit bolster our positive \nviews on NVDA,  AVGO, and memory.  NVDA remains our top pick \nheading into the second half product cycle.  \nMorgan Stanley & Co. LLC\nJoseph Moore\nEquity Analyst\n Joseph.Moore@morganstanley.com  \n  +1 212 761-7516 \nMorgan Stanley Taiwan Limited+\nCharlie Chan\nEquity Analyst\n Charlie.Chan@morganstanley.com  \n  +886 2 2730-1725 \nMorgan Stanley & Co. LLC\nMason Wayne\nResearch Associate\n Mason.Wayne@morganstanley.com  \n  +1 212 761-6012 \nShane Brett\nEquity Analyst\n Shane.Brett@morganstanley.com  \n  +1 212 761-1022 \nNicole Kozhukhov\nResearch Associate\n Nicole.Kozhukhov@morganstanley.com  \n  +1 212 761-1636 \nElla Tulchinsky\nResearch Associate\n Ella.Tulchinsky@morganstanley.com  \n  +1 212 761-2222 \nSemiconductors\nNorth America\nIndustry View\nAttractive\nThe NVIDIA Rubin ramp is proceeding on schedule.  There was an implementation \ndelay of a few weeks earlier, that we wrote about in our NVIDIA preview, but there \nis basically no impact to the ramp of the silicon, and we see a robust ramp through \nyear end in line with the schedule. This shouldn't be controversial as management \nsaid it, but there continue to be persistent stories of a respin, or of a slower than \nexpected ramp, or an HBM3e version of Rubin - and none of those stories appears to \nbe correct. Per checks in multiple points of the supply chain, that is not the case.  \nPerformance of the chip looks strong, though as normal the first iteration can be \noptimized, but there are zero indications of the types of ramp challenges at the rack \nlevel that the company saw with Grace Blackwell.  We continue to hear that Vera \nRubin will be the performance leader with the lowest cost per token.  Could there be \nincremental delays?  Of course, but stories of a major delay are not in evidence.  \nBlackwell production is also reaccelerating.  Blackwell production end of life \nappears to have been deferred by a few months, and builds of Blackwell are higher \nthan our initial expectations.  Our sense is that this reflects stronger demand, with \nRubin supply limited at previous forecasts and still strong demand for what will \nsoon be trailing edge Blackwell. \nThe $20 bn NVIDIA CPU target seems reasonable, based on the data points that \nwe heard.  NVIDIA made the surprising claim on the earnings call that they will do \n$20 bn of CPU revenue this year - making them among the market leaders.  This was \nmet with mostly skepticism, and claims that the $20 bn included memory or other \nproducts.  Management assured us that this is no the case.  We estimate that roughly \n$10-12 bn of the CPU revenue comes from the head node, which admittedly has \nsomething of an arbitrary price point (most of the head node CPUs are sold as part \nof a card solution including two GPUs, one CPU, one NVswitch, and memory, and the \nprice points do not disaggregate).  This would imply another $7-10 bn of standalone \nGrace or Vera revenue this year, a surprising number - but one that was \ncorroborated by multiple contacts who indicated that NVIDIA could get multiple \nMorgan Stanley does and seeks to do business with \ncompanies covered in Morgan Stanley Research. As a result, \ninvestors should be aware that the firm may have a conflict of \ninterest that could affect the objectivity of Morgan Stanley \nResearch. Investors should consider Morgan Stanley \nResearch as only a single factor in making their investment \ndecision.\nFor analyst certification and other important disclosures, \nrefer to the Disclosure Section, located at the end of this \nreport.\n+= Analysts employed by non-U.S. affiliates are not registered \nwith FINRA, may not be associated persons of the member \nand may not be subject to FINRA restrictions on \ncommunications with a subject company, public appearances \nand trading securities held by a research analyst account. \nKey Takeaways\nNVDA data points remain very strong, with product cycles set up nicely for Rubin, \nVera Rubin, and Vera.\nAMD and Intel continue to see strong server CPU trends; we see AMD as a share \ngainer between the two\nMemory remains very robust \nJune 1, 2026 04:01 AM GMT\n--- з¬¬2йЎө ---\nM\n Update\n2\nbillions in standalone CPUs from each of the 6 announced customers.  There isn't \nmuch supply of merchant ARM servers away from NVIDIA and the proven \nperformance of Grace and Vera makes it an attractive option with available supply.\nTo us this continues to point to a CPU shortage that seems less severe than the \nDRAM shortage, as we see multiple instances of servers being deployed with less \nthan the desired amount of DRAM.  We think that CPU vendors should be careful \nabout raising prices too much and pushing more business outside of the x86 \necosystem. \nIntel's Panther Lake is an important proof point for 18A, but the longer term \ncompetitive dynamic of its foundry business remains murky.  18A is clearly on \nstronger footing, with Intel building its notebook Panther Lake chip on the node \nwith yields that are continuing to improve - below economic targets but at levels \nconsidered reliable.  But it's still our sense that some of the most critical parts of the \nroadmap are still likely to move to TSMC (covered by Charlie Chan), including \ndesktop parts but longer term potentially including the Rapids versions of the \nserver parts.  Coral Rapids for next year is on 18AP, but beyond that there may still \nbe better performance available from TSMC.  Further, while there continue to be \ncompelling EMIB opportunities, we did hear that there is still some uncertainty from \nEMIB-T users who are considering TSMC a plan B, given various challenges.  \nWe continue to see the most important element of the Intel story as the server \nroadmap, rather than foundry/optionality opportunities.  That said, we likely see \nenough progress to keep the foundry alive, with a clear ability to beat-and-raise near \nterm given server CPU shortages.\nAMD continues to be in a potential share gain position in CPU within x86.  \nCustomers report that  AMD has seen like for like price increases in server CPUs, but \nby less than Intel and ARM alternatives.  2 nm product Venice will start to ramp in \n2h, which customers say is expensive but offers very strong performance, and we \nnote that 5 and 7 nm products are also very competitive.  Customers say that most \nof 2026 supply is allocated at this point with visibility building for next year.\nIn terms of data center GPU, general supply chain confidence in mi455 is high, \nthough we have not yet heard direct reports from customers who have just started \nto evaluate racks.  We would expect new customers at the launch event in July.  \nWe continue to see a strong AVGO ramp of the Tensor Processing Unit (TPU) \nthrough next year- and feel confident about potential competition with \ncustomer owned tooling/Mediatek alternatives.  TPU is of course the custom ASIC \nbuilt for Google (covered by Brian Nowak).  In describing its long term served \navailable market, the company has said that the biggest longer term risk would be \nits ASIC customers developing lower cost ASICs through \"customer owned tooling\", \nor working with less expensive suppliers; to that end, Google has been working with \nMediatek (covered by Charlie Chan) to develop a lower cost version, starting as \nsoon as next year.  The impact of this has become a debate, even within our own \nresearch team.  AVGO has said that they intend to maintain a significant majority \nshare of this business over time.\nWe continue to expect AVGO to maintain 80%+ share of its ASIC customers over\n--- з¬¬3йЎө ---\nM\n Update\nMorgan Stanley Research\n3\ntime, and we note that this is actually consistent with Mediatek's articulated \nstrategy of achieving 15-20% share long term.  While Mediatek is making progress, \nwe continue to see potential startup issues, and we note that some of the desired \ncost savings in commodity purchasing - in particular, purchasing of high bandwidth \nmemory without paying AVGO a pass through revenue  - could be challenging as \nopen market HBM prices are much higher than AVGO's previously agreed upon \ncontracts.  From our standpoint, the current state of readiness feels consistent with \nthe 80/20 split over the next couple of years.  We should note that our Mediatek \nteam feels differently and continues to look for majority share by the 2028 time \nframe; its a debate, and not one that can be resolved for certain until the silicon is \nout.\nMemory shortages will persist for some time, as expected.  As we have been \nhighlighting over the last couple of months, memory remains a major bottleneck - \nand in many cases the key bottleneck - to AI buildouts.  That's starting to feel priced \ninto stocks at current levels, and we might look for another buying opportunity such \nas we saw 8-10 weeks ago - as the canaries in historic coal mines may not matter \nnow - but we are here to report that shortages are likely to continue for the \nforeseeable future.\nIn terms of the question of 3q pricing, it remains unclear, as negotiations have not \nbegun in earnest, but most of the supply chain contacts that we talked to expected \nprices to be up 20% or more.  Suppliers simply feel no urgency to negotiate prices \ngiven the very clear upward bias.  There is absolutely no sense that this points to any \nsort of equalization.\nWe think that long term agreements are important, mostly as a signalling \nmechanism around how customers feel about memory supply/demand; we don't \nreally think that a multi year agreement provides multi year assurance, and our \nfocus remains visibility into supply/demand balance.\nWe continue to have modest preference for DRAM vs. NAND, feeling that DRAM is a \nbit more of  specific bottleneck while customers have been able to get ahead of \nNAND in some cases, but we wouldn't overstate that - both commodities are seeing \nrecord shortages, and of course NAND has a much better supply side dynamic given \nlimited capex.\n--- з¬¬4йЎө ---\nM\n Update\n4\nValuation Methodology and Risks\n Advanced Micro Devices (AMD.O)  \nOur $360 PT for AMD equals ~37x base case FY2027e MWEPS of $11.10, reflecting further \nshare gains at the expense of Intel, and 77% y/y growth in datacenter (~100% in AI)\n Risks to Upside  \nn Datacenter GPU outperforms expectations, closing the gap with Nvidia\nn PC and server share gain accelerates; Intel&#39;s competitive response is less \nimpressive than expected\nn Server refresh drives datacenter revenue above expectations\n Risks to Downside  \nn Intel&#39;s server CPUs in 2027 stifle AMD&#39;s momentum and allow it to regain \nshare\nn AMD loses graphics share to NVIDIA\nn Datacenter GPU underperforms expectations\n Broadcom Inc. (AVGO.O)  \nWe value AVGO at 28X CY2027e ModelWare EPS of $17.33. This is roughly 25x non-GAAP EPS \nof $19.34, and reflects a slight premium over AI peers that accounts for their outsized AI \ngrowth potential and long-term prospects in ASICs.\n Risks to Upside  \nn Stronger AI revenues\nn Faster recovery in core semis businesses\nn Realized VMware synergies\n Risks to Downside  \nn Lose networking share to Nvidia (Mellanox)\nn ASIC chips are uncompetitive; lose customers to competitors \nn Execution on VMware acquisition\n Intel Corporation (INTC.O)  \n~42x EPS CY2027 EPS of $1.73, 42x is above the  high end of the large cap logic semi peer \ngroup, reflecting high leverage potential on numbers that are still depressed, and foundry \noptionality, despite our longer term skepticism\n Risks to Upside  \nn Foundry partnerships de-risk the story and further improve the multiple \nn The company regains lost share in desktop and server following CPU shortages\n Risks to Downside  \nn AMD competition increasingly becomes more significant, which could lead to further \nshare losses in processors and pressure on ASPs\n--- з¬¬5йЎө ---\nM\nвҖҰ(жҲӘж–ӯ)", "n60": "### 2026-06-15-Morgan Stanley-Semiconductors Takeaways from public company meetings on ou...-122580650.undefined.pdf  (жҖ»йЎөж•°=12)\n\n--- з¬¬1йЎө ---\nM\n Update\nSemiconductors  | North America\nTakeaways from public \ncompany meetings on our bus \ntour\nWe summarize positive meetings with CEOs of ALAB, MRVL,  \nINTC. \nMorgan Stanley & Co. LLC\nJoseph Moore\nEquity Analyst\n Joseph.Moore@morganstanley.com  \n  +1 212 761-7516 \nMason Wayne\nResearch Associate\n Mason.Wayne@morganstanley.com  \n  +1 212 761-6012 \nShane Brett\nEquity Analyst\n Shane.Brett@morganstanley.com  \n  +1 212 761-1022 \nNicole Kozhukhov\nResearch Associate\n Nicole.Kozhukhov@morganstanley.com  \n  +1 212 761-1636 \nElla Tulchinsky\nResearch Associate\n Ella.Tulchinsky@morganstanley.com  \n  +1 212 761-2222 \nSemiconductors\nNorth America\nIndustry View\nAttractive\nALAB\n Management expects content per XPU to continue growing from roughly ~\n$1,000 today as AI infrastructure becomes more interconnect-intensive. The \ncompany is investing across optical, UAL, and NVL, and highlighted that customers \nare increasingly describing AsteraвҖҷs large PCIe switch as an вҖңNVSwitch for the open \necosystem.вҖқ\nWhile  some workloads and protocols will move elsewhere, PCIe is expected to \ncontinue growing for at least the next several years. PCIe remains particularly \nimportant in China, where many AI systems are add-in-card-based and therefore \nPCIe-native. Management sees China as a meaningful opportunity because less \npowerful GPUs require more interconnect, though it does not expect China to be \nlarger than the U.S. in PCIe scale-up.\nFor the emerging UAL opportunity, management is confident in its competitive \nposition but does not think the switch opportunity will be winner takes all. First \ndeployments expected next year, with  a bigger ramp in 2028. \nCXL and memory pooling are still nascent, but management sees growing \nrelevance as inference drives KV-cache offload demand. CXL has not lived up to \nexpectations so far, but management expects revenue in 2027, with both smaller AI \nplatform providers and hyperscalers qualifying systems. Management also noted \ndemand from customers wanting to use DDR4 via CXL to extend server memory \nlifespans as  new CPUs do not support DDR4 directly. \nOn CPO / NPO, management argued that the most important factor is owning a \nswitch product that optics can attach to. Astera demonstrated PCIe 6 over LPO at \nComputex and expects NPO deployments first in 2027. If NPO works, it may push \nout CPO for some customers, while NVDA can move directly to CPO. AsteraвҖҷs \nMorgan Stanley does and seeks to do business with \ncompanies covered in Morgan Stanley Research. As a result, \ninvestors should be aware that the firm may have a conflict of \ninterest that could affect the objectivity of Morgan Stanley \nResearch. Investors should consider Morgan Stanley \nResearch as only a single factor in making their investment \ndecision.\nFor analyst certification and other important disclosures, \nrefer to the Disclosure Section, located at the end of this \nreport.\nKey Takeaways\nALAB remains confident in the scale-up opportunity both short and long term\nMarvell showing new levels of confidence about everything, especially scale-up\nIntel CEO shows commitment to foundry, positive on microprocessors\nPrivate company writeups coming later this week вҖ“ focus on scale-up and low-\nlatency inference \nJune 15, 2026 10:19 AM GMT\n--- з¬¬2йЎө ---\nM\n Update\n2\naiXscale acquisition is expected to generate qualifying revenues in 2027, while CPO \nfor scale-up is more likely a 2028 opportunity at minimum, with perhaps one \ncustomer earlier. The company sees an advantage from having electrical IC, PIC, and \naiXscale capabilities to produce a full optical engine.\nDespite optical enthusiasm, management expects copper to remain relevant \ninside the rack. Many scale-up links are passive today and may only add retimers, \nwhile rack-to-rack connectivity will move to optical because 400G rack-to-rack \ncannot be copper. This transition should be positive for revenues: even if retimer \ncontent is lost when links move to NPO, as the new optical link is materially more \nvaluable. Astera believes its incumbent position in copper links, Cosmos software, \nand broad suite of standard-specific products reduce the risk of share loss.\nStrategically, management contrasted AsteraвҖҷs focus with companies that \nвҖңinvest in everything.вҖқ Astera is focused on areas where it believes it can win, \nincluding a ~$10bn UAL TAM and NVL Fusion content. The company could build \nscale-up Ethernet switches, but customers are currently asking it to focus on PCIe. \nManagement framed the 2030 market as roughly $10bn PCIe TAM and $10bn \nEthernet TAM, with NVL and ICI solutions likely among the largest parts of a \nbroader >$100bn market, though not quantified.\nOn custom silicon, management sees opportunities from new XPUs and NVL \nFusion. The company wants solutions for all major architectures and is willing to do \ncustom I/O. NVL Fusion is its first custom engagement in this category, but \nmanagement noted many more requests. ASIC vendors like AVGO will still have \ninfluence, through COT programs the hyperscaler can enforce their preferred scale-\nup architecture.\nIn-house SerDes development intended to intercept the optical inflection. \nManagement wants to be selective about where it invests in custom SERDES, but \nsees a need around optical, and has the internal team in place. The companyвҖҷs \nphilosophy is to buy IP off the shelf where available to improve opex efficiency, but \nbuild internally when required.\nOur take:  We are OW the stock, and remain very positive heading into the Amazon \nTrainium 3 scale-up ramp in 2h, and see positive prospects to migrate that to \nUALink/NVLink Fusion/optical opportunities longer term, though conceding that the \nstrong run-up in the stock price creates a high bar.  \n---\nMarvell\nMarvell framed the AI opportunity as increasingly interconnect-driven, today \nmost growth is coming from scale-out but there is a significant scale-up / scale-\nacross opportunity still ahead. The companyвҖҷs model contemplates custom \ngrowing from ~$4bn to ~$10bn, legacy segments starting at a~$2.5bn base growing \nroughly with GDP, and ~$10bn of connectivity growing ~70% with no near-term \nslowdown.  Management also noted that none of the potential agentic-AI CPU uplift \nis included in current numbers; more agentic workloads could drive additional NICs, \nCXL, and switches.\n--- з¬¬3йЎө ---\nM\n Update\nMorgan Stanley Research\n3\nThe core message was that MarvellвҖҷs breadth is becoming a competitive \nadvantage. The company positioned itself as one of the few vendors spanning DCI, \ndie-to-die IP, scale-out switching, scale-up switching, optics, SerDes, CXL, NICs, and \ncustom silicon. Management argued this full-stack position matters more as \ncustomers confront constrained supply chains and the complexity of integrating \nswitches, optics, third-party IP, and XPUs.\nOn scale-up, Marvell sees multiple optionality vectors across UAL, ESUN, and NVL \nFusion. Management framed scale-up switching as still up for grabs, but scale-up \noptics as an area where Marvell expects to be number one in merchant solutions. \nThe company also argued that customer preference for non-AVGO alternatives \nshould support MarvellвҖҷs position, particularly where software, silicon, and optical \nintegration matter.\nOn XPUs, management sees the potential for upside to its medium-term targets,  \ncautioned investors  on over-extrapolating supply-chain datapoints.  It continues to \nfocus on higher-margin custom opportunities and believes inference creates more \nshots on goal. \nOn supply chain, Marvell says it runs five-year rolling forecasts with suppliers \nand is getting upside, with interconnect providing more flexibility than custom \ncompute. \nOur take:  The enthusiasm and confidence both short and long term are very clear, \nand seem justified to us; however we struggle with the valuation at 2.5x NVDA \nmultiple for a company that has not outgrown NVDA in a long while.\nIntel \nFor new CEO Lip-Bu Tan, the initial priority was cultural now that focus has \nshifted toward finding ways to grow the business and executing on the product \nroadmap.\nIn CPUs, management highlighted the hiring of Alex Katouzian as important for \nimproving low-power competitiveness and deepening Arm-related expertise. \nThere were definite changes to be made to the server roadmap, such as bringing \nback SMT and the P-core / E-core distinction. But management is more confident in \nthe roadmap today, emphasizing that execution is the key variable; if Intel executes, \nmanagement believes the company can stop losing share in roughly nine months. \nAgentic AI should be a long-term driver of CPU demand, suggesting that CPU/GPU \nratios could reach 4:1 in some contexts.  \nThe x86 ecosystem remains an area of strength Intel is leaning into, where there is \npotential in vertical markets where x86 customization creates differentiation, which \nis not something Intel has considered historically. \nLip-Bu has also made the decision to do double down on foundry, believing  that \nthe internal product engine and external foundry business should reinforce each \nother, while external manufacturing remains part of the model where appropriate. \nIntel wants to remain a top-10 TSMC customer, but believes having both internal \nand external options create healthy competitive tension and improve customer \nconfidence.\n--- з¬¬4йЎө ---\nM\n Update\n4\n14A is the critical foundry milestone. Management said all Intel-designed products \nwill move to 14A, and early process indicators are improving. Intel is seeing roughly \n0.5 defect density and ~40% yield, with a goal of reaching 0.1-0.2 defect density by \nQ1 next year. Customer conversations are improving and PDF/KLA support was \nhighlighted as part of the effort to accelerate foundry readiness. The  14A 0.5 PDK is \nout and 0.9 is expected in October. Risk production is framed around 2028 and \nvolume around 2029, broadly comparable to TSMC timing. As an IDM, Intel expects \nto run internal test chips in 2027, which should give the company a proving ground \nbefore external customer volume ramps.\nGiven the shortage at the leading edge, Lip-Bu said the board is now asking Intel to \ninvest more in capex and that the message has been received. The board is more \nconfident than before, but Intel still needs to prove that incremental spend can \ntranslate into customer wins, volume, and margin recovery. Initially, management \nsuggested volume is more important than margin, particularly in foundry, where \nscale and customer confidence are prerequisites.\nOn capacity, Intel said Oregon and Arizona have room to expand, and Ohio will be \naccelerated. Germany has been shut down, but management is now concerned Intel \nmay not have enough capacity if demand continues to improve. TerraFab was \ndiscussed as a potential additional platform, though nothing has been announced.\nManagement also described EMIB as a вҖңsecret weaponвҖқ with strong technology \nand large customer potential, but also meaningful complexity and reliability \nquestions. Individual customer opportunities could be worth billions, but execution \ndepends on building the right team, improving automation, and proving reliability at \nscale.\nManagement sees advanced packaging as a potential bottleneck across the AI \ninfrastructure ecosystem, which could create an opening for Intel if it can execute. \nIntel also noted substrate constraints, including the need to prepay in some cases. \nWe note that our recent Asia checks were a bit mixed on EMIB, and some of the \ncurrent wins being reported have yet to be completely secured.\nThe memory shortage is also a focus area for Intel and its partners. Intel does not \nhave the balance sheet of a company like NVDA to secure DRAM, but management \nsaid the company needs to be more aggressive in this area. \nOur take:  We have missed the move in Intel's stock, largely because of concerns on \nthe road\nвҖҰ(жҲӘж–ӯ)", "n61": "### 2026-06-08-Morgan Stanley-China Industrials Trip Takeaways Stronger, Broader Capex B...-122462764.undefined.pdf  (жҖ»йЎөж•°=20)\n\n--- з¬¬1йЎө ---\nM\n Idea\nChina Industrials  | Asia Pacific\nTrip Takeaways: Stronger, \nBroader Capex Boom \nThe trip strengthened our conviction in the super capex cycle, \nfrom AI hardware equipment to broad equipment and \nautomation, and on upgrade potential for China's advanced \nequipment. We prefer Wuxi Lead, Han's Laser, Hengli Hydraulic, \nSany, Hongfa, Leaderdrive, Neway Valve, and Bochu.  \nMorgan Stanley Asia Limited+\nSheng Zhong\nEquity Analyst\n Sheng.Zhong@morganstanley.com  \n  +852 2239-7821 \nChelsea Wang\nEquity Analyst\n Jinlin.Wang@morganstanley.com  \n  +852 2239-1118 \nCarlos Chai\nResearch Associate\n Carlos.Chai@morganstanley.com  \n  +852 3963-3180 \nChina Industrials\nAsia Pacific\nIndustry View\nIn-Line\nWe  met with  industrial companies  to explore overall demand and key themes:\nвҖў  Automation/robotics/general equipment  companies Leaderdrive/Lens Tech/\nLeadshine/Xinje/OPT/Farsoon/Bozhon Precision/Topstar/One Robotics/\nHuayan Robotics/Zhaowei/Neway Valve \nвҖў AI equipment Han's Laser/Megmeet/GKG Precision/RoboTechnik/Unicomp \nвҖў Battery equipment Wuxi Lead/Hymson, solar equipment Autowell/Maxwell \nвҖў Construction machinery Hengli Hydraulic/Sany/Zoomlion\nOn this trip, we believe companies were very optimistic on the growth outlook on \nthe back of strong orders and optimistic expectation for future orders, supported \nespecially by fast new technology applications. In general, this trip feedback is \nmore positive than our trip in early March, which supported upcycle demand. \n(see key highlights and detailed takeaways in the following sections) \nMorgan Stanley does and seeks to do business with \ncompanies covered in Morgan Stanley Research. As a result, \ninvestors should be aware that the firm may have a conflict of \ninterest that could affect the objectivity of Morgan Stanley \nResearch. Investors should consider Morgan Stanley \nResearch as only a single factor in making their investment \ndecision.\nFor analyst certification and other important disclosures, \nrefer to the Disclosure Section, located at the end of this \nreport.\n+= Analysts employed by non-U.S. affiliates are not registered \nwith FINRA, may not be associated persons of the member \nand may not be subject to FINRA restrictions on \ncommunications with a subject company, public appearances \nand trading securities held by a research analyst account. \nKey Takeaways\nThe two segments most beyond expectations have been AI hardware equipment \nand the Apple supply chain. Battery and semi equipment are also seeing booming \ndemand. \nUnlike prior ones, this AI-driven capex cycle combines massive scale with rapid \ntechnology iteration, driving continuous equipment upgrade demand.\nMost of the companies we met are expanding capacity, widely passing on strong \ndemand to upstream mechanical and electrical products/equipment.\nThe strong upgrade demand strengthens companies' abilities toward more \nadvanced equipment, and also supports margin expansion. \nConstruction machinery demand, especially overseas, is stronger than market \nexpectations on strong infra construction and Chinese brands market share gains.\nJune 8, 2026 12:16 AM GMT\n--- з¬¬2йЎө ---\nM\n Idea\n2\nKey Highlights  \nRobust AI demand remains the strongest cross-segment tor message, with equipment \nsuppliers broadly positive on 2026-27 growth. Domestic companies are benefitting from \nthe global AI supply chain; despite different product offerings, all shared bullish  outlooks \non orders/revenue growth for 2026-27. We think they will benefit from three structural \nchanges: \n1) AI is driving product/equipment upgrades with higher ASP and margin, e.g., Han's \nLaser's ultrafast laser drilling equipment for AI servers, optical modules and TGV. \nMegmeet has noted potential opportunities in the Rubin power shelf, which carry higher \nvalue content and better margins. GKG Precision's  solder paste equipment applied in AI  \nservers has shown significantly higher ASP and gross margin (c.65%)  than other \ndownstream applications. \n 2) Incremental equipment needs from technology iteration and mass production: We \nobserved optical module assembly automation  (to replace labor) being addressed by GKG \nPrecision and Bozhon, as well as testing equipment, including Unicomp's X-ray CT \nequipment for PCB back drilling  inspection, Autowell's AOI equipment for optical \nmodules, etc. \n3) Domestic players will  likely continue to gain market share amid rapid product \nupgrades and delivery,  along with foreign peers' capacity bottlenecks. \nApple supply-chain feedback was stronger than expected, with 2026вҖ“27 innovation \ncycle  supporting solid equipment demand: Apple-related opportunities extend beyond \ntraditional 3C automation into 3D printing, vapor chambers, camera modules, and UTG \nglass, for the foldable  phone this year and six  new phone models next year. We came away \nwith positive expectations  from all equipment/components  companies in the Apple supply \nchain.\nNext-generation technology roadmaps such as SST, HVDC, CPO, glass substrate, solid-\nstate battery were a recurring focus during the trip,  increasingly moving from concept \ndiscussions to early product R&D and customer validation: For example, in  AIDC  power, \nMegmeet has begun HVDC side-car related testing; in optical modules, RoboTechnik has \nearly CPO-related engagement with foreign customers, though it said broader mass \nproduction still looks more likely from 2027 onward. In advanced substrates, Lens, HanвҖҷs \nLaser, and Hymson are all working on TGV/glass-substrate related processes, but the \nindustry supply chain is still immature and pilot-line opportunities appear more likely next \nyear. We understand that investor interest is high in technology upgrades, where we view \ncompetition as likely to ramp up when the new technology is in the mass production \nperiod. We think its still too early to identify clear winners at current stage. \nHumanoids remain an important medium to long term theme, but the companies said \na  US leading company's near-term ramp appears slower than earlier expectations: \nFeedback from Hengli, Leaderdrive, Lens and Bozhon suggested that US leading company's \nprogress is somewhat a bit delayed, with current volume still limited and unlikely to reach \n1k units/week in 4Q, but volume expectations for 2027 are more positive. On the contrary,  \ndomestic humanoid outlook is more active, with component suppliers such as Leaderdrive, \nZhaowei, Xinjie, Leadshine, and Huayan addressing high shipment expectations along with\n--- з¬¬3йЎө ---\nM\n Idea\nMorgan Stanley Research\n3\ncontinuous  capacity expansion. Leading component players should still stand out, \nespecially for harmonic reducers. \nGeneral demand feedback on automation, construction machinery, and battery  \nfundamentals was solid: \nвҖў Automation/robotics: Automation companies addressed strong order momentum \nwith AI-related demand as key growth drivers, such as Leadshine (YTD revenue up \n40%+ y-y) and Xinjie (May orders up 35%+ y-y). \nвҖў Battery equipment: Wuxi Lead indicated 2Q new orders growth are at least in line \nwith, and potentially better than, 1QвҖҷs 60% y-y  growth, with  solid-state, SOFC and \nMLCC equipment  as additional drivers; both Wuxi Lead and Hymson mentioned \nsequential new orders GPM recovery. \nвҖў Construction machinery:  Sany Heavy expects 2Q revenue growth of ~20% y-y \n(incl. overseas 20%+ y-y, domestic ~15% y-y)  and operating profit growth of >40% \ny-y. Zoomlion sees earnings growth accelerating in next  few quarters and maintains \n~Rmb6bn full-year net profit guidance. \nGlobalized capacity is becoming a key competitive differentiator, not just a tariff \nhedge: Several companies highlighted overseas capacity preparation and customer \ndelivery overseas. Megmeet said it is preparing Thailand capacity for Nvidia power \nproducts; Hengli is preparing Mexico screw capacity for US leading company; Zhaowei said \nit has Thailand capacity largely ready for overseas humanoid customers; Topstar said it is \npreparing Vietnam capacity for Apple-related precision equipment; etc. This suggests \nвҖңChina engineering + overseas delivery capabilityвҖқ as a key moat in the AI era, in our \nview.\n--- з¬¬4йЎө ---\nM\n Idea\n4\nDetailed Takeaways  \nHanвҖҷs Laser (002008.SZ, OW) - Positive 2026-27 outlook driven by PCB \nand 3C business \nManagement guided for  Rmb26bn+ revenue in 2026: By segment, consumer electronics \nrevenue is guided to roughly double from c. Rmb2bn in 2025  to c.Rmb4bn in 2026, PCB is  \nseen at c.Rmb10bn+ based on capacity,  new energy is expected to reach c.Rmb4bn, and \nsemiconductor and general laser are assumed to be broadly flat y-y. Margins are in a \nrecovery trajectory with a better product mix, operation leverage, and  narrowing losses in \nnew energy (which could be c. Rmb100mn this year vs. c.Rmb300mn in 2025). Han's Laser \nalso has business expansion in liquid  cooling (acquired company Attom had Rmb200-\n300mn revenue and c.10% NPM in 2026) and optical fiber, which might provide further \nearnings upside.  \nManagement stays positive on PCB cycle in 2027 growth engine; ultrafast laser drilling \nis the highlight: Management believes the PCB capex cycle is still ongoing and remains \noptimistic on 2027 growth (ideal growth at 30%+ y-y), though clear guidance may wait \nuntil 2H.  Key growth areas include ultrafast laser drilling for optical modules, AI servers, \nand the application to glass substrate and ceramic substrate is under testing currently. \nUltrafast drilling has 20+ units new orders YTD;  customers includes Victory Giant, \nKinwong  and Avary, with  ASP is at Rmb5-7mn. Management said Victory Giant's revenue \ncontribution could roughly double this year from c.Rmb1.5bn in 2025, reinforcing HanвҖҷs \nleverage to leading AI PCB customers.\n3D printing is  the key upside option for 2027, with Apple  entering a larger product-\ncycle window: Management expects one customer to place 3D printing orders in 2H26; \nshipments are to start in 4Q26, while most revenue recognition should fall into 2027. \nThere will be  several 3D printing equipment suppliers, but the customer plans to place the \nfirst batch of orders (half of total 4k demand) to Han's first.  Beyond 3D printing, the \ncustomer's strong demand  is said to be supported by vapor chamber laser welding/\nautomation (~Rmb1bn in 2026), variable-aperture camera laser cutting, and new Apple \nprojects typically carrying 40%+ gross margin. Han's is also the supplier to Meta \n(Rmb100-200mn in 2026). Management expects 2027 to be a major handset innovation \nyear, with six phone models including an anniversary model, which should support \ncontinued consumer electronics business growth.\nHengli Hydraulic  (601100.SS, OW) - dominant market share in humanoid \nscrews; industrial screw capacity expansion on track \nManagement expects q-q revenue growth in 2Q despite a y-y growth slowdown on a \nhigh base: Full-year GPM is expected to be 40%+, while the 2Q FX loss should be smaller \nvs. 1Q. \nHengliвҖҷs share position remains strong: Currently, the US leading company's humanoid \nvolume is said to still appear limited, Hengli management thinks hundreds of units per \nweek in 3Q26 and potentially c.2.5k units per week by 1Q27 is more realistic.  HengliвҖҷs \nshare in body  screw products is indicated at 70%+. The capacity is being prepared mainly \nin Mexico, with year-end capacity targeting support for c.100k robot units. The  screw ASP\n--- з¬¬5йЎө ---\nM\n Idea\nMorgan Stanley Research\n5\nis at c.Rmb1k, while the value content for screw+motor could reach roughly Rmb10вҖ“15k \nper robot in longer term, with expected GPM at 25-30%. Beyond that US leading \ncompany, Hengli has already entered Xiaomi's, Xpeng's, and Li Auto's humanoid supply \nchains. \nIndustrial screws is becoming a credible second growth curve, with strong orders, \ncapacity expansion and localization tailwinds: HengliвҖҷs industrial screw business has \nc.Rmb250mn \nвҖҰ(жҲӘж–ӯ)", "n62": "### 2026-06-01-Morgan Stanley-дәәеҪўжңәеҷЁдәә дәәеҪўжңәеҷЁдәәеүҚжІҝпјҡдәәеҪўжңәеҷЁдәәеҚіе°Ҷзҷ»йҷҶеҪӯеҚҡз»Ҳз«Ҝ-122326109.undefined.pdf  (жҖ»йЎөж•°=10)\n\n--- з¬¬1йЎө ---\nM\n Global Foundation\nдәәеҪўжңәпЁёдәә\nдәәеҪўжңәпЁёдәәеүҚжІҝпјҡдәәеҪўжңәпЁёдәә\nеҚіе°Ҷзҷ»йҷҶеҪӯеҚҡз»Ҳз«Ҝ\nMorgan Stanley Asia Limited+\nиЎ·жҷҹ\nиӮЎзҘЁеҲҶжһҗеёҲ\n Sheng.Zhong@mor
