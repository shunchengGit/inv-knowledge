期；非GAAP净利润RMB263亿(净利率21.2%，同比-5.8pp)，略逊于预期(税收和汇兑损失)\n- **在线市场服务收入**: +5.3%至RMB600亿，低于预期+8.1%\n- **交易服务收入**: +19.2%，受社区团购(美团退出)和Temu全托管修复驱动\n\n### 稳健发展周期的三个支撑\n1. **平台模式优势**: 较少受国补品类基数效应影响\n2. **竞争边际缓解**: 若对手在外卖和即时零售领域补贴收缩，用户注意力抢夺减缓，拼多多有望重新强化用户粘性\n3. **\"新拼姆\"自营**: 整合国内供应链提升效率，增加海外业务发展确定性\n\n### 未来财务展望\n- 管理层表示未来季度利润率持续呈现起伏和波动\n- 公司做好长期耐心投入供应链建设的准备\n- FY2026E收入RMB5,071亿(+17.4%)，FY2027E收入RMB5,602亿(+10.5%)\n- FY2026E Adj EPS RMB95.26(PE 7.09x)，FY2027E Adj EPS RMB115.89(PE 5.83x)\n\n## 关联\n\n- 公司: PDD Holdings (PDD US)\n- 机构: Deutsche-Bank, 华泰证券\n- 行业: e-commerce\n- 相关: [阿里巴巴CY1Q26预览](entries/Alibaba-CY1Q26-Preview-AI-Investment-20260408.md) — 同行业: e-commerce", "n63": "## 关键要点\n\n1. **核心发现**: UBS 2026-04-30. Zhejiang Sanhua Intelligent Controls (002050.SZ) Q1 2026 revenue analysis. First read on thermal management business performance.\n\n2. **来源**: 待分类\n\n## 摘要\n\nUBS 2026-04-30. Zhejiang Sanhua Intelligent Controls (002050.SZ) Q1 2026 revenue analysis. First read on thermal management business performance.\n\n## 关联\n\n- [BofA-Zhejiang-Sanhua-1Q26-Core-Beat](entries/BofA-Zhejiang-Sanhua-1Q26-Core-Beat.md) — BofA三花智控研报 — 同标的不同券商", "n64": "# WWDC 2026：Apple新Siri由Gemini驱动\n\n**机构**: UBS | **评级**: Neutral | **目标价**: $410 | **日期**: 2026-06-08\n\n## 摘要\n\nApple在WWDC 2026发布全新Siri，底层基础模型由Gemini提供支持。UBS认为这对独立的AI聊天应用(Meta AI、ChatGPT、Gemini app)方向性负面——iOS生态推出更具竞争力的原生AI助手将减少第三方AI应用的吸引力。但Google可能通过与Apple的广告收入分成或Cloud收入获得长期补偿。\n\n## 关键要点\n- Apple新Siri基础模型由Gemini提供支持，对独立AI聊天应用方向性负面\n- Google可能通过广告收入分成或Cloud收入获得长期补偿\n- UBS维持Neutral评级，目标价$410\n- 2026E EPS $14.20，P/E 25.9x\n\n## 财务预测\n\n| 指标 | 2025A | 2026E | 2027E | 2028E |\n|------|-------|-------|-------|-------|\n| 收入($bn) | 403 | 519 | 669 | 662 |\n| EBIT($bn) | 129 | 172 | 212 | 239 |\n| EPS | $10.81 | $14.20 | $14.64 | $16.82 |\n| EV/EBITDA | 16.2x | 21.1x | 16.3x | 13.8x |\n| P/E | 19.5x | 25.9x | 25.2x | 21.9x |\n| FCF Yield | 2.8% | 1.1% | 0.3% | 1.6% |\n\n## 关联\n\n- 公司: Alphabet (GOOGL), Apple (AAPL)\n- 机构: UBS\n- 相关: [Google AI Wars流量跟踪](entries/Google-AI-Wars-Traffic-BofA-202605-06.md) — 同标的: GOOGL\n- 相关: [Google I/O与资本募资](entries/Google-Agentic-IO-Capital-Raise-MS-HSBC-UBS-202605-06.md) — 同标的: GOOGL", "n65": "# Broadcom FY26Q2多投行研报汇总：AI需求爆发但预期过高\n\n**机构**: Morgan Stanley / JPMorgan / UBS | **评级**: OW(MS/JPM) / Buy(UBS) | **目标价**: $500-580\n\n## 摘要\n\nBroadcom FY26Q2业绩后三份投行报告一致确认AI需求处于历史性爆发阶段，但营收预期miss引发股价回调约15%。Morgan Stanley指出AI收入4月环比+30%、7月环比+40%（同比+200%），FY26 AI收入估测$56bn，FY27\"远高于$100bn\"，但结果本身优秀而预期过高是股价下跌主因。JPMorgan看到AI Momentum加速，Multi-GW客户长期承诺有效去风险FY27/28，将目标价从$500上调至$580，重申Overweight。UBS在投资者问答报告中揭示后端组装/测试产能成为新瓶颈，影响了Google v9代TPU（2nm）路线图的推进节奏，同时宣布与Apollo/Blackstone组建20GW SPV为OpenAI/Anthropic提供数据中心基础设施。三份报告共同指向：AI ASIC需求爆发确定性极高，但供应链瓶颈和估值预期管理将是后续关键变量。\n\n## 关键要点\n\n1. **AI收入爆发式增长(MS)**：AI收入4月环比+30%、7月环比+40%，同比增速达+200%；FY26全年AI收入估测$56bn，FY27指引\"远高于$100bn\"，预示翻倍空间\n\n2. **预期过高致股价回调(MS)**：Strong results但expectations too high，指引miss引发回调，核心矛盾是市场已将$100bn+完全定价，实际增速虽快但未超预期上限\n\n3. **目标价上调(JPM)**：JPM将目标价从$500上调至$580，维持OW评级，强调Multi-GW客户承诺（客户总支出承诺达数十GW级别）为FY27/28提供极高可见度\n\n4. **传统半导体加速(JPM)**：网络芯片和宽带芯片需求同步回暖，非AI业务触底反弹信号明确；Software业务（VMware整合）收入增速稳定\n\n5. **后端供应瓶颈(UBS)**：OSAT（外包封装测试）产能不足限制v9代Google TPU（2nm ASIC）出货节奏，Broadcom正积极投资后端供应链产能扩张\n\n6. **20GW SPV创新模式(UBS)**：Broadcom宣布与Apollo/Blackstone合作组建20GW特殊目的载体（SPV），定向服务OpenAI和Anthropic，将AI基础设施资本开支与资产负债表解耦\n\n7. **v9 TPU路线图的不确定性(UBS)**：2nm node的v9 TPU因后端产能瓶颈和DTCO复杂性推进节奏可能慢于预期，但对Broadcom单芯片价值量有望提升\n\n8. **盈利质量与估值(All)**：三家一致认为AI业务毛利率高于传统半导体，但规模效应的capex投入强度也更高；当前估值已反映部分AI增长预期，需EPS持续上修支撑\n\n## 关联\n\n- 公司: Broadcom (AVGO)\n- 机构: Morgan-Stanley, JPMorgan, UBS\n\n- [\"Broadcom/JPMorgan：TPU v9 2nm ASIC按计划CY28量产——无延迟，锁定后续4代TPU\"](entries/AVGO-JPM-TPUv9-2nm-ASIC-CY28.md) — 同公司：Broadcom/AVGO AI ASIC业务系列\n- [Google 1Q26云业务超预期爆发，Cloud backlog达$4,620亿(BofA/DB/HSBC)](entries/Google-1Q26-Cloud-Backlog-BofA-DB-HSBC-20260430.md) — 同主题：AI基础设施与云业务\n- [MSFT FQ3'26 深度分析：Capex飙升、Azure加速与定价模式转型 (UBS)](entries/MSFT-FQ3-26-深度分析-Capex飙升-Azure加速与定价模式转型-UBS.md) — 同主题：AI基础设施资本开支", "n66": "# 德银中国NEV周度新订单监控（2026年6月第3周）\n\n**来源**: 行业研究-新能源 | **机构**: Deutsche Bank | **分析师**: Bin Wang, Wei Huang | **数据源**: Thinkercar\n\n## 摘要\n\nDeutsche Bank于2026年6月23日发布中国新能源车（NEV）周度新订单监控周报（chartbook格式），以周度新订单作为NEV需求的领先指标。报告基于Thinkercar数据，系统追踪中国主要新能源车企的周度新订单趋势，覆盖比亚迪、吉利、HIMA（主要为AITO问界）、理想、蔚来集团、小鹏、零跑、小米汽车和特斯拉等关键OEM。该周报以图表形式呈现各车企新订单的周度趋势变化，不包含具体数字数据，旨在为投资者提供高频需求跟踪工具。作为德银中国汽车团队的定期发布品，该监控系列反映了市场对NEV终端需求实时变化的密切关注。\n\n## 关键要点\n\n- **覆盖范围**：报告追踪9家关键新能源车企的周度新订单，包括比亚迪、吉利、HIMA（AITO）、理想、蔚来、小鹏、零跑、小米、特斯拉，覆盖中国NEV市场主要参与者\n- **数据来源与方法论**：基于Thinkercar提供的周度新订单数据，以chartbook形式呈现趋势，不含具体数值，定位为需求领先指标而非精确销量预测\n- **报告性质**：属于德银中国汽车团队的定期周度监控产品，分析师Bin Wang（研究分析师）和Wei Huang（研究助理）署名，发布渠道为Deutsche Bank AG/Hong Kong\n\n## 关联\n\n- [BofA Greater China EV & Future Car — Structural leadership amid intensifying competition](entries/BofA-Greater-China-EV-Future-Car-20260618.md) — 同行业：中国电动车/新能源车；共享标签: china-ev, 2026-Q2；共同关键词: NEV, 新能源车, 中国汽车\n- [JPMorgan中国电池行业精选：供给侧改革与全球化布局中的机会](entries/JPMorgan中国电池行业精选-供给侧改革与全球化布局中的机会.md) — 同目录：行业研究-新能源；共享标签: new-energy, 2026-Q2；产业链上下游关联\n\n## 引用\n\n- Deutsche Bank, \"China NEV Weekly New Orders Monitor,\" 23 June 2026. Data source: Thinkercar.", "n67": "# JPM中国地产股：近期股价下跌归因与一线城市企稳下的择机买入逻辑\n\n**报告日期**: 2026-06-23 | **券商**: JPMorgan | **分析师**: Karl Chan | **行业**: China Property\n\n## 摘要\n\n过去4个交易日，中国地产板块跑输恒生指数9%。JPMorgan认为下跌主因有四：（1）消费数据走弱引发的负面传导效应；（2）板块高Beta特性在市场整体抛售中放大跌幅；（3）高频数据虽保持平稳但未显著改善，缺乏短期催化剂；（4）部分投资者过度关注环比二手销售季节性回落。然而一线城市房价已连续4个月环比正增长（5月NBS一手+0.2%、二手+0.3% MoM；中原二手+0.3% MoM），二手挂牌量从3月峰值下降2.5%。即便是此前最抗跌的央企CRL（华润置地）和COLI（中国海外发展），近2个交易日也分别急跌11%，年初至今涨幅缩至CRL +15%、COLI +7%，但仍大幅跑赢恒指（-7%）。JPM建议在下跌中择机买入销售增长突出、一线城市敞口高的SOE开发商（COLI、CRL、Jinmao），同时警告非SOE（万科、融创）难以受益于K型复苏。\n\n## 关键要点\n\n- **板块跌幅**：4个交易日跑输HSI 9%；CRL/COLI近2天各急跌11%（HSI同期-2%），主因获利了结而非基本面恶化\n- **冷暖指数高频数据（6/21）**：9城实时二手成交+15% YoY（调整端午假期后），维持前月10-20% YoY区间，未现拐点\n- **二手挂牌量持续下降**：一线城市挂牌量从3月峰值累计-2.5%，为二手房价企稳提供关键支撑\n- **网签数据（受假期扰动）**：60城一手网签-23% YoY（因端午假期网签偏低），12城二手网签-13% YoY（中断此前连续9周正增长），但端午同比+60% YoY（样本量小不具代表性）\n- **房价企稳**：NBS一手+0.2% MoM（第3个月正增长）、二手+0.3% MoM（第3个月）；中原二手+0.3% MoM（第4个月正增长）；上海/深圳二手NBS分别为+0.6%/+0.6% MoM领涨\n- **估值与评级**：SOE板块P/E 11.7x（FY1），CRL OW TP HK$37、COLI OW TP HK$19.5、Jinmao OW TP HK$2.05；万科UW TP HK$2.25、融创UW TP HK$0.8\n- **K型分化**：SOE年初至今+10%（CRL/COLI/Jinmao），POE-24%（龙湖-22%/新城-29%），Distressed-32%（万科-25%/碧桂园-53%/融创-45%），非SOE难以受益于一线城市稳定\n\n## 关联\n\n- [JPMorgan中国房地产5月数据：一线城市房价初现企稳迹象](entries/JPMorgan中国房地产5月数据-一线城市房价初现企稳迹象.md) — 同系列5月NBS数据前瞻报告，本报告在此基础上解释股价与数据背离及择时建议\n- [JPMorgan Greater China Data Watch 6/22 — 中国宏观走弱、南亚塑胶与力积电评级上调](entries/JPMorgan-Greater-China-Data-Watch-6-22-中国宏观走弱-南亚塑胶与力积电评级上调.md) — 同期JPM宏观周报确认5月消费数据走弱，本报告将消费下滑列为地产股下跌第一动因\n\n## 引用\n\n- 本文基于3.1页PDF提取，包含6张图表（冰山指数实时成交、一线城市挂牌量、60城一手网签、8城二手网签、YTD股价表现、估值表），正文约1,200字\n- 分析师覆盖：Karl Chan（OW: 华润置地1109、中国海外0688、金茂0817、龙湖0960；N: 新城1030；UW: 万科2202、碧桂园2007、融创1918、世茂0813）\n- 数据源：Iceberg Index、CREIS、NBS、Centaline、Bloomberg", "n68": "# JPMorgan中国地产周度数据监控：端午假期扰动致销售转弱，一线城市挂牌量持续下降支撑房价企稳\n\n**来源**: 行业研究-房地产 | **机构**: jpmorgan | **分析师**: Karl Chan / Alvin Au | **日期**: 2026-06-24\n\n## 摘要\n\nJPMorgan 6月24日发布中国地产周度数据监控报告。本周受端午节三天假期影响，多项销售数据出现表面同比下滑，但扣除假期效应后实际动能仍然稳健。冰山指数10城实时二手成交同比微降0.05%（前值+13%），但与去年同期端午周相比实际+15%。更值得关注的是，一线城市二手挂牌量持续回落（环比-0.5%，较3月峰值累计-2.6%），上海单周再降1.1%，这是支撑二手房价持续企稳的关键边际变化。60城一手网签同比-23%同样受假期低基数干扰，12城二手网签中断了连续9周的同比正增长。香港方面房价再涨0.6% W/W，年初至今+10.4%已触及全年目标。\n\n## 关键要点\n\n- 冰山10城二手周成交25055套，同比-0.05%（前值+13%），一线城市同比-3%（前值+14%）；扣除端午假期效应后10城/一线实际同比+15%/+10%\n- 一线城市二手挂牌量环比-0.5% W/W，较3月峰值累计下降2.6%；上海挂牌量再降1.1%（前值-0.6%），为连续多周下降\n- 60城一手网签同比-23%，主要受假期低基数扰动；与2025年端午周同期相比+60%，但样本过小不具代表性\n- 12城二手网签同比-13%，中断此前连续9周正增长；年初至今累计+5%，上海为唯一录得同比正增长的一线城市（+12%）\n- 中原一线城市二手报价指数从17.8降至17.3，经理信心指数从53降至51，均温和回落\n- 板块股价上周跌13%，跑输恒指（-5%）；JPM首选：COLI、华润置地、金茂、华润万象生活\n- 香港房价指数周涨0.6%，年初至今+10.4%已触及JPM全年+10-15%目标；35大屋苑二手成交43宗为春节以来最低\n- 信用债视角：JACI中国高收益地产指数周涨0.3%，年初至今+6.4%；新城发展拟发行20亿元私募REIT扩募\n\n## 关联\n\n- [JPMorgan中国房地产5月数据：一线城市房价初现企稳迹象](JPMorgan中国房地产5月数据-一线城市房价初现企稳迹象.md) — 同为Karl Chan团队5月NBS数据分析，提供月度宏观背景，与周度高频数据形成时间维度互补\n- [JPMorgan全球房地产日报-中国地产新闻与研究摘要](JPMorgan全球房地产日报-中国地产新闻与研究摘要.md) — 同属JPMorgan房地产研究体系，涵盖每日新闻与事件催化，与周度数据监控形成频率互补\n\n## 引用\n\n- JPMorgan Property Data Monitor, 24 June 2026. Karl Chan, Alvin Au et al.", "n69": "# 万国数据AI驱动数据中心高速增长\n\n## 摘要\n万国数据1Q26业绩强劲——净收入34亿元(+24% YoY)、调整后EBITDA 19亿元(+47% YoY)，大幅beat市场预期。核心催化剂是AI驱动的需求爆发：新增订单200MW(季度新高)，全年目标500MW以上。管理层指引未来三年每年新订单500-800MW，计划投资300-500亿元(CNY30-50bn)支持扩张。Deutsche Bank维持Buy/TP 50美元，Macquarie维持Outperform/TP 64.6美元，JPMorgan(Not Rated)强调3年总预订目标强劲。\n\n## 关键要点\n- 1Q26新增200MW订单，YTD达340MW(含超大规模客户130MW+)，管理层预期年化500-800MW可持续\n- 土地储备扩至~4GW(从3GW)，过去15个月启动约400MW新建设\n- 三年资本开支300-500亿元，约60%以新增债务融资，净负债/EBITDA峰值5-6x\n- 月服务收入(MSR)同比降~4%，但调整后毛利率稳定在10-11%，新项目开发成本降至~$3mn/MW\n- 管理层预期2027年入驻面积YoY翻倍、2H27起收入加速增长\n\n## 关联\n- [隆基绿能BC技术分析](entries/隆基绿能BC技术转型分析.md)\n- [工业富联AI服务器分析](entries/工业富联AI服务器分析.md)", "n70": "# 三星电子：存储能见度延伸至2027年，代工提前盈亏平衡\n\n**报告来源：** BNP Paribas（2026-04-30）\n\n## 描述\nBNP Paribas于2026年4月30日发布三星电子1Q26业绩点评。1Q26实现创纪录季度营收134万亿韩元（环比+43%），营业利润57万亿韩元（环比+185%），受益于存储超级周期。DRAM/NAND ASP环比暴涨低90%/高80%。上调2026/27/28E EPS 81%/33%/15%，目标价从28.1万韩元上调至30万韩元（SOTP估值）。评级Outperform。\n\n## 摘要\n三星电子1Q26创历史新高，存储超级周期是主要驱动力。常规DRAM利润率首次超越HBM，因季度合约价在供应紧张中上涨速度快于HBM年度合约。三星在HBM4E、SOCAMM2、PCIe Gen6 SSD等新产品保持技术领先。代工业务1Q实现>10%同比增长，获关键硅光子项目，预计2027年初盈亏平衡，受益于4nm高利用率（HBM4基础晶粒）和Gen2 2nm移动产品量产。泰勒厂设备已搬入，2026年运营2027年量产，有望拓展美国客户群。MX部门重夺全球智能手机第一，但利润率因元件成本上涨承压。\n\n## 关键要点\n- **1Q26创纪录**：营收134万亿韩元（+43% QoQ），营业利润57万亿韩元（+185% QoQ）\n- **常规DRAM利润率超HBM**：季度合约价上涨快于HBM年度合约，三星常规DRAM敞口更大\n- **存储能见度延伸至2027年**：供应持续紧张，三星作为最大DRAM/NAND供应商受益最大\n- **代工加速盈亏平衡**：4nm高利用率+2nm量产推动，预计2027年初达成\n- **泰勒厂战略**：设备已搬入，2027年量产，有望拓展美国客户基础\n- **目标价30万韩元**：SOTP估值，2027E P/E 8.5x/P/B 2.1x，评级Outperform\n- **新产品领先**：HBM4E样品出货、SOCAMM2认证、PCIe Gen6 SSD等\n\n## 标签\n三星电子, 005930, 存储器, DRAM, NAND, 代工, HBM, analysis-dimension:财报分析, time:2026Q2\n\n## 关联\n- [美光FQ3:26业绩预览](entries/美光FQ3-26业绩预览.md)", "n71": "# 中通快递1Q26超预期+反内卷持续\n\n## 摘要\n中通快递1Q26业绩全面超预期，收入+22% YoY（vs一致预期18%），核心盈利增速与收入一致，但政府补贴减少拖累adj NP仅+5%。关键亮点：市场份额+1.4ppt至行业最高，ASP +Rmb0.11（KA客户贡献+Rmb0.18 lift），运输成本-Rmb0.04/件。三家大行（JPM OW, MS OW, UBS Buy）一致看好，认为反内卷政策持续+行业竞争格局改善下，中通\"质量优先\"策略正在验证——MS第三次上调盈利预测，2026/27E adj NP +5.4%/+5.3%；UBS也上调ASP假设后EPS +4%。阿里减持消息（9%持股）导致股价 -3%被三家券商一致视为买入机会，预计近期恢复回购（剩余US$8亿额度，~8% shareholder return）。\n\n## 关键要点\n- 1Q26收入+22% YoY至Rmb147亿，adj NP ~Rmb20亿（+5% YoY），排除政府补贴影响后增速与收入一致\n- 市场份额+1.4ppt（至行业最高），ASP +Rmb0.11（KA +Rmb0.18 vs 激励 -Rmb0.09），运输成本-Rmb0.04、分拣-Rmb0.02\n- 反内卷政策持续（生产大省执行趋严、落后地区收紧），行业竞争从\"价格战\"转向\"品质竞争\"\n- 阿里减持公告（9%股权、终止投资者权利协议）为情绪扰动而非基本面恶化——近期有望恢复回购\n- MS 2Q26预测：adj NP ~Rmb29亿（同比+40%），低基数效应显著\n- 全年指引维持10-13%件量增长，但偏向低端；4月行业低个位数增长下中通仍保持teens增速\n- 零售/逆向物流成为新战略杠杆：零售件量+65% YoY（抖音日件量~700万，占比~50%）\n\n## 关联\n- [泡泡玛特多空观点：增长放缓与平台价值之争](entries/泡泡玛特多空观点-增长放缓与平台价值之争.md) — 同为消费相关标的，中通受益于电商物流结构性增长和竞争格局改善", "n72": "# 中际旭创1Q26超预期：1.6T推动利润率上行，能见度超越2027年\n\n**报告来源：** BofA Global Research（2026-04-16）\n\n## 描述\nBofA于2026年4月16日发布中际旭创1Q26业绩点评。1Q净利润¥57.35亿（+57% QoQ，+262% YoY），超BofA预期24%/共识31%。营收¥195亿（+47% QoQ，+192% YoY）证明1.6T已开始放量。毛利率达46.1%（+1.6pp QoQ，+9.4pp YoY），产品组合足以抵消组件价格上涨和年度降价。上调2026-28E盈利23-29%，目标价¥1,100（30x 2H26-1H27E P/E），重申买入。\n\n## 摘要\n中际旭创1Q26业绩大幅超预期，1.6T/SiPh产品开始规模放量。1.6T（SiPh）毛利率预计达55-60%，随1.6T出货量环比提升，预计2H26利润率进一步扩张。公司通过预付款锁定关键组件供应，展现了强大的采购能力，缓解市场对组件供应的担忧。BofA模型显示2025-28E盈利CAGR达78%，2026E/27E/28E净利润¥338亿/¥508亿/¥607亿，营收¥1,048亿/¥1,478亿/¥1,756亿。\n\n## 关键要点\n- **1Q26大超预期**：净利润¥57.35亿（+262% YoY），超共识31%\n- **1.6T放量**：营收¥195亿（+192% YoY），证明1.6T光模块规模出货\n- **毛利率持续扩张**：46.1%（+9.4pp YoY），1.6T/SiPh毛利预计55-60%\n- **采购能力强大**：预付款锁定关键组件供应\n- **盈利上调23-29%**：2026E净利¥338亿，2027E ¥508亿，2028E ¥607亿\n- **目标价¥1,100**：30x 2H26-1H27E P/E，历史均值+1SD\n\n## 标签\n中际旭创, 300308, 光模块, 1.6T, SiPh, AI, analysis-dimension:财报分析, time:2026Q2\n\n## 关联\n- [中际旭创：多重增长驱动-AI光网络升级](entries/中际旭创多重增长驱动-AI光网络升级.md)", "n73": "# 中际旭创上调PO至¥1,650：全栈光学供应商受益于更强周期\n\n**报告来源：** BofA Global Research（2026-06-09）\n\n## 描述\nBofA于2026年6月9日再次上调中际旭创目标价至¥1,650（25x 2027E P/E），此前为¥1,100（30x 2H26-1H27E P/E）。上调2026-28E盈利16-70%，预计1.6T/NPO在2027年贡献~68%/~14%收入。预计1.6T需求在2027年更强劲并延续至2028年，NPO需求在2027年清晰可见。每500万个NPO订单可产生¥100亿+盈利。重申买入。\n\n## 摘要\nBofA认为中际旭创作为全栈光学供应商正受益于更强的周期。1.6T需求持续走强并在2027年更强劲，上游供应商订单积压延长为佐证。预计全球1.6T出货量2026/27年达20mn/56mn单位，中际旭创维持>40%份额。NPO需求在2027年日益清晰，预计不止一家CSP将NPO部署在规模化系统中。2.4T Coherent-Lite解决方案（可能由谷歌部署）表明高价值相干光解决方案正在从scale-out向scale-up架构扩展。中际旭创是少数中国供应商之一，有望受益于与谷歌的深度合作关系。\n\n## 关键要点\n- **目标价大幅上调**：¥1,650（25x 2027E P/E），此前¥1,100\n- **盈利上调16-70%**：2026E净利¥392亿，2027E ¥733亿，2028E ¥1,035亿\n- **1.6T/NPO占比**：2027年1.6T占收入68%，NPO占14%\n- **全球1.6T出货量**：2026E 20mn单位，2027E 56mn单位\n- **NPO大单潜力**：每500万NPO订单=¥100亿+盈利\n- **Coherent-Lite机会**：谷歌2.4T方案可能成为2027-28新增长点\n- **62%盈利CAGR**（2026-28E）\n\n## 标签\n中际旭创, 300308, 光模块, 1.6T, NPO, Coherent-Lite, AI, analysis-dimension:估值重估, time:2026Q2\n\n## 关联\n- [中际旭创1Q26超预期：1.6T推动利润率上行](entries/中际旭创1Q26超预期1-6T推动利润率上行.md)\n- [中际旭创：多重增长驱动-AI光网络升级](entries/中际旭创多重增长驱动-AI光网络升级.md)", "n74": "# 中际旭创：多重增长驱动——AI光网络1.6T/3.2T/NPO/CPO延伸AI上行周期\n\n**报告来源：** Nomura（2026-04-16）\n\n## 描述\nNomura于2026年4月16日发布中际旭创深度报告，认为1.6T/3.2T收发器、NPO和CPO将延伸AI上行周期。1Q26业绩强劲（营收/盈利环比+47%/+57%），1.6T收发器成为关键增长驱动。上调FY26-27F全球1.6T出货量预测至26mn/60mn单位（此前20mn/34mn），预计公司在100G+收发器市场维持30-35%份额，在1.6T市场>45%。目标价¥1,015（20x FY27F EPS），评级买入。\n\n## 摘要\nNomura认为中际旭创将受益于多年期长期增长：2028年起的3.2T收发器升级以及NPO（近场封装光学）和CPO（共封装光学）的业务扩展。1.6T/SiPh产品出货推动毛利率持续改善。公司作为全球高端光收发器龙头（Light Counting数据），在AI基础设施投资和网络技术升级中获得强劲增长动力。模型显示FY26/27/28F营收¥1,221亿/¥2,045亿/¥2,717亿，净利润¥324亿/¥565亿/¥754亿，显著高于WIND共识。\n\n## 关键要点\n- **1.6T出货量大幅上调**：FY26F 26mn单位，FY27F 60mn单位（此前34mn）\n- **800G出货量下调**：FY26F 34mn单位，FY27F 50mn单位（此前43mn/58mn）\n- **市场份额领先**：100G+市场30-35%，1.6T市场>45%\n- **SiPh推动毛利率**：产品升级支撑利润率持续扩张\n- **目标价¥1,015**：20x FY27F EPS ¥50.87\n- **3.2T/NPO/CPO布局**：延伸AI上行周期至2028年之后\n- **风险**：AI需求放缓、竞争加剧、ASP侵蚀超预期、CPO替代风险\n\n## 标签\n中际旭创, 300308, 光模块, 1.6T, SiPh, NPO, CPO, AI, analysis-dimension:行业展望, time:2026Q2\n\n## 关联\n- [中际旭创1Q26超预期：1.6T推动利润率上行](entries/中际旭创1Q26超预期1-6T推动利润率上行.md)\n- [中际旭创上调PO至¥1,650：全栈光学](entries/中际旭创上调PO至1650全栈光学供应商.md)", "n75": "# 伯恩斯坦：AI电力狂潮下，这次燃气轮机周期和2000年不一样\n\n## 摘要\n\n伯恩斯坦2026年6月18日发布90页研报《Powering AI: Mapping the gas turbine supply stack》，核心结论：本轮燃气轮机产能扩张以棕地复活（brownfield de-mothballing）为主，而非2000年代的绿地新建，周期退可守、进可攻。全球燃气轮机产能从2025年64GW增至2030年约109GW（+60%），三大厂贡献约75%增量。AI数据中心电力需求2025-2030年全球新增20-34GW/年，美国占比>60%，燃气发电满足约50%，三大厂订单中数据中心占比20-30%。真正的风险不是总量过剩，而是结构性错配——中小机组和备用电源可能过剩，重型燃气轮机（HDGT）到2030年仍是紧俏货（缺口23.6GW），而IGT&Aero从2027年起过剩18.8GW。三大厂Backlog已排至2028年，HDGT交付周期3-5年，价格战很难打起来。Turbine价格2023年以来+50%，美国CCGT单位造价$1,400/kW→$2,200/kW（+50%），供应链瓶颈（高温合金叶片）反而成为OEM定价权护城河。服务市场是真正现金牛：全球现役燃气轮机约2,100GW，每GW装机≈4亿欧元全生命周期服务收入，利润率远高于设备销售。\n\n## 关键要点\n\n1. **棕地复苏 vs 绿地新建**：本轮周期以棕地复产、产线优化为主，退出成本极低；2000年代是绿地新建工厂，沉没成本高。棕地扩张的好处是灵活性极高——需求好就开机，需求差就再mothball\n\n2. **全球产能扩张路径**：2025年64GW → 2030年109GW（+60%）。西门子能源翻倍至31GW（重启停用6年的Charlotte工厂），GE Vernova从16GW→24GW（Belfort/Greenville班次优化），三菱重工2028年先扩30%\n\n3. **AI数据中心电力需求**：2025-2030年全球新增20-34GW/年，美国>60%，燃气发电满足约50%，三大厂订单中数据中心占比20-30%。非AI需求同样强劲：工业回流、油气开采、电动车充电等推动美国电力增速达2.5%+\n\n4. **结构性错配而非总量过剩**：HDGT 2025年缺口38.6GW，2030年缺口23.6GW，持续供不应求；IGT&Aero 2027年起过剩18.8GW。三大厂产能结构中HDGT占68%，IGT&Aero仅占29%\n\n5. **订单能见度与定价权**：GE Vernova燃气轮机合同量12个月翻倍50GW→100GW，西门子能源Backlog 87GW（+75% YoY）。2028年生产槽位基本卖光，HDGT交付周期3-5年。Turbine价格+50%，GE Vernova 2026H1新签订单再贵10-20个百分点\n\n6. **供应链瓶颈成护城河**：高温合金叶片/导叶由Howmet主导（市占率>50%），垂直整合模式（铸造→涂层→机加工全自营）导致产能扩张慢，反而锁定OEM定价权\n\n7. **服务市场是现金牛**：全球现役燃气轮机约2,100GW（GE Vernova近1,000GW，西门子约480GW）。西门子每GW装机≈4亿欧元全生命周期服务收入，基荷机组占比从50%→80%+。GE Vernova HDGT服务合同>50%剩余期限在15年以上\n\n8. **A股映射——主机厂**：东方电气是国内重型燃机最硬核标的（G50→H级突破），叠加电网设备高景气，与西门子能源\"电网+燃机\"双轮驱动逻辑共振。上海电气、哈尔滨电气弹性较弱\n\n9. **A股映射——核心零部件**：应流股份是高温合金叶片+精铸件龙头，直接对标Howmet。图南股份、钢研高纳是高温合金材料\"卖铲子\"逻辑。航发动力技术同源性但军用为主\n\n10. **A股映射——电网设备**：平高电气、中国西电、许继电气受益于特高压及电网设备全球建设周期共振。GE Vernova将电网业务视为\"质量复合增长器\"（quality compounder）\n\n## 关联\n\n（待补充）\n- [万国数据AI驱动数据中心分析](entries/万国数据AI驱动数据中心分析.md) — 万国数据 — AI电力需求关联\n- [JPMorgan-AIDC储能系统参考架构-早期订单指向需求爆发](entries/JPMorgan-AIDC储能系统参考架构-早期订单指向需求爆发.md) — AIDC储能 — 电力基础设施关联", "n76": "# 华泰证券科技行业深度：AI Agent加速有望驱动算力通胀持续\n\n**来源**: 行业研究-计算机 | **机构**: huatai-securities\n\n## 摘要\n\n华泰证券认为AI Agent加速落地将推动算力需求持续高增长。\nAgent应用对算力的消耗远高于传统AI应用，带来算力通胀效应。\n中国算力产业链（服务器、光模块、液冷）有望持续受益。\n\n## 关键要点\n\n- AI Agent推理算力需求是传统AI应用的5-10倍\n- 2026年中国AI算力市场规模预计同比增长60%+\n- 国产AI芯片在推理场景中加速渗透\n- 算力租赁和MaaS(Model-as-a-Service)模式兴起\n- 液冷散热渗透率快速提升，2026年有望达30%\n- 推荐中际旭创、工业富联等算力基础设施标的\n\n## 关联\n\n- 行业: tech-industry\n- 机构: huatai-securities\n- 主题: ai-agent-computing\n- 相关: 中际旭创, 工业富联, liquid-cooling\n\n- [华泰证券资产配置月报：AI链行情进入新阶段](entries/华泰证券资产配置月报-AI链行情进入新阶段.md) — 同机构华泰证券AI/科技研究系列\n- [JPMorgan中国AI应用调研：从模型竞赛到应用落地的转折点](entries/JPMorgan中国AI应用调研-从模型竞赛到应用落地的转折点.md) — 同主题：中国AI应用落地进展\n- [MSFT 跟进分析：Copilot起飞在即，Azure 40%+增长可持续 (BNP Paribas 5/26)](entries/MSFT-跟进分析-Copilot起飞在即-Azure-40-增长可持续-BNP-Paribas-5-26.md) — 同主题：AI Agent/Copilot产品进展", "n77": "---\ntype: Analysis\ntitle: 华泰证券腾讯1Q26前瞻：AI布局和云业务迎来拐点，维持买入\ndescription: 华泰证券预计腾讯1Q26营收+11%/经调整净利+10%，AI Agent赛道迎拐点(龙虾产品矩阵升级/云提价/混元3.0发布)，SOTP目标价716港元，预计26年营收8410亿\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/腾讯控股/20260410-华泰证券-腾讯控股-0700.HK-AI布局和云业务迎来拐点.pdf\nsource_type: pdf\ntags: [tencent, profit-trend, business-model, 2026-Q1]\n---\n\n# 华泰证券腾讯1Q26前瞻：AI布局和云业务迎来拐点\n\n## 摘要\n华泰证券2026年4月发布腾讯1Q26前瞻报告。预计1Q26营收+11%至2015亿，经调整归母净利润+10%至673亿。核心看点：AI Agent赛道迎来拐点——龙虾(WorkBuddy)产品矩阵持续升级（嵌入微信/企业微信、多Agent协同、Skillhub生态打通），云业务提价+海外扩张驱动增长拐点。混元3.0预计4月上线。维持买入评级，SOTP目标价716港元。\n\n## 关键要点\n- 预计1Q26营收+11%（游戏+13%/广告+19%/金融科技+9%），经调整净利+10%至673亿\n- AI Agent赛道迎拐点：龙虾体系化升级，嵌入微信/小程序/企业微信，支持多Agent协同\n- 云业务驱动力：海外亚洲扩张、德国新区2Q26上线、混元API提价、AI算力需求释放\n- 4月将上线混元3.0大模型，建议关注Agent赛道的潜在拐点\n- 《洛克王国：世界》稳居iOS畅销榜前列\n- 26年营收预测8410亿（+12%），经调整净利2830亿（+9%）\n- 目标价716港元（基于SOTP），调整后PE 14.2x\n\n## 关联\n- [申万宏源腾讯深度之三：AI时代核心受益者](entries/申万宏源腾讯深度之三-AI时代核心受益者-超级入口与生态壁垒的再进化.md) — 申万宏源同样深入分析腾讯AI战略\n- [腾讯控股2026Q1正式业绩：营收1965亿(+9%)，Non-IFRS净利+11%](entries/腾讯控股2026Q1正式业绩-营收1965亿-9-Non-IFRS净利-11.md) — 后续业绩验证了基本面\n\n## 引用\n- [华泰证券-腾讯控股AI布局和云业务迎来拐点](res/腾讯控股/20260410-华泰证券-腾讯控股-0700.HK-AI布局和云业务迎来拐点.pdf)\n- [腾讯控股JPM 1Q26：转向更积极，双P&L披露化解AI稀释担忧](entries/腾讯控股JPM-1Q26-转向更积极-双P-L披露化解AI稀释担忧.md) — 共享标签: tencent, 2026-Q1, profit-trend; 同标的: tencent; 共同关键词(8): q2, ai, pdf, 1q", "n78": "# 华泰证券资产配置月报：AI链行情进入新阶段\n\n**来源**: 策略研究 | **机构**: huatai-securities\n\n## 摘要\n\n华泰证券认为AI链行情已从第一阶段进入第二阶段。\n第一阶段以算力硬件为代表的估值修复基本完成。\n第二阶段AI应用和生态建设将成为投资主线。\n\n## 关键要点\n\n- AI行情从算力硬件扩散到应用和平台的趋势确认\n- 建议超配AI应用、云计算和智能驾驶方向\n- 低配传统周期板块，关注AI对传统行业的赋能机会\n- 大类资产配置上，权益优于债券，A股优于港股\n- 2026年下半年A股市场有望迎来AI应用商业化催化\n\n## 关联\n\n- 行业: strategy\n- 机构: huati-securities\n- 主题: asset-allocation-april-2026\n- 相关: ai-chain, a-share\n\n- [华泰证券科技行业深度：AI Agent加速有望驱动算力通胀持续](entries/华泰证券科技行业深度-AI-Agent加速有望驱动算力通胀持续.md) — 同机构华泰证券AI/科技研究系列\n- [JPMorgan中国AI应用调研：从模型竞赛到应用落地的转折点](entries/JPMorgan中国AI应用调研-从模型竞赛到应用落地的转折点.md) — 同主题：中国AI产业链投资\n- [Morgan Stanley互联网周报：AI硬件vs软件投资轮动分析](entries/Morgan-Stanley互联网周报-AI硬件vs软件投资轮动分析.md) — 同主题：AI产业链投资轮动", "n79": "# BNP Paribas：台积电推出A13并更新技术路线图\n\n## 摘要\nBNP Paribas（分析师Alex Chang）在台积电2026年北美技术研讨会后发布快评。关键发布包括A13制程（2029年HVM，A14光学缩小版，面积节省6%，完全向后兼容）、A12预览（Super Power Rail背面供电，针对AI/HPC）、N2U（2028年HVM，相比N2P速度提升3-4%或功耗降低8-10%，逻辑密度提升1.02-1.03x）。先进封装方面，CoWoS扩展至14-reticle尺寸（可容纳10个大型计算芯片+20个HBM堆栈），A14-to-A14 SoIC 3D堆叠（IO密度提升1.8x），COUPE硅光子（2x能效提升，10倍延迟降低）。维持Outperform评级，目标价TWD2,520/USD478。\n\n## 关键要点\n- A13（2029年HVM）：A14光学缩小，面积节省6%，完全向后兼容，降低客户tape-out成本，支持快速迁移\n- A12（2029年HVM）：A14平台增强版，Super Power Rail背面供电，针对AI/HPC应用，实现高端市场细分\n- N2U（2028年HVM）：2nm平台进一步演进，相比N2P速度+3-4%或功耗-8-10%，逻辑密度提升1.02-1.03x，为AI/HPC/移动应用提供成熟选择\n- CoWoS扩展：14-reticle尺寸（2028年），可集成10个大型计算芯片+20个HBM堆栈，解决AI集群瓶颈\n- SoIC 3D堆叠（2029年HVM）：A14-to-A14堆叠，die-to-die IO密度相比N2-to-N2提升1.8倍\n- COUPE硅光子：2倍能效提升，10倍延迟降低（机架间数据传输）\n- N2A汽车级：首次将纳米片带入汽车领域，2028年完成认证，比N3A速度提升15-20%\n- 投资观点：Foundry 2.0下TAM翻倍以上，支持约24%的2025-28E营收CAGR；美国投资US$165b缓解关税风险但长期稀释利润率\n\n## 关联\n- [UBS US技术研讨会（2026-04-23）](entries/台积电UBS-US技术研讨会-A13-A12-N2U路线图与AI护城河.md)\n- [BofA产能与技术爬坡（2026-05-15）](entries/台积电BofA-产能与技术爬坡-缓解竞争担忧.md)\n\n## 引用\n- [BNP Paribas - TSMC debuts A13](res/台积电/2026-04-24-2330.TW-BNP Paribas-TSMC  TSMC debuts A13 and updates tech roadmap-121610129.pdf)\n- [UBS：台积电US技术研讨会——A13/A12/N2U路线图与AI护城河](entries/台积电UBS-US技术研讨会-A13-A12-N2U路线图与AI护城河.md) — 共享标签: A12, technology-roadmap, advanced-packaging; 同标的: A12, technology-roadmap; 共同关键词(11): 积电, 2026, 路线, to", "n80": "# BofA：台积电产能与技术爬坡斜率更陡——缓解竞争担忧\n\n## 摘要\nBofA（分析师Haas Liu）在台积电台湾技术研讨会后发布报告，强调5nm和3nm的大规模产能（3nm 4Q26达190k WPM、2027年达230k WPM，远高于三星SF3或Intel 18A的20-25k WPM）限制了客户流失风险。N2作为首个纳米片节点，缺陷密度已达目标水平，比3nm同阶段领先2个季度。CoWoS良率已达98%+（5.5x reticle）。维持买入评级，目标价NT$2,560（20x 2027E PE），当前股价NT$2,270。\n\n## 关键要点\n- 5nm/3nm产能优势：台积电目标2022-2027年5nm和3nm产能CAGR达25%，设备共通性和AI驱动的生产力提升使产能高效转换\n- 3nm产能规模：预计4Q26达190k WPM，2027年达230k WPM；对比三星SF3或Intel 18A仅20-25k WPM且良率低\n- N2首次采用纳米片：缺陷密度已达目标水平，比3nm同阶段领先2个季度；N2家族2026-2028产能CAGR达70%\n- N2首年爬坡：比3nm多45%产能，同时推出5座晶圆厂，技术转移时间减少20%\n- N2/A16利润率：良率曲线优于3nm，预计享有更好的利润率（3nm约11个季度才到公司平均GM）\n- CoWoS产能：2022-2027年CoWoS产能CAGR达80%，SoIC达90%；技术升级时间减少30%（CoWoS）和75%（SoIC）\n- CoWoS良率：5.5x reticle良率已达98%+，2029年将推出14x+ reticle方案\n- 财务预测：2026E营收NT$5.24兆，净利润NT$2.57兆；2027E营收NT$6.68兆，净利润NT$3.32兆\n\n## 关联\n- [UBS US技术研讨会（2026-04-23）](entries/台积电UBS-US技术研讨会-A13-A12-N2U路线图与AI护城河.md)\n- [BofA资本支出报告（2026-05-17）](entries/台积电BofA-先进节点资本支出-Arizona盈利改善.md)\n\n## 引用\n- [BofA - Strong capacity and tech ramp](res/台积电/2026-05-15-2330.TW-BofA Global Research-Taiwan Semiconductor Manufacturing Co. Strong capacity and ...-122056887.undefined.pdf)", "n81": "# BofA：台积电先进节点需求管道强劲——2026-27资本支出展望上调\n\n## 摘要\nBofA在台积电董事会批准US$31bn资本拨款后发布报告，指出资本支出正加速向先进制程前端倾斜（LTM 53% vs 2024-25年的37%）。基于对GPU、ASIC、x86/ARM服务器CPU和网络交换机的WPY需求测算，2026年资本支出有望达到公司指引的US$56bn，2027年更可能升至US$75bn（vs BofA/市场预估US$63bn/US$65bn）。亚利桑那州晶圆厂1Q26实现NT$39bn营收和NT$19bn净利润，剔除政府补贴后营业利润率约45%，远超预期。维持买入评级，目标价NT$2,560（20x 2027E PE）。\n\n## 关键要点\n- 资本拨款规模：台积电董事会批准US$31bn资本拨款，重点用于先进制程前端产能和晶圆厂建设\n- 资本支出结构变化：前端扩产占比升至53%（LTM，vs 2024-25年的37%），设施/洁净室占比降至39%（vs 50%）\n- 2026-27资本支出预测：2026年US$56bn（符合指引），2027年可能达US$75bn（vs BofA预估US$63bn/市场US$65bn）\n- 亚利桑那州运营显著改善：1Q26营收NT$39bn，净利润NT$19bn（vs 2025全年NT$67bn营收/NT$16bn净利润）\n- 亚利桑那利润率：剔除政府补贴后1Q26营业利润率约45%，虽低于公司OpMs 58%，但稀释程度好于预期\n- 毛利率扩张逻辑：HPC应用强劲需求+高端移动芯片组，使台积电能更好反映技术领先价值\n- 财务预测：2026E营收NT$5.24兆，资本支出NT$1.78兆；2027E营收NT$6.68兆，资本支出NT$1.98兆\n\n## 关联\n- [BofA产能与技术爬坡（2026-05-15）](entries/台积电BofA-产能与技术爬坡-缓解竞争担忧.md)\n- [BofA AGM更新（2026-06-04）](entries/台积电BofA-股东大会AI需求与技术执行.md)\n\n## 引用\n- [BofA - Strong advanced node demand pipeline](res/台积电/2026-05-17-2330.TW-BofA Global Research-Taiwan Semiconductor Manufacturing Co. Strong advanced node...-122084481.undefined.pdf)", "n82": "# BofA：股东大会更新——AI驱动的强劲需求与技术执行支撑营收/毛利率展望\n\n## 摘要\nBofA在台积电2026年6月4日年度股东大会后发布报告，重申买入评级和NT$2,560目标价（20x 2027E PE）。管理层在股东会上表达了高度信心：1）对2030年前的营收可见度高度乐观，AI、EV和机器人应用持续扩展；2）56%+长期毛利率指引保持不变；3）N2结构性利润率将优于N3，且N3利润率仍在改善中。会议还讨论了竞争格局，Intel位列台积电前十大客户，合作关系将继续。台积电未考虑股票分割或回购。\n\n## 关键要点\n- AI需求高度乐观：管理层对2030年前增长可见度充满信心，AI、EV和机器人应用推动需求扩张\n- AI瓶颈：AI导致的瓶颈贯穿电力、芯片、设备和上游供应链，台积电正全力以赴满足需求\n- 资本支出展望：未来数年资本支出将持续增长，台湾仍为主要生产基地，同时推进海外扩张\n- 定价策略：反映更高效的产出价值，同时与客户保持可持续合作关系，而非机会主义定价\n- 毛利率指引：56%+长期GM指引不变；N2结构性利润率将优于N3，N3利润率仍在改善中\n- 竞争格局：先进制程路线图和先进封装规模控制竞争风险；Intel是台积电前十大客户，合作继续\n- CoPoS进展：目前试产中，2-3年内准备就绪量产\n- 出售VIS股份：因产业布局考虑出售世界先进（VIS）股份，但技术合作关系不变\n- 股票回购/分割：目前不考虑股票分割或回购\n- R&D承诺：持续推进先进制程路线图，保持对三星、Intel乃至Terafab的竞争优势\n\n## 关联\n- [BofA资本支出报告（2026-05-17）](entries/台积电BofA-先进节点资本支出-Arizona盈利改善.md)\n- [BofA产能与技术爬坡（2026-05-15）](entries/台积电BofA-产能与技术爬坡-缓解竞争担忧.md)\n- [UBS五月销售额（2026-06-10）](entries/台积电UBS-5月营收4170亿-Q2稳步推进-目标价上调至3000.md)\n\n## 引用\n- [BofA - AGM update solid AI-centered demand](res/台积电/2026-06-04-2330.TW-BofA Global Research-Taiwan Semiconductor Manufacturing Co. AGM update solid AI...-122413976.undefined.pdf)", "n83": "# UBS快速解读：台积电4月营收NT$4,107亿——Q2开局符合预期\n\n## 摘要\nUBS在台积电4月营收数据发布后发布快评。4月营收NT$4,107亿（-1.1% MoM，+17.5% YoY），Q2累计营收完成UBSe预测的32.3%，QoQ增长约12%的预测在轨道上。N3强劲增长（新AI加速器）和N2更快爬坡将成为2026年主要增长动力。维持买入评级，目标价NT$2,650（21x 2027E PE）。股价NT$2,290（2026年5月8日）。\n\n## 关键要点\n- 4月营收NT$4,107亿（-1.1% MoM，+17.5% YoY），符合季节性模式\n- Q2追踪完成UBSe预测的32.3%，QoQ增长约12%的预测稳步推进\n- 2026年美元营收增长预测35%，受N3 AI加速器和N2更快爬坡驱动\n- 强大的云AI机会提升领先制程产能利用率、混合ASP和结构性毛利率\n- 维持买入评级，目标价NT$2,650（21x 2027E PE）\n- UBS EPS预测高于共识：2026E NT$97.98（vs 市场NT$96.59），2027E NT$126.05（vs NT$123.21）\n\n## 关联\n- [UBS五月销售额（2026-06-10）](entries/台积电UBS-5月营收4170亿-Q2稳步推进-目标价上调至3000.md)\n- [UBS US技术研讨会（2026-04-23）](entries/台积电UBS-US技术研讨会-A13-A12-N2U路线图与AI护城河.md)\n\n## 引用\n- [UBS - TSMC April Sales Fast Take](res/台积电/2026-05-08-2330.TW-UBS Equities-UBS Fast Take Taiwan Semiconductor Manufacturing _Apr sale...-121916347.pdf)\n- [UBS快速解读：台积电5月营收NT$4,170亿——Q2稳步推进，目标价上调至NT$3,000](entries/台积电UBS-5月营收4170亿-Q2稳步推进-目标价上调至3000.md) — 共享标签: N2, monthly-sales, tsmc; 同标的: N2, monthly-sales; 共同关键词(18): 2027e, 积电, bs, q2", "n84": "# UBS快速解读：台积电5月营收NT$4,170亿——Q2稳健增长，目标价上调至NT$3,000\n\n## 摘要\nUBS在台积电5月营收数据发布后发布快评。5月营收NT$4,170亿（+1.5% MoM，+30.1% YoY），Q2累计营收已完成UBSe预测的65%，QoQ增长约12%的预测仍在轨道上。UBS将2026年营收增长预测上调至36%（美元计），主要受AI加速器和CPU的N3强劲增长及N2更快爬坡驱动。值得注意的是，UBS将目标价从NT$2,650大幅上调至NT$3,000（基于23x 2027E PE），为所有覆盖报告中最高目标价，反映出对台积电增长前景的强烈信心。但UBS也指出H2毛利率可能从H1的66.8%降至65%，受N2爬坡和海外扩张的稀释影响。\n\n## 关键要点\n- 5月营收数据：NT$4,170亿（+1.5% MoM，+30.1% YoY），增速较4月的+17.5% YoY明显加快\n- Q2追踪进度：Q2累计营收已达UBS预估的65%，QoQ增长约12%的预测稳步推进\n- 2026年营收预测上调：预计2026年营收增长36%（美元计），较此前预测的35%小幅上调\n- H2毛利率压力：预计H2毛利率从H1的66.8%降至65%，因N2爬坡初期稀释和海外扩张成本\n- EPS预测上调：2026E EPS NT$98.86（此前NT$97.98），2027E EPS NT$130.54（此前NT$126.05）\n- 长期增长可见度扩展至2030年：首次加入2029-30E财务预测，2029E EPS NT$204.08，2030E EPS NT$243.45\n- 目标价大幅上调：从NT$2,650上调至NT$3,000（+13.2%），基于23x 2027E PE（此前21x），估值倍数扩张反映增长可见度提升\n- UBS vs 市场共识：2026E EPS NT$98.86 vs 市场NT$97.04；2027E EPS NT$130.54 vs 市场NT$124.04\n\n## 关联\n- [UBS四月销售额（2026-05-08）](entries/台积电UBS-4月营收4107亿-符合Q2预期.md)\n- [UBS US技术研讨会（2026-04-23）](entries/台积电UBS-US技术研讨会-A13-A12-N2U路线图与AI护城河.md)\n- [BofA AGM更新（2026-06-04）](entries/台积电BofA-股东大会AI需求与技术执行.md)\n\n## 引用\n- [UBS - TSMC May Sales Fast Take](res/台积电/2026-06-10-2330.TW-UBS Equities-UBS Fast Take Taiwan Semiconductor Manufacturing _May sale...-122508216.pdf)\n- [UBS快速解读：台积电4月营收NT$4,107亿——Q2开局符合预期](entries/台积电UBS-4月营收4107亿-符合Q2预期.md) — 共享标签: N2, monthly-sales, tsmc; 同标的: N2, monthly-sales; 共同关键词(18): 2027e, 积电, bs, q2", "n85": "# UBS：台积电US技术研讨会——通过技术堆栈扩展云AI护城河\n\n## 摘要\nUBS在台积电2026年北美技术研讨会后发布深度报告，维持买入评级与NT$2,650目标价（基于21x 2027E PE）。报告详细分析了台积电在先进制程、先进封装和硅光子领域的扩展路线图，强调其持续的技术领先地位。A13/A12作为A14系列的衍生节点引入，N2U作为N2平台的进一步演进，以及CoWoS扩展至14-reticle尺寸，均显示出台积电在AI时代的全面技术布局。UBS预计2026年营收达NT$5.21兆（+36.8% YoY），EPS NT$97.98（+47.9% YoY）。\n\n## 关键要点\n- A13节点：A14的衍生直接缩小版，面积节省6%，与A14设计规则完全兼容，客户可快速迁移，计划2029年量产\n- A12预览：A14的另一衍生节点，采用Super Power Rail背面供电技术，针对AI/HPC优化，计划2029年量产\n- N2U节点：N2新衍生版本，相比N2P速度提升3-4%或功耗降低8-10%，2028年量产，是成本/性能平衡方案\n- CoWoS扩展：14-reticle尺寸CoWoS，可集成约10个大型计算芯片和20个HBM堆栈，2028年量产，2029年扩展至14+ reticle\n- SoIC 3D堆叠：A14-to-A14 SoIC将于2029年量产，die-to-die IO密度相比N2-to-N2提高1.8倍\n- 硅光子COUPE：2026年达到关键量产里程碑，从CPO交换机开始\n- 财务预测：预计2026年营收NT$5.21兆（+36.8%），EBIT利润率57.2%，EPS NT$97.98\n- 高NA EUV：台积电路线图尚未采用高NA光刻，略落后于UBS对ASML的预期，但分析师认可台积电务实的技术升级策略\n\n## 关联\n- [BNP Paribas TSMC技术路线图（2026-04-24）](entries/台积电BNP-技术路线图-A13更新-重申Outperform.md)\n- [BofA产能与技术爬坡（2026-05-15）](entries/台积电BofA-产能与技术爬坡-缓解竞争担忧.md)\n\n## 引用\n- [UBS - TSMC US Tech Symposium](res/台积电/2026-04-23-2330.TW-UBS Equities-Taiwan Semiconductor Manufacturing _US Tech Symposium Scali...-121597085.pdf)\n- [BNP Paribas：台积电推出A13并更新技术路线图——重申Outperform](entries/台积电BNP-技术路线图-A13更新-重申Outperform.md) — 共享标签: A12, technology-roadmap, advanced-packaging; 同标的: A12, technology-roadmap; 共同关键词(11): 积电, 2026, 路线, to", "n86": "# 国信证券传媒行业4月投资策略：持续看好游戏、IP潮玩业绩表现，关注AI应用底部机会\n\n**来源**: 行业研究-传媒 | **机构**: 国信证券\n\n## 摘要\n\n国信证券发布传媒行业4月投资策略报告。报告认为传媒板块当前估值处于历史低位，游戏和IP潮玩赛道基本面强劲，持续推荐超配。游戏板块受新游大作上线周期驱动，2026年二季度多家公司Pipeline充裕；IP潮玩赛道受益于Z世代消费力释放和IP矩阵扩充。同时关注AI应用板块调整后的底部布局机会，认为随着模型能力迭代和推理成本下降，AI应用渗透率有望加速提升，建议关注在AI+内容、AI+营销方向有布局的标的。\n\n## 关键要点\n\n- 游戏板块：多家上市公司新游Pipeline密集，二季度有望迎来业绩催化\n- IP潮玩赛道：泡泡玛特等龙头海外扩张加速，IP矩阵持续扩充驱动增长\n- AI应用：板块调整充分，底部布局时机显现，关注AI+内容/营销落地\n- 估值层面：传媒板块整体估值处于历史低位，具备安全边际\n- 推荐标的：腾讯控股、网易、泡泡玛特、三七互娱、昆仑万维\n- 风险提示：宏观经济复苏不及预期，行业监管政策变化，AI商业化进度低于预期\n\n## 关联\n\n- 行业: 传媒, 游戏\n- 机构: 国信证券\n- 相关: 腾讯控股, 网易, 泡泡玛特, 三七互娱\n\n- [JPMorgan 2026 Global China Summit - 中国互联网行业关键洞察](entries/JPMorgan-2026-Global-China-Summit-中国互联网行业关键洞察.md) — 同主题：中国互联网/传媒行业投资\n- [阿里巴巴CY1Q26(4QFY26)预览：AI投资加大，电商CMR增长承压(JPMorgan/UBS)](entries/Alibaba-CY1Q26-Preview-AI-Investment-20260408.md) — 同主题：中国互联网平台投资\n- [腾讯控股2026Q1正式业绩：营收1965亿(+9%)，Non-IFRS净利+11%](entries/腾讯控股2026Q1正式业绩-营收1965亿-9-Non-IFRS净利-11.md) — 同主题：中国互联网龙头业绩", "n87": "# 地平线机器人：Starry舱驾融合方案重塑汽车AI\n\n## 摘要\n地平线机器人在2026 Tech Day发布三款重磅产品：Starry 6P/H舱驾融合SoC(5nm/650 TOPS)、HSD V1.6、以及KaKaClaw自动驾驶OS。MS维持Overweight/TP 10港元，UBS维持Buy/TP 13.2港元。Starry方案相比传统Nvidia+Qualcomm分立方案节省Rmb5,000/车，通过减少线束、壳体和内存(Rmb2-3k DDR节省)实现，首发奇瑞iCar(3Q26 SOP)。比亚迪、奇瑞、长安、北汽、一汽、大众、博世、电装等表达合作意向。\n\n## 关键要点\n- Starry 6P: 5nm制程(国内座舱芯片首家)，650 TOPS BPU算力，座舱性能1.4x，AD性能10-19x\n- 经济版Starry 6H: 500 TOPS，针对中低端车型\n- 集成方案节省50%空间和元器件数量，交付时间缩短56%\n- KaKaClaw OS平台兼容非地平线SoC，对标\"FSD+Grok\"，推动公司向AI Agent供应商转型\n- MS预测FY26/27营收63.3亿/93.8亿元，净亏损逐步收窄至FY27转正\n\n## 关联\n- [澜起科技AI互联分析](entries/澜起科技AI互联分析.md)", "n88": "---\ntype: Analysis\ntitle: 宁波银行2026Q1：营收和利润重回双位数增长，Morgan Stanley维持Top Pick\ndescription: 宁波银行2026Q1营收+10.2% YoY，净利润+10.3% YoY，NIM环比回升5bps至1.73%，贷款+15.7% YoY持续市占率提升，资产质量稳定(NPL 0.76%)，MS目标价45元对应0.87x 2026E P/B\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/宁波银行/2026-04-26-002142.SZ-Morgan Stanley-Bank of Ningbo Co. Ltd 1Q26 Revenue, PPOP and profit growt...-121638787.undefined.pdf\nsource_type: pdf\ntags: [bank-of-ningbo, profit-trend, valuation, 2026-Q1]\n---\n\n# 宁波银行2026Q1：营收和利润重回双位数增长\n\n## 摘要\n宁波银行2026Q1营收和净利润重回双位数增长（+10.2%/+10.3% YoY），主要由NII强劲增长（+14.4% YoY）和手续费收入反弹（+81.7% YoY）驱动。NIM环比回升5bps至1.73%，贷款余额同比+15.7%，持续市占率提升（对公贷款+16.6% QoQ）。资产质量稳定，NPL比率持平于0.76%，拨备覆盖率369.4%。Morgan Stanley维持Overweight评级和Top Pick，目标价45元，当前估值0.87x 2026E P/B具吸引力。\n\n## 关键要点\n- 2026Q1营收同比+10.2%（vs 2025全年+8.0%），净利润同比+10.3%（vs 2025全年+8.1%），增速明显加速\n- NII同比+14.4%，NIM环比回升5bps至1.73%，受益于贷款收益率提升（对公贷款+16.6% QoQ，票据-12.1%）\n- 手续费收入同比+81.7%，由财富管理和资管业务驱动\n- 贷款同比+15.7%，存款同比+10.6%，均大幅高于行业均值（行业贷款+3.2% QoQ，存款+4.2% QoQ）\n- 资产质量稳定：NPL比率0.76%持平QoQ，关注类贷款比率-8bps至1.06%，逾期90天以上贷款比率-2bps至0.58%\n- MS目标价45元（+39%上行空间），当前估值0.87x 2026E P/B\n- 2026E/2027E EPS预测4.80/5.55元，ROE 14.3%/14.8%\n\n## 引用\n- [Morgan Stanley - Bank of Ningbo 1Q26 Update](res/宁波银行/2026-04-26-002142.SZ-Morgan Stanley-Bank of Ningbo Co. Ltd 1Q26 Revenue, PPOP and profit growt...-121638787.undefined.pdf)\n- [宁波银行UBS 1Q26快评：超预期+分红率大幅提升至27%](entries/宁波银行UBS-1Q26快评-超预期-分红率大幅提升至27.md) — 共享标签: valuation, profit-trend, bank-of-ningbo; 同标的: bank-of-ningbo; 共同关键词(15): 银行, bank, yoy, 2026\n- [福耀玻璃BofA 1Q26：EBIT超预期10%，ASP增长11%驱动](entries/福耀玻璃BofA-1Q26-EBIT超预期10-ASP增长11-驱动.md) — 共享标签: valuation, profit-trend, 2026-Q1; 共同关键词(10): yoy, 2026, pdf, 增长\n- [福耀玻璃BNP 1Q26：运营和利润率保持稳健，重申Outperform](entries/福耀玻璃BNP-1Q26-运营和利润率保持稳健-重申Outperform.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(9): 和利, yoy, or, 2026\n- [福耀玻璃MS 1Q26电话会：ASP超指引，市占率持续提升](entries/福耀玻璃MS-1Q26电话会-ASP超指引-市占率持续提升.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(8): yoy, 2026, pdf, 00\n- [福耀玻璃UBS 1Q26快评：毛利率超预期，剔除汇兑利润+10% YoY](entries/福耀玻璃UBS-1Q26快评-毛利率超预期-剔除汇兑利润-10-YoY.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(7): yoy, 2026, pdf, 利润\n- [福耀玻璃JPM 1Q26：管理层看好2Q26订单动能，ASP增长可持续](entries/福耀玻璃JPM-1Q26-管理层看好2Q26订单动能-ASP增长可持续.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(6): 2026, pdf, 增长, 00", "n89": "---\ntype: Analysis\ntitle: 宁波银行UBS 1Q26快评：超预期+分红率大幅提升至27%\ndescription: 宁波银行2026Q1营收/净利润+10.2%/+10.3%超预期，NIM环比+5bps至1.73%，手续费收入+81.7% YoY，2025年分红率从21.9%大幅提升至27.0%，股息率3.7%\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/宁波银行/2026-04-27-002142.SZ-UBS Equities-First Read Bank of Ningbo _Q126 a clean beat; sizable divid...-121640444.pdf\nsource_type: pdf\ntags: [bank-of-ningbo, profit-trend, valuation, 2026-Q1]\n---\n\n# 宁波银行UBS 1Q26快评：超预期+分红率大幅提升\n\n## 摘要\nUBS对宁波银行2026Q1给出\"clean beat\"评价。营收同比+10.2%（vs 2025全年+8.0%），净利润同比+10.3%（vs 2025全年+8.1%），均超预期。NIM环比回升5bps至1.73%，受益于存款成本持续下行（H225存款成本-42bps YoY）。手续费收入同比+81.7%，反映存款搬家背景下理财产品分销放量。资产质量稳定，NPL比率0.76%持平，年化不良生成率78bps。更值得关注的是2025年分红率从21.9%大幅提升至27.0%（DPS 1.2元），股息率3.7%，对股价形成正面催化。当前估值0.85x 2026E P/B。\n\n## 关键要点\n- 2026Q1营收+10.2% YoY，净利润+10.3% YoY，均超预期，增速较2025全年（+8.0%/+8.1%）明显加速\n- NIM 1.73%（环比+5bps/同比-7bps），资产收益率3.18%（环比-4bps/同比-48bps），存款成本持续快速下行\n- 手续费收入同比+81.7%，受益存款搬家至理财产品\n- PPOP同比+15.3%，营业费用同比-1.7%，成本管控良好\n- 贷款同比+15.7%（对公+29.9% YoY，零售-3.2% YoY），存款同比+2.9%（增速明显放缓）\n- 资产质量稳定：NPL 0.76%持平，拨备覆盖率369.4%，关注类贷款比率1.06%（-8bps QoQ）\n- 2025年分红率从21.9%大幅提升至27.0%（DPS 1.2元），股息率3.7%\n- UBS预测2026E/2027E EPS 4.78/5.38元，ROE 13.2%/13.5%\n\n## 关联\n- [宁波银行2026Q1：营收和利润重回双位数增长，Morgan Stanley维持Top Pick](entries/宁波银行2026Q1-营收和利润重回双位数增长-Morgan-Stanley维持Top-Pick.md) — MS同样给出正面评价，目标价45元更乐观\n\n## 引用\n- [UBS - Bank of Ningbo Q126 First Read](res/宁波银行/2026-04-27-002142.SZ-UBS Equities-First Read Bank of Ningbo _Q126 a clean beat; sizable divid...-121640444.pdf)\n- [福耀玻璃UBS 1Q26快评：毛利率超预期，剔除汇兑利润+10% YoY](entries/福耀玻璃UBS-1Q26快评-毛利率超预期-剔除汇兑利润-10-YoY.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(17): ubs, first, yoy, 2026\n- [福耀玻璃BofA 1Q26：EBIT超预期10%，ASP增长11%驱动](entries/福耀玻璃BofA-1Q26-EBIT超预期10-ASP增长11-驱动.md) — 共享标签: valuation, profit-trend, 2026-Q1; 共同关键词(12): yoy, beat, 2026, pdf\n- [福耀玻璃MS 1Q26电话会：ASP超指引，市占率持续提升](entries/福耀玻璃MS-1Q26电话会-ASP超指引-市占率持续提升.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(8): yoy, 2026, pdf, 00\n- [福耀玻璃BNP 1Q26：运营和利润率保持稳健，重申Outperform](entries/福耀玻璃BNP-1Q26-运营和利润率保持稳健-重申Outperform.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(7): yoy, 2026, pdf, 00\n- [腾讯控股UBS 1Q26：符合预期，低估值的期权价值](entries/腾讯控股UBS-1Q26-符合预期-低估值的期权价值.md) — 共享标签: profit-trend, valuation, 2026-Q1; 共同关键词(14): read, ub, 2026, 1q26", "n90": "## 摘要\n\n安克创新（A股300866，H股00668）于2026年6月23-26日公开招股，全球发售46,632,800股H股，最高发售价HK$99.32，入场费约HK$1万。集资净额约HK$45.23亿，对应总市值~HK$720亿。基石阵容豪华，Schroders、Aspex、Principal、高瓴、Jane Street等11家合计认购2.95亿美元，锁定49.9%发售股份。AH折价21-27%属A+H蓝筹正常偏低区间，首日孖展0.39x反映散户情绪平淡。2025年经营现金流骤降至4.81亿（2024年为27.45亿）为最突出财务红旗。\n\n## 关键要点\n\n1. **募资与估值**：全球发售46.6M股H股，超配15%，集资净额~HK$45.23亿。H股市值~HK$46.3亿，总市值~HK$720亿。PE~24.56x（A股），非历史高位，AH折价21-27%处合理区间。\n\n2. **营收与增长**：收入从2023年175亿增至2025年305亿（CAGR~32%），增速从+41%放缓至+24%，属高基数正常回落。净利润从16.15亿增至25.45亿（CAGR~26%），净利率从9.2%微降至8.3%。\n\n3. **⚠️ 经营现金流红旗**：2025年经营现金流仅4.81亿，较2024年的27.45亿骤降82%。现金虽增至30.68亿，但经营现金流恶化需密切关注——可能反映应收账款累积或渠道库存压力。\n\n4. **品牌矩阵**：Anker充电（50.5%收入）、eufy智能家居（27.1%）、soundcore影音（22.4%）、Anker SOLIX储能（新兴）。亚马逊渠道依赖从57%降至52%，渠道多元化有效推进中。\n\n5. **基石阵容**：11家机构合计2.95亿美元，覆盖49.9%发售股份。Schroders（$70M）为最大股东，Aspex（$50M）、Principal（$40M）紧随其后，高瓴HHLR（$20M）、Jane Street（$15M）在列，信号积极。\n\n6. **研发投入**：R&D占比从8.1%（2023）升至9.5%（2025），绝对值从14.2亿增至29亿，积极信号。\n\n7. **2026Q1信号**：净利润4.72亿，同比-4.87%，增长放缓确认。孖展首日0.39x、次日0.99x反映散户兴趣有限。\n\n8. **保荐人与风险**：中金/高盛/摩根大通联合保荐。主要风险：亚马逊依赖（仍占52%）、经营现金流恶化、增长放缓、AH溢价收窄预期。\n\n\n## 关联\n\n- [JPMorgan中国AI应用调研：从模型竞赛到应用落地的转折点](entries/JPMorgan中国AI应用调研-从模型竞赛到应用落地的转折点.md) — 同主题：中国消费电子/AI应用\n- [Broadcom FY26Q2多投行研报汇总：AI需求爆发但预期过高，后端供应成新瓶颈](entries/broadcom-AVGO-FY26Q2-multi-bank-analysis.md) — 同主题：半导体/硬件供应链\n- [德银中国NEV周度新订单监控（2026年6月第3周）](entries/db-china-nev-weekly-orders-2026-06.md) — 同主题：中国消费电子与新能源", "n91": "# 工业富联AI服务器持续驱动增长\n\n## 摘要\n工业富联凭借AI基础设施需求爆发实现强劲增长，Morgan Stanley三篇报告均维持Overweight评级，目标价82.80元。1Q26营收2510亿元(+57% YoY)，营业利润beat MS/consensus分别7%/14%，主因AI服务器机架出货量大幅增长(GPU+3.8x YoY, ASIC+3.2x YoY)。毛利率持续改善至7.9%，营业利润率6.2%。2Q26管理层指引收入增长>15% YoY，AI服务器为主要驱动力，GB300仍占多数出货。\n\n## 关键要点\n- 1Q26云设备收入同比翻倍，AI GPU机架出货+3.8x YoY，AI ASIC服务器+3.2x YoY\n- 毛利率7.9%、营业利润率6.2%持续上升，体现规模效应与内部元器件采购优化\n- Vera Rubin NVL72机架量产目标3Q26末，产能准备中，4Q26开始放量\n- CPO交换机已进入量产准备阶段，预计3Q26量产；折叠手机机械部件同步推进\n- MS预测FY26/27/28 EPS分别为3.08/4.04/4.97元，AI收入占比持续提升\n\n## 关联\n- [汇川技术综合分析](entries/汇川技术多投行综合分析.md)\n- [澜起科技内存接口AI受益](entries/澜起科技AI互联分析.md)", "n92": "# 恒瑞医药JPM：与BMS达成US$152亿全球战略联盟\n\n## 摘要\n恒瑞医药于2026年5月12日宣布与百时美施贵宝（BMS）达成全球战略合作，涵盖肿瘤、血液、免疫领域13个早期项目，潜在总价值高达US$152亿（US$6亿首付款+两笔周年前付款+US$143亿开发/注册/商业化里程碑+分层特许权使用费）。这是恒瑞史上最大BD交易，也是中国药企第二大license-out交易（仅次于2026年初阿斯利康与石药的US$185亿交易），标志着恒瑞从\"授权方\"向\"战略共创者\"的升级——相比2025年与GSK的交易（~US$120亿），此次增加了Co-Co选择权和联合早期发现机制。恒瑞A股/港股在公告日分别上涨5%/4.8%。JPM维持A股Overweight（目标价Rmb70）、H股Neutral（目标价HK$70）。交易需美国HSR反垄断审核，预计3Q26完成。\n\n## 关键要点\n- 交易结构：US$6亿首付款（按项目相对公允价值分摊，多期确认收入，首笔4Q26入账）+ 两笔周年前付款 + US$143亿里程碑 + 分层特许权使用费（BMS区域净销售额可达双位数百分比）\n- 恒瑞获BMS三大专有发现平台使用权（靶向蛋白降解、细胞治疗、放射配体治疗）；BMS获恒瑞13个早期管线（>5,600名研发人员、15个全球研究中心、>100个临床阶段产品）\n- 恒瑞将主导8个授权资产的早期临床开发（至PoC），利用中国庞大患者群加速概念验证；PoC数据设计为可支持全球注册试验\n- JPM认为交易验证了中国创新药企差异化药物发现能力和早期临床开发能力，预计更多类似MNC与中国biotech交易将出现\n- 美国众议院此前要求FDA不接受中国临床数据用于IND申请，但BMS发起的此次交易表明行业对该政策担忧有限\n- JPM A股目标价Rmb70（基于DCF，WACC 9.6%，终端增长率3%），当前~Rmb56对应25x PE\n\n## 关联\n- [贵州茅台2026前瞻：飞天提价与渠道改革驱动结构性增长](entries/贵州茅台2026前瞻-飞天提价与渠道改革驱动结构性增长.md) — 同为高壁垒中国龙头，恒瑞全球化BD加速是区别于其他药企的关键差异化因素", "n93": "# 日月光投控（世界先进）：中介层业务好于预期，VSMC资本支出降低加速盈亏平衡\n\n**报告来源：** Nomura（2026-05-05）\n\n## 描述\nNomura于2026年5月5日发布世界先进（Vanguard，5347 TT）研报，评级从中性上调至买入，目标价TWD178（30x 2027F P/E）。公司2Q26E指引晶圆出货量环比+11-13%，ASP环比+2-4%，毛利率31-33%。VSMC资本支出从$78亿降至$67亿，产能目标从55kwpm降至44kwpm，因客户将提供工具且更多洁净室空间用于中介层生产。预计折旧峰值在2029-30F，但降低的固定成本可实现更快盈亏平衡。上调2026-28F EPS预测8-24%。\n\n## 摘要\n世界先进（VIS）作为世界先进半导体代工厂，专注于8英寸晶圆制造（显示驱动IC和电源管理）。2Q26E展望积极：晶圆出货+11-13% QoQ，ASP +2-4% QoQ，UTR从1Q26的~80%恢复至85-90%。VSMC（12英寸合资厂）关键更新：资本支出从$78亿降至$67亿（工具由客户提供），产能目标从55kwpm降至44kwpm（中介层生产需要更多空间）。VSMC将新增中介层/本地硅互连（LSI）产能，承接台积电外包的65nm硅中介层生产。管理层预期VSMC折旧2029-30年达峰，但成本降低有望解锁更快盈亏平衡。\n\n## 关键要点\n- **评级上调至买入**：从Neutral上调，目标价TWD178（30x 2027F P/E）\n- **2Q26E强劲指引**：晶圆出货+11-13% QoQ，ASP +2-4% QoQ，毛利率31-33%\n- **VSMC资本支出降低**：从$78亿降至$67亿，产能目标从55kwpm降至44kwpm\n- **中介层业务好于预期**：承接台积电65nm硅中介层/LSI外包\n- **2026F EPS上调**：TWD5.76（此前TWD5.42），上调8%\n- **营收预测**：2026F TWD574亿（+18% YoY），2027F TWD711亿（+24% YoY）\n- **UTR恢复**：1Q26约80%，2Q26E恢复至85-90%\n\n## 标签\n日月光投控, 世界先进, VIS, 5347, 代工, 中介层, VSMC, analysis-dimension:财报分析, time:2026Q2\n\n## 关联\n- [三星电子：存储能见度延伸至2027年](entries/三星电子存储能见度延伸至2027年代工提前盈亏平衡.md)", "n94": "# 毛戈平JPM Global China Summit纪要：2026增长可见性高\n\n## 摘要\nJPMorgan在Global China Summit上与毛戈平管理层会面。2026年1Q销售同比+>20%（线下SSSG >12%，好于全年指引），4月延续良好趋势。管理层维持2026全年+30%收入增长指引和稳定利润率。核心看点：1）承诺未来6个月内不减持，缓解配售后的市场担忧；2）维持>30%分红率并准备回购；3）618预售自5月1日提前启动，占全年线上约40%。JPM给予Overweight（目标价HKD130，31x 2027E PE），认为毛戈平是中国体验式消费的稀缺标的，在高端美妆市场份额仅2%，有翻倍空间。中期目标600个专柜（vs 2025年底445个），每年净增约30个。\n\n## 关键要点\n- 1Q26销售+>20%，线下SSSG +>12%（好于全年+30%收入指引隐含的SSSG假设）；4月延续良好\n- 管理层明确承诺6个月内不减持，积极准备回购，>30%分红率维护股东回报\n- 618预售自5月1日提前启动，预计占据全年线上约40%份额——提前卡位是关键策略\n- 海外拓展：香港首店（2025年10月开业）后计划继续开店，潜在进入东南亚/欧洲；与L Catterton战略合作增强全球可见性\n- 中期目标600家专柜（vs 445家），客户渗透空间大：线下640万vs目标4,000万，线上1,560万vs目标3-4亿\n- 1Q新品：琉光赋活系列、皮肤衣（Perfection Radiance Primer Cream）、防晒隔离乳等\n- JPM Dec-26 PT HKD130（31x 27E P/E），当前~HKD61对应约17x 26E PE，上行空间~113%\n\n## 关联\n- [贵州茅台2026前瞻：飞天提价与渠道改革驱动结构性增长](entries/贵州茅台2026前瞻-飞天提价与渠道改革驱动结构性增长.md) — 同为消费升级+品牌驱动，毛戈平处于更早期成长阶段\n- [老铺黄金多空观点：增长放缓与品牌升级之争](entries/老铺黄金多空观点-增长放缓与品牌升级之争.md) — 同为高增长消费品牌，但毛戈平海外扩张和国际对标尚处于起步阶段", "n95": "# 汇川技术多投行综合分析\n\n## 摘要\n汇川技术2025年实现营收451亿元(+22% YoY)、归母净利50.5亿元(+18% YoY)，但1Q26业绩低于预期——营收101亿元(+13% YoY)，归母净利10.13亿元(-23% YoY)。多投行一致指出1Q26利润下滑主因NEV业务竞争加剧及产能瓶颈。Macquarie下调TP至77.80元(中性偏多)，Deutsche Bank维持买入/TP 84元，JPMorgan维持OW/TP 84元，Morgan Stanley维持OW/TP 95元(SOTP估值)，华泰证券维持买入/TP 83.99元。核心分歧在于自动化订单强势(40%订单增长)能否及时转化为收入，以及NEV业务毛利率何时触底。\n\n## 关键要点\n- 自动化业务订单增长约40% YoY但因产能瓶颈收入仅增14%，产能5月扩30%后2Q26有望加速确认\n- NEV动力系统营收203亿元(+26% YoY)，但价格竞争导致毛利率承压，公司正推动成本传导\n- 新兴业务(机器人/数字能源/数据中心)营收18亿元(+16%)，人形机器人零部件产能落地南京、岳阳\n- 投行对FY26 EPS预测分歧：JPM 2.25元/MS 2.25元/DB 2.10元，普遍下调7-10%\n- 华泰证券强调\"出海加速\"战略——与头部客户\"借船出海\"并完善海外本土化运营\n\n## 关联\n- [工业富联AI服务器分析](entries/工业富联AI服务器分析.md)", "n96": "# 泡泡玛特2026前瞻：Labubu退潮与平台价值之争\n\n## 摘要\n泡泡玛特在1Q26面临核心IP Labubu需求降温的挑战——3月中国线上电商+106% YoY但较2H25月均低约20%，二手市场Labubu跌破发行价（二手价Rmb73 vs 原价Rmb99），Monster×Sanrio系列仅售40%折扣。DB率先给出Sell评级（目标价HKD157），认为市场将泡泡玛特误读为能持续制造爆款的\"平台公司\"，实则Labubu是吸引客流的唯一\"钩子\"；HSBC维持Buy（目标价HKD235）但下调2026收入增长预测至14%、净利润增长至10%，认为大部分估值压缩已反映（forward PE已从20x降至11x）。国信证券则看好4月小家电新品（冷藏箱/咖啡机/吹风机等，预计2026收入贡献约1%，毛利率52.8%）作为IP势能催化剂，维持优于大市。三份报告的核心分歧在于：Labubu降温是暂时调整还是结构性拐点，泡泡玛特能否从单一爆款IP升级为多IP平台。\n\n## 关键要点\n- DB Sell观点：Labubu是最关键\"钩子\"，其降温将影响全店销售连带率；Labubu 3.0二手价从Rmb99跌至Rmb73，Twinkle Twinkle也开始折价交易，时尚疲劳信号明显\n- HSBC预期1Q26收入Rmb99亿（环比微降），2026E收入+14% YoY、净利润+10% YoY（vs之前+18%），当前估值11x forward PE，认为de-rating已完成大半\n- 国信证券预计2026小家电收入约4.9亿（占比约1%），毛利率52.8%，战略意义大于短期财务贡献\n- DB预计海外1Q26 YoY仍+100%（但环比-10%），HSBC预计2026海外+19%（vs 2025年+292%大幅减速）\n- 三家券商均认可IP运营能力，但DB认为产品过密反噬稀缺性，HSBC则认为中长期平台价值仍在\n- 当前股价~HKD156，DB目标价HKD157，HSBC目标价HKD235，国信2026E PE 11x\n\n## 关联\n- [老铺黄金多空观点：增长放缓与品牌升级之争](entries/老铺黄金多空观点-增长放缓与品牌升级之争.md) — 同为消费品牌面临高基数增长减速，但老铺受益金价上行结构", "n97": "# 澜起科技：AI驱动内存互联需求持续增长\n\n## 摘要\n澜起科技1Q26业绩大超预期——归母净利8.47亿元(+61% YoY/+40% QoQ)，beat UBS预期21%。营收14.61亿元(+20% YoY)，互联芯片收入14.17亿元(+24% YoY)。最大亮点是毛利率同比大幅提升9.3ppt(环比+5.3ppt)，主因产品组合优化：DDR5 Gen3/Gen4 RCD占比提升+MRCD/MDB、PCIe Retimer、CKD、CXL MXC等高毛利新品收入2.69亿元(+94% YoY)，占总互联收入19%。UBS给予买入/TP 237港元(审核中)，认为公司是AI资本开支上升周期中的关键受益者。\n\n## 关键要点\n- 1Q26毛利率显著改善(+9.3ppt YoY)，主因DDR5迭代及高毛利新品占比提升\n- 新品收入(MRCD/MDB/Retimer/CKD/CXL)同比+94%至2.69亿元，占比19%\n- BT基板紧张有所缓解但仍限制出货，人民币升值亦造成汇兑损失\n- AI受益逻辑：MRDIMM(AI推理)、PCIe Retimer(GPU扩展)、CXL(存算分离)三大方向\n- UBS预测FY26/27 EPS 2.58/3.75元(Consensus 2.71/4.16元)\n\n## 关联\n- [地平线机器人舱驾融合分析](entries/地平线机器人舱驾融合分析.md)\n- [工业富联AI服务器分析](entries/工业富联AI服务器分析.md)", "n98": "---\ntype: Analysis\ntitle: 申万宏源腾讯深度之三：AI时代核心受益者，超级入口与生态壁垒的再进化\ndescription: 申万宏源深度研报看好腾讯作为AI时代核心受益者，微信14亿+用户的超级入口在Agent时代具天然优势，SOTP目标价765港元(+40%)，预计25-27年收入7556/8488/9299亿\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/腾讯控股/20260313-申万宏源-腾讯控股-0700.HK-AI时代核心受益者，超级入口与生态壁垒的再进化（腾讯控股深度之三）.pdf\nsource_type: pdf\ntags: [tencent, competitive-advantage, business-model, 2026]\n---\n\n# 申万宏源腾讯深度之三：AI时代核心受益者，超级入口与生态壁垒的再进化\n\n## 摘要\n申万宏源2026年3月发布腾讯深度研报（系列之三），重点探讨腾讯AI业务进展和后续潜力。核心观点：微信14亿+用户的超级入口（社交关系链+支付+小程序生态）在AI Agent时代具天然优势；WorkBuddy等Agent产品热度领跑验证了基于高频IM入口的场景穿透力；腾讯资本开支/经营现金流比例在头部科技公司中较低，具备长跑潜力；3D模型领域布局全球领先。SOTP估值目标价765港元（+40%上行空间），维持买入。\n\n## 关键要点\n- 微信超14亿用户的超级入口（社交+支付+小程序）为AI Agent构筑极高护城河\n- WorkBuddy等OpenClaw类产品热度领跑，验证高频IM入口在Agent层的裂变能力\n- 腾讯资本开支/经营现金流比例在全球头部科技公司中处于低位，AI投入有持续现金流支持\n- AI组织架构深度重构：2025年大模型独立建制、引入顶尖AI人才、汇报链条上移\n- 多模态模型矩阵成型：混元系列覆盖语言/图像/视频/3D，3D模型具全球竞争力\n- AI已实质性赋能广告（智能投放）和游戏（内容生成）两大核心业务\n- Agent时代核心范式\"大模型+记忆+规划+工具调用\"，微信小程序生态提供大量API接口\n- 目标价765港元（SOTP估值），预计25-27年营收7556/8488/9299亿元\n\n## 关联\n- [腾讯控股2026Q1正式业绩：营收1965亿(+9%)，Non-IFRS净利+11%](entries/腾讯控股2026Q1正式业绩-营收1965亿-9-Non-IFRS净利-11.md) — 后续业绩验证了AI投入和核心业务增长\n- [腾讯控股JPM 1Q26：转向更积极，双P&L披露化解AI稀释担忧](entries/腾讯控股JPM-1Q26-转向更积极-双P-L披露化解AI稀释担忧.md) — JPM同样看好AI期权价值\n\n## 引用\n- [申万宏源-腾讯控股深度之三](res/腾讯控股/20260313-申万宏源-腾讯控股-0700.HK-AI时代核心受益者，超级入口与生态壁垒的再进化（腾讯控股深度之三）.pdf)", "n99": "---\ntype: Analysis\ntitle: 福耀玻璃BNP 1Q26：运营和利润率保持稳健，重申Outperform\ndescription: 福耀玻璃2026Q1汽车玻璃收入+6.9% YoY（量-3.7%/价+11%），海外收入+11.2% YoY，毛利率37.4%超预期，铝饰条业务亏损持续收窄预计2026年盈亏平衡，BNP目标价A股CNY80/HKD80\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/福耀玻璃/2026-04-22-600660.SS-BNP Paribas-FUYAO GLASS - H  Operation and margin remain robust; reiter...-121560357.pdf\nsource_type: pdf\ntags: [fuyao-glass, profit-trend, competitive-advantage, 2026-Q1]\n---\n\n# 福耀玻璃BNP 1Q26：运营和利润率保持稳健，重申Outperform\n\n## 摘要\nBNP Paribas对福耀玻璃2026Q1给出\"运营和利润率保持稳健\"评价。汽车玻璃收入+6.9% YoY，可分解为量-3.7%/价+11%。分区域看，国内汽车玻璃收入+3.2% YoY，海外收入+11.2% YoY，海外增长显著。毛利率37.4%（+2.0ppt YoY/+0.3ppt QoQ），超预期。铝饰条业务（Fuyao SAM）亏损持续收窄，管理层预计2026年实现盈亏平衡。BNP维持Outperform评级，A股目标价CNY80（+33%），H股目标价HKD80（+27%），EPS预测小幅下调4%。\n\n## 关键要点\n- 汽车玻璃收入+6.9% YoY：量-3.7%/价+11%，ASP增长是核心驱动力\n- 国内汽车玻璃收入+3.2% YoY，海外收入+11.2% YoY（海外增速显著快于国内）\n- 毛利率37.4%（+2.0ppt YoY/+0.3ppt QoQ），超市场预期\n- 铝饰条业务（Fuyao SAM）亏损持续收窄，预计2026年盈亏平衡\n- BNP维持Outperform，A股目标价CNY80（+33%），H股目标价HKD80（+27%）\n- EPS预测下调4%（非实质性调整）\n- 估值基于DCF，关键风险：中国汽车销量超预期下滑、美国工厂爬坡延迟、能源/原材料成本上升\n\n## 关联\n- [福耀玻璃MS 1Q26电话会：ASP超指引，市占率持续提升](entries/福耀玻璃MS-1Q26电话会-ASP超指引-市占率持续提升.md) — MS补充高附加值产品占比57.6%和2Q26展望\n\n## 引用\n- [BNP Paribas - Fuyao Glass 1Q26](res/福耀玻璃/2026-04-22-600660.SS-BNP Paribas-FUYAO GLASS - H  Operation and margin remain robust; reiter...-121560357.pdf)\n- [福耀玻璃BofA 1Q26：EBIT超预期10%，ASP增长11%驱动](entries/福耀玻璃BofA-1Q26-EBIT超预期10-ASP增长11-驱动.md) — 共享标签: profit-trend, 2026-Q1, fuyao-glass; 同标的: fuyao-glass; 共同关键词(17): 1q26, yoy, 2026, 耀玻\n- [福耀玻璃UBS 1Q26快评：毛利率超预期，剔除汇兑利润+10% YoY](entries/福耀玻璃UBS-1Q26快评-毛利率超预期-剔除汇兑利润-10-YoY.md) — 共享标签: profit-trend, competitive-advantage, 2026-Q1; 同标的: fuyao-glass; 共同关键词(15): yoy, 2026, 耀玻, 毛利率37\n- [福耀玻璃JPM 1Q26：管理层看好2Q26订单动能，ASP增长可持续](entries/福耀玻璃JPM-1Q26-管理层看好2Q26订单动能-ASP增长可持续.md) — 共享标签: profit-trend, competit tries/福耀玻璃MS-1Q26电话会-ASP超指引-市占率持续提升.md) — MS补充高附加值产品占比57.6%和2Q26展望\n\n## 引用\n- [UBS - Fuyao Glass Q126 First Read](res/福耀玻璃/2026-04-21-600660.SS-UBS Equities-First Read Fuyao Glass _Positive Q126 earnings growth again...-121530995.pdf)\n- [福耀玻璃BNP 1Q26：运营和利润率保持稳健，重申Outperform](entries/福耀玻璃BNP-1Q26-运营和利润率保持稳健-重申Outperform.md) — 共享标签: profit-trend, competitive-advantage, 2026-Q1; 同标的: fuyao-glass; 共同关键词(15): yoy, 2026, 耀玻, 毛利率37\n- [福耀玻璃BofA 1Q26：EBIT超预期10%，ASP增长11%驱动](entries/福耀玻璃BofA-1Q26-EBIT超预期10-ASP增长11-驱动.md) — 共享标签: profit-trend, 2026-Q1, fuyao-glass; 同标的: fuyao-glass; 共同关键词(17): yoy, 2026, 耀玻, pdf\n- [福耀玻璃JPM 1Q26：管理层看好2Q26订单动能，ASP增长可持续](entries/福耀玻璃JPM-1Q26-管理层看好2Q26订单动能-ASP增长可持续.md) — 共享标签: profit-trend, competitive-advantage, 2026-Q1; 同标的: fuyao-glass; 共同关键词(12): 2026, 耀玻, pdf, glass\n- [宁波银行UBS 1Q26快评：超预期+分红率大幅提升至27%](entries/宁波银行UBS-1Q26快评-超预期-分红率大幅提升至27.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(17): ubs, first, yoy, 2026\n- [宁波银行2026Q1：营收和利润重回双位数增长，Morgan Stanley维持Top Pick](entries/宁波银行2026Q1-营收和利润重回双位数增长-Morgan-Stanley维持Top-Pick.md) — 共享标签: profit-trend, 2026-Q1; 共同关键词(7): yoy, 2026, pdf, 利润", "n104": "# 美光FQ3:26业绩预览：LTA与Agentic AI成为重估关键\n\n**报告来源：** UBS Equities（2026-06-08）\n\n## 描述\nUBS于2026年6月8日发布美光FQ3:26（5月）业绩预览报告。预计存储定价持续走强，公司指引将超预期，重点关注LTA（长期协议）和Agentic AI对存储需求的重塑。模型FY26/27E营收$1,166亿/$2,433亿，EPS $63.74/$151.27。重申买入评级，目标价$1,625（~15x NTM P/E applied to C2029E EPS $125）。\n\n## 摘要\nUBS认为美光FQ3:26（5月）业绩有望超预期，主要受存储定价持续走强推动。关键看点在于LTA——预计行业30%的DDR成交量将以略低于当前价格的水平锁定，形成盈利底部支撑。Agentic AI是存储需求新变量：单次智能体查询可产生4-5个并发Agent，每个执行独立CPU任务并持续与GPU/ASIC加速器交互，带来DRAM容量、HBM带宽和SSD存储的乘数级增长。HBM作为\"智能层\"，当前每GPU的KV缓存约10-100GB。美光预计在1-delta节点采用最新EUV工具。UBS模型显示C2026-2029E EPS均超过$100。\n\n## 关键要点\n- **FQ3:26预览**：预计营收$360亿/EPS $20.96，远超公司指引\n- **LTA结构变化**：预计30%行业DDR成交量锁定在略低于现价的水平，稳定盈利基础\n- **Agentic AI驱动**：KV缓存增长成为系统级瓶颈，HBM需求乘数级增长\n- **HBM仍是关键**：作为\"智能层\"直接贴近加速器，当前每GPU KV缓存10-100GB\n- **盈利预测**：FY26E EPS $63.74（营收$1,166亿），FY27E EPS $151.27（营收$2,433亿）\n- **目标价$1,625**：基于~15x NTM P/E，EPS CAGR强劲\n- **评级买入**：认为市场终将为美光结构性变化赋予更高估值\n\n## 标签\n美光, MU, 存储器, DRAM, HBM, AgenticAI, LTA, analysis-dimension:业绩预览, time:2026Q2\n\n## 关联\n- [Nova NDR要点](entries/Nova-NDR要点.md)", "n105": "# 老铺黄金多空观点：增长放缓与品牌升级之争\n\n## 摘要\n老铺黄金2025年营收273亿（+221% YoY），2026年面临高基数和金价波动的双重挑战。UBS（Buy, PT HKD930）情景分析显示2026E营收/净利润增长55%/67%（基准情形），线上渠道占比提升至20%（VS 2025低teens）可推升净利率。JPMorgan（Overweight, PT HKD1,296）上海渠道调研显示节日期间仍需排队10-30分钟、转化率>70%、新客占比约50%，需求韧性强劲，且短期增发可能性低。然而Macquarie（Underperform, PT HKD453）认为中国消费力难以支撑频繁涨价（2025年经历4轮），预计2027E净利润-40%，且高端店效已超国际奢侈品牌，运营杠杆风险下行。MS战术建议同样看多。当前股价~HKD588，估值从极端分化（UBS 11x vs Macquarie 10x 2027E PE）反映市场极度不确定性。\n\n## 关键要点\n- UBS基准情形：2026E收入/净利润+55%/+67%，线上占比提升至20%带来净利率结构性改善（线上NPM比线下高L-MSD）\n- UBS北京门店渠道调研：3-4月SSSG -20~30%，因高基数+金价回调+代购库存未消化；VIC客群好于中产\n- JPM上海调研：节日期间需求韧性，30单/小时，新品Rose Window系列缺货；5g金条赠品门槛从50万降至25万维护客情\n- Macquarie看空观点：2025年经历4轮涨价，消费力承压；店效超国际奢侈品牌（Rmb6-7亿/年），增长空间有限；2027E净利润-40% (-39.5%)\n- Macquarie预警：运营费用率仅14%（国际奢侈品牌>40%），若收入增速放缓，经营杠杆将显著恶化\n- 潜在催化剂：海外扩张（东南亚/日韩/欧洲）、SKU创新（镶钻纯金/珐琅）\n\n## 关联\n- [泡泡玛特多空观点：增长放缓与平台价值之争](entries/泡泡玛特多空观点-增长放缓与平台价值之争.md) — 同为高增长消费品牌面临增速拐点分歧，但有更强海外确定性", "n106": "---\ntype: Analysis\ntitle: 腾讯控股2026Q1正式业绩：营收1965亿(+9%)，Non-IFRS净利+11%\ndescription: 腾讯2026Q1营收1965亿(+9%)，Non-IFRS净利679亿(+11%)，游戏/广告/金融科技全面增长，Hy3 AI模型发布并成为OpenRouter最受欢迎模型，WorkBuddy成中国最广用AI智能体\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/腾讯控股/2026-05-13-腾讯控股-0700.HK-截至2026年3月31日止三个月业绩公布.pdf\nsource_type: pdf\ntags: [tencent, profit-trend, valuation, 2026-Q1]\n---\n\n# 腾讯控股2026Q1正式业绩：营收1965亿(+9%)，Non-IFRS净利+11%\n\n## 摘要\n腾讯2026Q1营收1965亿（+9% YoY），毛利1113亿（+11% YoY），Non-IFRS净利679亿（+11% YoY），全面超市场预期。游戏业务多款长青游戏流水创新高（王者荣耀/和平精英/三角洲行动），广告收入+20% YoY，金融科技+9% YoY。AI领域取得突破：Hy3 preview模型发布后在OpenRouter token消耗量稳居前列，WorkBuddy成为中国最受欢迎的AI智能体服务。视频号用户时长+20% YoY。微信小店交易额快速增长。\n\n## 关键要点\n- 营收1965亿（+9% YoY），毛利1113亿（+11% YoY），毛利率56.6%（+1ppt YoY）\n- Non-IFRS经营利润756亿（+9% YoY），Non-IFRS净利679亿（+11% YoY）\n- 增值服务961亿（+4%）：国内游戏454亿（+6%），国际游戏188亿（+13%）\n- 广告收入382亿（+20% YoY），受益视频号广告和腾讯营销AIM+智能投放\n- 金融科技及企业服务599亿（+9% YoY），商业支付金额增速环比提升\n- 微信MAU 14.32亿（+2% YoY），视频号用户时长+20% YoY\n- Hy3 preview模型发布（4月28日），推理/Agent/代码能力在同等参数规模中表现最佳\n- WorkBuddy以DAU计成为中国最受欢迎的效率AI智能体\n- Non-IFRS摊薄EPS 7.364元（+12% YoY），IFRS摊薄EPS 6.302元（+23% YoY）\n\n## 关联\n- [腾讯控股JPM 1Q26：转向更积极，双P&L披露化解AI稀释担忧](entries/腾讯控股JPM-1Q26-转向更积极-双P-L披露化解AI稀释担忧.md) — JPM的深度分析，目标价690港元\n- [腾讯控股UBS 1Q26：符合预期，低估值的期权价值](entries/腾讯控股UBS-1Q26-符合预期-低估值的期权价值.md) — UBS认为当前估值低估了AI期权的价值\n\n## 引用\n- [腾讯控股-截至2026年3月31日止三个月业绩公布](res/腾讯控股/2026-05-13-腾讯控股-0700.HK-截至2026年3月31日止三个月业绩公布.pdf)", "n107": "---\ntype: Analysis\ntitle: 腾讯控股JPM 1Q26：转向更积极，双P&L披露化解AI稀释担忧\ndescription: JPMorgan在腾讯2026Q1后转向更积极，管理层首次披露双P&L：Non-IFRS OP ex-AI为844亿(+17%) vs 含AI的756亿(+9%)，将AI稀释从叙事担忧转化为可审计数据，目标价690港元\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/腾讯控股/2026-05-13-0700.HK-JPMorgan-Tencent (0700) First Take 1Q26 - two PLs under one ticker-122024510.pdf\nsource_type: pdf\ntags: [tencent, profit-trend, valuation, 2026-Q1]\n---\n\n# 腾讯控股JPM 1Q26：转向更积极，双P&L披露化解AI稀释担忧\n\n## 摘要\nJPMorgan在腾讯2026Q1业绩后发布深度分析，核心亮点是管理层首次正式披露\"双P&L\"：Non-IFRS经营利润扣除新AI产品后为844亿（+17% YoY），而含AI投入为756亿（+9% YoY）。这实质上将\"AI稀释盈利\"的熊方叙事从无法证实的担忧转化为有数据支撑的可审慎指标。广告收入+20%超预期，国内游戏+6%稳健。JPM维持Overweight，目标价690港元。另一份详细报告《Compounding core, bounded AI, trough multiple》进一步阐述核心业务持续增长、AI投入可控、估值处于历史低位的三重逻辑。\n\n## 关键要点\n- 管理层首次披露双P&L：ex-AI的Non-IFRS OP 844亿（+17%）vs 含AI的756亿（+9%），AI投入约88亿/季\n- 营收1965亿略低于JPM预期（-4%），但经营利润673.8亿超JPM预期（+5%）\n- 广告收入382亿（+20% YoY），超出预期（+1% vs JPMe）\n- 国内游戏454亿（+6% YoY），低于预期（-4%），但多款长青游戏流水创新高\n- 国际游戏188亿（+13% YoY），低于预期（-13%），预计后续季度加速\n- 金融科技599亿（+9% YoY），符合预期\n- 目标价690港元（基于SOTP），核心业务估值合理+AI期权价值\n- JPM认为腾讯估值处于历史低位（约13x Forward PE），下行风险有限\n\n## 关联\n- [腾讯控股2026Q1正式业绩：营收1965亿(+9%)，Non-IFRS净利+11%](entries/腾讯控股2026Q1正式业绩-营收1965亿-9-Non-IFRS净利-11.md) — 官方业绩数据\n- [腾讯控股UBS 1Q26：符合预期，低估值的期权价值](entries/腾讯控股UBS-1Q26-符合预期-低估值的期权价值.md) — UBS同样看好当前低估值\n\n## 引用\n- [JPMorgan - Tencent 1Q26 First Take](res/腾讯控股/2026-05-13-0700.HK-JPMorgan-Tencent (0700) First Take 1Q26 - two PLs under one ticker-122024510.pdf)\n- [JPMorgan - Tencent Compounding core](res/腾讯控股/2026-05-13-0700.HK-JPMorgan-Tencent (0700) Compounding core, bounded AI, trough multiple-122031596.pdf)\n- [华泰证券腾讯1Q26前瞻：AI布局和云业务迎来拐点，维持买入](entries/华泰证券腾讯1Q26前瞻-AI布局和云业务迎来拐点-维持买入.md) — 共享标签: tencent, 2026-Q1, profit-trend; 同标的: tencent; 共同关键词(8): q2, ai, pdf, 1q", "n108": "---\ntype: Analysis\ntitle: 腾讯控股UBS 1Q26：符合预期，低估值的期权价值\ndescription: UBS认为腾讯2026Q1业绩符合预期，核心业务盈利能力稳健(+17% ex-AI)，当前约13x Forward PE处于历史低位，AI期权价值未充分定价，目标价516港元\ntimestamp: 2026-06-24T10:00:00+08:00\nresource: res/腾讯控股/2026-05-14-0700.HK-UBS Equities-First Read Tencent Holdings _1Q26 inline; undervalue option...-122029104.pdf\nsource_type: pdf\ntags: [tencent, valuation, profit-trend, 2026-Q1]\n---\n\n# 腾讯控股UBS 1Q26：符合预期，低估值的期权价值\n\n## 摘要\nUBS对腾讯2026Q1给出\"符合预期\"评价。非IFRS经营利润756亿（+9% YoY/环比+10%），略高于UBS预期750亿。分业务看，广告+20% YoY超预期，金融科技+9%符合预期，游戏国内+6%/国际+13%略低于预期。UBS认为当前核心业务估值约13x Forward PE处于历史低位，AI带来的增量价值未充分反映在股价中。维持Buy评级，目标价516港元（基于SOTP估值）。\n\n## 关键要点\n- Non-IFRS OP 756亿（+9% YoY/+10% QoQ），略超UBS预期750亿\n- 广告382亿（+20% YoY）为最大超预期亮点，视频号广告持续放量\n- 国内游戏454亿（+6% YoY）符合预期，王者荣耀/和平精英流水创新高\n- 国际游戏188亿（+13% YoY）低于预期，但Supercell表现强劲\n- 目标价516港元（基于SOTP），当前股价约460港元有约12%上行空间\n- 核心业务估值13x Forward PE，低于5年均值约18x\n- 腾讯AI投资（Hy3模型、WorkBuddy）尚未贡献显著收入，但提供期权价值\n- 视频号广告加载率仍远低于行业水平，长期变现空间大\n\n## 关联\n- [腾讯控股2026Q1正式业绩：营收1965亿(+9%)，Non-IFRS净利+11%](entries/腾讯控股2026Q1正式业绩-营收1965亿-9-Non-IFRS净利-11.md) — 官方业绩数据\n- [腾讯控股JPM 1Q26：转向更积极，双P&L披露化解AI稀释担忧](entries/腾讯控股JPM-1Q26-转向更积极-双P-L披露化解AI稀释担忧.md) — JPM更乐观的目标价690港元\n\n## 引用\n- [UBS - Tencent 1Q26 First Read](res/腾讯控股/2026-05-14-0700.HK-UBS Equities-First Read Tencent Holdings _1Q26 inline; undervalue option...-122029104.pdf)\n- [宁波银行UBS 1Q26快评：超预期+分红率大幅提升至27%](entries/宁波银行UBS-1Q26快评-超预期-分红率大幅提升至27.md) — 共享标签: profit-trend, valuation, 2026-Q1; 共同关键词(14): read, ub, 2026, 1q26", "n109": "# 英特尔：服务器需求顺风与制造叙事持续改善\n\n**报告来源：** UBS Equities（2026-04-23）\n\n## 描述\nUBS于2026年4月23日发布英特尔1Q26业绩点评。公司营收/Non-GAAP EPS $135.8亿/$0.29，超UBS预测$125.2亿/$0.06。服务器CPU需求快速回升使英特尔获得更好定价权，18A制程达到目标良率比计划快约6个月。上调CY26/27E营收从$531亿/$551亿至$595亿/$654亿，EPS从$0.44/$0.75上调至$1.39/$1.95。目标价从$65上调至$83（SOTP估值），评级中性。\n\n## 摘要\n英特尔1Q26业绩超预期，服务器需求是主要驱动力——DCAI营收51亿美元（+22% YoY），公司指引2Q环比增长双位数。制造/代工叙事持续改善：18A在目标良率上比计划快约6个月，14A生产PDK将于今年晚些时候发布，可能催化英伟达、苹果（M系列）、亚马逊等代工订单。Terafab更多是技术授权而非传统代工量单。UBS认为虽然制造叙事将持续改善，但目前股价已上涨近2倍，估值上行空间受限。即使在超级乐观情景下，$5+的EPS也要数年才能实现。\n\n## 关键要点\n- **1Q26业绩超预期**：营收$135.8亿（+7% YoY），Non-GAAP毛利率41%/EPS $0.29，超指引6.5pp\n- **DCAI强劲**：营收$51亿（+22% YoY），2Q指引环比+双位数，客户需求超出货量约$10亿\n- **18A良率超预期**：达到目标良率比计划快约6个月，14A PDK 1.0今年晚些时候发布\n- **代工催化剂**：有望签下英伟达、苹果（M系列）、亚马逊等代工订单\n- **中性评级**：目标价$83（SOTP），上行$98/下行$56；估值已大幅上涨\n- **盈利预测**：CY26E EPS $1.39（营收$595亿），CY27E EPS $1.95（营收$654亿）\n- **CCG展望**：2H环比持平但在PC TAM下降背景下，2027年可能成为逆风\n\n## 标签\n英特尔, INTC, 服务器CPU, 代工, 18A, AI, analysis-dimension:财报分析, time:2026Q2\n\n## 关联\n- [三星电子：存储能见度延伸至2027年](entries/三星电子存储能见度延伸至2027年代工提前盈亏平衡.md)", "n110": "# 英特尔：重新定价英特尔的AI系统级价值\n\n**报告来源：** 华泰证券（2026-04-25）\n\n## 描述\n华泰证券于2026年4月25日发布英特尔的AI系统级价值重估报告。26Q1业绩及Q2指引均超预期，AI驱动业务占总营收60%（同比+40%）。认为市场开始定价英特尔在AI基础设施中的系统级价值：美国本土先进封装和制造强化代工业务独特地位，叠加服务器CPU需求回暖下供给重要性凸显。上调26/27/28年营收预测至629/718/751亿美元，目标价从$71.5上调至$112（4.0x 27E PB），重申买入。\n\n## 摘要\n华泰证券认为2026年为Agentic AI元年，GPU并非AI\"one-size-fits-all\"解法，未来AI基础设施将更依赖CPU、GPU、ASIC、存储和高速网络的异构协同。英特尔Intel 3制程（Sierra Forest、Granite Rapids）正成为承接Agent时代CPU需求回暖的最大底气。服务器CPU供给偏紧、价格上调，同时AMD因台积电产能紧张可能委托三星生产EPYC，英特尔竞争力凸显。18A引入背部供电（PowerVia）与GAA（RibbonFET），已实现对台积电的制程追赶。台积电N2进入量产但背部供电版本16A明年才导入。\n\n## 关键要点\n- **26Q1业绩超预期**：营收$136亿（+7%），Non-GAAP毛利率41%/EPS $0.29，高指引6.5pp\n- **AI系统级价值重估**：AI驱动业务占营收60%（同比+40%），CPU在Agentic AI中与GPU形成1:1工作负载\n- **Intel 3成最大底气**：Sierra Forest、Granite Rapids升温，AMD因台积电产能紧张或转单三星\n- **18A实现制程追赶**：同时引入PowerVia（背部供电）和RibbonFET（GAA），领先台积电\n- **目标价$112（4.0x 27E PB）**：优于台积电5.7x但落后于格芯2.6x之间，反映代工亏损不确定性\n- **盈利预测上调**：26/27/28年Non-GAAP净利润66/89/99亿美元\n- **催化剂**：Agentic AI推理扩张、14A外部客户验证、AI基础设施异构协同\n\n## 标签\n英特尔, INTC, AI, AgenticAI, 代工, 18A, 服务器CPU, analysis-dimension:估值重估, time:2026Q2\n\n## 关联\n- [中际旭创1Q26超预期：1.6T推动利润率上行](entries/中际旭创1Q26超预期1-6T推动利润率上行.md)", "n111": "# 装备制造行业周报（5 月第4 周）\n\n**机构**: 世纪证券 | **类别**: 行业研究-装备制造 | **期间**: 2026-Q2\n\n## 摘要\n\n- 域订单充裕，排产维持高位，对锂盐需求形成有力支撑。展望\n- 二、 行业要闻及重点公司公告 ................................................ 5\n\n## 关键要点\n\n- 币64.32 亿元），环比大幅增长23.7%，同比增长13.4%。1-4\n- 同比增长29.7%。4 月逆变器出口呈现出\"欧洲稳、亚洲强、北\n- 量，环比暴增43%，其中沙特单月出口1.60 亿元，同比增幅\n- 口4.04 亿元，同比增长48%，环比也明显回升。逆变器及储\n- 环比上涨8.93%，同比上涨15.23%。从下游需求来看，储能领\n- 工程机械内需周期复苏，海外稳定增长，短期受市场风格影响\n\n## 关联\n\n- 行业: 行业研究-装备制造\n- 机构: 世纪证券\n- 期间: 2026-Q2\n\n- [德银中国NEV周度新订单监控（2026年6月第3周）](entries/db-china-nev-weekly-orders-2026-06.md) — 同主题：中国工业/制造业周度数据\n- [Morgan Stanley中国工业调研：Capex复苏更广泛、更强劲](entries/Morgan-Stanley中国工业调研-Capex复苏更广泛-更强劲.md) — 同主题：中国工业Capex与装备制造业\n- [Nomura Sansera Engineering (SANSERA IN) — Diversification gains momentum (Buy)](entries/Nomura-Sansera-Engineering-Buy-Diversification-gains-momentum-20260521.md) — 同主题：工业制造/装备行业", "n112": "# 贵州茅台2026前瞻：飞天提价+渠道改革驱动结构性增长\n\n## 摘要\n贵州茅台2026年3月31日起上调飞天出厂价至Rmb1,269/瓶（经销商渠道+8.6%至Rmb1,269，直销渠道+2.7%至Rmb1,539），同时下调茅台1935出厂价并启动经销商\"代销模式\"（5%代销费率），标志着价格市场化改革加速。1Q26收入+6.3% YoY符合预期，但毛利率-331bp至74.9%，因定制酒（高毛利）占比从~50%降至<20%、i茅台占比大幅提升至73%。MS（OW, PT Rmb1,790）估算提价贡献2026-27E EPS约3-4%，维持审慎乐观。BofA（Buy, PT Rmb1,630）将4Q25（收入-19%、利润-30%）视为\"出清事件\"，预期2026年中个位数增长，3.6%股息率+回购在低利率环境下提供安全垫。Jefferies最为乐观（Buy, PT Rmb2,100），认为茅台是\"中国奢侈品复苏\"最佳标的，线上+线下整合与经销商激励改革将驱动2H26盈利拐点。\n\n## 关键要点\n- 飞天出厂价Rmb1,269（经销商）/ Rmb1,539（直销），前次提价为2023年11月（提价21%至Rmb1,169）\n- 1Q26茅台酒收入+5.6%：飞天+70%但定制酒-60~70%；i茅台直销收入+267%至Rmb215.5亿（占DTC 73%）\n- 4Q25因去库存+渠道改革+需求疲软导致收入-19%/利润-30%（2015年以来首次季度利润下降），BofA视为出清\n- MS强调提价后短期批价反弹，但长期取决于供需；Jefferies认为线下线上整合赋予平台定价权\n- 2025年分红率79%（vs 2024年75%），DPS Rmb51.93（+0.9% YoY），当前股息率3.6%；另有回购计划\n- MS/BofA/Jefferies一致看好但催化剂不同：MS看重提价EPS增厚，BofA看重防御价值，Jefferies看重2H26盈利回升\n- 茅台1935改革：出厂价下调后经销商积极性提升，成为第二增长引擎\n\n## 关联\n- [老铺黄金多空观点：增长放缓与品牌升级之争](entries/老铺黄金多空观点-增长放缓与品牌升级之争.md) — 同为消费升级标的，但茅台具有更强的提价能力和品牌壁垒", "n113": "# 隆基绿能：BC技术转型与储能扩张\n\n## 摘要\n隆基绿能2025年/1Q26持续亏损，FY25净亏损64亿元，1Q26剔除减值后净亏损环比略收窄至17亿元。UBS给予买入/TP 22.8元(原25.3元)，看好BC技术突破——BC出货占比从FY25的28%跃升至1Q26的66%，3月实现与TOPCon成本平价，预计组件业务3Q26扭亏。JPMorgan维持UW/TP 11.7元，认为光伏产能过剩尚需政策干预。公司同步加速储能(BESS)布局，目标2026年6GWh出货，5年内储能规模追平光伏。\n\n## 关键要点\n- 1Q26综合毛利率-1.2%(环比-1ppt)，主因银价上涨、需求弱及产能升级致开工率低\n- BC技术溢价：预计享有$0.01-0.02/W价格溢价及10%毛利率溢价优于TOPCon\n- 57GW BC产能(自有46GW+外协11GW)，计划升级20GW减银产线，2H26目标8GW出货\n- BESS业务1月收购精控能源后加速，主攻中国/欧洲/澳洲/美国市场\n- JPM UW逻辑：光伏过剩产能出清需政策干预，隆基P/B 2.2x但仍在亏损\n\n## 关联\n- [万国数据AI数据中心分析](entries/万国数据AI驱动数据中心分析.md)"}, "types": ["Analysis", "Note"], "palette": {"Article": "#3b82f6", "Analysis": "#8b5cf6", "Synthesis": "#ec4899", "Reference": "#10b981", "Note": "#94a3b8"}, "stats": {"total_nodes": 114, "total_edges": 276, "orphans": 1}};

const p=B.palette||{};
B.types.forEach(t=>{
  const c=p[t]||'#94a3b8',ch=document.createElement('span');
  ch.className='chip';ch.textContent=t;ch.style.setProperty('--c',c);
  ch.addEventListener('click',()=>{
    const active=ch.classList.toggle('active');
    B.types.forEach(t2=>document.querySelectorAll('#type-chips .chip:not([data-all])')
      .forEach(c2=>{if(c2!==ch)c2.classList.remove('active')}));
    document.querySelector('#type-chips [data-all]').classList.toggle('active',!active);
    cy.nodes().forEach(n=>n.toggleClass('dim',active&&n.data('type')!==t));
    cy.edges().forEach(e=>e.toggleClass('dim',e.source().hasClass('dim')||e.target().hasClass('dim')));
  });
  document.getElementById('type-chips').appendChild(ch);
});
document.querySelector('#type-chips [data-all]').addEventListener('click',()=>{
  document.querySelectorAll('#type-chips .chip').forEach(c=>c.classList.remove('active'));
  document.querySelector('#type-chips [data-all]').classList.add('active');
  cy.elements().removeClass('dim');
});

// Legend
const legend=document.getElementById('legend');
B.types.forEach(t=>{
  const c=p[t]||'#94a3b8';
  legend.innerHTML+='<span class="legend-item"><span class="stats-dot" style="background:'+c+'"></span>'+t+'</span>';
});

// Indices
const nodeIdx={};B.nodes.forEach(n=>nodeIdx[n.data.id]=n.data);
const backlinks={};B.edges.forEach(e=>{(backlinks[e.data.target]||=[]).push(e.data.source)});

// Cytoscape
const cy=cytoscape({
  container:document.getElementById('graph'),
  elements:[...B.nodes,...B.edges],
  style:[
    {selector:'node',style:{
      'background-color':'data(color)','label':'data(label)','color':'#0f172a',
      'font-size':9.5,'text-valign':'bottom','text-margin-y':3,'text-wrap':'wrap','text-max-width':100,
      'width':'data(size)','height':'data(size)','border-width':1,'border-color':'data(color)',
      opacity:.92,'transition-property':'opacity','transition-duration':150
    }},
    {selector:'node:selected',style:{'border-width':3,'border-color':'#f59e0b'}},
    {selector:'edge',style:{width:1.5,'line-color':'#cbd5e1','target-arrow-color':'#cbd5e1','target-arrow-shape':'triangle','curve-style':'bezier','arrow-scale':.8}},
    {selector:'.dim',style:{opacity:.08}},
    {selector:'.hidden',style:{display:'none'}}
  ],
  layout:{name:'cose',animate:false,padding:30},
  wheelSensitivity:.2
});

cy.on('tap','node',evt=>showDetail(evt.target.id()));
cy.on('tap',evt=>{if(evt.target===cy)clearSelection()});

// Search
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  if(!q){cy.elements().removeClass('dim');return}
  cy.nodes().forEach(n=>{
    const d=n.data();
    const hay=(d.label||'').toLowerCase()+' '+d.id+' '+(d.tags||[]).join(' ').toLowerCase();
    n.toggleClass('dim',!hay.includes(q));
  });
  cy.edges().forEach(e=>e.toggleClass('dim',e.source().hasClass('dim')||e.target().hasClass('dim')));
});

// Layout
document.getElementById('layout').addEventListener('change',e=>{
  const name=e.target.value,opts={name,animate:false,padding:30};
  if(name==='grid')opts.rows=Math.ceil(Math.sqrt(cy.nodes(':visible').length||1));
  cy.layout(opts).run();
});
document.getElementById('reset').addEventListener('click',()=>{cy.fit(null,30);clearSelection()});

// Detail panel
function clearSelection(){
  cy.elements().unselect();
  document.getElementById('detail-empty').hidden=false;
  document.getElementById('detail-content').hidden=true;
}

function showDetail(nid){
  const d=nodeIdx[nid];if(!d)return;
  cy.elements().unselect();
  const n=cy.getElementById(nid);if(n)n.select();
  document.getElementById('detail-empty').hidden=true;
  const content=document.getElementById('detail-content');content.hidden=false;

  const badge=document.getElementById('detail-type');
  badge.textContent=d.type;badge.style.background=d.color;

  document.getElementById('detail-title').textContent=d.label;
  document.getElementById('detail-description').textContent=d.description||'—';

  const resEl=document.getElementById('detail-resource');resEl.innerHTML='';
  const resource=d.resource||'';
  if(/^https?:\/\//.test(resource)){
    const a=document.createElement('a');a.href=resource;a.target='_blank';a.rel='noopener';
    a.textContent=resource.length>80?resource.slice(0,77)+'...':resource;resEl.appendChild(a);
  }else{resEl.textContent=resource||'—';}

  const tagsEl=document.getElementById('detail-tags');
  tagsEl.innerHTML=d.tags?.length?d.tags.map(t=>'<span class="tag">'+t+'</span>').join(''):'—';

  // Detail body: render markdown from bundle bodies
  const body=B.bodies[nid]||'';
  const bodyEl=document.getElementById('detail-body');
  bodyEl.innerHTML=body?renderMD(body):'<p class="muted">无正文内容</p>';

  // Backlinks
  const bl=backlinks[nid]||[];
  const blEl=document.getElementById('backlinks-list');blEl.innerHTML='';
  const blSec=document.getElementById('detail-backlinks');
  if(bl.length){blSec.hidden=false;bl.forEach(s=>{
    const li=document.createElement('li'),a=document.createElement('a');
    a.textContent=nodeIdx[s]?.data?.label||s;a.addEventListener('click',()=>showDetail(s));
    li.appendChild(a);blEl.appendChild(li);
  })}else{blSec.hidden=true;}

  cy.animate({center:{eles:n},zoom:Math.max(cy.zoom(),1.0)},{duration:200});
}

// Simple markdown renderer
function renderMD(t){
  if(!t)return'';
  let h=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,(_,lang,code)=>'<pre><code>'+code.trim()+'</code></pre>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2">');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  h=h.replace(/^---$/gm,'<hr>');
  h=h.replace(/^[\*\-] (.+)$/gm,'<li>$1</li>');
  h=h.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');
  h=h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/\n\n+/g,'</p><p>');
  h='<p>'+h+'</p>';
  return h.replace(/<p>\s*<\/p>/g,'');
}

// Auto-init
const initial=B.nodes[0];
if(initial)showDetail(initial.data.id);
})();
</script>
</body>
</html>
