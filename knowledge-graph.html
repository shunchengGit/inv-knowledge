novance's group declined RMB270mn \nYoY in 1Q26 with merely 1.1% NPM;\nn\nOperating profit declined 64% YoY to RMB94mn in 1Q26 on strategic \ninventory stock-up.\nOutlook: Target 10-30% YoY revenue and net profit growth for 2026E, despite \nthe profit decline in 1Q26; GPM could improve\nFor 2026E, Inovance targets 10-30% YoY growth for revenue and net profit. \nManagement reassured that the targets have taken into consideration the \nchallenges of the NEV business. Given the profit decline in 1Q26, this suggests \nstrong profit growth in the reminder 9M of the year.\nFor 2Q26E, management guides for GPM to improve as Inovance raises prices for \nautomation products. The NEV business is also trying to pass on cost inflation, \nalthough this comes with a lag. For revenue, management guides for higher \nrevenue for the Automation business in 2Q26E on expanded production capacity.\nWe forecast group revenue of RMB53.8bn (+19% YoY), and net profit of RMB5.7bn \n(+13% YoY; 10.6% NPM) for 2026E.\nAutomation: Solid order momentum continued in April; 2Q26E to pick up as \n1Q26 affected by production constraints\nAutomation orders grew strongly by +40% YoY in 1Q26 for Inovance driven by \nbroad-based end-market growth, led by battery, smart phone, machine tool, HVAC, \nautomotive, construction machinery and electronics. Management pointed to \ncontinued solid momentum in April and believes market demand should be \nstronger in 2026E than in 2025. Out of the 40% order growth, management \nestimates 10% was driven by stock-up by distributors, with the majority of the \ngrowth still driven by underlying solid market demand.\nAutomation revenue growth of +14% YoY in 1Q26 was affected by production \nconstraints. Inovance is increasing capacity and targets +30% higher production \nin May and June. Management therefore expects robust revenue delivery in \n2Q26E. Refer to Figure 5 for Inovance's automation orders vs revenue growth \nhistory.\n\n--- з¬¬3йЎө ---\n29 April 2026\nManufacturing\nInovance\nDeutsche Bank AG/Hong Kong\nPage 3\nInovance has issued price increase letters twice YTD, one in January and one in \nMarch. Management believes Inovance has decent pricing power for a majority of \ncustomers. The higher memory price affects mainly PLCs. Management hears that \nsome PLC models from certain international brands have run out of stock.\nComments about the solid China automation market momentum and price \nincreases are consistent with our channel checks (link to our China Automation \nMarket monthly channel check report).\nWe forecast +25% revenue growth YoY in the Automation business and GPM of \n44%, up ~50bps YoY in 2026E. We forecast revenue growth to accelerate to 30% \nYoY for 2Q26E from +14% in 1Q26.\nHumanoid robot: Nomination received from domestic OEMs to supply \ncomponents; To launch wheeled robots in August\nInovance's product portfolio for humanoid robots include frameless motors, drives, \nencoders, screws, linear and rotary actuators and seven degrees of freedom robot \narms.\nFor the components, Inovance has received nominations from local humanoid \nrobot makers and are developing customised products for them. For robot arms, \nInovance is able to mass produce these and is confident about the quality as the \narms are equipped with liquid cooling and suitable for industrial use.\nInovance plans to launch wheeled robots for industrial application in August to \naddress simple tasks such as handling, gripping, unpacking, door closing, and \nplugging and unplugging. Inovance targets to deploy them in its own and \ncustomers' factories.\nInovance is working with partners and supplies components and data. Inovance \nutilises existing large models rather than developing them itself.\nAs China's largest automation component manufacturer and China's top-four \nindustrial robot maker with a comprehensive product portfolio, we think Inovance \nis well-positioned to become a prominent supplier for humanoid and AI robots in \nChina over time.\nNEV: Profit hit by cost inflation; Orders still strong; 2Q26E guided to be better \nthan 1Q26\nThe NEV business disappointed the market in 1Q26 вҖ” NPM margin dropped to \n1.1% in 1Q26, representing the lowest NPM since 2023. This was due to the higher \ncost of copper, aluminum and rare earths which account for a relatively high portion \nof the COGS. Cost increases have exceeded the locked-in prices and hedging \nagreements. Furthermore, competition, product mix and R&D on new products \nalso weighed on profits.\nManagement flagged strong orders, despite the slow sales in 1Q26. In 1Q26, \nInovance secured multiple new project nominations from domestic and \ninternational OEMs for motors, electronic controls, power supplies, and assembly \nproducts (overseas projects being global platform projects). Additionally, the 800V \nactive suspension product for a domestic OEM will enter the SOP (start of \nproduction) stage soon.\nManagement remains confident about the long-term growth opportunities from\n\n--- з¬¬4йЎө ---\n29 April 2026\nManufacturing\nInovance\nPage 4\nDeutsche Bank AG/Hong Kong\nintelligent chassis (suspension and stabilizer bar) and the expansion into overseas \nOEMs. Management guides for a better 2Q26E than 1Q26.\nRefer to Figure 11 for detailed financials of Inovance Automotive (NEV) business.\nWe forecast +18% revenue growth YoY for the NEV business and GPM of 14%, \ndown ~2ppts YoY in 2026E.\nAI: Integrating AI with Inovance's industrial know-how\nInovance completed the development of \"Inovance Industrial Intelligent Brain \n(iFG)\" platform in 1H25. iFG integrates data, models and agents. Inovance targets \nto implement AI from the below perspectives:\nn\nApplying iFG on existing software and hardware offerings (CNC, PLC, HMI, \netc.) to conduct intelligent Q&A, code generation and intelligent \ninteraction;\nn\nEmpowering discrete automation customers with agents;\nn\nProviding AI edge all-in-one machine for diagnosis, prediction \nmaintenance, and efficiency improvement.\nManagement did not provide long-term targets but expects revenue from AI to \ndouble its current software revenue in 3-5 years.\nWe feel that it is still early days for Inovance to promote its AI solutions. In contrast, \nwe think its peer Supcon started the AI initiatives much earlier and has a clearer \npath towards monetisation вҖ” Supcon targets RMB800mn-1bn revenue from \nIndustrial AI in 2026E. We believe Inovance should benefit from the industrial data \nit possesses and its industrial know-how to link AI with the physical world. We \ntherefore will monitor its progress closely.\nDigital energy: A top five supplier for medium- to high-power PCS globally\nInovance supplies power conversion system (PCS). In 2025, Inovance generated \nRMB500mn revenue from the PCS business. Frost & Sullivan reckons Inovance is \nthe fifth largest supplier for medium- to high-power PCS globally by shipment \nvolume in 2025 with a market share of 7%. The company announced on 17 \nNovember that it has commissioned a new plant for PCS in Xi'an. The designed \ncapacity is 50GW and could contribute RMB10bn to revenue. Additionally, \nInovance has the capability for energy management for commercial and industrial \ncustomers.\nFor energy storage, Inovance shipped 10GW and over 1GWh storage in 2025. It has \nestablished model points in 20+ countries in 2025 and plans to further expand the \nbusiness.\nAI Data Centre: Supplying PSU, and developing SST\nInovance already supplies power supply units (PSU) for data centres. It is also \nforming up a team to develop solid-state transformer (SST). Management also sees \nopportunities in energy management considering its leading place in inverters.\nHK listing in progress\nInovance disclosed its prospectus for the HK listing on 28 April. News reports that \nthe company is looking to raise US$2bn. Management describe the purpose of the\n\n--- з¬¬5йЎө ---\n29 April 2026\nManufacturing\nInovance\nDeutsche Bank AG/Hong Kong\nPage 5\nlisting as (1) to establish Inovance's brand overseas and (2) fund potential overseas \nacquisitions.\nCut estimates; Target price at RMB84\nWe cut our 2026/27 net profit forecasts by -8%/ -4%, respectively. We introduce \nnew 2028 forecasts.\nWe slightly adjust our DCF-derived target price to RMB84 from RMB83.9 as the \nlower estimates are offset by us rolling forward the valuation by 3M. Our target price \nof RMB84 is made up of (1) RMB80.2 (from RMB80) per share, based on a three-\nstage DCF of the underlying business, and (2) RMB3.8 (from RMB3.9) per share \nfrom humanoid robot contribution totalling ~RMB10bn. We use a terminal growth \nrate of 3.5% given the structural growth in the automation and NEV market. We use \na risk-free rate of 1.8%, an equity risk premium of 5%, and a beta of 1.2 to derive our \nWACC of 7.7%.\nInovance is trading on 2026E P/E of 32.1x and 2027E P/E of 25.9x, below its average \nlong-term one-year-forward P/E of 34.3x.\nDownside risks include: 1) slow automation market growth; 2) lack of share gain of \nInovance for the automation business; 3) severe pricing pressure weighing on \nmargins; and (4) a slow NEV market and the resultant pressure on its automotive \nsales and profitability.\n\n--- з¬¬6йЎө ---\n29 April 2026\nManufacturing\nInovance\nPage 6\nDeutsche Bank AG/Hong Kong\nFigure 1: Inovance's net profit declined in 1Q26, weighed predominantly by the NEV business on cost inflation; FX loss \nand asset impairment dragged non-NEV business\nGeneral servo\n1,300\n1,700\n3,000\n1,300\n1,300\n2,600\n5,600\n1,720\n1,980\n3,700\n1,640\n1,510\n3,150\n6,850\n2,096\nYoY\n3%\n4%\n4%\n-15%\n-18%\n-16%\n-7%\n32%\n16%\n23%\n26%\n16%\n21%\n22%\n22%\nGeneral inverter\n900\n1,600\n2,500\n1,200\n1,500\n2,700\n5,200\n1,280\n1,420\n2,700\n1,350\n1,650\n3,000\n5,700\n1,242\nYoY\n2%\n20%\n13%\n-2%\n-15%\n-9%\n0%\n42%\n-11%\n8%\n13%\n10%\n11%\n10%\n-3%\nPLC&HMI\n300\n390\n690\n310\n300\n610\n1,300\n420\n480\n900\n390\n510\n900\n1,800\n535\nYoY\n-12%\n-12%\n-12%\n-25%\n-26%\n-25%\n-19%\n40%\n23%\n30%\n26%\n70%\n48%\n38%\n27%\nGeneral Automation\n2,868\n3,922\n6,790\n3,090\n3,860\n6,950\n13,740\n3,756\n4,269\n8,025\n3,895\n4,980\n8,875\n16,900\n4,252\nYoY\n11%\n3%\n6%\n-9%\n-7%\n-8%\n-1%\n31%\n9%\n18%\n26%\n29%\n28%\n23%\n14%\n%\n44%\n40%\n42%\n34%\n33%\n33%\n37%\n42%\n37%\n39%\n35%\n37%\n36%\n37%\n42%\nE\nвҖҰ(жҲӘж–ӯ)", "n19": "--- з¬¬1йЎө ---\nAsia Pacific Equity Research\n29 April 2026\nJ P M O R G A N\nwww.jpmorganmarkets.com\nShenzhen Inovance Technology \nCo. Ltd - A\nModel update after 1Q26 briefing: delivery and margin \ncheckpoints sharpen, while the order cycle remains \nconstructive; stay OW\nOverweight\n300124.SZ, 300124 CH\nPrice (29 Apr 26):Rmb67.59\nв–јPrice Target (Jun-27):Rmb84.00\nPrior (Dec-26):Rmb97.00\nInfrastructure, Industrials & \nTransport\nKaren Li, CFA AC\n(852) 2800-8589\nkaren.yy.li@jpmorgan.com\nSunny Su\n(852) 2800 8551\nsunny.su@jpmorgan.com\nJenny Qiu, CFA\n(852) 2800 8503\njenny.qiu@jpmorgan.com\nMufan Shi\n(852) 2800-8502\nmufan.shi@jpmorgan.com\nBeatrice Lam\n(852) 2800-8738\nbeatrice.lam@jpmorgan.com\nJ.P. Morgan Securities (Asia Pacific) Limited/ J.P. \nMorgan Broking (Hong Kong) Limited\nKey Changes (FYE Dec)\nPrev\nCur\nО”\nAdj. EPS - 26E (Rmb)\n2.45\n2.25\n-7.9%\nAdj. EPS - 27E (Rmb)\n3.07\n2.77 -10.0%\nStyle Exposure\nInovanceвҖҷs 1Q26 earnings missed despite very strong IA order growth, and the past \ntwo sessions show the marketвҖҷs focus has tightened to one issue, in our view: \nwhether order momentum converts into delivered revenue and margin recovery \nfast enough to defend FY26 guidance. The stock fell ~6% yesterday on the print \nversus a flattish CSI300, then rebounded 10% today following the after-market \nbriefing (CSI300 again flattish at +0.7%), as investors gained comfort from \nyesterdayвҖҷs briefing that the shortfall was mainly timing/high base and one-offs \nrather than demand deterioration, and that delivery bottlenecks have a near-term \noperational path to improvement. We maintain OW but de-risk our forecasts: \nFY26/27E profit cut by 7%/10%, FY28E introduced, DCF horizon extended to \nJun-27, and PT reset to Rmb84 (~25% upside post todayвҖҷs rebound), supported by \n~15% revenue CAGR and ~23% profit CAGR into FY28E.\nвҖў\nIA demand broad-based and April order momentum strong, yet 1Q \ndelivery lagged materially on capacity constraint. The near-term setup is \nbinary in terms of investor confidence, we believe: (i) capacity uplift in May \n(30%+) and a visible 2Q backlog digestion cycle that translates into revenue \nbooking; and (ii) an initial turn in margin trajectory as price pass-through and \nproduct mix begin to show up more clearly. Pricing power remains an \nimportant differentiator, but it needs to reflect in reported gross margin; the \nmanagement briefing points to MarchвҖ“April as the start of IA price-effect \nvisibility, making 2Q the first quarter where consolidated GPM is poised to \nrecover with IA leading. We believe the share price whipsaw (-6% then +10% \nvs flat CSI300) reinforces that the market will reward proof quickly if these \ncheckpoints land.\nвҖў\nImproved confidence in FY26 guidance by replacing вҖңtrust gapвҖқ with \nexecution checkpoints, while NEV still drives headline volatility. \nConfidence in the FY26 10вҖ“30% Y/Y revenue and profit guidance improved \nbecause the 1Q26 miss now maps more cleanly to timing/high base and one-\noffs plus a conversion bottleneck, rather than a demand-led slowdown, with IA \norder momentum and April orders described as firm. We see the debate shifting \nfrom whether the guidance is achievable to whether the sequence is delivered: \nMay capacity uplift (30%+), 2Q backlog digestion, and a visible improvement \nin margin trajectory as IA price pass-through begins to appear in reported \nnumbers. This framing reduces uncertainty and supports a more constructive \nstance despite recent delivery noise. NEV remains the key caveat: cost pass-\nthrough is structurally harder and raw material volatility can continue to dilute \nSee page 11 for analyst certification and important disclosures, including non-US analyst disclosures.\nSources for: Style Exposure вҖ“ J.P. Morgan Global Markets Strategy; all other tables are company data and J.P. Morgan estimates.\nThis material is neither intended to be distributed to Mainland China investors nor to provide securities investment consultancy services within the territory \nof Mainland China. This material or any portion hereof may not be reprinted, sold or redistributed without the written consent of J.P. Morgan.\n\n--- з¬¬2йЎө ---\n2\nKaren Li, CFA AC\n(852) 2800-8589\nkaren.yy.li@jpmorgan.com\nAsia Pacific Equity Research\n29 April 2026\nJ P M O R G A N\nPrice Performance\nYTD\n1m\n3m\n12m\nAbs\n-10.3%\n-1.4%\n-10.9%\n0.7%\nRel\n-13.8%\n-6.3%\n-9.7%\n-24.3%\nCompany Data\nShares O/S (mn)\n2,707\n52-week range (Rmb)\n91.00-60.13\nMarket cap ($ mn)\n26,757\nExchange rate \n6.84\nFree float (%) \n62.2%\n3M ADV (mn)\n27.29\n3M ADV ($ mn)\n280.2\nVolatility (90 Day) \n36\nIndex \nSHASHR\nBBG ANR (Buy | Hold | Sell) \n37|2|0\nKey Metrics (FYE Dec)\nRmb in millions\nFY25A\nFY26E\nFY27E\nFY28E\nFinancial Estimates\nRevenue\n45,105\n52,734\n59,970\n68,345\nAdj. EBITDA\n6,633\n7,843\n8,933\n10,872\nAdj. EBIT\n5,517\n6,388\n7,772\n9,551\nAdj. net income\n5,050\n6,094\n7,484\n9,292\nAdj. EPS\n1.87\n2.25\n2.77\n3.43\nBBG EPS\n2.03\n2.43\n2.90\n3.28\nCashflow from operations\n6,681\n7,506\n8,342\n9,987\nFCFF\n3,649\n3,701\n5,684\n7,107\nMargins and Growth\nRevenue Growth Y/Y (%)\n21.8%\n16.9%\n13.7%\n14.0%\nEBITDA margin\n14.7%\n14.9%\n14.9%\n15.9%\nEBITDA Growth Y/Y (%)\n22.5%\n18.2%\n13.9%\n21.7%\nEBIT margin\n12.2%\n12.1%\n13.0%\n14.0%\nNet margin\n11.2%\n11.6%\n12.5%\n13.6%\nAdj. EPS growth\n17.2%\n20.4%\n22.8%\n24.1%\nRatios\nAdj. tax rate\n4.8%\n5.3%\n5.8%\n6.3%\nInterest cover\nNM\nNM\nNM\nNM\nNet debt/Equity\nNM\nNM\nNM\nNM\nNet debt/EBITDA\nNM\nNM\nNM\nNM\nROCE\n14.8%\n14.6%\n15.9%\n17.3%\nROE\n15.9%\n16.2%\n17.4%\n18.7%\nValuation\nFCFF yield\n2.0%\n2.0%\n3.1%\n3.9%\nDividend yield\n0.6%\n0.9%\n1.1%\n1.4%\nEV/Revenue\n4.2\n3.6\n3.1\n2.7\nEV/EBITDA\n28.3\n23.9\n21.0\n17.3\nAdj. P/E\n36.1\n30.0\n24.4\n19.7\nSummary Investment Thesis and Valuation\nInvestment Thesis\nWe rate Shenzhen Inovance OW, given its superior supply chain \nmanagement and product development capabilities, which \nposition it to capture ChinaвҖҷs ongoing factory automation and \nindustrial upgrade. InovanceвҖҷs consistent track record of returns \nand robust Op-CF generation stand out among peers, providing \ncomfort for investors amid rising macro headwinds. Beyond its \ncore strengths in FA, Inovance is also actively investing in new \ngrowth driversвҖ”including humanoid robots, energy storage \nsystems (ESS), and digital/AI platformsвҖ”which are set to \nsupport the next phase of expansion and margin resilience. We \nbelieve Inovance is distinctively positioned to benefit from the \nongoing upcycle in ChinaвҖҷs FA sector, with its ability to deliver \ninnovation, scale, and execution making it the best play for \ninvestors seeking exposure to this structural transformation.\nValuation\nOur DCF-based Jun-27 PT of Rmb84 is based on terminal \ngrowth of 3% and a WACC of 8%, calculated based on the \nfollowing assumptions: cost of equity at 9.0% (based on Rf = \n2.2% [aligned with the latest China 10-year bond yield], an \nequity risk premium of 6.8% and a beta of 1.0 x), cost of debt at \n~4% and target debt-to-capital of 20%. Our PT translates into a \ntarget PEG of c1.5x against our projected 23% earnings growth \nover FY25-28E. \nPerformance Drivers\nSource: J.P. Morgan Global Markets Strategy for Performance Drivers; company data, Bloomberg Finance L.P. and J.P. Morgan estimates for all other tables. Note: Price history may not be complete or \nexact.\n\n--- з¬¬3йЎө ---\n3\nKaren Li, CFA AC\n(852) 2800-8589\nkaren.yy.li@jpmorgan.com\nAsia Pacific Equity Research\n29 April 2026\nJ P M O R G A N\nconsolidated margin optics.\nвҖў\nThird pillar is the optionality stack that can sustain growth beyond the current FA \nupcycle. Robotics/AI progress is anchored in industrial scenarios and component \ncommercialization, with identifiable milestones (bionic arm delivery and an August \nwheeled robot launch) that can improve visibility, while the software push emphasizes \ntools/agents and scenario know-how as the moat. ESS is positioned as selective growth, \nprioritizing order quality and walking away from low-GPM volume to support mix. Our \nview is that the market is poised to pay for these levers only after 2QвҖ“3Q confirms \ndelivery catch-up and margin stabilization at group level. The announced H-share listing \nsupports financial and strategic flexibility (brand building and inorganic options).\n\n--- з¬¬4йЎө ---\n4\nKaren Li, CFA AC\n(852) 2800-8589\nkaren.yy.li@jpmorgan.com\nAsia Pacific Equity Research\n29 April 2026\nJ P M O R G A N\nModel update post-1Q26 briefing: Order momentum and FY26 \nguidance remain intact\n1Q26 earnings were a miss despite very strong order growth, and the share price \nreaction over the past two days usefully isolates what the market is (and is not) willing \nto pay for at this stage of the cycle: investors were initially positioned to penalize \nвҖңdelivery/margin conversionвҖқ risk, but they were also quick to re-rate once the after-\nmarket briefing narrowed the uncertainty around the bridge from orders to recognized \nrevenue and profit. The stock fell ~6% yesterday on the print versus a flattish CSI300, \nreflecting near-term disappointment and lingering skepticism after consecutive quarters \nwhere headline delivery has not kept pace with the strength implied by the upcycle. \nHowever, after the after-market briefing, the stock rebounded ~10% today (CSI300 \nagain flattish), as investors appeared more comfortable that the miss was not demand-\nled but instead driven by timing (order-to-revenue recognition lag), a high base and one-\noff items, and that the current delivery pressure is operationally addressable via near-\nterm capacity actionsвҖ”i.e., the problem set shifted from вҖңis the cycle real?вҖқ to вҖңhow \nquickly can Inovance convert backlog into reported numbers and stabilize margins?вҖқ In \nthat context, the reiterated FY26 guidance of 10вҖ“30% Y/Y growth for both revenue and \nprofit reads as more credible than it did immediately post-results, even if the implied \npath still requires a meaningful step-up in performance through the remaining quarters, \nand therefore leaves little room for additional execution slippage.\nWe remain OW, but we are explicitly de-risking the forecast profile to reflect: (i) a more \nconservative margin recovery cadence versus the optimistic вҖңsnapbackвҖқ path the market \nwould likely need to see to fully rebuild confidence; and (ii) the reality that even with \nstrong orders, the translation to P&L can remain noisy when capacity, product mix and \ncost pass-through are moving targets. Specifically, we cut FY26/27E profit by 7%/10%, \nand introduce FY28E to better capture the medium-term compounding from automation \npenetration, overseas expansion and new engines (software/AI, robotics, ESS energy \nstorage, and PA process automation adjacencies). \nWe extend our valuation horizon to Jun-27. Our DCF-based PT resets to Rmb84 (from \nRmb97), which implies ~25% upside from current levels even after todayвҖҷs rebound, \nunderpinned by our projected ~15% revenue CAGR and ~23% profit CAGR into \nFY28E. We preserve our core medium-term investment case (structural share gains + \nplatformization + multi-engine growth), while acknowledging that near-term sentiment \nwill likely remain highly sensitive to proof points on delivery catch-up, margin \nstabilization and the вҖңqualityвҖқ of order growthвҖ”exactly the factors that drove the sharp \nde-rating yesterday and the equally sharp re-rating today.\nMacro and IA cycle framing leaned constructive, tying 2026>2025 conviction to \npolicy tailwinds and a longer cycle, but also acknowledged global energy/\ncommodity uncertainties\nвҖў\nManagement explicitly stated a conviction that 2026 will be better than 2025 for \nIA demand, and tied this to policy and structural driversвҖ”national planning/\ninfrastructure emphasis, вҖңcore autonomyвҖқ and industrial security priorities (e.g., \nsemi, energy), and a belief that digitalization will be a key battlefield where they \nexpect to be a major winner. They also highlighted external dynamics (e.g., Middle \nEast-related energy security focus and the acceleration of вҖңtechnology going \noverseasвҖқ) as both opportunities and context for faster internationalization. \nвҖў\nAt the same time, they acknowledged global commodity and energy tightness\n\n--- з¬¬5йЎө ---\n5\nKaren Li, CFA AC\n(852) 2800-8589\nkaren.yy.li@jpmorgan.com\nAsia Pacific Equity Research\n29 April 2026\nJ P M O R G A N\ncould create recession risks, but argued the cycleвҖҷs вҖңlong-termвҖқ effect is net \npositive. Our view is that this macro framing is supportive for sentiment and aligns \nwith the strong order picture, but ultimately investors will still anchor on near-term \nproof in delivery and margins; macro optimism can support the multiple only if the \ncompany executes through the current conversion bottleneck and shows that price \npass-through is functioning as guided.\nFY25 business review emphasized resilience with structural wins and product \nleadership the core narrative\nвҖў\nManagement framed FY25 as a year shaped by tariff-related uncertainty and a \nвҖңfront-high, mid-low, back-highвҖқ demand profile, but argued the company still \ndelivered healthy order and revenue growth by вҖңgrabbing structural opportunitiesвҖқ in \nhigher-momentum verticals. They highlighted sector demand pockets (e.g., lithium \nbattery, logistics) and the firmвҖҷs ability to capture incremental share through solution \ncapability rather than relying solely on cyclical beta. \nвҖў\nManagement also pointed to strong execution in вҖңindustrial intelligenceвҖқ with \ngrowth supported by deepening penetration in equipment electrification and \nupgrades, and referenced product momentum in high-margin categories (e.g., servo/\nPLC) alongside new product ramp (including multiple вҖңзҲҶе“ҒвҖқ launches). Our read is \nthat the FY25 retrospective was designed to anchor credibility (i.e., execution track \nrecord) ahead of a more ambitious FY26 guidance band, and to signal that the firm \nsees itself as a structural winner rather than purely a cycle beneficiary, which matters \nfor sentiment as investors debate whether two consecutive quarterly misses are \nвҖңnoiseвҖқ or вҖңsignal.вҖқ\n1Q26 miss positioned as a mix of timing, high base, and one-offs, with conversion \ncapacity (not demand) flagged as the binding constraint; April orders remained \nstrong\nвҖў\nManagementвҖҷs central message was that the 1Q26 profit miss should not be \nread as a deterioration in end-demand, but rather as the consequence of: (i) a high \nbase; (ii) order-to-revenue booking lag; and (iii) several one-off/non-operational \ndrags (including investment income/FX-related impacts and impairment-type items). \nThey emphasized the mismatch between IA orders (+~40% Y/Y, per their \ndiscussion) and IA deliveries/revenue recognition (+~14% Y/Y), arguing this \nreflects capacity constraints and delivery pressure rather than weak bookings. \nвҖў\nManagement added that April orders remained strong, and guided that May \ncapacity is expected to improve by 30%+ to relieve delivery tightness; 2Q is \nframed as the period to вҖңdigestвҖқ 1Q backlog. Our view is that this is the right \ndebate to have (conversion and operational bottlenecks), but it also raises the bar for \nnear-term proof: investors will likely watch whether delivery catch-up is visible in \n2Q revenue recognition and whether\nвҖҰ(жҲӘж–ӯ)", "n20": "--- з¬¬1йЎө ---\nMacquarie Equity Research\n28 April 2026\nInovance\nNEVs to weigh on FA demand recovery\nKey Points\nвҖў 4Q25 and 1Q26 below MQe on weak revenue growth and expense hikes.\nвҖў We expect China FA demand to bottom out. Inovance is the key\nproxy. However, we expect slowing NEV to drag down its revenue and\nearnings.\nвҖў Trough valuations but mixed outlook. We lower TP 10% to Rmb77.80.\nвҖў\nWhat we liked: 4Q25/1Q26 GPM remained steady at 28.2%/29.1%.\nвҖў\nWhat we did not like: 4Q25 SG&A and R&D expense increased by 49.7%\nand 34.0% you, respectively. 1Q26 operating CF saw a sharp decline YoY/\nQoQ.\nвҖў\nIndustrial automation revenue/order mismatch due to capacity\nbottlenecks. Inovance reported 1Q26 industrial automation\nrevenue growth of 14% YoY, below order book growth of 40%, which\nmanagement attributed to capacity bottlenecks. Following a 30%\ncapacity expansion, Inovance expects 2Q26 FA revenue growth to align\nwith its order book. We believe China FA demand will bottom in 2026.\nWe expect Inovance to continue gaining market share from global peers,\nsupporting industrial automation revenue growth above the industry.\nвҖў\nNEV segment is weighing on top-line growth but easing margin\npressure. We expect NEV to remain a headwind for Inovance given\nslowing demand and intense price competition. However, margin\npressure from the rapid expansion of NEV revenues should ease in 2026.\nInovance expects its NEV segment to grow faster than the industry,\ndriven by new product development and penetration of new overseas\ncustomers.\nвҖў\nOverseas, the new growth driver. Overseas revenue grew 30.0% YoY in\n2025 and accounted for 5.9% of total revenue. Inovance targets overseas\nmarkets to contribute 20вҖ“30% of revenue over time. We expect overseas\nrevenue to become a long-term growth driver for the company.\nвҖў\n2026 guidance was for revenue and net profit growth of 10-30% YoY.\nEarnings changes: We cut our 2026/27E net profits 9%/13% on slower\nrevenue growth.\nValuation: We cut our TP 10% to Rmb77.80, rolling forward to 30.8x 2027E\nP/E multiple (1SD below historical avg PE) on slowing NEV demand, from\n36.3x\nCatalyst: Industrial automation demand rebound.\nInvestment Thesis and Recommendation\nInovance is a domestic leader in the industrial automation industry for\nservo systems, inverters, PLC and industrial robots. We expect domestic\nmarket-share gains on import substitution and overseas expansion. For\nmore research, see here.\nCapital Goods\nChina\nDaisy\nZhang, CFA\nCassie\nDai\n300124 CH\nOutperform\nPriceВ (atВ 28 Apr 2026)\nCNY61.36\n12-month target\nCNY77.80\n12-month TSR (%)\n27.7\nVolatility Index\nMedium\nMarket Cap (Local)В (m)\n165,871\nMarket Cap (USD)В (m)\n24,308\nFree Float (%)\n69\n30-day avg turnoverВ (USD) (m)\n249.1\nВ \nInvestment Fundamentals\nYear end 31 Dec\n2025A 2026E 2027E 2028E\nRevenue (m)\n45,105\n52,174\n60,161\n69,332\nRevenue growth (%)\n21.8\n15.7\n15.3\n15.2\nEBIT (m)\n5,443\n6,156\n7,351\n8,713\nEBIT growth (%)\n22.0\n13.1\n19.4\n18.5\nReported profit (m)\n5,050\n5,823\n6,820\n8,090\nAdjusted profit (m)\n5,050\n5,823\n6,820\n8,090\nEPS rep [CNY]\n1.9\n2.1\n2.5\n3.0\nEPS rep growth (%)\n16.8\n14.1\n17.1\n18.6\nEPS adj [CNY]\n1.9\n2.1\n2.5\n3.0\nEPS adj growth (%)\n16.9\n13.9\n17.1\n18.6\nNet debt/equity (%)\n(11.1)\n(5.5)\n(8.9)\n(11.8)\nROA (%)\n8.5\n8.5\n9.4\n9.9\nROE (%)\n15.9\n15.5\n16.2\n17.0\nPER rep (x)\n32.9\n28.9\n24.6\n20.8\nPER adj (x)\n32.9\n28.9\n24.6\n20.8\nEV/EBITDA (x)\n26.9\n22.8\n19.4\n16.6\nP/BV (x)\n4.7\n4.2\n3.8\n3.3\nTotal div yield (%)\n0.8\n0.9\n1.1\n1.3\nQuant (rank vs. global sector)\n985 / 2,729\n300124 CH rel CSI 300\nperformance, & rec history\nSource: FactSet, Macquarie Research, Apr 2026 (all figures in\nCNY unless noted, TP in CNY)\nFor important disclosures and analyst certification, refer to page 9 or go to www.macquarie.com/research/disclosures.В \n1\n\n--- з¬¬2йЎө ---\nMacquarie Equity Research\nInovance\nKey Risks chitecture, Fluence \nEnergy contributes the battery energy storage system. Together with Fluence \nEnergyвҖҷs previous announcement on MAS with hyperscalers, we believe these \nshould rebuff market concerns on whether AIDCs need ESS. During our recent \nvisit to Sungrow, management shared a similar view that ESS is a major solution \nto AIDC power constraints and they have already received ESS orders from data-\ncenter power developers. Meanwhile, LEGS (373220 KS, OW, covered by Parsley \nOng) also announced that it has signed a $1.6bn contract to supply 6GWh of ESS \nbatteries to DTE Energy. This is in line with our key takeaways from the expert call \nwe hosted (link), where the expert saw that ESS is likely to be part of the AIDC \npower solution in a tight power supply market, but orders will likely be more back-\nend loaded, due to the development sequence. Within the APAC region, we \nhighlight key OW-rated names under J.P. Morgan APAC coverage: CATL-H/A, \nSungrow, Samsung SDI, LGES and Nari.\nSiemens partners with Fluence Energy to develop power architecture for \nAIDCs: Siemens, working with NVIDIA and partnering with Fluence Energy, \nhas developed UL-aligned reference power-and-controls architecture for next-\ngeneration AIDCs that translates the вҖңAI factoryвҖқ concept into a deployable, \nmodular \nelectrical \nblueprint \n(official \nrelease \nlink). \nWithin \nthis \narchitecture, Fluence Energy contributes battery energy storage to add \nresilience and flexibility in power-constrained environments вҖ“ supporting \ncapabilities such as ride-through, black start, demand response, and AI load \nsmoothing вҖ“ so operators can bring extreme-density compute online faster while \nstaying within fixed power envelopes.\nKey takeaways from the AIDC ESS developments: We have seen a few positive \ndevelopments with respect to AIDC ESS. In addition to the one mentioned above, \nin early May 2026, Fluence Energy announced that it had signed Master Supply \nAgreements (MAS) with two hyperscalers and expected first orders during F3Q \n(report link). We believe these developments should rebuff market concerns on \nwhether AIDCs need ESS and result in rising expectations for AIDC ESS demand \ninto FY26/27.\nHow this aligns with APAC companies: During our visit to Sungrow (report link) \nin mid May 2026, management shared that ESS is a major solution to AIDC power \nconstraints; Sungrow has already received ESS orders from data-center power \ndevelopers, while these ESS will be used to support AIDCs. This should further \nreinforce the thesis for AIDC ESS deployment. In late May 2026, LG Energy \nSolution (373220 KS, OW, covered by Parsley Ong) announced that it had signed \na $1.6bn contract to supply 6GWh of ESS batteries to DTE Energy (see ParsleyвҖҷs \nreport link). \nSee page 5 for analyst certification and important disclosures, including non-US analyst disclosures.\nAIDC ESS\nReference Architectures and Early Orders Point to ESS \nAdoption\n--- з¬¬2йЎө ---\n2\nAlan Hon AC\n(852) 2800-8573\nalan.hon@jpmorgan.com\nAsia Pacific Equity Research\n02 June 2026\nJ P M O R G A N\nRe-cap from the AIDC ESS expert call: We hosted an expert call on AIDC ESS (report link) \nin late April 2026, where an industry expert shared that ESS is likely to be part of the AIDC \npower solution in a tight power supply market, as most new AIDCs will require BESS for \nreliability and optimization, with rising attachment rates and durations. However, AIDC ESS \nwill likely be more back-end loaded, due to the development sequence. Furthermore, distinct \nAIDC ESS requirements favour leading players with strong product quality, i.e. Sungrow and \nLGES.\nвҖў\nESS adoption in AIDCs appears slow, development sequence explains the lag: AIDC \nESS adoption is taking time due to construction sequencing, not a lack of demand. ESS \ninstallation in a typical AIDC build occurs in the later stages вҖ” after land and civil works, \nfoundation works, onsite power generation and the construction of data center halls and \ncontrol buildings. Most large-scale AIDCs are still in the early construction phases. ESS \nprocurement and installation should accelerate meaningfully as these projects progress \ntoward completion. The expertвҖҷs view is that the best period for ESS demand is still ahead, \nconcentrated in the back half of the current build cycle.\nвҖў\nDistinct AIDC ESS requirements favor players with strong product quality: AIDC \nESS is a distinct product category from utility-scale ESS, despite similar battery \nhardware. Utility-scale ESS is optimized for energy arbitrage, daily cycling and \npredictable loads. In contrast, AIDC ESS is designed for power quality, redundancy and \nthe protection of valuable IT equipment, requiring rapid response, high power density and \nfrequent micro-cycling. This demands high-quality product. The industry is moving \ntoward integrating BESS and UPS into a unified energy layer. \nFigure 1: Levels of energy storage in a data center\nSource: BloombergNEF. PPA = power purchasing agreement; UPS = uninterruptible power supply.\nMix of launches of BESS in data centers, by \nstorage duration\n<2 hours, 23%\n2 hours, 23%\n4 hours, 33%\n4-10 hours, \n15%\n10+ hours, 8%\nSource: BloombergNEF. Note: Not all projects disclose \nstorage duration. Data as of 30 March 2026.\nMix of AIDC ESS use cases (in terms of \ncapacity) in the US, averaged over 2026E-\n30E\nUPS, 9%\nSolar and \nstorage PPAs, \n23%\nGas generation \nsupport, 34%\nFlexibility, 29%\nPower \nsmoothing, 5%\nSource: BloombergNEF.\n--- з¬¬3йЎө ---\n3\nAlan Hon AC\n(852) 2800-8573\nalan.hon@jpmorgan.com\nAsia Pacific Equity Research\n02 June 2026\nJ P M O R G A N\nFigure 2: Types of energy storage used in data centers\nSource: BloombergNEF. Note: UPS = uninterruptible power supply; NMC = nickel manganese cobalt; LFP = lithium iron phosphate; BBU = battery backup unit.\nRecommendations\nThe table below summarizes the key relevant stocks under J.P. Morgan coverage and their \nexposure to the ESS business.\nвҖў\nWe recently initiated coverage of Deye at OW. Deye is a distributed generation (DG) \nenergy storage (ESS) producer with a first-mover advantage in Emerging Markets (EM). \nWe see structural growth in ESS globally, on energy transition and renewablesвҖҷ \nintermittent issues. ESS battery shipment data in April also indicated DG has higher \ngrowth (C&I +154%yoy) than utility-scale (+93% yoy). By geography, multiple EM \nregions will see >50% 2025-27 installation CAGR, per Bloomberg New Energy Finance \n(BNEF). Near term, energy supply shocks are catalyzing faster adoption of DG of solar\n+storage, especially in regions where DG diesel was adopted. Longer term, we may see \na policy tilt towards energy resilience, providing a long-term growth tailwind. DeyeвҖҷs \nlegacy exposure to home appliances enables its cost leadership, owing to the rise in in-\nhouse fabrication (link to initiation report).\nвҖў\nLargest PCS supplier вҖ“ Sungrow (OW): Sungrow is the worldвҖҷs largest solar inverter \nproducer by volume, gaining market share in recent years due to cost advantage. Sungrow \noffers superior product quality and stronger brand recognition compared to domestic \npeers. We expect Sungrow to benefit from robust ESS demand and rising orders from \nutilities and data centers.\nвҖў\nChina ESS battery: CATL-A (OW) is the largest ESS battery maker globally and our \ntop pick in ChinaвҖҷs battery value chain. EVE Energy (N) has the highest ESS exposure \namong covered battery makers, followed by CALB (N). We also favor BYD-H/A (OW), \ngiven strong demand for its EV models in overseas markets and benefits from vertical \nintegration in EV and ESS.\n--- з¬¬4йЎө ---\n4\nAlan Hon AC\n(852) 2800-8573\nalan.hon@jpmorgan.com\nAsia Pacific Equity Research\n02 June 2026\nJ P M O R G A N\nвҖў\nKorean battery players see improved opportunities and margins in US ESS: ESS \norder win momentum at LGES (OW) has been strong, and we estimate that the company \nhas the largest LFP ESS order backlog among Korean battery makers. ESS visibility is \nalso improving for SDI (OW): US battery import data indicate that China-origin \nshipments have fallen further since July 2025 (post-OBBBA), while Korea-origin \n(largely SDI) shipments have risen sequentially, supporting an ongoing sourcing shift as \nUS regulations remain effective. SDIвҖҷs LFP cathode contract with L&F implies \n~25GWh/year of US ESS shipments by 2028-29.\nFigure 3: Summary of ESS value chain stocks under J.P. Morgan coverage\nSource: Company data, J.P. Morgan estimates. Note: ESS battery may include BMS or system integration. EVEвҖҷs ESS volume exposure refers to ESS battery volume over total power battery, not incl. consumer \nbattery. Note: Gotion FY25 exposure is JPMe. Note: SDI's total revenue includes electronic materials and small battery while volume excludes electronic materials and small battery.\n--- з¬¬5йЎө ---\n5\nAlan Hon AC\n(852) 2800-8573\nalan.hon@jpmorgan.com\nAsia Pacific Equity Research\n02 June 2026\nJ P M O R G A N\n Companies Discussed in This Report (all prices in this report as of market close on 02 June 2026, unless otherwise indicated)\nBYD Company Limited - A(002594.SZ/Rmb96.76/OW), BYD Company Limited - H(1211.HK/HK$96.75/OW), \nCALB(3931.HK/HK$31.96/OW), CATL - A(300750.SZ/Rmb433.89/OW), CATL - H(3750.HK/HK$779.50/OW), Deye - \nA(605117.SS/Rmb111.10/OW), EVE Energy(300014.SZ/Rmb65.48/N), LG Energy Solution(373220.KS/W443,500/OW), Nari \nTechnology - A(600406.SS/Rmb24.64/OW), Samsung SDI(006400.KS/W601,000/OW), Sungrow - A(300274.SZ/Rmb172.70/\nOW) \n Analyst Certification:  The Research Analyst(s) denoted by an вҖңACвҖқ on the cover of this report certifies (or, where multiple Research Analysts \nare primarily responsible for this report, the Research Analyst denoted by an вҖңACвҖқ on the cover or within the document individually certifies, \nwith respect to each security or issuer that the Research Analyst covers in this research) that: (1) all of the views expressed in this report \naccurately reflect the Research AnalystвҖҷs personal views about any and all of the subject securities or issuers; and (2) no part of any of the \nResearch Analyst's compensation was, is, or will be directly or indirectly related to the sp\nвҖҰ(жҲӘж–ӯ)", "n41": "### 2026-05-22-JPMorgan-China Artificial Intelligence China AI Application Tour Take...-122171752.pdf  (жҖ»йЎөж•°=17)\n\n--- з¬¬1йЎө ---\nwww.jpmorganmarkets.com\nAsia Pacific Equity Research\n22 May 2026\nChina Artificial Intelligence\n \nChina AI Application Tour Takeaways: Early Evidence \nof Workflow-Led Monetization\n \nHead of China Equity Research \nand Co-Head of Asia TMT \nResearch\nAlex Yao AC\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSAC Registration Number: S1730523020001\nOlivia Xu\n(86-21) 6106 6138\nolivia.w.xu@jpmorgan.com\nSAC Registration Number: S1730525060001\nJiajie Shen, CFA\n(86-21) 6106 6352\njiajie.shen@jpmchase.com\nSAC Registration Number: S1730520030006\nJ.P. Morgan Securities (China) Company \nLimited\nSee page 9 for analyst certification and important disclosures, including non-US analyst disclosures.\nEight meetings across autonomy, independent model development, enterprise \nworkflow software and vertical AI applications point to early evidence of \nworkflow-led monetization in selected use cases. The most recurring theme is \nthat value creation appears increasingly tied to proprietary data, workflow \ncontext, customer integration and deployment know-how. Foundation models \nremain important, while many companies are using them as flexible inputs \nwithin broader product and workflow stacks. A useful working framework is \nвҖңown the context, rent the model,вҖқ although we would still treat this as a \ndirection of travel that needs more public-market proof.\nThis pattern appeared across enterprise data integration, insurance and \nfinancial-services \nrisk, \ncross-border \nmarketing, \nindependent \nmodel \ndevelopment and listed model-plus-infrastructure businesses. Several \ncompanies described routing tasks across different domestic and frontier \nmodels based on price, performance and use case. One listed model-plus-\ninfrastructure company also acknowledged that raw API switching costs can \nbe low, with customer stickiness improving after enterprise data and workflow \nintegration. We view this as an important signal that base-model \ndifferentiation alone may face pressure over time, with the degree of pressure \nlikely varying by use case, customer segment and workflow ownership.\nThe tour modestly changes our prior assumption in two directions. Previously, \nwe viewed robotaxi as a cost line with limited near-term standalone \neconomics, \nAI \napplication \nmonetization \nas \nstill \nearly, \nand \ninfrastructure/compute as the clearest listed exposure. The meetings suggest \nthe first two views deserve more nuance. Some vertical and enterprise AI \ncompanies described recurring revenue, value-based pricing and operating-\nlevel profitability, while autonomy companies pointed to improving unit \neconomics in selected deployments. These datapoints are mostly management-\nstated, often private-company specific, and still require verification through \nfilings, customer evidence and repeatable public-company disclosures.\nAs a result, our takeaway is that selected AI applications are showing early \nsigns of commercial relevance, particularly in workflow-heavy and data-rich \nverticals. The key question is whether these early signals can translate into \ndurable, scalable and software-like economics. Similarly, the tour suggests \nrising risk that base-model access becomes a more competitive and \ninterchangeable input in some enterprise settings. Model vendors may still \ndefend economics in high-value workflows such as coding, agents and \nenterprise software use cases where they control the user surface, workflow \nmemory or data loop. \nOur investment stance shifts incrementally. We become more constructive on \nAI infrastructure, compute, domestic-chip, memory and storage beneficiaries, \nas they can benefit from broader AI deployment even when model leadership \nrotates. We also become more positive on AI applications and workflow-layer \ncompanies that can translate model capability into customer-facing value \nthrough proprietary data, workflow ownership, pricing power, retention and\n--- з¬¬2йЎө ---\n2\nAsia Pacific Equity Research\n22 May 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\ndeep customer integration. Autonomy also moves from a pure cost-center \nframework toward an early-commercial hypothesis in selected ADAS and \noverseas robotaxi deployments, while third-party-verifiable unit economics \nremain necessary before assigning broader valuation credit.\nKey observations\nObservation 1: Early evidence suggests model access may become \nmore interchangeable in select enterprise use cases\nThis was the most consistent signal across our meetings, although the \nconclusion still needs to be tested against public-company disclosures and \ncustomer behavior over time. Across multiple meetings, companies \ndescribed base-model capability as necessary, while customer value \nappeared to depend more on task completion, workflow integration, \nproprietary data and deployment quality. One independent model \ndeveloper argued that customers in the agentic era care less about using the \nlargest model and more about reliable task completion. A listed model-\nplus-infrastructure incumbent acknowledged low API switching costs and \nlocated customer stickiness in enterprise-data integration. Two vertical AI \napplication companies said that newer or cheaper models could be \nintegrated into their products, with limited impact on customer-facing \noutcomes because the application value sat in vertical data, workflow \ndesign and deployment context.\nThis updates our framework from a pure model-capability debate toward a \nbroader capability-plus-context debate. In many enterprise use cases, \ncustomers appear willing to use whichever model is adequate, cost-\neffective and available, while paying for the workflow layer that embeds \nAI into business processes. This does not mean model quality loses \nrelevance. It means model capability may need to be paired with \nproprietary workflow control, user interface ownership, data feedback \nloops and customer integration in order to support durable value capture.\nThe read-through is constructive for workflow-led AI companies and \nselective for model-led valuations. Base-model leadership can still matter \nin high-value workflows such as coding, agents, enterprise software \nautomation and other tasks where reliability, context length, tool use and \nmulti-step completion rates directly affect business outcomes. At the same \ntime, generic API access may face growing pricing pressure if customers \ncan route across multiple models with limited operational friction. For \nlisted model companies, the key question is whether they can prove \nworkflow ownership, retention, pricing power and rising enterprise value \ncapture beyond benchmark leadership.\nObservation 2: Select vertical and enterprise AI applications are \nshowing early commercial signals\n--- з¬¬3йЎө ---\n3\nAsia Pacific  Equity Research\n22 May 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSeveral private vertical AI vendors described recurring revenue, value-\nbased pricing and operating-level profitability. The strongest examples \ncame from insurance and financial-services risk, enterprise data integration \nand cross-border marketing. We deliberately do not reproduce the specific \nfigures because they are non-public and several companies are private or \npotentially in listing processes.\nOn our rubric, these businesses appear to sit between Early-Commercial \nand Scaled. This represents a potential upgrade from our prior assumptions, \nwhich treated most AI-application monetization as early-stage and difficult \nto underwrite. The meetings indicate that some customers are paying, and \nin select cases pricing is linked to measurable business value, such as risk \nreduction, workflow efficiency, marketing conversion or decision \nautomation.\nAt the same time, the broader usefulness of LLM-driven applications \nremains debatable. The evidence we saw points to promising signals in \nworkflow-heavy, data-rich verticals, with less proof for the AI applications \nas a whole. The figures are self-reported and still need independent \nverification. Some management teams also acknowledged high customer \nconcentration, sub-scale wallet share at large clients, and lower-margin \nservice-heavy or human-assisted cold-start segments. These caveats matter \nbecause the economics may look less software-like once customer \nacquisition cost, implementation work, human assistance and concentration \nrisk are fully reflected.\nAs a result, our takeaway is that select AI applications are moving from \nnarrative toward early commercial validation, supported by signs of \nrecurring revenue, value-based pricing and operating-level profitability in \nsome verticals. We would still treat this as an emerging thesis. The \ndurability, scalability and software-like quality of these economics need to \nbe tested through filings, customer evidence and repeatable listed-company \ndisclosures.\nObservation 3: Autonomy may be moving from pure cost center \ntoward early-commercial in select use cases\nAutonomy was the area where the tour most challenged our prior \nassumptions. We previously viewed robotaxi as a cost line with limited \nnear-term standalone economics. The tour suggests that this view may be \ntoo conservative in select segments, although broader sector underwriting \nstill requires stronger verification.\nThe distinction between ADAS and L4 matters. Mass-production ADAS \nappears closer to Scaled, supported by OEM adoption, real-world data \nloops and software-like margin potential at volume. Robotaxi is earlier. \nListed L4 operators pointed to improving city-level economics, declining \nvehicle costs and better economics in certain overseas deployments, while \ncompany-level profitability remains a later-stage objective and regulatory \ngating remains material. L4 fleets therefore remain Early-Commercial in \nselect cities and Pilot in broader deployment terms.\n--- з¬¬4йЎө ---\n4\nAsia Pacific Equity Research\n22 May 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nThe investable conclusion is selective. ADAS and supplier exposure look \nmore underwritable than L4 robotaxi pure plays because they are closer to \nmass production, OEM attach rates and visible revenue contribution. \nOverseas robotaxi deployments may offer better pricing and less \ncompetition, although current evidence remains early and management-\nstated. For listed L4 companies, the key test is auditable segment \neconomics, license-city expansion, vehicle cost-down, safety record and \nregulatory continuity.\nObservation 4: Neutral specialists are winning some OEM and \nenterprise sockets\nThe tour complicates our platform-distribution prior. We had previously \nassumed that platforms with distribution surfaces, cloud infrastructure and \necosystem control would capture much of the AI application value. The \nmeetings suggest a more mixed outcome.\nOne independent, non-platform model developer described winning OEM \nand enterprise deals partly because it is perceived as neutral, customizable \nand less tied to a competing consumer or cloud ecosystem. Its model \nconsumes platform cloud and map infrastructure as inputs. This points to a \nsplit-value chain where neutral specialists can own deployment context, \nwhile platforms monetize cloud, maps, compute and supporting \ninfrastructure.\nThis remains relevant for platform valuation. Large platforms like Tencent \nand Alibaba can still benefit through cloud, maps, compute, data \ninfrastructure and enterprise distribution. At the same time, platform-\nowned models may face a more selective path in OEM and enterprise \nprocurement when customers prioritize neutrality, customization and \nworkflow integration. Distribution remains important, yet procurement \ndecisions may increasingly depend on trust, integration depth and vertical \nimplementation capability.\nObservation 5: Compute and inference demand appears to be \nbroadening across use cases\nEvery company we met was a net consumer of compute, whether through \nm\nвҖҰ(жҲӘж–ӯ)", "n42": "### 2026-05-10-Jefferies-AI Series #41 New Developments of DeepSeek Post V4-121942676.pdf  (жҖ»йЎөж•°=8)\n\n--- з¬¬1йЎө ---\nChina (PRC) | Internet\nEquity Research\nMay 10, 2026\n \nThomasВ ChongВ *В  | Equity Analyst\n852 3743 8016 | thomas.chong@jefferies.com\nZoeyВ ZongВ *В  | Equity Analyst\n852 3743 8163 | zoey.zong@jefferies.com\nAI Series #41: New Developments of\nDeepSeek Post V4\nHighlights (1) media last Fri reported on DeepSeek's plan to raise USD7bn.\nWe view AI Labs have respective strengths in different use cases. Talent\nacquisition and commercialization are important to AI Labs; (2) Baidu\nCreate 2026 will be held in BJ on Wed. This comes after filing of IPO\ncoaching of KLX last week (link); (3) Further integrations of Qwen app /\nTaobao; (4) capex spending of ByteDance is said to have been revised up\nfor 2026.\nMedia reports DeepSeek plans to raise USD7bn with valuation to exceed USD51.5bn after\ncompletion. According to media reports (e.g. The Information), DeepSeek will (1) speed up\nrevenue generation; (2) release V4.1 in Jun with more tools for enterprise users and better\nsupport for MCP. V4.1 will be able to process image and audio. The company has not\ncommented on the report. In our view, (1) AI Labs have respective strengths in different\nuse cases (e.g. MiniMax: multimodality, Zhipu: Coding); (2) talent retention/acquisitions is\nimportant (3) commercialization is key amid model-tiering industry trends. On the other hand,\nDS promotions will end on 31 May. The latest valuation of different players (a) DS: USD51.5bn;\n(b) Zhipu: USD53bn; (c) MiniMax USD30bn; (d) Kimi USD20bn\nBaidu Create 2026 to be held in BJ on Wed (13 May); ERNIE 5.1 was released during\nweekend. The topic is вҖңAgents at ScaleвҖқ which covers areas (a) implications of self-evolving\nagents for the industry; (b) AI agents trends; (c) coding agents. Meanwhile, ERNIE 5.1 was\nreleased on Sat (9 May). Highlights (1) about 6% of pre-training cost of comparable models,\nthanks to multi-dimensional pre-training inherited from ERNIE 5.0. ERNIE 5.1 reduces total\nparameters to about 1/3, active parameters to about 1/2; (2) upgrade search, reasoning,\nknowledge Q&A, creative writing and agentic capabilities; (3) ERNIE 5.1 was ranked no. 4\nglobally in LMArenaвҖҷs Search Leaderboard which reflects strong multi-source retrieval and\nsynthesis which provide users with more consistent and reliable answers.\nMedia reports enhanced functionalities with the integration of Qwen app and Taobao. This\nis another upgrade of Qwen app offerings since Jan-26 (link). In Jan-26, Qwen app connected\nwith BABAвҖҷs ecosystem (e.g. Taobao, Instant Commerce, Figgy). According to media (e.g.\nReuters) on 10 May, users can browse, compare and purchase items via full product listings of\nTaobao/Tmall. Qwen app provides recommendations based on users preferences. Meanwhile,\nTaobao will introduce Qwen powered AI shopping assistant (e.g. virtual try-ons, 30-day price\ntracking).\nCapex spend remains one of the focus areas in upcoming earnings. Following the increase\nin capex by US hyperscalers (Alphabet, Meta) in 1Q earnings, media (e.g. SCMP) reports\nByteDance plans to raise capex by at least 25% to RMB200bn in 2026 due to surge in AI demand\nand memory costs. The company has not commented on the report.\nBAT, KC, and AI labs are Beneficiaries. We expect a surge in token consumption on rising\ndemand for AI models and agents to benefit CSPs like Baidu, Alibaba, Tencent (BAT), Kingsoft\nCloud (KC), and AI labs. Market is likely watching out for the coming reviews of Hang Seng\nFamily of Indexes on 22 May with effect on 8 Jun. According to third party SemiAnalysis\non 1 May, Anthropic ARR is forecast to reach USD44bn. According to analysis from Artificial\nAnalysis, (1) there is a narrowing intelligence gap between US and China models; (2) API cost\nis just a fraction vs US benefiting from MoE, linear attention, and MFU; (3) Coding, Workspace\nscenario and mid- to long-form content should see significant opportunities ahead.\n \nPlease see analyst certifications, important disclosure information, and information regarding the status of non-US analysts on pagesВ  2В -В 8 of this report.\nВ *В Jefferies Hong Kong Limited\n--- з¬¬2йЎө ---\nInternet\nEquity Research\nMay 10, 2026\n \nWe would like to thank Fiona Fan, employee of Evalueserve Inc., for providing research support services to our preparation of this report.\nWe would like to thank Han Wang, employee of Evalueserve Inc., for providing research support services to our preparation of this report.\nWe would like to thank Erica Qiu, employee of Evalueserve Inc., for providing research support services to our preparation of this report.\nCompany Valuation/Risks\nAlibaba Group Holding Limited\nOur price target of US$185/HK$179 is based on SOTP valuation. Key risks include: (1) severe macroeconomic slowdown impacts online shopping\ngrowth; (2) aggressive marketing spending in local services and globalization due to intensified competition; and (3) user growth is below\nexpectations.\nBaidu Inc.\nWe have a Buy rating and PT of USD181/HKD176, based on SOTP valuation. Risks include: (1) ad demand being severely affected by macro\nheadwinds; (2) intensified competitive landscape in the online video sector, and (3) slower-than-expected user growth.\nKingsoft Cloud\nWe have a Buy rating and PT of US$19 based on DCF valuation, considering strategic support of Xiaomi and Kingsoft in the long run. Key risks\ninclude (1) intensified competition in terms of price wars; (2) premium customers relying on in-house resources when shifting to private cloud;\nand (3) stringent regulations.\nMiniMax Group Inc.\nWe have a Buy rating and PT of HKD1,118 based on (1) 49x 2028E price-to-sales on the back of fast revenue growth at 123% CAGR between 2027\nand 2030. We apply 60% valuation discount due to its scale vs overseas peers. (2) Our PT is based on WACC 13% and discounted back to 2026.\nRisks include (1) slower-than-expected pace in innovations; (2) AI-native products are not well received by users and enterprises; (3) geopolitical\ntension on chip export controls on advanced chips.\nTencent Holdings Ltd.\nWe have a Buy rating and SOTP-based PT of HK$795. Risks include (1) unsuccessful launch of new games; (2) slower-than-expected growth in\nonline ads on macro headwinds; and (3) aggressive investment in new initiatives.\nAnalyst Certification:\nI, Thomas Chong, certify that all of the views expressed in this research report accurately reflect my personal views about the subject security(ies) and\nsubject company(ies). I also certify that no part of my compensation was, is, or will be, directly or indirectly, related to the specific recommendations or\nviews expressed in this research report.\nI, Zoey Zong, certify that all of the views expressed in this research report accurately reflect my personal views about the subject security(ies) and subject\ncompany(ies). I also certify that no part of my compensation was, is, or will be, directly or indirectly, related to the specific recommendations or views\nexpressed in this research report.\nRegistration of non-US analysts: Thomas Chong is employed by Jefferies Hong Kong Limited, a non-US affiliate of Jefferies LLC and is not registered/\nqualified as a research analyst with
