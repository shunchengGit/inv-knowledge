<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--accent:#3b82f6;--hover:#f1f5f9;--radius:8px}

.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.controls input{width:180px;font-size:13px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;outline:none}
.controls input:focus{border-color:var(--accent)}
.controls button,.controls select{font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer}
.controls button:hover,.controls select:hover{background:var(--hover)}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding-top:4px}
.chip{font-size:11px;padding:3px 10px;border-radius:12px;border:1.5px solid var(--border);cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:5px}
.chip::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--c,#94a3b8)}
.chip.active{color:#fff;background:var(--c,#3b82f6);border-color:var(--c,#3b82f6)}
.chip.active::before{background:#fff}
main{display:flex;flex:1;min-height:0}
#graph{flex:1 1 55%;min-width:0;background:var(--surface);border-right:1px solid var(--border);position:relative}
#detail{flex:0 0 45%;overflow-y:auto;padding:20px 24px;background:var(--surface)}
.type-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.5px}
h1{font-size:18px;margin:6px 0 4px;font-weight:600;line-height:1.3}
dl.meta{display:grid;grid-template-columns:70px 1fr;gap:6px 12px;margin:10px 0 16px;font-size:13px}
dl.meta dt{color:var(--muted);font-weight:500}
dl.meta dd{word-break:break-all}
dl.meta a{color:var(--accent)}
.tag{display:inline-block;padding:1px 8px;margin:0 4px 4px 0;border-radius:4px;background:var(--hover);color:#475569;font-size:11px}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}
#detail-body{font-size:13px;line-height:1.7}
#detail-body p{margin:8px 0}
#detail-body h1{font-size:17px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
#detail-body h2{font-size:15px;margin:16px 0 8px}
#detail-body h3{font-size:13px;margin:12px 0 6px}
#detail-body ul,#detail-body ol{padding-left:22px;margin:8px 0}
#detail-body li{margin:3px 0}
#detail-body blockquote{border-left:3px solid var(--border);margin:10px 0;padding:4px 14px;color:var(--muted)}
#detail-body a{color:var(--accent)}
#detail-body pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:var(--radius);overflow-x:auto;font-size:12px}
#detail-body code{background:var(--hover);padding:1px 5px;border-radius:3px;font-size:12px;font-family:ui-monospace,monospace}
#detail-backlinks{margin-top:20px}
#detail-backlinks h2{font-size:13px;color:var(--muted);margin-bottom:8px}
#detail-backlinks ul{padding-left:18px}
#detail-backlinks a{color:var(--accent);cursor:pointer}

.stats-bar span{display:inline-flex;align-items:center;gap:4px}
.stats-dot{width:6px;height:6px;border-radius:50%}
.legend{position:absolute;top:10px;left:14px;z-index:10;display:flex;gap:12px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.legend-item{display:inline-flex;align-items:center;gap:4px}
</style>
</head>

_n60", "source": "n96", "target": "n60"}}, {"data": {"id": "n99__n91", "source": "n99", "target": "n91"}}, {"data": {"id": "n100__n57", "source": "n100", "target": "n57"}}], "bodies": {"n0": "# ASML伦敦TMT会议要点：EUV产能爬坡、DRAM占比过半\n\n**报告来源：** JPMorgan（2026-05-21）\n\n## 描述\nJPMorgan在2026年5月21日举办的伦敦TMT大会上与ASML CFO Roger Dassen进行了炉边对话。关键要点包括：EUV产能指引2026年至少60台、2027年至少80台（内部产能可达90台以上）；浸没式DUV需求强劲；DRAM可能成为ASML未来超过50%的收入来源；High-NA产品即将在数月内面世。\n\n## 摘要\nASML CFO在JPMorgan伦敦TMT大会上透露了多个积极信号：EUV产能爬坡顺利，2027年出货指引从>80台起跳，且有能力超过90台；浸没式DUV需求强劲，中国市场明年有望增加工具采购量。DRAM成为ASML未来增长的关键引擎，CFO表示DRAM可能在未来占ASML收入超过50%。High-NA方面，所有主要客户都在研发中，产品将在数月内面世，客户\"非常接近\"高量产准备就绪。ASML的EUV工具从D代（160wph/€1.7亿）到E代（220wph/€2.4亿）再到F代（260wph），吞吐量和ASP持续提升。\n\n## 关键要点\n- **EUV产能指引**：2026年≥60台，2027年≥80台，内部产能可达90台+\n- **DRAM占比将超50%**：随DRAM EUV层数增加，ASML预估DRAM成为最大终端市场\n- **High-NA产品即将面世**：数月内将有High-NA生产的产品可用，客户接近HVM ready\n- **吞吐量路线图**：E工具（220wph）今年主流，F工具（260wph）明年起量，长期目标300-500wph\n- **浸没式DUV需求强劲**：2025年水平将重现，H2更强劲\n- **评级Overweight**，目标价€1,515（ADR $1,813）\n\n## 标签\nASML, EUV光刻, DRAM, High-NA, 半导体设备, analysis-dimension:业绩展望, time:2026Q2\n\n## 关联\n- [ASML首选股：三大驱动因素](entries/ASML首选股：三大驱动因素.md)\n- [ASML深度分析：High-NA EUV采用时间线调整](entries/ASML深度分析：High-NA-EUV采用时间线调整.md)", "n1": "# ASML 分析：两种孔径的故事——High-NA与Low-NA的博弈\n\n**报告来源：** BNP Paribas（2026-05-11）\n\n## 描述\nBNP Paribas于2026年5月11日发布ASML研究报告，题为\"两种孔径的故事\"（A Tale of Two Apertures），评级Outperform，目标价€1,550（ADR $1,850）。报告详细分析了ASML在High-NA与Low-NA EUV光刻技术之间的市场动态，认为ASML凭借超过80%的光刻机市场份额，将持续受益于半导体制造复杂度的提升。\n\n## 摘要\nBNP Paribas认为ASML作为全球最大的光刻机供应商（市占率超80%），在半导体制造中扮演关键角色。2025年ASML营收区域分布为：中国29%、台湾26%、韩国25%、美国13%、日本4%。公司业务75%来自系统销售，25%来自服务/现场选项。BNPP给出2026-30E EPS预测为€33.74/€49.30/€55.32/€64.40/€69.85，远期P/E从39.1x（2026E）降至18.9x（2030E）。\n\n## 关键要点\n- **评级Outperform**，目标价€1,550（ADR $1,850），较当前股价有17%上行空间\n- **营收强劲增长**：2026E营收€399亿，2027E €497亿，2028E €578亿\n- **毛利率持续扩张**：预计从2025年的约35%提升至2028年约44%\n- **EPS预测**：2026E €33.74 → 2028E €55.32 → 2030E €69.85\n- **FCF收益率**：2026E仅0.8%，但到2030E提升至5.0%\n- **EV/EBITDA估值**：从2026E的30.9x下降至2030E的13.8x\n\n## 标签\nASML, EUV光刻, 半导体设备, analysis-dimension:估值分析, time:2026Q2\n\n## 关联\n- [ASML深度分析：High-NA EUV采用时间线调整](entries/ASML深度分析：High-NA-EUV采用时间线调整.md)", "n2": "# ASML 深度分析：High-NA EUV 采用时间线调整，Low-NA 推动盈利上调\n\n**报告来源：** BofA Global Research（2026-05-07）\n\n## 描述\nBofA 在2026年5月7日发布ASML深度报告，认为High-NA EUV的采用将以DRAM为先、台积电最晚（A10节点约2032年），Low-NA EUV出货量上调至2026/27/28年65/85/87台（此前62/81/75），EPS上调2.8-14.5%至€33.2/€46.5/€58.1。目标价上调至€1,710（30x CY27E EV/EBITDA），重申买入/首选股评级。\n\n## 摘要\nASML的High-NA EUV光刻技术虽然光学性能优越，但拼接（stitching）和设计技术协同优化（DTCO）重置使得平台代工厂在经济上不具吸引力。BofA通过自下而上的客户模型分析，认为DRAM供应商将成为High-NA的早期采用者（2028年起），而台积电预计到A10节点（~2032年）才会采用。Low-NA EUV仍然是ASML的主要盈利驱动力，受先进逻辑AI相关计算和DRAM EUV层数增加的推动。BofA测算2030年EPS敏感性区间为€66-€92，中点为€78。\n\n## 关键要点\n- **High-NA采用路径**：DRAM优先（三星/SK海力士2028年），英特尔和三星代工其次，台积电最晚（~2032年A10节点）\n- **Low-NA出货量上调**：2026E/27E/28E从62/81/75台上调至65/85/87台，DRAM EUV强度持续上升\n- **盈利预测上调**：2026-28E EPS上调2.8-14.5%至€33.2/€46.5/€58.1，高于共识3-20%\n- **目标价€1,710**：基于30x CY27E EV/EBITDA，EBITDA CAGR 2025-28E约29%\n- **2030年情景分析**：EPS范围€66-€92（中点€78），ASML无需High-NA加速即可实现强劲增长\n- **关键风险**：High-NA采用延迟、毛利率低于预期、半导体资本支出放缓、中国出口限制\n\n## 标签\nASML, EUV光刻, High-NA, 半导体设备, analysis-dimension:EUV技术路线, time:2026Q2\n\n## 关联\n- [台积电BofA-技术路线图-A13更新-重申Outperform](entries/台积电BofA-技术路线图-A13更新-重申Outperform.md)", "n3": "# ASML首选股：三大驱动因素——产能、存储器与High-NA\n\n**报告来源：** UBS Equities（2026-05-19）\n\n## 描述\nUBS于2026年5月19日发布报告，重申ASML为首选股，提出三大买入理由：产能瓶颈担忧被夸大、存储器曝光度提升以及High-NA故事未完。上调2027/28E EPS 9%/20%（高于共识15-20%），目标价从€1,600上调至€1,900。预计2027 EUV收入同比+37%，2028年+10%。\n\n## 摘要\nUBS认为ASML产能瓶颈担忧被夸大——ASML 2027年实际理论最大产能可超100台EUV（已沟通超80台），而需求增长仅约25-30%。ASML目前是半导设备股中存储器曝光度最高的公司（~30-35%收入来自存储器，2026年），存储器资本支出强度（litho/WFE）从2020年11%升至2025年约15%，预计2027/28E达15-20%。High-NA虽在台积电采用延迟，但可在关键层提供20-40%成本节省，且可通过替换多重图案化（如SAQP）释放超过100%的产能增益。UBS DCF估值€1,900，隐含2027E P/E 39.2x。\n\n## 关键要点\n- **产能远超需求**：ASML 2027年产能支持>50%领先边缘晶圆产出增长，而需求仅~25-30%\n- **存储器曝光度最高**：ASML存储器收入CAGR 2020-25为23%（同业~6%），DRAM EUV层数从1b到1c增加~30% die/wafer\n- **High-NA价值巨大**：1次High-NA曝光+个位数工艺步骤可替换3次Low-NA曝光+40个步骤\n- **EUV收入预测调整**：2027E同比+37%（此前26%），2028E同比+10%（此前-1%）\n- **DRAM EUV自下而上模型**：三星、SK海力士、美光各客户EUV采用路径详细分析\n- **目标价€1,900**：基于DCF估值，上行情景€2,216（2027E EPS €55.8）\n\n## 标签\nASML, EUV光刻, 存储器, High-NA, 半导体设备, analysis-dimension:产能分析, time:2026Q2\n\n## 关联\n- [ASML深度分析：High-NA EUV采用时间线调整](entries/ASML深度分析：High-NA-EUV采用时间线调整.md)\n- [ASML分析：两种孔径的故事](entries/ASML分析：两种孔径的故事.md)", "n4": "# 阿里巴巴CY1Q26(4QFY26)预览：AI投资加大，电商CMR增长承压\n\n**机构**: JPMorgan(Overweight, PT $200 ADS) / UBS(Buy) | **日期**: 2026-04-08\n\n## 摘要\n\n阿里将在CY1Q26(公司财年4QFY26)发布业绩。自中国AI基础设施叙事推动股价重估以来，Cloud收入增长是核心财务验证点。电商仍贡献大部分利润，投资者普遍接受\"稳定即可\"。两家机构均预警市场预期存在下行风险：\n\n- **JPMorgan**(Alex Yao): 认为市场在CMR和All Others两方面出错。预期CMR仅约+1%(市场期待中高单)，All Others亏损接近RMB200亿(市场预期RMB100-150亿)。Cloud符合预期~+40%。整体EBITA略逊预期。\n- **UBS**: 收入约RMB2,370亿，同比基本持平。CMR受商家补贴影响仅+1%(剔除补贴为6-7%)。快消品亏损收窄至RMB150亿(市场RMB180亿)。Cloud +40% y/y，利润率稳定在9%。\n\n## 关键要点\n\n### 电商(CMR与GMV)\n- **JPMorgan**: CMR约+1%，显著低于市场预期中高单。核心原因为宏观压力及竞争\n- **UBS**: Taobao Tmall GMV增长约+4-5%(Dec Q为+1%)，但商家补贴作为收入抵减影响CMR\n- 若剔除补贴影响，CMR实际增长6-7%，与GMV增速匹配\n- 商家补贴主要用于品牌商家，有望提升中期GMV和CMR增长\n\n### Cloud业务\n- **Cloud收入**: +40% y/y(Dec Q为+36%)，外部需求持续强劲\n- **Cloud EBITA利润率**: 稳定在~9%\n\n### 快消品(Quick Commerce)\n- **损失的预计**: JPMorgan ~RMB150亿，UBS ~RMB150亿(市场RMB180亿)\n- 管理层承诺每年减半损失，目标FY29实现盈利\n- AliExpress亏损收窄(UE改善)，UBS预计损失仅RMB4亿(去年RMB36亿)\n\n### AI投资(All Others)\n- **JPMorgan预计**: All Others损失RMB200亿(市场RMB100-150亿)\n- **驱动因素**: Qwen 3.6-Plus新旗舰LLM模型训练、Happy Horse视频生成模型、CNY营销活动(Qwen ToC app ~RMB50亿+)、Quark/Amap等原生应用投入\n- 管理层明确表示处于AI投资阶段，频繁推出模型、AI功能和原生应用\n\n### 估值与评级\n- **JPMorgan**: Overweight，目标价$200 ADS / HK$195(Dec-26)\n- 估值反映AI Cloud增长期权价值，但短期业绩波动需关注\n\n## 关联\n\n- 公司: Alibaba Group (BABA/9988.HK)\n- 机构: JPMorgan, UBS\n- 行业: e-commerce, Cloud, AI\n- 相关: [拼多多电商监管与稳健发展](entries/PDD-Ecommerce-Regulation-Huatai-DB-202603-04.md) — 同行业: e-commerce", "n5": "# BNP Paribas: SK HYNIX — Enhanced AI Memory Leadership; Less Concern on Oversupply\n\n**报告日期**: 2026-04-23 | **券商**: BNP Paribas | **分析师**: Alex Chang, Scarlett Ge, Gwen Wang  \n**评级**: Outperform (维持) | **目标价**: KRW 2,000,000（上调自 KRW 1,590,000）| **涨幅**: +63%\n\n## 摘要\nBNP Paribas维持SK海力士Outperform，上调目标价26%至KRW 2,000,000。1Q26营收创历史新高KRW 52.6tn（+60% q-q/+198% y-y），OP KRW 37.6tn（OPM ~72%）。DRAM ASP中60%+/NAND ASP中70%+大幅增长，HBM4E预期>50%份额（TSMC base-die合作+1cnm技术优势）。产能扩张有纪律（龙仁Cluster灵活分期），净现金KRW 35tn。主要风险：Capex激增和通用服务器需求疲弱。\n\n## 关键要点\n- 1Q26营收创历史新高KRW 52.6tn（+60% q-q/+198% y-y），OP KRW 37.6tn（OPM ~72%）\n- DRAM ASP中60%+增长，NAND ASP中70%+增长\n- HBM4E预期>50%份额：与TSMC base-die合作 + SK海力士1cnm DRAM技术\n- HBM4E样品2H26，目标2027量产\n- 净现金KRW 35tn，负债权益比降至12%\n- 产能扩张有纪律，龙仁Cluster灵活分期降低供应过剩风险\n- 目标价KRW 2,000,000（基于3x 2027E BVPS），较保守\n- 龙仁 Cluster Phase 1 洁净室提前 3 个月至 2027 年 2 月完工\n- Phase 2-6 建设节奏视市场状况灵活调整\n- 偏好灵活性，考虑中长期需求可见性和优化的 LTA 条款\n- 321L NAND 目标年底占国内 NAND 生产 50%（全球 30%）\n\n### 内存优化技术不构成威胁\n- BNP 认为内存优化技术（如 Google TurboQuant）旨在提升 AI 服务的经济性，最终扩大 TAM\n- 例证：Google TPU 8t/8i HBM3E 容量仍从 192GB 增至 216/288GB\n\n### 其他要点\n- 专注高密度服务器模组和 321L SSD\n- ADR 注册文件已提交 SEC，目标年内上市\n- 关键材料供应链已多元化（氦气/溴/钨）\n- 目标净现金 KRW 100tn 确保穿越周期投资\n\n## 关键财务预测\n\n| 指标 | 2025A | 2026E | 2027E | 2028E |\n|------|-------|-------|-------|-------|\n| 营收 (KRW bn) | 97,147 | 281,119 | 288,082 | 272,664 |\n| Adj. EBITA (KRW bn) | 47,206 | 211,335 | 199,806 | 172,820 |\n| Adj. EPS (KRW) | 60,403 | 256,038 | 235,214 | 210,352 |\n| ROCE (%) | 35.7 | 112.1 | 95.6 | 74.0 |\n| P/E (x) | 5.1 | 4.8 | 5.2 | 5.8 |\n\n## 估值\n- TP KRW 2,000,000 = 3x 2027E BVPS（不变）\n- 目标 P/B 基于 2027E ROE 44% + CoE 14.7%（beta 2.0x, RFR 3.7%, ERP 5.5%）\n- EPS 上调 56%/25%/14%（2026/27/28），主因 ASP 和 GPM 上修\n\n## 关联\n- [JPMorgan: SK hynix LTA paves path for new valuation framework, raising PT to W3M](entries/JPMorgan-SK-hynix-LTA-paves-path-for-new-valuation-framework-raising-PT-to-W3M.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(19): es, an, asp, ve\n- [Macquarie: SK Hynix — Giddy profit growth at a low PE multiple, raise TP to KRW 2.9M](entries/Macquarie-SK-Hynix-Giddy-profit-growth-at-a-low-PE-multiple.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(18): sk, 2027e, pl, ix\n- [HSBC: SK Hynix — Another surprise in DRAM prices, raise TP to KRW 2.9M](entries/HSBC-SK-Hynix-Another-surprise-in-DRAM-prices-raise-TP.md) — 共享标签: 2026-Q1, valuation, sk-hynix; 同标的: sk-hynix; 共同关键词(19): es, ri, 2026, yn\n- [Nomura: SK Hynix 1Q26 earnings beat; LTAs to make profitability sustainable](entries/Nomura-SK-Hynix-1Q26-earnings-beat-LTAs-to-make-profitability-sustainable.md) — 共享标签: 2026-Q1, valuation, sk-hynix; 同标的: sk-hynix; 共同关键词(18): hynix, lta, su, ea", "n6": "# BofA 5月App数据跟踪：中国电商与在线媒体格局分析\n\n**来源**: 行业研究-互联网 | **机构**: bofa\n\n## 摘要\n\nBofA基于5月App数据跟踪中国互联网竞争格局。\n电商领域拼多多和抖音电商份额持续攀升，淘天集团面临压力。\n本地生活领域美团维持领先但抖音本地生活增速放缓。\n\n## 关键要点\n\n- 拼多多5月MAU同比增长12%，增速领先电商平台\n- 抖音电商GMV增速环比放缓但仍保持20%+增长\n- 美团外卖订单量同比增长15%，到店业务恢复强劲\n- 视频号广告加载率提升，微信生态商业化加速\n- AI搜索应用用户规模快速扩大\n\n## 关联\n\n- 行业: china-internet\n- 机构: bofa\n- 数据: app-data-may-2026\n- 相关: pinduoduo, meituan, douyin", "n7": "# BofA Securities does and seeks to do business with issuers covered in its research\n\n**机构**: BofA | **类别**: 行业研究-互联网 | **期间**: 2026-Q2\n\n## 摘要\n\n本报告由BofA于2026-Q2发布，分析行业研究-互联网行业最新动态。\n\n## 关键要点\n\n- DAUs decelerating and Pinterest accelerating.  DAU growth for Amazon accelerated\n- slowed, but y/y growth was still strong; ChatGPT was up 68%, Gemini grew 320%, and\n- Meta AI was up 1,300%, while Claude growth accelerated to over 1,300%.\n- while Instagram DAU growth of 4% y/y accelerated 1ppt m/m. YouTube DAUs were\n- comps get easier next month). Roblox DAU growth slowed 4ppts to +9%. Google DAUs\n- eComm: Amazon, Wayfair, and Carvana outperform m/m\n- Amazon DAU growth of 4% y/y in May accelerated 1ppt from Apr, while DL growth of\n\n## 关联\n\n- 行业: 行业研究-互联网\n- 机构: BofA\n- 期间: 2026-Q2", "n8": "# China Industrials  | Asia Pacific\n\n**机构**: Morgan Stanley | **类别**: 行业研究-工业自动化 | **期间**: 2026-Q2\n\n## 摘要\n\n- On this trip, we believe companies were very opti 使用AI赋能的广告活动(AI Max/Performance Max)\n- AI(Gemini)显著扩展长尾复杂搜索的变现能力\n\n### 盈利质量分析(HSBC)\n- 总EBIT $39.7bn，超共识9.2%\n- Services EBIT $40.6bn(+24.2%)，利润率45.3%创历史新高\n- EPS $5.11含$369亿股权投资收益，剔除后~$2.76\n\n### 资本开支展望\n- 2026年capex指引中位小幅上调~3%\n- 2027年capex预计\"显著\"增长，HSBC上调至$2,500亿(此前$1,850亿)\n\n### BofA上调盈利预测\n- 2027年净收入上调10%，EPS上调12%\n- 受Search增长、Cloud backlog确认和TPU销售驱动\n\n## 关联\n\n- 公司: Alphabet (GOOGL)\n- 机构: BofA, Deutsche-Bank, HSBC\n- 相关: [Google AI Wars流量跟踪](entries/Google-AI-Wars-Traffic-BofA-202605-06.md) — 同标的: GOOGL\n- 相关: [Google I/O与资本募资](entries/Google-Agentic-IO-Capital-Raise-MS-HSBC-UBS-202605-06.md) — 同标的: GOOGL", "n15": "# Google AI Wars流量跟踪：Gemini与Claude高速增长\n\n**机构**: BofA Global Research | **评级**: Buy | **目标价**: $430\n\n## 摘要\n\nBofA发布2026年4月和5月AI产品流量跟踪，覆盖Google、ChatGPT、Gemini、Claude、Meta AI、Perplexity等主要AI产品。在5月全球移动DAU方面：ChatGPT 4.38亿(+68% y/y)、Gemini 1.1亿(+321% y/y, 月净增1,000万)、Claude 1,700万(+1,349% y/y)、Meta AI 1,000万(+1,321% y/y)。Google全球搜索份额稳定在~90%。\n\n## 关键要点\n- Gemini全球DAU 1.1亿（+321% y/y），月净增1,000万，增速最快\n- Claude DAU 1,700万（+1,349% y/y），环比+22%，增速第二\n- ChatGPT DAU 4.38亿（+68% y/y），绝对值仍占绝对优势\n- Meta AI DAU 1,000万（+1,321% y/y），基数最低但增速稳定\n- Google全球搜索份额稳定在~90%，AI未明显侵蚀搜索\n\n### 5月全球Web流量趋势\n| 平台 | 同比 | 环比 |\n|------|------|------|\n| Google | +5% | 持平 |\n| ChatGPT | +2% | -2% |\n| Gemini | +451% | +2% |\n| Claude | +857% | +14% |\n| Meta AI | +105% | +17% |\n\n### 5月全球移动DAU趋势\n| 平台 | DAU(百万) | 同比 | 环比 | 月净增(百万) |\n|------|-----------|------|------|-------------|\n| Google | 2,200 | +12% | +1% | ~22 |\n| ChatGPT | 438 | +68% | +2% | +10 |\n| Gemini | 110 | +321% | +10% | +10 |\n| Claude | 17 | +1,349% | +22% | +3 |\n| Meta AI | 10 | +1,321% | +25% | +3 |\n| Perplexity | 8 | +67% | - | - |\n\n### 4月趋势对比\n- Gemini月环比加速(4月+9% web, +13% DAU; 5月+2% web, +10% DAU)\n- Claude持续高增速(4月+33% web, +41% DAU; 5月+14% web, +22% DAU)\n- ChatGPT增速放缓(4月-1% web, 持平DAU; 5月-2% web, +2% DAU)\n- Meta AI从低基数快速增长(5月DAU 1,000万，环比+25%)\n\n### AI竞争格局判断\n- **ChatGPT**: 绝对规模领先，但增速放缓\n- **Gemini**: Google全力推动，借助Google生态分发(900M+ MAUs)\n- **Claude**: 高质量用户群，企业端渗透加深\n- **Meta AI**: 起步晚但借助社交网络分发增长迅速\n- **Google搜索**: 全球份额~90%，受AI产品冲击有限\n\n## 关联\n\n- 公司: Alphabet (GOOGL)\n- 行业: Internet\n- 机构: BofA\n- 相关: [Google 1Q26云业务爆发](entries/Google-1Q26-Cloud-Backlog-BofA-DB-HSBC-20260430.md) — 同标的: GOOGL\n- 相关: [Google I/O与资本募资](entries/Google-Agentic-IO-Capital-Raise-MS-HSBC-UBS-202605-06.md) — 同标的: GOOGL", "n16": "# Google I/O 2026发布Gemini Spark与$300亿资本募资\n\n**机构**: Morgan Stanley / HSBC / UBS | **日期**: 2026-05-20 ~ 06-03\n\n## 摘要\n\nGoogle I/O 2026发布多项重大产品更新，随后数周内宣布大规模资本募资。**Morgan Stanley**强调Gemini Spark个人AI代理(基于MCP协议整合Uber/DoorDash/Booking等第三方服务)和Gemini 3.5模型(API定价较竞品低70%)。**HSBC**报告Google宣布$300亿公开募资($150亿强制可转债+$150亿普通股)，用于AI基础设施建设和员工股权税务。**UBS**详细拆解$4,620亿Cloud backlog结构——TPU芯片销售和AI实验室大单(Anthropic/OpenAI/Meta)是增长主力。\n\n## 关键要点\n\n### I/O 2026产品发布(MS)\n- **Gemini Spark个人AI代理**: 将集成至Gemini app(9亿+MAU)、Search、Gmail、Calendar、Drive\n- **MCP整合**: Spark通过MCP协议接入Uber/DoorDash/Lyft/Instacart/Booking/Expedia等第三方\n- **定价分层**: Spark仅限AI Ultra订阅用户(Beta下周开放)，今夏在Chrome内直接可用\n- **Gemini 3.5 Flash/Pro**: Flash更快，3.5 Pro下月发布\n- **API定价优势**: $1.50/$9.00 per million input/output tokens，较竞品低70%\n\n### $300亿资本募资(HSBC)\n- **总规模**: $300亿\n- **构成**: $150亿强制可转债(depositary shares) + $150亿普通股\n- **用途**: AI基础设施/算力扩张 + 员工股权激励税务\n- **背景**: Alphabet此前已缩减回购并发行债券，2027年capex将大幅增加\n- **行业层面**: Anthropic 6月1日秘密提交IPO、OpenAI预计也将提交，AI资本竞赛加速\n\n### Cloud backlog拆解(UBS)\n- UBS将Performance Obligation($4,620亿)拆分为:\n  - **Core(非AI)**: 传统Cloud业务\n  - **Vertex**: AI平台服务\n  - **AI实验室大单**: Anthropic/OpenAI/Meta等合同\n  - **TPU芯片销售**: 外部客户TPU合同\n- **测算结果**:\n  - Cloud收入上调2026年~24%、2027年~34%(TPU销售从2028年前移至4Q26-3Q27)\n  - 总收入上调2026年~5%、2027年~10%\n  - EPS下调2026年~1%、2027年~7%(芯片销售利润率较低)\n  - 2026/27年收入较Street高~7%/~16%，EPS基本符合\n\n### UBS财务预测\n\n| 指标 | 2025A | 2026E | 2027E | 2028E |\n|------|-------|-------|-------|-------|\n| 收入($bn) | 403 | 519 | 669 | 662 |\n| EBIT($bn) | 129 | 172 | 212 | 239 |\n| EPS | $10.81 | $14.20 | $14.64 | $16.82 |\n\nUBS维持Neutral评级，目标价$410\n\n## 关联\n\n- 公司: Alphabet (GOOGL)\n- 机构: Morgan-Stanley, HSBC, UBS\n- 相关: [Google 1Q26云业务爆发](entries/Google-1Q26-Cloud-Backlog-BofA-DB-HSBC-20260430.md) — 同标的: GOOGL\n- 相关: [Google AI Wars流量跟踪](entries/Google-AI-Wars-Traffic-BofA-202605-06.md) — 同标的: GOOGL", "n17": "# Greater China Banks Daily\n\n**机构**: UBS | **类别**: 行业研究-金融 | **期间**: 2026-Q2\n\n## 摘要\n\n本报告由UBS于2026-Q2发布，分析行业研究-金融行业最新动态。\n\n## 关键要点\n\n- totaled USD 376.78bn, hitting a 19.4% YoY growth, up from the 14.1% growth in April\n- and outperforming the expected 15% in a Reuters poll. The import value reported USD\n- 271.35bn, up 27.4% YoY, also accelerating from April’s 25.3% growth and beating\n- Reuters’ expectation of 25% YoY. The trade surplus in May recorded USD105.3bn,\n- increasing by USD 20.61bn MoM, hitting a same-period record high. The strong exports\n- automatic data processing equipment leading the growth (+110.9% and +66.1% YoY\n- in May). Exports to major partners mostly accelerated, including the U.S. (up 35.4% YoY\n\n## 关联\n\n- 行业: 行业研究-金融\n- 机构: UBS\n- 期间: 2026-Q2", "n18": "# HSBC: SK Hynix — Another Surprise in DRAM Prices\n\n**报告日期**: 2026-05-11 | **券商**: HSBC | **分析师**: Ricky Seo, Han Kil Chang  \n**评级**: Buy (维持) | **目标价**: KRW 2,900,000（上调自 KRW 1,800,000）| **涨幅**: +54.3%\n\n## 摘要\nHSBC维持SK海力士Buy，目标价从KRW 1,800,000大幅上调至KRW 2,900,000（+54%）。核心催化剂：通用服务器DRAM需求爆发，AI服务器与通用服务器的比例从4-8:1快速趋于1:1。2Q26 OP上调14%至KRW 65tn，2026全年OP上调13%至KRW 265tn。HBM3e价格回升、SO-CAMM2增长提供额外ASP支撑。CSP 2026年Capex预期USD 640bn（+70% YoY）。\n\n## 关键要点\n- 2Q26 OP预计KRW 65tn（+73% q-q/+606% y-y），较此前预测高14%\n- 2Q26营收预计KRW 80tn（+52% q-q/+260% y-y）\n- 2026全年OP上调13%至KRW 265tn（+460% y-y），营收上调至KRW 329tn（+238% y-y）\n\n### CSP 资本开支持续激进\n- 四大 CSP 2026 年 capex 增长上调至 USD 640bn（+70% y-o-y）\n- 服务费上升 + 更好的 ROIC 预期，使数据中心投资更易决策\n- AI Agent 推动 Token 需求，降低每 Token 成本后 AI 使用量加速\n\n### 估值方法切换\n- 从 P/B 切换到 2027-28 平均 BVPS（稳健盈利趋势 + 延长的上行周期）\n- 目标 P/B 从 2.4x 上调至 2.8x（历史峰值）\n- 即使目标价，隐含 P/E 仅 7x 2027/28E 平均 EPS\n- OP 预测比 Bloomberg 共识高 9-13%（2027-28E）\n\n## 关键财务预测\n\n| 指标 | 2025A | 2026E | 2027E | 2028E |\n|------|-------|-------|-------|-------|\n| 营收 (KRW bn) | 97,147 | 328,665 | 475,836 | 563,132 |\n| EBITDA (KRW bn) | 61,136 | 288,195 | 418,350 | 447,138 |\n| OP (KRW bn) | 47,206 | 264,565 | 387,653 | 407,145 |\n| HSBC EPS (KRW) | 62,330 | 287,363 | 421,807 | 443,537 |\n| P/E (x) | 30.2 | 6.5 | 4.5 | 4.2 |\n| ROE (%) | 44.2 | 90.7 | 64.0 | 41.6 |\n| EV/EBITDA (x) | 21.7 | 4.2 | 2.4 | 1.8 |\n\n## 风险\n- 美国高利率（neo-CSP 和 OpenAI 依赖融资）\n- 存储器厂商产能激进扩张\n- 中东地缘冲突\n\n## 关联\n- [Macquarie: SK Hynix — Giddy profit growth at a low PE multiple, raise TP to KRW 2.9M](entries/Macquarie-SK-Hynix-Giddy-profit-growth-at-a-low-PE-multiple.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(23): to, tp, rw, pr\n- [JPMorgan: SK hynix LTA paves path for new valuation framework, raising PT to W3M](entries/JPMorgan-SK-hynix-LTA-paves-path-for-new-valuation-framework-raising-PT-to-W3M.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(17): sk, is, ix, es\n- [Nomura: SK Hynix 1Q26 earnings beat; LTAs to make profitability sustainable](entries/Nomura-SK-Hynix-1Q26-earnings-beat-LTAs-to-make-profitability-sustainable.md) — 共享标签: valuation, 2026-Q1, sk-hynix; 同标的: sk-hynix; 共同关键词(17): sk, ix, to, in\n- [BNP Paribas: SK HYNIX — Enhanced AI memory leadership, less concern on oversupply](entries/BNP-Paribas-SK-HYNIX-Enhanced-AI-memory-leadership-less-concern-on-oversupply.md) — 共享标签: 2026-Q1, valuation, sk-hynix; 同标的: sk-hynix; 共同关键词(19): es, ri, 2026, yn", "n19": "# Hubbell收购NSI Industries加码电气化\n\n## 摘要\nHubbell宣布以30亿美元现金收购NSI Industries(电气连接件/配件龙头，15,000+ SKU，2,000+分销商)，对应15.5x 2026E EBITDA。NSI预计2026年收入~5.7亿美元、EBITDA~1.93亿美元(利润率~34%，比HUBB现有高~800bps)。MS测算2026 EPS增厚$0.20-0.25，2027增厚$0.45。三家投行均持中性态度：Deutsche Bank Hold/TP 520，MS Equal-weight/TP 565，UBS Neutral/TP 515。核心分歧在于内生增长可持续性——UBS认为需看到更多以量驱动而非价格驱动的增长证据。\n\n## 关键要点\n- NSI产品组合互补HES(电气解决方案)，覆盖轻工业/数据中心/网络基础设施\n- 数据中心占NSI收入~10
