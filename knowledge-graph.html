g form nomenclature for references to China; Hong Kong; Taiwan; and Macau within this research material are Mainland China; \nHong Kong SAR (China); Taiwan (China); and Macau SAR (China).\nJ.P. Morgan Research may, from time to time, write on issuers or securities targeted by economic or financial sanctions imposed or \nadministered by the governmental authorities of the U.S., EU, UK or other relevant jurisdictions (Sanctioned Securities). Nothing in this \nreport is intended to be read or construed as encouraging, facilitating, promoting or otherwise approving investment or dealing in such \nSanctioned Securities. Clients should be aware of their own legal and compliance obligations when making investment decisions. \nAny digital or crypto assets discussed in this research report are subject to a rapidly changing regulatory landscape. For relevant \nregulatory advisories on crypto assets, including bitcoin and ether, please see https://www.jpmorgan.com/disclosures/cryptoasset-\ndisclosure.\nThe author(s) of this research report may not be licensed to carry on regulated activities in your jurisdiction and, if not licensed, do not \nhold themselves out as being able to do so.\n\n### 2026-05-27-JPMorgan-China Internet JPM 2026 Global China Summit Key Takeaways-122259534.pdf\npages=25 timeliness=fresh\n\n--- page 1 ---\nwww.jpmorganmarkets.com\nAsia Pacific Equity Research\n27 May 2026\nChina Internet\n \nJPM 2026 Global China Summit Key Takeaways\n \nHead of China Equity Research \nand Co-Head of Asia TMT \nResearch\nAlex Yao AC\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSAC Registration Number: S1730523020001\nDaniel Chen\n(86-21) 6106 6205\ndaniel.q.chen@jpmorgan.com\nSAC Registration Number: S1730521040001\nOlivia Xu\n(86-21) 6106 6138\nolivia.w.xu@jpmorgan.com\nSAC Registration Number: S1730525060001\nNancy Liu\n(86 21) 6106 6343\nnancy.liu@jpmorgan.com\nSAC Registration Number: S1730524090001\nJ.P. Morgan Securities (China) Company \nLimited\nSee page 17 for analyst certification and important disclosures, including non-US analyst disclosures.\n• We hosted JPM 22nd Global China Summit last week in Shanghai, conducting \nmanagement meetings across platform incumbents, listed AI pure-plays, and \nconsumer internet companies spanning our coverage universe. The observation \nthat most reframes the China AI investment debate is that AI profit pool is \nexpanding, but economic surplus is accruing upstream, to compute owners and \nspecialized hardware lessors, not to the model companies generating demand \nfor that infrastructure. Inference capacity, not training scale, is the binding \nconstraint on industry revenue growth. The market prices model-layer \ncompanies as primary AI beneficiaries while the economics we observed \nsuggest investors should assess upstream value capture leakage before \nunderwriting margin expansion.\n• The inference bottleneck has restructured compute procurement in ways not yet \nreflected in consensus models, in our view. Supply has migrated from major \nCSPs toward specialized leasing companies, where rental costs are rising. One \nmodel company almost doubled prices yet saw only marginal margin \nimprovement as server costs absorbed the gain. Revenue growth at the model \nlayer is supply-constrained, not demand-constrained, a distinction with direct \nearnings implications.\n• Model convergence is compounding this pressure. Multiple management teams \nacknowledged that capability gaps among leading domestic models are \nnarrowing, shifting competition from quality toward distribution and ecosystem \nintegration — structurally constructive for platform incumbents, more \nchallenging for pure-plays whose valuations embed durable quality premiums. \nTwo distinct platform strategies have crystallized: Alibaba pursuing external \ncloud monetization, Tencent prioritizing internal ecosystem integration, \nimplying divergent margin profiles the market cannot evaluate with a single AI-\nrevenue benchmark. Coding has emerged as the consensus monetization wedge, \nbut subscription economics are already breaking down in favor of usage-based \nbilling. No management team presented a convincing near-term path to mass \nconsumer AI monetization, reinforcing a predominantly B2B revenue trajectory \nover the next 12–18 months.\n• At the stock level, Tencent delivered the most significant AI narrative upgrade \nsince 1Q26, with Hunyuan 3 adoption across 100-plus internal teams validating \nthe ecosystem-first approach. Alibaba offered its clearest cloud margin \ndisclosure to date, though macro commentary turned notably darker. Zhipu AI \nprovided the sharpest illustration of upstream value capture, pricing power exists \nbut surplus flows to lessors, ahead of the June 8 Stock Connect catalyst. \nMiniMax showed the strongest revenue acceleration but carries coding \nconcentration risk and a July lock-up overhang. Baidu’s candid acknowledgment \nof foundation model momentum loss sharpens the full-stack thesis but \nintroduces multi-quarter execution risk.\n--- page 2 ---\n2\nAsia Pacific Equity Research\n27 May 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nThematic Takeaways\nThe inference bottleneck is repricing the AI value chain in \nreal time\nThe single most decision-useful observation from the Summit is that China’s AI \nprofit pool is growing but currently captured upstream, by compute owners and \nhardware lessors, less by the model companies generating demand for that \ncompute.\nAccording to management of a leading domestic foundation model developer, the \ncompany had raised pricing on its latest-generation model by roughly double, yet \nmargins improved only marginally because server rental costs rose sharply in a \nsingle recent month with no visible ceiling. A second model company reported that \nAPI and token-plan revenue has become the majority of total revenue, up from a \nminority share at year-end, with text-model API gross margins meaningfully above \nwhat it characterized as industry averages, driven by throughput efficiency rather \nthan pricing. Despite this strong unit economics profile, the company’s ability to \nscale revenue remains constrained by inference compute availability, not demand.\nWe heard corroboration of this dynamic from the supply side. A global AI chip \nexecutive framed modern data centers as “token factories” where throughput \nconverts directly to revenue and efficiency determines margins. His \ncharacterization of agentic AI systems as requiring “hundreds to thousands of \ntimes more compute” than earlier generative models reinforces the thesis that \ninference demand is likely to compound even as model architectures stabilize.\nJPM view: the investable implication is that the market is pricing model-company \nequity narratives as if they are the primary beneficiaries of AI adoption, when in \npractice the economic surplus is flowing to compute infrastructure. This dynamic \nfavors listed companies with vertically integrated chip-to-cloud stacks (Baidu via \nits proprietary AI chip subsidiary, Alibaba via T-Head/PPU) or platform \nincumbents that can internalize inference cost through proprietary hardware and \necosystem monetization (Tencent). Pure-play model companies (Zhipu AI, \nMiniMax) face the more precarious position of generating demand for compute \nwithout yet capturing proportional economics.\nThe compute supply chain has restructured, and the \nmarket has not caught up\nAccording to management of multiple foundation model developers, they have \nshifted compute procurement away from major cloud service providers and toward \nspecialized compute leasing companies, because the CSPs themselves are now \nconstrained and competing for the same GPU resources they previously supplied. \nThis is a structural change from last year, when CSPs were the primary \nprocurement channel.\nRental cost inflation is severe and accelerating. One company described the rental \nprice of one specific server as having risen by roughly a third in the most recent \nmonth, on top of prior months of increases. The distinction between nominal \nglobal chip production capacity and actual cards reaching China was emphasized \nrepeatedly: supply chain disruptions involving specific server integrators were\n--- page 3 ---\n3\nAsia Pacific  Equity Research\n27 May 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\ncited as having made procurement harder and more expensive than headline \nproduction volumes imply.\nDomestic chip alternatives remain a complement rather than a replacement. One \ncompany reported a domestic supplier offering only 50 cards in an entire month. \nThe main domestic suppliers with meaningful inference volume were identified as \nChina’s leading telecom equipment maker and a domestic AI chip designer, with \npractical inference usability for their latest-generation chips generally estimated at \nQ3 2026 or later.\nJPM view: model-company revenue growth over the next two to three quarters is \nlikely constrained by compute availability more than by demand. Any easing of \nsupply, whether through domestic chip ramp or rental price stabilization, would be \na meaningful catalyst for the entire sector, benefiting Zhipu AI, MiniMax, and \nother model developers most directly. Conversely, continued rental inflation \ndirectly compresses the margin expansion case for model companies that lack \nproprietary chip supply. Cloud platforms that own proprietary chip capacity \n(Alibaba, Baidu) are relatively better positioned to absorb this cost pressure, \nthough even they face constraints on available volume.\nDomestic model convergence shifts competition from \ncapability to distribution\nAccording to management of multiple foundation model developers, the domestic \ncompetitive landscape has no generational capability gap among leading players. \nOne described the market as not winner-take-all, with enterprise users combining \nmodels based on task-specific features (speed, long-context performance, \nmultimodal understanding, reasoning difficulty) rather than consolidating around a \nsingle provider. A second company argued that benchmark leadership has become \n“easily optimized” and the meaningful test is whether paying customers choose the \nmodel in production workflows. A senior technology panel participant reinforced \nthis from a product perspective, arguing that platform integration, user context \naccumulation, and workflow lock-in are becoming the durable moats.\nThis convergence thesis has asymmetric implications across the coverage universe. \nFor platform incumbents, it is constructive: if the model layer is approaching \n“good enough” quality, then distribution, ecosystem, and data advantages become \nthe primary competitive differentiators. One major platform demonstrated this \noperationally, describing how a rebuilt AI team delivered a competitive model \nwithin 88 days of full team readiness, which was then integrated across more than \n100 internal product teams within weeks.\nFor pure-play model companies at high ARR multiples, the convergence thesis is \nmore challenging. One such company defended premium pricing by arguing that at \nclose to a leading US lab’s capability level, discounting makes no sense because \ncustomers will simply pay slightly more for the genuine article. This logic depends \non a quality gap that the broader summit evidence suggests is narrowing. We note, \nhowever, that this company’s own customer feedback and retention data were \ndescribed as strong. The tension between “we are the best” self-assessments and \nthe broader “no generational gap” market structure observation is itself an \nimportant analytical signal, and the resolution likely determines the direction of AI \npure-play valuations over the next 6–12 months.\n--- page 4 ---\n4\nAsia Pacific Equity Research\n27 May 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nJPM view: model convergence is structurally constructive for Tencent \n(distribution via WeChat, mini-programs, payments) and Alibaba (cloud platform, \nmerchant ecosystem, payment rails). It is more threatening for Zhipu AI and \nMiniMax, whose valuations depend on durable quality premiums. Baidu sits in \nbetween: its model capability has lagged recently, but its proprietary AI chip \nadvantage becomes more valuable in a world where the model layer commoditizes \nand value migrates to infrastructure.\nCoding is the consensus monetization wedge, but \nsubscription economics are failing\nAcross foundation model companies, cloud platforms, and internet incumbents, \ncoding emerged as the vertical where AI revenue is actually materializing at scale. \nOne company reported that the vast majority of token consumption is coding-\nrelated. Another described coding as its priority weakness and the area requiring \nthe most urgent improvement. A third platform claimed its coding product leads \ndomestic DAU rankings in the category. A Chinese AI executive positioned \ncoding as the fastest area for top domestic models to catch up with US labs.\nBut the subscription model around coding is breaking. According to management \nacross multiple sessions, coding plans are economically problematic: users exploit \nunlimited packages and resell unused quotas on secondary markets. At least one \nmajor platform has moved away from coding plans entirely, and management \ncommentary across sessions suggested the industry is migrating toward usage-\nbased token billing. One company was explicit that coding plans contribute a small \nminority of revenue and are more useful for reputation than profit.\nJPM view: the shift from subscription to token billing has direct implications for \nrevenue predictability and comparability. Investors evaluating model-company \nARR growth should distinguish between subscription-driven and token-driven \nrevenue, as the latter is inherently more volatile and harder to forecast, even if the \nunit economics are structurally better. This transition is most directly relevant for \nZhipu AI and MiniMax, both of which are in the process of shifting revenue mix \ntoward API/token billing and away from subscription-based plans.\nTwo diverging AI strategies are emerging among platform \nincumbents\nThe summit crystallized a strategic divergence between China’s two largest \nInternet platforms that we expect to produce measurably different financial \nprofiles over the next 12 months.\nAlibaba is pursuing an external-first cloud strategy: sell compute and model access \nto everyone, including direct competitors (which were explicitly named as MaaS \nplatform clients). According to management, the company has set a long-term \nambition of US£100 billion in external cloud revenue over approximately five \nyears and framed the cloud business as the company’s strategic core. Compute \nallocation prioritizes internal model training first, followed by external monetized \nMaaS, then infrastructure clients, and lastly the consumer AI app, a hierarchy that \nplaces external revenue high in the stack.\nOn the other hand, Tencent is pursuing an internal-first strategy: prioritize its own \nfoundation model and co-designed products over external cloud customers. \nManagement explicitly rejected making five-year AI revenue promises and framed\n--- page 5 ---\n5\nAsia Pacific  Equity Research\n27 May 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nthe strongest long-term AI advantage as ecosystem distribution (messaging, \npayments, mini-programs, merchants) rather than cloud revenue maximization. \nCompute allocation was described as structurally internal-first, with the foundation \nmodel team, co-designed products, and AI-native agent products all ranking above \nexternal cloud customers.\nJPM view: these two paths imply different margin trajectories. The external-first \nmodel (Alibaba) generates more top-line AI revenue near-term but carries higher \ncompetitive-pricing and margin-compression risk. The internal-first model \n(Tencent) sacrifices near-term cloud growth for ecosystem lock-in and proprietary \nmargin, but requires the model itself to reach competitive quality, a condition that \nmanagement argued has now been met but that the market has not yet fully \ncredited. Both approaches have merit; the key for investors is to evaluate each \nplatform against the right KPI (cloud revenue growth for the former, ecosystem \nmonetization and AI-enhanced engagement for the latter) rather than applying a \nsingle AI-revenue benchmark to both.\nConsumer AI monetization remains the largest unresolved \nquestion\nAcross keynote speakers and corporate meetings, no management team presented a \nconvincing near-term path to mass consumer AI monetization in China. One \nplatform’s management articulated the core problem directly: unlike traditional \ninternet products where incremental users improve economics, in AI each \nadditional user increases token costs materially. If token costs remain high, \nmaximizing AI-product DAU may actually destroy value.\nThe proposed solutions were directional rather than proven. One platform \ndescribed a future in which AI agents expand transaction volume within existing \necosystems, monetized through payment infrastructure and discovery, but \nacknowledged that how advertising fits into AI-native information discovery is \n“yet to be seen.” A foundation model CEO argued that China’s AI monetization \nshould ultimately come more from the consumer market because of the country’s \nvery large user base, but that the enterprise flywheel proven in the US is unlikely \nto replicate in China, where the largest enterprises tend to build internally and the \nmid-market adopts slowly. A leading short-video platform described AI as \ndramatically lowering content creation costs and re-architecting recommendation \nsystems but did not quantify how this translates to incremental monetization.\nJPM view: the absence of a credible near-term consumer AI monetization path \nacross the sector is itself an important signal. It suggests that the AI revenue ramp \nin China over the next 12-18 months will be predominantly B2B/API-driven, and \nthat consumer-facing AI features are more likely to function as engagement and \nretention tools within existing ecosystems than as standalone revenue streams. \nThis favors Tencent (which can embed AI into WeChat's existing transaction \ninfrastructure) and Alibaba (which can layer AI into commerce and payment \nflows) over companies building consumer AI apps from scratch. For Zhipu AI and \nMiniMax, it reinforces the centrality of the B2B/API revenue trajectory, as \nconsumer chatbot products are unlikely to be meaningful revenue contributors in \nthe near term.\n\n### 2026-06-02-BofA Global Research-Internete-Commerce May app data Mixed bag for Online medi...-122359248.undefined.pdf\npages=15 timeliness=fresh\n\n--- page 1 ---\nBofA Securities does and seeks to do business with issuers covered in its research \nreports. As a result, investors should be aware that the firm may have a conflict of \ninterest that could affect the objectivity of this report. Investors should consider this \nreport as only a single factor in making their investment decision. \nRefer to important disclosures on page 13 to 15.  \n12980218 \n \n \nInternet/e-Commerce \nMay app data: Mixed bag for Online media, \ndelivery decelerates, & AI apps strong \nIndustry Overview \n   \n \n \nMay app trends: big eCommerce consolidates DAUs \nWe track monthly global mobile app DAUs and downloads per Sensor Tower to gauge \nuser trends across top subsectors including social media, eCommerce, subscription \nservices, and travel.  For May, Online Media DAU trends were mixed, with Facebook \nDAUs decelerating and Pinterest accelerating.  DAU growth for Amazon accelerated \nwhile many smaller platforms slowed, possibly reflecting a shift toward value as inflation \nincreases.  Delivery DAUs decelerated, with Uber Eats an exception. AI app DAUs mostly \nslowed, but y/y growth was still strong; ChatGPT was up 68%, Gemini grew 320%, and \nMeta AI was up 1,300%, while Claude growth accelerated to over 1,300%. \nOnline Media: Mixed May DAU trends, Pinterest best m/m \nFacebook DAUs contracted 4% y/y in May, a modest deceleration from -2% y/y in Apr, \nwhile Instagram DAU growth of 4% y/y accelerated 1ppt m/m. YouTube DAUs were \nstable (at flat y/y) and DLs slowed to +2% y/y. Snap DAUs grew a stable 3%, while DLs \ndeclined 7% (6ppt decel). Pinterest DAUs grew 14% y/y (4ppt accel) and DLs increased \n2% y/y (4ppt decel).  Reddit DAUs declined 1% (stable m/m), and DLs declined 37% (y/y \ncomps get easier next month). Roblox DAU growth slowed 4ppts to +9%. Google DAUs \ngrew a stable 12% y/y, with DLs declining 8% y/y (an 8ppt decel vs Apr). \neComm: Amazon, Wayfair, and Carvana outperform m/m \nAmazon DAU growth of 4% y/y in May accelerated 1ppt from Apr, while DL growth of \n4% was stable.  eBay DAUs declined 2% y/y (3ppt decel m/m). Etsy DAUs grew 6% y/y \n(6ppt decel from Apr), while DLs contracted 18% (9ppt decel).  Chewy DAUs grew 17% \ny/y, a 20ppt decel. from Apr, while DL trends slowed 9ppts to -20% y/y.  Wayfair DAUs \ngrew 4% y/y, accelerating 8ppts on 21ppt easier comp.  Carvana DAU growth \naccelerated to 24% y/y (from 20% in Apr), also on an easier comp. \nGig: Uber relatively stable at +10%, Dash/Cart decelerates \nUber DAUs grew 10% y/y, a modest decel. of 1ppt from April, while DL growth of 10% \nslowed 2ppts.  Lyft DAUs/DLs were -2%/-1% y/y (1ppt accel/decel).  Waymo DAUs \ngrew a stable 43% y/y.  DoorDash DAUs growth of 6% y/y slowed 2ppts from Apr, will \nDLs fell 8% y/y, also a 2ppt decel.  Uber Eats DAUs were +3% y/y in May (3ppt accel), \nwith DLs up 4% (6ppt accel).  Instacart DAUs declined 5% y/y (4ppt decel) and DLs \nwere down 6% y/y (4ppt accel from April). \nTravel & Other: DAU growth for ABNB/BKNG accelerates \nBooking y/y DAUs grew 4% y/y in May (1ppt accel from Apr) while DLs were flat y/y \n(7ppt decel).  Expedia DAUs grew 4% y/y, a 1ppt decel, while DLs declined 33% y/y \n(stable m/m). Airbnb DAUs/DLs grew 11%/30%, an acceleration of 2ppts/7ppts from \nApril.  Vrbo DAU growth decelerated 1ppt to 12%. Duolingo DAU growth of 11% \naccel’d 1ppt m/m. StubHub DAUs grew 26% y/y, accelerating 28ppts from Apr, while \nVivid Seats DAUs declined 3%, decelerating 6ppts m/m. \n02 June 2026   \nEquity \nUnited States \nJustin Post \nResearch Analyst \nBofAS \n+1 415 676 3547 \njustin.post@bofa.com \nMichael McGovern \nResearch Analyst \nBofAS \nmmcgovern@bofa.com \nOmar Dessouky, CFA \nResearch Analyst \nBofAS \nomar.dessouky@bofa.com \nNafeesa Gupta \nResearch Analyst \nBofAS \nnafeesa.gupta@bofa.com \nNitin Bansal, CFA \nResearch Analyst \nBofAS \nnbansal7@bofa.com \nSteven McDermott \nResearch Analyst \nBofAS \nsteven.mcdermott@bofa.com \nHarvey Qin \nResearch Analyst \nBofAS \nhuiyu.qin@bofa.com \nDAU: Daily Active User \nDL: Download \nOTA: Online Travel Agency \nAccessible version \nTimestamp: 02 June 2026 03:00AM EDT\nCR\n--- page 2 ---\n2 \nInternet/e-Commerce | 02 June 2026 \n \n \n Mobile app data update \nSensor Tower DAU & Download estimates combine App Store & Google Play data \nprovided by Publisher & Developer partnerships, as well as signals from the stores to \nbackfill non-partner data. Sensor Tower has data sharing partnerships with Publishers & \nDevelopers that collectively represent 50%+ of all App Store revenues. We have \naggregated this data to gauge potential user & usage trends. Sensor Tower regularly \nrevises their Active User & Download estimates.  Per Sensor Tower, these revisions \nare expected to improve estimate measurements for apps. \nSnap \nPer Sensor Tower, global Snap DAUs were 395mn in May, growing 3.0% y/y and slowing \na modest 20bps from April.  Since March, DAUs are up 2mn to 395mn. Gross downloads \ndeclined 7% y/y , Morgan Stanley Research\n\n### 2026-06-18-JPMorgan-China Food Delivery Not Just a Soft Draft Disclosure Rules ...-122636767.pdf\npages=15 timeliness=fresh\n\n--- page 1 ---\nwww.jpmorganmarkets.com\nAsia Pacific Equity Research\n18 June 2026\nChina Food Delivery\n \nNot Just a Soft Draft: Disclosure Rules Could Cool the \nFood Delivery Subsidy War\n \nHead of China Equity Research \nand Co-Head of Asia TMT \nResearch\nAlex Yao AC\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nSAC Registration Number: S1730523020001\nNancy Liu\n(86 21) 6106 6343\nnancy.liu@jpmorgan.com\nSAC Registration Number: S1730524090001\nJ.P. Morgan Securities (China) Company \nLimited\nSee page 7 for analyst certification and important disclosures, including non-US analyst disclosures.\nSAMR’s draft food-delivery rules reduce Meituan’s downside tail, but they do not \nyet turn regulatory relief into a positive earnings catalyst, in our view. We \nreiterate Neutral on Meituan with a Dec-26 PT of HK$85, making no changes to \nour estimates considering the draft’s scenario framework. The call rests on one \nload-bearing assumption: SAMR’s funding-source language has real behavioral \nbite and limits capital-funded subsidy attacks on food delivery. If that premise \nholds, our reading of the draft lowers the probability of our bear case (Table 4), in \nwhich prolonged capital-funded competition weakens the delivery profit pool and \nMeituan’s fair value falls to around HK$51. If the premise does not hold, the rules \nbecome disclosure without much strategic value. We do not use the draft alone as \nthe basis to change our estimates, but we see it as a near-term sentiment stabilizer \nahead of the final text due after the July 17, 2026 consultation deadline, and \nconsidering 3Q26 subsidy evidence.\n• The market appears to be pricing the absence of explicit subsidy caps as \nevidence that the draft lacks bite. In our view, that misreads the mechanism. The \ndraft does not need to cap every campaign to matter; it needs to make the most \naggressive campaigns slower, more visible, and easier to challenge. Seven-day \npre-disclosure reduces surprise value, while funding-source reporting and \ncompetitive-impact self-assessment create an evidentiary trail for regulators, \ncompetitors, merchants, riders, and media to scrutinize extreme promotions.\n• The relative stock implication favors Meituan on this specific catalyst, although \nnot enough for us to prefer it outright over Alibaba (9988 HK/BABA US, OW) \nat the portfolio level. Meituan’s advantages lie in order density, routing \nefficiency, merchant coverage, rider management, and consumer habit \nformation. If the rules shift competition away from fast capital-funded cash \nsubsidy toward operating execution, the battleground moves back onto \nMeituan’s terrain.\n• We would change our view if the final rules explicitly allow group-level \noperating profit to satisfy the funding-source requirement, if platforms keep \nrunning aggressive disclosed campaigns without regulatory response, or if \nAlibaba redirects the fight into higher-AOV use cases where Meituan’s profit \npool is more exposed. The clearest falsification test is 3Q26 subsidy intensity: if \nreporting and industry checks show subsidies remain near 1H26 levels with no \nmoderation, our interpretation weakens. Conversely, final wording that \npreserves Provision 3, first disclosures that force campaign economics into view, \nand evidence of easing subsidy intensity would support a shift of probability \nweight from the HKD51 bear case toward the HKD92 base and the HKD128 \nbull case.\nJPM view\nThe market is likely to read the draft as soft because it lacks hard caps. We think that misses the point. The draft does not \ntry to regulate subsidies mainly by setting a price ceiling, in our view. It regulates them by making aggressive campaigns \nslower, more visible, and easier to challenge. In food delivery, that is meaningful. The most damaging form of competition\n--- page 2 ---\n2\nAsia Pacific Equity Research\n18 June 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nis not ordinary promotion; it is fast, capital-funded subsidy escalation designed to change consumer and merchant behavior \nbefore the incumbent can respond. Seven-day disclosure and funding-source reporting directly target that mechanism.\nOur view is therefore simple: disclosure, funding-source scrutiny, and competitive-impact self-assessment are the \nenforcement mechanism.\nStock implication: The draft is likely to reduce bear case probability of Meituan but this is not a reason to flip Meituan \nover Alibaba outright. Alibaba remains a broader AI/cloud/platform optionality story. The point is narrower: on this \nspecific food-delivery catalyst, the relative value setup favors Meituan more than the market is likely to price.\nWhat has changed?\nSAMR released the draft Food Delivery Platform Subsidy Conduct Rules for public consultation on June 17, with \ncomments open through July 17, 2026. The draft is framed under China’s anti-monopoly, anti-unfair competition, price, e-\ncommerce, and food-safety regimes.\nThe draft has three elements that matter most for investors:\nTable 1: Key details in Food Delivery Platform Subsidy Conduct Rules\nRule element\nWhat it requires\nWhy it matters\nFunding-source discipline\nSubsidies should be funded from own operating profit, \nnot capital advantage\nLimits the ability of challengers to fund food-delivery losses with \ngroup-level capital\nSeven-day pre-disclosure\nPlatforms must disclose campaigns before launch\nReduces speed and surprise in subsidy wars\nCompetitive-impact reporting\nPlatforms must disclose campaign design, funding \nsource, and competitive impact\nCreates a written record that can later support enforcement\nSource: SAMR (link), J.P. Morgan.\nThe timing also matters. The draft lands during the 618 promotional window, exactly when renewed subsidy escalation \nwould have tested the bear case for Meituan.\nWhy disclosure is enforcement\nThe first instinct is that “no caps” means “no bite.” We disagree.\nThe disclosure regime changes the economics of subsidy competition in three ways.\nFirst, it slows the game down. Food-delivery subsidy wars are reactive. A challenger launches a promotion, the incumbent \nresponds, and the market tests how far each side is willing to go. A seven-day public notice window reduces the value of \nsurprise and weakens the tit-for-tat dynamic.\nSecond, it creates evidence. Funding-source disclosure and competitive-impact self-assessment force platforms to write \ndown the facts that regulators would later need to evaluate whether a campaign relied on capital advantage or unfair \ncompetition.\nThird, it raises the cost of aggression before penalties arrive. A campaign that must be disclosed in advance is easier for \ncompetitors, merchants, riders, media, and regulators to monitor. That reputational and enforcement risk should reduce the \nwillingness to run extreme campaigns.\nThis is why we view the draft as more binding than it appears. It does not need to ban every subsidy to change platform \nbehavior. It only needs to make the most aggressive campaigns harder to launch, justify, and repeat.\n--- page 3 ---\n3\nAsia Pacific  Equity Research\n18 June 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nThe key interpretive issue: segment profit or group profit?\nProvision 3 is the load-bearing clause, in our view. It requires subsidies to come from own operating profit rather than \ncapital advantage.\nThe investment conclusion depends on how “own operating profit” is interpreted.\nTable 2: Possible interpretations for ‘own operating profit' term\nInterpretation\nImplication\nSegment-level or near-segment-level profit\nStrongly favors Meituan; challengers cannot easily fund delivery losses with group capital\nGroup-level profit\nWeakens the asymmetry; Alibaba could argue that group profitability supports continued investment\nVague final wording\nKeeps the issue alive; enforcement behavior becomes more important than the text itself\nSource: J.P. Morgan.\nOur base interpretation is that the “capital advantage” language is intended to limit cross-subsidy and balance-sheet-funded \nshare attacks. That is why the rule matters for Meituan. But this is also the biggest risk to our view. If the final text \nexplicitly allows group-level profit to satisfy the requirement, the strategic benefit to Meituan would be materially smaller.\nHow the rule changes competition\nThe draft shifts the battleground from cash subsidy toward operating quality.\nTable 3: Changes in key dimensions post the SAMR draft\nDimension\nBefore the draft\nAfter the draft\nRelative beneficiary\nCampaign speed\nFlash promotions and rapid response\nSeven-day pre-disclosure\nIncumbent with scale and density\nFunding source\nGroup capital can support delivery losses\nOwn operating profit becomes more \nimportant\nMeituan\nCompetitive lever\nCash subsidy and user incentives\nFulfillment, routing, merchant depth, \nreliability\nMeituan\nMerchant/rider economics\nMore room for cost shifting\nCost-shifting restrictions\nSector-wide cost floor rises\nProfit pool\nHigher risk of multi-quarter loss-funded war\nLower probability of negative-profit tail\nMeituan structurally\nSource: J.P. Morgan.\nThis does not mean food-delivery competition goes away. It means the easiest way to attack the incumbent, using capital to \nsubsidize losses, becomes more expensive and more visible. Competition can still move into fulfillment quality, merchant \nselection, membership benefits, logistics, and high-AOV use cases. But those are precisely the areas where scale, density, \nand operating capability matter more than headline cash burn.\nIndustry implications\nCompetition: less cash burn, more operating execution\nThe rule reduces the value of capital-funded subsidy as a competitive shortcut. A challenger can still invest, but it becomes \nharder to disguise a share-buying campaign as ordinary promotion if the campaign must be disclosed in advance, justified \npublicly, and linked to a compliant funding source.\nThat matters because Meituan’s moat is operational rather than financial. Its advantage sits in order density, routing \nefficiency, merchant coverage, rider network management, and consumer habit formation. If the competitive game moves \nback toward these variables, Meituan’s relative position improves.\nOperations: subsidy relief, but a higher cost floor\nThe draft should reduce the probability of extreme promotional escalation. At the same time, it reinforces a higher sector \ncost floor. Rules against forcing merchants or riders to bear subsidy costs, combined with rider social-insurance pressure, \nmake it harder for platforms to offset promotion through cost shifting.\n--- page 4 ---\n4\nAsia Pacific Equity Research\n18 June 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nFor Meituan, this is a mixed but net constructive outcome. The subsidy line should face less tail risk, but delivery costs are \nunlikely to return cleanly to pre-2025 levels. Our model already assumes rider cost per order moving from around RMB5.0 \ntoward RMB5.2–5.3. The draft reinforces that direction.\nProfit pool: the floor improves more than the ceiling\nWe retain our published industry profit-pool framework. In our base case, Meituan captures all or almost all positive food-\ndelivery industry profit. In the fragmented bear case, the profit pool can turn negative.\nThe draft could reduce the probability of that negative-pool scenario. It does not restore the industry to a 2024-style profit \nceiling. Redirected competition into service quality, logistics, and merchant support will still cost money. The more \nimportant change is that sustained loss-funded subsidy competition becomes harder to justify.\nStock implications\nMeituan: the strategic beneficiary\nMeituan is the stock most helped by the strategic logic of the draft. The rule reduces the probability of a prolonged capital-\nfunded attack on its core delivery profit pool. It also arrives at the moment when subsidy reacceleration would have been \nthe clearest bear-case trigger.\nThe caveat is that Meituan’s own promotional toolkit is also constrained. It cannot rely on forced participation, below-cost \npricing, discriminatory treatment, or surprise campaigns. The draft also does not directly stop Alibaba from attacking high-\nAOV delivery use cases, which remains our live falsification risk.\nStill, the balance is favorable. The rule shifts the fight from capital subsidy back toward operating efficiency. That is \nMeituan’s terrain.\nWe maintain Neutral. The draft does not yet justify an estimate change, but it modestly improves near term investor \nsentiment.\nAlibaba: near-term relief, but less instant-commerce optionality\nFor Alibaba, the P&L effect is positive. Less food-delivery subsidy intensity should reduce losses in Taobao Instant \nCommerce / Ele.me.\nBut the strategic effect is more complicated. Part of the Alibaba bull case assumes instant commerce can become a traffic-\nacquisition and user-frequency engine for Taobao. If the rule limits capital-funded delivery subsidies, that option becomes \nless valuable. Alibaba can still pursue the opportunity, but it may need to rely more on operating execution and less on \nbalance-sheet-funded user acquisition. This is why the rule taxes the optionality leg, even if it helps near-term losses.\nThe key ambiguity is again Provision 3. If group-level profit is enough to satisfy the rule, Alibaba’s flexibility remains \nmuch greater. If segment-level economics matter, the instant-commerce push becomes more constrained.\nJD: cleanest P&L relief, weaker strategic durability\nJD has the cleanest near-term earnings read-through. Its food-delivery entry has been subsidy-intensive, and the draft gives \nmanagement both regulatory cover and economic reason to rationalize spend.\nThat explains why the consensus trade favored JD. But the strategic read is less favorable. JD’s delivery push is the most \ndependent on capital-funded subsidy among the three platforms. If Provision 3 is enforced with real bite, the durability of \nJD’s food-delivery position becomes harder to underwrite.\nThe lasting impact of JD’s entry may therefore be less about permanent share gain and more about a higher sector cost \nfloor, especially on rider wages and fulfillment standards.\n--- page 5 ---\n5\nAsia Pacific  Equity Research\n18 June 2026\nAlex Yao\n(86 21) 6106 6505\nalex.yao@jpmorgan.com\nValuation: scenario skew improves, estimates unchanged\nWe keep ratings and estimates unchanged. The draft is still open for comment, and the final wording will matter.\nOur Meituan scenario set remains:\nTable 4: Meituan scenario analysis\nScenario\nPT\nDescription\nBull\nAround HKD128\nRationalized competition, stronger profit-pool recovery\nBase\nAround HKD92\nSubsidy pressure eases, but cost floor remains higher\nBear\nAround HKD51\nProlonged capital-funded competition and weaker delivery profit pool\nSource: J.P. Morgan.\nThe draft does not change the model mechanically today. It changes the probability distribution. A credible shift in the \n“binding vs cosmetic” debate would justify moving some weight out of the bear case and into the base and bull cases. \nIllustratively, moving around ten points of probability weight away from the bear case would lift our blended PT into the \nlow-to-mid HKD90s.\nThat is a continuation of our prior framework, not a new valuation thesis. Bear-case probability had already declined from \nour April deep dive to the 1Q26 results update. The SAMR draft reinforces that direction but does not complete the \nargument. We would wait for final text and 3Q26 subsidy evidence before making formal estimate changes.\nWhat could make us wrong?\nFinal wording allows group-level profit\nThis is the most important risk. If the final rule explicitly allows platforms to fund subsidies from group-level operating \nprofit, the asymmetry weakens. Alibaba would retain greater flexibility to support food-delivery investment, and Meituan’s \nstrategic benefit would be smaller.\nEnforcement is soft\nThe draft could become a disclosure exercise without meaningful behavioral impact. If platforms continue aggressive \nsubsidy campaigns after making formal disclosures, and regulators do not respond, the rule would be less binding than we \nexpect.\nAlibaba shifts into high-AOV core attack\nThe rule targets subsidies, below-cost pricing, and cost shifting. It does not directly prevent competition through fulfillment \nquality, selection, membership, or logistics. Alibaba could still attack higher-AOV use cases where Meituan’s profit pool is \nmore exposed.\n3Q26 data show no easing\nThe clearest falsification test is actual subsidy intensity. If 3Q26 reporting and industry checks show per-order subsidies \ncontinuing near 1H26 levels with no evidence of moderation, our interpretation would need to be revisited.\nWhat to watch next\nThe next catalysts include:\n\n## 引用来源\n- [2026-04-20-JPMorgan-China Internet What the Market May Be Missing on SAMR’s Ghos...-121484311.pdf](res/pdfs/行业研究-互联网/2026-04-20-JPMorgan-China Internet What the Market May Be Missing on SAMR’s Ghos...-121484311.pdf)\n- [2026-04-23-JPMorgan-China Internet Post 4Q25 Re-evaluating the Sector; Tencent ...-121601321.pdf](res/pdfs/行业研究-互联网/2026-04-23-JPMorgan-China Internet Post 4Q25 Re-evaluating the Sector; Tencent ...-121601321.pdf)\n- [2026-04-27-0700.HK-HSBC Global Investme-China Internet HSBC Global Investment Summit 2026 tour takea...-121648328.pdf](res/pdfs/行业研究-互联网/2026-04-27-0700.HK-HSBC Global Investme-China Internet HSBC Global Investment Summit 2026 tour takea...-121648328.pdf)\n- [2026-04-28-JPMorgan-China Telecom Sector What we learned from China telcos 1Q26...-121678208.pdf](res/pdfs/行业研究-互联网/2026-04-28-JPMorgan-China Telecom Sector What we learned from China telcos 1Q26...-121678208.pdf)\n- [2026-05-27-JPMorgan-China Internet JPM 2026 Global China Summit Key Takeaways-122259534.pdf](res/pdfs/行业研究-互联网/2026-05-27-JPMorgan-China Internet JPM 2026 Global China Summit Key Takeaways-122259534.pdf)\n- [2026-06-02-BofA Global Research-Internete-Commerce May app data Mixed bag for Online medi...-122359248.undefined.pdf](res/pdfs/行业研究-互联网/2026-06-02-BofA Global Research-Internete-Commerce May app data Mixed bag for Online medi...-122359248.undefined.pdf)\n- [2026-06-03-Morgan Stanley-Internet Where Are We Trading Now Into the Summer of AI-122401246.undefined.pdf](res/pdfs/行业研究-互联网/2026-06-03-Morgan Stanley-Internet Where Are We Trading Now Into the Summer of AI-122401246.undefined.pdf)\n- [2026-06-09-Morgan Stanley-Internet Where Are We Trading Now As AI Hardware vs AI Sof...-122496280.undefined.pdf](res/pdfs/行业研究-互联网/2026-06-09-Morgan Stanley-Internet Where Are We Trading Now As AI Hardware vs AI Sof...-122496280.undefined.pdf)\n- [2026-06-16-Morgan Stanley-Internet Where Are We Trading Now AI Hardware vs Software ...-122607614.undefined.pdf](res/pdfs/行业研究-互联网/2026-06-16-Morgan Stanley-Internet Where Are We Trading Now AI Hardware vs Software ...-122607614.undefined.pdf)\n- [2026-06-18-JPMorgan-China Food Delivery Not Just a Soft Draft Disclosure Rules ...-122636767.pdf](res/pdfs/行业研究-互联网/2026-06-18-JPMorgan-China Food Delivery Not Just a Soft Draft Disclosure Rules ...-122636767.pdf)", "n8": "## 摘要\nMeta Platforms 2026Q1广告收入强劲但AI基础设施投入持续加大，导致盈利承压。7份研报综合：广告业务受益AI推荐算法优化，Reels变现推进，但CapEx指引上调引发市场对ROI的担忧。共识评级Buy/Overweight，目标价隐含15-25%上行空间。\n\n## 关键要点\n- Q1业绩：广告收入超预期（AI驱动的广告定向优化），但AI CapEx大幅增加\n- AI战略：开源LLM Llama持续迭代，数据中心建设加速\n- 降本：Morgan Stanley关注Neocloud开销和裁员（headcount reductions）\n- 风险：反垄断诉讼（Google案件潜在影响）、AI投入回报周期、TikTok竞争", "n9": "---\ntype: Article\ntitle: Nomura — SK海力士1Q26业绩点评：业绩Beat，LTA铺路新估值框架，目标价₩2,340,000\ndescription: Nomura维持SK海力士Buy，目标价从193万上调至234万韩元，1Q26 OP 37.6万亿超Nomura预期4%，上调2026/2027 OP预测至280/379万亿，引入LTA估值框架\ntimestamp: 2026-04-23T00:00:00+08:00\nresource: res/SK海力士/2026-04-23-000660.KS-Nomura-SK Hynix (000660 KS) (Buy) - 1Q26 earnings beat; LTAs to mak...-121599850.pdf\nsource_type: pdf\ntags: [sk-hynix, valuation, profit-trend, semiconductor, 2026-Q1]\n---\n\n# Nomura — SK海力士1Q26业绩点评\n\n## 摘要\nNomura维持SK海力士Buy评级，目标价上调至234万韩元。1Q26 OP 37.6万亿（OPM 72%）小幅超过Nomura预期的35.8万亿，DRAM/NAND ASP分别涨65%/73% q-q超预期。上调2026/2027 OP预测9%/4%至280/379万亿。因Vera Rubin推迟，下调2026年HBM出货增长19pp至24% y-y，但上调commodity DRAM出货增长1pp至25%。提出LTA（长期协议）铺路新估值框架论点。Net profit含Kioxia投资收益1万亿。\n\n## 关键要点\n- TP ₩2,340,000 → 6.2x 2026E P/E，基于新估值框架\n- 2026E OP ₩280万亿（+492% y-y），OPM 78%\n- 2026E DRAM/NAND ASP +175%/+280% y-y（大幅上调）\n- DRAM OPM 81%（commodity 84%, HBM 63%）\n- NAND OPM 71%，NAND ASP涨280% y-y\n- 2027E OP ₩379万亿（+36% y-y），OPM 77%\n- 2026-28 FCF/EV从6%升至20%→60%→159%，自由现金流爆炸式增长\n- 50% FCF用于股东回报（回购+分红）\n\n## 关联\n- [BNP SK海力士1Q26业绩点评](entries/BNP-Paribas-SK海力士-1Q26业绩点评-AI内存领导力增强-目标价₩2000000.md) — Nomura更激进（TP高17%），BNP基于P/B，Nomura引入LTA新框架\n- [HSBC SK海力士1Q26业绩点评](entries/HSBC-SK海力士-1Q26业绩点评-服务器需求超预期.md) — Nomura的HBM出货增长下调（Vera Rubin推迟）是差异化观点\n\n## 引用\n- [Nomura: SK Hynix - 1Q26 earnings beat; LTAs to make valuation framework](res/SK海力士/2026-04-23-000660.KS-Nomura-SK Hynix (000660 KS) (Buy) - 1Q26 earnings beat; LTAs to mak...-121599850.pdf)", "n10": "## 摘要\n台积电2026年北美技术研讨会发布A13（1.3nm）制程路线图，巩固AI芯片制造领导地位。4-6月月度营收跟踪数据显示N3制程AI加速器需求强劲，Q2营收+12% QoQ按计划推进。8份研报（UBS×3、BofA×3、BNP×1、JPMorgan×1）一致看好，2026年美元营收增速预期35-36%。出售世界先进8.1%股权释放战略资源信号。\n\n## 关键要点\n- 制程进展：A13制程路线图发布，延续N3/N2的技术领先优势，AI加速器为主要增长引擎\n- 营收跟踪：4月NT亿(+17.5% YoY)、5月NT亿(+30.1% YoY)、6月预期持续强劲\n- 2026年展望：美元营收增速+35-36%（UBS），N3产能满载，客户包括NVIDIA、AMD、Intel\n- 资本配置：出售世界先进8.1%股权（持股从27.1%降至19%），聚焦先进制程\n- 催化剂：N2制程2026H2量产、A13路线图、AI加速器订单可见度\n- 风险：地缘政治（台海紧张）、先进制程良率爬坡、客户集中度\n\n## 引用来源\n- UBS×3、BofA×3、BNP Paribas×1、JPMorgan×1（2026年4-6月）", "n11": "# 台积电商业模式与护城河分析\n\n## 摘要\n台积电是全球最大的专业晶圆代工（Foundry），不做芯片设计，只负责把别人的设计做成真实芯片。全球晶圆代工约60%份额，服务500+客户，覆盖90%顶级芯片设计公司。\n\n## 关键数据\n- **2024年营收**：约2.89万亿新台币\n- **2024年净利**：3,746亿新台币\n- **市占率**：约60%（全球晶圆代工）\n- **客户数**：500+\n- **毛利率**：长期≥55%\n\n## 商业模式\n- **定位**：全球最大的专业晶圆代工（Foundry）\n- **模式**：开创\"无工厂模式\"——设计（Fabless）交给客户，制造交给台积电\n- **类比**：像\"云计算里的 AWS\"，把复杂昂贵的\"制造基础设施\"抽象成服务\n\n## 产品结构\n\n### 工艺平台（Process Nodes）\n- **先进制程**：N3家族（3nm），N2（2nm计划）→ 高性能/高能效\n- **主流制程**：5nm/7nm/16nm/28nm → 性价比与成熟生态\n- **特殊工艺**：高压/射频/车规/嵌入式存储等 → 细分场景\n\n### 制造与质量\n- 良率管理、缺陷分析、产能规划、稼动率优化\n- 设备/材料/光刻（EUV/DUV）协同\n\n### 先进封装与系统整合（SIPs）\n- **CoWoS**（高带宽封装）/ **SoIC**（3D堆叠）\n- **InFO**（轻薄移动封装）\n\n### 设计支持生态（DFx）\n- PDK/参考流程/与EDA/IP伙伴的协作\n- DFM/DFT（为制造与测试优化的设计方法）\n\n## 护城河\n\n### 1. 技术迭代飞轮\n- 先进工艺节点持续领先（3nm量产、2nm规划）\n- 研发与量产形成闭环\n\n### 2. 规模与良率\n- 越大规模，越能摊薄成本、积累缺陷数据库、提升良率\n- 形成正反馈\n\n### 3. 客户黏性与信任\n- 顶级客户的联合开发（JDP）与保密协作\n- 切入后替代难度极高\n\n### 4. 供应链掌控力\n- 对EUV设备、上游材料、封装/测试的系统级整合能力\n\n### 5. 生态标准\n- PDK/DFM/EDA流程像\"行业公路规则\"，黏住上下游\n\n## 关键术语\n- **Foundry**：纯制造，不做设计\n- **Tape-out**：设计定版送厂流片\n- **Yield（良率）**：合格芯片占比，决定成本与交付\n- **PPA**：Performance/Power/Area 的三角取舍\n- **EUV**：极紫外光刻，先进节点必需\n- **CoWoS / SoIC**：先进封装与3D堆叠，AI算力模块关键\n- **NRE**：一次性工程费用，如掩模/导入成本\n\n## 投资信号\n- 台积电=\"全球算力与终端的制造底座\"\n- 平台化的先进工艺 + 规模化的制造体系 + 生态协同\n- 把极端复杂的芯片制造变成可复用、可预测、可交付的\"服务产品\"\n## 关键要点\n- 台积电是全球纯晶圆代工绝对龙头，市占率约60%，服务500+客户，覆盖90%顶级芯片设计公司\n- 护城河来自五层叠加：技术迭代飞轮、规模良率正反馈、客户黏性、供应链掌控力、生态标准锁定\n- 商业模式本质是\"算力制造底座\"——把极端复杂的芯片制造变成可复用、可预测的服务产品\n- 先进封装（CoWoS/SoIC）是AI算力时代的关键差异化能力，不仅是制造更是系统整合\n- 毛利率长期≥55%，高壁垒转化为高定价权\n\n## 关联\n- [台积电核心竞争力深度分析](台积电核心竞争力深度分析.md) — 商业模式是基础，核心竞争力是展开\n- [腾讯沧海V2视频编解码芯片下半年量产](2026-05-27-腾讯沧海V2视频编解码芯片下半年量产.md) — 台积电制造 vs 腾讯IC设计，产业链上下游", "n12": "# 台积电核心竞争力深度分析\n\n## 摘要\n台积电（TSMC）在芯片制造领域占据绝对领导地位，市场占有率稳定在约60%，最大竞争对手三星电子的市占率仅为11%。本文从商业模式、经营理念、技术积累、产能管理、生态建设、企业架构六个维度深入分析台积电的核心竞争力。其护城河深度可与[福耀在汽车玻璃领域的壁垒](福耀玻璃竞争壁垒与护城河分析.md)进行跨行业对比——一个靠技术领先，一个靠制造效率。基础分析见[台积电商业模式与护城河分析](台积电商业模式与护城河分析.md)。\n\n## 关键要点\n\n### 1. 商业模式创新\n- 开创\"Fabless-Foundry\"垂直分工模式，仅制造芯片、不设计芯片\n- 让IC设计客户专注于设计和创新，扮演行业\"赋能者\"\n- 扶植大量有潜力的IC设计公司：高通、博通、英伟达、赛灵思、联发科、Marvell等\n\n### 2. 经营原则\n- **不与客竞争**：从不与客户竞争，确保利益协同\n- **密切服务客户**：CEO与前20-30名客户保持密切联络，为每家客户配备专职团队\n- 苹果A10起成为独家供应商，核心优势是客户信任\n\n### 3. 技术领先\n- 研发费用每年保持在公司净收入的8%以上\n- 坚持自主创新，多次引领技术创新（0.13微米、28纳米等关键节点）\n- 技术迭代稳扎稳打，遵循摩尔定律\n- 先进封装（InFO、CoWoS）成为AI服务器芯片主要封装技术\n- \"夜鹰计划\"：24小时不间断加速研发\n\n### 4. 产能管理\n- 制造重心集中在台湾（新竹、台中、台南），互为备用产能\n- 采取超大型晶圆厂（Giga Fab）群聚布局，形成\"产业聚落\"\n- 云端自动化统筹管理，跨厂合作提升产能利用率\n- **全球布局**：美国亚利桑那州（先进制程）、日本熊本（28纳米）、德国德雷斯顿（28/22纳米和16/12纳米）\n- N-1战略：境外工艺技术比台湾本地量产工艺低一代\n\n### 5. 生态系统\n- 开放创新平台（OIP）：联合EDA和IP公司形成\"虚拟IDM\"\n- 超过3,000名TSMC员工 + 100多家合作伙伴的10,000名员工\n- 43,000个技术文件和2,800个PDK\n\n### 6. 企业架构\n- 股权结构分散，前十大股东均为全球重量级投资机构\n- 董事会由世界级专业人士组成\n- 双首长平行领导模式（董事长刘德音 + CEO魏哲家）\n\n## 投资信号\n- 台积电在晶圆代工领域寡头地位稳固，技术领先优势明显\n- AI及高性能计算芯片对先进封装（CoWoS）需求日益提升\n- 全球产能布局分散地缘政治风险，但海外建厂成本高昂（美国高4-5倍）\n- 前十大客户中七家总部位于美国，贡献约60%收入\n## 关联\n- [台积电商业模式与护城河分析](台积电商业模式与护城河分析.md) — 深度分析 vs 商业模式基础，两篇互补\n- [福耀玻璃竞争壁垒与护城河分析](福耀玻璃竞争壁垒与护城河分析.md) — 跨标的：台积电技术壁垒 vs 福耀制造壁垒", "n13": "# 曹德旺2025年度股东大会表态：\"大不了把美国工厂关掉\"\n\n## 摘要\n2026年4月21日，福耀玻璃2025年度股东大会上，78岁曹德旺针对美国关税问题强硬表态。福耀美国工厂累计投资超10亿美元，占全美30%市场份额，2025年营收79.17亿元，净利润8.84亿元。曹德旺强调企业经营以盈利为根本，绝不接受不合理政策导致持续亏损。\n\n## 关键数据\n- 美国工厂累计投资：超10亿美元\n- 美国市场份额：30%\n- 美国员工：超3000名\n- 2025年美国营收：79.17亿元（+25.43%）\n- 2025年美国净利润：8.84亿元（+40.91%）\n- 原材料本土化采购率：70%\n- 产能利用率：80%以上\n\n## 关键要点\n- 2026年美国对全球商品加征15%全域关税，汽车零部件延续高额关税\n- 曹德旺底线：企业经营以盈利为根本，不合理关税导致亏损则关厂\n- 美国工厂是福耀海外业务核心支柱，但非不可替代\n- 曹德旺高度评价儿子曹晖：\"干得比我强\"\n- 从父辈强硬守底线到新生代深耕技术，福耀完成平稳传承\n## 关联\n- [福耀玻璃2026年Q1汇兑风险深度分析](福耀玻璃2026年Q1汇兑风险深度分析.md) — 关税与汇兑共同构成2026年两大外部风险\n- [福耀玻璃竞争壁垒与护城河分析](福耀玻璃竞争壁垒与护城河分析.md) — 曹德旺表态体现管理层对壁垒的定价权信心", "n14": "# 福耀玻璃2024年年报核心要点\n\n## 摘要\n福耀玻璃2024年营收392.52亿元（+18.37%），归母净利润74.98亿元（+33.20%），连续四年双增长，均创历史新高。分红46.98亿元，分红率62.65%。\n\n## 关键数据\n- 营收：392.52亿元（+18.37%）\n- 归母净利润：74.98亿元（+33.20%）\n- 扣非净利润：74.46亿元（+34.71%）\n- 汽车玻璃销量：155.87百万平方米（+11.21%）\n- 研发投入：16.78亿元（+19.58%）\n- 分红：46.98亿元（分红率62.65%）\n- 累计现金分红：333.34亿元\n- 员工总数：37,910人\n\n## 关键要点\n- 连续四年营收净利双增长，盈利质量高\n- 2024年资本开支54.81亿元，重点投向美国、合肥、福建等项目\n- 合肥、福清新项目合计投资约90亿元\n- 美国伊利诺伊汽车级浮法玻璃生 1-39万元](福耀玻璃6月18日收盘与资金流-主力净流出3531-39万元.md) — 4月→6月股价与资金流演变", "n18": "---\ntype: Synthesis\ntitle: 福耀玻璃2026年Q1业绩后五大外资研报综合摘要\ndescription: UBS、BNP Paribas、BofA、JPMorgan、Morgan Stanley五家外资行在福耀玻璃2026年Q1业绩后的研报综合摘要。共识：ASP增长强劲（+11% YoY）抵消销量下滑，毛利率逆势扩张至37.4%，剔除汇兑后利润+10% YoY。分歧在目标价（HKD70-93）和2026年盈利预测（EPS 3.72-4.16）。五家均维持买入/超配评级。\ntimestamp: 2026-06-22T00:00:00+08:00\nresource: ~/.inv-report/福耀玻璃/\ntags: [fuyao-glass, valuation, profit-trend, fx-risk, competitive-advantage, third-party-analysis, 2026-Q1]\n---\n\n# 福耀玻璃2026年Q1业绩后五大外资研报综合摘要\n\n## 摘要\n\n福耀玻璃2026年Q1营收104.13亿元（+5.1% YoY），归母净利润17.12亿元（-15.7% YoY），利润下滑完全由汇兑损益逆转所致（Q1汇兑亏损4.4亿 vs 去年同期收益2.4亿）。剔除汇兑影响后税前利润+10% YoY。五家外资行（UBS、BNP Paribas、BofA、JPMorgan、Morgan Stanley）在业绩后均维持买入/超配评级，共识核心逻辑：ASP增长（+11% YoY）持续抵消销量下滑（-3.7%），高附加值产品占比提升驱动毛利率逆势扩张至37.4%（+2ppt YoY）。分歧点主要在目标价（HKD70-93区间）和2026年盈利预测（EPS 3.72-4.16），差异源于对汇兑亏损和ASP增速的不同假设。\n\n## 关键要点\n\n- **ASP增长是最大亮点**：五家一致确认Q1汽车玻璃ASP +11% YoY，由调光天窗、HUD前挡、隔音玻璃等高附加值产品驱动，高附加值产品占比+7.6ppt YoY\n- **毛利率逆势超预期**：Q1 GPM 37.4%（+2ppt YoY），远超BofA预测的33.6%。驱动因素：纯碱价格-18% YoY、运费下降、美国二期工厂利用率提升、天然气价格受管道气合同保护\n- **汇兑是唯一拖累**：Q1汇兑亏损4.4亿元（美元+欧元双升值），若剔除则税前利润+10% YoY。BNP因此下调2026E净利润3.5%\n- **美国工厂火灾影响可控**：Ohio工厂Q1火灾，管理层预计8月初全面恢复，期间通过出口保障供应，保险覆盖财务损失\n- **估值处于五年低位**：UBS指出福耀交易在11x 2027E PE（五年相对低位），BofA预测2026E ROE 25.1%、FCF yield 5.15%\n- **目标价分歧**：UBS最乐观（HKD93，DCF估值），BofA最保守（HKD70），BNP居中（HKD80/CNY80，20x/18x PE），差异来自WACC和终端增长率假设\n- **SAM铝饰条业务减亏**：管理层预计2026年达到盈亏平衡，国内段受行业影响承压\n\n## 关联\n\n- [福耀玻璃2026年Q1汇兑风险深度分析](investing/福耀玻璃2026年Q1汇兑风险深度分析.md) — 本条目汇兑数据（Q1亏损4.4亿 vs 去年同期收益2.4亿）与五家研报的汇兑分析完全吻合，互为验证\n- [福耀玻璃竞争壁垒与护城河分析](investing/福耀玻璃竞争壁垒与护城河分析.md) — 研报确认的ASP持续增长能力（+11% YoY）和毛利率领先（37.4%）是护城河的直接体现\n- [福耀玻璃2026年一季报业绩分析](investing/2026-05-31-福耀玻璃2026年一季报业绩分析.md) — 本条目提供五家外资行的盈利预测区间和估值参考，与自有分析互补\n- [台积电商业模式与护城河分析](investing/台积电商业模式与护城河分析.md) — 跨标的对比：福耀的制造壁垒（规模+垂直整合）vs 台积电的技术壁垒（制程领先），两种不同护城河类型\n\n## 引用来源\n\n- [UBS - Positive Q126 earnings growth, GPM notable beat (2026-04-21)](~/.inv-report/福耀玻璃/2026-04-21-600660.SS-UBS%20Equitie : 2026-Q1, competitive-advantage, valuation; 共同关键词(14): 26, 摘要, q1, 报综, 20", "n20": "# 福耀玻璃2026年Q1汇兑风险深度分析\n\n## 摘要\n2026年Q1福耀玻璃汇兑损益逆转是利润下滑的核心原因。2025Q1汇兑收益2.4亿元（欧元贬值贡献），2026Q1汇兑亏损4.4亿元（美元欧元双升值）。全年汇兑影响预计超6亿元，是2026年盈利的关键变量。此风险与[曹德旺在股东大会关于美国关税的表态](曹德旺2025年度股东大会表态-美国关税.md)共同构成2026年两大外部不确定性，详见[Q1业绩分析](2026-05-31-福耀玻璃2026年一季报业绩分析.md)。\n\n## 关键数据\n- 2025Q1汇兑损益：收益2.4亿元\n- 2026Q1汇兑损益：亏损4.4亿元\n- 2026Q1人民币vs美元：升值1.3%\n- 2026Q1人民币vs欧元：升值3%\n- 2025年海外收入占比：46.3%\n- 2026H1汇兑影响预测：亏损超6亿元（同期收益6亿）\n- 2026全年汇兑影响预测：亏损超6亿元（同期收益3亿）\n\n## 关键要点\n- 汇兑损益是2026年Q1利润下滑15.7%的主因\n- 福耀外汇风险敞口不仅挂钩美元，还涉及较大比例欧元\n- 2025年Q1欧元贬值3.7%带来汇兑收益，2026年Q1欧元升值3%导致亏损\n- 全年盈利预计中个位数下降，若汇率稳定\n- 股价从高点74元回调至55元附近，静态PE约15.5倍\n- 股息率约3.86%，具备一定防御性\n## 关联\n- [福耀玻璃2026年一季报业绩分析](2026-05-31-福耀玻璃2026年一季报业绩分析.md) — 汇兑是Q1利润下滑的核心驱动力\n- [曹德旺2025年度股东大会表态-美国关税](曹德旺2025年度股东大会表态-美国关税.md) — 汇兑+关税构成2026年双重外部风险", "n21": "source_url: https://stock.10jqka.com.cn/20260619/c677584845.shtml\nsource: 同花顺财经\npublished_or_observed: 2026-06-19\ncategory: investing\n---\n\n# 福耀玻璃6月18日两融数据：融资余额21.41亿元\n\n## 摘要\n同花顺 iFinD 数据显示，福耀玻璃（600660）6月18日获融资买入1726.14万元，融资偿还1952.22万元，融资余额21.41亿元，占流通市值2.14%，处于历史较高分位。融券方面，6月18日融券卖出1.40万股、融券偿还1.60万股，融券余额1429.57万元。综合两融余额21.55亿元，较前一日小幅下降0.12%。\n\n## 关键要点\n- 2026-06-18：融资买入额 1726.14 万元；融资偿还额 1952.22 万元；融资余额 21.4114 亿元。\n- 2026-06-17：融资买入额 1756.46 万元；融资偿还额 2736.69 万元；融资余额 21.4341 亿元。\n- 2026-06-16：融资买入额 4402.07 万元；融资偿还额 4013.31 万元；融资余额 21.5321 亿元。\n- 2026-06-18：两融余额 21.5544 亿元，较昨日减少约257.4万元。\n- 信号方向：短期杠杆资金边际降温，但仍处较高水平。\n\n## 投资视角\n短期两融余额仍在高位，但6月17日、6月18日连续小幅回落，说明短线杠杆资金边际热度下降。该信号更偏交易层面，不构成基本面变化。对于长期持仓，更应关注后续汽车玻璃需求、海外工厂利润率、汇率/能源成本和新产品渗透，而非单日两融波动。\n\n## 关联\n- [福耀玻璃6月18日收盘与资金流：主力净流出3531.39万元](investing/福耀玻璃6月18日收盘与资金流-主力净流出3531-39万元.md)\n- [福耀玻璃6月18日收盘与资金流：主力净流出3531.39万元](entries/福耀玻璃6月18日收盘与资金流-主力净流出3531-39万元.md) — 共享标签: fuyao-glass, market-data, 2026-06; 共同关键词(15): 玻璃, 月1, 8日, 18, com\n- [福耀玻璃H股6月17日南向资金减持12.28万股](entries/福耀玻璃H股6月17日南向资金减持12-28万股.md) — 共享标签: sentiment, short-term, 2026-06; 共同关键词(11): 玻璃, https, 月1, 耀玻, url", "n22": "source_url: https://stock.stockstar.com/RB2026061800037075.shtml\nsource: 证券之星\npublished_or_observed: 2026-06-18\ncategory: investing\n---\n\n# 福耀玻璃6月18日收盘与资金流：主力净流出3531.39万元\n\n## 摘要\n证券之星消息，截至2026年6月18日收盘，福耀玻璃（600660）报49.95元，下跌1.46%，换手率0.49%，成交量9.78万手，成交额4.91亿元。资金流向方面，主力资金净流出3531.39万元，占总成交额7.19%；游资资金净流入1302.91万元，占总成交额2.65%；散户资金净流入2228.48万元，占总成交额4.54%。\n\n## 关键要点\n- 收盘价：49.95 元，日跌幅 -1.46%。\n- 成交额：4.91 亿元；换手率：0.49%。\n- 主力资金净流出：3531.39 万元，占成交额 7.19%。\n- 游资资金净流入：1302.91 万元，占成交额 2.65%。\n- 散户资金净流入：2228.48 万元，占成交额 4.54%。\n- 文章引用2026年一季报：营收104.13亿元，同比增长5.08%；归母净利润17.12亿元，同比下降15.68%；毛利率37.38%。\n- 信号方向：交易资金偏弱，但未构成基本面恶化证据。\n\n## 投资视角\n6月18日资金面偏弱，表现为股价下跌叠加主力资金净流出。但单日资金流属于交易噪音，不能直接等同于公司基本面恶化。更有用的跟踪点是：Q2收入增速能否恢复、海外产能利润率是否修复、汇兑/财务费用压力是否缓解。\n\n## 关联\n- [福耀玻璃H股6月17日南向资金减持12.28万股](investing/福耀玻璃H股6月17日南向资金减持12-28万股.md)\n- [福耀玻璃H股6月17日南向资金减持12.28万股](entries/福耀玻璃H股6月17日南向资金减持12-28万股.md) — 共享标签: sentiment, short-term, 2026-06; 共同关键词(13): 玻璃, https, 月1, 耀玻, url", "n23": "source_url: https://stock.stockstar.com/RB2026061800003048.shtml\nsource: 证券之星 / 香港交易所数据\npublished_or_observed: 2026-06-18\ncategory: investing\n---\n\n# 福耀玻璃H股6月17日南向资金减持12.28万股\n\n## 摘要\n证券之星援引香港交易所数据称，6月17日南向资金减持福耀玻璃（03606.HK）12.28万股。近5个交易日中，南向资金连续减持，累计净减持236.77万股；近20个交易日中有19天减持，累计净减持918.57万股。截至该数据时点，南向资金持有福耀玻璃H股8249.91万股，占公司已发行普通股的13.59%。\n\n## 关键要点\n- 2026-06-17：南向资金减持 12.28 万股。\n- 近5个交易日：累计净减持 236.77 万股。\n- 近20个交易日：19天减持，累计净减持 918.57 万股。\n- 南向持股：8249.91 万股，占已发行普通股 13.59%。\n- 信号方向：港股端短线资金偏谨慎，需观察是否延续。\n\n## 投资视角\n南向资金连续减持显示港股端短线资金偏谨慎，可能与H股估值、汇率、汽车链情绪或获利了结有关。该信号本身不代表经营质量变化，但会影响短期股价弹性。若南向持续减持同时叠加基本面数据走弱，才需要提高关注级别。\n## 关联\n- [福耀玻璃6月18日收盘与资金流-主力净流出3531-39万元](福耀玻璃6月18日收盘与资金流-主力净流出3531-39万元.md) — A股资金流+H股南向同步观察\n- [福耀玻璃2026年4月股价行情](福耀玻璃2026年4月股价行情.md) — H股南向数据需放在AH估值框架中", "n24": "# 福耀玻璃深度分析：\"汽车强国\"背后的\"卖铲人\"\n\n## 摘要\n福耀玻璃国内汽车玻璃市占率约70%，全球36%（第一）。文章深度分析了福耀的四大竞争壁垒：中国国运红利、柔性生产能力、垂直产业一体化、持续降本理念。2026年Q1业绩下滑主因汇兑损益逆转，全年盈利预计中个位数下降。\n\n## 关键数据\n- 国内汽车玻璃市占率：~70%\n- 全球汽车玻璃市占率：36%\n- 2025年营收：超450亿元\n- 2025年归母净利润：超90亿元\n- 2010-2025年营收复合增速：~11%\n- 2010-2025年净利润复合增速：~11%\n- 毛利率：37.3%（领先国际巨头10个百分点以上）\n\n## 关键要点\n- 四大护城河：中国国运红利、柔性生产、垂直一体化、持续降本\n- 柔性生产能力：常规规格换型仅需1小时，国际同行需3-5天\n- 垂直一体化：上游5个砂矿→6个浮法基地→17个汽玻基地\n- 2026年汇兑风险：美元+欧元双敞口，Q1汇兑亏损4.4亿元\n- 股价从高点74元回调至55元附近，静态PE约15.5倍\n- 股息率约3.86%（按60%分红率计算）\n## 关联\n- [福耀玻璃竞争壁垒与护城河分析](福耀玻璃竞争壁垒与护城河分析.md) — 两篇互补：这篇全景，那篇聚焦壁垒\n- [福耀玻璃2025年年报业绩概览](福耀玻璃2025年年报业绩概览.md) — 卖铲人叙事需用财务数据验证", "n25": "# 福耀玻璃竞争壁垒与护城河分析\n\n## 摘要\n福耀玻璃的四大竞争壁垒：中国国运红利、柔性生产能力、垂直产业一体化、持续降本理念。国内市占率70%，全球36%，毛利率37.3%领先国际巨头10个百分点以上。与[台积电的技术壁垒](台积电商业模式与护城河分析.md)不同，福耀是典型的制造业壁垒——规模+效率+客户黏性。详见[全景深度分析](福耀玻璃深度分析-汽车强国背后的卖铲人.md)。\n\n## 关键数据\n- 国内市占率：~70%\n- 全球市占率：36%\n- 毛利率：37.3%\n- 常规规格换型时间：1小时（国际同行3-5天）\n- 产能布局：国内11个+海外2个，共13个综合性工厂\n- 产能规模：近5000万套\n- 原材料本土化采购率（美国）：70%\n\n## 关键要点\n- 中国国运红利：完善的汽车产业链、高素质产业工人、\"低成本、高品质、快交付\"\n- 柔性生产能力：适配新能源时代多品种、小批量、高频迭代需求\n- 垂直一体化：上游砂矿→浮法基地→汽玻基地，紧密产业集群\n- 持续降本：2008-2025年从\"减少物料损耗\"到\"精益五星管理模式\"\n- 全球四大巨头格局：福耀36%、旭硝子/圣戈班/板硝子各14%-16%\n- 新增产能：福清、合肥新增600万套产能爬坡中\n## 关联\n- [福耀玻璃深度分析-汽车强国背后的卖铲人](福耀玻璃深度分析-汽车强国背后的卖铲人.md) — 两篇互补：这篇讲壁垒，那篇讲商业模式全景\n- [台积电商业模式与护城河分析](台积电商业模式与护城河分析.md) — 跨标的对比：制造业壁垒 vs 技术壁垒", "n26": "# 福耀玻璃雪球财务分析（2025Q1数据）\n\n## 摘要\n福耀玻璃2025Q1营收99.1亿元（+12.16%），净利润20.3亿元（+46.25%）。全球市占率约34%，国内约68%。公司面临汇兑风险、法律风险、原材料成本波动等挑战。\n\n## 关键数据\n- 2025Q1营收：99.1亿元（+12.16%）\n- 2025Q1净利润：20.3亿元（+46.25%）\n- 2024年营收：392.5亿元（+18.37%）\n- 2024年利润总额：89.91亿元（+33.87%）\n- 加权平均ROE：22.72%\n- 全球市占率：约34%\n- 国内市占率：约68%\n- 2024年研发投入：16.78亿元（占营收4.27%）\n- 国内外收入占比：国内53.90%，海外44.72%\n\n## 关键要点\n- 高毛利率和净利率，盈利能力和成本控制能力强\n- 全球市场占有率和品牌影响力稳固\n- 汇兑风险：销售回款以美元、欧元为主，汇率波动影响大\n- 法律风险：2023年美国俄亥俄州工厂遭国土安全部调查\n- 原材料成本波动：玻璃原片受国际市场价格波动影响\n## 关联\n- [福耀玻璃2026年一季报业绩分析](2026-05-31-福耀玻璃2026年一季报业绩分析.md) — 2025Q1 vs 2026Q1跨年对比\n- [福耀玻璃2024年年报核心要点](福耀玻璃2024年年报核心要点.md) — 雪球分析需对照原始年报数据验证", "n27": "## 摘要\n腾讯控股2026年Q1实现营收1965亿元（同比+9%），调整后净利润同比+11%。15份券商研报（JPMorgan×3、UBS×2、HSBC×2、德意志银行、野村、华泰证券、申万宏源、招商证券）的综合观点：核心业务（游戏/广告/支付）盈利稳健，AI投入（混元3.0、微信Agent、元宝）战略性加大但ROI可期，一致看多，目标价区间690-716港元。\n\n## 关键要点\n- 游戏业务：Q4 2025国内游戏+15%（三角洲行动、无畏契约
