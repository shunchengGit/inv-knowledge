  #container { display: flex; height: 100vh; }
  #cy { flex: 1; background: #f8f9fa; }
  #sidebar {
    width: 340px; background: #fff; border-left: 1px solid #ddd;
    overflow-y: auto; padding: 20px; display: none;
  }
  #sidebar.visible { display: block; }
  #sidebar h2 { font-size: 16px; margin-bottom: 8px; word-break: break-all; }
  #sidebar .meta { font-size: 13px; color: #666; margin-bottom: 12px; }
  #sidebar .meta span { display: inline-block; margin-right: 12px; }
  #sidebar .desc { font-size: 13px; color: #333; line-height: 1.6; margin-bottom: 12px; }
  #sidebar .link { font-size: 13px; }
  #sidebar .link a { color: #4C8BF5; text-decoration: none; }
  #toolbar {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  #toolbar select, #toolbar button {
    padding: 6px 12px; border: 1px solid #ccc; border-radius: 6px;
    font-size: 13px; background: white; cursor: pointer;
  }
  #toolbar button:hover { background: #e8e8e8; }
  #stats {
    position: absolute; bottom: 12px; right: 12px; z-index: 10;
    font-size: 12px; color: #888; background: rgba(255,255,255,0.9);
    padding: 6px 12px; border-radius: 6px;
  }
  .legend { position: absolute; top: 12px; right: 12px; z-index: 10;
    background: rgba(255,255,255,0.95); padding: 10px 14px;
    border-radius: 8px; font-size: 12px; border: 1px solid #e0e0e0; }
  .legend-item { display: flex; align-items: center; margin: 4px 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
</style>
</head>

    <button onclick="cy.fit(cy.elements(), 50)">重置视图</button>
    <button onclick="togglePhysics()">🔧 布局</button>

  <div class="legend" id="legend"></div>
  <div id="cy"></div>

    <div class="link"><a id="sidebar-url" target="_blank">🔗 来源</a></div>

</div>

const EDGES = [];

// 构建类型选项
const types = [...new Set(NODES.map(n => n.data.type))].sort();
const cats = [...new Set(NODES.map(n => n.data.category))].sort();

const tf = document.getElementById('type-filter');
types.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; tf.appendChild(o); });

const cf = document.getElementById('cat-filter');
cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cf.appendChild(o); });

// 图例
const colors = {"Article": "#4C8BF5", "Reference": "#34A853", "Analysis": "#EA4335", "Note": "#FBBC04", "Synthesis": "#9C27B0", "Metric": "#00BCD4", "Playbook": "#FF9800"};
const legend = document.getElementById('legend');
types.forEach(t => {
  const div = document.createElement('div');
  div.className = 'legend-item';
  div.innerHTML = `<span class="legend-dot" style="background:${colors[t] || '#999'}"></span>${t}`;
  legend.appendChild(div);
});

// 初始化 Cytoscape
const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: [...NODES, ...EDGES],
  style: [
    {
      selector: 'node',
      style: {
        'label': 'data(label)',
        'font-size': '11px',
        'text-valign': 'center',
        'text-halign': 'center',
        'color': '#333',
        'text-wrap': 'wrap',
        'text-max-width': '120px',
        'background-color': function(e) { return colors[e.data('type')] || '#999'; },
        'width': function(e) { return Math.max(28, Math.min(60, (e.data('label') || '').length * 2.5)); },
        'height': function(e) { return Math.max(28, Math.min(60, (e.data('label') || '').length * 2.5)); },
        'border-width': 1.5,
        'border-color': '#fff',
      }
    },
    {
      selector: 'edge',
      style: {
        'width': 1,
        'line-color': '#ccc',
        'curve-style': 'bezier',
        'opacity': 0.5,
      }
    },
    {
      selector: 'node.highlight',
      style: { 'border-color': '#333', 'border-width': 3 }
    },
    {
      selector: 'node.dimmed',
      style: { 'opacity': 0.15 }
    },
    {
      selector: 'edge.dimmed',
      style: { 'opacity': 0.05 }
    },
    {
      selector: 'node.filtered-out',
      style: { 'display': 'none' }
    },
  ],
  layout: { name: 'cose', padding: 40, animate: false },
});

// 交互
cy.on('tap', 'node', function(evt) {
  const node = evt.target;
  const data = node.data();
  document.getElementById('sidebar').classList.add('visible');
  document.getElementById('sidebar-title').textContent = data.title;
  document.getElementById('sidebar-type').textContent = '📄 ' + data.type;
  document.getElementById('sidebar-cat').textContent = '📁 ' + data.category;
  document.getElementById('sidebar-desc').textContent = data.description || '';
  const urlEl = document.getElementById('sidebar-url');
  if (data.url) {
    urlEl.href = data.url;
    urlEl.style.display = '';
  } else {
    urlEl.style.display = 'none';
  }
  cy.elements().removeClass('highlight dimmed');
  node.addClass('highlight');
  node.connectedEdges().removeClass('dimmed');
  node.connectedEdges().targets().addClass('highlight').removeClass('dimmed');
});

cy.on('tap', function(evt) {
  if (evt.target === cy) {
    document.getElementById('sidebar').classList.remove('visible');
    cy.elements().removeClass('highlight dimmed');
  }
});

// 筛选
function applyFilter() {
  const typeVal = document.getElementById('type-filter').value;
  const catVal = document.getElementById('cat-filter').value;

  cy.batch(() => {
    cy.nodes().forEach(n => {
      const matchType = !typeVal || n.data('type') === typeVal;
      const matchCat = !catVal || n.data('category') === catVal;
      if (matchType && matchCat) {
        n.removeClass('filtered-out');
      } else {
        n.addClass('filtered-out');
      }
    });
  });
  cy.fit(cy.nodes(':visible'), 30);
}

// 布局切换
let useCose = true;
function togglePhysics() {
  if (useCose) {
    cy.layout({ name: 'breadthfirst', directed: false, spacingFactor: 1.2 }).run();
  } else {
    cy.layout({ name: 'cose', padding: 40, animate: true }).run();
  }
  useCose = !useCose;
}

// 初始适配视图
cy.ready(function() { setTimeout(() => cy.fit(cy.elements(), 30), 500); });
</script>
</body>
