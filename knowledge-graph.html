unt. Core \nBanding Exceptions (CBE): Exceptions to the standard +/-6% bands may be granted by the Investment Review Consultation (IRC). \nFactors considered by the IRC include the stock's volatility and the credit spread of the respective company's debt. As a result, stocks \ndeemed to be very high or low risk may be subject to higher or lower bands as they relate to the rating. When such exceptions apply, \nthey will be identified in the Company Disclosures table in the relevant research piece.\n\n--- 第5页 ---\nFirst Read: ZTO Express 20 May 2026\nab 5\nResearch analysts contributing to this report who are employed by any non-US affiliate of UBS Securities LLC are not registered/\nqualified as research analysts with FINRA. Such analysts may not be associated persons of UBS Securities LLC and therefore are not \nsubject to the FINRA restrictions on communications with a subject company, public appearances, and trading securities held by a \nresearch analyst account. The name of each affiliate and analyst employed by that affiliate contributing to this report, if a\n…(截断)", "n14": "## 摘要\n台积电2026年北美技术研讨会发布A13（1.3nm）制程路线图，巩固AI芯片制造领导地位。4-6月月度营收跟踪数据显示N3制程AI加速器需求强劲，Q2营收+12% QoQ按计划推进。8份研报（UBS×3、BofA×3、BNP×1、JPMorgan×1）一致看好，2026年美元营收增速预期35-36%。出售世界先进8.1%股权释放战略资源信号。\n\n## 关键要点\n- 制程进展：A13制程路线图发布，延续N3/N2的技术领先优势，AI加速器为主要增长引擎\n- 营收跟踪：4月NT亿(+17.5% YoY)、5月NT亿(+30.1% YoY)、6月预期持续强劲\n- 2026年展望：美元营收增速+35-36%（UBS），N3产能满载，客户包括NVIDIA、AMD、Intel\n- 资本配置：出售世界先进8.1%股权（持股从27.1%降至19%），聚焦先进制程\n- 催化剂：N2制程2026H2量产、A13路线图、AI加速器订单可见度\n- 风险：地缘政治（台海紧张）、先进制程良率爬坡、客户集中度\n\n## 引用来源\n- UBS×3、BofA×3、BNP Paribas×1、JPMorgan×1（2026年4-6月）", "n15": "# 台积电商业模式与护城河分析\n\n## 摘要\n台积电是全球最大的专业晶圆代工（Foundry），不做芯片设计，只负责把别人的设计做成真实芯片。全球晶圆代工约60%份额，服务500+客户，覆盖90%顶级芯片设计公司。\n\n## 关键数据\n- **2024年营收**：约2.89万亿新台币\n- **2024年净利**：3,746亿新台币\n- **市占率**：约60%（全球晶圆代工）\n- **客户数**：500+\n- **毛利率**：长期≥55%\n\n## 商业模式\n- **定位**：全球最大的专业晶圆代工（Foundry）\n- **模式**：开创\"无工厂模式\"——设计（Fabless）交给客户，制造交给台积电\n- **类比**：像\"云计算里的 AWS\"，把复杂昂贵的\"制造基础设施\"抽象成服务\n\n## 产品结构\n\n### 工艺平台（Process Nodes）\n- **先进制程**：N3家族（3nm），N2（2nm计划）→ 高性能/高能效\n- **主流制程**：5nm/7nm/16nm/28nm → 性价比与成熟生态\n- **特殊工艺**：高压/射频/车规/嵌入式存储等 → 细分场景\n\n### 制造与质量\n- 良率管理、缺陷分析、产能规划、稼动率优化\n- 设备/材料/光刻（EUV/DUV）协同\n\n### 先进封装与系统整合（SIPs）\n- **CoWoS**（高带宽封装）/ **SoIC**（3D堆叠）\n- **InFO**（轻薄移动封装）\n\n### 设计支持生态（DFx）\n- PDK/参考流程/与EDA/IP伙伴的协作\n- DFM/DFT（为制造与测试优化的设计方法）\n\n## 护城河\n\n### 1. 技术迭代飞轮\n- 先进工艺节点持续领先（3nm量产、2nm规划）\n- 研发与量产形成闭环\n\n### 2. 规模与良率\n- 越大规模，越能摊薄成本、积累缺陷数据库、提升良率\n- 形成正反馈\n\n### 3. 客户黏性与信任\n- 顶级客户的联合开发（JDP）与保密协作\n- 切入后替代难度极高\n\n### 4. 供应链掌控力\n- 对EUV设备、上游材料、封装/测试的系统级整合能力\n\n### 5. 生态标准\n- PDK/DFM/EDA流程像\"行业公路规则\"，黏住上下游\n\n## 关键术语\n- **Foundry**：纯制造，不做设计\n- **Tape-out**：设计定版送厂流片\n- **Yield（良率）**：合格芯片占比，决定成本与交付\n- **PPA**：Performance/Power/Area 的三角取舍\n- **EUV**：极紫外光刻，先进节点必需\n- **CoWoS / SoIC**：先进封装与3D堆叠，AI算力模块关键\n- **NRE**：一次性工程费用，如掩模/导入成本\n\n## 投资信号\n- 台积电=\"全球算力与终端的制造底座\"\n- 平台化的先进工艺 + 规模化的制造体系 + 生态协同\n- 把极端复杂的芯片制造变成可复用、可预测、可交付的\"服务产品\"\n## 关键要点\n- 台积电是全球纯晶圆代工绝对龙头，市占率约60%，服务500+客户，覆盖90%顶级芯片设计公司\n- 护城河来自五层叠加：技术迭代飞轮、规模良率正反馈、客户黏性、供应链掌控力、生态标准锁定\n- 商业模式本质是\"算力制造底座\"——把极端复杂的芯片制造变成可复用、可预测的服务产品\n- 先进封装（CoWoS/SoIC）是AI算力时代的关键差异化能力，不仅是制造更是系统整合\n- 毛利率长期≥55%，高壁垒转化为高定价权\n\n## 关联\n- [台积电核心竞争力深度分析](台积电核心竞争力深度分析.md) — 商业模式是基础，核心竞争力是展开\n- [腾讯沧海V2视频编解码芯片下半年量产](2026-05-27-腾讯沧海V2视频编解码芯片下半年量产.md) — 台积电制造 vs 腾讯IC设计，产业链上下游", "n16": "# 台积电核心竞争力深度分析\n\n## 摘要\n台积电（TSMC）在芯片制造领域占据绝对领导地位，市场占有率稳定在约60%，最大竞争对手三星电子的市占率仅为11%。本文从商业模式、经营理念、技术积累、产能管理、生态建设、企业架构六个维度深入分析台积电的核心竞争力。其护城河深度可与[福耀在汽车玻璃领域的壁垒](福耀玻璃竞争壁垒与护城河分析.md)进行跨行业对比——一个靠技术领先，一个靠制造效率。基础分析见[台积电商业模式与护城河分析](台积电商业模式与护城河分析.md)。\n\n## 关键要点\n\n### 1. 商业模式创新\n- 开创\"Fabless-Foundry\"垂直分工模式，仅制造芯片、不设计芯片\n- 让IC设计客户专注于设计和创新，扮演行业\"赋能者\"\n- 扶植大量有潜力的IC设计公司：高通、博通、英伟达、赛灵思、联发科、Marvell等\n\n### 2. 经营原则\n- **不与客竞争**：从不与客户竞争，确保利益协同\n- **密切服务客户**：CEO与前20-30名客户保持密切联络，为每家客户配备专职团队\n- 苹果A10起成为独家供应商，核心优势是客户信任\n\n### 3. 技术领先\n- 研发费用每年保持在公司净收入的8%以上\n- 坚持自主创新，多次引领技术创新（0.13微米、28纳米等关键节点）\n- 技术迭代稳扎稳打，遵循摩尔定律\n- 先进封装（InFO、CoWoS）成为AI服务器芯片主要封装技术\n- \"夜鹰计划\"：24小时不间断加速研发\n\n### 4. 产能管理\n- 制造重心集中在台湾（新竹、台中、台南），互为备用产能\n- 采取超大型晶圆厂（Giga Fab）群聚布局，形成\"产业聚落\"\n- 云端自动化统筹管理，跨厂合作提升产能利用率\n- **全球布局**：美国亚利桑那州（先进制程）、日本熊本（28纳米）、德国德雷斯顿（28/22纳米和16/12纳米）\n- N-1战略：境外工艺技术比台湾本地量产工艺低一代\n\n### 5. 生态系统\n- 开放创新平台（OIP）：联合EDA和IP公司形成\"虚拟IDM\"\n- 超过3,000名TSMC员工 + 100多家合作伙伴的10,000名员工\n- 43,000个技术文件和2,800个PDK\n\n### 6. 企业架构\n- 股权结构分散，前十大股东均为全球重量级投资机构\n- 董事会由世界级专业人士组成\n- 双首长平行领导模式（董事长刘德音 + CEO魏哲家）\n\n## 投资信号\n- 台积电在晶圆代工领域寡头地位稳固，技术领先优势明显\n- AI及高性能计算芯片对先进封装（CoWoS）需求日益提升\n- 全球产能布局分散地缘政治风险，但海外建厂成本高昂（美国高4-5倍）\n- 前十大客户中七家总部位于美国，贡献约60%收入\n## 关联\n- [台积电商业模式与护城河分析](台积电商业模式与护城河分析.md) — 深度分析 vs 商业模式基础，两篇互补\n- [福耀玻璃竞争壁垒与护城河分析](福耀玻璃竞争壁垒与护城河分析.md) — 跨标的：台积电技术壁垒 vs 福耀制造壁垒", "n17": "# 曹德旺2025年度股东大会表态：\"大不了把美国工厂关掉\"\n\n## 摘要\n2026年4月21日，福耀玻璃2025年度股东大会上，78岁曹德旺针对美国关税问题强硬表态。福耀美国工厂累计投资超10亿美元，占全美30%市场份额，2025年营收79.17亿元，净利润8.84亿元。曹德旺强调企业经营以盈利为根本，绝不接受不合理政策导致持续亏损。\n\n## 关键数据\n- 美国工厂累计投资：超10亿美元\n- 美国市场份额：30%\n- 美国员工：超3000名\n- 2025年美国营收：79.17亿元（+25.43%）\n- 2025年美国净利润：8.84亿元（+40.91%）\n- 原材料本土化采购率：70%\n- 产能利用率：80%以上\n\n## 关键要点\n- 2026年美国对全球商品加征15%全域关税，汽车零部件延续高额关税\n- 曹德旺底线：企业经营以盈利为根本，不合理关税导致亏损则关厂\n- 美国工厂是福耀海外业务核心支柱，但非不可替代\n- 曹德旺高度评价儿子曹晖：\"干得比我强\"\n- 从父辈强硬守底线到新生代深耕技术，福耀完成平稳传承\n## 关联\n- [福耀玻璃2026年Q1汇兑风险深度分析](福耀玻璃2026年Q1汇兑风险深度分析.md) — 关税与汇兑共同构成2026年两大外部风险\n- [福耀玻璃竞争壁垒与护城河分析](福耀玻璃竞争壁垒与护城河分析.md) — 曹德旺表态体现管理层对壁垒的定价权信心", "n18": "--- 第1页 ---\nT2se3r0Ot6kwoPa\nT2se3r0Ot6kwoPa\nDistributed on: 29/04/2026 14:09:19 GMT\nDistributed on: 29/04/2026 14:09:19 GMT\n29 April 2026\nDeutsche Bank\nResearch\n Rating  \n Buy  \n \n Asia  \n China  \n \n Industrials  \n Manufacturing  \n \n Company  \n Inovance  \n Date  \n \n \nForecast Change\n \nSoft 1Q26 dragged by NEV but \nAutomation solid; 2Q26E could improve\nInovance reported 2025 and 1Q26 results in the evening of 27 April 2026 and hosted \nan analyst presentation on 28 April. The company has adjusted its segment disclosure \nand we have made corresponding adjustments in our model.\nThe -23% YoY net profit decline in 1Q26 is disappointing, dragged down \npredominantly by the NEV business. That said, this well-anticipated negative \nevent has now passed. We reiterate our BUY recommendation and highlight \npositive drivers, including: (1) potential acceleration of Automation revenue in \n2Q26E thanks to robust market momentum and expanded capacity — 1Q26 \nrevenue was constrained by production, and April orders remained strong; (2) \nInovance has increased prices for Automation products and is working to pass \non cost inflation for its NEV business, which bodes well for profitability in the \nupcoming quarters; (3) Inovance has received nominations to supply \ncomponents to Chinese humanoid robot makers and plans to launch wheeled \nhumanoid robots in August; and (4) new businesses such as digital energy, AI \ndata center products, and AI solutions are in early stages but offer long-term \ngrowth potential. We have cut our estimates. Our target price is RMB84.\nDisappointing 1Q26 dragged down by the NEV business; Core profit better than \nit appeared\nIn 2025, Inovance delivered revenue of RMB45.1bn (+22% YoY) and net profit of \nRMB5.05bn (+18% YoY; 11.2% NPM). The results are in line with the ranges of the \nprofit alert provided in February. Both revenue and net profit reached a record high \nlevel, although profitability was still well below historic peak levels. By segment, \nNEV sales grew +26% YoY, Automation +23% YoY and Elevator +6% YoY.\nIn 1Q26, Inovance printed revenue of RMB10.1bn (+13% YoY) and net profit of \nRMB1bn (-23% YoY; 10% NPM). By segment, NEV sales grew +12% YoY, \nAutomation +14% YoY and Elevator +8% YoY.\nWe consider 1Q26 net profit disappointing. However, we calculate the core profit \n(i.e. excluding NEV business) has demonstrated resilience and was better than it \nappeared — refer to Figure 1 for detailed 2025 and 1Q26 results.\nPositive surprises are:\nIris Zheng, CFA\nResearch Analyst\n+852-2203-5884\nKey changes\nTP\n83.90 to 84.00 ↑\n0.1%\nSales (FYE)\n54,709 to \n53,782 ↓\n-1.7%\nOp prof margin \n(FYE)\n11.0 to 11.6 ↑\n4.7%\nNet profit (FYE)\n6,201.4 to \n5,706.9 ↓\n-8.0%\nSource: Deutsche Bank\nPrice/price relative\n \nInovance\nShanghai Shenzhen CSI 300 Index (Rebased)\nJul '24\nJan '25\nJul '25\nJan '26\n100\n0\n50\n \nPerformance (%)\n1m\n3m 12m\nAbsolute\n-10.5-19.7 -4.7\nShanghai Shenzhen CSI 300 \nIndex\n5.7\n0.9 25.8\nSource: Deutsche Bank\nDeutsche Bank AG/Hong Kong\nIMPORTANT RESEARCH DISCLOSURES AND ANALYST CERTIFICATIONS LOCATED IN APPENDIX 1. Deutsche Bank does \nand seeks to do business with companies covered in its research reports. Thus, investors should be aware that the firm may \nhave a conflict of interest that could affect the objectivity of this report. Investors should consider this report as only a single \nfactor in making their investment decision.  THE CONTENT MAY NOT BE DISTRIBUTED IN THE PEOPLE\"S REPUBLIC OF \nCHINA (\"THE PRC\") (EXCEPT IN COMPLIANCE WITH THE APPLICABLE LAWS AND REGULATIONS OF PRC), EXCLUDING \nSPECIAL ADMINISTRATIVE REGIONS OF HONG KONG AND MACAU.  \nPrice at 28 Apr 2026 (CNY)\n61.36\nPrice target - 12mth (CNY)\n84.00\n52-week range (CNY)\n88.91 - 61.36\nShanghai Shenzhen CSI 300 \nIndex\n4,758\n Valuation & Risks \nReuters\nBloomberg\nExchange\nTicker\n300124.SZ\n300124 CH\nSHZ\n300124\n\n--- 第2页 ---\n29 April 2026\nManufacturing\nInovance\nPage 2\nDeutsche Bank AG/Hong Kong\nn\nGPM of Industrial Automation and Digitalization business improved \n1.7ppt YoY to 40.3% in 2025;\nn\nNPM of core profit (i.e. excluding NEV business) slightly improved by \n+30bps YoY in 2025 to 16.5%, per our calculation. In 1Q26, it was weighed \nby FX loss and asset impairment totalled ~RMB300mn.\nn\nAutomation business grew healthily with sales up +23% YoY in 2025 and \n+14% in 1Q26 (impacted by production constrain) thanks to robust orders;\nn\nElevator business returned to positive growth of +6% in 2025 and +8% in \n1Q26 thanks to rising penetration by Inovance into both local and overseas \nelevator OEMs and the increase in aftermarket.\nNegative surprises are:\nn\n2025 net profit of RMB5.05bn fell short of the long-term incentive program \nthreshold of RMB5.2bn. Inovance has missed the program threshold for \nthree times in a row since 2023;\nn\n1Q26 net profit decline of 23% YoY/ RMB309mn was worse than expected. \nThe decline was almost entirely due to the NEV business as we calculate \nthe NEV business contribution to Inovance's group declined RMB270mn \nYoY in 1Q26 with merely 1.1% NPM;\nn\nOperating profit declined 64% YoY to RMB94mn in 1Q26 on strategic \ninventory stock-up.\nOutlook: Target 10-30% YoY revenue and net profit growth for 2026E, despite \nthe profit decline in 1Q26; GPM could improve\nFor 2026E, Inovance targets 10-30% YoY growth for revenue and net profit. \nManagement reassured that the targets have taken into consideration the \nchallenges of the NEV business. Given the profit decline in 1Q26, this suggests \nstrong profit growth in the reminder 9M of the year.\nFor 2Q26E, management guides for GPM to improve as Inovance raises prices for \nautomation products. The NEV business is also trying to pass on cost inflation, \nalthough this comes with a lag. For revenue, management guides for higher \nrevenue for the Automation business in 2Q26E on expanded production capacity.\nWe forecast group revenue of RMB53.8bn (+19% YoY), and net profit of RMB5.7bn \n(+13% YoY; 10.6% NPM) for 2026E.\nAutomation: Solid order momentum continued in April; 2Q26E to pick up as \n1Q26 affected by production constraints\nAutomation orders grew strongly by +40% YoY in 1Q26 for Inovance driven by \nbroad-based end-market growth, led by battery, smart phone, machine tool, HVAC, \nautomotive, construction machinery and electronics. Management pointed to \ncontinued solid momentum in April and believes market demand should be \nstronger in 2026E than in 2025. Out of the 40% order growth, management \nestimates 10% was driven by stock-up by distributors, with the majority of the \ngrowth still driven by underlying solid market demand.\nAutomation revenue growth of +14% YoY in 1Q26 was affected by production \nconstraints. Inovance is increasing capacity and targets +30% higher production \nin May and June. Management therefore expects robust revenue delivery in \n2Q26E. Refer to Figure 5 for Inovance's automation orders vs revenue growth \nhistory.\n\n--- 第3页 ---\n29 April 2026\nManufacturing\nInovance\nDeutsche Bank AG/Hong Kong\nPage 3\nInovance has issued price increase letters twice YTD, one in January and one in \nMarch. Management believes Inovance has decent pricing power for a majority of \ncustomers. The higher memory price affects mainly PLCs. Management hears that \nsome PLC models from certain international brands have run out of stock.\nComments about the solid China automation market momentum and price \nincreases are consistent with our channel checks (link to our China Automation \nMarket monthly channel check report).\nWe forecast +25% revenue growth YoY in the Automation business and GPM of \n44%, up ~50bps YoY in 2026E. We forecast revenue growth to accelerate to 30% \nYoY for 2Q26E from +14% in 1Q26.\nHumanoid robot: Nomination received from domestic OEMs to supply \ncomponents; To launch wheeled robots in August\nInovance's product portfolio for humanoid robots include frameless motors, drives, \nencoders, screws, linear and rotary actuators and seven degrees of freedom robot \narms.\nFor the components, Inovance has received nominations from local humanoid \nrobot makers and are developing customised products for them. For robot arms, \nInovance is able to mass produce these and is confident about the quality as the \narms are equipped with liquid cooling and suitable for industrial use.\nInovance plans to launch wheeled robots for industrial application in August to \naddress simple tasks such as handling, gripping, unpacking, door closing, and \nplugging and unplugging. Inovance targets to deploy them in its own and \ncustomers' factories.\nInovance is working with partners and supplies components and data. Inovance \nutilises existing large models rather than developing them itself.\nAs China's largest automation component manufacturer and China's top-four \nindustrial robot maker with a comprehensive product portfolio, we think Inovance \nis well-positioned to become a prominent supplier for humanoid and AI robots in \nChina over time.\nNEV: Profit hit by cost inflation; Orders still strong; 2Q26E guided to be better \nthan 1Q26\nThe NEV business disappointed the market in 1Q26 — NPM margin dropped to \n1.1% in 1Q26, representing the lowest NPM since 2023. This was due to the higher \ncost of copper, aluminum and rare earths which account for a relatively high portion \nof the COGS. Cost increases have exceeded the locked-in prices and hedging \nagreements. Furthermore, competition, product mix and R&D on new products \nalso weighed on profits.\nManagement flagged strong orders, despite the slow sales in 1Q26. In 1Q26, \nInovance secured multiple new project nominations from domestic and \ninternational OEMs for motors, electronic controls, power supplies, and assembly \nproducts (overseas projects being global platform projects). Additionally, the 800V \nactive suspension product for a domestic OEM will enter the SOP (start of \nproduction) stage soon.\nManagement remains confident about the long-term growth opportunities from\n\n--- 第4页 ---\n29 April 2026\nManufacturing\nInovance\nPage 4\nDeutsche Bank AG/Hong Kong\nintelligent chassis (suspension and stabilizer bar) and the expansion into overseas \nOEMs. Management guides for a better 2Q26E than 1Q26.\nRefer to Figure 11 for detailed financials of Inovance Automotive (NEV) business.\nWe forecast +18% revenue growth YoY for the NEV business and GPM of 14%, \ndown ~2ppts YoY in 2026E.\nAI: Integrating AI with Inovance's industrial know-how\nInovance completed the development of \"Inovance Industrial Intelligent Brain \n(iFG)\" platform in 1H25. iFG integrates data, models and agents. Inovance targets \nto implement AI from the below perspectives:\nn\nApplying iFG on existing software and hardware offerings (CNC, PLC, HMI, \netc.) to conduct intelligent Q&A, code generation and intelligent \ninteraction;\nn\nEmpowering discrete automation customers with agents;\nn\nProviding AI edge all-in-one machine for diagnosis, prediction \nmaintenance, and efficiency improvement.\nManagement did not provide long-term targets but expects revenue from AI to \ndouble its current software revenue in 3-5 years.\nWe feel that it is still early days for Inovance to promote its AI solutions. In contrast, \nwe think its peer Supcon started the AI initiatives much earlier and has a clearer \npath towards monetisation — Supcon targets RMB800mn-1bn revenue from \nIndustrial AI in 2026E. We believe Inovance should benefit from the industrial data \nit possesses and its industrial know-how to link AI with the physical world. We \ntherefore will monitor its progress closely.\nDigital energy: A top five supplier for medium- to high-power PCS globally\nInovance supplies power conversion system (PCS). In 2025, Inovance generated \nRMB500mn revenue from the PCS business. Frost & Sullivan reckons Inovance is \nthe fifth largest supplier for medium- to high-power PCS globally by shipment \nvolume in 2025 with a market share of 7%. The company announced on 17 \nNovember that it has commissioned a new plant for PCS in Xi'an. The designed \ncapacity is 50GW and could contribute RMB10bn to revenue. Additionally, \nInovance has the capability for energy management for commercial and industrial \ncustomers.\nFor energy storage, Inovance shipped 10GW and over 1GWh storage in 2025. It has \nestablished model points in 20+ countries in 2025 and plans to further expand the \nbusiness.\nAI Data Centre: Supplying PSU, and developing SST\nInovance already supplies power supply units (PSU) for data centres. It is also \nforming up a team to develop solid-state transformer (SST). Management also sees \nopportunities in energy management considering its leading place in inverters.\nHK listing in progress\nInovance disclosed its prospectus for the HK listing on 28 April. News reports that \nthe company is looking to raise US$2bn. Management describe the purpose of the\n\n--- 第5页 ---\n29 April 2026\nManufacturing\nInovance\nDeutsche Bank AG/Hong Kong\nPage 5\nlisting as (1) to establish Inovance's brand overseas and (2) fund potential overseas \nacquisitions.\nCut estimates; Target price at RMB84\nWe cut our 2026/27 net profit forecasts by -8%/ -4%, respectively. We introduce \nnew 2028 forecasts.\nWe slightly adjust our DCF-derived target price to RMB84 from RMB83.9 as the \nlower estimates are offset by us rolling forward the valuation by 3M. Our target price \nof RMB84 is made up of (1) RMB80.2 (from RMB80) per share, based on a three-\nstage DCF of the underlying business, and (2) RMB3.8 (from RMB3.9) per share \nfrom humanoid robot contribution totalling ~RMB10bn. We use a terminal growth \nrate of 3.5% given the structural growth in the automation and NEV market. We use \na risk-free rate of 1.8%, an equity risk premium of 5%, and a beta of 1.2 to derive our \nWACC of 7.7%.\nInovance is trading on 2026E P/E of 32.1x and 2027E P/E of 25.9x, below its average \nlong-term one-year-forward P/E of 34.3x.\nDownside risks include: 1) slow automation market growth; 2) lack of share gain of \nInovance for the automation business; 3) severe pricing pressure weighing on \nmargins; and (4) a slow NEV market and the resultant pressure on its automotive \nsales and profitability.\n\n--- 第6页 ---\n29 April 2026\nManufacturing\nInovance\nPage 6\nDeutsche Bank AG/Hong Kong\nFigure 1: Inovance's net profit declined in 1Q26, weighed predominantly by the NEV business on cost inflation; FX loss \nand asset impairment dragged non-NEV business\nGeneral servo\n1,300\n1,700\n3,000\n1,300\n1,300\n2,600\n5,600\n1,720\n1,980\ end FY26 guidance. The stock fell ~6% yesterday on the print \nversus a flattish CSI300, then rebounded 10% today following the after-market \nbriefing (CSI300 again flattish at +0.7%), as investors gained comfort from \nyesterday’s briefing that the shortfall was mainly timing/high base and one-offs \nrather than demand deterioration, and that delivery bottlenecks have a near-term \noperational path to improvement. We maintain OW but de-risk our forecasts: \nFY26/27E profit cut by 7%/10%, FY28E introduced, DCF horizon extended to \nJun-27, and PT reset to Rmb84 (~25% upside post today’s rebound), supported by \n~15% revenue CAGR and ~23% profit CAGR into FY28E.\n•\nIA demand broad-based and April order momentum strong, yet 1Q \ndelivery lagged materially on capacity constraint. The near-term setup is \nbinary in terms of investor confidence, we believe: (i) capacity uplift in May \n(30%+) and a visible 2Q backlog digestion cycle that translates into revenue \nbooking; and (ii) an initial turn in margin trajectory as price pass-through and \nproduct mix begin to show up more clearly. Pricing power remains an \nimportant differentiator, but it needs to reflect in reported gross margin; the \nmanagement briefing points to March–April as the start of IA price-effect \nvisibility, making 2Q the first quarter where consolidated GPM is poised to \nrecover with IA leading. We believe the share price whipsaw (-6% then +10% \nvs flat CSI300) reinforces that the market will reward proof quickly if these \ncheckpoints land.\n•\nImproved confidence in FY26 guidance by replacing “trust gap” with \nexecution checkpoints, while NEV still drives headline volatility. \nConfidence in the FY26 10–30% Y/Y revenue and profit guidance improved \nbecause the 1Q26 miss now maps more cleanly to timing/high base and one-\noffs plus a conversion bottleneck, rather than a demand-led slowdown, with IA \norder momentum and April orders described as firm. We see the debate shifting \nfrom whether the guidance is achievable to whether the sequence is delivered: \nMay capacity uplift (30%+), 2Q backlog digestion, and a visible improvement \nin margin trajectory as IA price pass-through begins to appear in reported \nnumbers. This framing reduces uncertainty and supports a more constructive \nstance despite recent delivery noise. NEV remains the key caveat: cost pass-\nthrough is structurally harder and raw material volatility can continue to dilute \nSee page 11 for analyst certification and important disclosures, including non-US analyst disclosures.\nSources for: Style Exposure – J.P. Morgan Global Markets Strategy; all other tables are company data and J.P. Morgan estimates.\nThis material is neither intended to be distributed to Mainland China investors nor to provide securities investment consultancy services within the territory \nof Mainland China. This material or any portion hereof may not be reprinted, sold or redistributed without the written consent of J.P. Morgan.\n\n--- 第2页 ---\n2\nKaren Li, CFA AC\n(852) 2800-8589\nkaren.yy.li@jpmorgan.com\nAsia Pacific Equity Research\n29 April 2026\nJ P M O R G A N\nPrice Performance\nYTD\n1m\n3m\n12m\nAbs\n-10.3%\n-1.4%\n-10.9%\n0.7%\nRel\n-13.8%\n-6.3%\n-9.7%\n-24.3%\nCompany Data\nShares O/S (mn)\n2,707\n52-week range (Rmb)\n91.00-60.13\nMarket cap ($ mn)\n26,757\nExchange rate \n6.84\nFree float (%) \n62.2%\n3M ADV (mn)\n27.29\n3M ADV ($ mn)\n280.2\nVolatility (90 Day) \n36\nIndex \nSHASHR\nBBG ANR (Buy | Hold | Sell) \n37|2|0\nKey Metrics (FYE Dec)\nRmb in millions\nFY25A\nFY26E\nFY27E\nFY28E\nFinancial Estimates\nRevenue\n45,105\n52,734\n59,970\n68,345\nAdj. EBITDA\n6,633\n7,843\n8,933\n10,872\nAdj. EBIT\n5,517\n6,388\n7,772\n9,551\nAdj. net income\n5,050\n6,094\n7,484\n9,292\nAdj. EPS\n1.87\n2.25\n2.77\n3.43\nBBG EPS\n2.03\n2.43\n2.90\n3.28\nCashflow from operations\n6,681\n7,506\n8,342\n9,987\nFCFF\n3,649\n3,701\n5,684\n7,107\nMargins and Growth\nRevenue Growth Y/Y (%)\n21.8%\n16.9%\n13.7%\n14.0%\nEBI ings growth \nover FY25-28E. \nPerformance Drivers\nSource: J.P. Morgan Global Markets Strategy for Performance Drivers; company data, Bloomberg Finance L.P. and J.P. Morgan estimates for all other tables. Note: Price history may not be complete or \nexact.\n\n--- 第3页 ---\n3\nKaren Li, CFA AC\n(852) 2800-8589\nkaren.yy.li@jpmorgan.com\nAsia Pacific Equity Research\n29 April 2026\nJ P M O R G A N\nconsolidated margin optics.\n•\nThird pillar is the optionality stack that can sustain growth beyond the current FA \nupcycle. Robotics/AI progress is anchored in industrial scenarios and component \ncommercialization, with identifiable milestones (bionic arm delivery and an August \nwheeled robot launch) that can improve visibility, while the software push emphasizes \ntools/agents and scenario know-how as the moat. ESS is positioned as selective growth, \nprioritizing order quality and walking away from low-GPM volume to support mix. Our \nview is that the market is poised to pay for these levers only after 2Q–3Q confirms \ndelivery catch-up and margin stabilization at group level. The announced H-share listing \nsupports financial and strategic flexibility (brand building and inorganic options).\n\n--- 第4页 ---\n4\nKaren Li, CFA AC\n(852) 2800-8589\nkaren.yy.li@jpmorgan.com\nAsia Pacific Equity Research\n29 April 2026\nJ P M O R G A N\nModel update post-1Q26 briefing: Order momentum and FY26 \nguidance remain intact\n1Q26 earnings were a miss despite very strong order growth, and the share price \nreaction over the past two days usefully isolates what the market is (and is not) willing \nto pay for at this stage of the cycle: investors were initially positioned to penalize \n“delivery/margin conversion” risk, but they were also quick to re-rate once the after-\nmarket briefing narrowed the uncertainty around the bridge from orders to recognized \nrevenue and profit. The stock fell ~6% yesterday on the print versus a flattish CSI300, \nreflecting near-term disappointment and lingering skepticism after consecutive quarters \nwhere headline delivery has not kept pace with the strength implied by the upcycle. \nHowever, after the after-market briefing, the stock rebounded ~10% today (CSI300 \nagain flattish), as investors appeared more comfortable that the miss was not demand-\nled but instead driven by timing (order-to-revenue recognition lag), a high base and one-\noff items, and that the current delivery pressure is operationally addressable via near-\nterm capacity actions—i.e., the problem set shifted from “is the cycle real?” to “how \nquickly can Inovance convert backlog into reported numbers and stabilize margins?” In \nthat context, the reiterated FY26 guidance of 10–30% Y/Y growth for both revenue and \nprofit reads as more credible than it did immediately post-results, even if the implied \npath still requires a meaningful step-up in performance through the remaining quarters, \nand therefore leaves little room for additional execution slippage.\nWe remain OW, but we are explicitly de-risking the forecast profile to reflect: (i) a more \nconservative margin recovery cadence versus the optimistic “snapback” path the market \nwould likely need to see to fully rebuild confidence; and (ii) the reality that even with \nstrong orders, the translation to P&L can remain noisy when capacity, product mix and \ncost pass-through are moving targets. Specifically, we cut FY26/27E profit by 7%/10%, \nand introduce FY28E to better capture the medium-term compounding from automation \npenetration, overseas expansion and new engines (software/AI, robotics, ESS energy \nstorage, and PA process automation adjacencies). \nWe extend our valuation horizon to Jun-27. Our DCF-based PT resets to Rmb84 (from \nRmb97), which implies ~25% upside from current levels even after today’s rebound, \nunderpinned by our projected ~15% revenue CAGR and ~23% profit CAGR into \nFY28E. We preserve our core medium-term investment case (structural share gains + \nplatformization + multi-engine growth), while acknowledging that near-term sentiment \nwill likely remain highly sensitive to proof points on delivery catch-up, margin \nstabilization and the “quality” of order growth—exactly the factors that drove the sharp \nde-rating yesterday and the equally sharp re-rating today.\nMacro and IA cycle framing leaned constructive, tying 2026>2025 conviction to \npolicy tailwinds and a longer cycle, but also acknowledged global energy/\ncommodity uncertainties\n•\nManagement explicitly stated a conviction that 2026 will be better than 2025 for \nIA demand, and tied this to policy and structural drivers—national planning/\ninfrastructure emphasis, “core autonomy” and industrial security priorities (e.g., \nsemi, energy), and a belief that digitalization will be a key battlefield where they \nexpect to be a major winner. They also highlighted external dynamics (e.g., Middle \nEast-related energy security focus and the acceleration of “technology going \noverseas”) as both opportunities and context for faster internationalization. \n•\nAt the same time, they acknowledged global commodity and energy tightness\n\n--- 第5页 ---\n5\nKaren Li, CFA AC\n(852) 2800-8589\nkaren.yy.li@jpmorgan.com\nAsia Pacific Equity Research\n29 April 2026\nJ P M O R G A N\ncould create recession risks, but argued the cycle’s “long-term” effect is net \npositive. Our view is that this macro framing is supportive for sentiment and aligns \nwith the strong order picture, but ultimately investors will still anchor on near-term \nproof in delivery and margins; macro optimism can support the multiple only if the \ncompany executes through the current conversion bottleneck and shows that price \npass-through is functioning as guided.\nFY25 business review emphasized resilience with structural wins and product \nleadership the core narrative\n•\nManagement framed FY25 as a year shaped by tariff-related uncertainty and a \n“front-high, mid-low, back-high” demand profile, but argued the company still \ndelivered healthy order and revenue growth by “grabbing structural opportunities” in \nhigher-momentum verticals. They highlighted sector demand pockets (e.g., lithium \nbattery, logistics) and the firm’s ability to capture incremental share through solution \ncapability rather than relying solely on cyclical beta. \n•\nManagement also pointed to strong execution in “industrial intelligence” with \ngrowth supported by deepening penetration in equipment electrification and \nupgrades, and referenced product momentum in high-margin categories (e.g., servo/\nPLC) alongside new product ramp (including multiple “爆品” launches). Our read is \nthat the FY25 retrospective was designed to anchor credibility (i.e., execution track \nrecord) ahead of a more ambitious FY26 guidance band, and to signal that the firm \nsees itself as a structural winner rather than purely a cycle beneficiary, which matters \nfor sentiment as investors debate whether two consecutive quarterly misses are \n“noise” or “signal.”\n1Q26 miss positioned as a mix of timing, high base, and one-offs, with conversion \ncapacity (not demand) flagged as the binding constraint; April orders remained \nstrong\n•\nManagement’s central message was that the 1Q26 profit miss should not be \nread as a deterioration in end-demand, but rather as the consequence of: (i) a high \nbase; (ii) order-to-revenue booking lag; and (iii) several one-off/non-operational \ndrags (including investment income/FX-related impacts and impairment-type items). \nThey emphasized the mismatch between IA orders (+~40% Y/Y, per their \ndiscussion) and IA deliveries/revenue recognition (+~14% Y/Y), arguing this \nreflects capacity constraints and delivery pressure rather than weak bookings. \n•\nManagement added that April orders remained strong, and guided that May \ncapacity is expected to improve by 30%+ to relieve delivery tightness; 2Q is \nframed as the period to “digest” 1Q backlog. Our view is that this is the right \ndebate to have (conversion and operational bottlenecks), but it also raises the bar for \nnear-term proof: investors will likely watch whether delivery catch-up is visible in \n2Q revenue recognition and whether\n…(截断)", "n20": "--- 第1页 ---\nMacquarie Equity Research\n28 April 2026\nInovance\nNEVs to weigh on FA demand recovery\nKey Points\n• 4Q25 and 1Q26 below MQe on weak revenue growth and expense hikes.\n• We expect China FA demand to bottom out. Inovance is the key\nproxy. However, we expect slowing NEV to drag down its revenue and\nearnings.\n• Trough valuations but mixed outlook. We lower TP 10% to Rmb77.80.\n•\nWhat we liked: 4Q25/1Q26 GPM remained steady at 28.2%/29.1%.\n•\nWhat we did not like: 4Q25 SG&A and R&D expense increased by 49.7%\nand 34.0% you, respectively. 1Q26 operating CF saw a sharp decline YoY/\nQoQ.\n•\nIndustrial automation revenue/order mismatch due to capacity\nbottlenecks. Inovance reported 1Q26 industrial automation\nrevenue growth of 14% YoY, below order book growth of 40%, which\nmanagement attributed to capacity bottlenecks. Following a 30%\ncapacity expansion, Inovance expects 2Q26 FA revenue growth to align\nwith its order book. We believe China FA demand will bottom in 2026.\nWe expect Inovance to continue gaining market share from global peers,\nsupporting industrial automation revenue growth above the industry.\n•\nNEV segment is weighing on top-line growth but easing margin\npressure. We expect NEV to remain a headwind for Inovance given\nslowing demand and intense price competition. However, margin\npressure from the rapid expansion of NEV revenues should ease in 2026.\nInovance expects its NEV segment to grow faster than the industry,\ndriven by new product development and penetration of new overseas\ncustomers.\n•\nOverseas, the new growth driver. Overseas revenue grew 30.0% YoY in\n2025 and accounted for 5.9% of total revenue. Inovance targets overseas\nmarkets to contribute 20–30% of revenue over time. We expect overseas\nrevenue to become a long-term growth driver for the company.\n•\n2026 guidance was for revenue and net profit growth of 10-30% YoY.\nEarnings changes: We cut our 2026/27E net profits 9%/13% on slower\nrevenue growth.\nValuation: We cut our TP 10% to Rmb77.80, rolling forward to 30.8x 2027E\nP/E multiple (1SD below historical avg PE) on slowing NEV demand, from\n36.3x\nCatalyst: Industrial automation demand rebound.\nInvestment Thesis and Recommendation\nInovance is a domestic leader in the industrial automation industry for\nservo systems, inverters, PLC and industrial robots. We expect domestic\nmarket-share gains on import substitution and overseas expansion. For\nmore research, see here.\nCapital Goods\nChina\nDaisy\nZhang, CFA\nCassie\nDai\n300124 CH\nOutperform\nPrice (at 28 Apr 2026)\nCNY61.36\n12-month target\nCNY77.80\n12-month TSR (%)\n27.7\nVolatility Index\nMedium\nMarket Cap (Local) (m)\n165,871\nMarket Cap (USD) (m)\n24,308\nFree Float (%)\n69\n30-day avg turnover (USD) (m)\n249.1\n \nInvestment Fundamentals\nYear end 31 Dec\n2025A 2026E 2027E 2028E\nRevenue (m)\n45,105\n52,174\n60,161\n69,332\nRevenue growth (%)\n21.8\n15.7\n15.3\n15.2\nEBIT (m)\n5,443\n6,156\n7,351\n8,713\nEBIT growth (%)\n22.0\n13.1\n19.4\n18.5\nReported profit (m)\n5,050\n5,823\n6,820\n8,090\nAdjusted profit (m)\n5,050\n5,823\n6,820\n8,090\nEPS rep [CNY]\n1.9\n2.1\n2.5\n3.0\nEPS rep growth (%)\n16.8\n14.1\n17.1\n18.6\nEPS adj [CNY]\n1.9\n2.1\n2.5\n3.0\nEPS adj growth (%)\n16.9\n13.9\n17.1\n18.6\nNet debt/equity (%)\n(11.1)\n(5.5)\n(8.9)\n(11.8)\nROA (%)\n8.5\n8.5\n9.4\n9.9\nROE (%)\n15.9\n15.5\n16.2\n17.0\nPER rep (x)\n32.9\n28.9\n24.6\n20.8\nPER adj (x)\n32.9\n28.9\n24.6\n20.8\nEV/EBITDA (x)\n26.9\n22.8\n19.4\n16.6\nP/BV (x)\n4.7\n4.2\n3.8\n3.3\nTotal div yield (%)\n0.8\n0.9\n1.1\n1.3\nQuant (rank vs. global sector)\n985 / 2,729\n300124 CH rel CSI 300\nperformance, & rec history\nSource: FactSet, Macquarie Research, Apr 2026 (all figures in\nCNY unless noted, TP i 29 日│中国内地 \n专用设备 \n \n汇川技术发布2025 年年报及2026 年一季报，2025 年实现营收451.05 亿\n元（yoy+21.77%），归母净利50.50 亿元（yoy+17.84%）。其中Q4 实现\n营收134.42 亿元（yoy+15.45%，qoq+20.52%），归母净利7.96 亿元\n（yoy-14.58%，qoq-38.10%）。公司25 年归母净利润低于我们此前预测\n（预测值55.35 亿元），原因主要系公司开拓市场和新业务过程中，费率有\n所提升。2026 年Q1 实现营收101.43 亿元（yoy+12.98%，qoq-24.54%），\n归母净利10.13 亿元（yoy-23.39%，qoq+27.34%）。我们看好公司强化工\n业自动化领域龙头地位，不断深化国产替代与全球布局，同时加速拓展机器\n人、智慧能源等新兴业务。维持“买入”评级。 \n \n工控与新能源车双轮驱动，新兴业务表现亮眼 \n分业务来看，公司25 年业绩增长主要由新能源汽车与工业自动化业务双轮\n驱动。1）受益于下游行业的结构性增长，叠加公司多产品解决方案与“上\n顶下沉”市场策略的持续深化，公司工业自动化与数字化业务25 年实现收\n入222 亿元，同比+19%。其中通用自动化业务实现收入169 亿元，同比\n+23%；智慧电梯业务实现收入52 亿元，同比+5%。2）新能源汽车动力系\n统25 年实现收入203 亿元，同比+26%，主要受下游客户定点车型放量驱\n动。3）智能机器人与数字能源业务25 年实现收入18 亿元，同比+16%。 \n \n26Q1 毛利率同比有所下滑，平台化运营推动费用管控优化 \n公司25 年/26Q1 毛利率为28.95%/29.08%，同比+0.25pp/-1.91pp。得益\n于公司不断推动技术迭代与产品创新，持续巩固成本竞争力，25 年毛利率\n相对稳定，26Q1 毛利率有所下滑，我们认为或主要系新能源车业务竞争持\n续加剧所致。25\n年/26Q1\n期间费用率\n16.74%/17.77% ，同比\n+0.09pp/-0.08pp 。26Q1\n销售/ 管理/ 研发/ 财务费用率\n3.11%/4.58%/9.93%/0.14%，同比-0.53pp/+0.11pp/+0.02pp/+0.32pp。公\n司持续推进精细化运营体系建设，优化组织架构，并依托iFG 工业智脑等平\n台深化智能化、数字化应用，推动研发、制造、交付及运营全链条效率提升，\n费用管控良好。 \n \n主业稳健出海加速，新兴业务有望构筑新增长极 \n1）公司工控与新能源车两大主业稳中有进。一方面，公司作为国产工控龙\n头持续拓展CNC、高性能电机等高端产品矩阵，并不断深化机床、半导体、\n流程工业等应用领域的国产替代，另一方面，公司新能源车动力系统产品伴\n随下游客户定点车型放量，有望持续贡献业绩增量。2）公司加速推进全球\n化布局，与国内头部客户合作“借船出海”的同时，不断完善海外本土化运\n营体系。3）智能机器人、数字能源等新兴业务或有望快速放量，目前公司\n人形机器人核心零部件产能已落地南京、岳阳基地，数字能源业务则深耕低\n能耗零碳解决方案，有望构筑新增长极。 \n \n盈利预测与估值 \n考虑到公司新能源车业务市场竞争加剧，我们下调公司2026、2027 年归母\n净利润预测（8%，7%）至61.59 亿元、75.80 亿元（前值分别为67.28 亿\n元、81.27 亿元），并预测2028 年归母净利润为95.72 亿元，对应EPS 分\n别为2.27/2.80/3.54 元。可比公司2026 年iFind 一致预期PE 为37 倍，给\n予公司26 年37 倍PE 估值，对应目标价为83.99 元（前值104.41 元，对\n应26 年42 倍PE）。 \n \n风险提示：行业发展不及预期，市场竞争加剧，市场拓展不及预期。 \n \n \n(5)\n6\n17\n28\n39\nApr-25\nAug-25\nDec-25\nApr-26\n(%)\n汇川技术\n沪深300\n\n--- 第2页 ---\n免责声明和披露以及分析师声明是报告的一部分，请务必一起阅读。 \n2 \n汇川技术 (300124 CH) \n \n图表1： 分季度预测表 \n2025Q2 \n2025Q3 \n2025Q4 \n2026Q1 \n2026Q2E \n2026Q3E \n营业收入（亿元） \n115.31 \n111.53 \n134.42 \n101.43 \n138.38 \n136.07 \n营业收入同比增速 \n18.99% \n21.05% \n15.45% \n12.98% \n2  business (incl. intelligent \nrobot and digital energy), on the back of the automation upcycle and ongoing \nmarket share gain.\nOur EPS estimates are revised down 3% for 2026, mainly reflecting lower \nprofitability from the NEV business and FX loss, but are up 3% for 2027 on \ncontinuous cost pass-through and a better revenue mix.\nWe use SOTP for our Inovance valuation: 1) apply a 35x P/E (unchanged) to 2026e \nEPS for automation business; 2) NEV powertrain is based on its market cap and \nInovance's 83% stake; 3) emerging business – we apply 60x P/E to 2026e EPS, in-\nline with the 60x we gave for Estun's core industrial robot business; and 4) we apply \n5x P/S (unchanged) for the humanoids business when global humanoid sales reach \n1mn units. Our PT stays unchanged at Rmb95.0.\n What’s Changed  \nUpdated Components\nEPS\nBull Base Bear Scenarios\nShenzhen Inovance Technology  | Asia Pacific\nRisk Reward Update  \nRisk Reward for Shenzhen Inovance Technology (300124.SZ) has \nbeen updated.\nMorgan Stanley Asia Limited+\nSheng Zhong\nEquity Analyst\n Sheng.Zhong@morganstanley.com  \n  +852 2239-7821 \nShenzhen Inovance Technology (300124.SZ, 300124 CS)\nChina Industrials | China\nStock Rating\nOverweight\nIndustry View\nIn-Line\nPrice target\nRmb95.00\nShr price, close (Apr 30, 2026)\nRmb68.60\n52-Week Range\nRmb91.00-60.13\nFiscal Year Ending\n12/25 12/26e 12/27e 12/28e\nEPS (Rmb)**\n1.88\n2.25\n2.85\n3.57\nPrior EPS (Rmb)**\n2.00\n2.32\n2.76\n-\nUnless otherwise noted, all metrics are based on Morgan Stanley ModelWare \nframework\n** = Based on consensus methodology\ne = Morgan Stanley Research estimates\nMorgan Stanley does and seeks to do business with \ncompanies covered in Morgan Stanley Research. As a result, \ninvestors should be aware that the firm may have a conflict of \ninterest that could affect the objectivity of Morgan Stanley \nResearch. Investors should consider Morgan Stanley \nResearch as only a single factor in making their investment \ndeci 规模导向背景下，扫地机中国市场的竞争依然激烈。2）\n在政府、平台、品牌三方补贴支持下，2026 年以来清洁电器线上零售市场隔\n年比表现良好。据AVC 监测数据，2026 年1~2 月，中国扫地机线上零售额\n同比-11.2%，隔年比+53.1%；洗地机线上零售额同比-4.2%，隔年比+29.2%。\n26W10~W12（3.2~3.22），扫地机线上零售额同比-17.8%，隔年比+10.8%；\n洗地机线上零售额同比-12.5%，隔年比+30.1%。3）据IDC 数据，2025 年全\n球扫地机出货量2412 万台，同比+17.1%；25Q4 出货670 万台，同比+13.2%；\n25Q4\n石头/ 追觅/ 科沃斯/ 小米/ 云鲸全球扫地机出货量份额分别为\n30.1%/16.1%/13.1%/6.9%/6.5%，石头和追觅份额环比进一步提升，追觅超\n越科沃斯成为全球第二大出货品牌。 \n \n家空降幅收窄，热泵出口高增：1）产业在线数据，2026 年1-2 月，家用空\n调内销1407 万台，同比-3.5%，较24 年同期隔年比+5%，年初国内市场需求\n略显低迷且面临同期高基数影响，但同比降幅较此前25Q4 有明显收窄，延续\n弱复苏态势；4-6 月家用空调内销排产较去年同期实绩0.5%、-0.3%、+4.7%，\n隔年比+3.3%、+13.1%、+22%。2）2026 年1-2 月，家用空调出口1925 万\n台，同比-3.5%，较24 年同期隔年比+26.3%；4-6 月家用空调出口排产较去\n年同期实绩-12.2%、+1.5%、+7.6%，隔年比-12.4%、-11.5%、-6%。3）2026\n年以来，热泵出口高景气度延续。海关总署数据，2026 年1-2 月我国热泵相\n关产品及零部件出口额为36.1 亿元，同比+33.8%，连续22 个月（2024.5-\n2026.2）实现同比增长。4）2025 下半年暖通行业承压。近期年报业绩来看，\n海尔智家暖通产业链2025H1/H2 对外收入分别同比+13.0%/+4.6%，分部利\n润率6.4%/1.1%；奥克斯2025H1/H2 营收分别同比+16.7%/-20.6%，归母净\n利率9.3%/3.6%。 \n \n中国彩电品牌全球化成效显著，2026 年RGB 与SQD Mini LED 将加速\n推广：1）中国彩电品牌凭借Mini LED 快速抢占全球份额。奥维睿沃数据，\n2025\n年\nTCL 、海信全球电视出货量份额分别同比+0.7/+0.4pct\n至\n家用电器行业 \n推荐 \n维持评级 \n分析师 \n何伟 \n：hewei_yj@chinastock.com.cn \n分析师登记编码：S0130525010001 \n杨策 \n：yangce_yj@chinastock.com.cn \n分析师登记编码：S0130520050005 \n刘立思 \n：liulisi_yj@chinastock.com.cn \n分析师登记编码：S0130524070002 \n陆思源 \n：lusiyuan_yj@chinastock.com.cn \n分析师登记编码：S0130525060001 \n相对沪深300 表现图 \n2026 年03 月27 日 \n资料来源：中国银河证券研究院 \n-20%\n-10%\n0%\n10%\n20%\n30%\nSW家用电器\n沪深300\n \nENEjNeimys6YKI3HL58IjRoEQSGvtCr4787ShqwRbDNBsk/3rkIhGJoEMNoAgCpG\n用户754775491于2026-04-21日下载，仅供本人内部使用，不可传播与转载\n\n--- 第2页 ---\n行业月报 · 家用电器行业 \n \n \n \n请务必阅读正文最后的中国银河证券股份有限公司免责声明。 \n \n2 \n14.8%/14.5%。2027 年4 月TCL 与索尼合资公司投入运营后，TCL 将冲击\n全球第一的宝座。2）韩国品牌2025 年发动价格战后陷入亏损，而中企具备\n成本效率优势，通过中高端渠道和产品结构优化，盈利能力持续提升。2025\n年TCL 电子收入+15.4%，经调整归母净利润+56.5%；彩电业务毛利率同比\n+1.3pct，国内/海外市场均有较好提升，Mini LED 全球出货量同比+118%。\n3）2026 年是Mini LED 下放普及和技术升级之年。Omdia 与群智咨询预计，\n2026 年全球OLED、Mini LED 电视渗透率或达3.3%、11%，差距快速拉\n开。3 月AWE 展上，多品牌推出RGB 与SQD Mini LED 电视新品。目前\nRG \n10 \n \n图18：家用空调出口出货量（月度） \n图19：家用空调出口出货量及排产同比增速（月度） \n \n \n资料来源：产业在线，中国银河证券研究院 \n资料来源：产业在线，中国银河证券研究院 \n \n2026 年以来，空调企业集体涨价。2025 年618 以来，空调行业低价竞争激烈。2024 年以来，\n铜价受供需不平衡影响（铜矿减产、应用需求扩大）持续走高。铜占空调成本的30%左右，随着铜\n价上涨，行业面临成本压力，中小空调企业成本压力相对更大，叠加芯片短缺、人工成本增加、环\n保要求提升等影响，2026 年开年以来，空调企业迎来集体涨价潮。根据AVC 数据监测，2026 年1\n月、2 月家用空调线上零售均价分别环比+3%、+8.5%；线下零售均价分别环比+2.6%、+3.8%。而\n中央空调因对铜、铝等原材料的消耗量较家用空调更大，因此整体涨价幅度高于家用空调，目前已\n有格力、海信、日立、奥克斯、TCL 等品牌宣布对中央空调提价。 \n \n图20：空调线下、线上零售均价 \n图21：空调线下零售市场各品牌零售均价 \n \n资料来源：AVC，中国银河证券研究院 \n资料来源：AVC，中国银河证券研究院 \n \n0\n500\n1,000\n1,500\n2023-01\n2023-04\n2023-07\n2023-10\n2024-01\n2024-04\n2024-07\n2024-10\n2025-01\n2025-04\n2025-07\n2025-10\n2026-01\n出口（万台）\n0\n500\n1,000\n1,500\n2,000\n2,500\n3,000\n3,500\n4,000\n4,500\n5,000\n5,500\n线下均价（元/台）\n线上均价（元/台）\n0\n500\n1,000\n1,500\n2,000\n2,500\n3,000\n3,500\n4,000\n4,500\n5,000\n5,500\n美的线下（元/台）\n格力线下（元/台）\n海尔线下（元/台）\n海信线下（元/台）\n-40%\n-20%\n0%\n20%\n40%\n60%\n80%\n2023-01\n2023-03\n2023-05\n2023-07\n2023-09\n2023-11\n2024-01\n2024-03\n2024-05\n2024-07\n2024-09\n2024-11\n2025-01\n2025-03\n2025-05\n2025-07\n2025-09\n2025-11\n2026-01\n2026-04\n2026-06\n出口YOY\n排产较去年出\n货实绩 \nENEjNeimys6YKI3HL58IjRoEQSGvtCr4787Shqw\n…(截断)\n\n…(共50页，仅提取前30页)", "n24": "# 福耀玻璃2024年年报核心要点\n\n## 摘要\n福耀玻璃2024年营收392.52亿元（+18.37%），归母净利润74.98亿元（+33.20%），连续四年双增长，均创历史新高。分红46.98亿元，分红率62.65%。\n\n## 关键数据\n- 营收：392.52亿元（+18.37%）\n- 归母净利润：74.98亿元（+33.20%）\n- 扣非净利润：74.46亿元（+34.71%）\n- 汽车玻璃销量：155.87百万平方米（+11.21%）\n- 研发投入：16.78亿元（+19.58%）\n- 分红：46.98亿元（分红率62.65%）\n- 累计现金分红：333.34亿元\n- 员工总数：37,910人\n\n## 关键要点\n- 连续四年营收净利双增长，盈利质量高\n- 2024年资本开支54.81亿元，重点投向美国、合肥、福建等项目\n- 合肥、福清新项目合计投资约90亿元\n- 美国伊利诺伊汽车级浮法玻璃生产线增资4亿美元\n- 上市以来平均分红率62.59%，派息融资比4675.25%\n## 关联\n- [福耀玻璃2025年年报业绩概览](福耀玻璃2025年年报业绩概览.md) — 2024→2025年对比增长轨迹\n- [福耀玻璃2026年一季报业绩分析](2026-05-31-福耀玻璃2026年一季报业绩分析.md) — 2024年作为季报的同比基数", "n25": "# 福耀玻璃2025年年报业绩概览\n\n## 摘要\n福耀玻璃2025年营收457.87亿元（+16.65%），归母净利润93.12亿元（+24.20%），连续四年双增长，均创历史新高。分红46.98亿元，分红率62.65%，累计分红超333亿元。\n\n## 关键数据\n- 营收：457.87亿元（+16.65%）\n- 归 8:00\nresource: ~/.inv-report/福耀玻璃/\ntags: [fuyao-glass, valuation, profit-trend, fx-risk, competitive-advantage, third-party-analysis, 2026-Q1]\n---\n\n# 福耀玻璃2026年Q1业绩后五大外资研报综合摘要\n\n## 摘要\n\n福耀玻璃2026年Q1营收104.13亿元（+5.1% YoY），归母净利润17.12亿元（-15.7% YoY），利润下滑完全由汇兑损益逆转所致（Q1汇兑亏损4.4亿 vs 去年同期收益2.4亿）。剔除汇兑影响后税前利润+10% YoY。五家外资行（UBS、BNP Paribas、BofA、JPMorgan、Morgan Stanley）在业绩后均维持买入/超配评级，共识核心逻辑：ASP增长（+11% YoY）持续抵消销量下滑（-3.7%），高附加值产品占比提升驱动毛利率逆势扩张至37.4%（+2ppt YoY）。分歧点主要在目标价（HKD70-93区间）和2026年盈利预测（EPS 3.72-4.16），差异源于对汇兑亏损和ASP增速的不同假设。\n\n## 关键要点\n\n- **ASP增长是最大亮点**：五家一致确认Q1汽车玻璃ASP +11% YoY，由调光天窗、HUD前挡、隔音玻璃等高附加值产品驱动，高附加值产品占比+7.6ppt YoY\n- **毛利率逆势超预期**：Q1 GPM 37.4%（+2ppt YoY），远超BofA预测的33.6%。驱动因素：纯碱价格-18% YoY、运费下降、美国二期工厂利用率提升、天然气价格受管道气合同保护\n- **汇兑是唯一拖累**：Q1汇兑亏损4.4亿元（美元+欧元双升值），若剔除则税前利润+10% YoY。BNP因此下调2026E净利润3.5%\n- **美国工厂火灾影响可控**：Ohio工厂Q1火灾，管理层预计8月初全面恢复，期间通过出口保障供应，保险覆盖财务损失\n- **估值处于五年低位**：UBS指出福耀交易在11x 2027E PE（五年相对低位），BofA预测2026E ROE 25.1%、FCF yield 5.15%\n- **目标价分歧**：UBS最乐观（HKD93，DCF估值），BofA最保守（HKD70），BNP居中（HKD80/CNY80，20x/18x PE），差异来自WACC和终端增长率假设\n- **SAM铝饰条业务减亏**：管理层预计2026年达到盈亏平衡，国内段受行业影响承压\n\n## 关联\n\n- [福耀玻璃2026年Q1汇兑风险深度分析](investing/福耀玻璃2026年Q1汇兑风险深度分析.md) — 本条目汇兑数据（Q1亏损4.4亿 vs 去年同期收益2.4亿）与五家研报的汇兑分析完全吻合，互为验证\n- [福耀玻璃竞争壁垒与护城河分析](investing/福耀玻璃竞争壁垒与护城河分析.md) — 研报确认的ASP持续增长能力（+11% YoY）和毛利率领先（37.4%）是护城河的直接体现\n- [福耀玻璃2026年一季报业绩分析](investing/2026-05-31-福耀玻璃2026年一季报业绩分析.md) — 本条目提供五家外资行的盈利预测区间和估值参考，与自有分析互补\n- [台积电商业模式与护城河分析](investing/台积电商业模式与护城河分析.md) — 跨标的对比：福耀的制造壁垒（规模+垂直整合）vs 台积电的技术壁垒（制程领先），两种不同护城河类型\n\n## 引用来源\n\n- [UBS - Positive Q126 earnings growth, GPM notable beat (2026-04-21)](~/.inv-report/福耀玻璃/2026-04-21-600660.SS-UBS%20Equities-First%20Read%20Fuyao%20Glass%20_Positive%20Q126%20earnings%20growth%20again...-121530995.pdf) — PT HKD93, Buy, 2026E EPS 4.16\n- [BNP Paribas - Operation and margin remain robust (2026-04-22)](~/.inv-report/福耀玻璃/2026-04-22-600660.SS-BNP%20Paribas-FUYAO%20GLASS%20-%20H%20%20Operation%20and%20margin%20remain%20robust;%20reiter...-121560357.pdf) — PT HKD ：收益2.4亿元\n- 2026Q1汇兑损益：亏损4.4亿元\n- 2026Q1人民币vs美元：升值1.3%\n- 2026Q1人民币vs欧元：升值3%\n- 2025年海外收入占比：46.3%\n- 2026H1汇兑影响预测：亏损超6亿元（同期收益6亿）\n- 2026全年汇兑影响预测：亏损超6亿元（同期收益3亿）\n\n## 关键要点\n- 汇兑损益是2026年Q1利润下滑15.7%的主因\n- 福耀外汇风险敞口不仅挂钩美元，还涉及较大比例欧元\n- 2025年Q1欧元贬值3.7%带来汇兑收益，2026年Q1欧元升值3%导致亏损\n- 全年盈利预计中个位数下降，若汇率稳定\n- 股价从高点74元回调至55元附近，静态PE约15.5倍\n- 股息率约3.86%，具备一定防御性\n## 关联\n- [福耀玻璃2026年一季报业绩分析](2026-05-31-福耀玻璃2026年一季报业绩分析.md) — 汇兑是Q1利润下滑的核心驱动力\n- [曹德旺2025年度股东大会表态-美国关税](曹德旺2025年度股东大会表态-美国关税.md) — 汇兑+关税构成2026年双重外部风险", "n31": "source_url: https://stock.10jqka.com.cn/20260619/c677584845.shtml\nsource: 同花顺财经\npublished_or_observed: 2026-06-19\ncategory: investing\n---\n\n# 福耀玻璃6月18日两融数据：融资余额21.41亿元\n\n## 摘要\n同花顺 iFinD 数据显示，福耀玻璃（600660）6月18日获融资买入1726.14万元，融资偿还1952.22万元，融资余额21.41亿元，占流通市值2.14%，处于历史较高分位。融券方面，6月18日融券卖出1.40万股、融券偿还1.60万股，融券余额1429.57万元。综合两融余额21.55亿元，较前一日小幅下降0.12%。\n\n## 关键要点\n- 2026-06-18：融资买入额 1726.14 万元；融资偿还额 1952.22 万元；融资余额 21.4114 亿元。\n- 2026-06-17：融资买入额 1756.46 万元；融资偿还额 2736.69 万元；融资余额 21.4341 亿元。\n- 2026-06-16：融资买入额 4402.07 万元；融资偿还额 4013.31 万元；融资余额 21.5321 亿元。\n- 2026-06-18：两融余额 21.5544 亿元，较昨日减少约257.4万元。\n- 信号方向：短期杠杆资金边际降温，但仍处较高水平。\n\n## 投资视角\n短期两融余额仍在高位，但6月17日、6月18日连续小幅回落，说明短线杠杆资金边际热度下降。该信号更偏交易层面，不构成基本面变化。对于长期持仓，更应关注后续汽车玻璃需求、海外工厂利润率、汇率/能源成本和新产品渗透，而非单日两融波动。\n\n## 关联\n- [福耀玻璃6月18日收盘与资金流：主力净流出3531.39万元](investing/福耀玻璃6月18日收盘与资金流-主力净流出3531-39万元.md)\n- [福耀玻璃6月18日收盘与资金流：主力净流出3531.39万元](entries/福耀玻璃6月18日收盘与资金流-主力净流出3531-39万元.md) — 共享标签: fuyao-glass, market-data, 2026-06; 共同关键词(15): 玻璃, 月1, 8日, 18, com\n- [福耀玻璃H股6月17日南向资金减持12.28万股](entries/福耀玻璃H股6月17日南向资金减持12-28万股.md) — 共享标签: sentiment, short-term, 2026-06; 共同关键词(11): 玻璃, https, 月1, 耀玻, url", "n32": "source_url: https://stock.stockstar.com/RB2026061800037075.shtml\nsource: 证券之星\npublished_or_observed: 2026-06-18\ncategory: investing\n---\n\n# 福耀玻璃6月18日收盘与资金流：主力净流出3531.39万元\n\n## 摘要\n证券之星消息，截至2026年6月18日收盘，福耀玻璃（600660）报49.95元，下跌1.46%，换手率0.49%，成交量9.78万手，成交额4.91亿元。资金流向方面，主力资金净流出3531.39万元，占总成交额7.19%；游资资金净流入1302.91万元，占总成交额2.65%；散户资金净流入2228.48万元，占总成交额4.54%。\n\n## 关键要点\n- 收盘价：49.95 元，日跌幅 -1.46%。\n- 成交额：4.91 亿元；换手率：0.49%。\n- 主力资金净流出：3531.39 万元，占成交额 7.19%。\n- 游资资金净流入：1302.91 万元，占成交额 2.65%。\n- 散户资金净流入：2228.48 万元，占成交额 4.54%。\n- 文章引用2026年一季报：营收104.13亿元，同比增长5.08%；归母净利润17.12亿元，同比下降15.68%；毛利率37.38%。\n- 信号方向：交易资金偏弱，但未构成基本面恶化证据。\n\n## 投资视角\n6月18日资金面偏弱，表现为股价下跌叠加主力资金净流出。但单日资金流属于交易噪音，不能直接等同于公司基本面恶化。更有用的跟踪点是：Q2收入增速能否恢复、海外产能利润率是否修复、汇兑/财务费用压力是否缓解。\n\n## 关联\n- [福耀玻璃H股6月17日南向资金减持12.28万股](investing/福耀玻璃H股6月17日南向资金减持12-28万股.md)\n- [福耀玻璃H股6月17日南向资金减持12.28万股](entries/福耀玻璃H股6月17日南向资金减持12-28万股.md) — 共享标签: sentiment, short-term, 2026-06; 共同关键词(13): 玻璃, https, 月1, 耀玻, url", "n33": "source_url: https://stock.stockstar.com/RB2026061800003048.shtml\nsource: 证券之星 / 香港交易所数据\npublished_or_observed: 2026-06-18\ncategory: investing\n---\n\n# 福耀玻璃H股6月17日南向资金减持12.28万股\n\n## 摘要\n证券之星援引香港交易所数据称，6月17日南向资金减持福耀玻璃（03606.HK）12.28万股。近5个交易日中，南向资金连续减持，累计净减持236.77万股；近20个交易日中有19天减持，累计净减持918.57万股。截至该数据时点，南向资金持有福耀玻璃H股8249.91万股，占公司已发行普通股的13.59%。\n\n## 关键要点\n- 2026-06-17：南向资金减持 12.28 万股。\n- 近5个交易日：累计净减持 236.77 万股。\n- 近20个交易日：19天减持，累计净减持 918.57 万股。\n- 南向持股：8249.91 万股，占已发行普通股 13.59%。\n- 信号方向：港股端短线资金偏谨慎，需观察是否延续。\n\n## 投资视角\n南向资金连续减持显示港股端短线资金偏谨慎，可能与H股估值、汇率、汽车链情绪或获利了结有关。该信号本身不代表经营质量变化，但会影响短期股价弹性。若南向持续减持同时叠加基本面数据走弱，才需要提高关注级别。\n## 关联\n- [福耀玻璃6月18日收盘与资金流-主力净流出3531-39万元](福耀玻璃6月18日收盘与资金流-主力净流出3531-39万元.md) — A股资金流+H股南向同步观察\n- [福耀玻璃2026年4月股价行情](福耀玻璃2026年4月股价行情.md) — H股南向数据需放在AH估值框架中", "n34": "# 福耀玻璃深度分析：\"汽车强国\"背后的\"卖铲人\"\n\n## 摘要\n福耀玻璃国内汽车玻璃市占率约70%，全球36%（第一）。文章深度分析了福耀的四大竞争壁垒：中国国运红利、柔性生产能力、垂直产业一体化、持续降本理念。2026年Q1业绩下滑主因汇兑损益逆转，全年盈利预计中个位数下降。\n\n## 关键数据\n- 国内汽车玻璃市占率：~70%\n- 全球汽车玻璃市占率：36%\n- 2025年营收：超450亿元\n- 2025年归母净利润：超90亿元\n- 2010-2025年营收复合增速：~11%\n- 2010-2025年净利润复合增速：~11%\n- 毛利率：37.3%（领先国际巨头10个百分点以上）\n\n## 关键要点\n- 四大护城河：中国国运红利、柔性生产、垂直一体化、持续降本\n- 柔性生产能力：常规规格换型仅需1小时，国际同行需3-5天\n- 垂直一体化：上游5个砂矿→6个浮法基地→17个汽玻基地\n- 2026年汇兑风险：美元+欧元双敞口，Q1汇兑亏损4.4亿元\n- 股价从高点74元回调至55元附近，静态PE约15.5倍\n- 股息率约3.86%（按60%分红率计算）\n## 关联\n- [福耀玻璃竞争壁垒与护城河分析](福耀玻璃竞争壁垒与护城河分析.md) — 两篇互补：这篇全景，那篇聚焦壁垒\n- [福耀玻璃2025年年报业绩概览](福耀玻璃2025年年报业绩概览.md) — 卖铲人叙事需用财务数据验证", "n35": "# 福耀玻璃竞争壁垒与护城河分析\n\n## 摘要\n福耀玻璃的四大竞争壁垒：中国国运红利、柔性生产能力、垂直产业一体化、持续降本理念。国内市占率70%，全球36%，毛利率37.3%领先国际巨头10个百分点以上。与[台积电的技术壁垒](台积电商业模式与护城河分析.md)不同，福耀是典型的制造业壁垒——规模+效率+客户黏性。详见[全景深度分析](福耀玻璃深度分析-汽车强国背后的卖铲人.md)。\n\n## 关键数据\n- 国内市占率：~70%\n- 全球市占率：36%\n- 毛利率：37.3%\n- 常规规格换型时间：1小时（国际同行3-5天）\n- 产能布局：国内11个+海外2个，共13个综合性工厂\n- 产能规模：近5000万套\n- 原材料本土化采购率（美国）：70%\n\n## 关键要点\n- 中国国运红利：完善的汽车产业链、高素质产业工人、\"低成本、高品质、快交付\"\n- 柔性生产能力：适配新能源时代多品种、小批量、高频迭代需求\n- 垂直一体化：上游砂矿→浮法基地→汽玻基地，紧密产业集群\n- 持续降本：2008-2025年从\"减少物料损耗\"到\"精益五星管理模式\"\n- 全球四大巨头格局：福耀36%、旭硝子/圣戈班/板硝子各14%-16%\n- 新增产能：福清、合肥新增600万套产能爬坡中\n## 关联\n- [福耀玻璃深度分析-汽车强国背后的卖铲人](福耀玻璃深度分析-汽车强国背后的卖铲人.md) — 两篇互补：这篇讲壁垒，那篇讲商业模式全景\n- [台积电商业模式与护城河分析](台积电商业模式与护城河分析.md) — 跨标的对比：制造业壁垒 vs 技术壁垒", "n36": "# 福耀玻璃雪球财务分析（2025Q1数据）\n\n## 摘要\n福耀玻璃2025Q1营收99.1亿元（+12.16%），净利润20.3亿元（+46.25%）。全球市占率约34%，国内约68%。公司面临汇兑风险、法律风险、原材料成本波动等挑战。\n\n## 关键数据\n- 2025Q1营收：99.1亿元（+12.16%）\n- 2025Q1净利润：20.3亿元（+46.25%）\n- 2024年营收：392.5亿元（+18.37%）\n- 2024年利润总额：89.91亿元（+33.87%）\n- 加权平均ROE：22.72%\n- 全球市占率：约34%\n- 国内市占率：约68%\n- 2024年研发投入：16.78亿元（占营收4.27%）\n- 国内外收入占比：国内53.90%，海外44.72%\n\n## 关键要点\n- 高毛利率和净利率，盈利能力和成本控制能力强\n- 全球市场占有率和品牌影响力稳固\n- 汇兑风险：销售回款以美元、欧元为主，汇率波动影响大\n- 法律风险：2023年美国俄亥俄州工厂遭国土安全部调查\n- 原材料成本波动：玻璃原片受国际市场价格波动影响\n## 关联\n- [福耀玻璃2026年一季报业绩分析](2026-05-31-福耀玻璃2026年一季报业绩分析.md) — 2025Q1 vs 2026Q1跨年对比\n- [福耀玻璃2024年年报核心要点](福耀玻璃2024年年报核心要点.md) — 雪球分析需对照原始年报数据验证", "n37": "## 摘要\n腾讯控股2026年Q1实现营收1965亿元（同比+9%），调整后净利润同比+11%。15份券商研报（JPMorgan×3、UBS×2、HSBC×2、德意志银行、野村、华泰证券、申万宏源、招商证券）的综合观点：核心业务（游戏/广告/支付）盈利稳健，AI投入（混元3.0、微信Agent、元宝）战略性加大但ROI可期，一致看多，目标价区间690-716港元。\n\n## 关键要点\n- 游戏业务：Q4 2025国内游戏+15%（三角洲行动、无畏契约），海外+32%（Supercell、PUBG Mobile），全年海外收入突破100亿美元\n- AI战略：混元3.0模型4月发布，微信Agent为长期AI变现核心入口，通过广告/交易/支付间接变现\n- Q1 2026业绩：营收+9%略低于预期（受春节季节性影响），但调整后经营利润/净利润分别+9%/+11%基本符合预期\n- AI CapEx：管理层指引AI投入持续加大，但核心业务利润率扩张可抵消，JPMorgan认为\"Compounding core, bounded AI\"\n- 估值：当前14x 2026e P/E，JPMorgan目标价HK$690，华泰HK$716，瑞银重申Key Call首选\n- 催化剂：微信Agent上线进度、混元模型能力迭代、游戏新品《无畏契约》手游、《王者
